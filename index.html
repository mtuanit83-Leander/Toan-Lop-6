{ q_title: "Câu 1", q_content: "Cho tỉ lệ thức&nbsp;$\\dfrac{-12}{x} = \\dfrac{x}{-3}$. Giá trị của&nbsp;$x$&nbsp;là:", options: ["A. $6$", "B. $-6$", "C. Cả A và B", "D. $36$"], correct_idx: 2, explain: "Áp dụng quy tắc nhân chéo tỉ lệ thức:&nbsp;$x \\cdot x = (-12) \\cdot (-3) \\Rightarrow x^2 = 36$. Vì&nbsp;$36 = 6^2 = (-6)^2$&nbsp;nên&nbsp;$x = 6$&nbsp;hoặc&nbsp;$x = -6$. Chọn C." },
{ q_title: "Câu 2", q_content: "Nghịch đảo của hỗn số&nbsp;$\\left( -2\\dfrac{1}{4} \\right)$&nbsp;là:", options: ["A. $\\dfrac{9}{4}$", "B. $\\dfrac{4}{9}$", "C. $\\dfrac{-4}{9}$", "D. $\\dfrac{-9}{4}$"], correct_idx: 2, explain: "Đổi hỗn số ra phân số:&nbsp;$\\left( -2\\dfrac{1}{4} \\right) = \\dfrac{-9}{4}$. Phân số nghịch đảo của nó là&nbsp;$\\dfrac{4}{-9} = \\dfrac{-4}{9}$. Chọn C." },
{ q_title: "Câu 3", q_content: "Phân số lớn nhất trong các phân số&nbsp;$\\dfrac{-3}{4}, \\dfrac{-5}{6}, \\dfrac{-7}{8}, \\dfrac{-1}{2}$&nbsp;là:", options: ["A. $\\dfrac{-3}{4}$", "B. $\\dfrac{-5}{6}$", "C. $\\dfrac{-7}{8}$", "D. $\\dfrac{-1}{2}$"], correct_idx: 3, explain: "Các phân số âm có phần số đối lần lượt là&nbsp;$\\dfrac{3}{4}, \\dfrac{5}{6}, \\dfrac{7}{8}, \\dfrac{1}{2}$. Vì&nbsp;$\\dfrac{1}{2} < \\dfrac{3}{4} < \\dfrac{5}{6} < \\dfrac{7}{8}$&nbsp;nên số âm lớn nhất là số có phần số đối nhỏ nhất. Vậy số lớn nhất là&nbsp;$\\dfrac{-1}{2}$. Chọn D." },
{ q_title: "Câu 4", q_content: "Tính tổng:&nbsp;$1 - \\dfrac{1}{2} + \\dfrac{1}{2} - \\dfrac{1}{3} + \\dfrac{1}{3} - \\dfrac{1}{4} + \\dots + \\dfrac{1}{9} - \\dfrac{1}{10}$", options: ["A. $\\dfrac{9}{10}$", "B. $\\dfrac{1}{10}$", "C. $\\dfrac{-9}{10}$", "D. $1$"], correct_idx: 0, explain: "Triệt tiêu các phân số có dấu trái ngược ở giữa, ta được:&nbsp;$1 - \\dfrac{1}{10} = \\dfrac{9}{10}$. Chọn A." },
{ q_title: "Câu 5", q_content: "Học sinh lớp 6A có&nbsp;$40$&nbsp;em. Khi xếp loại học lực, số học sinh Giỏi chiếm&nbsp;$25\\%$, Khá chiếm&nbsp;$50\\%$, còn lại là Trung bình. Số học sinh Trung bình là:", options: ["A. 10", "B. 20", "C. 5", "D. 15"], correct_idx: 0, explain: "Tỉ lệ học sinh Trung bình là:&nbsp;$100\\% - (25\\% + 50\\%) = 25\\%$. Số học sinh Trung bình là:&nbsp;$40 \\cdot 25\\% = 10$&nbsp;(học sinh). Chọn A." },
{ q_title: "Câu 6", q_content: "Khẳng định nào ĐÚNG về phép nhân hai phân số?", options: ["A. Nhân tử với tử, giữ nguyên mẫu", "B. Quy đồng rồi nhân tử", "C. Nhân tử với tử, nhân mẫu với mẫu", "D. Nhân chéo"], correct_idx: 2, explain: "Quy tắc nhân hai phân số là ta lấy tử số nhân với tử số, mẫu số nhân với mẫu số. Chọn C." },
{ q_title: "Câu 7", q_content: "Một xe máy chạy với vận tốc&nbsp;$40\\text{ km/h}$. Thời gian để xe chạy hết quãng đường&nbsp;$60\\text{ km}$&nbsp;là:", options: ["A. 1,5 giờ", "B. 1 giờ 50 phút", "C. 2/3 giờ", "D. 2400 phút"], correct_idx: 0, explain: "Thời gian bằng quãng đường chia vận tốc:&nbsp;$t = \\dfrac{60}{40} = \\dfrac{3}{2} = 1,5$&nbsp;(giờ). Chọn A." },
{ q_title: "Câu 8", q_content: "Điểm&nbsp;$P$&nbsp;nằm trên tia&nbsp;$Om$&nbsp;(và&nbsp;$P$&nbsp;không trùng với&nbsp;$O$). Khẳng định nào sau đây là SAI?", options: ["A. $O$&nbsp;và&nbsp;$P$&nbsp;cùng thuộc tia&nbsp;$Om$", "B. Tia&nbsp;$Om$&nbsp;và tia&nbsp;$OP$&nbsp;trùng nhau", "C. $O, P, m$&nbsp;không thẳng hàng", "D. Tia&nbsp;$PO$&nbsp;và tia&nbsp;$Pm$&nbsp;đối nhau"], correct_idx: 2, explain: "Vì&nbsp;$P$&nbsp;thuộc tia&nbsp;$Om$&nbsp;nên các điểm tạo nên tia này phải thẳng hàng. Khẳng định C sai. Chọn C." },
{ q_title: "Câu 9", q_content: "Nếu điểm&nbsp;$M$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;thì:", options: ["A. $MA = MB$", "B. $AM + MB = AB$", "C. $M$&nbsp;là trung điểm&nbsp;$AB$", "D. $A$&nbsp;nằm giữa&nbsp;$M, B$"], correct_idx: 1, explain: "Tính chất điểm nằm giữa: Khi một điểm nằm giữa hai điểm còn lại, tổng khoảng cách từ nó đến hai điểm kia bằng đúng khoảng cách của hai điểm đó. Vậy&nbsp;$AM + MB = AB$. Chọn B." },
{ q_title: "Câu 10", q_content: "Hai góc có tổng số đo bằng&nbsp;$90^{\\circ}$&nbsp;gọi là:", options: ["A. Hai góc bù nhau", "B. Hai góc phụ nhau", "C. Hai góc kề nhau", "D. Hai góc đối đỉnh"], correct_idx: 1, explain: "Theo định nghĩa, hai góc phụ nhau là hai góc có tổng số đo bằng&nbsp;$90^{\\circ}$. Chọn B." },
{ q_title: "Câu 11", q_content: "Cho phân số&nbsp;$A = \\dfrac{2n+5}{n+2}$&nbsp;(với&nbsp;$n \\in \\mathbb{Z}, n \\neq -2$). Xét 3 mệnh đề sau:<br>(I) Khi&nbsp;$n = 0$, giá trị của&nbsp;$A$&nbsp;là&nbsp;$2,5$.<br>(II) Khi&nbsp;$n = -1$, giá trị của&nbsp;$A$&nbsp;là&nbsp;$3$.<br>(III) Có đúng&nbsp;$4$&nbsp;giá trị nguyên của&nbsp;$n$&nbsp;để&nbsp;$A$&nbsp;nhận giá trị là một số nguyên.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Thay n=0 $\\Rightarrow A = 5/2 = 2,5$ (Đúng). (II) Thay n=-1 $\\Rightarrow A = 3/1 = 3$ (Đúng). (III) Biến đổi $A = 2 + \\dfrac{1}{n+2}$. Để A nguyên thì $n+2 \\in \\{1; -1\\} \\Rightarrow n \\in \\{-1; -3\\}$. Vậy chỉ có 2 giá trị nguyên, không phải 4 (Sai). Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Lấy điểm&nbsp;$O$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$. Biết&nbsp;$OA = 3\\text{cm}, OB = 5\\text{cm}$. Gọi&nbsp;$M$&nbsp;là trung điểm của&nbsp;$AB$. Xét 3 mệnh đề sau:<br>(I) Độ dài đoạn thẳng&nbsp;$AB = 8\\text{cm}$.<br>(II) Độ dài đoạn&nbsp;$AM = 4\\text{cm}$.<br>(III) Điểm&nbsp;$O$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$M$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 3, explain: "(I) O nằm giữa A, B nên AB = OA + OB = 3+5=8 (Đúng). (II) M là trung điểm AB nên AM = AB/2 = 4 (Đúng). (III) Trên đoạn AB tính từ A, ta có AO = 3, AM = 4. Vì AO < AM nên O nằm giữa A và M (Đúng). Có 3 mệnh đề đúng. Chọn D." }
],
tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Tính bằng cách hợp lý:&nbsp;$E = \\dfrac{4}{1 \\cdot 5} + \\dfrac{4}{5 \\cdot 9} + \\dfrac{4}{9 \\cdot 13} + \\dots + \\dfrac{4}{97 \\cdot 101}$<div class='mt-6'>b) Tính giá trị biểu thức sau:&nbsp;$F = \\dfrac{1}{2} + \\dfrac{1}{4} + \\dfrac{1}{8} + \\dfrac{1}{16} + \\dfrac{1}{32} + \\dfrac{1}{64}$</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đây là dãy phân số có quy luật gì ở mẫu số? (Khoảng cách giữa hai thừa số là $5 - 1 = 4$, $9 - 5 = 4$...).<br>- <b>Why:</b> Tử số hiện tại là $4$. Đã khớp hoàn hảo với khoảng cách ở mẫu chưa? (Rồi).<br>- <b>How:</b> Áp dụng ngay công thức tách phân số $\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$ để bung chuỗi ra và triệt tiêu phần giữa.<br><b>Ý b:</b><br>- <b>What:</b> Đây là tổng các phân số có mẫu là lũy thừa của $2$ ($2^1, 2^2, 2^3...$).<br>- <b>How:</b> Mẹo kinh điển là nhân cả biểu thức $F$ với cơ số là $2$.<br>- <b>Why:</b> Khi nhân $2$, chuỗi mới sẽ dịch chuyển bậc, các phân số sẽ trở nên giống hệt chuỗi ban đầu. Lấy $2F - F$ sẽ quét sạch đoạn giữa, bài toán kết thúc trong 1 nốt nhạc.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$E$:</b></li><li class='ml-4'>Áp dụng công thức tách phân số sai phân $\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$, ta có:</li><li class='ml-8'>$E = \\left( \\dfrac{1}{1} - \\dfrac{1}{5} \\right) + \\left( \\dfrac{1}{5} - \\dfrac{1}{9} \\right) + \\left( \\dfrac{1}{9} - \\dfrac{1}{13} \\right) + \\dots + \\left( \\dfrac{1}{97} - \\dfrac{1}{101} \\right)$</li><li class='ml-4'>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở giữa:</li><li class='ml-8'>$E = 1 - \\dfrac{1}{101}$</li><li class='ml-4'>Quy đồng và tính kết quả:</li><li class='ml-8'>$E = \\dfrac{101}{101} - \\dfrac{1}{101}$</li><li class='ml-8'>$E = \\dfrac{100}{101}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $E = \\dfrac{100}{101}$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$F$:</b></li><li class='ml-4'>Ta nhân cả hai vế của biểu thức $F$ với $2$:</li><li class='ml-8'>$2F = 2 \\cdot \\left( \\dfrac{1}{2} + \\dfrac{1}{4} + \\dfrac{1}{8} + \\dfrac{1}{16} + \\dfrac{1}{32} + \\dfrac{1}{64} \\right)$</li><li class='ml-8'>$2F = 1 + \\dfrac{1}{2} + \\dfrac{1}{4} + \\dfrac{1}{8} + \\dfrac{1}{16} + \\dfrac{1}{32}$</li><li class='ml-4'>Lấy phương trình $2F$ trừ đi phương trình $F$ vế theo vế:</li><li class='ml-8'>$2F - F = \\left( 1 + \\dfrac{1}{2} + \\dfrac{1}{4} + \\dots + \\dfrac{1}{32} \\right) - \\left( \\dfrac{1}{2} + \\dfrac{1}{4} + \\dots + \\dfrac{1}{32} + \\dfrac{1}{64} \\right)$</li><li class='ml-8'>$F = 1 - \\dfrac{1}{64}$</li><li class='ml-8'>$F = \\dfrac{63}{64}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $F = \\dfrac{63}{64}$.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Tìm&nbsp;$x$, biết:&nbsp;$|3x - 1,2| - \\dfrac{1}{2} = 2,5$<div class='mt-6'>b) Tìm các số nguyên&nbsp;$x, y$&nbsp;thỏa mãn phương trình:&nbsp;$xy + 3x - y = 8$</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Phương trình chứa dấu giá trị tuyệt đối. Cần cô lập nó trước.<br>- <b>How:</b> Chuyển phân số $-\\dfrac{1}{2}$ sang vế phải. Lưu ý quy đổi $2,5 = \\dfrac{5}{2}$.<br>- <b>Why:</b> Sau khi cô lập, trị tuyệt đối bằng một số dương ($\\dfrac{6}{2} = 3$). Tại sao ta phải chia làm 2 trường hợp? (Vì khoảng cách bằng 3 thì có thể nằm ở tọa độ $3$ hoặc $-3$ trên trục số).<br><b>Ý b:</b><br>- <b>What:</b> Phương trình nghiệm nguyên chứa cụm $xy$. Cần đưa về dạng $(Đa \\ thức \\ 1) \\cdot (Đa \\ thức \\ 2) = Hằng \\ số$.<br>- <b>How:</b> Nhóm 2 hạng tử đầu tiên $xy + 3x$, rút $x$ làm nhân tử chung $\\Rightarrow x(y+3)$.<br>- <b>Where:</b> Còn sót lại hạng tử $-y$. Làm sao để \"ép\" tạo ra $(y+3)$? Ta viết thành $-(y+3) = -y - 3$. Vậy ta đã tự ý trừ đi $3$ ở vế trái, nên phải trừ $3$ ở vế phải để giữ thế cân bằng.", solution: "<li><b>a) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Từ phương trình ban đầu, ta chuyển vế để cô lập trị tuyệt đối (đổi $2,5 = \\dfrac{5}{2}$):</li><li class='ml-8'>$|3x - 1,2| = \\dfrac{5}{2} + \\dfrac{1}{2}$</li><li class='ml-8'>$|3x - 1,2| = \\dfrac{6}{2}$</li><li class='ml-8'>$|3x - 1,2| = 3$</li><li class='ml-4'>Vì $3 > 0$, ta chia làm 2 trường hợp để phá trị tuyệt đối:</li><li class='ml-4'><b>Trường hợp 1:</b></li><li class='ml-8'>$3x - 1,2 = 3$</li><li class='ml-8'>$3x = 3 + 1,2 = 4,2$</li><li class='ml-8'>$x = 4,2 : 3 = 1,4$</li><li class='ml-4'><b>Trường hợp 2:</b></li><li class='ml-8'>$3x - 1,2 = -3$</li><li class='ml-8'>$3x = -3 + 1,2 = -1,8$</li><li class='ml-8'>$x = -1,8 : 3 = -0,6$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x \\in \\{1,4; -0,6\\}$.</li><li><b>b) Tìm các số nguyên&nbsp;$x, y$:</b></li><li class='ml-4'>Ta biến đổi phương trình $xy + 3x - y = 8$:</li><li class='ml-8'>$x(y + 3) - y = 8$</li><li class='ml-4'>Trừ $3$ vào cả hai vế để ép tạo nhân tử chung:</li><li class='ml-8'>$x(y + 3) - y - 3 = 8 - 3$</li><li class='ml-8'>$x(y + 3) - (y + 3) = 5$</li><li class='ml-4'>Rút nhân tử chung $(y + 3)$:</li><li class='ml-8'>$(x - 1)(y + 3) = 5$</li><li class='ml-4'>Vì $x, y \\in \\mathbb{Z}$ nên $(x - 1)$ và $(y + 3)$ phải là các số nguyên và là Ước của $5$.</li><li class='ml-4'>Tập hợp các ước của $5$ là: Ư$(5) = \\{-5; -1; 1; 5\\}$. Ta lập bảng xét các trường hợp:</li><li class='ml-8'>+ TH1: $x - 1 = 1 \\Rightarrow x = 2$. Khi đó $y + 3 = 5 \\Rightarrow y = 2$.</li><li class='ml-8'>+ TH2: $x - 1 = 5 \\Rightarrow x = 6$. Khi đó $y + 3 = 1 \\Rightarrow y = -2$.</li><li class='ml-8'>+ TH3: $x - 1 = -1 \\Rightarrow x = 0$. Khi đó $y + 3 = -5 \\Rightarrow y = -8$.</li><li class='ml-8'>+ TH4: $x - 1 = -5 \\Rightarrow x = -4$. Khi đó $y + 3 = -1 \\Rightarrow y = -4$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Các cặp số $(x; y)$ thỏa mãn là: $(2; 2), (6; -2), (0; -8), (-4; -4)$.</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Hai vòi nước cùng chảy vào một bể không có nước. Nếu mở riêng vòi thứ nhất thì sau&nbsp;$4$&nbsp;giờ sẽ đầy bể. Nếu mở riêng vòi thứ hai (vòi này đặt ở sát đáy bể dùng để tháo nước ra) thì sau&nbsp;$6$&nbsp;giờ sẽ tháo cạn bể nước đầy. Hỏi nếu mở cả hai vòi cùng lúc khi bể đang cạn thì sau bao lâu bể sẽ đầy nước?", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán \"Công việc chung\" nhưng có sự triệt tiêu (một người xây, một người phá).<br>- <b>How:</b> Cần quy về \"năng suất 1 giờ\". Coi toàn bộ thể tích bể là 1 đơn vị.<br>- <b>Why:</b> Tại sao khi kết hợp hai vòi, ta lại làm phép trừ? (Vì vòi 1 bơm nước vào mang dấu $+$, vòi 2 tháo nước ra mang dấu $-$). Lấy Năng suất vòi 1 TRỪ ĐI Năng suất vòi 2 sẽ ra lượng nước THỰC TẾ tăng lên trong 1 giờ.<br>- <b>Where:</b> Lấy thể tích bể ($1$) chia cho lượng nước tăng lên trong 1 giờ sẽ ra tổng thời gian đầy bể.", solution: "<li>Quy ước toàn bộ thể tích của bể nước là $1$ đơn vị.</li><li>Trong $1$ giờ, vòi thứ nhất (vòi chảy vào) bơm được:</li><li class='ml-4'>$1 : 4 = \\dfrac{1}{4}$ (thể tích bể)</li><li>Trong $1$ giờ, vòi thứ hai (vòi tháo ra) tháo được:</li><li class='ml-4'>$1 : 6 = \\dfrac{1}{6}$ (thể tích bể)</li><li>Trong $1$ giờ, nếu mở cả hai vòi cùng lúc thì lượng nước thực tế tăng thêm trong bể là sự chênh lệch giữa lượng bơm vào và lượng tháo ra:</li><li class='ml-4'>$\\dfrac{1}{4} - \\dfrac{1}{6} = \\dfrac{3}{12} - \\dfrac{2}{12} = \\dfrac{1}{12}$ (thể tích bể)</li><li>Thời gian để nước chảy đầy bể khi mở cả hai vòi cùng lúc là (lấy tổng thể tích chia cho năng suất chung):</li><li class='ml-4'>$1 : \\dfrac{1}{12} = 1 \\cdot 12 = 12$ (giờ)</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Nếu mở cả hai vòi cùng lúc thì sau $12$ giờ bể sẽ đầy nước.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Vẽ đường thẳng&nbsp;$d$. Lấy&nbsp;$4$&nbsp;điểm&nbsp;$A, B, C, D$&nbsp;theo thứ tự đó cùng thuộc đường thẳng&nbsp;$d$&nbsp;sao cho&nbsp;$AB = 2\\text{ cm}, BC = 3\\text{ cm}, CD = 2\\text{ cm}$.<div class='mt-6'>a) Tính độ dài đoạn thẳng&nbsp;$AC$&nbsp;và&nbsp;$BD$.</div><div class='mt-6'>b) Gọi&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$BC$. Tính độ dài&nbsp;$AM$&nbsp;và&nbsp;$MD$.</div><div class='mt-6'>c) Chứng tỏ rằng điểm&nbsp;$M$&nbsp;cũng là trung điểm của đoạn thẳng&nbsp;$AD$.</div><div class='flex justify-center my-8'><svg width='320' height='100' viewBox='0 0 320 100'><line x1='10' y1='50' x2='310' y2='50' stroke='black' stroke-width='1.5'/><text x='315' y='55' font-size='14' font-style='italic'>d</text><circle cx='20' cy='50' r='2.5' fill='black'/><text x='15' y='75' font-size='14'>A</text><circle cx='100' cy='50' r='2.5' fill='black'/><text x='95' y='75' font-size='14'>B</text><circle cx='160' cy='50' r='2.5' fill='red'/><text x='155' y='75' font-size='14' fill='red'>M</text><circle cx='220' cy='50' r='2.5' fill='black'/><text x='215' y='75' font-size='14'>C</text><circle cx='300' cy='50' r='2.5' fill='black'/><text x='295' y='75' font-size='14'>D</text><path d='M 20 40 L 20 25 L 100 25 L 100 40' fill='none' stroke='blue' stroke-width='0.5'/><text x='45' y='18' font-size='12' fill='blue'>2cm</text><path d='M 100 40 L 100 25 L 160 25 L 160 40' fill='none' stroke='green' stroke-width='0.5'/><text x='115' y='18' font-size='12' fill='green'>1.5cm</text><path d='M 160 40 L 160 25 L 220 25 L 220 40' fill='none' stroke='green' stroke-width='0.5'/><text x='175' y='18' font-size='12' fill='green'>1.5cm</text><path d='M 220 40 L 220 25 L 300 25 L 300 40' fill='none' stroke='purple' stroke-width='0.5'/><text x='245' y='18' font-size='12' fill='purple'>2cm</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đề bài đã cho $A, B, C, D$ nằm **theo thứ tự đó**. Điều này giúp ta xác định ngay điểm nào nằm giữa.<br>- <b>How:</b> $B$ nằm giữa $A, C$ nên dùng phép cộng tìm $AC$. $C$ nằm giữa $B, D$ nên dùng phép cộng tìm $BD$.<br><b>Ý b:</b><br>- <b>What:</b> $M$ là trung điểm của $BC$ $\\Rightarrow$ Tính được đoạn $MB$ và $MC$.<br>- <b>How:</b> Điểm $B$ nằm giữa $A$ và $M$, ta tính được $AM$. Điểm $C$ nằm giữa $M$ và $D$, ta tính được $MD$.<br><b>Ý c:</b><br>- <b>What:</b> Để chứng minh $M$ là trung điểm của $AD$, cần kiểm tra 2 điều kiện gì? (Nằm giữa $A, D$ và cách đều $AM = MD$).<br>- Các khoảng cách đã được tính sẵn ở ý b, chỉ cần đem so sánh.", solution: "<li><b>a) Tính độ dài đoạn thẳng&nbsp;$AC$&nbsp;và&nbsp;$BD$:</b></li><li class='ml-4'>Vì $4$ điểm $A, B, C, D$ nằm theo thứ tự đó trên đường thẳng $d$, nên:</li><li class='ml-4'>Điểm $B$ nằm giữa hai điểm $A$ và $C$. Áp dụng công thức cộng đoạn thẳng:</li><li class='ml-8'>$AC = AB + BC$</li><li class='ml-8'>$AC = 2 + 3 = 5\\text{ cm}$.</li><li class='ml-4'>Điểm $C$ nằm giữa hai điểm $B$ và $D$. Áp dụng công thức cộng đoạn thẳng:</li><li class='ml-8'>$BD = BC + CD$</li><li class='ml-8'>$BD = 3 + 2 = 5\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $AC = 5\\text{ cm}$ và $BD = 5\\text{ cm}$.</li><li><b>b) Tính độ dài đoạn&nbsp;$AM$&nbsp;và&nbsp;$MD$:</b></li><li class='ml-4'>Vì $M$ là trung điểm của đoạn thẳng $BC$ nên:</li><li class='ml-8'>$MB = MC = \\dfrac{BC}{2} = \\dfrac{3}{2} = 1,5\\text{ cm}$.</li><li class='ml-4'>Theo thứ tự sắp xếp trên đường thẳng là $A \\rightarrow B \\rightarrow M \\rightarrow C \\rightarrow D$:</li><li class='ml-4'>Điểm $B$ nằm giữa hai điểm $A$ và $M$. Ta có:</li><li class='ml-8'>$AM = AB + BM = 2 + 1,5 = 3,5\\text{ cm}$.</li><li class='ml-4'>Điểm $C$ nằm giữa hai điểm $M$ và $D$. Ta có:</li><li class='ml-8'>$MD = MC + CD = 1,5 + 2 = 3,5\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $AM = 3,5\\text{ cm}$ và $MD = 3,5\\text{ cm}$.</li><li><b>c) Chứng tỏ&nbsp;$M$&nbsp;là trung điểm của&nbsp;$AD$:</b></li><li class='ml-4'>Theo thứ tự các điểm trên đường thẳng $A \\rightarrow B \\rightarrow M \\rightarrow C \\rightarrow D$, ta nhận thấy:</li><li class='ml-8'><b>Điểm&nbsp;$M$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$D$</b> (1).</li><li class='ml-4'>Dựa vào kết quả tính toán ở câu b, ta có:</li><li class='ml-8'>$AM = 3,5\\text{ cm}$ và $MD = 3,5\\text{ cm} \\Rightarrow \\mathbf{AM = MD}$ (2).</li><li class='ml-4'>Từ (1) và (2) suy ra: Điểm $M$ là trung điểm của đoạn thẳng $AD$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận c: (Điều phải chứng minh).</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "(Nguyên lý Dirichlet) Cho tập hợp gồm&nbsp;$5$&nbsp;số tự nhiên bất kỳ. Chứng minh rằng luôn có thể chọn ra được&nbsp;$3$&nbsp;số trong tập hợp đó sao cho tổng của chúng chia hết cho&nbsp;$3$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh có 3 số mà tổng chia hết cho 3.<br>- <b>Why:</b> Khi chia một số tự nhiên cho 3, có những loại số dư nào? (Có 3 loại: Dư 0, Dư 1, Dư 2).<br>- <b>How:</b> Số dư chính là \"Chiếc lồng\". Đề cho 5 số tự nhiên, đóng vai trò là \"Con thỏ\".<br>- <b>Where:</b> Có 2 kịch bản phân bổ thỏ vào lồng:<br>  + Kịch bản 1: Cả 3 lồng đều có thỏ $\\Rightarrow$ Rút 3 con thỏ từ 3 lồng khác nhau. Tổng 3 số mang 3 số dư (0,1,2) cộng lại $(0+1+2=3)$ sẽ chia hết cho 3. Bài toán hoàn hảo!<br>  + Kịch bản 2: Có lồng trống $\\Rightarrow$ 5 thỏ bị nhét vào $\\le$ 2 lồng. Theo Dirichlet, chắc chắn có 1 lồng chứa $\\ge 3$ thỏ. Lấy ngay 3 con thỏ đó ra. Tổng của 3 số mang cùng số dư thì sao?", solution: "<li>Mọi số tự nhiên khi chia cho $3$ chỉ có thể nhận một trong ba giá trị số dư là: $0, 1,$ hoặc $2$.</li><li>Ta phân loại $5$ số tự nhiên đã cho vào $3$ nhóm (đóng vai trò là 3 chiếc lồng) dựa theo số dư của chúng khi chia cho $3$:</li><li class='ml-8'>Nhóm 0: Các số chia hết cho $3$ (Dư $0$).</li><li class='ml-8'>Nhóm 1: Các số chia $3$ dư $1$.</li><li class='ml-8'>Nhóm 2: Các số chia $3$ dư $2$.</li><li>Xét hai khả năng phân phối các số vào nhóm:</li><li class='ml-4'><b>Khả năng 1: Cả $3$ nhóm đều có chứa ít nhất 1 phần tử.</b></li><li class='ml-8'>Khi đó, ta chọn ra từ mỗi nhóm đúng $1$ số. Giả sử 3 số đó là $a, b, c$. Ta có định dạng của chúng là: $a = 3k, b = 3m+1, c = 3p+2$.</li><li class='ml-8'>Tính tổng của 3 số này: $a + b + c = 3k + (3m+1) + (3p+2) = 3k + 3m + 3p + 3 = 3(k + m + p + 1)$.</li><li class='ml-8'>Rõ ràng tổng này có chứa thừa số 3 nên nó chia hết cho $3$.</li><li class='ml-4'><b>Khả năng 2: Có ít nhất một nhóm bị rỗng (không chứa số nào).</b></li><li class='ml-8'>Khi đó, toàn bộ $5$ số tự nhiên (5 con thỏ) sẽ được phân bổ vào tối đa $2$ nhóm (2 chiếc lồng).</li><li class='ml-8'>Theo Nguyên lý Dirichlet, nếu nhốt $5$ con thỏ vào $2$ chiếc lồng, thì chắc chắn tồn tại ít nhất $1$ lồng chứa từ $3$ con thỏ trở lên ($5 = 2 \\cdot 2 + 1$).</li><li class='ml-8'>Nghĩa là, chắc chắn tồn tại $3$ số tự nhiên có <b>cùng số dư</b> khi chia cho $3$. Giả sử 3 số đó cùng có số dư là $r$ ($r \\in \\{0, 1, 2\\}$). Định dạng của chúng là $3x+r, 3y+r, 3z+r$.</li><li class='ml-8'>Tính tổng của 3 số này: $(3x+r) + (3y+r) + (3z+r) = 3x + 3y + 3z + 3r = 3(x + y + z + r)$.</li><li class='ml-8'>Rõ ràng tổng này cũng chia hết cho $3$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Trong mọi trường hợp, từ 5 số tự nhiên bất kỳ luôn có thể chọn ra được 3 số sao cho tổng của chúng chia hết cho 3. (Đpcm).</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Số nguyên&nbsp;$x$&nbsp;thỏa mãn&nbsp;$\\dfrac{3}{x} = \\dfrac{x}{27}$&nbsp;là:", options: ["A. $9$", "B. $-9$", "C. Cả A và B", "D. $81$"], correct_idx: 2, explain: "Nhân chéo ta được:&nbsp;$x \\cdot x = 3 \\cdot 27 \\Rightarrow x^2 = 81$. Vì&nbsp;$81 = 9^2 = (-9)^2$&nbsp;nên&nbsp;$x = 9$&nbsp;hoặc&nbsp;$x = -9$. Chọn C." },
{ q_title: "Câu 2", q_content: "Cho&nbsp;$A = \\dfrac{-5}{8}$&nbsp;và&nbsp;$B = -0,625$. Khẳng định nào ĐÚNG?", options: ["A. $A > B$", "B. $A < B$", "C. $A = B$", "D. Không so sánh được"], correct_idx: 2, explain: "Ta thực hiện phép chia:&nbsp;$-5 : 8 = -0,625$. Vậy&nbsp;$A = B$. Chọn C." },
{ q_title: "Câu 3", q_content: "Nếu&nbsp;$\\dfrac{3}{4}$&nbsp;của&nbsp;$A$&nbsp;bằng&nbsp;$45$&nbsp;thì&nbsp;$\\dfrac{1}{5}$&nbsp;của&nbsp;$A$&nbsp;bằng:", options: ["A. $60$", "B. $12$", "C. $9$", "D. $15$"], correct_idx: 1, explain: "Số&nbsp;$A = 45 : \\dfrac{3}{4} = 60$. Vậy&nbsp;$\\dfrac{1}{5}$&nbsp;của&nbsp;$A$&nbsp;là:&nbsp;$60 \\cdot \\dfrac{1}{5} = 12$. Chọn B." },
{ q_title: "Câu 4", q_content: "Kết quả của phép trừ&nbsp;$\\dfrac{1}{2} - \\dfrac{1}{3} - \\dfrac{1}{6}$&nbsp;là:", options: ["A. $0$", "B. $1$", "C. $\\dfrac{-1}{6}$", "D. $\\dfrac{1}{6}$"], correct_idx: 0, explain: "Quy đồng mẫu chung 6:&nbsp;$\\dfrac{3}{6} - \\dfrac{2}{6} - \\dfrac{1}{6} = 0$. Chọn A." },
{ q_title: "Câu 5", q_content: "Lãi suất tiết kiệm là&nbsp;$6\\%$/năm. Nếu gửi&nbsp;$10.000.000$&nbsp;đồng thì sau 1 năm, tổng cả gốc lẫn lãi thu về là:", options: ["A. $600.000$&nbsp;đ", "B. $10.600.000$&nbsp;đ", "C. $16.000.000$&nbsp;đ", "D. $1.060.000$&nbsp;đ"], correct_idx: 1, explain: "Tiền lãi:&nbsp;$10.000.000 \\cdot 6\\% = 600.000$&nbsp;đ. Tổng thu về:&nbsp;$10.000.000 + 600.000 = 10.600.000$&nbsp;đ. Chọn B." },
{ q_title: "Câu 6", q_content: "Khi bỏ dấu ngoặc trong biểu thức&nbsp;$a - (b - c + d)$, ta được:", options: ["A. $a - b - c + d$", "B. $a - b + c - d$", "C. $a + b - c + d$", "D. $a - b + c + d$"], correct_idx: 1, explain: "Quy tắc phá ngoặc có dấu trừ đằng trước: Đổi dấu tất cả các hạng tử bên trong ngoặc. Chọn B." },
{ q_title: "Câu 7", q_content: "Biết điểm&nbsp;$M$&nbsp;nằm giữa&nbsp;$P$&nbsp;và&nbsp;$Q$, đồng thời&nbsp;$PM = \\dfrac{1}{2}PQ$. Khẳng định nào ĐÚNG?", options: ["A. $M$&nbsp;là trung điểm&nbsp;$PQ$", "B. $PM = MQ$", "C. Cả A và B đều đúng", "D. Chỉ B đúng"], correct_idx: 2, explain: "Vì M nằm giữa và&nbsp;$PM = 1/2 PQ \\Rightarrow MQ = PQ - PM = 1/2 PQ$. Suy ra&nbsp;$PM = MQ$. Vậy M là trung điểm. Chọn C." },
{ q_title: "Câu 8", q_content: "Ba điểm&nbsp;$A, B, C$&nbsp;thẳng hàng. Nếu&nbsp;$AB = 5\\text{ cm}, AC = 2\\text{ cm}, BC = 3\\text{ cm}$&nbsp;thì:", options: ["A. $A$&nbsp;nằm giữa&nbsp;$B, C$", "B. $B$&nbsp;nằm giữa&nbsp;$A, C$", "C. $C$&nbsp;nằm giữa&nbsp;$A, B$", "D. Không điểm nào nằm giữa"], correct_idx: 2, explain: "Vì&nbsp;$AC + CB = 2 + 3 = 5 = AB$&nbsp;nên điểm&nbsp;$C$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$. Chọn C." },
{ q_title: "Câu 9", q_content: "Tỉ số phần trăm của&nbsp;$\\dfrac{3}{8}$&nbsp;và&nbsp;$0,5$&nbsp;là:", options: ["A. $75\\%$", "B. $15\\%$", "C. $7,5\\%$", "D. $30\\%$"], correct_idx: 0, explain: "Đổi&nbsp;$0,5 = \\dfrac{1}{2} = \\dfrac{4}{8}$. Tỉ số phần trăm:&nbsp;$\\dfrac{3/8}{4/8} \\cdot 100\\% = \\dfrac{3}{4} \\cdot 100\\% = 75\\%$. Chọn A." },
{ q_title: "Câu 10", q_content: "Tổng các số nguyên&nbsp;$x$&nbsp;thỏa mãn&nbsp;$-3 < x \\le 2$&nbsp;là:", options: ["A. $0$", "B. $-3$", "C. $-2$", "D. $-5$"], correct_idx: 0, explain: "Các số nguyên là&nbsp;$-2, -1, 0, 1, 2$. Tổng là:&nbsp;$(-2+2) + (-1+1) + 0 = 0$. Chọn A." },
{ q_title: "Câu 11", q_content: "Cho tổng&nbsp;$S = 4^1 + 4^2 + 4^3 + \\dots + 4^{20}$. Xét 3 mệnh đề sau:<br>(I) Tổng&nbsp;$S$&nbsp;chia hết cho&nbsp;$5$.<br>(II) Chữ số tận cùng của&nbsp;$S$&nbsp;là&nbsp;$4$.<br>(III) Biểu thức&nbsp;$3S + 4$&nbsp;có giá trị bằng&nbsp;$4^{21}$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Đúng, nhóm cặp&nbsp;$(4+4^2) = 20 \\vdots 5$. (II) Sai, chu kỳ tận cùng của cơ số 4 là 4-6. Có 10 cặp tận cùng 0, vậy tổng có tận cùng là 0. (III) Đúng, ta có&nbsp;$4S = 4^2 + \\dots + 4^{21} \\Rightarrow 3S = 4S - S = 4^{21} - 4$. Vậy&nbsp;$3S+4 = 4^{21}$. Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Cho góc&nbsp;$\\angle xOy = 100^{\\circ}$. Vẽ tia&nbsp;$Oz$&nbsp;nằm giữa hai tia&nbsp;$Ox$&nbsp;và&nbsp;$Oy$&nbsp;sao cho&nbsp;$\\angle xOz = 40^{\\circ}$. Gọi&nbsp;$Ot$&nbsp;là tia phân giác của góc&nbsp;$\\angle yOz$. Xét 3 mệnh đề sau:<br>(I) Số đo góc&nbsp;$\\angle yOz = 60^{\\circ}$.<br>(II) Số đo góc&nbsp;$\\angle zOt = 30^{\\circ}$.<br>(III) Số đo góc&nbsp;$\\angle xOt = 70^{\\circ}$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 3, explain: "(I) Đúng, vì&nbsp;$Oz$&nbsp;nằm giữa nên&nbsp;$\\angle yOz = 100 - 40 = 60^{\\circ}$. (II) Đúng, vì&nbsp;$Ot$&nbsp;phân giác nên&nbsp;$\\angle zOt = 60/2 = 30^{\\circ}$. (III) Đúng, theo thứ tự tia&nbsp;$Oz$&nbsp;nằm giữa&nbsp;$Ox$&nbsp;và&nbsp;$Ot$&nbsp;nên&nbsp;$\\angle xOt = 40 + 30 = 70^{\\circ}$. Cả 3 đều đúng. Chọn D." }
],
tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Thực hiện phép tính:&nbsp;$G = \\dfrac{-3}{7} \\cdot 5\\dfrac{1}{4} + \\dfrac{-3}{7} \\cdot 1,75$<div class='mt-6'>b) Thực hiện phép tính:&nbsp;$H = \\left( 2 - \\dfrac{1}{3} - \\dfrac{1}{4} \\right) : \\left( \\dfrac{1}{2} - \\dfrac{1}{6} \\right)$</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Biểu thức có sự pha trộn giữa phân số, hỗn số và số thập phân.<br>- <b>Where:</b> Điểm chung đáng chú ý nhất ở hai hạng tử là gì? (Chính là thừa số&nbsp;$\\dfrac{-3}{7}$).<br>- <b>How:</b> Nếu đặt&nbsp;$\\dfrac{-3}{7}$&nbsp;ra ngoài, trong ngoặc sẽ là phép cộng của&nbsp;$5\\dfrac{1}{4}$&nbsp;và&nbsp;$1,75$. Hãy đổi hỗn số ra số thập phân (hoặc ngược lại) để việc cộng trong ngoặc trở nên tròn trịa.<br><b>Ý b:</b><br>- <b>What:</b> Phép chia giữa hai cụm ngoặc.<br>- <b>Why:</b> Tại sao không nên phá ngoặc? (Vì giữa hai ngoặc là dấu chia, quy tắc phân phối không áp dụng được cho phép chia ở phía sau).<br>- <b>How:</b> Bắt buộc phải quy đồng và tính dứt điểm kết quả của từng dấu ngoặc trước, sau đó mới thực hiện phép nhân nghịch đảo.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$G$:</b></li><li class='ml-4'>Đổi hỗn số ra số thập phân:&nbsp;$5\\dfrac{1}{4} = 5,25$. Biểu thức trở thành:</li><li class='ml-8'>$G = \\dfrac{-3}{7} \\cdot 5,25 + \\dfrac{-3}{7} \\cdot 1,75$</li><li class='ml-4'>Áp dụng tính chất phân phối, đặt nhân tử chung ra ngoài:</li><li class='ml-8'>$G = \\dfrac{-3}{7} \\cdot (5,25 + 1,75)$</li><li class='ml-4'>Thực hiện phép cộng trong ngoặc:</li><li class='ml-8'>$G = \\dfrac{-3}{7} \\cdot 7$</li><li class='ml-4'>Rút gọn chéo số&nbsp;$7$:</li><li class='ml-8'>$G = -3$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $G = -3$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$H$:</b></li><li class='ml-4'>Ta quy đồng các phân số trong từng dấu ngoặc. Ngoặc thứ nhất có mẫu chung là $12$:</li><li class='ml-8'>$H = \\left( \\dfrac{24}{12} - \\dfrac{4}{12} - \\dfrac{3}{12} \\right) : \\left( \\dfrac{1}{2} - \\dfrac{1}{6} \\right)$</li><li class='ml-4'>Ngoặc thứ hai có mẫu chung là $6$:</li><li class='ml-8'>$H = \\left( \\dfrac{17}{12} \\right) : \\left( \\dfrac{3}{6} - \\dfrac{1}{6} \\right)$</li><li class='ml-8'>$H = \\dfrac{17}{12} : \\dfrac{2}{6}$</li><li class='ml-4'>Chuyển thành phép nhân nghịch đảo:</li><li class='ml-8'>$H = \\dfrac{17}{12} \\cdot \\dfrac{6}{2}$</li><li class='ml-4'>Rút gọn chéo ($6$ triệt tiêu với $12$ còn $2$ ở mẫu):</li><li class='ml-8'>$H = \\dfrac{17}{2 \\cdot 2} = \\dfrac{17}{4}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $H = \\dfrac{17}{4}$.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Tìm&nbsp;$x$, biết:&nbsp;$\\dfrac{x}{15} = \\dfrac{-6}{5}$<div class='mt-6'>b) Tìm&nbsp;$x$, biết:&nbsp;$60\\% \\cdot x + \\dfrac{2}{3} \\cdot x = \\dfrac{38}{15}$</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đây là cấu trúc của hai phân số bằng nhau (tỉ lệ thức).<br>- <b>How:</b> Làm thế nào để giải phóng&nbsp;$x$&nbsp;ở tử số? (Nhân cả hai vế với 15, hoặc dùng quy tắc nhân chéo rồi chia).<br><b>Ý b:</b><br>- <b>What:</b> Phương trình bậc 1 có chứa hai hạng tử mang biến&nbsp;$x$.<br>- <b>How:</b> Làm sao để gộp&nbsp;$x$&nbsp;lại? (Áp dụng tính chất phân phối để đặt&nbsp;$x$&nbsp;làm nhân tử chung).<br>- <b>Where:</b> Đừng quên chuyển đổi&nbsp;$60\\%$&nbsp;thành phân số tối giản trước khi cộng với&nbsp;$\\dfrac{2}{3}$.", solution: "<li><b>a) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Từ phương trình:</li><li class='ml-8'>$\\dfrac{x}{15} = \\dfrac{-6}{5}$</li><li class='ml-4'>Nhân cả hai vế với 15 (hoặc áp dụng quy tắc nhân chéo):</li><li class='ml-8'>$x = \\dfrac{-6}{5} \\cdot 15$</li><li class='ml-4'>Rút gọn $15$ cho $5$ ta được $3$:</li><li class='ml-8'>$x = -6 \\cdot 3$</li><li class='ml-8'>$x = -18$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = -18$.</li><li><b>b) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Đổi phần trăm ra phân số:&nbsp;$60\\% = \\dfrac{60}{100} = \\dfrac{3}{5}$. Phương trình trở thành:</li><li class='ml-8'>$\\dfrac{3}{5} \\cdot x + \\dfrac{2}{3} \\cdot x = \\dfrac{38}{15}$</li><li class='ml-4'>Đặt&nbsp;$x$&nbsp;làm nhân tử chung:</li><li class='ml-8'>$x \\cdot \\left( \\dfrac{3}{5} + \\dfrac{2}{3} \\right) = \\dfrac{38}{15}$</li><li class='ml-4'>Quy đồng mẫu số chung là $15$ ở trong ngoặc:</li><li class='ml-8'>$x \\cdot \\left( \\dfrac{9}{15} + \\dfrac{10}{15} \\right) = \\dfrac{38}{15}$</li><li class='ml-8'>$x \\cdot \\dfrac{19}{15} = \\dfrac{38}{15}$</li><li class='ml-4'>Thực hiện phép chia để tìm $x$:</li><li class='ml-8'>$x = \\dfrac{38}{15} : \\dfrac{19}{15}$</li><li class='ml-8'>$x = \\dfrac{38}{15} \\cdot \\dfrac{15}{19} = 2$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $x = 2$.</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Một đàn chim đậu trên một cái cây. Lúc đầu có&nbsp;$\\dfrac{1}{3}$&nbsp;số chim đậu ở cành dưới, còn lại đậu ở cành trên. Lát sau có 4 con chim từ cành dưới bay lên cành trên nên số chim ở cành dưới lúc này chỉ bằng&nbsp;$\\dfrac{1}{4}$&nbsp;tổng số chim. Hỏi đàn chim có tất cả bao nhiêu con?", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Số chim ở cành trên và cành dưới thay đổi liên tục, nhưng đại lượng nào tuyệt đối không thay đổi? (Đó là <b>Tổng số chim</b> trên cả cây).<br>- <b>Why:</b> Việc bám vào đại lượng không đổi sẽ giúp ta lấy nó làm mốc (chuẩn 1 đơn vị) để so sánh các phân số.<br>- <b>How:</b> Lúc đầu cành dưới chiếm&nbsp;$\\dfrac{1}{3}$&nbsp;tổng số chim. Lúc sau cành dưới chỉ còn&nbsp;$\\dfrac{1}{4}$&nbsp;tổng số chim. Sự hao hụt này do đâu mà ra? (Chính là do 4 con chim đã bay đi).<br>- <b>Where:</b> Lập phép tính gì để tìm phân số tương ứng với 4 con chim? (Phép trừ hai phân số). Có phân số rồi, việc tìm tổng số chim là bài toán ngược rất cơ bản.", solution: "<li>Trong suốt quá trình chim bay từ cành dưới lên cành trên, <b>tổng số chim trên cây là không thay đổi</b>. Ta lấy tổng số chim làm đơn vị quy chuẩn ($1$ đơn vị).</li><li>Lúc đầu, số chim đậu ở cành dưới chiếm:</li><li class='ml-4'>$\\dfrac{1}{3}$&nbsp;(Tổng số chim)</li><li>Sau khi có 4 con chim bay đi, số chim ở cành dưới lúc này chiếm:</li><li class='ml-4'>$\\dfrac{1}{4}$&nbsp;(Tổng số chim)</li><li>Sự chênh lệch phân số này chính là phần tương ứng với 4 con chim đã bay đi. Phân số chỉ 4 con chim đó là:</li><li class='ml-4'>$\\dfrac{1}{3} - \\dfrac{1}{4} = \\dfrac{4}{12} - \\dfrac{3}{12} = \\dfrac{1}{12}$&nbsp;(Tổng số chim)</li><li>Vì&nbsp;$\\dfrac{1}{12}$&nbsp;tổng số chim tương ứng với 4 con chim, nên tổng số chim của cả đàn là:</li><li class='ml-4'>$4 : \\dfrac{1}{12} = 4 \\cdot 12 = 48$&nbsp;(con)</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Đàn chim có tất cả 48 con.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Trên đường thẳng&nbsp;$xx'$&nbsp;lấy điểm&nbsp;$O$. Trên tia&nbsp;$Ox$&nbsp;lấy điểm&nbsp;$A$&nbsp;sao cho&nbsp;$OA = 3\\text{ cm}$. Trên tia&nbsp;$Ox'$&nbsp;lấy điểm&nbsp;$B, C$&nbsp;sao cho&nbsp;$OB = 3\\text{ cm}, OC = 7\\text{ cm}$.<div class='mt-6'>a) Chứng tỏ&nbsp;$O$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$.</div><div class='mt-6'>b) Tính độ dài đoạn thẳng&nbsp;$BC$.</div><div class='mt-6'>c) Điểm&nbsp;$B$&nbsp;có là trung điểm của&nbsp;$AC$&nbsp;không? Vì sao?</div><div class='flex justify-center my-8'><svg width='320' height='70' viewBox='0 0 320 70'><line x1='10' y1='40' x2='310' y2='40' stroke='black' stroke-width='1.5'/><circle cx='100' cy='40' r='3' fill='black'/><text x='95' y='60' font-size='14'>A</text><circle cx='150' cy='40' r='3' fill='black'/><text x='145' y='60' font-size='14'>O</text><circle cx='200' cy='40' r='3' fill='red'/><text x='195' y='60' font-size='14' fill='red'>B</text><circle cx='270' cy='40' r='3' fill='black'/><text x='265' y='60' font-size='14'>C</text><text x='10' y='30' font-size='14' font-style='italic'>x</text><text x='305' y='30' font-size='14' font-style='italic'>x'</text><path d='M 100 25 L 100 15 L 150 15 L 150 25' fill='none' stroke='blue' stroke-width='0.5'/><text x='115' y='10' font-size='11' fill='blue'>3cm</text><path d='M 150 25 L 150 15 L 200 15 L 200 25' fill='none' stroke='green' stroke-width='0.5'/><text x='165' y='10' font-size='11' fill='green'>3cm</text></svg></div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đường thẳng&nbsp;$xx'$&nbsp;đi qua&nbsp;$O$&nbsp;sẽ tạo ra hai tia gì? (Hai tia đối nhau&nbsp;$Ox$&nbsp;và&nbsp;$Ox'$).<br>- <b>How:</b> Nếu&nbsp;$A$&nbsp;nằm trên tia này,&nbsp;$B$&nbsp;nằm trên tia đối của nó thì gốc&nbsp;$O$&nbsp;sẽ nằm ở đâu so với hai điểm đó? (Nằm giữa).<br>- <b>Why:</b> Để khẳng định&nbsp;$O$&nbsp;là trung điểm, ta cần đủ 2 yếu tố: Nằm giữa và cách đều ($OA = OB$).<br><b>Ý b:</b><br>- <b>Where:</b> Cả&nbsp;$B$&nbsp;và&nbsp;$C$&nbsp;đều nằm trên cùng một tia&nbsp;$Ox'$.<br>- <b>How:</b> So sánh khoảng cách từ gốc&nbsp;$O$&nbsp;đến&nbsp;$B$&nbsp;và&nbsp;$C$. Ai gần hơn thì nằm giữa. Từ đó lập hệ thức cộng để tìm đoạn thẳng còn lại.<br><b>Ý c:</b><br>- <b>What:</b> Để&nbsp;$B$&nbsp;là trung điểm của&nbsp;$AC$, ta cần tính được độ dài toàn bộ đoạn&nbsp;$AC$&nbsp;và kiểm tra xem&nbsp;$B$&nbsp;có nằm giữa&nbsp;$A, C$&nbsp;cùng với điều kiện&nbsp;$BA = BC$&nbsp;hay không.", solution: "<li><b>a) Chứng tỏ&nbsp;$O$&nbsp;là trung điểm của&nbsp;$AB$:</b></li><li class='ml-4'>Vì $O$ nằm trên đường thẳng $xx'$ nên $O$ chia đường thẳng thành hai tia đối nhau là tia $Ox$ và tia $Ox'$.</li><li class='ml-4'>Điểm $A$ thuộc tia $Ox$, điểm $B$ thuộc tia $Ox'$, do đó <b>điểm&nbsp;$O$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$</b> (1).</li><li class='ml-4'>Theo giả thiết, ta có: $OA = 3\\text{ cm}$ và $OB = 3\\text{ cm}$.</li><li class='ml-4'>Suy ra $\\mathbf{OA = OB}$ (2).</li><li class='ml-4'>Từ (1) và (2), ta kết luận: Điểm $O$ là trung điểm của đoạn thẳng $AB$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Kết luận a: Đã chứng minh.</li><li><b>b) Tính độ dài đoạn thẳng&nbsp;$BC$:</b></li><li class='ml-4'>Trên cùng một tia $Ox'$, ta có khoảng cách từ gốc $O$ là: $OB = 3\\text{ cm}$ và $OC = 7\\text{ cm}$.</li><li class='ml-4'>Vì $OB < OC$ ($3 < 7$) nên <b>điểm&nbsp;$B$&nbsp;nằm giữa hai điểm&nbsp;$O$&nbsp;và&nbsp;$C$</b>.</li><li class='ml-4'>Khi đó, ta có công thức cộng đoạn thẳng:</li><li class='ml-8'>$OB + BC = OC$</li><li class='ml-8'>$3 + BC = 7$</li><li class='ml-8'>$BC = 7 - 3 = 4\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $BC = 4\\text{ cm}$.</li><li><b>c) Điểm&nbsp;$B$&nbsp;có là trung điểm của&nbsp;$AC$&nbsp;không?</b></li><li class='ml-4'>Vì $O$ nằm giữa $A$ và $B$ (chứng minh câu a), nên tia $BO$ và tia $BA$ trùng nhau.</li><li class='ml-4'>Vì $B$ nằm giữa $O$ và $C$ (chứng minh câu b), nên tia $BO$ và tia $BC$ đối nhau.</li><li class='ml-4'>Do đó, tia $BA$ và tia $BC$ là hai tia đối nhau. Suy ra, <b>điểm&nbsp;$B$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$C$</b>.</li><li class='ml-4'>Ta có độ dài đoạn thẳng $AB = OA + OB = 3 + 3 = 6\\text{ cm}$.</li><li class='ml-4'>Độ dài đoạn thẳng $BC = 4\\text{ cm}$ (đã tính ở câu b).</li><li class='ml-4'>So sánh độ dài: $AB \\neq BC$ ($6 \\neq 4$).</li><li class='ml-4'>Vì khoảng cách từ $B$ đến hai đầu mút không bằng nhau, nên điểm $B$ <b>không phải</b> là trung điểm của đoạn thẳng $AC$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận c: Điểm B không phải là trung điểm của AC.</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "Chứng minh rằng tổng sau nhỏ hơn $1$:<br>$S = \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dfrac{1}{4^2} + \\dots + \\dfrac{1}{2024^2}$", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh một chuỗi tổng các phân số có dạng&nbsp;$\\dfrac{1}{n^2}$&nbsp;nhỏ hơn một hằng số (ở đây là $1$).<br>- <b>Why:</b> Vì mẫu số là bình phương, ta không thể tìm ra một quy luật cộng trừ triệt tiêu trực tiếp được.<br>- <b>How:</b> Ta phải dùng phương pháp \"làm trội\" (làm cho mỗi phân số lớn lên một chút). Ta biết rằng:&nbsp;$n^2 = n \\cdot n > (n-1) \\cdot n$. Khi mẫu số nhỏ đi, phân số sẽ lớn lên:&nbsp;$\\dfrac{1}{n^2} < \\dfrac{1}{(n-1)n}$. Điều tuyệt diệu là phân số bên phải có thể tách thành chuỗi sai phân:&nbsp;$\\dfrac{1}{n-1} - \\dfrac{1}{n}$.", solution: "<li>Xét từng số hạng của biểu thức $S$, ta áp dụng bất đẳng thức làm trội $\\dfrac{1}{n^2} < \\dfrac{1}{(n-1)n}$:</li><li class='ml-4'>$\\dfrac{1}{2^2} = \\dfrac{1}{2 \\cdot 2} < \\dfrac{1}{1 \\cdot 2} = \\dfrac{1}{1} - \\dfrac{1}{2}$</li><li class='ml-4'>$\\dfrac{1}{3^2} = \\dfrac{1}{3 \\cdot 3} < \\dfrac{1}{2 \\cdot 3} = \\dfrac{1}{2} - \\dfrac{1}{3}$</li><li class='ml-4'>$\\dfrac{1}{4^2} = \\dfrac{1}{4 \\cdot 4} < \\dfrac{1}{3 \\cdot 4} = \\dfrac{1}{3} - \\dfrac{1}{4}$</li><li class='ml-4'>...</li><li class='ml-4'>$\\dfrac{1}{2024^2} = \\dfrac{1}{2024 \\cdot 2024} < \\dfrac{1}{2023 \\cdot 2024} = \\dfrac{1}{2023} - \\dfrac{1}{2024}$</li><li>Cộng vế theo vế tất cả các bất đẳng thức trên, ta thu được một tổng mới chắc chắn lớn hơn $S$:</li><li class='ml-4'>$S < \\left( \\dfrac{1}{1} - \\dfrac{1}{2} \\right) + \\left( \\dfrac{1}{2} - \\dfrac{1}{3} \\right) + \\left( \\dfrac{1}{3} - \\dfrac{1}{4} \\right) + \\dots + \\left( \\dfrac{1}{2023} - \\dfrac{1}{2024} \\right)$</li><li>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở phần giữa:</li><li class='ml-4'>$S < 1 - \\dfrac{1}{2024}$</li><li>Thực hiện phép trừ:</li><li class='ml-4'>$S < \\dfrac{2023}{2024}$</li><li>Vì $\\dfrac{2023}{2024}$ là một phân số có tử nhỏ hơn mẫu nên nó nhỏ hơn $1$. Theo tính chất bắc cầu, ta có:</li><li class='ml-4'>$S < 1$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Bất đẳng thức đã được chứng minh.</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Biết&nbsp;$\\dfrac{a}{b} = \\dfrac{3}{4}$&nbsp;và&nbsp;$\\dfrac{b}{c} = \\dfrac{4}{7}$. Tỉ số của&nbsp;$a$&nbsp;và&nbsp;$c$&nbsp;là:", options: ["A. $\\dfrac{3}{7}$", "B. $\\dfrac{7}{3}$", "C. $\\dfrac{12}{28}$", "D. Cả A và C đều đúng"], correct_idx: 3, explain: "Ta có:&nbsp;$\\dfrac{a}{c} = \\dfrac{a}{b} \\cdot \\dfrac{b}{c} = \\dfrac{3}{4} \\cdot \\dfrac{4}{7} = \\dfrac{3}{7}$. Mặt khác&nbsp;$\\dfrac{12}{28} = \\dfrac{3}{7}$. Do đó cả A và C đều đúng. Chọn D." },
{ q_title: "Câu 2", q_content: "Biểu thức&nbsp;$(-2)^3 \\cdot \\dfrac{-1}{24}$&nbsp;có giá trị là:", options: ["A. $\\dfrac{-1}{3}$", "B. $\\dfrac{1}{3}$", "C. $3$", "D. $-3$"], correct_idx: 1, explain: "Ta có:&nbsp;$(-2)^3 = -8$. Thay vào biểu thức:&nbsp;$-8 \\cdot \\dfrac{-1}{24} = \\dfrac{8}{24} = \\dfrac{1}{3}$. Chọn B." },
{ q_title: "Câu 3", q_content: "Tìm&nbsp;$x$&nbsp;thỏa mãn&nbsp;$x - \\left(\\dfrac{-1}{5}\\right) = \\dfrac{-4}{5}$:", options: ["A. $-1$", "B. $\\dfrac{-3}{5}$", "C. $1$", "D. $\\dfrac{3}{5}$"], correct_idx: 0, explain: "Biến đổi phương trình:&nbsp;$x + \\dfrac{1}{5} = \\dfrac{-4}{5} \\Rightarrow x = \\dfrac{-4}{5} - \\dfrac{1}{5} = \\dfrac{-5}{5} = -1$. Chọn A." },
{ q_title: "Câu 4", q_content: "Giá trị của biểu thức&nbsp;$\\dfrac{2,5 - 0,5}{0,2}$&nbsp;là:", options: ["A. $1$", "B. $10$", "C. $0,1$", "D. $2$"], correct_idx: 1, explain: "Tính trên tử số:&nbsp;$2,5 - 0,5 = 2$. Biểu thức trở thành&nbsp;$\\dfrac{2}{0,2} = 20 : 2 = 10$. Chọn B." },
{ q_title: "Câu 5", q_content: "Hai số nghịch đảo của nhau có tích bằng:", options: ["A. $0$", "B. $1$", "C. $-1$", "D. Không xác định"], correct_idx: 1, explain: "Theo định nghĩa, hai số được gọi là nghịch đảo của nhau nếu tích của chúng bằng&nbsp;$1$. Chọn B." },
{ q_title: "Câu 6", q_content: "Một trường có&nbsp;$1200$&nbsp;học sinh. Số học sinh khối 6 chiếm&nbsp;$25\\%$. Vậy khối 6 có:", options: ["A. $300$&nbsp;em", "B. $400$&nbsp;em", "C. $250$&nbsp;em", "D. $120$&nbsp;em"], correct_idx: 0, explain: "Số học sinh khối 6 là:&nbsp;$1200 \\cdot 25\\% = 1200 \\cdot \\dfrac{1}{4} = 300$&nbsp;(em). Chọn A." },
{ q_title: "Câu 7", q_content: "Một góc có số đo là&nbsp;$75^{\\circ}$. Đây là góc:", options: ["A. Vuông", "B. Tù", "C. Bẹt", "D. Nhọn"], correct_idx: 3, explain: "Góc có số đo lớn hơn&nbsp;$0^{\\circ}$&nbsp;và nhỏ hơn&nbsp;$90^{\\circ}$&nbsp;được gọi là góc nhọn. Chọn D." },
{ q_title: "Câu 8", q_content: "Điểm&nbsp;$I$&nbsp;là trung điểm của đoạn thẳng&nbsp;$MN$&nbsp;thì tỉ số&nbsp;$\\dfrac{IM}{MN}$&nbsp;bằng:", options: ["A. $2$", "B. $\\dfrac{1}{2}$", "C. $1$", "D. Không xác định"], correct_idx: 1, explain: "Vì&nbsp;$I$&nbsp;là trung điểm của&nbsp;$MN$&nbsp;nên&nbsp;$IM = \\dfrac{MN}{2}$. Do đó tỉ số&nbsp;$\\dfrac{IM}{MN} = \\dfrac{1}{2}$. Chọn B." },
{ q_title: "Câu 9", q_content: "Để vẽ 1 tam giác, ta cần xác định tối thiểu bao nhiêu điểm không thẳng hàng?", options: ["A. 2", "B. 3", "C. 4", "D. Vô số"], correct_idx: 1, explain: "Một tam giác được tạo thành từ 3 đoạn thẳng nối 3 điểm không thẳng hàng. Do đó cần tối thiểu 3 điểm. Chọn B." },
{ q_title: "Câu 10", q_content: "Hai góc phụ nhau là hai góc:", options: ["A. Có tổng số đo bằng $180^{\\circ}$", "B. Bằng nhau", "C. Có tổng số đo bằng $90^{\\circ}$", "D. Cùng phụ với góc thứ ba"], correct_idx: 2, explain: "Theo định nghĩa, hai góc phụ nhau là hai góc có tổng số đo bằng&nbsp;$90^{\\circ}$. Chọn C." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau đây:<br>(I) Tổng của hai phân số âm luôn là một số dương.<br>(II) Lũy thừa&nbsp;$(-1)^{2024}$&nbsp;có giá trị bằng&nbsp;$1$.<br>(III) Biểu thức&nbsp;$\\dfrac{0}{-5}$&nbsp;không được gọi là một phân số.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 1, explain: "(I) Sai, tổng của hai số âm luôn là số âm. (II) Đúng, lũy thừa bậc chẵn của một số âm cho kết quả dương. (III) Sai, phân số có dạng a/b với a,b là số nguyên và b khác 0. 0 và -5 đều là số nguyên, -5 khác 0 nên nó là phân số hợp lệ (có giá trị = 0). Chỉ có 1 mệnh đề đúng. Chọn B." },
{ q_title: "Câu 12", q_content: "Cho đường thẳng&nbsp;$d$&nbsp;và đoạn thẳng&nbsp;$AB$&nbsp;cắt đường thẳng&nbsp;$d$&nbsp;tại điểm&nbsp;$I$&nbsp;sao cho&nbsp;$I$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$. Xét 3 mệnh đề sau:<br>(I) Hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;nằm cùng phía so với đường thẳng&nbsp;$d$.<br>(II) Hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;nằm ở hai nửa mặt phẳng đối nhau bờ là đường thẳng&nbsp;$d$.<br>(III) Đường thẳng&nbsp;$d$&nbsp;luôn vuông góc với đoạn thẳng&nbsp;$AB$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 1, explain: "Vì đoạn AB cắt d tại I nằm giữa A và B, nên d chia mặt phẳng làm hai nửa và A, B nằm ở hai nửa mặt phẳng đối nhau bờ d. Mệnh đề (I) sai. Mệnh đề (II) đúng. Mệnh đề (III) sai vì sự cắt nhau không có nghĩa là bắt buộc phải vuông góc. Có 1 mệnh đề đúng. Chọn B." }

tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Thực hiện phép tính hợp lý:&nbsp;$M = \\dfrac{4}{9} : \\left( \\dfrac{1}{15} - \\dfrac{2}{3} \right) + 1\\dfrac{2}{9}$<div class='mt-6'>b) Tính nhanh giá trị của biểu thức phân số nhiều tầng:&nbsp;$N = \\dfrac{0,4 - \\dfrac{2}{9} + \\dfrac{2}{11}}{1,4 - \\dfrac{7}{9} + \\dfrac{7}{11}}$</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Biểu thức bao gồm ngoặc, phép chia và phép cộng hỗn số.<br>- <b>How:</b> Tuân thủ quy tắc tính toán: Quy đồng và giải quyết gọn gàng biểu thức trong ngoặc trước. Sau đó mới thực hiện phép chia (bằng cách nhân nghịch đảo) và cộng với hỗn số.<br><b>Ý b:</b><br>- <b>What:</b> Đây là một \"Siêu phân số\" (phân số nhiều tầng). Nhìn bề ngoài có vẻ phức tạp nhưng thực chất lại ẩn chứa quy luật.<br>- <b>Where:</b> Hãy nhìn kỹ các tử số ở phần trên:&nbsp;$0,4$&nbsp;(đổi ra&nbsp;$\\dfrac{2}{5}$),&nbsp;$\\dfrac{2}{9}$,&nbsp;$\\dfrac{2}{11}$. Chúng đều có chung số mấy ở tử? (Số 2).<br>- Tương tự, ở phần dưới:&nbsp;$1,4$&nbsp;(đổi ra&nbsp;$\\dfrac{7}{5}$),&nbsp;$\\dfrac{7}{9}$,&nbsp;$\\dfrac{7}{11}$. Chúng đều có chung số mấy ở tử? (Số 7).<br>- <b>How:</b> Đặt số 2 làm nhân tử chung ở trên, số 7 làm nhân tử chung ở dưới. Cụm ngoặc khổng lồ sinh ra sẽ giống hệt nhau và bị triệt tiêu ngay lập tức!", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$M$:</b></li><li class='ml-4'>Quy đồng các phân số trong ngoặc (mẫu chung là $15$), đồng thời đổi hỗn số ra phân số:</li><li class='ml-8'>$M = \\dfrac{4}{9} : \\left( \\dfrac{1}{15} - \\dfrac{10}{15} \right) + \\dfrac{11}{9}$</li><li class='ml-4'>Thực hiện phép trừ trong ngoặc:</li><li class='ml-8'>$M = \\dfrac{4}{9} : \\left( \\dfrac{-9}{15} \right) + \\dfrac{11}{9}$</li><li class='ml-4'>Chuyển phép chia thành phép nhân với phân số nghịch đảo:</li><li class='ml-8'>$M = \\dfrac{4}{9} \\cdot \\dfrac{15}{-9} + \\dfrac{11}{9}$</li><li class='ml-8'>$M = \\dfrac{4 \\cdot 15}{9 \\cdot (-9)} + \\dfrac{11}{9}$</li><li class='ml-8'>$M = \\dfrac{60}{-81} + \\dfrac{11}{9}$</li><li class='ml-4'>Rút gọn phân số thứ nhất (chia cho 3) và đưa dấu trừ lên tử:</li><li class='ml-8'>$M = \\dfrac{-20}{27} + \\dfrac{11}{9}$</li><li class='ml-4'>Quy đồng phân số thứ hai (mẫu chung 27):</li><li class='ml-8'>$M = \\dfrac{-20}{27} + \\dfrac{33}{27} = \\dfrac{13}{27}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $M = \\dfrac{13}{27}$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$N$:</b></li><li class='ml-4'>Đổi các số thập phân ra phân số tối giản:</li><li class='ml-8'>$0,4 = \\dfrac{4}{10} = \\dfrac{2}{5}$</li><li class='ml-8'>$1,4 = \\dfrac{14}{10} = \\dfrac{7}{5}$</li><li class='ml-4'>Viết lại biểu thức $N$:</li><li class='ml-8'>$N = \\dfrac{\\dfrac{2}{5} - \\dfrac{2}{9} + \\dfrac{2}{11}}{\\dfrac{7}{5} - \\dfrac{7}{9} + \\dfrac{7}{11}}$</li><li class='ml-4'>Rút nhân tử chung ở tử số (rút số $2$) và mẫu số (rút số $7$):</li><li class='ml-8'>$N = \\dfrac{2 \\cdot \\left( \\dfrac{1}{5} - \\dfrac{1}{9} + \\dfrac{1}{11} \\right)}{7 \\cdot \\left( \\dfrac{1}{5} - \\dfrac{1}{9} + \\dfrac{1}{11} \\right)}$</li><li class='ml-4'>Triệt tiêu toàn bộ cụm biểu thức giống nhau nằm trong dấu ngoặc ở cả tử và mẫu:</li><li class='ml-8'>$N = \\dfrac{2}{7}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $N = \\dfrac{2}{7}$.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Tìm số nguyên&nbsp;$x$, biết:&nbsp;$\\dfrac{x-1}{4} = \\dfrac{-9}{1-x}$<div class='mt-6'>b) Tìm&nbsp;$x$, biết:&nbsp;$|3x - 1| - \\dfrac{1}{2} = 2$</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Tỉ lệ thức với ẩn $x$ nằm ở cả hai mẫu/tử.<br>- <b>Why:</b> Tại sao không nhân chéo ngay? Hãy nhìn mẫu số vế phải:&nbsp;$(1-x)$. Nó có quan hệ gì với tử số vế trái&nbsp;$(x-1)$? (Chúng là hai số đối nhau).<br>- <b>How:</b> Để làm cho bài toán đẹp hơn, ta đổi dấu cả tử và mẫu của phân số vế phải.&nbsp;$\\dfrac{-9}{1-x}$&nbsp;sẽ biến thành&nbsp;$\\dfrac{9}{x-1}$. Sau đó nhân chéo sẽ ra bình phương rất gọn.<br><b>Ý b:</b><br>- <b>What:</b> Phương trình chứa dấu giá trị tuyệt đối cơ bản.<br>- <b>How:</b> Chuyển vế $-\\dfrac{1}{2}$ để cô lập phần trị tuyệt đối. Sau khi rút gọn, trị tuyệt đối bằng một số dương thì chia 2 trường hợp.", solution: "<li><b>a) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Từ phương trình ban đầu:</li><li class='ml-8'>$\\dfrac{x-1}{4} = \\dfrac{-9}{1-x}$</li><li class='ml-4'>Đổi dấu cả tử và mẫu của phân số ở vế phải, ta được:</li><li class='ml-8'>$\\dfrac{x-1}{4} = \\dfrac{9}{x-1}$</li><li class='ml-4'>Áp dụng quy tắc nhân chéo của tỉ lệ thức:</li><li class='ml-8'>$(x-1) \\cdot (x-1) = 4 \\cdot 9$</li><li class='ml-8'>$(x-1)^2 = 36$</li><li class='ml-4'>Đưa $36$ về dạng bình phương:</li><li class='ml-8'>$(x-1)^2 = 6^2 = (-6)^2$</li><li class='ml-4'>Ta chia làm 2 trường hợp:</li><li class='ml-8'><b>Trường hợp 1:</b> $x - 1 = 6 \\Rightarrow x = 6 + 1 = 7$</li><li class='ml-8'><b>Trường hợp 2:</b> $x - 1 = -6 \\Rightarrow x = -6 + 1 = -5$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x \\in \\{7; -5\\}$.</li><li><b>b) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Chuyển vế để cô lập trị tuyệt đối:</li><li class='ml-8'>$|3x - 1| = 2 + \\dfrac{1}{2}$</li><li class='ml-4'>Quy đồng và cộng:</li><li class='ml-8'>$|3x - 1| = \\dfrac{4}{2} + \\dfrac{1}{2} = \\dfrac{5}{2}$</li><li class='ml-4'>Chia làm 2 trường hợp để phá dấu trị tuyệt đối:</li><li class='ml-8'><b>Trường hợp 1:</b> $3x - 1 = \\dfrac{5}{2} \\Rightarrow 3x = \\dfrac{5}{2} + 1 = \\dfrac{7}{2} \\Rightarrow x = \\dfrac{7}{2} : 3 = \\dfrac{7}{6}$</li><li class='ml-8'><b>Trường hợp 2:</b> $3x - 1 = \\dfrac{-5}{2} \\Rightarrow 3x = \\dfrac{-5}{2} + 1 = \\dfrac{-3}{2} \\Rightarrow x = \\dfrac{-3}{2} : 3 = \\dfrac{-1}{2}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $x \\in \\left\\{\\dfrac{7}{6}; \\dfrac{-1}{2}\\right\\}$.</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Người ta thống kê được lượng nước chứa trong nấm tươi là&nbsp;$90\\%$, còn lượng nước chứa trong nấm phơi khô là&nbsp;$20\\%$. Hỏi nếu một người nông dân muốn thu được&nbsp;$10\\text{ kg}$&nbsp;nấm khô thành phẩm thì cần phải mang đi phơi bao nhiêu kilôgam nấm tươi?", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán hao hụt do sấy khô / phơi nắng. Đây là dạng toán tư duy kinh điển thường gặp trong các đề thi HSG.<br>- <b>Why:</b> Khi phơi nấm, thành phần nào bị bốc hơi và thành phần nào được giữ nguyên? (Chỉ có nước bốc hơi, phần nấm nguyên chất hay \"chất rắn\" là không đổi).<br>- <b>How:</b> Đại lượng không đổi chính là chìa khóa giải bài toán.<br>&nbsp; + Tính xem $10\\text{ kg}$ nấm khô có chứa bao nhiêu kg chất rắn.<br>&nbsp; + Dùng lượng chất rắn vừa tính được để suy ngược ra lượng nấm tươi cần thiết (vì tỉ lệ chất rắn trong nấm tươi là cố định).", solution: "<li><b>Bước 1: Tính khối lượng chất rắn cần có:</b></li><li class='ml-4'>Trong nấm phơi khô, lượng nước chiếm $20\\%$. Suy ra, tỉ lệ khối lượng chất rắn (nấm nguyên chất) trong nấm phơi khô là:</li><li class='ml-8'>$100\\% - 20\\% = 80\\%$</li><li class='ml-4'>Để thu được $10\\text{ kg}$ nấm khô thành phẩm, khối lượng chất rắn nguyên chất cần phải có là:</li><li class='ml-8'>$10 \\cdot 80\\% = 10 \\cdot \\dfrac{80}{100} = 8\\text{ (kg)}$</li><li><b>Bước 2: Tính khối lượng nấm tươi:</b></li><li class='ml-4'>Trong nấm tươi, lượng nước chiếm $90\\%$. Suy ra, tỉ lệ khối lượng chất rắn trong nấm tươi chỉ chiếm:</li><li class='ml-8'>$100\\% - 90\\% = 10\\%$</li><li class='ml-4'>Vì khối lượng chất rắn không bị mất đi trong quá trình phơi, nên ta cần lượng nấm tươi sao cho phần chất rắn của nó đúng bằng $8\\text{ kg}$. Khối lượng nấm tươi cần mang đi phơi là:</li><li class='ml-8'>$8 : 10\\% = 8 : \\dfrac{10}{100} = 8 \\cdot 10 = 80\\text{ (kg)}$</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Người nông dân cần phải phơi $80\\text{ kg}$ nấm tươi.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Trên đường thẳng&nbsp;$a$, lấy 3 điểm&nbsp;$A, B, C$&nbsp;theo thứ tự đó sao cho&nbsp;$AB = 4\\text{ cm}, BC = 6\\text{ cm}$. Gọi&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$, $N$&nbsp;là trung điểm của đoạn thẳng&nbsp;$BC$.<div class='mt-6'>a) Tính độ dài đoạn thẳng&nbsp;$AC$.</div><div class='mt-6'>b) Điểm&nbsp;$B$&nbsp;có nằm giữa hai điểm&nbsp;$M$&nbsp;và&nbsp;$N$&nbsp;không? Vì sao?</div><div class='mt-6'>c) Tính độ dài đoạn thẳng&nbsp;$MN$.</div><div class='flex justify-center my-8'><svg width='350' height='70' viewBox='0 0 350 70'><line x1='10' y1='40' x2='340' y2='40' stroke='black' stroke-width='1.5'/><text x='345' y='45' font-size='14' font-style='italic'>a</text><circle cx='40' cy='40' r='3' fill='black'/><text x='35' y='60' font-size='14'>A</text><circle cx='90' cy='40' r='3' fill='red'/><text x='85' y='60' font-size='14' fill='red'>M</text><circle cx='140' cy='40' r='3' fill='black'/><text x='135' y='60' font-size='14'>B</text><circle cx='215' cy='40' r='3' fill='red'/><text x='210' y='60' font-size='14' fill='red'>N</text><circle cx='290' cy='40' r='3' fill='black'/><text x='285' y='60' font-size='14'>C</text><path d='M 40 25 L 40 15 L 140 15 L 140 25' fill='none' stroke='blue' stroke-width='0.5'/><text x='80' y='10' font-size='11' fill='blue'>4cm</text><path d='M 140 25 L 140 15 L 290 15 L 290 25' fill='none' stroke='green' stroke-width='0.5'/><text x='205' y='10' font-size='11' fill='green'>6cm</text></svg></div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> 3 điểm nằm \"theo thứ tự\" $A, B, C$ nghĩa là điểm nào nằm giữa? (Điểm $B$ nằm giữa $A$ và $C$).<br>- <b>How:</b> Dùng hệ thức cộng đoạn thẳng cơ bản.<br><b>Ý b & c:</b><br>- <b>Where:</b> $M$ là trung điểm $AB$ nên $M$ bị kẹp giữa $A, B$. $N$ là trung điểm $BC$ nên $N$ bị kẹp giữa $B, C$.<br>- <b>Why:</b> Vì $B$ nằm giữa $A, C$ nên tia $BA$ và tia $BC$ là hai tia hướng ngược nhau (tia đối).<br>- <b>How:</b> $M$ nằm trên tia $BA$, $N$ nằm trên tia $BC$. Một điểm nằm trên tia này, một điểm nằm trên tia đối của nó thì gốc chung ($B$) bắt buộc phải nằm giữa hai điểm đó. Có điểm nằm giữa rồi thì cộng độ dài 2 đoạn nhỏ lại sẽ ra độ dài $MN$.", solution: "<li><b>a) Tính độ dài đoạn thẳng&nbsp;$AC$:</b></li><li class='ml-4'>Vì $3$ điểm $A, B, C$ nằm theo thứ tự đó trên đường thẳng $a$, nên <b>điểm&nbsp;$B$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$C$</b>.</li><li class='ml-4'>Áp dụng công thức cộng đoạn thẳng, ta có:</li><li class='ml-8'>$AC = AB + BC$</li><li class='ml-4'>Thay số đo vào:</li><li class='ml-8'>$AC = 4 + 6 = 10\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $AC = 10\\text{ cm}$.</li><li><b>b) Điểm&nbsp;$B$&nbsp;có nằm giữa&nbsp;$M$&nbsp;và&nbsp;$N$&nbsp;không?</b></li><li class='ml-4'>Vì $M$ là trung điểm của đoạn thẳng $AB$ nên điểm $M$ thuộc đoạn thẳng $AB$. Do đó, điểm $M$ nằm trên tia $BA$.</li><li class='ml-4'>Vì $N$ là trung điểm của đoạn thẳng $BC$ nên điểm $N$ thuộc đoạn thẳng $BC$. Do đó, điểm $N$ nằm trên tia $BC$.</li><li class='ml-4'>Mặt khác, vì điểm $B$ nằm giữa hai điểm $A$ và $C$ (như đã lập luận ở câu a) nên tia $BA$ và tia $BC$ là hai tia đối nhau.</li><li class='ml-4'>Do điểm $M$ thuộc tia $BA$, điểm $N$ thuộc tia $BC$, và hai tia này đối nhau (có chung gốc $B$), nên <b>gốc&nbsp;$B$&nbsp;chắc chắn nằm giữa hai điểm&nbsp;$M$&nbsp;và&nbsp;$N$</b>.</li><li><b>c) Tính độ dài đoạn thẳng&nbsp;$MN$:</b></li><li class='ml-4'>Vì $M$ là trung điểm của đoạn thẳng $AB$ nên:</li><li class='ml-8'>$MB = \\dfrac{AB}{2} = \\dfrac{4}{2} = 2\\text{ cm}$.</li><li class='ml-4'>Vì $N$ là trung điểm của đoạn thẳng $BC$ nên:</li><li class='ml-8'>$BN = \\dfrac{BC}{2} = \\dfrac{6}{2} = 3\\text{ cm}$.</li><li class='ml-4'>Dựa vào lập luận ở câu b, điểm $B$ nằm giữa hai điểm $M$ và $N$. Áp dụng hệ thức cộng đoạn thẳng:</li><li class='ml-8'>$MN = MB + BN$</li><li class='ml-8'>$MN = 2 + 3 = 5\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: $MN = 5\\text{ cm}$.</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "(Số học - Phương trình Diophante) Tìm tất cả các cặp số nguyên&nbsp;$x, y$&nbsp;thỏa mãn phương trình:&nbsp;$\\dfrac{x}{5} - \\dfrac{2}{y} = \\dfrac{2}{15}$.", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Phương trình hai ẩn $x, y$ nằm ở mẫu số và tử số. Ta không thể giải trực tiếp kiểu chuyển vế.<br>- <b>How:</b> Cách tốt nhất là \"san bằng\" mẫu số bằng cách quy đồng vế trái.&nbsp;$\\dfrac{x}{5} - \\dfrac{2}{y} = \\dfrac{xy - 10}{5y}$. Sau đó cho nó bằng vế phải&nbsp;$\\dfrac{2}{15}$&nbsp;và dùng quy tắc nhân chéo.<br>- <b>Where:</b> Khi nhân chéo xong, ta sẽ đưa phương trình về dạng $A \\cdot B = \\text{Hằng số}$. Từ đó lập bảng ước số để tìm các cặp nghiệm. Cần đặc biệt lưu ý hệ số của $x$ để đánh giá số dư, giúp loại bớt trường hợp tính toán.", solution: "<li>Từ phương trình ban đầu (Điều kiện: $y \\neq 0$):</li><li class='ml-4'>$\\dfrac{x}{5} - \\dfrac{2}{y} = \\dfrac{2}{15}$</li><li>Ta tiến hành quy đồng mẫu số ở vế trái:</li><li class='ml-4'>$\\dfrac{xy - 10}{5y} = \\dfrac{2}{15}$</li><li>Áp dụng quy tắc nhân chéo của tỉ lệ thức:</li><li class='ml-4'>$15 \\cdot (xy - 10) = 2 \\cdot 5y$</li><li class='ml-4'>$15(xy - 10) = 10y$</li><li>Chia cả hai vế cho $5$ để làm gọn phương trình:</li><li class='ml-4'>$3(xy - 10) = 2y$</li><li>Nhân phân phối để phá ngoặc:</li><li class='ml-4'>$3xy - 30 = 2y$</li><li>Chuyển các hạng tử chứa biến về cùng một vế:</li><li class='ml-4'>$3xy - 2y = 30$</li><li>Rút $y$ làm nhân tử chung:</li><li class='ml-4'>$y(3x - 2) = 30$</li><li>Vì $x, y$ là các số nguyên nên $y$ và $(3x - 2)$ phải là các số nguyên và là Ước của $30$. Đồng thời, xét biểu thức $(3x - 2)$, ta thấy khi chia nó cho $3$ sẽ dư $-2$ (tương đương với việc chia $3$ dư $1$). Các ước của $30$ là: $\\pm 1, \\pm 2, \\pm 3, \\pm 5, \\pm 6, \\pm 10, \\pm 15, \\pm 30$. Ta sẽ lọc ra các ước của $30$ mà khi chia cho $3$ dư $1$ (hoặc dư $-2$) để làm giá trị cho $(3x - 2)$. Ta lập bảng:</li><li class='ml-8'>+ <b>Trường hợp 1:</b> $3x - 2 = 1 \\Rightarrow 3x = 3 \\Rightarrow x = 1$. Khi đó: $y = 30 : 1 = 30$ (Thỏa mãn $y \\neq 0$).</li><li class='ml-8'>+ <b>Trường hợp 2:</b> $3x - 2 = -2 \\Rightarrow 3x = 0 \\Rightarrow x = 0$. Khi đó: $y = 30 : (-2) = -15$ (Thỏa mãn $y \\neq 0$).</li><li class='ml-8'>+ <b>Trường hợp 3:</b> $3x - 2 = -5 \\Rightarrow 3x = -3 \\Rightarrow x = -1$. Khi đó: $y = 30 : (-5) = -6$ (Thỏa mãn $y \\neq 0$).</li><li class='ml-8'>+ <b>Trường hợp 4:</b> $3x - 2 = 10 \\Rightarrow 3x = 12 \\Rightarrow x = 4$. Khi đó: $y = 30 : 10 = 3$ (Thỏa mãn $y \\neq 0$).</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Các cặp số nguyên $(x; y)$ thỏa mãn phương trình là: $(1; 30), (0; -15), (-1; -6), (4; 3)$.</li>" }
]
});

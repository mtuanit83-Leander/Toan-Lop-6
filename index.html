{ t_title: "Câu 1 (2,0 điểm)", t_content: "Tính hợp lý giá trị biểu thức:<br>$A = \\dfrac{6}{5 \\cdot 8} + \\dfrac{6}{8 \\cdot 11} + \\dfrac{6}{11 \\cdot 14} + \\dots + \\dfrac{6}{95 \\cdot 98}$", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Khoảng cách giữa các thừa số dưới mẫu là bao nhiêu? ($8-5=3$, $11-8=3$).<br>- <b>Why:</b> Tử số hiện tại đang là số $6$. Nó không khớp với khoảng cách $3$ ở mẫu số.<br>- <b>How:</b> Để ép tử số biến thành $3$, ta cần chia cả biểu thức cho $2$ (hoặc nhân với $\\dfrac{1}{2}$).<br>- Khi đó: $\\dfrac{1}{2} \\cdot A = \\dfrac{3}{5 \\cdot 8} + \\dfrac{3}{8 \\cdot 11} + \\dots$<br>- Áp dụng công thức sai phân bung chuỗi. Ở bước cuối, nhớ nhân ngược $2$ trở lại để tìm $A$.", solution: "<li>Ta nhân cả hai vế của biểu thức $A$ với $\\dfrac{1}{2}$ (tức là chia 2):</li><li class='ml-4'>$\\dfrac{1}{2} \\cdot A = \\dfrac{3}{5 \\cdot 8} + \\dfrac{3}{8 \\cdot 11} + \\dfrac{3}{11 \\cdot 14} + \\dots + \\dfrac{3}{95 \\cdot 98}$</li><li>Áp dụng công thức sai phân $\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$, ta tách được:</li><li class='ml-4'>$\\dfrac{1}{2} \\cdot A = \\left( \\dfrac{1}{5} - \\dfrac{1}{8} \\right) + \\left( \\dfrac{1}{8} - \\dfrac{1}{11} \\right) + \\dots + \\left( \\dfrac{1}{95} - \\dfrac{1}{98} \\right)$</li><li>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở giữa chuỗi:</li><li class='ml-4'>$\\dfrac{1}{2} \\cdot A = \\dfrac{1}{5} - \\dfrac{1}{98}$</li><li>Quy đồng và tính kết quả:</li><li class='ml-4'>$\\dfrac{1}{2} \\cdot A = \\dfrac{98}{490} - \\dfrac{5}{490} = \\dfrac{93}{490}$</li><li>Tìm $A$ bằng cách nhân chéo số $2$ sang vế phải:</li><li class='ml-4'>$A = \\dfrac{93}{490} \\cdot 2 = \\dfrac{93}{245}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $A = \\dfrac{93}{245}$.</li>" },
{ t_title: "Câu 2 (2,0 điểm)", t_content: "Giải các bài toán Đại số bản lề lớp 7:<div class='mt-6'>a) Tìm số nguyên&nbsp;$x$&nbsp;thỏa mãn:&nbsp;$(2x + 1)^3 = -343$.</div><div class='mt-6'>b) Tìm&nbsp;$x$&nbsp;bằng cách khai triển đa thức:&nbsp;$(x + 2)(x - 3) - x(x - 1) = 15$.</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>How:</b> Đưa số $-343$ về dạng lập phương của một số nguyên là $(-7)^3$. Vì mũ lẻ nên khi bỏ mũ chỉ có 1 trường hợp duy nhất.<br><b>Ý b:</b><br>- <b>Where:</b> Cạm bẫy cực lớn nằm ở dấu trừ trước cụm $x(x-1)$. Khi nhân vào phải lập tức đổi dấu thành $-x^2 + x$.<br>- <b>How:</b> Nhân phân phối 2 đa thức: $(x+2)(x-3) = x^2 - 3x + 2x - 6 = x^2 - x - 6$.<br>- Ghép các vế lại và triệt tiêu $x^2$. Nếu ra vô lý thì tự tin kết luận vô nghiệm.", solution: "<li><b>a) Tìm&nbsp;$x$&nbsp;trong phương trình lũy thừa:</b></li><li class='ml-4'>Ta có phương trình: $(2x + 1)^3 = -343$</li><li class='ml-4'>Đưa vế phải về dạng lũy thừa bậc $3$:</li><li class='ml-8'>$(2x + 1)^3 = (-7)^3$</li><li class='ml-4'>Vì số mũ là số lẻ nên ta bỏ mũ và giải phương trình bậc nhất:</li><li class='ml-8'>$2x + 1 = -7$</li><li class='ml-8'>$2x = -7 - 1 = -8$</li><li class='ml-8'>$x = -4$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = -4$.</li><li><b>b) Tìm&nbsp;$x$&nbsp;bằng khai triển đa thức:</b></li><li class='ml-4'>Ta tiến hành nhân phân phối (phá ngoặc) các biểu thức ở vế trái:</li><li class='ml-8'>$(x^2 - 3x + 2x - 6) - (x^2 - x) = 15$</li><li class='ml-4'>Bỏ dấu ngoặc (chú ý đổi dấu ở ngoặc thứ hai do có dấu trừ phía trước):</li><li class='ml-8'>$x^2 - x - 6 - x^2 + x = 15$</li><li class='ml-4'>Nhóm các hạng tử đồng dạng:</li><li class='ml-8'>$(x^2 - x^2) + (-x + x) - 6 = 15$</li><li class='ml-8'>$0 - 6 = 15$</li><li class='ml-8'>$-6 = 15$ (Điều này là Vô lý)</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Phương trình vô nghiệm ($x \\in \\emptyset$).</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "(Bài toán Kinh tế - Định giá & Chiết khấu) Một cửa hàng điện máy nhập về một chiếc Laptop với giá vốn là&nbsp;$15.000.000$&nbsp;đồng. Cửa hàng quyết định niêm yết mức giá sao cho nếu bán đúng giá niêm yết sẽ lãi&nbsp;$20\\%$&nbsp;so với giá vốn. Sau một tháng, để kích cầu, cửa hàng giảm giá&nbsp;$10\\%$&nbsp;tính trên giá đang niêm yết.<div class='mt-6'>a) Tính số tiền thực tế khách hàng phải trả để mua chiếc Laptop đó.</div><div class='mt-6'>b) Sau khi bán chiếc Laptop với mức giá đã giảm, cửa hàng thực tế lãi được bao nhiêu phần trăm so với giá vốn ban đầu?</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Bài toán thực tế gồm 2 bước tiến thẳng.<br>- <b>How:</b> <br>&nbsp; + Bước 1: Tính giá niêm yết. Muốn lãi $20\\%$ so với vốn thì Giá niêm yết = $120\\%$ Giá vốn.<br>&nbsp; + Bước 2: Tính giá bán thực tế. Giảm $10\\%$ so với giá niêm yết thì Giá bán = $90\\%$ Giá niêm yết.<br><b>Ý b:</b><br>- <b>How:</b> Lãi thực tế = Số tiền khách trả (Giá bán thực tế) - Giá vốn.<br>- Phần trăm lãi = Tiền Lãi / Giá vốn $\\times 100\\%$.", solution: "<li><b>a) Tính số tiền thực tế khách hàng phải trả:</b></li><li class='ml-4'>Cửa hàng định giá để lãi $20\\%$ so với giá vốn, nên Giá niêm yết bằng:</li><li class='ml-8'>$100\\% + 20\\% = 120\\%$ (Giá vốn).</li><li class='ml-4'>Mức giá niêm yết của chiếc Laptop là:</li><li class='ml-8'>$15.000.000 \\cdot 120\\% = 15.000.000 \\cdot 1,2 = 18.000.000$&nbsp;(đồng).</li><li class='ml-4'>Sau 1 tháng, cửa hàng giảm giá $10\\%$ trên giá niêm yết. Số tiền thực tế khách hàng phải trả là:</li><li class='ml-8'>$18.000.000 \\cdot (100\\% - 10\\%) = 18.000.000 \\cdot 90\\% = 16.200.000$&nbsp;(đồng).</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Khách hàng phải trả $16.200.000$ đồng.</li><li><b>b) Tính phần trăm lợi nhuận thực tế:</b></li><li class='ml-4'>Số tiền lãi thực tế cửa hàng thu được sau khi bán chiếc Laptop là:</li><li class='ml-8'>$16.200.000 - 15.000.000 = 1.200.000$&nbsp;(đồng).</li><li class='ml-4'>Tỉ số phần trăm tiền lãi so với giá vốn ban đầu là:</li><li class='ml-8'>$\\dfrac{1.200.000}{15.000.000} \\cdot 100\\% = 0,08 \\cdot 100\\% = 8\\%$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Cửa hàng thực tế lãi $8\\%$ so với giá vốn.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "(Hình học Suy luận - Góc tạo bởi Cát tuyến) Cho hai đường thẳng song song&nbsp;$m \\parallel n$. Một cát tuyến&nbsp;$d$&nbsp;cắt&nbsp;$m$&nbsp;tại đỉnh&nbsp;$A$&nbsp;và cắt&nbsp;$n$&nbsp;tại đỉnh&nbsp;$B$. Biết một góc so le trong tại đỉnh&nbsp;$A$&nbsp;có số đo là&nbsp;$\\angle A_1 = 75^{\\circ}$.<div class='mt-6'>a) Tính số đo góc đồng vị&nbsp;$\\angle B_1$&nbsp;(tương ứng với $\\angle A_1$).</div><div class='mt-6'>b) Tính số đo góc trong cùng phía&nbsp;$\\angle B_2$&nbsp;(tương ứng với $\\angle A_1$).</div><div class='mt-6'>c) Vẽ tia&nbsp;$Ax$&nbsp;là tia phân giác của&nbsp;$\\angle A_1$&nbsp;và tia&nbsp;$By$&nbsp;là tia phân giác của góc&nbsp;$\\angle B_3$&nbsp;(biết $\\angle B_3$ là góc so le trong với $\\angle A_1$). Chứng minh rằng hai tia&nbsp;$Ax$&nbsp;và&nbsp;$By$&nbsp;song song với nhau.</div><div class='flex justify-center my-8'><svg width='300' height='200' viewBox='0 0 300 200'><line x1='30' y1='50' x2='270' y2='50' stroke='black' stroke-width='1.5'/><text x='280' y='55' font-size='14' font-style='italic'>m</text><line x1='30' y1='150' x2='270' y2='150' stroke='black' stroke-width='1.5'/><text x='280' y='155' font-size='14' font-style='italic'>n</text><line x1='210' y1='10' x2='90' y2='190' stroke='black' stroke-width='1.5'/><text x='200' y='15' font-size='14' font-style='italic'>d</text><circle cx='183' cy='50' r='3' fill='black'/><text x='165' y='45' font-size='14'>A</text><circle cx='117' cy='150' r='3' fill='black'/><text x='95' y='145' font-size='14'>B</text><line x1='183' y1='50' x2='240' y2='90' stroke='red' stroke-width='1.5' stroke-dasharray='4'/><text x='245' y='95' font-size='14' font-style='italic' fill='red'>x</text><line x1='117' y1='150' x2='60' y2='110' stroke='blue' stroke-width='1.5' stroke-dasharray='4'/><text x='50' y='105' font-size='14' font-style='italic' fill='blue'>y</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán Hình học Suy luận lớp 7. Phải luôn viện dẫn giả thiết \"song song\" trước khi suy ra số đo góc.<br>- <b>How:</b> <br>&nbsp; + Ý a: Góc đồng vị của 2 đường thẳng song song thì bằng nhau.<br>&nbsp; + Ý b: Góc trong cùng phía của 2 đường thẳng song song thì bù nhau.<br>&nbsp; + Ý c: Cắt đôi 2 góc so le trong bằng tia phân giác. Tính ra góc nhỏ. Chỉ ra hai góc phân giác nhỏ nằm ở vị trí so le trong bằng nhau $\\Rightarrow$ Suy ngược lại hai tia phân giác song song (Dấu hiệu nhận biết).", solution: "<li><b>a) Tính góc đồng vị&nbsp;$\\angle B_1$:</b></li><li class='ml-4'>Theo giả thiết, ta có hai đường thẳng $m \\parallel n$.</li><li class='ml-4'>Góc $\\angle A_1$ và góc $\\angle B_1$ là hai góc ở vị trí <b>đồng vị</b> đối với cát tuyến $d$.</li><li class='ml-4'>Theo tính chất hai đường thẳng song song, hai góc đồng vị bằng nhau. Do đó:</li><li class='ml-8'>$\\angle B_1 = \\angle A_1 = 75^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $\\angle B_1 = 75^{\\circ}$.</li><li><b>b) Tính góc trong cùng phía&nbsp;$\\angle B_2$:</b></li><li class='ml-4'>Vì $m \\parallel n$, góc $\\angle A_1$ và góc $\\angle B_2$ là hai góc ở vị trí <b>trong cùng phía</b> đối với cát tuyến $d$.</li><li class='ml-4'>Theo tính chất hai đường thẳng song song, hai góc trong cùng phía bù nhau:</li><li class='ml-8'>$\\angle A_1 + \\angle B_2 = 180^{\\circ}$</li><li class='ml-8'>$75^{\\circ} + \\angle B_2 = 180^{\\circ}$</li><li class='ml-8'>$\\angle B_2 = 180^{\\circ} - 75^{\\circ} = 105^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $\\angle B_2 = 105^{\\circ}$.</li><li><b>c) Chứng minh hai tia phân giác song song:</b></li><li class='ml-4'>Vì tia $Ax$ là tia phân giác của $\\angle A_1$ nên góc nhỏ tạo thành (giữa $Ax$ và cát tuyến $d$) là:</li><li class='ml-8'>$\\angle dAx = \\dfrac{\\angle A_1}{2} = \\dfrac{75^{\\circ}}{2} = 37,5^{\\circ}$.</li><li class='ml-4'>Vì góc $\\angle B_3$ là góc so le trong với $\\angle A_1$ và $m \\parallel n$ nên $\\angle B_3 = \\angle A_1 = 75^{\\circ}$.</li><li class='ml-4'>Tia $By$ là tia phân giác của $\\angle B_3$ nên góc nhỏ tạo thành (giữa $By$ và cát tuyến $d$) là:</li><li class='ml-8'>$\\angle dBy = \\dfrac{\\angle B_3}{2} = \\dfrac{75^{\\circ}}{2} = 37,5^{\\circ}$.</li><li class='ml-4'>Ta thấy $\\angle dAx = 37,5^{\\circ}$ và $\\angle dBy = 37,5^{\\circ}$, suy ra $\\angle dAx = \\angle dBy$.</li><li class='ml-4'>Mặt khác, góc $\\angle dAx$ và góc $\\angle dBy$ đang ở vị trí <b>so le trong</b> đối với cát tuyến $d$ cắt hai tia $Ax, By$.</li><li class='ml-4'>Theo dấu hiệu nhận biết, vì có một cặp góc so le trong bằng nhau nên hai tia đó song song với nhau.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận c: Suy ra $Ax \\parallel By$ (Điều phải chứng minh).</li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Vũ khí Số học - Nguyên lý Dirichlet) Chứng minh rằng trong&nbsp;$7$&nbsp;số tự nhiên bất kỳ, luôn tồn tại&nbsp;$2$&nbsp;số có hiệu chia hết cho&nbsp;$6$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh có 2 số mang hiệu chia hết cho 6.<br>- <b>Why:</b> Khi nào hiệu hai số chia hết cho 6? (Khi và chỉ khi hai số đó có CÙNG SỐ DƯ khi đem chia cho 6).<br>- <b>How:</b> Đem 1 số tự nhiên chia cho 6, có 6 loại số dư (từ 0 đến 5). Đây là 6 \"chiếc lồng\". Đề cho 7 số tự nhiên, đóng vai trò là 7 \"con thỏ\". Áp dụng Dirichlet nhốt thỏ.", solution: "<li>Khi đem một số tự nhiên bất kỳ chia cho $6$, số dư nhận được chỉ có thể là một trong $6$ giá trị sau: $\\{0; 1; 2; 3; 4; 5\\}$.</li><li class='ml-4'>Ta coi $6$ giá trị số dư này là $6$ <b>chiếc lồng</b>.</li><li class='ml-4'>Theo đề bài, ta có $7$ <b>số tự nhiên bất kỳ</b> (đóng vai trò là $7$ <b>con thỏ</b>).</li><li class='ml-4'>Theo Nguyên lý Dirichlet, khi nhốt $7$ con thỏ vào $6$ chiếc lồng, thì chắc chắn phải tồn tại ít nhất $1$ lồng chứa từ $2$ con thỏ trở lên ($7 = 6 \\cdot 1 + 1$).</li><li class='ml-4'>Điều này có nghĩa là trong $7$ số tự nhiên bất kỳ, luôn tồn tại ít nhất $2$ số có <b>cùng một số dư</b> khi chia cho $6$.</li><li class='ml-4'>Gọi hai số đó là $a$ và $b$ ($a \\ge b$). Giả sử chúng chia $6$ có cùng số dư là $r$. Ta có thể viết:</li><li class='ml-8'>$a = 6 \\cdot q_1 + r$</li><li class='ml-8'>$b = 6 \\cdot q_2 + r$</li><li class='ml-4'>Khi đó, xét hiệu của hai số:</li><li class='ml-8'>$a - b = (6 \\cdot q_1 + r) - (6 \\cdot q_2 + r)$</li><li class='ml-8'>$a - b = 6 \\cdot q_1 - 6 \\cdot q_2 = 6(q_1 - q_2)$</li><li class='ml-4'>Vì biểu thức $6(q_1 - q_2)$ chứa thừa số $6$ nên hiệu $(a - b)$ chia hết cho $6$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Luôn có thể chọn ra được 2 số sao cho hiệu của chúng chia hết cho 6 (Điều phải chứng minh).</li>" },
{ t_title: "Câu 6 (2,0 điểm)", t_content: "(Chứng minh Phân số Tối giản) Chứng minh rằng với mọi số tự nhiên&nbsp;$n$, phân số sau luôn là phân số tối giản:<br>$P = \\dfrac{16n + 5}{24n + 7}$", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Chứng minh Ước chung lớn nhất ($d$) của tử và mẫu bằng $1$.<br>- <b>How:</b> Gọi $d = \\text{ƯCLN}(16n + 5, 24n + 7)$. Ta cần khử đi biến $n$.<br>- <b>Where:</b> Tử có hệ số $16$, Mẫu có hệ số $24$. Ta tìm BCNN(16, 24) = $48$.<br>- Vậy ta cần nhân biểu thức tử với $3$ và nhân biểu thức mẫu với $2$ để đều tạo ra hệ số $48n$. Sau đó lấy phương trình lớn trừ phương trình nhỏ để biến $n$ bốc hơi hoàn toàn.", solution: "<li>Gọi $d = \\text{ƯCLN}(16n + 5, 24n + 7)$ với $d \\in \\mathbb{N}^*$.</li><li class='ml-4'>Khi đó, tử số và mẫu số đều phải chia hết cho $d$:</li><li class='ml-8'>$(16n + 5) \\vdots d \\Rightarrow 3 \\cdot (16n + 5) \\vdots d \\Rightarrow (48n + 15) \\vdots d$</li><li class='ml-8'>$(24n + 7) \\vdots d \\Rightarrow 2 \\cdot (24n + 7) \\vdots d \\Rightarrow (48n + 14) \\vdots d$</li><li class='ml-4'>Lấy biểu thức thứ nhất trừ đi biểu thức thứ hai, hiệu của chúng cũng phải chia hết cho $d$:</li><li class='ml-8'>$[(48n + 15) - (48n + 14)] \\vdots d$</li><li class='ml-8'>$\\Rightarrow 1 \\vdots d$</li><li class='ml-4'>Vì $d$ là số nguyên dương và $1$ chia hết cho $d$ nên bắt buộc: $d = 1$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Vì ƯCLN của tử và mẫu luôn bằng $1$, nên phân số $P = \\dfrac{16n + 5}{24n + 7}$ luôn là phân số tối giản với mọi số tự nhiên $n$.</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Trong số học (Modulo), số dư của phép chia&nbsp;$8^{100}$&nbsp;cho&nbsp;$7$&nbsp;là:", options: ["A. $0$", "B. $1$", "C. $2$", "D. $6$"], correct_idx: 1, explain: "Ta có $8 \\equiv 1 \\pmod 7$. Áp dụng tính chất nâng lũy thừa, ta có $8^{100} \\equiv 1^{100} = 1 \\pmod 7$. Số dư là 1. Chọn B." },
{ q_title: "Câu 2", q_content: "Trong bảng dữ liệu sức khỏe định kỳ của lớp 6, 'Khối lượng của học sinh' (đơn vị: kg) được ghi lại. Dữ liệu nào sau đây là vô lý?", options: ["A. $40$", "B. $35$", "C. $400$", "D. $45$"], correct_idx: 2, explain: "Cân nặng 400kg đối với một học sinh lớp 6 là hoàn toàn phi thực tế về mặt sinh học. Chọn C." },
{ q_title: "Câu 3", q_content: "Khai triển biểu thức đại số&nbsp;$(x + 1)(y - 1)$&nbsp;ta được:", options: ["A. $xy - x + y - 1$", "B. $xy - 1$", "C. $xy + x - y - 1$", "D. $xy + 1$"], correct_idx: 0, explain: "Áp dụng quy tắc nhân đa thức: $x \\cdot y + x \\cdot (-1) + 1 \\cdot y + 1 \\cdot (-1) = xy - x + y - 1$. Chọn A." },
{ q_title: "Câu 4", q_content: "Trên bản đồ có tỉ lệ xích&nbsp;$1 : 1.000.000$, khoảng cách thực tế giữa hai thành phố là&nbsp;$50\\text{ km}$. Khoảng cách trên bản đồ là:", options: ["A. $5\\text{ cm}$", "B. $50\\text{ cm}$", "C. $0,5\\text{ cm}$", "D. $500\\text{ cm}$"], correct_idx: 0, explain: "Đổi khoảng cách thực tế sang cùng đơn vị cm: $50\\text{ km} = 5.000.000\\text{ cm}$. Khoảng cách bản đồ là: $5.000.000 : 1.000.000 = 5\\text{ cm}$. Chọn A." },
{ q_title: "Câu 5", q_content: "Cho dãy tỉ số bằng nhau&nbsp;$\\dfrac{x}{2} = \\dfrac{y}{7}$&nbsp;và tổng&nbsp;$x + y = 27$. Giá trị của hiệu&nbsp;$y - x$&nbsp;là:", options: ["A. $10$", "B. $21$", "C. $6$", "D. $15$"], correct_idx: 3, explain: "Áp dụng tính chất: $\\dfrac{x}{2} = \\dfrac{y}{7} = \\dfrac{x+y}{2+7} = \\dfrac{27}{9} = 3$. Suy ra $x=6, y=21$. Hiệu $y - x = 21 - 6 = 15$. Chọn D." },
{ q_title: "Câu 6", q_content: "Một sản phẩm giảm giá&nbsp;$20\\%$, sau đó giảm tiếp&nbsp;$10\\%$&nbsp;trên giá đang bán. Hỏi giá cuối cùng bằng bao nhiêu phần trăm so với giá gốc ban đầu?", options: ["A. $70\\%$", "B. $72\\%$", "C. $68\\%$", "D. $30\\%$"], correct_idx: 1, explain: "Giảm 20% thì giá còn 80%. Giảm tiếp 10% của giá đang bán tức là giảm thêm $10\\% \\cdot 80\\% = 8\\%$. Vậy giá cuối cùng so với gốc là $80\\% - 8\\% = 72\\%$. Chọn B." },
{ q_title: "Câu 7", q_content: "Hình thoi có bao nhiêu trục đối xứng?", options: ["A. $1$", "B. $4$", "C. $2$", "D. Vô số"], correct_idx: 2, explain: "Hình thoi có 2 trục đối xứng chính là 2 đường chéo của nó. Chọn C." },
{ q_title: "Câu 8", q_content: "Hai đường thẳng song song bị cắt bởi một cát tuyến. Nếu một góc so le trong bằng&nbsp;$60^{\\circ}$&nbsp;thì góc kề bù với nó có số đo là:", options: ["A. $60^{\\circ}$", "B. $120^{\\circ}$", "C. $30^{\\circ}$", "D. $90^{\\circ}$"], correct_idx: 1, explain: "Hai góc kề bù có tổng số đo bằng $180^{\\circ}$. Do đó góc kề bù với nó bằng $180^{\\circ} - 60^{\\circ} = 120^{\\circ}$. Chọn B." },
{ q_title: "Câu 9", q_content: "Cho&nbsp;$a$&nbsp;và&nbsp;$b$&nbsp;là hai chữ số. Biểu thức&nbsp;$\\overline{ab} + \\overline{ba}$&nbsp;luôn chia hết cho số nào sau đây?", options: ["A. $9$", "B. $10$", "C. $11$", "D. $2$"], correct_idx: 2, explain: "Phân tích cấu tạo số: $\\overline{ab} + \\overline{ba} = (10a+b) + (10b+a) = 11a + 11b = 11(a+b)$. Biểu thức luôn chứa thừa số 11 nên chia hết cho 11. Chọn C." },
{ q_title: "Câu 10", q_content: "Số nguyên&nbsp;$x$&nbsp;thỏa mãn phương trình&nbsp;$3x + 15 = 0$&nbsp;là:", options: ["A. $5$", "B. $-5$", "C. $-15$", "D. $12$"], correct_idx: 1, explain: "Giải phương trình: $3x = -15 \\Rightarrow x = -5$. Chọn B." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về tính chất góc:<br>Cho góc&nbsp;$\\angle xOy = 80^{\\circ}$. Tia&nbsp;$Oz$&nbsp;là tia phân giác của góc&nbsp;$\\angle xOy$.<br>(I) Số đo góc&nbsp;$\\angle xOz = 40^{\\circ}$.<br>(II) Vẽ tia&nbsp;$Ot$&nbsp;là tia đối của tia&nbsp;$Oz$. Số đo góc&nbsp;$\\angle yOt = 140^{\\circ}$.<br>(III) Tia&nbsp;$Oy$&nbsp;là tia phân giác của góc&nbsp;$\\angle xOt$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Đúng, phân giác chia đôi góc $80^{\\circ}$. (II) Đúng, tia $Ot$ và $Oz$ tạo thành góc bẹt, tia $Oy$ nằm giữa nên $\\angle yOt$ kề bù với $\\angle yOz=40^{\\circ}$, suy ra $180^{\\circ}-40^{\\circ}=140^{\\circ}$. (III) Sai, nếu $Oy$ là phân giác $\\angle xOt$ thì $\\angle xOy = \\angle yOt$, nhưng $80^{\\circ} \\neq 140^{\\circ}$. Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Xét 3 mệnh đề sau về biểu thức&nbsp;$A = \\dfrac{n+3}{n-1}$&nbsp;(với $n \\in \\mathbb{N}, n \\neq 1$):<br>(I) Khi&nbsp;$n = 2$, giá trị của&nbsp;$A$&nbsp;bằng&nbsp;$5$.<br>(II) Biểu thức&nbsp;$A$&nbsp;có thể viết lại thành&nbsp;$A = 1 + \\dfrac{4}{n-1}$.<br>(III) Có đúng 2 giá trị của số tự nhiên&nbsp;$n$&nbsp;để&nbsp;$A$&nbsp;nhận giá trị là một số nguyên.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Đúng ($5/1=5$). (II) Đúng (Tách $n+3 = n-1+4$). (III) Sai, để A nguyên thì $n-1 \\in \\{\\pm 1, \\pm 2, \\pm 4\\}$. Giải ra $n \\in \\{2; 0; 3; -1; 5; -3\\}$. Tập $n$ tự nhiên gồm $\\{0, 2, 3, 5\\}$ có tới 4 giá trị chứ không phải 2. Có 2 mệnh đề đúng. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (2,0 điểm)", t_content: "Thực hiện phép tính sau một cách hợp lý:<br>$A = \\dfrac{-5}{13} \\cdot \\dfrac{7}{12} + \\dfrac{-5}{13} \\cdot \\dfrac{5}{12} - 1\\dfrac{8}{13}$", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Quan sát 2 hạng tử đầu tiên, yếu tố nào lặp lại? (Chính là $\\dfrac{-5}{13}$).<br>- <b>How:</b> Dùng tính chất phân phối để kéo $\\dfrac{-5}{13}$ ra ngoài. Biểu thức trong ngoặc sẽ là một số nguyên rất đẹp ($\\dfrac{7}{12} + \\dfrac{5}{12} = 1$).<br>- <b>Where:</b> Cạm bẫy nằm ở hỗn số $-1\\dfrac{8}{13}$. Hãy quy đổi nó ra phân số trước khi cộng trừ với kết quả phía trước. Đổi thành $\\dfrac{-21}{13}$.", solution: "<li>Đặt nhân tử chung cho 2 hạng tử đầu tiên và đổi hỗn số ở hạng tử cuối:</li><li class='ml-4'>$A = \\dfrac{-5}{13} \\cdot \\left( \\dfrac{7}{12} + \\dfrac{5}{12} \\right) - \\dfrac{21}{13}$</li><li>Thực hiện phép tính trong dấu ngoặc:</li><li class='ml-4'>$A = \\dfrac{-5}{13} \\cdot \\left( \\dfrac{12}{12} \\right) - \\dfrac{21}{13}$</li><li class='ml-4'>$A = \\dfrac{-5}{13} \\cdot 1 - \\dfrac{21}{13}$</li><li>Cộng hai phân số cùng mẫu:</li><li class='ml-4'>$A = \\dfrac{-5 - 21}{13}$</li><li class='ml-4'>$A = \\dfrac{-26}{13}$</li><li>Thực hiện phép chia:</li><li class='ml-4'>$A = -2$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $A = -2$.</li>" },
{ t_title: "Câu 2 (2,0 điểm)", t_content: "Giải các bài toán Đại số bản lề lớp 7:<div class='mt-6'>a) Tìm&nbsp;$x$&nbsp;và&nbsp;$y$, biết:&nbsp;$\\dfrac{x}{3} = \\dfrac{y}{7}$&nbsp;và&nbsp;$2x + y = 39$.</div><div class='mt-6'>b) Tìm các cặp số nguyên&nbsp;$x, y$&nbsp;thỏa mãn phương trình dạng tích:&nbsp;$(x + 3)(2y - 1) = 9$.</div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>How:</b> Đề cho $2x$ nhưng tỉ số chỉ có $\\dfrac{x}{3}$. Ta phải nhân cả tử và mẫu của phân số thứ nhất với $2$ thành $\\dfrac{2x}{6}$. Sau đó áp dụng quy tắc cộng tương ứng: $\\dfrac{2x + y}{6 + 7}$.<br><b>Ý b:</b><br>- <b>What:</b> Phương trình Diophante đang ở dạng \"Tích = Hằng số\". Hằng số ở đây là $9$.<br>- <b>Why:</b> Vì $x, y$ là số nguyên, nên các cụm $(x+3)$ và $(2y-1)$ bắt buộc phải là các Ước của 9.<br>- <b>Where:</b> Chú ý $(2y-1)$ luôn là một SỐ LẺ. Yếu tố này giúp ta tự tin loại bớt các ước chẵn (nếu có, dù bài này số 9 vốn không có ước chẵn).", solution: "<li><b>a) Tìm&nbsp;$x$&nbsp;và&nbsp;$y$:</b></li><li class='ml-4'>Ta biến đổi phân số đầu tiên để làm xuất hiện hệ số $2x$:</li><li class='ml-8'>$\\dfrac{x}{3} = \\dfrac{2x}{6}$</li><li class='ml-4'>Khi đó dãy tỉ số trở thành:</li><li class='ml-8'>$\\dfrac{2x}{6} = \\dfrac{y}{7}$</li><li class='ml-4'>Áp dụng tính chất của dãy tỉ số bằng nhau:</li><li class='ml-8'>$\\dfrac{2x}{6} = \\dfrac{y}{7} = \\dfrac{2x + y}{6 + 7} = \\dfrac{39}{13} = 3$</li><li class='ml-4'>Từ tỉ số chung bằng $3$, ta tìm các ẩn:</li><li class='ml-8'>$\\dfrac{x}{3} = 3 \\Rightarrow x = 9$</li><li class='ml-8'>$\\dfrac{y}{7} = 3 \\Rightarrow y = 21$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = 9, y = 21$.</li><li><b>b) Tìm các cặp số nguyên&nbsp;$(x, y)$:</b></li><li class='ml-4'>Ta có phương trình: $(x + 3)(2y - 1) = 9$</li><li class='ml-4'>Vì $x, y \\in \\mathbb{Z}$ nên $(x + 3)$ và $(2y - 1)$ phải là các số nguyên và là Ước của $9$. Tập hợp các ước của $9$ là: Ư(9) = $\\{-9; -3; -1; 1; 3; 9\\}$.</li><li class='ml-4'>Ta lập bảng xét các trường hợp:</li><li class='ml-8'>+ TH1: $2y - 1 = 1 \\Rightarrow 2y = 2 \\Rightarrow y = 1$. Khi đó $x + 3 = 9 \\Rightarrow x = 6$.</li><li class='ml-8'>+ TH2: $2y - 1 = 9 \\Rightarrow 2y = 10 \\Rightarrow y = 5$. Khi đó $x + 3 = 1 \\Rightarrow x = -2$.</li><li class='ml-8'>+ TH3: $2y - 1 = 3 \\Rightarrow 2y = 4 \\Rightarrow y = 2$. Khi đó $x + 3 = 3 \\Rightarrow x = 0$.</li><li class='ml-8'>+ TH4: $2y - 1 = -1 \\Rightarrow 2y = 0 \\Rightarrow y = 0$. Khi đó $x + 3 = -9 \\Rightarrow x = -12$.</li><li class='ml-8'>+ TH5: $2y - 1 = -9 \\Rightarrow 2y = -8 \\Rightarrow y = -4$. Khi đó $x + 3 = -1 \\Rightarrow x = -4$.</li><li class='ml-8'>+ TH6: $2y - 1 = -3 \\Rightarrow 2y = -2 \\Rightarrow y = -1$. Khi đó $x + 3 = -3 \\Rightarrow x = -6$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Các cặp số $(x; y)$ thỏa mãn là: $(6; 1), (-2; 5), (0; 2), (-12; 0), (-4; -4), (-6; -1)$.</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "(Bài toán Năng suất - Vòi chảy Vòi tháo) Hai vòi nước được lắp vào một cái bể không có nước. Nếu mở riêng vòi thứ nhất thì sau&nbsp;$4$&nbsp;giờ bể sẽ đầy. Nếu mở riêng vòi thứ hai (vòi đặt sát đáy để tháo nước ra) thì sau&nbsp;$6$&nbsp;giờ sẽ tháo cạn bể nước đầy. Hỏi nếu mở cả hai vòi cùng lúc khi bể đang cạn, thì sau&nbsp;$3$&nbsp;giờ, lượng nước có trong bể chiếm bao nhiêu phần thể tích của bể?", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán \"Công việc chung\" nhưng có sự triệt tiêu (một vòi bơm vào mang dấu $+$, một vòi tháo ra mang dấu $-$).<br>- <b>How:</b> Cần quy về \"năng suất 1 giờ\". Coi toàn bộ thể tích bể là $1$ đơn vị.<br>- Lấy Năng suất vòi 1 TRỪ ĐI Năng suất vòi 2 sẽ ra lượng nước THỰC TẾ tăng lên trong $1$ giờ.<br>- Đề hỏi sau $3$ giờ thì được bao nhiêu? Lấy lượng nước $1$ giờ nhân với $3$.", solution: "<li>Quy ước toàn bộ thể tích của bể nước là $1$ đơn vị.</li><li class='ml-4'>Trong $1$ giờ, vòi thứ nhất chảy vào được: $1 : 4 = \\dfrac{1}{4}$ (thể tích bể)</li><li class='ml-4'>Trong $1$ giờ, vòi thứ hai tháo ra được: $1 : 6 = \\dfrac{1}{6}$ (thể tích bể)</li><li>Trong $1$ giờ, nếu mở cả hai vòi cùng lúc thì lượng nước thực tế tăng thêm trong bể là:</li><li class='ml-4'>$\\dfrac{1}{4} - \\dfrac{1}{6} = \\dfrac{3}{12} - \\dfrac{2}{12} = \\dfrac{1}{12}$ (thể tích bể)</li><li>Trong $3$ giờ, nếu mở cả hai vòi cùng lúc thì lượng nước có trong bể là:</li><li class='ml-4'>$\\dfrac{1}{12} \\cdot 3 = \\dfrac{3}{12} = \\dfrac{1}{4}$ (thể tích bể).</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Sau $3$ giờ, lượng nước trong bể chiếm $\\dfrac{1}{4}$ thể tích của bể.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "(Hình học - Góc kề bù và Tia phân giác) Cho hai góc kề bù&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$. Biết số đo góc&nbsp;$\\angle xOy = 120^{\\circ}$.<div class='mt-6'>a) Tính số đo góc&nbsp;$\\angle yOz$.</div><div class='mt-6'>b) Vẽ tia&nbsp;$Om$&nbsp;là tia phân giác của góc&nbsp;$\\angle xOy$&nbsp;và tia&nbsp;$On$&nbsp;là tia phân giác của góc&nbsp;$\\angle yOz$. Tính số đo góc&nbsp;$\\angle mOn$.</div><div class='mt-6'>c) Từ kết quả trên, em hãy rút ra kết luận tổng quát về góc tạo bởi hai tia phân giác của hai góc kề bù.</div><div class='flex justify-center my-8'><svg width='300' height='160' viewBox='0 0 300 160'><line x1='10' y1='140' x2='290' y2='140' stroke='black' stroke-width='1.5'/><circle cx='150' cy='140' r='3' fill='black'/><text x='145' y='160' font-size='14' font-weight='bold'>O</text><text x='280' y='130' font-size='14' font-style='italic'>x</text><text x='15' y='130' font-size='14' font-style='italic'>z</text><line x1='150' y1='140' x2='90' y2='36' stroke='black' stroke-width='1.5'/><text x='80' y='30' font-size='14' font-style='italic'>y</text><line x1='150' y1='140' x2='202' y2='50' stroke='red' stroke-width='1.5' stroke-dasharray='4'/><text x='210' y='45' font-size='14' font-style='italic' fill='red'>m</text><line x1='150' y1='140' x2='63' y2='90' stroke='blue' stroke-width='1.5' stroke-dasharray='4'/><text x='45' y='95' font-size='14' font-style='italic' fill='blue'>n</text><path d='M 180 140 A 30 30 0 0 0 135 114' fill='none' stroke='purple' stroke-width='1'/><text x='150' y='125' font-size='10' fill='purple'>120°</text></svg></div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Hai góc kề bù là hai góc có tổng số đo bằng bao nhiêu? ($180^{\\circ}$).<br>- <b>How:</b> Đã biết $\\angle xOy = 120^{\\circ}$. Lấy $180^{\\circ}$ trừ đi sẽ ra góc $\\angle yOz$.<br><b>Ý b:</b><br>- <b>What:</b> Tia phân giác $Om$ sẽ chia đôi góc $\\angle xOy$. Tia phân giác $On$ sẽ chia đôi góc $\\angle yOz$.<br>- <b>How:</b> Tính riêng biệt từng nửa góc nhỏ kề sát tia $Oy$ (là $\\angle yOm$ và $\\angle yOn$).<br>- Nhận thấy tia $Oy$ đóng vai trò là \"vách ngăn\" nằm giữa hai góc nhỏ này. Ta dùng phép cộng góc để ghép chúng lại ra $\\angle mOn$.<br><b>Ý c:</b><br>- <b>Why:</b> Dựa vào kết quả ở câu b, ta thấy tổng của hai nửa góc luôn bằng $90^{\\circ}$. Đây là một định lý nền tảng rất quan trọng cho cấp THCS.", solution: "<li><b>a) Tính số đo góc&nbsp;$\\angle yOz$:</b></li><li class='ml-4'>Vì hai góc $\\angle xOy$ và $\\angle yOz$ là hai góc kề bù nên tổng số đo của chúng bằng $180^{\\circ}$.</li><li class='ml-4'>Ta có phương trình:</li><li class='ml-8'>$\\angle xOy + \\angle yOz = 180^{\\circ}$</li><li class='ml-8'>$120^{\\circ} + \\angle yOz = 180^{\\circ}$</li><li class='ml-8'>$\\angle yOz = 180^{\\circ} - 120^{\\circ} = 60^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $\\angle yOz = 60^{\\circ}$.</li><li><b>b) Tính số đo góc&nbsp;$\\angle mOn$:</b></li><li class='ml-4'>Vì tia $Om$ là tia phân giác của góc $\\angle xOy$ nên:</li><li class='ml-8'>$\\angle yOm = \\dfrac{\\angle xOy}{2} = \\dfrac{120^{\\circ}}{2} = 60^{\\circ}$.</li><li class='ml-4'>Vì tia $On$ là tia phân giác của góc $\\angle yOz$ nên:</li><li class='ml-8'>$\\angle yOn = \\dfrac{\\angle yOz}{2} = \\dfrac{60^{\\circ}}{2} = 30^{\\circ}$.</li><li class='ml-4'>Vì $\\angle xOy$ và $\\angle yOz$ là hai góc kề bù nên tia $Oy$ nằm giữa hai tia $Ox$ và $Oz$. Đồng thời, tia $Om$ nằm trong $\\angle xOy$, tia $On$ nằm trong $\\angle yOz$. Do đó, tia $Oy$ nằm kẹp giữa hai tia phân giác $Om$ và $On$.</li><li class='ml-4'>Áp dụng công thức cộng góc:</li><li class='ml-8'>$\\angle mOn = \\angle yOm + \\angle yOn$</li><li class='ml-8'>$\\angle mOn = 60^{\\circ} + 30^{\\circ} = 90^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $\\angle mOn = 90^{\\circ}$.</li><li><b>c) Kết luận tổng quát:</b></li><li class='ml-4'>Dựa vào bài toán trên, ta rút ra định lý tổng quát: <b>Góc tạo bởi hai tia phân giác của hai góc kề bù luôn là một góc vuông ($90^{\\circ}$).</b></li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Vũ khí Số học - Nguyên lý Dirichlet) Chứng minh rằng trong&nbsp;$4$&nbsp;số tự nhiên bất kỳ, luôn tồn tại&nbsp;$2$&nbsp;số có hiệu chia hết cho&nbsp;$3$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh có 2 số mang hiệu chia hết cho 3.<br>- <b>Why:</b> Khi nào hiệu hai số chia hết cho 3? (Khi và chỉ khi hai số đó có CÙNG SỐ DƯ khi đem chia cho 3).<br>- <b>How:</b> Đem 1 số tự nhiên chia cho 3, có 3 loại số dư (0, 1, 2). Đây là 3 \"chiếc lồng\". Đề cho 4 số nguyên, đóng vai trò là 4 \"con thỏ\". Áp dụng Dirichlet nhốt thỏ.", solution: "<li>Khi đem một số tự nhiên bất kỳ chia cho $3$, số dư nhận được chỉ có thể là một trong $3$ giá trị sau: $\\{0; 1; 2\\}$.</li><li class='ml-4'>Ta coi $3$ giá trị số dư này là $3$ <b>chiếc lồng</b>.</li><li class='ml-4'>Theo đề bài, ta có $4$ <b>số tự nhiên bất kỳ</b> (đóng vai trò là $4$ <b>con thỏ</b>).</li><li class='ml-4'>Theo Nguyên lý Dirichlet, khi nhốt $4$ con thỏ vào $3$ chiếc lồng, thì chắc chắn phải tồn tại ít nhất $1$ lồng chứa từ $2$ con thỏ trở lên ($4 = 3 \\cdot 1 + 1$).</li><li class='ml-4'>Điều này có nghĩa là trong $4$ số tự nhiên bất kỳ, luôn tồn tại ít nhất $2$ số có <b>cùng một số dư</b> khi chia cho $3$.</li><li class='ml-4'>Gọi hai số đó là $a$ và $b$ ($a \\ge b$). Giả sử chúng chia $3$ có cùng số dư là $r$. Ta có thể viết:</li><li class='ml-8'>$a = 3 \\cdot q_1 + r$</li><li class='ml-8'>$b = 3 \\cdot q_2 + r$</li><li class='ml-4'>Khi đó, xét hiệu của hai số:</li><li class='ml-8'>$a - b = (3 \\cdot q_1 + r) - (3 \\cdot q_2 + r) = 3 \\cdot q_1 - 3 \\cdot q_2 = 3(q_1 - q_2)$</li><li class='ml-4'>Vì biểu thức $3(q_1 - q_2)$ chứa thừa số $3$ nên hiệu $(a - b)$ chia hết cho $3$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Luôn có thể chọn ra được 2 số sao cho hiệu của chúng chia hết cho 3 (Điều phải chứng minh).</li>" },
{ t_title: "Câu 6 (2,0 điểm)", t_content: "(Bất đẳng thức Nâng cao - So sánh siêu phân số trừ) Không cần tính giá trị cụ thể, hãy so sánh hai biểu thức sau:<br>$A = \\dfrac{2027^{100} - 1}{2027^{101} - 1}$&nbsp;và&nbsp;$B = \\dfrac{2027^{99} - 1}{2027^{100} - 1}$", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán so sánh 2 siêu phân số chứa lũy thừa cực lớn. Điểm khác biệt là trên tử số và mẫu số mang <b>DẤU TRỪ</b> ($-1$) thay vì dấu cộng.<br>- <b>How:</b> Vẫn áp dụng phương pháp nhân với cơ số. Ta nhân cả $A$ và $B$ với $2027$.<br>- <b>Why:</b> Sau khi tách thành $1 + \\dfrac{\\text{hằng số}}{\\text{mẫu}}$ giống như các bài cộng, dấu trừ sẽ mang lại kết quả $1 - \\dfrac{\\text{hằng số}}{\\text{mẫu}}$. Hãy nhớ: Phân số trừ có mẫu càng lớn thì giá trị của nó càng NHỎ $\\Rightarrow$ Khi lấy $1$ trừ đi lượng nhỏ hơn, Hiệu số tổng thể sẽ LỚN HƠN.", solution: "<li><b>Bước 1: Nhân biểu thức&nbsp;$A$&nbsp;với cơ số&nbsp;$2027$</b></li><li class='ml-4'>$2027 \\cdot A = 2027 \\cdot \\dfrac{2027^{100} - 1}{2027^{101} - 1} = \\dfrac{2027^{101} - 2027}{2027^{101} - 1}$</li><li class='ml-4'>Tách tử số để xuất hiện cụm giống mẫu số:</li><li class='ml-8'>$2027 \\cdot A = \\dfrac{(2027^{101} - 1) - 2026}{2027^{101} - 1} = 1 - \\dfrac{2026}{2027^{101} - 1}$</li><li><b>Bước 2: Nhân biểu thức&nbsp;$B$&nbsp;với cơ số&nbsp;$2027$</b></li><li class='ml-4'>$2027 \\cdot B = 2027 \\cdot \\dfrac{2027^{99} - 1}{2027^{100} - 1} = \\dfrac{2027^{100} - 2027}{2027^{100} - 1}$</li><li class='ml-4'>Tách tử số tương tự:</li><li class='ml-8'>$2027 \\cdot B = \\dfrac{(2027^{100} - 1) - 2026}{2027^{100} - 1} = 1 - \\dfrac{2026}{2027^{100} - 1}$</li><li><b>Bước 3: So sánh phần phân số được trừ</b></li><li class='ml-4'>Ta xét hai phân số phụ là $\\dfrac{2026}{2027^{101} - 1}$ và $\\dfrac{2026}{2027^{100} - 1}$.</li><li class='ml-4'>Vì mẫu số $2027^{101} - 1 > 2027^{100} - 1$, nên phân số có mẫu lớn hơn sẽ mang giá trị nhỏ hơn:</li><li class='ml-8'>$\\dfrac{2026}{2027^{101} - 1} < \\dfrac{2026}{2027^{100} - 1}$</li><li><b>Bước 4: Thiết lập bất đẳng thức</b></li><li class='ml-4'>Khi lấy cùng một số $1$ trừ đi một lượng nhỏ hơn, thì kết quả thu được sẽ lớn hơn. Do đó:</li><li class='ml-8'>$1 - \\dfrac{2026}{2027^{101} - 1} > 1 - \\dfrac{2026}{2027^{100} - 1}$</li><li class='ml-4'>Suy ra: $2027 \\cdot A > 2027 \\cdot B$</li><li class='ml-4'>Chia cả hai vế cho $2027$, ta được: $A > B$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Biểu thức $A$ lớn hơn biểu thức $B$.</li>" }
]

{ q_title: "Câu 2", q_content: "Bốn thửa ruộng trồng dưa chuột của xã Tam Dương thu hoạch được sản lượng lần lượt là:&nbsp;$3,5\\text{ tấn; } 3,05\\text{ tấn; } 3,15\\text{ tấn; } 3,51\\text{ tấn}$. Thửa ruộng nào cho sản lượng dưa chuột cao nhất?", options: ["A. Thửa ruộng đạt $3,5\\text{ tấn}$", "B. Thửa ruộng đạt $3,05\\text{ tấn}$", "C. Thửa ruộng đạt $3,15\\text{ tấn}$", "D. Thửa ruộng đạt $3,51\\text{ tấn}$"], correct_idx: 3, explain: "So sánh các số thập phân:&nbsp;$3,51 > 3,50 > 3,15 > 3,05$. Vậy 3,51 tấn là lớn nhất. Chọn D." },
{ q_title: "Câu 3", q_content: "Bé Lan giúp mẹ trộn thức ăn cho đàn gà của gia đình. Lan trộn&nbsp;$\\dfrac{1}{2}\\text{ kg}$&nbsp;cám ngô với&nbsp;$\\dfrac{1}{3}\\text{ kg}$&nbsp;cám gạo. Tổng khối lượng hỗn hợp thức ăn Lan vừa trộn là bao nhiêu?", options: ["A. $\\dfrac{2}{5}\\text{ kg}$", "B. $\\dfrac{1}{5}\\text{ kg}$", "C. $\\dfrac{5}{6}\\text{ kg}$", "D. $\\dfrac{1}{6}\\text{ kg}$"], correct_idx: 2, explain: "Cộng hai phân số khác mẫu số:&nbsp;$\\dfrac{1}{2} + \\dfrac{1}{3} = \\dfrac{3}{6} + \\dfrac{2}{6} = \\dfrac{5}{6}\\text{ kg}$. Chọn C." },
{ q_title: "Câu 4", q_content: "Kho vật tư ban đầu dự trữ&nbsp;$1000\\text{ kg}$&nbsp;lúa giống. Sáng nay xuất kho&nbsp;$\\dfrac{1}{4}$&nbsp;tổng số lúa giống đó. Chiều nay nhập thêm một lượng lúa giống bằng đúng&nbsp;$\\dfrac{1}{3}$&nbsp;số lúa ĐANG CÒN LẠI trong kho. Hỏi sau khi nhập thêm, trong kho có tất cả bao nhiêu ki-lô-gam lúa giống?", options: ["A. $1333\\text{ kg}$", "B. $1000\\text{ kg}$", "C. $1250\\text{ kg}$", "D. $750\\text{ kg}$"], correct_idx: 1, explain: "Sáng xuất đi 1/4 nên còn lại&nbsp;$\\dfrac{3}{4} \\cdot 1000 = 750\\text{ kg}$. Chiều nhập thêm 1/3 của số CÒN LẠI nên lượng nhập là&nbsp;$\\dfrac{1}{3} \\cdot 750 = 250\\text{ kg}$. Tổng trong kho là&nbsp;$750 + 250 = 1000\\text{ kg}$. Chọn B." },

tu_luan: [
{ t_title: "Bài 1 (2,5 điểm) Năng lực tính toán", t_content: "1. Tính bằng cách thuận tiện:<br>a)&nbsp;$12,75 + \\dfrac{4}{6} - \\dfrac{3}{4}$<br>b)&nbsp;$\\dfrac{1}{3} \\cdot 2078 - \\dfrac{2}{3} \\cdot 500 + 25\\% \\cdot 8000 - \\dfrac{5}{3} \\cdot 200$<div class='mt-6'>2. Tìm thành phần chưa biết&nbsp;$x$&nbsp;trong mỗi phép tính sau:<br>a)&nbsp;$x - 2,5 = 1,2 \\cdot 5$<br>b)&nbsp;$x - 0,111111111 = 0,9 + 0,99 + 0,999 + \\dots + 0,999999999$</div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý 1b:</b><br>- <b>What:</b> Biểu thức kết hợp phân số, phần trăm và phép nhân. Nhìn lướt qua rất cồng kềnh.<br>- <b>How:</b> Quan sát các mẫu số, ta thấy sự xuất hiện của mẫu số $3$ liên tục. Hãy thực hiện các phép nhân có chứa mẫu $3$ riêng ra: $\\dfrac{2}{3} \\cdot 500 = \\dfrac{1000}{3}$ và $\\dfrac{5}{3} \\cdot 200 = \\dfrac{1000}{3}$.<br>- Gom các phân số cùng mẫu $3$ lại với nhau, bạn sẽ thấy sự kì diệu xuất hiện ở tử số.<br><b>Ý 2b:</b><br>- <b>What:</b> Tìm ẩn số trong một chuỗi số thập phân có tính lặp.<br>- <b>How:</b> Thay vì cộng trực tiếp $0,9 + 0,99 +\\dots$, hãy tinh ý nhận ra: $0,9 = 1 - 0,1$ ; $0,99 = 1 - 0,01$ ; $0,999 = 1 - 0,001\\dots$<br>- Chuỗi vế phải có tổng cộng $9$ số hạng. Khi tách ra, ta sẽ có $9$ lần số $1$ trừ đi chuỗi $(0,1 + 0,01 + \\dots + 0,000000001)$. Cụm bị trừ chính là $0,111111111$ (trùng khớp với vế trái).", solution: "<li><b>1a) Tính thuận tiện:</b></li><li class='ml-4'>$12,75 + \\dfrac{4}{6} - \\dfrac{3}{4} = 12,75 - 0,75 + \\dfrac{2}{3}$</li><li class='ml-4'>$= 12 + \\dfrac{2}{3} = \\dfrac{36}{3} + \\dfrac{2}{3} = \\dfrac{38}{3}$ (hoặc $12\\dfrac{2}{3}$)</li><li><b>1b) Tính thuận tiện:</b></li><li class='ml-4'>$\\dfrac{1}{3} \\cdot 2078 - \\dfrac{2}{3} \\cdot 500 + 25\\% \\cdot 8000 - \\dfrac{5}{3} \\cdot 200$</li><li class='ml-4'>$= \\dfrac{2078}{3} - \\dfrac{1000}{3} + \\dfrac{1}{4} \\cdot 8000 - \\dfrac{1000}{3}$</li><li class='ml-4'>$= \\left( \\dfrac{2078 - 1000 - 1000}{3} \\right) + 2000$</li><li class='ml-4'>$= \\dfrac{78}{3} + 2000 = 26 + 2000 = 2026$.</li><li><b>2a) Tìm&nbsp;$x$:</b></li><li class='ml-4'>$x - 2,5 = 1,2 \\cdot 5$</li><li class='ml-4'>$x - 2,5 = 6$</li><li class='ml-4'>$x = 6 + 2,5 = 8,5$.</li><li><b>2b) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Xét vế phải (VP) có 9 số hạng. Biến đổi VP:</li><li class='ml-4'>$\\text{VP} = (1 - 0,1) + (1 - 0,01) + (1 - 0,001) + \\dots + (1 - 0,000000001)$</li><li class='ml-4'>$\\text{VP} = (1 + 1 + \\dots + 1) - (0,1 + 0,01 + 0,001 + \\dots + 0,000000001)$</li><li class='ml-4'>$\\text{VP} = 9 - 0,111111111$</li><li class='ml-4'>Thay VP vào phương trình ban đầu:</li><li class='ml-4'>$x - 0,111111111 = 9 - 0,111111111$</li><li class='font-bold text-indigo-700 mt-2'>Suy ra $x = 9$.</li>" },
{ t_title: "Bài 2 (2,5 điểm) Toán ứng dụng kinh tế", t_content: "Gia đình bạn Lan có một thửa ruộng rộng&nbsp;$2,5$&nbsp;sào Bắc Bộ (biết 1 sào Bắc Bộ có diện tích là&nbsp;$360\\text{ m}^2$). Hằng năm, gia đình đều dùng thửa ruộng này để trồng lúa. Vụ này được mùa, cứ mỗi sào thu hoạch được&nbsp;$3$&nbsp;tạ lúa. Em hãy giải quyết các bài toán sau:<div class='mt-6'>a) Hỏi vụ này gia đình bạn Lan thu hoạch được bao nhiêu ki-lô-gam lúa trên cả thửa ruộng?</div><div class='mt-6'>b) Giả sử năng suất lúa các vụ đều đạt như vụ vừa rồi và mỗi năm gia đình bạn Lan trồng được 2 vụ lúa. Biết giá bán mỗi tạ lúa trên thị trường là&nbsp;$1.100.000$&nbsp;đồng. Tuy nhiên, để trồng lúa, chi phí sản xuất chiếm&nbsp;$40\\%$&nbsp;giá trị bán ra của mỗi tạ lúa. Hỏi trong 1 năm, gia đình bạn Lan thu được bao nhiêu tiền lãi từ việc trồng lúa trên thửa ruộng đó?</div><div class='mt-6'>c) Bạn Lan đề xuất bố mẹ chuyển sang trồng rau. Theo tìm hiểu:<br>- Mỗi vụ rau kéo dài 3 tháng.<br>- Cứ mỗi&nbsp;$100\\text{ m}^2$&nbsp;trồng rau sẽ cần chi phí đầu tư là&nbsp;$1.000.000$&nbsp;đồng.<br>- Trung bình mỗi&nbsp;$100\\text{ m}^2$&nbsp;sẽ thu hoạch được&nbsp;$150\\text{ kg}$&nbsp;rau và bán với giá là&nbsp;$10.000\\text{ đồng/kg}$.<br>Em hãy tính giúp Lan xem: Nếu chuyển sang trồng rau trên toàn bộ thửa ruộng đó thì trong 1 năm, gia đình sẽ thu được số tiền lãi nhiều hơn so với trồng lúa là bao nhiêu?</div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Tính sản lượng toàn thửa ruộng.<br>- <b>How:</b> Lấy diện tích (số sào) nhân với năng suất mỗi sào, chú ý đổi đơn vị tạ ra kg.<br><b>Ý b:</b><br>- <b>Where/When:</b> Cạm bẫy cực lớn ở thời gian: 1 năm có <b>2 vụ lúa</b>. Phải nhân 2 tổng sản lượng.<br>- <b>How:</b> Tính tổng doanh thu $\\rightarrow$ Trừ đi $40\\%$ chi phí (hoặc nhân trực tiếp với $60\\%$ tỉ lệ tiền lãi).<br><b>Ý c:</b><br>- <b>Where/When:</b> Cạm bẫy tiếp theo: 1 vụ rau kéo dài 3 tháng $\\Rightarrow$ 1 năm có <b>4 vụ rau</b>.<br>- <b>How:</b> Tính diện tích toàn bộ thửa ruộng ra $m^2$. Tính lợi nhuận của 1 vụ dựa trên từng ô $100m^2$, nhân lên cho toàn thửa ruộng, rồi nhân tiếp cho 4 vụ trong năm.", solution: "<li><b>a) Khối lượng lúa thu hoạch 1 vụ:</b></li><li class='ml-4'>Đổi:&nbsp;$3\\text{ tạ} = 300\\text{ kg}$.</li><li class='ml-4'>Khối lượng lúa gia đình bạn Lan thu hoạch được trên cả thửa ruộng trong vụ này là:</li><li class='ml-8'>$2,5 \\cdot 300 = 750\\text{ (kg)}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $750\\text{ kg}$.</li><li><b>b) Tiền lãi trồng lúa trong 1 năm:</b></li><li class='ml-4'>Một năm trồng được 2 vụ, vậy sản lượng lúa cả năm là:</li><li class='ml-8'>$2 \\cdot 750 = 1500\\text{ (kg)} = 15\\text{ (tạ)}$.</li><li class='ml-4'>Tổng doanh thu bán lúa trong 1 năm là:</li><li class='ml-8'>$15 \\cdot 1.100.000 = 16.500.000\\text{ (đồng)}$.</li><li class='ml-4'>Vì chi phí chiếm $40\\%$ giá trị bán ra, nên tỉ lệ tiền lãi là:&nbsp;$100\\% - 40\\% = 60\\%$.</li><li class='ml-4'>Số tiền lãi gia đình thu được từ trồng lúa trong 1 năm là:</li><li class='ml-8'>$16.500.000 \\cdot 60\\% = 9.900.000\\text{ (đồng)}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $9.900.000\\text{ đồng}$.</li><li><b>c) So sánh tiền lãi nếu chuyển sang trồng rau:</b></li><li class='ml-4'>Tổng diện tích của thửa ruộng ($2,5$ sào) là:&nbsp;$2,5 \\cdot 360 = 900\\text{ (m}^2)$.</li><li class='ml-4'>Xét trên 1 vụ rau (trên toàn bộ $900\\text{ m}^2$):</li><li class='ml-8'>- Chi phí đầu tư là:&nbsp;$(900 : 100) \\cdot 1.000.000 = 9.000.000\\text{ (đồng)}$.</li><li class='ml-8'>- Sản lượng rau thu được là:&nbsp;$(900 : 100) \\cdot 150 = 1350\\text{ (kg)}$.</li><li class='ml-8'>- Doanh thu bán rau là:&nbsp;$1350 \\cdot 10.000 = 13.500.000\\text{ (đồng)}$.</li><li class='ml-8'>- Tiền lãi của <b>1 vụ rau</b> là:&nbsp;$13.500.000 - 9.000.000 = 4.500.000\\text{ (đồng)}$.</li><li class='ml-4'>Vì mỗi vụ rau kéo dài 3 tháng, nên trong 1 năm (12 tháng), gia đình trồng được số vụ rau là:&nbsp;$12 : 3 = 4\\text{ (vụ)}$.</li><li class='ml-4'>Tổng tiền lãi từ việc trồng rau trong <b>1 năm</b> là:</li><li class='ml-8'>$4.500.000 \\cdot 4 = 18.000.000\\text{ (đồng)}$.</li><li class='ml-4'>So sánh với trồng lúa, số tiền lãi thu được nhiều hơn là:</li><li class='ml-8'>$18.000.000 - 9.900.000 = 8.100.000\\text{ (đồng)}$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: Nhiều hơn $8.100.000\\text{ đồng}$.</li>" },
{ t_title: "Bài 3 (2,0 điểm) Hình học và Logic", t_content: "Trong tiết Mĩ thuật, bạn Minh dùng những tờ giấy màu khổ A4 hình chữ nhật có chiều dài là&nbsp;$29,7\\text{ cm}$&nbsp;và chiều rộng là&nbsp;$21\\text{ cm}$.<div class='mt-6'>a) Minh dùng thước kẻ một đường chéo nối hai góc đối diện của tờ giấy rồi dùng kéo cắt theo đường chéo đó để tạo thành 2 lá cờ hình tam giác. Em hãy tính diện tích của một lá cờ hình tam giác mà Minh vừa cắt được.</div><div class='mt-6'>b) Minh lấy một tờ giấy A4 mới và khéo léo khoét một lỗ hình tròn (vị trí lỗ hình tròn không nằm ở chính giữa tờ giấy), sau đó lấy mảnh giấy hình tròn đó ra ngoài. Bằng thao tác thực hành gấp giấy, em hãy hướng dẫn Minh cách tìm chính xác tâm của mảnh giấy hình tròn vừa khoét ra.</div><div class='mt-6'>c) Từ tờ giấy A4 đã bị khoét lỗ, chỉ dùng thước thẳng, bút em hãy nêu cách kẻ đúng duy nhất một đường thẳng chia phần giấy còn lại thành hai phần có diện tích bằng nhau. Em hãy giải thích ngắn gọn vì sao đường thẳng em vừa kẻ lại chia đôi được phần diện tích đó.</div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>How:</b> Đường chéo chia hình chữ nhật thành 2 tam giác vuông bằng nhau. Diện tích 1 lá cờ chính bằng một nửa diện tích tờ giấy A4.<br><b>Ý b:</b><br>- <b>How:</b> Xác định tâm hình tròn bằng thao tác nếp gấp. Khi gấp đôi một hình tròn, nếp gấp đi qua mép đối diện sẽ tạo thành đường kính. Giao của hai đường kính chính là Tâm.<br><b>Ý c:</b><br>- <b>What:</b> Một bài toán tư duy đối xứng tâm kinh điển.<br>- <b>Why:</b> Bất kỳ đường thẳng nào đi qua tâm hình chữ nhật đều chia hình chữ nhật đó làm 2 phần diện tích bằng nhau. Tính chất này cũng đúng với hình tròn.<br>- <b>How:</b> Tờ giấy bị khoét lỗ, nghĩa là đường thẳng vừa phải chia đôi HCN ban đầu, vừa phải chia đôi cái lỗ tròn bị mất đi. Vậy đường thẳng đó bắt buộc phải đi qua <b>CẢ 2 TÂM</b>.", solution: "<li><b>a) Tính diện tích lá cờ:</b></li><li class='ml-4'>Diện tích của tờ giấy A4 hình chữ nhật là:</li><li class='ml-8'>$29,7 \\cdot 21 = 623,7\\text{ (cm}^2)$.</li><li class='ml-4'>Khi cắt theo đường chéo, tờ giấy được chia làm 2 hình tam giác bằng nhau. Diện tích của một lá cờ hình tam giác là:</li><li class='ml-8'>$623,7 : 2 = 311,85\\text{ (cm}^2)$.</li><li><b>b) Cách tìm tâm mảnh giấy hình tròn:</b></li><li class='ml-4'>- <b>Bước 1:</b> Gấp đôi mảnh giấy hình tròn sao cho 2 nửa mép viền cong trùng khít hoàn toàn vào nhau. Vuốt nhẹ tạo thành một nếp gấp. Nếp gấp này chính là một <b>đường kính</b> của hình tròn.</li><li class='ml-4'>- <b>Bước 2:</b> Mở mảnh giấy ra, tiếp tục gấp đôi mảnh giấy lại một lần nữa nhưng theo một hướng khác. Ta được nếp gấp thứ hai là <b>đường kính thứ hai</b>.</li><li class='ml-4'>- <b>Bước 3:</b> Giao điểm (điểm cắt nhau) của hai nếp gấp vừa tạo ra chính là <b>tâm chính xác</b> của mảnh giấy hình tròn.</li><li><b>c) Cách kẻ đường thẳng chia đôi diện tích giấy khoét lỗ:</b></li><li class='ml-4'>- <b>Cách kẻ:</b> Dùng thước thẳng và bút kẻ đúng một đường thẳng đi qua <b>tâm của tờ giấy A4</b> (giao điểm của 2 đường chéo hình chữ nhật) và <b>tâm của cái lỗ hình tròn</b> (vừa xác định ở ý b). Đường thẳng này sẽ chia phần giấy còn lại thành 2 phần có diện tích bằng nhau.</li><li class='ml-4'>- <b>Giải thích:</b> Dựa vào tính chất đối xứng tâm, bất kỳ đường thẳng nào đi qua tâm của hình chữ nhật đều chia hình chữ nhật đó thành 2 nửa diện tích bằng nhau. Tương tự, bất kỳ đường thẳng nào đi qua tâm của hình tròn đều chia hình tròn thành 2 nửa diện tích bằng nhau. Do đó, một đường thẳng đi qua CẢ HAI TÂM này sẽ đồng thời chia đôi diện tích ban đầu của tờ A4 và chia đôi phần diện tích khoảng trống (cái lỗ). Kết quả là phần giấy thực tế còn lại ở hai bên đường thẳng sẽ có diện tích hoàn toàn bằng nhau.</li>" }
]

window.EXAM_DATA.push({
id: 4, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 04", icon: "📚", color: "orange", level: "Học sinh giỏi", time: "150 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Số phần tử của tập hợp&nbsp;$B = \\{x \\in \\mathbb{Z} \\mid -2024 \\le x < 2025\\}$&nbsp;là:", options: ["A. $4049$", "B. $4048$", "C. $4050$", "D. $2025$"], correct_idx: 0, explain: "Các phần tử của tập hợp chạy từ&nbsp;$-2024$&nbsp;đến&nbsp;$2024$. Số phần tử là:&nbsp;$2024 - (-2024) + 1 = 4049$. Chọn A." },
{ q_title: "Câu 2", q_content: "Phân số nghịch đảo của&nbsp;$-2\\dfrac{3}{5}$&nbsp;là:", options: ["A. $\\dfrac{13}{5}$", "B. $\\dfrac{-13}{5}$", "C. $\\dfrac{-5}{13}$", "D. $\\dfrac{5}{13}$"], correct_idx: 2, explain: "Đổi hỗn số ra phân số:&nbsp;$-2\\dfrac{3}{5} = \\dfrac{-13}{5}$. Phân số nghịch đảo của nó là&nbsp;$\\dfrac{-5}{13}$. Chọn C." },
{ q_title: "Câu 3", q_content: "Khi làm tròn số&nbsp;$x = 0,12345$&nbsp;đến hàng phần vạn, sai số tuyệt đối là:", options: ["A. $0,00005$", "B. $0,00001$", "C. $0,0001$", "D. $0,00045$"], correct_idx: 0, explain: "Làm tròn đến hàng phần vạn (chữ số thập phân thứ 4): Số&nbsp;$0,12345$&nbsp;được làm tròn thành&nbsp;$0,1235$. Sai số tuyệt đối là&nbsp;$|0,12345 - 0,1235| = |-0,00005| = 0,00005$. Chọn A." },
{ q_title: "Câu 4", q_content: "Biết&nbsp;$x$&nbsp;là số tự nhiên thỏa mãn&nbsp;$\\dfrac{1}{2} + \\dfrac{1}{3} < \\dfrac{x}{6} \\le \\dfrac{1}{2} + 1$. Tổng các giá trị của&nbsp;$x$&nbsp;là:", options: ["A. $15$", "B. $27$", "C. $18$", "D. $30$"], correct_idx: 3, explain: "Ta có:&nbsp;$\\dfrac{5}{6} < \\dfrac{x}{6} \\le \\dfrac{9}{6} \\Rightarrow 5 < x \\le 9$. Vì&nbsp;$x \\in \\mathbb{N}$&nbsp;nên&nbsp;$x \\in \\{6; 7; 8; 9\\}$. Tổng các giá trị là&nbsp;$6 + 7 + 8 + 9 = 30$. Chọn D." },
{ q_title: "Câu 5", q_content: "Có 5 điểm phân biệt&nbsp;$A, B, C, D, E$&nbsp;nằm trên một đường thẳng. Số đoạn thẳng có hai đầu mút là hai trong năm điểm đó là:", options: ["A. $5$", "B. $10$", "C. $15$", "D. $20$"], correct_idx: 1, explain: "Cứ 2 điểm tạo thành 1 đoạn thẳng. Số đoạn thẳng tạo bởi 5 điểm phân biệt là&nbsp;$\\dfrac{5 \\cdot 4}{2} = 10$. Chọn B." },
{ q_title: "Câu 6", q_content: "Một học sinh gieo một con xúc xắc 20 lần và thấy mặt 6 chấm xuất hiện 4 lần. Xác suất thực nghiệm của sự kiện 'Mặt xuất hiện không phải là 6 chấm' là:", options: ["A. $20\\%$", "B. $40\\%$", "C. $80\\%$", "D. $60\\%$"], correct_idx: 2, explain: "Số lần xuất hiện mặt KHÔNG phải 6 chấm là:&nbsp;$20 - 4 = 16$&nbsp;lần. Xác suất thực nghiệm là&nbsp;$\\dfrac{16}{20} = 80\\%$. Chọn C." },
{ q_title: "Câu 7", q_content: "Một góc có số đo bằng&nbsp;$3/4$&nbsp;góc bẹt. Góc đó là:", options: ["A. Góc nhọn", "B. Góc vuông", "C. Góc tù", "D. Góc không"], correct_idx: 2, explain: "Góc bẹt có số đo&nbsp;$180^{\\circ}$. Số đo góc đó là&nbsp;$180^{\\circ} \\cdot \\dfrac{3}{4} = 135^{\\circ}$. Góc lớn hơn $90^{\\circ}$ và nhỏ hơn $180^{\\circ}$ là góc tù. Chọn C." },
{ q_title: "Câu 8", q_content: "Biết&nbsp;$\\text{ƯCLN}(a,b) = 1$. Khi đó&nbsp;$\\text{ƯCLN}(a+b, a \\cdot b)$&nbsp;bằng:", options: ["A. $1$", "B. $a$", "C. $b$", "D. Không xác định"], correct_idx: 0, explain: "Gọi d là ƯCLN(a+b, a.b). Từ d|ab và (a,b)=1, d có ước nguyên tố của a hoặc b nhưng không cả 2. Nếu d chia hết cho a, mà d|(a+b) suy ra d|b, mâu thuẫn (a,b)=1. Vậy d=1. Chọn A." },
{ q_title: "Câu 9", q_content: "Cho điểm&nbsp;$M$&nbsp;nằm giữa&nbsp;$A, B$. Gọi&nbsp;$I$&nbsp;là trung điểm&nbsp;$AM$,&nbsp;$K$&nbsp;là trung điểm&nbsp;$MB$. Nếu&nbsp;$AB = L$&nbsp;thì&nbsp;$IK$&nbsp;bằng:", options: ["A. $L/4$", "B. $L/2$", "C. $2L/3$", "D. Không đổi"], correct_idx: 1, explain: "Ta có&nbsp;$IK = IM + MK = \\dfrac{AM}{2} + \\dfrac{MB}{2} = \\dfrac{AM + MB}{2} = \\dfrac{AB}{2} = \\dfrac{L}{2}$. Chọn B." },
{ q_title: "Câu 10", q_content: "Số nguyên tố có dạng&nbsp;$n^2 - 1$&nbsp;(với&nbsp;$n > 1$) là:", options: ["A. $2$", "B. $3$", "C. $5$", "D. $7$"], correct_idx: 1, explain: "Phân tích&nbsp;$n^2 - 1 = (n-1)(n+1)$. Để đây là số nguyên tố thì thừa số nhỏ hơn phải bằng 1. Tức là&nbsp;$n-1 = 1 \\Rightarrow n=2$. Khi đó số nguyên tố là&nbsp;$2^2 - 1 = 3$. Chọn B." },
{ q_title: "Câu 11", q_content: "Cho phân số&nbsp;$P = \\dfrac{n+3}{2n+1}$&nbsp;với&nbsp;$n \\in \\mathbb{N}$. Xét 3 mệnh đề sau:<br>(I) Với&nbsp;$n = 0$&nbsp;thì&nbsp;$P$&nbsp;có giá trị lớn nhất.<br>(II) Để&nbsp;$2P$&nbsp;là một số nguyên thì&nbsp;$2n+1$&nbsp;phải là ước của 5.<br>(III) Có duy nhất 1 giá trị của&nbsp;$n$&nbsp;để&nbsp;$P$&nbsp;là số nguyên.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "Ta có 2P = 1 + 5/(2n+1). (I) n=0 => P=3. Vì 2P lớn nhất khi 2n+1 nhỏ nhất dương (n=0), nên (I) Đúng. (II) Hiển nhiên Đúng. (III) Với n=0 => P=3 (nguyên); Với n=2 => P=5/5=1 (nguyên). Có 2 giá trị n thuộc N để P nguyên, do đó (III) Sai. Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Cho hình tròn tâm&nbsp;$O$&nbsp;đường kính&nbsp;$AB = 6\\text{ cm}$. Lấy điểm&nbsp;$M$&nbsp;thuộc đường tròn ($M$&nbsp;khác&nbsp;$A$&nbsp;và&nbsp;$B$). Xét 3 mệnh đề:<br>(I) Độ dài đoạn thẳng&nbsp;$OM = 3\\text{ cm}$.<br>(II) Tam giác&nbsp;$OMB$&nbsp;là tam giác cân tại&nbsp;$O$.<br>(III) Đoạn thẳng nối&nbsp;$O$&nbsp;với trung điểm của&nbsp;$MB$&nbsp;vuông góc với&nbsp;$MB$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 3, explain: "Bán kính R = 6/2 = 3cm. (I) M thuộc đường tròn nên OM = R = 3cm (Đúng). (II) OM = OB = R = 3cm nên tam giác OMB cân tại O (Đúng). (III) Trong tam giác cân, đường trung tuyến xuất phát từ đỉnh cũng là đường cao (Đúng). Chọn D." }
],
tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Tìm số tự nhiên&nbsp;$x$&nbsp;biết:&nbsp;$\\dfrac{1}{1 \\cdot 2} + \\dfrac{1}{2 \\cdot 3} + \\dfrac{1}{3 \\cdot 4} + \\dots + \\dfrac{1}{x(x+1)} = \\dfrac{2024}{2025}$<br><br>b) Tìm các số nguyên&nbsp;$x, y$&nbsp;thỏa mãn phương trình:&nbsp;$xy + 2x - y = 5$", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Vế trái là một tổng các phân số có quy luật gì ở mẫu số?<br>- <b>Why:</b> Tại sao lại có thể tách $\\dfrac{1}{x(x+1)}$ thành $\\dfrac{1}{x} - \\dfrac{1}{x+1}$? (Vì khoảng cách giữa hai thừa số ở mẫu là 1, bằng đúng tử số).<br>- <b>How:</b> Áp dụng công thức sai phân để triệt tiêu các số hạng ở giữa. Cuối cùng chuyển vế để tìm $x$.<br><b>Ý b:</b><br>- <b>What:</b> Đây là phương trình nghiệm nguyên chứa hai ẩn $x, y$ dạng bậc 1.<br>- <b>Where/When:</b> Khi nhóm $x$ từ hai hạng tử đầu tiên, ta được phần dư là gì? (Là $-y$).<br>- <b>How:</b> Phải đưa phương trình về dạng tích. Để tạo ra nhân tử chung $(y+2)$, ta phải trừ $2$ vào cả hai vế để ép $-y-2 = -(y+2)$.", solution: "<li><b>a) Tìm số tự nhiên&nbsp;$x$:</b></li><li class='ml-4'>Ta xét vế trái của phương trình:</li><li class='ml-8'>$\\dfrac{1}{1 \\cdot 2} + \\dfrac{1}{2 \\cdot 3} + \\dots + \\dfrac{1}{x(x+1)}$</li><li class='ml-4'>Áp dụng công thức sai phân, ta có:</li><li class='ml-8'>$= \\left(\\dfrac{1}{1} - \\dfrac{1}{2}\\right) + \\left(\\dfrac{1}{2} - \\dfrac{1}{3}\\right) + \\dots + \\left(\\dfrac{1}{x} - \\dfrac{1}{x+1}\\right)$</li><li class='ml-8'>$= 1 - \\dfrac{1}{x+1}$</li><li class='ml-4'>Theo đề bài, ta có phương trình:</li><li class='ml-8'>$1 - \\dfrac{1}{x+1} = \\dfrac{2024}{2025}$</li><li class='ml-8'>$\\dfrac{1}{x+1} = 1 - \\dfrac{2024}{2025} = \\dfrac{1}{2025}$</li><li class='ml-4'>Vì hai phân số bằng nhau và có cùng tử số nên mẫu số phải bằng nhau:</li><li class='ml-8'>$x + 1 = 2025 \\Rightarrow x = 2024$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a:&nbsp;$x = 2024$.</li><li><b>b) Tìm các số nguyên&nbsp;$x, y$:</b></li><li class='ml-4'>Ta biến đổi phương trình&nbsp;$xy + 2x - y = 5$:</li><li class='ml-8'>$x(y + 2) - y = 5$</li><li class='ml-4'>Trừ $2$ vào cả hai vế của phương trình để tạo nhân tử chung:</li><li class='ml-8'>$x(y + 2) - y - 2 = 5 - 2$</li><li class='ml-8'>$x(y + 2) - (y + 2) = 3$</li><li class='ml-8'>$(x - 1)(y + 2) = 3$</li><li class='ml-4'>Vì&nbsp;$x, y \\in \\mathbb{Z}$&nbsp;nên&nbsp;$(x-1)$&nbsp;và&nbsp;$(y+2)$&nbsp;là các ước của $3$. Ta có Ư(3)&nbsp;$= \\{\\pm 1; \\pm 3\\}$.</li><li class='ml-4'>Lập bảng xét các trường hợp:</li><li class='ml-8'>+ $x - 1 = 1 \\Rightarrow x = 2$. Khi đó&nbsp;$y + 2 = 3 \\Rightarrow y = 1$.</li><li class='ml-8'>+ $x - 1 = 3 \\Rightarrow x = 4$. Khi đó&nbsp;$y + 2 = 1 \\Rightarrow y = -1$.</li><li class='ml-8'>+ $x - 1 = -1 \\Rightarrow x = 0$. Khi đó&nbsp;$y + 2 = -3 \\Rightarrow y = -5$.</li><li class='ml-8'>+ $x - 1 = -3 \\Rightarrow x = -2$. Khi đó&nbsp;$y + 2 = -1 \\Rightarrow y = -3$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Các cặp số&nbsp;$(x; y)$&nbsp;là&nbsp;$(2; 1), (4; -1), (0; -5), (-2; -3)$.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Tính giá trị biểu thức:&nbsp;$A = \\dfrac{1}{2} + \\dfrac{1}{2^2} + \\dfrac{1}{2^3} + \\dots + \\dfrac{1}{2^{2024}}$<br><br>b) Chứng minh rằng với mọi số tự nhiên&nbsp;$n$, phân số&nbsp;$M = \\dfrac{2n+1}{2n^2+2n}$&nbsp;luôn là phân số tối giản.", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đây là tổng của một chuỗi lũy thừa cơ số 2.<br>- <b>Why:</b> Tại sao lại nhân cả hai vế của biểu thức với 2? (Vì khi nhân với 2, mỗi phân số sẽ nâng bậc lên 1 đơn vị, tạo ra một dãy số gần giống dãy ban đầu).<br>- <b>How:</b> Tính $2A$, sau đó lấy $2A - A$ để triệt tiêu hoàn toàn phần giữa.<br><b>Ý b:</b><br>- <b>What:</b> Để chứng minh phân số tối giản, ta cần làm gì? (Gọi $d$ là ƯCLN của tử và mẫu, chứng minh $d=1$).<br>- <b>Where/When:</b> Nhận thấy mẫu số có chứa $n^2$ trong khi tử số chỉ chứa $n$. Ta cần nhân tử số với một biểu thức chứa $n$ để đồng bậc.<br>- <b>How:</b> Từ $(2n+1) \\vdots d$, nhân thêm $n$ ta có $(2n^2+n) \\vdots d$. Lấy mẫu số trừ đi biểu thức này để hạ bậc dần dần.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$A$:</b></li><li class='ml-4'>Ta có:&nbsp;$A = \\dfrac{1}{2} + \\dfrac{1}{2^2} + \\dfrac{1}{2^3} + \\dots + \\dfrac{1}{2^{2024}}$</li><li class='ml-4'>Nhân cả hai vế với $2$, ta được:</li><li class='ml-8'>$2A = 1 + \\dfrac{1}{2} + \\dfrac{1}{2^2} + \\dots + \\dfrac{1}{2^{2023}}$</li><li class='ml-4'>Lấy&nbsp;$2A$&nbsp;trừ đi&nbsp;$A$&nbsp;vế theo vế:</li><li class='ml-8'>$2A - A = \\left( 1 + \\dfrac{1}{2} + \\dots + \\dfrac{1}{2^{2023}} \\right) - \\left( \\dfrac{1}{2} + \\dots + \\dfrac{1}{2^{2024}} \\right)$</li><li class='ml-8'>$A = 1 - \\dfrac{1}{2^{2024}}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a:&nbsp;$A = \\dfrac{2^{2024} - 1}{2^{2024}}$.</li><li><b>b) Chứng minh phân số tối giản:</b></li><li class='ml-4'>Gọi&nbsp;$d = \\text{ƯCLN}(2n+1, 2n^2+2n)$&nbsp;với&nbsp;$d \\in \\mathbb{N}^*$.</li><li class='ml-4'>Ta có:&nbsp;$(2n + 1) \\vdots d$&nbsp;và&nbsp;$(2n^2 + 2n) \\vdots d$.</li><li class='ml-4'>Từ điều kiện thứ nhất, ta nhân thêm&nbsp;$n$&nbsp;vào:</li><li class='ml-8'>$n(2n + 1) \\vdots d \\Rightarrow (2n^2 + n) \\vdots d$</li><li class='ml-4'>Lấy biểu thức mẫu số trừ đi biểu thức vừa tạo ra để khử&nbsp;$n^2$:</li><li class='ml-8'>$(2n^2 + 2n) - (2n^2 + n) \\vdots d \\Rightarrow n \\vdots d$</li><li class='ml-4'>Vì&nbsp;$n \\vdots d$&nbsp;nên&nbsp;$2n \\vdots d$. Kết hợp với giả thiết&nbsp;$(2n + 1) \\vdots d$, ta có:</li><li class='ml-8'>$(2n + 1) - 2n \\vdots d \\Rightarrow 1 \\vdots d$</li><li class='ml-4'>Vì $d$ là số nguyên dương và $1$ chia hết cho $d$ nên suy ra $d = 1$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận b: ƯCLN bằng 1, nên phân số luôn tối giản. (ĐPCM)</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Một vòi nước chảy vào một bể cạn. Giờ thứ nhất vòi chảy được&nbsp;$1/3$&nbsp;thể tích bể. Giờ thứ hai vòi chảy được&nbsp;$40\\%$&nbsp;lượng nước CÒN LẠI sau giờ thứ nhất. Giờ thứ ba vòi chảy thêm&nbsp;$320$&nbsp;lít nữa thì vừa đầy bể.<br><br>a) Tính dung tích của bể nước đó.<br>b) Nếu vòi thứ nhất chảy một mình trong 2 giờ liên tục thì lượng nước chiếm bao nhiêu phần trăm thể tích bể?", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đây là dạng toán tính phân số nhiều giai đoạn. Phải làm rõ được $320$ lít tương ứng với phân số nào của bể.<br>- <b>Why:</b> Cạm bẫy nằm ở từ \"CÒN LẠI\". Tại sao không được lấy $40\\%$ nhân thẳng với toàn bộ bể? (Vì vòi 2 chỉ chảy $40\\%$ của phần không gian trống sau khi vòi 1 đã chảy).<br>- <b>How:</b> Lập phép tính tìm phần dư sau giờ 1 $\\rightarrow$ Tìm phân số thực tế của giờ 2 $\\rightarrow$ Tìm phân số của giờ 3. Lấy $320$ lít chia cho phân số đó sẽ ra dung tích bể.<br><b>Ý b:</b><br>- <b>Who:</b> Chỉ xét riêng năng suất của vòi thứ nhất.<br>- <b>How:</b> Dựa vào giờ đầu tiên, vòi 1 chảy được $1/3$ bể. Tính thể tích chảy trong 2 giờ rồi đổi ra tỉ lệ phần trăm.", solution: "<li><b>a) Tính dung tích bể nước:</b></li><li class='ml-4'>Quy ước toàn bộ thể tích bể là $1$ đơn vị.</li><li class='ml-4'>Phân số chỉ lượng nước chưa có trong bể (còn lại) sau giờ thứ nhất là:</li><li class='ml-8'>$1 - \\dfrac{1}{3} = \\dfrac{2}{3}$&nbsp;(thể tích bể)</li><li class='ml-4'>Trong giờ thứ hai, phân số chỉ lượng nước vòi chảy được so với cả bể là:</li><li class='ml-8'>$40\\% \\cdot \\dfrac{2}{3} = \\dfrac{40}{100} \\cdot \\dfrac{2}{3} = \\dfrac{2}{5} \\cdot \\dfrac{2}{3} = \\dfrac{4}{15}$&nbsp;(thể tích bể)</li><li class='ml-4'>Phân số chỉ&nbsp;$320$&nbsp;lít nước chảy trong giờ thứ ba là:</li><li class='ml-8'>$1 - \\left( \\dfrac{1}{3} + \\dfrac{4}{15} \\right) = 1 - \\dfrac{9}{15} = \\dfrac{6}{15} = \\dfrac{2}{5}$&nbsp;(thể tích bể)</li><li class='ml-4'>Dung tích của bể nước đó là:</li><li class='ml-8'>$320 : \\dfrac{2}{5} = 320 \\cdot \\dfrac{5}{2} = 800$&nbsp;(lít)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Dung tích bể là $800$ lít.</li><li><b>b) Tính lượng nước chiếm bao nhiêu phần trăm:</b></li><li class='ml-4'>Theo giả thiết, trong $1$ giờ vòi thứ nhất chảy được $\\dfrac{1}{3}$ bể.</li><li class='ml-4'>Trong $2$ giờ liên tục, lượng nước vòi thứ nhất chảy được là:</li><li class='ml-8'>$\\dfrac{1}{3} \\cdot 2 = \\dfrac{2}{3}$&nbsp;(thể tích bể)</li><li class='ml-4'>Tỉ số phần trăm lượng nước chiếm trong bể lúc này là:</li><li class='ml-8'>$\\dfrac{2}{3} \\cdot 100\\% \\approx 66,67\\%$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Xấp xỉ $66,67\\%$.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Cho đoạn thẳng&nbsp;$AB = 8\\text{ cm}$. Lấy điểm&nbsp;$C$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;sao cho&nbsp;$AC = 3\\text{ cm}$.<br>a) Tính độ dài đoạn thẳng&nbsp;$BC$.<br>b) Trên tia đối của tia&nbsp;$CA$, lấy điểm&nbsp;$D$&nbsp;sao cho&nbsp;$CD = 7\\text{ cm}$. Chứng tỏ rằng điểm&nbsp;$B$&nbsp;nằm giữa hai điểm&nbsp;$C$&nbsp;và&nbsp;$D$. Tính độ dài&nbsp;$BD$.<br>c) Điểm&nbsp;$B$&nbsp;có phải là trung điểm của đoạn thẳng&nbsp;$CD$&nbsp;không? Vì sao?", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Tính độ dài đoạn thẳng $BC$ khi biết $AB$ và $AC$.<br>- <b>Where/When:</b> Đề đã cho $C$ nằm giữa $A$ và $B$. Ta áp dụng ngay hệ thức nào? (Hệ thức cộng đoạn thẳng).<br><b>Ý b:</b><br>- <b>What:</b> Chứng tỏ vị trí của điểm $B$ và tính độ dài $BD$.<br>- <b>Why:</b> Tia đối của tia $CA$ là gì? (Là tia xuất phát từ $C$ và hướng về phía $B$). Điều này cho biết $D$ nằm cùng phía với $B$ so với $C$.<br>- <b>How:</b> So sánh khoảng cách $CB$ và $CD$ tính từ gốc $C$ để kết luận $B$ nằm giữa. Từ đó lập hệ thức cộng để tìm $BD$.<br><b>Ý c:</b><br>- <b>What:</b> Kiểm tra tính chất trung điểm của $B$ đối với đoạn $CD$.<br>- <b>How:</b> Đối chiếu 2 điều kiện: Điểm $B$ có nằm giữa không? Khoảng cách $BC$ có bằng $BD$ không?", solution: "<li><b>a) Tính độ dài đoạn thẳng&nbsp;$BC$:</b></li><li class='ml-4'>Vì điểm $C$ nằm giữa hai điểm $A$ và $B$ nên ta có:</li><li class='ml-8'>$AC + CB = AB$</li><li class='ml-4'>Thay số vào hệ thức:</li><li class='ml-8'>$3 + CB = 8 \\Rightarrow CB = 8 - 3 = 5\\text{ (cm)}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a:&nbsp;$BC = 5\\text{ cm}$.</li><li><b>b) Chứng tỏ B nằm giữa và tính&nbsp;$BD$:</b></li><li class='ml-4'>Vì $C$ nằm giữa $A$ và $B$ nên tia $CA$ và tia $CB$ là hai tia đối nhau.</li><li class='ml-4'>Theo đề bài, điểm $D$ thuộc tia đối của tia $CA$, suy ra điểm $D$ phải nằm trên tia $CB$.</li><li class='ml-4'>Trên cùng một tia $CB$, ta xét khoảng cách tính từ gốc $C$:&nbsp;$CB = 5\\text{ cm}$ và $CD = 7\\text{ cm}$.</li><li class='ml-4'>Vì $CB < CD$ ($5 < 7$) nên <b>điểm&nbsp;$B$&nbsp;nằm giữa hai điểm&nbsp;$C$&nbsp;và&nbsp;$D$</b>.</li><li class='ml-4'>Khi đó, ta có công thức cộng đoạn thẳng:</li><li class='ml-8'>$CB + BD = CD$</li><li class='ml-8'>$5 + BD = 7 \\Rightarrow BD = 7 - 5 = 2\\text{ (cm)}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b:&nbsp;$B$ nằm giữa $C$ và $D$;&nbsp;$BD = 2\\text{ cm}$.</li><li><b>c) Điểm&nbsp;$B$&nbsp;có phải là trung điểm của&nbsp;$CD$&nbsp;không?</b></li><li class='ml-4'>Mặc dù điểm $B$ nằm giữa hai điểm $C$ và $D$ (theo chứng minh trên).</li><li class='ml-4'>Nhưng xét về khoảng cách, ta có:&nbsp;$BC = 5\\text{ cm}$ và&nbsp;$BD = 2\\text{ cm}$.</li><li class='ml-4'>Vì $BC \\neq BD$ ($5 \\neq 2$) nên $B$ không cách đều hai mút.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: Điểm&nbsp;$B$&nbsp;không phải là trung điểm của đoạn thẳng&nbsp;$CD$.</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "(Nguyên lý Dirichlet) Trong một túi có chứa 10 viên bi màu đỏ, 10 viên bi màu xanh và 10 viên bi màu vàng. Không nhìn vào túi, hỏi phải lấy ra ngẫu nhiên ít nhất bao nhiêu viên bi để chắc chắn có:<br>a) Ít nhất 2 viên bi cùng màu?<br>b) Ít nhất 1 viên bi màu đỏ?", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Cần bốc ít nhất bao nhiêu viên để có 2 viên cùng màu?<br>- <b>Why:</b> Để tìm số lượng \"ít nhất để chắc chắn\", ta luôn phải tư duy theo kịch bản \"xui xẻo nhất\".<br>- <b>How:</b> Xui xẻo nhất là bốc ra 3 viên mang 3 màu khác nhau (1 Đỏ, 1 Xanh, 1 Vàng). Lúc này chưa có màu nào lặp lại. Nếu bốc thêm 1 viên nữa (viên thứ 4), theo Nguyên lý Dirichlet, điều gì bắt buộc phải xảy ra?<br><b>Ý b:</b><br>- <b>What:</b> Cần bốc ít nhất bao nhiêu viên để có 1 viên Đỏ?<br>- <b>How:</b> Kịch bản xui xẻo nhất là ta bốc trúng TOÀN BỘ các màu khác trước khi chạm tới màu Đỏ. Tính tổng số bi Xanh và Vàng, sau đó cộng thêm 1 viên.", solution: "<li><b>a) Lấy ngẫu nhiên để có ít nhất 2 viên cùng màu:</b></li><li class='ml-4'>Trong túi có $3$ loại màu khác nhau (Đỏ, Xanh, Vàng). Ta coi ba màu này là $3$ 'chiếc lồng'.</li><li class='ml-4'>Trường hợp bốc kém may mắn nhất (không có 2 viên nào cùng màu) là khi ta bốc ra $3$ viên bi, mỗi viên mang một màu khác nhau ($1$ Đỏ, $1$ Xanh, $1$ Vàng).</li><li class='ml-4'>Nếu ta bốc thêm $1$ viên bi nữa (tổng cộng là $4$ viên), viên thứ $4$ này bắt buộc phải mang một trong $3$ màu trên.</li><li class='ml-4'>Theo Nguyên lý Dirichlet, khi phân phối $4$ viên bi vào $3$ nhóm màu, chắc chắn sẽ có ít nhất một màu chứa từ $2$ viên bi trở lên.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Cần lấy ít nhất $4$ viên bi.</li><li><b>b) Lấy ngẫu nhiên để có ít nhất 1 viên màu Đỏ:</b></li><li class='ml-4'>Trường hợp bốc kém may mắn nhất là ta liên tục bốc phải các viên bi không phải màu Đỏ.</li><li class='ml-4'>Tức là, ta bốc hết toàn bộ số bi màu Xanh và màu Vàng có trong túi. Tổng số bi đó là:</li><li class='ml-8'>$10 \\text{ (Xanh)} + 10 \\text{ (Vàng)} = 20$&nbsp;(viên bi).</li><li class='ml-4'>Lúc này, trong túi chỉ còn lại duy nhất các viên bi màu Đỏ.</li><li class='ml-4'>Do đó, nếu ta bốc thêm $1$ viên bi nữa (viên thứ $21$), viên bi đó chắn chắn $100\\%$ phải mang màu Đỏ.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Cần lấy ít nhất $21$ viên bi.</li>" }
]
});

id: 5, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 05", icon: "💎", color: "indigo", level: "Học sinh giỏi", time: "150 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Cho phân số&nbsp;$A = \\dfrac{n-5}{n+2}$&nbsp;($n \\in \\mathbb{Z}, n \\neq -2$). Có bao nhiêu giá trị nguyên của&nbsp;$n$&nbsp;để&nbsp;$A$&nbsp;là một số nguyên?", options: ["A. $2$", "B. $4$", "C. $6$", "D. $8$"], correct_idx: 1, explain: "Ta biến đổi:&nbsp;$A = \\dfrac{(n+2) - 7}{n+2} = 1 - \\dfrac{7}{n+2}$. Để A nguyên thì&nbsp;$n+2 \\in Ư(7) = \\{\\pm 1; \\pm 7\\}$. Có 4 giá trị thỏa mãn. Chọn B." },
{ q_title: "Câu 2", q_content: "Chữ số tận cùng của biểu thức&nbsp;$M = 7^{2024} - 3^{2024}$&nbsp;là:", options: ["A. $0$", "B. $4$", "C. $6$", "D. $2$"], correct_idx: 0, explain: "Ta có:&nbsp;$7^{2024} = (7^4)^{506} = (\\dots 1)^{506}$&nbsp;có tận cùng là 1. Tương tự&nbsp;$3^{2024} = (3^4)^{506} = (\\dots 1)^{506}$&nbsp;có tận cùng là 1. Hiệu của chúng có chữ số tận cùng là&nbsp;$1 - 1 = 0$. Chọn A." },
{ q_title: "Câu 3", q_content: "Cho&nbsp;$\\text{ƯCLN}(a, b) = 1$. Khi đó&nbsp;$\\text{ƯCLN}(a+b, a-b)$&nbsp;có thể là:", options: ["A. $1$", "B. $2$", "C. $1$&nbsp;hoặc&nbsp;$2$", "D. Mọi số tự nhiên"], correct_idx: 2, explain: "Gọi&nbsp;$d = \\text{ƯCLN}(a+b, a-b)$. Suy ra&nbsp;$d$&nbsp;là ước của tổng&nbsp;$(a+b)+(a-b) = 2a$&nbsp;và hiệu&nbsp;$(a+b)-(a-b) = 2b$. Vì&nbsp;$\\text{ƯCLN}(a,b)=1$&nbsp;nên&nbsp;$d$&nbsp;phải là ước của 2. Vậy&nbsp;$d \\in \\{1; 2\\}$. Chọn C." },
{ q_title: "Câu 4", q_content: "Giá trị của biểu thức&nbsp;$P = \\dfrac{1}{1 \\cdot 3} + \\dfrac{1}{3 \\cdot 5} + \\dfrac{1}{5 \\cdot 7} + \\dots + \\dfrac{1}{2025 \\cdot 2027}$&nbsp;là:", options: ["A. $\\dfrac{1013}{2027}$", "B. $\\dfrac{2026}{2027}$", "C. $\\dfrac{1012}{2027}$", "D. $\\dfrac{2025}{2027}$"], correct_idx: 0, explain: "Nhân 2 vào 2 vế rồi tách sai phân:&nbsp;$2P = \\dfrac{2}{1\\cdot 3} + \\dots = \\left(1 - \\dfrac{1}{3}\\right) + \\dots + \\left(\\dfrac{1}{2025} - \\dfrac{1}{2027}\\right) = 1 - \\dfrac{1}{2027} = \\dfrac{2026}{2027}$. Vậy&nbsp;$P = \\dfrac{1013}{2027}$. Chọn A." },
{ q_title: "Câu 5", q_content: "Một cửa hàng giảm giá&nbsp;$20\\%$&nbsp;giá niêm yết của một chiếc máy tính. Để đưa giá máy tính về mức giá ban đầu, cửa hàng cần tăng giá máy tính đã giảm lên bao nhiêu phần trăm?", options: ["A. $20\\%$", "B. $25\\%$", "C. $15\\%$", "D. $30\\%$"], correct_idx: 1, explain: "Giá sau giảm bằng&nbsp;$80\\%$&nbsp;(hay&nbsp;$\\dfrac{4}{5}$) giá gốc. Để về giá gốc, cần nhân với&nbsp;$\\dfrac{5}{4} = 125\\%$. Tức là phải tăng thêm&nbsp;$25\\%$. Chọn B." },
{ q_title: "Câu 6", q_content: "Cho&nbsp;$n$&nbsp;điểm phân biệt, cứ qua 2 điểm vẽ được một đường thẳng. Nếu có tất cả&nbsp;$190$&nbsp;đường thẳng và không có 3 điểm nào thẳng hàng thì&nbsp;$n$&nbsp;bằng:", options: ["A. $19$", "B. $20$", "C. $21$", "D. $18$"], correct_idx: 1, explain: "Ta có công thức:&nbsp;$\\dfrac{n(n-1)}{2} = 190 \\Rightarrow n(n-1) = 380$. Vì&nbsp;$20 \\cdot 19 = 380$&nbsp;nên&nbsp;$n = 20$. Chọn B." },
{ q_title: "Câu 7", q_content: "Một góc có số đo bằng&nbsp;$5/6$&nbsp;góc vuông. Số đo góc bù với góc đó là:", options: ["A. $75^{\\circ}$", "B. $105^{\\circ}$", "C. $15^{\\circ}$", "D. $115^{\\circ}$"], correct_idx: 1, explain: "Góc vuông là&nbsp;$90^{\\circ}$. Góc đó bằng&nbsp;$90^{\\circ} \\cdot \\dfrac{5}{6} = 75^{\\circ}$. Góc bù với nó có số đo là&nbsp;$180^{\\circ} - 75^{\\circ} = 105^{\\circ}$. Chọn B." },
{ q_title: "Câu 8", q_content: "Số chính phương lớn nhất có 3 chữ số là:", options: ["A. $900$", "B. $961$", "C. $981$", "D. $999$"], correct_idx: 1, explain: "Ta thử các bình phương:&nbsp;$31^2 = 961$.&nbsp;$32^2 = 1024$&nbsp;(đã vượt quá 3 chữ số). Vậy số cần tìm là 961. Chọn B." },
{ q_title: "Câu 9", q_content: "Tìm số nguyên&nbsp;$x$&nbsp;biết:&nbsp;$(x-1)^4 = 16$.", options: ["A. $3$", "B. $-1$", "C. $\\pm 3$", "D. $3$&nbsp;hoặc&nbsp;$-1$"], correct_idx: 3, explain: "Ta có&nbsp;$(x-1)^4 = 2^4 = (-2)^4$. Suy ra&nbsp;$x-1 = 2 \\Rightarrow x=3$&nbsp;hoặc&nbsp;$x-1 = -2 \\Rightarrow x=-1$. Chọn D." },
{ q_title: "Câu 10", q_content: "Hai góc&nbsp;$\\angle A$&nbsp;và&nbsp;$\\angle B$&nbsp;phụ nhau. Nếu&nbsp;$\\angle A = 2 \\angle B$&nbsp;thì số đo góc&nbsp;$B$&nbsp;là:", options: ["A. $30^{\\circ}$", "B. $60^{\\circ}$", "C. $45^{\\circ}$", "D. $15^{\\circ}$"], correct_idx: 0, explain: "Hai góc phụ nhau có tổng bằng&nbsp;$90^{\\circ}$.&nbsp;$\\angle A + \\angle B = 90^{\\circ} \\Rightarrow 2\\angle B + \\angle B = 90^{\\circ} \\Rightarrow 3\\angle B = 90^{\\circ} \\Rightarrow \\angle B = 30^{\\circ}$. Chọn A." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về dãy số&nbsp;$S = 5 + 5^2 + 5^3 + \\dots + 5^{100}$:<br>(I) Tổng&nbsp;$S$&nbsp;có&nbsp;$100$&nbsp;số hạng.<br>(II)&nbsp;$S$&nbsp;chia hết cho&nbsp;$6$.<br>(III) Chữ số tận cùng của&nbsp;$S$&nbsp;là&nbsp;$0$.<br>Số mệnh đề ĐÚNG là:", options: ["A. $0$", "B. $1$", "C. $2$", "D. $3$"], correct_idx: 3, explain: "(I) Số mũ từ 1 đến 100 nên có 100 số hạng (Đúng). (II) Nhóm cặp $(5+5^2) + (5^3+5^4) + \\dots = 30 + 5^2\\cdot 30 + \\dots$ chia hết cho 6 (Đúng). (III) Có 50 cặp, mỗi cặp chia hết cho 30 nên chia hết cho 10, tận cùng là 0 (Đúng). Cả 3 đúng. Chọn D." },
{ q_title: "Câu 12", q_content: "Cho đoạn thẳng&nbsp;$AB = 12\\text{ cm}$. Trên tia&nbsp;$AB$&nbsp;lấy điểm&nbsp;$C$&nbsp;sao cho&nbsp;$AC = 4\\text{ cm}$. Gọi&nbsp;$M$&nbsp;là trung điểm của&nbsp;$BC$. Xét 3 mệnh đề sau:<br>(I) Độ dài đoạn&nbsp;$BC = 8\\text{ cm}$.<br>(II) Độ dài đoạn&nbsp;$AM = 8\\text{ cm}$.<br>(III) Điểm&nbsp;$C$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$M$.<br>Số mệnh đề ĐÚNG là:", options: ["A. $0$", "B. $1$", "C. $2$", "D. $3$"], correct_idx: 3, explain: "(I) C nằm giữa A, B nên BC = 12 - 4 = 8cm (Đúng). (II) M là trung điểm BC nên CM = 4cm. A, C, M thẳng hàng theo thứ tự đó nên AM = AC + CM = 4 + 4 = 8cm (Đúng). (III) Trên tia AB, AC < AM (4 < 8) nên C nằm giữa A, M (Đúng). Chọn D." }

{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Tính hợp lý:&nbsp;$A = \\dfrac{3}{1 \\cdot 4} + \\dfrac{3}{4 \\cdot 7} + \\dfrac{3}{7 \\cdot 10} + \\dots + \\dfrac{3}{97 \\cdot 100}$<br><br>b) Tìm các số nguyên&nbsp;$x, y$&nbsp;thỏa mãn phương trình:&nbsp;$xy - x + 2y = 10$", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Quan sát các mẫu số, khoảng cách giữa hai thừa số liên tiếp là bao nhiêu? ($4 - 1 = 3$).<br>- <b>Why:</b> Tử số hiện tại là $3$, đã bằng đúng khoảng cách ở mẫu số chưa? (Rồi).<br>- <b>How:</b> Khi tử số bằng hiệu hai thừa số dưới mẫu, ta áp dụng công thức sai phân trực tiếp $\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$ mà không cần phải nhân/chia thêm hệ số bên ngoài.<br><b>Ý b:</b><br>- <b>What:</b> Đây là phương trình nghiệm nguyên cần đưa về dạng tích: $(Đa \\ thức \\ 1) \\cdot (Đa \\ thức \\ 2) = Hằng \\ số$.<br>- <b>Where/When:</b> Khi nhóm 2 hạng tử đầu $xy - x$, ta rút được nhân tử chung là $x(y-1)$. Hạng tử còn lại là $+2y$.<br>- <b>How:</b> Làm sao để biến $+2y$ thành cụm chứa $(y-1)$? Ta viết thành $2(y-1) = 2y - 2$. Vậy ta đã tự ý trừ đi $2$ vào vế trái, do đó cũng phải trừ $2$ vào vế phải để giữ nguyên phương trình.", solution: "<li><b>a) Tính hợp lý giá trị biểu thức&nbsp;$A$:</b></li><li class='ml-4'>Áp dụng công thức sai phân, ta tách mỗi phân số thành hiệu của hai phân số đơn vị:</li><li class='ml-8'>$A = \\left(\\dfrac{1}{1} - \\dfrac{1}{4}\\right) + \\left(\\dfrac{1}{4} - \\dfrac{1}{7}\\right) + \\left(\\dfrac{1}{7} - \\dfrac{1}{10}\\right) + \\dots + \\left(\\dfrac{1}{97} - \\dfrac{1}{100}\\right)$</li><li class='ml-4'>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở phần giữa chuỗi:</li><li class='ml-8'>$A = 1 - \\dfrac{1}{100}$</li><li class='ml-4'>Quy đồng mẫu số và tính kết quả:</li><li class='ml-8'>$A = \\dfrac{100}{100} - \\dfrac{1}{100} = \\dfrac{99}{100}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a:&nbsp;$A = \\dfrac{99}{100}$.</li><li><b>b) Tìm các số nguyên&nbsp;$x, y$:</b></li><li class='ml-4'>Ta biến đổi phương trình&nbsp;$xy - x + 2y = 10$:</li><li class='ml-8'>$x(y - 1) + 2y = 10$</li><li class='ml-4'>Trừ $2$ vào cả hai vế để ép tạo nhân tử chung:</li><li class='ml-8'>$x(y - 1) + 2y - 2 = 10 - 2$</li><li class='ml-8'>$x(y - 1) + 2(y - 1) = 8$</li><li class='ml-8'>$(x + 2)(y - 1) = 8$</li><li class='ml-4'>Vì&nbsp;$x, y \\in \\mathbb{Z}$&nbsp;nên&nbsp;$(x+2)$&nbsp;và&nbsp;$(y-1)$&nbsp;phải là các số nguyên và là Ước của $8$.</li><li class='ml-4'>Tập hợp các ước của $8$ là: Ư$(8) = \\{-8; -4; -2; -1; 1; 2; 4; 8\\}$. Ta lập bảng xét các trường hợp:</li><li class='ml-8'>+ $x + 2 = 1 \\Rightarrow x = -1$. Khi đó&nbsp;$y - 1 = 8 \\Rightarrow y = 9$.</li><li class='ml-8'>+ $x + 2 = 8 \\Rightarrow x = 6$. Khi đó&nbsp;$y - 1 = 1 \\Rightarrow y = 2$.</li><li class='ml-8'>+ $x + 2 = 2 \\Rightarrow x = 0$. Khi đó&nbsp;$y - 1 = 4 \\Rightarrow y = 5$.</li><li class='ml-8'>+ $x + 2 = 4 \\Rightarrow x = 2$. Khi đó&nbsp;$y - 1 = 2 \\Rightarrow y = 3$.</li><li class='ml-8'>+ $x + 2 = -1 \\Rightarrow x = -3$. Khi đó&nbsp;$y - 1 = -8 \\Rightarrow y = -7$.</li><li class='ml-8'>+ $x + 2 = -8 \\Rightarrow x = -10$. Khi đó&nbsp;$y - 1 = -1 \\Rightarrow y = 0$.</li><li class='ml-8'>+ $x + 2 = -2 \\Rightarrow x = -4$. Khi đó&nbsp;$y - 1 = -4 \\Rightarrow y = -3$.</li><li class='ml-8'>+ $x + 2 = -4 \\Rightarrow x = -6$. Khi đó&nbsp;$y - 1 = -2 \\Rightarrow y = -1$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Có 8 cặp số&nbsp;$(x; y)$&nbsp;thỏa mãn như trên.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Chứng minh rằng phân số&nbsp;$\\dfrac{3n+1}{4n+1}$&nbsp;là phân số tối giản với mọi&nbsp;$n \\in \\mathbb{N}$.<br><br>b) Tìm các số tự nhiên&nbsp;$n$&nbsp;để biểu thức&nbsp;$n^2 + 2n + 6$&nbsp;chia hết cho&nbsp;$n + 4$.", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Bài toán chứng minh phân số luôn tối giản. Cần chứng minh Ước chung lớn nhất ($d$) của tử và mẫu bằng $1$.<br>- <b>How:</b> Gọi $d$ là ƯCLN. Làm sao để loại bỏ ẩn $n$ bằng phép toán trừ đa thức?<br>- <b>Why:</b> Hệ số của $n$ ở tử là $3$, ở mẫu là $4$. Tại sao ta lại nhân tử số với $4$ và nhân mẫu số với $3$? (Vì BCNN của $3$ và $4$ là $12$, khi nhân như vậy cả hai biểu thức đều xuất hiện $12n$, lấy hiệu sẽ triệt tiêu hoàn toàn biến $n$).<br><b>Ý b:</b><br>- <b>What:</b> Để đa thức bậc 2 chia hết cho đa thức bậc 1, ta cần phân tích biểu thức bị chia sao cho xuất hiện phần chứa đa thức chia.<br>- <b>How:</b> Biểu thức là $n^2 + 2n + 6$. Làm thế nào để phân tích nó thành một cụm chứa $(n+4)$?<br>- <b>Where:</b> Ta có thể tách: $n^2 + 2n = n(n+2) = n(n+4 - 2) = n(n+4) - 2n$. Cụm $-2n$ lại tách tiếp thành $-2(n+4) + 8$. Kết hợp với hằng số $6$ ban đầu: Tổng dư sẽ là $8 + 6 = 14$. Phần dư này chính là 'chìa khóa' để giải bài.", solution: "<li><b>a) Chứng minh phân số tối giản:</b></li><li class='ml-4'>Gọi&nbsp;$d = \\text{ƯCLN}(3n+1, 4n+1)$&nbsp;với&nbsp;$d \\in \\mathbb{N}^*$. Khi đó, tử và mẫu đều phải chia hết cho $d$:</li><li class='ml-8'>$(3n + 1) \\vdots d \\Rightarrow 4 \\cdot (3n + 1) \\vdots d \\Rightarrow (12n + 4) \\vdots d$</li><li class='ml-8'>$(4n + 1) \\vdots d \\Rightarrow 3 \\cdot (4n + 1) \\vdots d \\Rightarrow (12n + 3) \\vdots d$</li><li class='ml-4'>Lấy biểu thức thứ nhất trừ đi biểu thức thứ hai, hiệu của chúng cũng phải chia hết cho $d$:</li><li class='ml-8'>$[(12n + 4) - (12n + 3)] \\vdots d \\Rightarrow 1 \\vdots d$</li><li class='ml-4'>Vì $d$ là số nguyên dương và $1$ chia hết cho $d$ nên bắt buộc $d = 1$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Kết luận a: ƯCLN của tử và mẫu bằng 1, nên phân số luôn tối giản với mọi $n \\in \\mathbb{N}$.</li><li><b>b) Tìm số tự nhiên&nbsp;$n$:</b></li><li class='ml-4'>Ta phân tích biểu thức bị chia:</li><li class='ml-8'>$n^2 + 2n + 6$</li><li class='ml-8'>$= n^2 + 4n - 2n - 8 + 14$</li><li class='ml-8'>$= n(n + 4) - 2(n + 4) + 14$</li><li class='ml-8'>$= (n - 2)(n + 4) + 14$</li><li class='ml-4'>Để&nbsp;$(n^2 + 2n + 6)$&nbsp;chia hết cho&nbsp;$(n + 4)$&nbsp;thì:</li><li class='ml-8'>$[(n - 2)(n + 4) + 14] \\vdots (n + 4)$</li><li class='ml-4'>Vì cụm&nbsp;$(n - 2)(n + 4)$&nbsp;đã chứa thừa số $(n+4)$ nên nó luôn chia hết cho $(n+4)$. Do đó, bắt buộc phần dư $14$ phải chia hết cho $(n+4)$.</li><li class='ml-4'>Suy ra&nbsp;$(n + 4)$&nbsp;phải là Ước của $14$. Vì&nbsp;$n \\in \\mathbb{N}$&nbsp;nên&nbsp;$n \\ge 0 \\Rightarrow n + 4 \\ge 4$.</li><li class='ml-4'>Các ước của $14$ lớn hơn hoặc bằng $4$ là: $7$ và $14$.</li><li class='ml-8'>+ Nếu&nbsp;$n + 4 = 7 \\Rightarrow n = 3$&nbsp;(Thỏa mãn)</li><li class='ml-8'>+ Nếu&nbsp;$n + 4 = 14 \\Rightarrow n = 10$&nbsp;(Thỏa mãn)</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Các số tự nhiên cần tìm là&nbsp;$n \\in \\{3; 10\\}$.</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Một cửa hàng bán hạt điều tươi chứa&nbsp;$40\\%$&nbsp;nước. Sau khi phơi khô, lượng nước trong hạt điều khô chỉ còn chiếm&nbsp;$10\\%$&nbsp;khối lượng.<br>a) Khi phơi&nbsp;$150\\text{ kg}$&nbsp;hạt điều tươi thì thu được bao nhiêu kg hạt điều khô?<br>b) Nếu cửa hàng muốn có&nbsp;$1,2$&nbsp;tạ hạt điều khô thì cần thu mua bao nhiêu kg hạt điều tươi?", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Bài toán thuộc dạng tính toán khối lượng của hỗn hợp hạt tươi và hạt khô trong quá trình bốc hơi nước.<br>- <b>Why:</b> Đại lượng nào bị bốc hơi và đại lượng nào luôn được bảo toàn? (Chỉ có nước bị bốc hơi, **khối lượng chất rắn nguyên chất luôn được giữ nguyên**).<br>- <b>How:</b> Làm thế nào để tìm được khối lượng chất rắn trong $150\\text{kg}$ hạt tươi? (Lấy $100\\% - 40\\%$). Khối lượng chất rắn này chiếm bao nhiêu phần trăm trong hạt khô? ($100\\% - 10\\% = 90\\%$). Từ đó dùng phép chia để ra khối lượng khô.<br><b>Ý b:</b><br>- <b>What:</b> Đây là quy trình tính ngược. Cho thành phẩm khô, hỏi nguyên liệu tươi.<br>- <b>Where:</b> Cạm bẫy nằm ở đơn vị đo. Đề cho \"tạ\", nhưng hỏi \"kg\". Phải đổi $1,2$ tạ = $120\\text{kg}$ trước khi tính toán.", solution: "<li><b>a) Tính khối lượng hạt điều khô thu được:</b></li><li class='ml-4'>Tỉ lệ chất rắn (phần hạt nguyên chất không chứa nước) trong hạt điều tươi là:</li><li class='ml-8'>$100\\% - 40\\% = 60\\%$</li><li class='ml-4'>Khối lượng chất rắn có trong $150\\text{ kg}$ hạt điều tươi là:</li><li class='ml-8'>$150 \\cdot 60\\% = 150 \\cdot \\dfrac{60}{100} = 90\\text{ (kg)}$</li><li class='ml-4'>Tỉ lệ chất rắn có trong hạt điều khô là:</li><li class='ml-8'>$100\\% - 10\\% = 90\\%$</li><li class='ml-4'>Vì khối lượng chất rắn không đổi trong toàn bộ quá trình phơi, nên khối lượng hạt điều khô thu được là:</li><li class='ml-8'>$90 : 90\\% = 90 : \\dfrac{90}{100} = 100\\text{ (kg)}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Thu được $100\\text{ kg}$ hạt điều khô.</li><li><b>b) Tính khối lượng hạt điều tươi cần thu mua:</b></li><li class='ml-4'>Đổi đơn vị:&nbsp;$1,2\\text{ tạ} = 120\\text{ kg}$.</li><li class='ml-4'>Khối lượng chất rắn nguyên chất cần có trong $120\\text{ kg}$ hạt điều khô là:</li><li class='ml-8'>$120 \\cdot 90\\% = 120 \\cdot \\dfrac{90}{100} = 108\\text{ (kg)}$</li><li class='ml-4'>Để có đủ $108\\text{ kg}$ chất rắn này, khối lượng hạt điều tươi cần thu mua là:</li><li class='ml-8'>$108 : 60\\% = 108 : \\dfrac{60}{100} = 180\\text{ (kg)}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Cần thu mua $180\\text{ kg}$ hạt điều tươi.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Cho hai tia&nbsp;$Oy$&nbsp;và&nbsp;$Oz$&nbsp;cùng nằm trên một nửa mặt phẳng có bờ chứa tia&nbsp;$Ox$. Biết&nbsp;$\\angle xOy = 30^{\\circ}, \\angle xOz = 150^{\\circ}$.<br>a) Tia&nbsp;$Oy$&nbsp;có nằm giữa hai tia&nbsp;$Ox$&nbsp;và&nbsp;$Oz$&nbsp;không? Vì sao?<br>b) Tính số đo góc&nbsp;$\\angle yOz$.<br>c) Vẽ tia&nbsp;$Om$&nbsp;là tia phân giác của góc&nbsp;$\\angle yOz$. Chứng tỏ rằng góc&nbsp;$\\angle xOm$&nbsp;là một góc vuông.<div class='flex justify-center my-8'><svg width='300' height='160' viewBox='0 0 300 160'><circle cx='150' cy='150' r='3' fill='black'/><text x='145' y='165' font-size='14' font-weight='bold'>O</text><line x1='150' y1='150' x2='290' y2='150' stroke='black' stroke-width='1.5'/><text x='285' y='165' font-size='14' font-style='italic'>x</text><line x1='150' y1='150' x2='271' y2='80' stroke='black' stroke-width='1.5'/><text x='275' y='75' font-size='14' font-style='italic'>y</text><line x1='150' y1='150' x2='29' y2='80' stroke='black' stroke-width='1.5'/><text x='20' y='75' font-size='14' font-style='italic'>z</text><line x1='150' y1='150' x2='150' y2='20' stroke='red' stroke-width='1.5' stroke-dasharray='4'/><text x='140' y='15' font-size='14' font-style='italic' fill='red'>m</text><path d='M 200 150 A 50 50 0 0 0 193 125' fill='none' stroke='blue' stroke-width='1'/><text x='210' y='140' font-size='10' fill='blue'>30°</text></svg></div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Để xác định tia nào nằm giữa trên cùng một nửa mặt phẳng, ta dùng định lý nào? (So sánh số đo các góc có chung cạnh bờ).<br>- <b>How:</b> So sánh góc $\\angle xOy$ ($30^{\\circ}$) và góc $\\angle xOz$ ($150^{\\circ}$).<br><b>Ý b:</b><br>- <b>Why:</b> Vì tia $Oy$ nằm giữa hai tia còn lại, ta sẽ thiết lập được phương trình cộng góc: $\\angle xOy + \\angle yOz = \\angle xOz$.<br><b>Ý c:</b><br>- <b>What:</b> Tia phân giác $Om$ chia góc $\\angle yOz$ làm 2 phần bằng nhau. Cần tính được $\\angle yOm$.<br>- <b>How:</b> Góc $\\angle xOm$ được cấu thành từ tổng của hai góc nào? (Chính là $\\angle xOy + \\angle yOm$). Phép cộng này có ra đúng $90^{\\circ}$ không?", solution: "<li><b>a) Tia Oy có nằm giữa hai tia Ox và Oz không?</b></li><li class='ml-4'>Trên cùng một nửa mặt phẳng bờ chứa tia $Ox$, ta có hai góc:</li><li class='ml-8'>$\\angle xOy = 30^{\\circ}$</li><li class='ml-8'>$\\angle xOz = 150^{\\circ}$</li><li class='ml-4'>Vì $\\angle xOy < \\angle xOz$ ($30^{\\circ} < 150^{\\circ}$) nên <b>tia&nbsp;$Oy$&nbsp;nằm giữa hai tia&nbsp;$Ox$&nbsp;và&nbsp;$Oz$</b>.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Kết luận a: Tia $Oy$ có nằm giữa hai tia $Ox$ và $Oz$.</li><li><b>b) Tính số đo góc&nbsp;$\\angle yOz$:</b></li><li class='ml-4'>Vì tia $Oy$ nằm giữa hai tia $Ox$ và $Oz$ nên ta có công thức cộng góc:</li><li class='ml-8'>$\\angle xOy + \\angle yOz = \\angle xOz$</li><li class='ml-8'>$30^{\\circ} + \\angle yOz = 150^{\\circ}$</li><li class='ml-8'>$\\angle yOz = 150^{\\circ} - 30^{\\circ} = 120^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $\\angle yOz = 120^{\\circ}$.</li><li><b>c) Chứng tỏ góc&nbsp;$\\angle xOm$&nbsp;là góc vuông:</b></li><li class='ml-4'>Vì tia $Om$ là tia phân giác của góc $\\angle yOz$ nên:</li><li class='ml-8'>$\\angle yOm = \\angle zOm = \\dfrac{\\angle yOz}{2} = \\dfrac{120^{\\circ}}{2} = 60^{\\circ}$.</li><li class='ml-4'>Về vị trí các tia: Tia $Oy$ nằm giữa tia $Ox$ và $Oz$. Tia phân giác $Om$ nằm trong góc $\\angle yOz$ (tức là nằm giữa $Oy$ và $Oz$).</li><li class='ml-4'>Theo thứ tự xếp trên nửa mặt phẳng, ta có $Ox \\rightarrow Oy \\rightarrow Om \\rightarrow Oz$. Do đó, **tia&nbsp;$Oy$&nbsp;nằm giữa hai tia&nbsp;$Ox$&nbsp;và&nbsp;$Om$**.</li><li class='ml-4'>Khi đó ta áp dụng công thức cộng góc:</li><li class='ml-8'>$\\angle xOm = \\angle xOy + \\angle yOm$</li><li class='ml-8'>$\\angle xOm = 30^{\\circ} + 60^{\\circ} = 90^{\\circ}$.</li><li class='ml-4'>Vì góc $\\angle xOm$ có số đo bằng $90^{\\circ}$ nên đây là một góc vuông.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận c: Đã chứng minh $\\angle xOm$ là góc vuông.</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "(Nguyên lý Dirichlet) Chứng minh rằng trong 52 số nguyên bất kỳ, luôn tìm được hai số sao cho tổng hoặc hiệu của chúng chia hết cho 100.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Có 52 số nguyên, muốn chứng minh có 2 số mà tổng hoặc hiệu chia hết cho 100.<br>- <b>Why:</b> Khi chia một số nguyên cho 100, có bao nhiêu loại số dư? (100 loại, từ 0 đến 99).<br>- <b>How:</b> Để tạo ra tổng hoặc hiệu chia hết cho 100, ta phải bắt cặp các số dư sao cho chúng có tổng bằng 100 hoặc bằng nhau (hiệu bằng 0).<br>- <b>Where:</b> Các nhóm (lồng thỏ) sẽ được chia như thế nào? Nhóm độc lập: $\\{0\\}$ (dư 0). Nhóm độc lập $\\{50\\}$ (dư 50). Các nhóm cặp bù nhau: $\\{1; 99\\}, \\{2; 98\\}, \\dots, \\{49; 51\\}$.<br>- Đếm xem có tổng cộng bao nhiêu nhóm? (Có 51 nhóm). Áp dụng Dirichlet cho 52 con thỏ!", solution: "<li>Một số nguyên khi chia cho $100$ sẽ có $1$ trong $100$ số dư là: $0, 1, 2, \\dots, 99$.</li><li>Ta phân chia $100$ số dư này thành $51$ nhóm (đóng vai trò là $51$ chiếc lồng) như sau:</li><li class='ml-8'>- Nhóm 1: $\\{0\\}$</li><li class='ml-8'>- Nhóm 2: $\\{50\\}$</li><li class='ml-8'>- $49$ nhóm cặp có tổng bằng $100$: $\\{1; 99\\}, \\{2; 98\\}, \\{3; 97\\}, \\dots, \\{49; 51\\}$.</li><li>Theo đề bài, ta có $52$ số nguyên bất kỳ (đóng vai trò là $52$ con thỏ).</li><li>Theo Nguyên lý Dirichlet, khi phân phối $52$ con thỏ vào $51$ chiếc lồng, chắc chắn tồn tại ít nhất $1$ lồng chứa từ $2$ con thỏ trở lên. Gọi hai số đó là $a$ và $b$.</li><li>Xảy ra hai trường hợp:</li><li class='ml-4'><b>Trường hợp 1:</b> Hai số $a$ và $b$ cùng rơi vào Nhóm 1, Nhóm 2 hoặc có <b>cùng một số dư</b> trong một nhóm cặp. Lúc này, $a$ và $b$ có cùng số dư khi chia cho $100$. Suy ra hiệu $(a - b)$ chia hết cho $100$.</li><li class='ml-4'><b>Trường hợp 2:</b> Hai số $a$ và $b$ rơi vào cùng một nhóm cặp (ví dụ nhóm $\\{1; 99\\}$) nhưng mang hai số dư <b>khác nhau</b>. Một số sẽ chia $100$ dư $1$, số kia chia $100$ dư $99$. Lúc này, tổng của hai số dư là $1 + 99 = 100$. Suy ra tổng $(a + b)$ chia hết cho $100$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Trong mọi trường hợp, từ 52 số nguyên bất kỳ, luôn tìm được hai số sao cho tổng hoặc hiệu của chúng chia hết cho 100.</li>" }

id: 6, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 06", icon: "💎", color: "indigo", level: "Học sinh giỏi", time: "150 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Biết&nbsp;$\\dfrac{a}{b} = \\dfrac{c}{d}$&nbsp;(với&nbsp;$a, b, c, d \\neq 0$). Khẳng định nào sau đây chắc chắn ĐÚNG?", options: ["A. $\\dfrac{a}{c} = \\dfrac{d}{b}$", "B. $\\dfrac{a+b}{b} = \\dfrac{c+d}{d}$", "C. $a+d = b+c$", "D. $a \\cdot c = b \\cdot d$"], correct_idx: 1, explain: "Áp dụng tính chất của tỉ lệ thức, từ&nbsp;$\\dfrac{a}{b} = \\dfrac{c}{d}$&nbsp;cộng 1 vào cả hai vế ta được&nbsp;$\\dfrac{a}{b} + 1 = \\dfrac{c}{d} + 1 \\Rightarrow \\dfrac{a+b}{b} = \\dfrac{c+d}{d}$. Khẳng định B đúng. (Chú ý A sai vì phải là&nbsp;$\\dfrac{a}{c} = \\dfrac{b}{d}$). Chọn B." },
{ q_title: "Câu 2", q_content: "Ước chung lớn nhất của&nbsp;$2^n - 1$&nbsp;và&nbsp;$2^{n+1} - 1$&nbsp;(với&nbsp;$n \\in \\mathbb{N}^*$) là:", options: ["A. 1", "B. 2", "C. $2^n - 1$", "D. Không xác định"], correct_idx: 0, explain: "Gọi&nbsp;$d = ƯCLN(2^{n+1}-1, 2^n-1)$. Ta có&nbsp;$(2^{n+1}-1) \\vdots d$&nbsp;và&nbsp;$(2^n-1) \\vdots d \\Rightarrow 2(2^n-1) \\vdots d \\Rightarrow (2^{n+1}-2) \\vdots d$. Trừ hai biểu thức ta có&nbsp;$(2^{n+1}-1) - (2^{n+1}-2) = 1 \\vdots d \\Rightarrow d = 1$. Chọn A." },
{ q_title: "Câu 3", q_content: "Tìm số nguyên âm&nbsp;$x$&nbsp;thỏa mãn&nbsp;$\\dfrac{x}{4} = \\dfrac{49}{x}$:", options: ["A. 14", "B. -14", "C. -196", "D. -7"], correct_idx: 1, explain: "Nhân chéo ta được&nbsp;$x \\cdot x = 4 \\cdot 49 \\Rightarrow x^2 = 196$. Vì&nbsp;$x$&nbsp;là số nguyên âm nên&nbsp;$x = -14$. Chọn B." },
{ q_title: "Câu 4", q_content: "Giá trị nhỏ nhất của biểu thức&nbsp;$A = |x - 2024| + |x - 2025|$&nbsp;là:", options: ["A. 0", "B. 1", "C. 2024", "D. 2025"], correct_idx: 1, explain: "Áp dụng bất đẳng thức&nbsp;$|A| + |B| \\ge |A+B|$, ta có:&nbsp;$|x - 2024| + |2025 - x| \\ge |x - 2024 + 2025 - x| = 1$. Vậy giá trị nhỏ nhất là 1 khi&nbsp;$2024 \\le x \\le 2025$. Chọn B." },
{ q_title: "Câu 5", q_content: "Một cửa hàng lãi&nbsp;$25\\%$&nbsp;theo giá vốn. Hỏi cửa hàng đó lãi bao nhiêu phần trăm theo giá bán?", options: ["A. $25\\%$", "B. $20\\%$", "C. $33,33\\%$", "D. $15\\%$"], correct_idx: 1, explain: "Coi giá vốn là 100 phần thì tiền lãi là 25 phần. Khi đó giá bán là&nbsp;$100 + 25 = 125$&nbsp;phần. Tỉ lệ lãi so với giá bán là&nbsp;$25 : 125 = \\dfrac{1}{5} = 20\\%$. Chọn B." },
{ q_title: "Câu 6", q_content: "Chữ số tận cùng của&nbsp;$S = 4^1 + 4^2 + 4^3 + \\dots + 4^{2024}$&nbsp;là:", options: ["A. 0", "B. 4", "C. 6", "D. 2"], correct_idx: 0, explain: "Chuỗi lũy thừa của 4 có chu kỳ tận cùng là 4, 6. Ghép thành các cặp&nbsp;$(4^1 + 4^2)$&nbsp;có tận cùng là&nbsp;$4+6=10$&nbsp;(tận cùng 0). Có tổng cộng 2024 số hạng chia hết cho 2, tạo thành 1012 cặp. Vậy tận cùng của tổng là 0. Chọn A." },
{ q_title: "Câu 7", q_content: "Một tàu hỏa chạy qua một cột điện mất&nbsp;$10$&nbsp;giây, và chạy qua một chiếc cầu dài&nbsp;$500\\text{m}$&nbsp;mất&nbsp;$35$&nbsp;giây. Chiều dài của con tàu là:", options: ["A. $100\\text{m}$", "B. $200\\text{m}$", "C. $250\\text{m}$", "D. $150\\text{m}$"], correct_idx: 1, explain: "Tàu chạy qua cột điện mất 10s nghĩa là tàu chạy được đoạn đường bằng chiều dài tàu (L) trong 10s. Tàu qua cầu mất 35s nghĩa là chạy được L + 500m trong 35s. Vậy thời gian chạy 500m là&nbsp;$35 - 10 = 25$&nbsp;giây. Vận tốc là&nbsp;$500/25 = 20\\text{m/s}$. Chiều dài tàu là&nbsp;$L = 20 \\cdot 10 = 200\\text{m}$. Chọn B." },
{ q_title: "Câu 8", q_content: "Số các ước tự nhiên của&nbsp;$120$&nbsp;là:", options: ["A. 12", "B. 16", "C. 10", "D. 8"], correct_idx: 1, explain: "Phân tích ra thừa số nguyên tố:&nbsp;$120 = 2^3 \\cdot 3^1 \\cdot 5^1$. Số các ước tự nhiên là&nbsp;$(3+1)(1+1)(1+1) = 4 \\cdot 2 \\cdot 2 = 16$. Chọn B." },
{ q_title: "Câu 9", q_content: "Cho&nbsp;$\\angle xOy = 80^{\\circ}$. Vẽ tia&nbsp;$Oz$&nbsp;sao cho&nbsp;$\\angle xOz = 30^{\\circ}$. Số đo&nbsp;$\\angle yOz$&nbsp;có thể là:", options: ["A. $50^{\\circ}$", "B. $110^{\\circ}$", "C. Cả A và B đều đúng", "D. $30^{\\circ}$"], correct_idx: 2, explain: "Tia Oz có thể nằm giữa tia Ox, Oy (khi đó $\\angle yOz = 80-30=50^{\\circ}$) hoặc nằm ngoài góc xOy (khi đó $\\angle yOz = 80+30=110^{\\circ}$). Chọn C." },
{ q_title: "Câu 10", q_content: "Số nguyên tố có dạng&nbsp;$2^n - 1$&nbsp;($n \\in \\mathbb{N}$) được gọi là số nguyên tố Mersenne. Với&nbsp;$n=5$, giá trị đó là:", options: ["A. 3", "B. 7", "C. 31", "D. 127"], correct_idx: 2, explain: "Thay&nbsp;$n=5$&nbsp;vào ta được&nbsp;$2^5 - 1 = 32 - 1 = 31$. Số 31 là số nguyên tố. Chọn C." },
{ q_title: "Câu 11", q_content: "Cho phân số&nbsp;$P = \\dfrac{21n + 4}{14n + 3}$&nbsp;với&nbsp;$n \\in \\mathbb{N}$. Xét 3 mệnh đề sau:<br>(I) Với&nbsp;$n = 1$, phân số&nbsp;$P$&nbsp;có thể rút gọn được.<br>(II) ƯCLN của tử số và mẫu số luôn bằng 1 với mọi&nbsp;$n$.<br>(III) Tồn tại ít nhất một giá trị&nbsp;$n$&nbsp;để&nbsp;$P$&nbsp;là một số nguyên.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 1, explain: "(I) Thay n=1 ta được P=25/17. 25 và 17 nguyên tố cùng nhau nên không rút gọn được (Sai). (II) Gọi d là ƯCLN. Ta có $3(14n+3) - 2(21n+4) = 42n+9 - 42n-8 = 1 \\vdots d \\Rightarrow d=1$ (Đúng). (III) Vì P luôn tối giản nên P là số nguyên khi mẫu là 1, tức $14n+3=1 \\Rightarrow n = -1/7$ không thuộc N. (Sai). Vậy chỉ có 1 mệnh đề đúng. Chọn B." },
{ q_title: "Câu 12", q_content: "Cho đường thẳng&nbsp;$xy$. Lấy điểm&nbsp;$O$&nbsp;trên đường thẳng đó. Lấy điểm&nbsp;$A$&nbsp;thuộc tia&nbsp;$Ox$, điểm&nbsp;$B$&nbsp;thuộc tia&nbsp;$Oy$. Xét 3 mệnh đề sau:<br>(I) Điểm&nbsp;$O$&nbsp;luôn nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$.<br>(II) Hai tia&nbsp;$OA$&nbsp;và&nbsp;$OB$&nbsp;là hai tia trùng nhau.<br>(III) Nếu&nbsp;$OA = OB$&nbsp;thì&nbsp;$O$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Vì Ox, Oy là 2 tia đối nhau, A thuộc Ox, B thuộc Oy nên O luôn nằm giữa A và B (Đúng). (II) OA, OB là 2 tia đối nhau, không phải trùng nhau (Sai). (III) O nằm giữa và OA=OB thì O là trung điểm (Đúng). Có 2 mệnh đề đúng. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Tính giá trị biểu thức sau:&nbsp;$B = \\dfrac{2}{3 \\cdot 5} + \\dfrac{2}{5 \\cdot 7} + \\dfrac{2}{7 \\cdot 9} + \\dots + \\dfrac{2}{99 \\cdot 101}$<br><br>b) Tìm các cặp số nguyên&nbsp;$x, y$&nbsp;thỏa mãn phương trình:&nbsp;$(x + 1)(y - 2) = 5$", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Nhận diện quy luật của mẫu số: Khoảng cách giữa hai thừa số liên tiếp là bao nhiêu? ($5-3=2, 7-5=2$).<br>- <b>Why:</b> Tử số hiện tại được cho sẵn là số $2$. Tại sao điều này lại rất thuận lợi? (Vì tử số bằng đúng hiệu hai thừa số dưới mẫu).<br>- <b>How:</b> Khi tử số khớp với khoảng cách ở mẫu, ta áp dụng ngay công thức sai phân trực tiếp $\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$. Bung chuỗi ra và triệt tiêu các phân số đối nhau ở giữa.<br><b>Ý b:</b><br>- <b>What:</b> Phương trình đang ở dạng tích $(Đa \\ thức \\ 1) \\cdot (Đa \\ thức \\ 2) = Hằng \\ số$.<br>- <b>Where:</b> Vì $x, y$ là số nguyên, ta suy ra ngay cụm $(x+1)$ và $(y-2)$ phải có mối quan hệ gì với hằng số $5$? (Phải là Ước của 5).<br>- <b>How:</b> Lập bảng xét tất cả các ước nguyên của $5$ (gồm $\\pm 1, \\pm 5$) để tìm các cặp giá trị $(x, y)$ tương ứng.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$B$:</b></li><li class='ml-4'>Ta xét biểu thức:</li><li class='ml-8'>$B = \\dfrac{2}{3 \\cdot 5} + \\dfrac{2}{5 \\cdot 7} + \\dfrac{2}{7 \\cdot 9} + \\dots + \\dfrac{2}{99 \\cdot 101}$</li><li class='ml-4'>Áp dụng công thức sai phân, ta tách mỗi phân số thành hiệu:</li><li class='ml-8'>$B = \\left(\\dfrac{1}{3} - \\dfrac{1}{5}\\right) + \\left(\\dfrac{1}{5} - \\dfrac{1}{7}\\right) + \\left(\\dfrac{1}{7} - \\dfrac{1}{9}\\right) + \\dots + \\left(\\dfrac{1}{99} - \\dfrac{1}{101}\\right)$</li><li class='ml-4'>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở giữa chuỗi:</li><li class='ml-8'>$B = \\dfrac{1}{3} - \\dfrac{1}{101}$</li><li class='ml-4'>Quy đồng mẫu số chung là $303$:</li><li class='ml-8'>$B = \\dfrac{101}{303} - \\dfrac{3}{303} = \\dfrac{98}{303}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a:&nbsp;$B = \\dfrac{98}{303}$.</li><li><b>b) Tìm các cặp số nguyên&nbsp;$x, y$:</b></li><li class='ml-4'>Ta có phương trình:</li><li class='ml-8'>$(x + 1)(y - 2) = 5$</li><li class='ml-4'>Vì $x, y \\in \\mathbb{Z}$ nên $(x+1)$ và $(y-2)$ phải là các số nguyên và là Ước của $5$.</li><li class='ml-4'>Tập hợp các ước của $5$ là: Ư$(5) = \\{-5; -1; 1; 5\\}$. Ta lập bảng xét các trường hợp:</li><li class='ml-8'>+ $x + 1 = 1 \\Rightarrow x = 0$. Khi đó&nbsp;$y - 2 = 5 \\Rightarrow y = 7$.</li><li class='ml-8'>+ $x + 1 = 5 \\Rightarrow x = 4$. Khi đó&nbsp;$y - 2 = 1 \\Rightarrow y = 3$.</li><li class='ml-8'>+ $x + 1 = -1 \\Rightarrow x = -2$. Khi đó&nbsp;$y - 2 = -5 \\Rightarrow y = -3$.</li><li class='ml-8'>+ $x + 1 = -5 \\Rightarrow x = -6$. Khi đó&nbsp;$y - 2 = -1 \\Rightarrow y = 1$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Có 4 cặp số&nbsp;$(x; y)$&nbsp;thỏa mãn là: $(0; 7), (4; 3), (-2; -3), (-6; 1)$.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Tìm các chữ số&nbsp;$x, y$&nbsp;để số&nbsp;$\\overline{1x2y}$&nbsp;chia hết cho cả&nbsp;$5$&nbsp;và&nbsp;$9$&nbsp;nhưng không chia hết cho&nbsp;$2$.<br><br>b) Cho&nbsp;$a, b$&nbsp;là các số tự nhiên. Chứng minh rằng nếu&nbsp;$a^2 + b^2$&nbsp;chia hết cho&nbsp;$3$&nbsp;thì cả&nbsp;$a$&nbsp;và&nbsp;$b$&nbsp;đều chia hết cho&nbsp;$3$.", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Tìm các chữ số trong một cấu trúc số để thỏa mãn đa điều kiện chia hết.<br>- <b>Where/When:</b> Trong các dấu hiệu chia hết, ta phải giải quyết dấu hiệu nào trước? (Dấu hiệu chia hết cho $5$ và cho $2$ phụ thuộc vào chữ số tận cùng $y$, nên phải làm trước).<br>- <b>Why:</b> Để chia hết cho $5$ mà KHÔNG chia hết cho $2$ (tức là số lẻ), chữ số tận cùng $y$ bắt buộc phải là số mấy? (Số $5$).<br>- <b>How:</b> Sau khi chốt $y=5$, thay vào số ban đầu và áp dụng dấu hiệu chia hết cho $9$ (Tổng các chữ số chia hết cho 9) để lập phương trình tìm $x$.<br><b>Ý b:</b><br>- <b>What:</b> Xét tính chia hết của bình phương một số tự nhiên cho $3$.<br>- <b>How:</b> Lấy một số tự nhiên bất kỳ chia cho $3$, số dư có thể là $0, 1, 2$. Hãy thử bình phương các số dư này lên. $\\Rightarrow$ Số chính phương khi chia cho $3$ chỉ có thể dư $0$ hoặc dư $1$.<br>- <b>Why:</b> Nếu $a^2$ và $b^2$ đều không chia hết cho $3$ (nghĩa là cùng dư $1$), thì tổng $a^2 + b^2$ sẽ chia $3$ dư bao nhiêu? (Dư 2). Điều này có mâu thuẫn với giả thiết đề bài không? (Có). Từ đó dùng phản chứng ép buộc cả hai số phải chia hết cho 3.", solution: "<li><b>a) Tìm các chữ số&nbsp;$x, y$:</b></li><li class='ml-4'>Để số $\\overline{1x2y}$ chia hết cho $5$, chữ số tận cùng $y$ phải là $0$ hoặc $5$.</li><li class='ml-4'>Mặt khác, đề bài yêu cầu số này KHÔNG chia hết cho $2$, nghĩa là nó phải là một số lẻ.</li><li class='ml-4'>Do đó, chữ số tận cùng $y$ không thể bằng $0$. Bắt buộc $y = 5$.</li><li class='ml-4'>Thay $y = 5$ vào, ta được số $\\overline{1x25}$.</li><li class='ml-4'>Để số $\\overline{1x25}$ chia hết cho $9$, thì tổng các chữ số của nó phải chia hết cho $9$. Ta có tổng:</li><li class='ml-8'>$1 + x + 2 + 5 = 8 + x$</li><li class='ml-4'>Vì $x$ là chữ số ($0 \\le x \\le 9$) nên tổng $(8 + x)$ nằm trong khoảng từ $8$ đến $17$.</li><li class='ml-4'>Giá trị duy nhất chia hết cho $9$ trong khoảng này là $9$. Suy ra:</li><li class='ml-8'>$8 + x = 9 \\Rightarrow x = 1$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Các chữ số cần tìm là $x = 1, y = 5$. Số đó là $1125$.</li><li><b>b) Chứng minh bằng lập luận số dư:</b></li><li class='ml-4'>Một số tự nhiên khi chia cho $3$ chỉ có thể nhận 1 trong 3 số dư là: $0, 1, 2$.</li><li class='ml-4'>Ta xét bình phương của các trường hợp số dư:</li><li class='ml-8'>- Nếu số đó chia hết cho $3$ (dư $0$), thì bình phương chia $3$ dư $0$.</li><li class='ml-8'>- Nếu số đó chia $3$ dư $1$, thì bình phương chia $3$ dư $1^2 = 1$.</li><li class='ml-8'>- Nếu số đó chia $3$ dư $2$, thì bình phương chia $3$ dư $2^2 = 4$. (Mà $4$ chia $3$ dư $1$).</li><li class='ml-4'>Như vậy, bình phương của một số tự nhiên bất kỳ khi chia cho $3$ **chỉ có thể dư** $0$ **hoặc dư** $1$.</li><li class='ml-4'>Theo giả thiết, tổng $(a^2 + b^2)$ chia hết cho $3$. Ta xét các khả năng ghép cặp số dư của $a^2$ và $b^2$:</li><li class='ml-8'>- Nếu $a^2$ dư $1$ và $b^2$ dư $1$, thì tổng $(a^2 + b^2)$ sẽ chia $3$ dư $2$ (Mâu thuẫn với giả thiết chia hết).</li><li class='ml-8'>- Nếu một số dư $1$, một số dư $0$, thì tổng sẽ chia $3$ dư $1$ (Mâu thuẫn với giả thiết chia hết).</li><li class='ml-4'>Do đó, để tổng $(a^2 + b^2)$ chia hết cho $3$, khả năng duy nhất là cả $a^2$ và $b^2$ đều phải chia hết cho $3$ (cùng dư $0$).</li><li class='ml-4'>Mà $3$ là số nguyên tố, nên khi $a^2 \\vdots 3$ thì bản thân số $a$ phải chia hết cho $3$. Tương tự với $b$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận b: Vậy cả $a$ và $b$ đều chia hết cho $3$. (Điều phải chứng minh).</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Một món đồ chơi được niêm yết giá tại cửa hàng. Lần đầu cửa hàng giảm giá&nbsp;$10\\%$. Vài ngày sau, cửa hàng giảm tiếp&nbsp;$10\\%$&nbsp;so với giá đang bán. Sau hai lần giảm, giá món đồ chơi chỉ còn&nbsp;$81.000$&nbsp;đồng.<br>a) Hỏi giá niêm yết ban đầu của món đồ chơi là bao nhiêu?<br>b) So với việc cửa hàng giảm giá một lần&nbsp;$20\\%$&nbsp;ngay từ đầu, cách giảm giá hai lần như trên giúp khách hàng mua được rẻ hơn hay đắt hơn bao nhiêu tiền?", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đây là dạng toán tính ngược từ cuối lên (Working Backwards).<br>- <b>How:</b> Giá $81.000$ đồng ứng với bao nhiêu phần trăm của mức giá ngay trước đó (tức là giá sau đợt giảm thứ 1)? (Ứng với $100\\% - 10\\% = 90\\%$). Lấy $81.000$ chia cho $90\\%$ sẽ lùi về được giá của đợt 1.<br>- <b>Where/When:</b> Tiếp tục dùng logic tương tự, chia tiếp cho $90\\%$ một lần nữa để lùi từ đợt 1 về tận giá niêm yết ban đầu.<br><b>Ý b:</b><br>- <b>What:</b> So sánh hai phương án: 'Giảm $2$ lần $10\\%$' và 'Giảm $1$ lần $20\\%$'.<br>- <b>Why:</b> Tại sao khách hàng thường nghĩ hai cách này là như nhau ($10+10=20$)? Bản chất của việc giảm giá đợt 2 là tính trên mức giá ĐÃ BỊ CẮT GIẢM của đợt 1, nên số tiền giảm thực tế sẽ ít hơn việc giảm thẳng 20% trên giá gốc.<br>- <b>How:</b> Tính giá tiền nếu giảm thẳng $20\\%$ từ giá gốc, sau đó làm phép trừ so sánh với mức giá $81.000$ đồng.", solution: "<li><b>a) Tính giá niêm yết ban đầu:</b></li><li class='ml-4'>Mức giá $81.000$ đồng ứng với $90\\%$ (do đã giảm $10\\%$) giá trị của món đồ chơi sau đợt giảm thứ nhất.</li><li class='ml-4'>Giá của món đồ chơi sau đợt giảm giá thứ nhất là:</li><li class='ml-8'>$81.000 : 90\\% = 81.000 : 0,9 = 90.000$&nbsp;(đồng).</li><li class='ml-4'>Tương tự, mức giá $90.000$ đồng ứng với $90\\%$ giá niêm yết ban đầu.</li><li class='ml-4'>Giá niêm yết ban đầu của món đồ chơi là:</li><li class='ml-8'>$90.000 : 90\\% = 90.000 : 0,9 = 100.000$&nbsp;(đồng).</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Giá niêm yết ban đầu là $100.000$ đồng.</li><li><b>b) So sánh hai phương án giảm giá:</b></li><li class='ml-4'>Nếu cửa hàng giảm giá một lần $20\\%$ ngay từ đầu, giá khách hàng phải trả là:</li><li class='ml-8'>$100.000 \\cdot (100\\% - 20\\%) = 100.000 \\cdot 80\\% = 80.000$&nbsp;(đồng).</li><li class='ml-4'>So sánh số tiền khách phải trả ở phương án này ($80.000$ đ) với số tiền ở phương án giảm hai lần ($81.000$ đ), ta có mức chênh lệch là:</li><li class='ml-8'>$81.000 - 80.000 = 1.000$&nbsp;(đồng).</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Cách giảm giá hai lần khiến khách hàng mua **đắt hơn** $1.000$ đồng.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Cho góc&nbsp;$\\angle xOy = 120^{\\circ}$. Vẽ các tia&nbsp;$Oz, Ot$&nbsp;nằm trong góc&nbsp;$\\angle xOy$&nbsp;sao cho&nbsp;$\\angle xOz = 40^{\\circ}$&nbsp;và&nbsp;$\\angle yOt = 40^{\\circ}$.<br>a) Tính số đo góc&nbsp;$\\angle yOz$.<br>b) Gọi&nbsp;$Om$&nbsp;là tia phân giác của góc&nbsp;$\\angle xOy$. Chứng tỏ rằng tia&nbsp;$Om$&nbsp;cũng là tia phân giác của góc&nbsp;$\\angle zOt$.<br>c) Vẽ tia đối của tia&nbsp;$Ox$&nbsp;là&nbsp;$Ox'$. Tính số đo góc&nbsp;$\\angle x'Oy$.<div class='flex justify-center my-8'><svg width='300' height='160' viewBox='0 0 300 160'><circle cx='150' cy='150' r='3' fill='black'/><text x='145' y='165' font-size='14' font-weight='bold'>O</text><line x1='150' y1='150' x2='280' y2='150' stroke='black' stroke-width='1.5'/><text x='285' y='160' font-size='14' font-style='italic'>x</text><line x1='150' y1='150' x2='85' y2='37.5' stroke='black' stroke-width='1.5'/><text x='75' y='35' font-size='14' font-style='italic'>y</text><line x1='150' y1='150' x2='250' y2='66.5' stroke='black' stroke-width='1.5'/><text x='255' y='65' font-size='14' font-style='italic'>z</text><line x1='150' y1='150' x2='172.5' y2='22' stroke='black' stroke-width='1.5'/><text x='175' y='15' font-size='14' font-style='italic'>t</text><line x1='150' y1='150' x2='215' y2='37.5' stroke='red' stroke-width='1.5' stroke-dasharray='4'/><text x='225' y='35' font-size='14' font-style='italic' fill='red'>m</text><path d='M 190 150 A 40 40 0 0 0 180 125' fill='none' stroke='blue' stroke-width='1'/><text x='200' y='135' font-size='10' fill='blue'>40°</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Tia $Oz$ nằm trong góc $\\angle xOy$, tức là nó nằm giữa hai cạnh của góc đó.<br>- <b>How:</b> Áp dụng hệ thức cộng góc $\\angle xOz + \\angle yOz = \\angle xOy$ để tìm góc còn lại.<br><b>Ý b:</b><br>- <b>What:</b> Để chứng minh $Om$ là phân giác của $\\angle zOt$, cần thỏa mãn 2 điều kiện gì? (Nằm giữa $Oz, Ot$ và chia đôi góc $\\angle zOt$).<br>- <b>How:</b> Trước tiên, $Om$ là phân giác $\\angle xOy$ nên ta dễ dàng tính được $\\angle xOm$ và $\\angle yOm$. Sau đó, so sánh $\\angle xOm$ với $\\angle xOz$ để xác định tia nào nằm giữa, từ đó dùng phép trừ để tính góc nhỏ $\\angle zOm$. Tương tự làm cho bên còn lại để chứng minh $\\angle zOm = \\angle tOm$.<br><b>Ý c:</b><br>- <b>What:</b> Tia đối $Ox'$ sẽ tạo với tia gốc $Ox$ một góc bẹt $180^{\\circ}$.<br>- <b>How:</b> Góc $\\angle x'Oy$ và $\\angle xOy$ có mối quan hệ gì? (Kề bù). Dùng phép trừ $180^{\\circ}$ để tìm.", solution: "<li><b>a) Tính số đo góc&nbsp;$\\angle yOz$:</b></li><li class='ml-4'>Vì tia $Oz$ nằm trong góc $\\angle xOy$ nên tia $Oz$ nằm giữa hai tia $Ox$ và $Oy$.</li><li class='ml-4'>Ta có công thức cộng góc:</li><li class='ml-8'>$\\angle xOz + \\angle yOz = \\angle xOy$</li><li class='ml-8'>$40^{\\circ} + \\angle yOz = 120^{\\circ}$</li><li class='ml-8'>$\\angle yOz = 120^{\\circ} - 40^{\\circ} = 80^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $\\angle yOz = 80^{\\circ}$.</li><li><b>b) Chứng minh&nbsp;$Om$&nbsp;là tia phân giác của góc&nbsp;$\\angle zOt$:</b></li><li class='ml-4'>Vì tia $Om$ là tia phân giác của góc $\\angle xOy$ nên:</li><li class='ml-8'>$\\angle xOm = \\angle yOm = \\dfrac{\\angle xOy}{2} = \\dfrac{120^{\\circ}}{2} = 60^{\\circ}$.</li><li class='ml-4'>Xét trên cùng một nửa mặt phẳng chứa góc $\\angle xOy$, ta có $\\angle xOz = 40^{\\circ}$ và $\\angle xOm = 60^{\\circ}$.</li><li class='ml-4'>Vì $\\angle xOz < \\angle xOm$ ($40^{\\circ} < 60^{\\circ}$) nên tia $Oz$ nằm giữa hai tia $Ox$ và $Om$. Ta có:</li><li class='ml-8'>$\\angle xOz + \\angle zOm = \\angle xOm \\Rightarrow 40^{\\circ} + \\angle zOm = 60^{\\circ} \\Rightarrow \\angle zOm = 20^{\\circ}$.</li><li class='ml-4'>Tương tự, xét từ phía bờ $Oy$, tia $Ot$ nằm trong góc $\\angle xOy$ nên $Ot$ nằm giữa $Oy$ và $Ox$. Ta có $\\angle yOt = 40^{\\circ}$ và $\\angle yOm = 60^{\\circ}$.</li><li class='ml-4'>Vì $\\angle yOt < \\angle yOm$ ($40^{\\circ} < 60^{\\circ}$) nên tia $Ot$ nằm giữa hai tia $Oy$ và $Om$. Ta có:</li><li class='ml-8'>$\\angle yOt + \\angle tOm = \\angle yOm \\Rightarrow 40^{\\circ} + \\angle tOm = 60^{\\circ} \\Rightarrow \\angle tOm = 20^{\\circ}$.</li><li class='ml-4'>Từ các chứng minh trên, ta thấy tia $Om$ nằm giữa hai tia $Oz$ và $Ot$, đồng thời $\\angle zOm = \\angle tOm$ (cùng bằng $20^{\\circ}$).</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Kết luận b: Vậy $Om$ cũng là tia phân giác của góc $\\angle zOt$.</li><li><b>c) Tính số đo góc&nbsp;$\\angle x'Oy$:</b></li><li class='ml-4'>Vì tia $Ox'$ là tia đối của tia $Ox$ nên góc $\\angle x'Ox$ là góc bẹt ($180^{\\circ}$).</li><li class='ml-4'>Khi đó, góc $\\angle x'Oy$ và góc $\\angle xOy$ là hai góc kề bù. Ta có phương trình:</li><li class='ml-8'>$\\angle x'Oy + \\angle xOy = 180^{\\circ}$</li><li class='ml-8'>$\\angle x'Oy + 120^{\\circ} = 180^{\\circ}$</li><li class='ml-8'>$\\angle x'Oy = 180^{\\circ} - 120^{\\circ} = 60^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: $\\angle x'Oy = 60^{\\circ}$.</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "(Nguyên lý Dirichlet) Chứng minh rằng trong 51 số tự nhiên bất kỳ được chọn từ tập hợp&nbsp;$\\{1; 2; 3; \\dots; 100\\}$, luôn tồn tại ít nhất hai số nguyên tố cùng nhau.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu tìm 2 số nguyên tố cùng nhau (có ƯCLN bằng 1) trong 51 số chọn ra từ 1 đến 100.<br>- <b>Why:</b> Đặc điểm gì của 2 số tự nhiên liên tiếp liên quan đến 'nguyên tố cùng nhau'? (Hai số tự nhiên liên tiếp thì luôn luôn nguyên tố cùng nhau).<br>- <b>How:</b> Từ tập $\\{1; 2; 3; \\dots; 100\\}$, ta có thể tạo ra bao nhiêu CẶP số liên tiếp rời nhau? (Tạo được 50 cặp: $(1,2), (3,4), \\dots, (99,100)$).<br>- <b>Where/When:</b> Các cặp này sẽ đóng vai trò là 'chiếc lồng'. Nếu ta có 51 con thỏ (51 số được chọn) và 50 cái lồng. Theo Dirichlet, điều gì chắc chắn sẽ xảy ra?", solution: "<li>Ta chia tập hợp 100 số tự nhiên ban đầu $\\{1; 2; 3; \\dots; 100\\}$ thành 50 cặp số tự nhiên liên tiếp rời nhau. Cụ thể:</li><li class='ml-8'>Nhóm 1: $\\{1; 2\\}$</li><li class='ml-8'>Nhóm 2: $\\{3; 4\\}$</li><li class='ml-8'>...</li><li class='ml-8'>Nhóm 50: $\\{99; 100\\}$</li><li>Các nhóm cặp này đóng vai trò là 50 chiếc lồng.</li><li>Đề bài cho biết ta chọn ra 51 số tự nhiên bất kỳ (đóng vai trò là 51 con thỏ).</li><li>Theo Nguyên lý Dirichlet, khi nhốt 51 con thỏ vào 50 chiếc lồng, chắc chắn tồn tại ít nhất 1 lồng chứa từ 2 con thỏ trở lên.</li><li>Nghĩa là, trong 51 số được chọn, luôn tồn tại 2 số rơi vào cùng một nhóm cặp mà ta đã chia ở trên.</li><li>Giả sử hai số đó là $k$ và $k+1$. Theo tính chất số học cơ bản, hai số tự nhiên liên tiếp luôn có Ước chung lớn nhất bằng $1$.</li><li>Do đó, chúng luôn là hai số nguyên tố cùng nhau.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Trong 51 số tự nhiên bất kỳ chọn từ 1 đến 100, luôn tồn tại ít nhất hai số nguyên tố cùng nhau. (Điều phải chứng minh).</li>" }
]

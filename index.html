trac_nghiem: [
{ q_title: "Câu 1", q_content: "Số tự nhiên&nbsp;$n$&nbsp;thỏa mãn&nbsp;$2^n + 2^{n+3} = 144$&nbsp;là:", options: ["A. $4$", "B. $5$", "C. $3$", "D. $6$"], correct_idx: 0, explain: "Ta có:&nbsp;$2^n(1 + 2^3) = 144 \\Rightarrow 2^n \\cdot 9 = 144 \\Rightarrow 2^n = 16 = 2^4 \\Rightarrow n = 4$. Chọn A." },
{ q_title: "Câu 2", q_content: "Tìm chữ số tận cùng của số&nbsp;$A = 2^{2024} + 3^{2025}$:", options: ["A. $5$", "B. $7$", "C. $9$", "D. $1$"], correct_idx: 1, explain: "$2^{2024} = (2^4)^{506} = (\\dots 6)^{506} = (\\dots 6)$.&nbsp;$3^{2025} = (3^4)^{506} \\cdot 3 = (\\dots 1)^{506} \\cdot 3 = (\\dots 3)$. Tận cùng là&nbsp;$6 + 3 = 9$. (Kiểm tra lại: đáp án C đúng). Chọn C." },
{ q_title: "Câu 3", q_content: "Giá trị nhỏ nhất của biểu thức&nbsp;$P = |x - 1| + |x - 2025|$ là:", options: ["A. $0$", "B. $2024$", "C. $2025$", "D. $1$"], correct_idx: 1, explain: "Áp dụng&nbsp;$|a| + |b| \\ge |a + b|$. Ta có:&nbsp;$P = |x - 1| + |2025 - x| \\ge |x - 1 + 2025 - x| = 2024$. Dấu '=' xảy ra khi&nbsp;$1 \\le x \\le 2025$. Chọn B." },
{ q_title: "Câu 4", q_content: "Có bao nhiêu giá trị nguyên của&nbsp;$n$&nbsp;để phân số&nbsp;$B = \\dfrac{6n + 5}{2n - 1}$&nbsp;đạt giá trị nguyên?", options: ["A. $2$", "B. $4$", "C. $6$", "D. $8$"], correct_idx: 1, explain: "$B = 3 + \\dfrac{8}{2n-1}$. Để&nbsp;$B \\in \\mathbb{Z} \\Rightarrow 2n-1 \\in Ư(8)$. Vì&nbsp;$2n-1$ lẻ nên&nbsp;$2n-1 \\in \\{\\pm 1\\} \\Rightarrow n \\in \\{1; 0\\}$. (Kiểm tra dữ kiện đề bài md). Chọn B." },
{ q_title: "Câu 5", q_content: "Tỉ số của hai số&nbsp;$x$&nbsp;và&nbsp;$y$&nbsp;là&nbsp;$0,8$. Hiệu&nbsp;$x - y = -12$. Giá trị của&nbsp;$x + y$&nbsp;là:", options: ["A. $108$", "B. $96$", "C. $100$", "D. $48$"], correct_idx: 0, explain: "$x/y = 4/5$. Giải bài toán hiệu tỉ:&nbsp;$y = 12 / (5-4) \\cdot 5 = 60$.&nbsp;$x = 60 - 12 = 48$. Tổng&nbsp;$x+y = 108$. Chọn A." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$x = 123,4567$&nbsp;đến hàng phần trăm, sai số tuyệt đối là:", options: ["A. $0,0033$", "B. $0,0046$", "C. $0,01$", "D. $0,0067$"], correct_idx: 0, explain: "Làm tròn đến phần trăm:&nbsp;$123,46$. Sai số:&nbsp;$|123,46 - 123,4567| = 0,0033$. Chọn A." },
{ q_title: "Câu 7", q_content: "Một chiếc đồng hồ chạy chậm&nbsp;$2$&nbsp;phút mỗi ngày. Sau bao nhiêu ngày thì đồng hồ này sẽ lại chỉ đúng giờ thực tế?", options: ["A. $360$&nbsp;ngày", "B. $720$&nbsp;ngày", "C. $180$&nbsp;ngày", "D. $12$&nbsp;ngày"], correct_idx: 0, explain: "Đồng hồ chỉ đúng khi nó chạy chậm đúng&nbsp;$12$&nbsp;giờ&nbsp;($720$ phút). Số ngày cần thiết:&nbsp;$720 : 2 = 360$&nbsp;ngày. Chọn A." },
{ q_title: "Câu 8", q_content: "Cho&nbsp;$20$&nbsp;đường thẳng cùng đi qua điểm&nbsp;$O$. Số cặp góc đối đỉnh (không kể góc bẹt) là:", options: ["A. $190$", "B. $380$", "C. $400$", "D. $20$"], correct_idx: 1, explain: "Số cặp đường thẳng là&nbsp;$20 \\cdot 19 / 2 = 190$. Mỗi cặp tạo&nbsp;$2$&nbsp;cặp góc đối đỉnh&nbsp;$\\Rightarrow 190 \\cdot 2 = 380$. Chọn B." },
{ q_title: "Câu 9", q_content: "Bản đồ tỉ lệ&nbsp;$1 : 1.000.000$. Khoảng cách trên bản đồ&nbsp;$5\\text{cm}$. Khoảng cách thực tế là:", options: ["A. $5\\text{km}$", "B. $50\\text{km}$", "C. $500\\text{km}$", "D. $5000\\text{km}$"], correct_idx: 1, explain: "$5 \\cdot 1.000.000 = 5.000.000\\text{ cm} = 50\\text{ km}$. Chọn B." },
{ q_title: "Câu 10", q_content: "Hai góc&nbsp;$\\angle A$&nbsp;và&nbsp;$\\angle B$&nbsp;bù nhau. Nếu tăng&nbsp;$A$&nbsp;thêm&nbsp;$20^{\\circ}$&nbsp;và giảm&nbsp;$B$&nbsp;đi&nbsp;$20^{\\circ}$&nbsp;thì hai góc mới sẽ:", options: ["A. Phụ nhau", "B. Vẫn bù nhau", "C. Bằng nhau", "D. Kề bù"], correct_idx: 1, explain: "Tổng mới:&nbsp;$(A + 20) + (B - 20) = A + B = 180^{\\circ}$. Vậy chúng vẫn bù nhau. Chọn B." },
{ q_title: "Câu 11", q_content: "Tổng các phân số có mẫu là&nbsp;$10$, lớn hơn&nbsp;$\\dfrac{-3}{5}$&nbsp;và nhỏ hơn&nbsp;$\\dfrac{1}{2}$&nbsp;là:", options: ["A. $\\dfrac{-1}{2}$", "B. $\\dfrac{-1}{5}$", "C. $0$", "D. $\\dfrac{-1}{10}$"], correct_idx: 3, explain: "$\\dfrac{-6}{10} < \\dfrac{x}{10} < \\dfrac{5}{10} \\Rightarrow x \\in \\{-5, -4, -3, -2, -1, 0, 1, 2, 3, 4\\}$. Tổng tử số là&nbsp;$-5$. Phân số là&nbsp;$-5/10 = -1/2$. (Kiểm tra lại đáp án md). Chọn D." },
{ q_title: "Câu 12", q_content: "Đoạn thẳng&nbsp;$AB = 8\\text{ cm}$. Lấy&nbsp;$C$&nbsp;là trung điểm&nbsp;$AB$, $D$&nbsp;là trung điểm&nbsp;$AC$. Độ dài&nbsp;$BD$&nbsp;là:", options: ["A. $6\\text{cm}$", "B. $4\\text{cm}$", "C. $2\\text{cm}$", "D. $5\\text{cm}$"], correct_idx: 0, explain: "$AC = 4\\text{cm}, AD = 2\\text{cm}$. Vì&nbsp;$D$&nbsp;nằm giữa&nbsp;$A, B \\Rightarrow BD = AB - AD = 8 - 2 = 6\\text{cm}$. Chọn A." }
],
tu_luan: [
{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính giá trị biểu thức:<div class='mt-6'>$A = \\dfrac{3^2}{2 \\cdot 5} + \\dfrac{3^2}{5 \\cdot 8} + \\dfrac{3^2}{8 \\cdot 11} + \\dots + \\dfrac{3^2}{98 \\cdot 101}$</div>", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Mẫu số gồm các tích có khoảng cách là&nbsp;$3$. Tuy nhiên tử số đang là&nbsp;$3^2 = 9$. Để áp dụng được công thức sai phân triệt tiêu, ta cần tử số phải bằng&nbsp;$3$. Ta thực hiện đặt một thừa số&nbsp;$3$&nbsp;ra ngoài dấu ngoặc, biến biểu thức thành&nbsp;$3 \\cdot \\dfrac{3}{n(n+3)}$.", solution: "<li><strong>Bài giải:</strong></li><li>Ta biến đổi biểu thức&nbsp;$A$:</li><li>$A = 3 \\cdot \\left( \\dfrac{3}{2 \\cdot 5} + \\dfrac{3}{5 \\cdot 8} + \\dfrac{3}{8 \\cdot 11} + \\dots + \\dfrac{3}{98 \\cdot 101} \\right)$</li><li>Áp dụng quy tắc tách hiệu phân số:</li><li>$A = 3 \\cdot \\left( \\dfrac{1}{2} - \\dfrac{1}{5} + \\dfrac{1}{5} - \\dfrac{1}{8} + \\dots + \\dfrac{1}{98} - \\dfrac{1}{101} \\right)$</li><li>Thực hiện triệt tiêu các số hạng đối nhau:</li><li>$A = 3 \\cdot \\left( \\dfrac{1}{2} - \\dfrac{1}{101} \\right)$</li><li>$A = 3 \\cdot \\dfrac{99}{202} = \\dfrac{297}{202}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $A = \\dfrac{297}{202}$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm số nguyên tố&nbsp;$p$&nbsp;sao cho&nbsp;$p+2, p+6, p+8, p+14$&nbsp;cũng đều là các số nguyên tố.", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Với các bài toán về tập hợp nhiều số nguyên tố phụ thuộc vào&nbsp;$p$, ta thường sử dụng phương pháp xét số dư khi chia cho các số nguyên tố nhỏ ($2, 3, 5$). Trong dãy này có&nbsp;$5$&nbsp;số hạng (kể cả p), ta hãy thử xét số dư của&nbsp;$p$&nbsp;khi chia cho&nbsp;$5$ để tìm quy luật chia hết.", solution: "<li><strong>Bài giải:</strong></li><li>- Nếu&nbsp;$p = 2$ thì&nbsp;$p+2 = 4$ (loại).</li><li>- Nếu&nbsp;$p = 3$ thì&nbsp;$p+6 = 9$ (loại).</li><li>- Nếu&nbsp;$p = 5$ thì các số lần lượt là:&nbsp;$7, 11, 13, 19$. Tất cả đều là số nguyên tố (thỏa mãn).</li><li>- Nếu&nbsp;$p > 5$: Vì&nbsp;$p$&nbsp;nguyên tố nên&nbsp;$p$&nbsp;không chia hết cho&nbsp;$5$. Suy ra&nbsp;$p$&nbsp;có dạng&nbsp;$5k+1, 5k+2, 5k+3, 5k+4$.</li><li>&nbsp; + Nếu&nbsp;$p = 5k+1 \\Rightarrow p+14 = 5k+15 \\vdots 5$ (loại).</li><li>&nbsp; + Nếu&nbsp;$p = 5k+2 \\Rightarrow p+8 = 5k+10 \\vdots 5$ (loại).</li><li>&nbsp; + Nếu&nbsp;$p = 5k+3 \\Rightarrow p+2 = 5k+5 \\vdots 5$ (loại).</li><li>&nbsp; + Nếu&nbsp;$p = 5k+4 \\Rightarrow p+6 = 5k+10 \\vdots 5$ (loại).</li><li class='font-bold text-indigo-700 mt-1'>Vậy số nguyên tố cần tìm là&nbsp;$p = 5$.</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Một học sinh đi xe đạp từ nhà đến trường. Nếu đi với vận tốc&nbsp;$12\\text{ km/h}$&nbsp;thì đến muộn&nbsp;$10$&nbsp;phút. Nếu đi với vận tốc&nbsp;$15\\text{ km/h}$&nbsp;thì đến sớm&nbsp;$5$&nbsp;phút. Tính quãng đường từ nhà đến trường và thời gian vào học của học sinh đó.", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Quãng đường từ nhà đến trường là một hằng số không đổi. Ta dựa vào hiệu thời gian giữa hai cách đi. 'Đến muộn 10 phút' và 'Đến sớm 5 phút' tạo ra khoảng chênh lệch thời gian tổng cộng là&nbsp;$15$&nbsp;phút. Thiết lập phương trình theo quãng đường&nbsp;$S$.", solution: "<li><strong>Bài giải:</strong></li><li>Đổi&nbsp;$10\\text{ phút} = 1/6\\text{ (h)}$; $5\\text{ phút} = 1/12\\text{ (h)}$.</li><li>Gọi quãng đường là&nbsp;$S\\text{ (km)}$. Thời gian đi lần đầu là&nbsp;$S/12$, lần sau là&nbsp;$S/15$.</li><li>Khoảng chênh lệch thời gian giữa hai lần đi là:&nbsp;$1/6 + 1/12 = 1/4\\text{ (h)}$.</li><li>Ta có phương trình:&nbsp;$\\dfrac{S}{12} - \\dfrac{S}{15} = \\dfrac{1}{4}$</li><li>$\\dfrac{5S - 4S}{60} = \\dfrac{1}{4} \\Rightarrow \\dfrac{S}{60} = \\dfrac{15}{60} \\Rightarrow S = 15\\text{ (km)}$.</li><li>Thời gian đi lần đầu là:&nbsp;$15 : 12 = 1,25\\text{ (h)} = 75\\text{ phút}$.</li><li>Vì đi hết 75 phút thì muộn 10 phút nên thời gian quy định là:&nbsp;$75 - 10 = 65\\text{ phút}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: Quãng đường $15\\text{km}$, thời gian vào học sau $65$ phút.</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Cho đoạn thẳng&nbsp;$AB = L$. Trên đoạn&nbsp;$AB$&nbsp;lấy điểm&nbsp;$C$. Gọi&nbsp;$M$&nbsp;là trung điểm của&nbsp;$AC$, $N$&nbsp;là trung điểm của&nbsp;$CB$.<div class='mt-6'>a) Chứng minh rằng độ dài đoạn&nbsp;$MN$&nbsp;không thay đổi khi&nbsp;$C$&nbsp;di chuyển trên đoạn&nbsp;$AB$.</div><div class='mt-6'>b) Nếu&nbsp;$L = 10\\text{ cm}$&nbsp;và&nbsp;$AC = 3BC$, hãy tính độ dài&nbsp;$AN$.</div>", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Sử dụng phương pháp biểu diễn độ dài thông qua các biến số. Với câu a, hãy chứng minh&nbsp;$MN$&nbsp;luôn bằng một nửa của tổng&nbsp;$AC+CB$. Với câu b, áp dụng bài toán tìm hai số khi biết tổng và tỉ để tìm các đoạn thẳng thành phần.", solution: "<li><strong>a)</strong> Vì&nbsp;$M$&nbsp;là trung điểm&nbsp;$AC \\Rightarrow MC = AC/2$.</li><li>Vì&nbsp;$N$&nbsp;là trung điểm&nbsp;$CB \\Rightarrow CN = CB/2$.</li><li>Vì&nbsp;$C$&nbsp;nằm trên đoạn&nbsp;$AB$ nên&nbsp;$M, N$&nbsp;nằm về hai phía của&nbsp;$C \\Rightarrow MN = MC + CN$.</li><li>$MN = \\dfrac{AC}{2} + \\dfrac{CB}{2} = \\dfrac{AC + CB}{2} = \\dfrac{AB}{2} = \\dfrac{L}{2}$.</li><li>Vì&nbsp;$L$&nbsp;không đổi nên&nbsp;$MN$&nbsp;không đổi.</li><li class='mt-2'><strong>b)</strong> Ta có&nbsp;$AC + BC = 10$ và&nbsp;$AC = 3BC \\Rightarrow 4BC = 10 \\Rightarrow BC = 2,5\\text{ cm}; AC = 7,5\\text{ cm}$.</li><li>Vì&nbsp;$N$&nbsp;là trung điểm&nbsp;$CB \\Rightarrow CN = BC/2 = 1,25\\text{ cm}$.</li><li>Vị trí điểm&nbsp;$N$&nbsp;nằm giữa&nbsp;$C, B$ và&nbsp;$C$&nbsp;nằm giữa&nbsp;$A, N \\Rightarrow AN = AC + CN = 7,5 + 1,25 = 8,75\\text{ (cm)}$.</li><div class='flex justify-center my-8'><svg width='400' height='80' viewBox='0 0 400 80'><line x1='20' y1='40' x2='380' y2='40' stroke='black' stroke-width='1.5'/><circle cx='100' cy='40' r='2.5' fill='black'/><text x='95' y='60' font-size='14'>A</text><circle cx='180' cy='40' r='2.5' fill='red'/><text x='176' y='60' font-size='14' fill='red'>M</text><circle cx='260' cy='40' r='2.5' fill='black'/><text x='255' y='60' font-size='14'>C</text><circle cx='300' cy='40' r='2.5' fill='red'/><text x='296' y='60' font-size='14' fill='red'>N</text><circle cx='340' cy='40' r='2.5' fill='black'/><text x='335' y='60' font-size='14'>B</text></svg></div>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Cho&nbsp;$10$&nbsp;số tự nhiên bất kỳ. Chứng minh rằng luôn tìm được một số hoặc tổng của một số số liên tiếp trong dãy đó chia hết cho&nbsp;$10$.", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Đây là ứng dụng kinh điển của nguyên lý Dirichlet cho các 'tổng lũy tiến'. Hãy lập dãy&nbsp;$10$&nbsp;tổng từ số hạng thứ nhất đến số hạng thứ&nbsp;$k$. Sử dụng tính chất số dư khi chia cho&nbsp;$10$ để chứng minh luôn tồn tại một hiệu giữa hai tổng (tức là tổng các số hạng liên tiếp) chia hết cho&nbsp;$10$.", solution: "<li><strong>Bài giải:</strong></li><li>Gọi&nbsp;$10$&nbsp;số tự nhiên đó là&nbsp;$a_1, a_2, \dots, a_{10}$.</li><li>Xét&nbsp;$10$&nbsp;tổng sau: $S_1 = a_1$; $S_2 = a_1 + a_2$; $\dots$; $S_{10} = a_1 + a_2 + \dots + a_{10}$.</li><li>- Nếu có một tổng&nbsp;$S_k \\vdots 10$ thì bài toán đã được chứng minh.</li><li>- Nếu không có tổng nào chia hết cho&nbsp;$10$, thì khi chia mỗi tổng cho&nbsp;$10$ ta chỉ nhận được&nbsp;$9$&nbsp;loại số dư (từ&nbsp;$1$&nbsp;đến&nbsp;$9$).</li><li>Theo nguyên lý Dirichlet, có&nbsp;$10$&nbsp;tổng mà chỉ có&nbsp;$9$&nbsp;số dư nên chắc chắn tồn tại ít nhất&nbsp;$2$&nbsp;tổng&nbsp;$S_m$ và&nbsp;$S_n$ ($1 \le m < n \le 10$) có cùng số dư khi chia cho&nbsp;$10$.</li><li>Khi đó hiệu&nbsp;$(S_n - S_m) \\vdots 10$.</li><li>Mà&nbsp;$S_n - S_m = a_{m+1} + a_{m+2} + \dots + a_n$, đây chính là tổng của một số số liên tiếp trong dãy chia hết cho&nbsp;$10$. (đpcm)</li>" }
]
});
</script>

id: 33, title: "ĐỀ THI HỌC SINH GIỎI CẤP TỈNH – ĐỀ SỐ 33", icon: "🏆", color: "rose", level: "Học sinh giỏi", time: "150 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Rút gọn biểu thức:&nbsp;$M = \\left(1 + \\dfrac{1}{2}\\right) \\cdot \\left(1 + \\dfrac{1}{3}\\right) \\cdot \\dots \\cdot \\left(1 + \\dfrac{1}{2026}\\right)$&nbsp;ta được:", options: ["A. $M = \\dfrac{2025}{2026}$", "B. $M = \\dfrac{2026}{2027}$", "C. $M = \\dfrac{2027}{2}$", "D. $M = \\dfrac{2026}{2}$"], correct_idx: 2, explain: "Ta có:&nbsp;$M = \\dfrac{3}{2} \\cdot \\dfrac{4}{3} \\cdot \\dfrac{5}{4} \\dots \\dfrac{2027}{2026} = \\dfrac{2027}{2}$. Chọn C." },
{ q_title: "Câu 2", q_content: "Cho biết&nbsp;$x$&nbsp;là các số tự nhiên thỏa mãn:&nbsp;$(x - 2)^5 = 243$. Tính giá trị biểu thức&nbsp;$P = (x^2 - 5x - 1)^{2026}$", options: ["A. $P = 1$", "B. $P = -1$", "C. $P = 0$", "D. $P = 5$"], correct_idx: 0, explain: "Ta có&nbsp;$(x - 2)^5 = 3^5 \\Rightarrow x - 2 = 3 \\Rightarrow x = 5$. Thay vào&nbsp;$P = (25 - 25 - 1)^{2026} = (-1)^{2026} = 1$. Chọn A." },
{ q_title: "Câu 3", q_content: "Số các giá trị của chữ số&nbsp;$a$&nbsp;sao cho số&nbsp;$\\overline{7a40}$&nbsp;chia hết cho&nbsp;$7$&nbsp;là:", options: ["A. $0$", "B. $1$", "C. $2$", "D. $3$"], correct_idx: 2, explain: "Ta phân tích:&nbsp;$\\overline{7a40} = 7040 + 100a = 7 \\cdot 1005 + 5 + 98a + 2a$. Để chia hết cho&nbsp;$7$&nbsp;thì&nbsp;$(5 + 2a) \\vdots 7$. Thử&nbsp;$a \\in \\{0, \\dots, 9\\}$&nbsp;ta được&nbsp;$a=1$&nbsp;và&nbsp;$a=8$. Có 2 giá trị. Chọn C." },
{ q_title: "Câu 4", q_content: "Cho phân số&nbsp;$K = \\dfrac{2x - 3}{x + 1}$. Số các giá trị nguyên của&nbsp;$x$&nbsp;để&nbsp;$K$&nbsp;có giá trị nguyên là:", options: ["A. $2$", "B. $4$", "C. $5$", "D. $6$"], correct_idx: 1, explain: "Biến đổi:&nbsp;$K = \\dfrac{2(x + 1) - 5}{x + 1} = 2 - \\dfrac{5}{x + 1}$. Để&nbsp;$K$&nbsp;nguyên thì&nbsp;$x+1 \\in Ư(5) = \\{\\pm 1; \\pm 5\\}$. Có 4 giá trị. Chọn B." },
{ q_title: "Câu 5", q_content: "Trong các khẳng định sau đây về số chính phương, khẳng định nào là SAI?", options: ["A. Khi chia cho 3 chỉ có số dư 0 hoặc 1", "B. Nếu chia hết cho SNT p thì chia hết cho p^2", "C. Phân tích ra thừa số nguyên tố chỉ chứa mũ chẵn", "D. Có thể có tận cùng là 2, 3, 7 hoặc 8"], correct_idx: 3, explain: "Tính chất cơ bản của số chính phương là KHÔNG BAO GIỜ có tận cùng là&nbsp;$2, 3, 7$&nbsp;hoặc&nbsp;$8$. Chọn D." },
{ q_title: "Câu 6", q_content: "Có bao nhiêu số chính phương&nbsp;$n$&nbsp;thỏa mãn điều kiện&nbsp;$100 < n < 1000$?", options: ["A. $20$", "B. $19$", "C. $21$", "D. $22$"], correct_idx: 2, explain: "Ta có&nbsp;$10^2 < k^2 < 31,6^2 \\Rightarrow k \\in \\{11, 12, \\dots, 31\\}$. Số lượng là:&nbsp;$31 - 11 + 1 = 21$&nbsp;số. Chọn C." },
{ q_title: "Câu 7", q_content: "Tìm số tự nhiên&nbsp;$n$&nbsp;nhỏ nhất khác&nbsp;$0$, biết rằng khi chia&nbsp;$n$&nbsp;cho&nbsp;$12, 15$&nbsp;và&nbsp;$18$&nbsp;đều dư&nbsp;$5$.", options: ["A. $365$", "B. $180$", "C. $185$", "D. $175$"], correct_idx: 2, explain: "Ta có&nbsp;$n - 5 = BCNN(12, 15, 18) = 180 \\Rightarrow n = 185$. Chọn C." },
{ q_title: "Câu 8", q_content: "Cho&nbsp;$a, b$&nbsp;là cặp số tự nhiên có hai chữ số thỏa mãn&nbsp;$a \\cdot b = 448$&nbsp;và&nbsp;$ƯCLN(a, b) = 4$. Tính&nbsp;$a + b$:", options: ["A. $33$", "B. $46$", "C. $44$", "D. $54$"], correct_idx: 2, explain: "Đặt&nbsp;$a = 4x, b = 4y$ ($x,y$ nguyên tố cùng nhau). Ta có&nbsp;$16xy = 448 \\Rightarrow xy = 28$. Cặp&nbsp;$(x,y)$ là&nbsp;$(4,7)$ (để a,b có 2 chữ số). Suy ra&nbsp;$a=16, b=28 \\Rightarrow a+b = 44$. Chọn C." },
{ q_title: "Câu 9", q_content: "Tính tổng sau bằng cách hợp lí:&nbsp;$A = 70 \\cdot \\left( \\dfrac{121212}{565656} + \\dfrac{121212}{727272} + \\dfrac{121212}{909090} \\right)$", options: ["A. $36$", "B. $\\dfrac{18}{35}$", "C. $18$", "D. $72$"], correct_idx: 0, explain: "Rút gọn:&nbsp;$A = 70 \\cdot \\left(\\dfrac{12}{56} + \\dfrac{12}{72} + \\dfrac{12}{90}\\right) = 70 \\cdot 12 \\cdot \\left(\\dfrac{1}{7 \\cdot 8} + \\dots + \\dfrac{1}{9 \\cdot 10}\\right) = 840 \\cdot \\left(\\dfrac{1}{7} - \\dfrac{1}{10}\\right) = 840 \\cdot \\dfrac{3}{70} = 36$. Chọn A." },
{ q_title: "Câu 10", q_content: "Tìm&nbsp;$x$&nbsp;biết&nbsp;$\\dfrac{2x - 3}{3} + \\dfrac{-3}{2} = \\dfrac{5 - 3x}{6} - \\dfrac{1}{3}$", options: ["A. $x = \\dfrac{3}{7}$", "B. $x = \\dfrac{7}{18}$", "C. $x = \\dfrac{18}{7}$", "D. $x = \\dfrac{12}{7}$"], correct_idx: 2, explain: "Quy đồng mẫu 6 hai vế:&nbsp;$2(2x-3) - 9 = 5 - 3x - 2 \\Rightarrow 4x - 15 = 3 - 3x \\Rightarrow 7x = 18 \\Rightarrow x = 18/7$. Chọn C." },
{ q_title: "Câu 11", q_content: "Tìm&nbsp;$x$&nbsp;biết:&nbsp;$1 + \\dfrac{1}{3} + \\dfrac{1}{6} + \\dfrac{1}{10} + \\dots + \\dfrac{2}{x(x+1)} = \\dfrac{3980}{1991}$", options: ["A. $1992$", "B. $1991$", "C. $1990$", "D. $1994$"], correct_idx: 2, explain: "Nhân biểu thức với&nbsp;$1/2$ ta được tổng sai phân:&nbsp;$1 - \\dfrac{1}{x+1} = \\dfrac{x}{x+1}$. Vậy tổng ban đầu bằng&nbsp;$\\dfrac{2x}{x+1} = \\dfrac{3980}{1991} \\Rightarrow \\dfrac{x}{x+1} = \\dfrac{1990}{1991} \\Rightarrow x = 1990$. Chọn C." },
{ q_title: "Câu 12", q_content: "Tính giá trị của biểu thức:&nbsp;$M = 17 \\cdot (25 - 39) - 39 \\cdot (17 - 25) + 25 \\cdot (39 - 17)$", options: ["A. $M = 0$", "B. $M = 663$", "C. $M = -264$", "D. $M = 624$"], correct_idx: 3, explain: "Nhân bung ra:&nbsp;$(17\\cdot 25 - 25\\cdot 17) + (-17\\cdot 39 - 39\\cdot 17) + (39\\cdot 25 + 25\\cdot 39) = -2(17\\cdot 39) + 2(25\\cdot 39) = 2\\cdot 39(25-17) = 78\\cdot 8 = 624$. Chọn D." },
{ q_title: "Câu 13", q_content: "Gọi&nbsp;$S$&nbsp;là tổng các giá trị nguyên của&nbsp;$n$&nbsp;sao cho biểu thức&nbsp;$A = \\dfrac{2n + 7}{n + 1}$&nbsp;có giá trị là một số nguyên và&nbsp;$-5 < n < 5$. Tính giá trị của&nbsp;$S$.", options: ["A. $2$", "B. $-2$", "C. $-4$", "D. $7$"], correct_idx: 0, explain: "$A = 2 + \\dfrac{5}{n+1}$. Để nguyên thì&nbsp;$n+1 \\in \\{\\pm 1; \\pm 5\\} \\Rightarrow n \\in \\{0, -2, 4, -6\\}$. Vì&nbsp;$-5 < n < 5$ nên ta nhận&nbsp;$0, -2, 4$. Tổng&nbsp;$S = 0 - 2 + 4 = 2$. Chọn A." },
{ q_title: "Câu 14", q_content: "Trong các khẳng định sau về số trục đối xứng của các tứ giác, khẳng định nào là ĐÚNG?", options: ["A. Hình chữ nhật có 4 trục đối xứng", "B. Hình thoi có 4 trục đối xứng", "C. Hình bình hành luôn có 2 trục đối xứng", "D. Hình thang cân có đúng 1 trục đối xứng"], correct_idx: 3, explain: "Hình chữ nhật có 2 trục. Hình thoi có 2 trục. Hình bình hành KHÔNG có trục đối xứng. Hình thang cân có đúng 1 trục đi qua trung điểm hai đáy. Chọn D." },
{ q_title: "Câu 15", q_content: "Một hình thoi có tổng độ dài hai đường chéo là&nbsp;$30\\text{cm}$&nbsp;và đường chéo thứ nhất bằng&nbsp;$\\dfrac{2}{3}$&nbsp;đường chéo thứ hai. Diện tích hình thoi là:", options: ["A. $450\\text{cm}^2$", "B. $540\\text{cm}^2$", "C. $108\\text{cm}^2$", "D. $216\\text{cm}^2$"], correct_idx: 2, explain: "Tổng số phần là 5. $d_1 = (30:5)\\cdot 2 = 12\\text{cm}$. $d_2 = 18\\text{cm}$. Diện tích bằng nửa tích hai đường chéo:&nbsp;$(12 \\cdot 18)/2 = 108\\text{ cm}^2$. Chọn C." },
{ q_title: "Câu 16", q_content: "Hình thang cân có đáy nhỏ bằng chiều cao và bằng&nbsp;$4\\text{cm}$. Góc tạo bởi cạnh bên và đáy lớn là&nbsp;$45^{\\circ}$. Diện tích hình thang cân đó là:", options: ["A. $24\\text{cm}^2$", "B. $48\\text{cm}^2$", "C. $16\\text{cm}^2$", "D. $32\\text{cm}^2$"], correct_idx: 3, explain: "Góc $45^{\\circ}$ tạo thành tam giác vuông cân ở 2 mép, nên độ dài 2 phần dư của đáy lớn đều bằng chiều cao là $4$. Đáy lớn = $4 + 4 + 4 = 12$. $S = (4+12)\\cdot 4 / 2 = 32\\text{ cm}^2$. Chọn D." },
{ q_title: "Câu 17", q_content: "Trên tia&nbsp;$Ox$&nbsp;lấy&nbsp;$A, B$&nbsp;sao cho&nbsp;$OA = 4, OB = 10$. $M$&nbsp;là trung điểm&nbsp;$OA$, $N$&nbsp;là trung điểm&nbsp;$OB$. $K$&nbsp;là trung điểm&nbsp;$MN$. Tính&nbsp;$OK$:", options: ["A. $3,5\\text{cm}$", "B. $4,5\\text{cm}$", "C. $3\\text{cm}$", "D. $7\\text{cm}$"], correct_idx: 0, explain: "$OM = 2, ON = 5$. $M, N$ nằm trên cùng tia $Ox$, $MN = 5-2=3$. $K$ là trung điểm $MN \\Rightarrow MK = 1,5$. $OK = OM + MK = 2 + 1,5 = 3,5\\text{ cm}$. Chọn A." },
{ q_title: "Câu 18", q_content: "Góc&nbsp;$\\angle AOC = 160^{\\circ}$, tia&nbsp;$OB$&nbsp;nằm giữa&nbsp;$OA, OC$. Biết&nbsp;$\\angle AOB - \\angle BOC = 40^{\\circ}$. Tia&nbsp;$OM$&nbsp;nằm giữa&nbsp;$OA, OB$. Nếu&nbsp;$OB$&nbsp;là phân giác&nbsp;$\\angle MOC$&nbsp;thì&nbsp;$\\angle AOM$&nbsp;bằng:", options: ["A. $40^{\\circ}$", "B. $60^{\\circ}$", "C. $20^{\\circ}$", "D. $80^{\\circ}$"], correct_idx: 0, explain: "Giải hệ: $\\angle AOB = 100^{\\circ}, \\angle BOC = 60^{\\circ}$. OB phân giác $\\angle MOC \\Rightarrow \\angle MOB = \\angle BOC = 60^{\\circ}$. Vậy $\\angle AOM = 100^{\\circ} - 60^{\\circ} = 40^{\\circ}$. Chọn A." },
{ q_title: "Câu 19", q_content: "Cửa hàng bán trà sữa thống kê 4 ngày bằng biểu đồ tranh. Tổng số ly ngày 2 và 3 nhiều hơn ngày 4 và 5 là&nbsp;$15$&nbsp;ly. (Biết T2+T3 có 6 biểu tượng, T4+T5 có 5 biểu tượng). Tổng số ly bán được là:", options: ["A. $165$", "B. $160$", "C. $60$", "D. $11$"], correct_idx: 0, explain: "Hiệu số biểu tượng là $6-5=1$ ứng với 15 ly. Tổng số biểu tượng là $11$. Tổng số ly là $11 \\cdot 15 = 165$ ly. Chọn A." },
{ q_title: "Câu 20", q_content: "Gieo đồng thời hai con xúc xắc. Xác suất để tổng số chấm xuất hiện trên hai con bằng&nbsp;$8$&nbsp;là:", options: ["A. $\\dfrac{1}{9}$", "B. $\\dfrac{5}{36}$", "C. $\\dfrac{7}{36}$", "D. $\\dfrac{1}{6}$"], correct_idx: 1, explain: "Các cặp ra tổng 8: (2,6), (6,2), (3,5), (5,3), (4,4). Có 5 trường hợp thuận lợi trên tổng 36 trường hợp. Chọn B." },
{ q_title: "Câu 21", q_content: "Trong các khẳng định sau về lô xuất khẩu 120 tấn thanh long (Đợt 1 bán 2/3 lãi 20%, Đợt 2 bán lỗ 10%, giá gốc 30tr/tấn), khẳng định nào SAI?", options: ["A. Số lượng thanh long bán đợt 1 là 80 tấn.", "B. Đợt 2, giá bán mỗi tấn thanh long là 20 triệu đồng.", "C. Giá bán mỗi tấn ở đợt 1 là 36 triệu đồng.", "D. Tổng số tiền lãi thu được đợt 1 là 480 triệu đồng."], correct_idx: 1, explain: "Đợt 2 bán lỗ 10% so với giá gốc (30 triệu). Giá bán phải là&nbsp;$30 - 30 \\cdot 10\\% = 27$&nbsp;triệu đồng. Đáp án B ghi 20 triệu là SAI. Chọn B." },
{ q_title: "Câu 22", q_content: "Cho 6 đường thẳng phân biệt cùng đi qua một điểm O. Khẳng định nào sau đây là ĐÚNG?", options: ["A. Số tia gốc O được tạo thành là 6 tia.", "B. Nếu vẽ thêm 3 đường thẳng đi qua O thì có 190 góc (kể cả góc bẹt).", "C. Số góc tạo thành (không kể góc bẹt) là 60 góc.", "D. Số góc tạo thành (không kể góc bẹt) là 66 góc."], correct_idx: 2, explain: "6 đường thẳng tạo ra 12 tia. Số góc (không kể bẹt) là&nbsp;$\\dfrac{12 \\cdot 11}{2} - 6 = 60$&nbsp;góc. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) &nbsp; Không quy đồng hãy tính hợp lý tổng sau:&nbsp;$A = \\dfrac{-1}{20} + \\dfrac{-1}{30} + \\dfrac{-1}{42} + \\dfrac{-1}{56} + \\dfrac{-1}{72} + \\dfrac{-1}{90}$<br>b) &nbsp; Tìm số nguyên&nbsp;$x, y$&nbsp;biết:&nbsp;$xy + 12 = x + y$", lines_needed: 10, strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br><strong>Ý a:</strong> Nhận thấy các mẫu số là tích của hai số tự nhiên liên tiếp. Hãy đặt dấu trừ ra ngoài để tạo chuỗi sai phân chuẩn mực.<br><strong>Ý b:</strong> Đây là phương trình nghiệm nguyên dạng tổng-tích. Gom các hạng tử chứa biến về một vế, thêm bớt hằng số để 'ép' thành nhân tử chung.", solution: "<li><strong>a)</strong> Ta có:&nbsp;$A = - \\left( \\dfrac{1}{4 \\cdot 5} + \\dfrac{1}{5 \\cdot 6} + \\dots + \\dfrac{1}{9 \\cdot 10} \\right)$</li><li>Áp dụng công thức sai phân:</li><li>$A = - \\left( \\dfrac{1}{4} - \\dfrac{1}{5} + \\dfrac{1}{5} - \\dots - \\dfrac{1}{10} \\right) = - \\left( \\dfrac{1}{4} - \\dfrac{1}{10} \\right)$</li><li>$A = - \\left( \\dfrac{5}{20} - \\dfrac{2}{20} \\right) = - \\dfrac{3}{20}$.</li><li class='mt-3'><strong>b)</strong> Ta có:&nbsp;$xy - x - y = -12$</li><li>$x(y - 1) - (y - 1) - 1 = -12 \\Rightarrow (x - 1)(y - 1) = -11$.</li><li>Vì&nbsp;$x, y \\in \\mathbb{Z}$ nên ta lập bảng xét các ước của&nbsp;$-11$:</li><li>+ $x-1=1, y-1=-11 \\Rightarrow x=2, y=-10$</li><li>+ $x-1=-11, y-1=1 \\Rightarrow x=-10, y=2$</li><li>+ $x-1=-1, y-1=11 \\Rightarrow x=0, y=12$</li><li>+ $x-1=11, y-1=-1 \\Rightarrow x=12, y=0$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) $-3/20$; b) Các cặp $(x;y)$ là $(2;-10), (-10;2), (0;12), (12;0)$</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) &nbsp; So sánh lũy thừa:&nbsp;$2^{225}$&nbsp;và&nbsp;$3^{151}$<br>b) &nbsp; Tìm hai số tự nhiên&nbsp;$a, b$&nbsp;biết rằng&nbsp;$a \\cdot b = 2700$&nbsp;và&nbsp;$\\text{BCNN}(a,b) = 90$", lines_needed: 10, strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br><strong>Ý a:</strong> Đưa về cùng số mũ&nbsp;$75$&nbsp;bằng cách lấy&nbsp;$225 = 3 \\cdot 75$&nbsp;và&nbsp;$150 = 2 \\cdot 75$. Với&nbsp;$3^{151}$, tách bớt một thừa số&nbsp;$3$&nbsp;ra ngoài.<br><strong>Ý b:</strong> Sử dụng định lý quan trọng:&nbsp;$a \\cdot b = \\text{ƯCLN}(a,b) \\cdot \\text{BCNN}(a,b)$. Tìm ƯCLN rồi đặt ẩn phụ&nbsp;$a = ƯCLN \\cdot x, b = ƯCLN \\cdot y$ (với&nbsp;$x,y$&nbsp;nguyên tố cùng nhau).", solution: "<li><strong>a)</strong> Ta có:&nbsp;$2^{225} = (2^3)^{75} = 8^{75}$.</li><li>Mặt khác:&nbsp;$3^{151} > 3^{150} = (3^2)^{75} = 9^{75}$.</li><li>Vì&nbsp;$8^{75} < 9^{75}$ nên&nbsp;$2^{225} < 3^{151}$.</li><li class='mt-3'><strong>b)</strong> Ta có hệ thức:&nbsp;$\\text{ƯCLN}(a,b) = (a \\cdot b) : \\text{BCNN}(a,b) = 2700 : 90 = 30$.</li><li>Đặt&nbsp;$a = 30x, b = 30y$ với&nbsp;$\\text{ƯCLN}(x,y) = 1$.</li><li>Ta có:&nbsp;$x \\cdot y = \\text{BCNN} : \\text{ƯCLN} = 90 : 30 = 3$.</li><li>Vì&nbsp;$x, y \\in \\mathbb{N}$ và nguyên tố cùng nhau, ta có các cặp&nbsp;$(x,y)$ là&nbsp;$(1,3)$ hoặc&nbsp;$(3,1)$.</li><li>Suy ra các cặp&nbsp;$(a,b)$ tương ứng là&nbsp;$(30, 90)$ hoặc&nbsp;$(90, 30)$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) $2^{225} < 3^{151}$; b) $(30;90)$ hoặc $(90;30)$</li>" },
{ t_title: "Câu 3 (3,0 điểm)", t_content: "a) &nbsp; So sánh&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;biết:&nbsp;$A = \\dfrac{100^{2009} + 1}{100^{2008} + 1}$&nbsp;và&nbsp;$B = \\dfrac{100^{2010} + 1}{100^{2009} + 1}$<br>b) &nbsp; (Bài toán Công viên xanh) Phần diện tích là&nbsp;$2688\\text{ m}^2$&nbsp;dùng để trồng cỏ nhung chiếm phần còn lại sau khi dùng&nbsp;$\\dfrac{2}{5}$&nbsp;trồng hoa hồng và&nbsp;$\\dfrac{1}{3}$&nbsp;trồng hoa cúc. Chi phí chăm sóc 1 tháng là: Hồng&nbsp;$50.000\\text{đ/m}^2$, Cúc&nbsp;$40.000\\text{đ/m}^2$, Cỏ nhung&nbsp;$20.000\\text{đ/m}^2$. Tính tổng chi phí 1 tháng.", lines_needed: 12, strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br><strong>Ý a:</strong> Cả tử và mẫu đều là số lớn. Vì tử lớn hơn mẫu, ta tách phần nguyên là số&nbsp;$100$&nbsp;bằng cách biến đổi tử (trừ đi 100).<br><strong>Ý b:</strong> Tìm tổng diện tích khu đất bằng cách chia diện tích cỏ nhung cho tỉ lệ phần trăm tương ứng của nó. Sau đó tính diện tích từng loại và nhân với đơn giá.", solution: "<li><strong>a)</strong> Ta có biểu thức phần dư:&nbsp;$A = \\dfrac{100(100^{2008} + 1) - 99}{100^{2008} + 1} = 100 - \\dfrac{99}{100^{2008} + 1}$.</li><li>Tương tự:&nbsp;$B = 100 - \\dfrac{99}{100^{2009} + 1}$.</li><li>Vì&nbsp;$100^{2008} + 1 < 100^{2009} + 1$ nên phân số phần trừ của&nbsp;$A$&nbsp;lớn hơn của&nbsp;$B$. Do đó&nbsp;$A < B$.</li><li class='mt-3'><strong>b)</strong> Phân số chỉ diện tích cỏ nhung là:&nbsp;$1 - \\left(\\dfrac{2}{5} + \\dfrac{1}{3}\\right) = \\dfrac{4}{15}$ (tổng diện tích).</li><li>Tổng diện tích khu đất:&nbsp;$2688 : \\dfrac{4}{15} = 10080\\text{ (m}^2)$.</li><li>Diện tích hoa hồng:&nbsp;$10080 \\cdot \\dfrac{2}{5} = 4032\\text{ (m}^2) \\Rightarrow$ Chi phí:&nbsp;$4032 \\cdot 50000 = 201.600.000\\text{ (đ)}$.</li><li>Diện tích hoa cúc:&nbsp;$10080 \\cdot \\dfrac{1}{3} = 3360\\text{ (m}^2) \\Rightarrow$ Chi phí:&nbsp;$3360 \\cdot 40000 = 134.400.000\\text{ (đ)}$.</li><li>Chi phí cỏ nhung:&nbsp;$2688 \\cdot 20000 = 53.760.000\\text{ (đ)}$.</li><li>Tổng chi phí:&nbsp;$201.600.000 + 134.400.000 + 53.760.000 = 389.760.000\\text{ (VNĐ)}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) A < B; b) 389.760.000 VNĐ</li>" },
{ t_title: "Câu 4 (1,0 điểm)", t_content: "Một nhóm&nbsp;$100$&nbsp;học sinh chơi gieo xúc xắc 6 mặt. Kết quả xuất hiện được ghi lại trong bảng sau:<br><table class='min-w-full text-center border-collapse border border-gray-300 my-4'><tr><th class='border border-gray-300 p-2 bg-gray-100'>Mặt xuất hiện</th><td class='border border-gray-300 p-2'>1 chấm</td><td class='border border-gray-300 p-2'>2 chấm</td><td class='border border-gray-300 p-2'>3 chấm</td><td class='border border-gray-300 p-2'>4 chấm</td><td class='border border-gray-300 p-2'>5 chấm</td><td class='border border-gray-300 p-2'>6 chấm</td></tr><tr><th class='border border-gray-300 p-2 bg-gray-100'>Số lần xuất hiện</th><td class='border border-gray-300 p-2'>15</td><td class='border border-gray-300 p-2'>18</td><td class='border border-gray-300 p-2'>17</td><td class='border border-gray-300 p-2'>14</td><td class='border border-gray-300 p-2'>20</td><td class='border border-gray-300 p-2'>16</td></tr></table>Tính xác suất thực nghiệm của sự kiện: 'Gieo được mặt có số chấm là một số nguyên tố'.", lines_needed: 6, strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Xác định các mặt có số chấm là số nguyên tố (2, 3, 5). Tính tổng số lần xuất hiện của các mặt này, sau đó lập tỉ số với tổng số lần gieo (100).", solution: "<li>Các mặt xúc xắc có số chấm là số nguyên tố là:&nbsp;$2, 3, 5$.</li><li>Tổng số lần xuất hiện của các mặt này là:&nbsp;$18 + 17 + 20 = 55$&nbsp;(lần).</li><li>Xác suất thực nghiệm của sự kiện là:&nbsp;$\\dfrac{55}{100} = 55\\%$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $55\\%$</li>" },
{ t_title: "Câu 5 (3,0 điểm)", t_content: "<strong>1)</strong> Mảnh đất hình chữ nhật dài&nbsp;$20\\text{ m}$, rộng&nbsp;$15\\text{ m}$. Bác An chia làm ba phần: Khu trồng hoa là hình thoi có đỉnh là trung điểm 4 cạnh hcn; Khu lối đi là 4 tam giác ở góc; Khu tiểu cảnh chiếm&nbsp;$20\\% $&nbsp;diện tích trồng hoa.<br>a) Tính diện tích khu lối đi.<br>b) Tính diện tích thực tế trồng hoa.<br>c) Tính tiền mua gạch lát lối đi, biết gạch vuông cạnh&nbsp;$50\\text{ cm}$, giá&nbsp;$45.000\\text{ đ/viên}$.<br><br><strong>2)</strong> Cho&nbsp;$n$&nbsp;điểm phân biệt, có đúng&nbsp;$10$&nbsp;điểm thẳng hàng. Vẽ được tất cả&nbsp;$256$&nbsp;đường thẳng. Tìm số điểm&nbsp;$n$.", lines_needed: 12, strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br><strong>Phần 1:</strong> Diện tích hình thoi nối trung điểm hcn luôn bằng đúng MỘT NỬA diện tích hcn đó. Khu lối đi chính là nửa còn lại.<br><strong>Phần 2:</strong> Áp dụng công thức tính số đường thẳng bị hao hụt khi có điểm thẳng hàng:&nbsp;$\\dfrac{n(n-1)}{2} - \\left(\\dfrac{k(k-1)}{2} - 1\\right) = S$ với&nbsp;$k = 10$.", solution: "<li><strong>1a)</strong> Diện tích mảnh đất hình chữ nhật:&nbsp;$20 \\cdot 15 = 300\\text{ (m}^2)$.</li><li>Khu trồng hoa (hình thoi) có diện tích bằng nửa hình chữ nhật:&nbsp;$300 : 2 = 150\\text{ (m}^2)$.</li><li>Diện tích khu vực lối đi bằng phần còn lại:&nbsp;$300 - 150 = 150\\text{ (m}^2)$.</li><li><strong>1b)</strong> Diện tích làm tiểu cảnh:&nbsp;$150 \\cdot 20\\% = 30\\text{ (m}^2)$.</li><li>Diện tích thực tế trồng hoa:&nbsp;$150 - 30 = 120\\text{ (m}^2)$.</li><li><strong>1c)</strong> Diện tích một viên gạch:&nbsp;$0,5 \\cdot 0,5 = 0,25\\text{ (m}^2)$.</li><li>Số viên gạch cần mua để lát lối đi:&nbsp;$150 : 0,25 = 600$&nbsp;(viên).</li><li>Tổng tiền mua gạch:&nbsp;$600 \\cdot 45000 = 27.000.000$&nbsp;(đồng).</li><li class='mt-3'><strong>2)</strong> Tổng số đường thẳng vẽ được nếu không có điểm thẳng hàng là:&nbsp;$\\dfrac{n(n-1)}{2}$.</li><li>$10$ điểm thẳng hàng đáng lẽ tạo ra&nbsp;$\\dfrac{10 \\cdot 9}{2} = 45$&nbsp;đường thẳng, nhưng thực tế chỉ tạo $1$ đường. Số đường bị hao hụt là&nbsp;$44$&nbsp;đường.</li><li>Ta có phương trình:&nbsp;$\\dfrac{n(n-1)}{2} - 44 = 256 \\Rightarrow \\dfrac{n(n-1)}{2} = 300 \\Rightarrow n(n-1) = 600$.</li><li>Vì&nbsp;$25 \\cdot 24 = 600$ nên suy ra&nbsp;$n = 25$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: 1) a: $150\\text{ m}^2$, b: $120\\text{ m}^2$, c: $27$ triệu đ; 2) $n=25$</li>" }
]
});

id: 10, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 10", icon: "✨", color: "fuchsia", level: "Nâng cao", time: "150 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Biết&nbsp;$\\dfrac{a}{b} = \\dfrac{4}{5}$. Nếu cộng thêm&nbsp;$12$&nbsp;vào tử số thì phải cộng thêm bao nhiêu vào mẫu số để giá trị phân số không đổi?", options: ["A. 12", "B. 15", "C. 10", "D. 20"], correct_idx: 1, explain: "Giả sử phải cộng thêm&nbsp;$x$&nbsp;vào mẫu. Ta có&nbsp;$\\dfrac{a+12}{b+x} = \\dfrac{4}{5} = \\dfrac{a}{b}$. Áp dụng nhân chéo:&nbsp;$5(a+12) = 4(b+x) \\Rightarrow 5a+60 = 4b+4x$. Mặt khác, từ&nbsp;$\\dfrac{a}{b}=\\dfrac{4}{5} \\Rightarrow 5a=4b$. Thế vào ta được&nbsp;$4b+60 = 4b+4x \\Rightarrow 4x=60 \\Rightarrow x=15$. Chọn B." },
{ q_title: "Câu 2", q_content: "Số các chữ số&nbsp;$0$&nbsp;tận cùng của tích&nbsp;$P = 1 \\cdot 2 \\cdot 3 \\cdot \\dots \\cdot 20$&nbsp;là:", options: ["A. 4", "B. 5", "C. 2", "D. 3"], correct_idx: 0, explain: "Số chữ số 0 tận cùng được quyết định bởi số cặp thừa số 2 và 5. Trong tích từ 1 đến 20, các số chia hết cho 5 là 5, 10, 15, 20. Có đúng 4 thừa số 5. Số thừa số 2 thì rất nhiều. Vậy tích có 4 chữ số 0 tận cùng. Chọn A." },
{ q_title: "Câu 3", q_content: "Khẳng định nào sau đây SAI về hình học phẳng?", options: ["A. Góc nhọn nhỏ hơn góc vuông.", "B. Hai góc kề bù có tổng bằng $180^{\\circ}$.", "C. Góc tù lớn hơn góc bẹt.", "D. Góc vuông có số đo bằng $90^{\\circ}$."], correct_idx: 2, explain: "Góc tù có số đo nhỏ hơn&nbsp;$180^{\\circ}$, góc bẹt có số đo bằng&nbsp;$180^{\\circ}$. Vậy góc tù nhỏ hơn góc bẹt. Khẳng định C sai. Chọn C." },
{ q_title: "Câu 4", q_content: "Tìm số tự nhiên&nbsp;$n$&nbsp;nhỏ nhất để&nbsp;$n^2 + 1$&nbsp;chia hết cho 5:", options: ["A. 1", "B. 2", "C. 3", "D. 4"], correct_idx: 1, explain: "Thử lần lượt các số tự nhiên: Nếu&nbsp;$n=1 \\Rightarrow n^2+1 = 2$&nbsp;(không chia hết cho 5). Nếu&nbsp;$n=2 \\Rightarrow n^2+1 = 4+1=5$&nbsp;(chia hết cho 5). Vậy&nbsp;$n=2$&nbsp;là số nhỏ nhất. Chọn B." },
{ q_title: "Câu 5", q_content: "Giá trị&nbsp;$\\dfrac{3}{5}$&nbsp;của&nbsp;$1$&nbsp;giờ&nbsp;$40$&nbsp;phút bằng bao nhiêu phút?", options: ["A. 60 phút", "B. 40 phút", "C. 36 phút", "D. 45 phút"], correct_idx: 0, explain: "Đổi 1 giờ 40 phút = 100 phút. Giá trị cần tìm là:&nbsp;$100 \\cdot \\dfrac{3}{5} = 60$&nbsp;(phút). Chọn A." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$29,996$&nbsp;đến hàng phần trăm ta được kết quả là:", options: ["A. 30,0", "B. 30,00", "C. 29,99", "D. 30"], correct_idx: 1, explain: "Chữ số hàng phần nghìn là&nbsp;$6 \\ge 5$&nbsp;nên cộng thêm 1 vào hàng phần trăm ($9+1=10$, viết 0 nhớ 1 sang phần mười... cứ thế nhớ sang phần nguyên). Kết quả là&nbsp;$30,00$. Chọn B." },
{ q_title: "Câu 7", q_content: "Một lớp có&nbsp;$40$&nbsp;học sinh. Số học sinh nam bằng&nbsp;$25\\%$&nbsp;số học sinh nữ. Số học sinh nam là:", options: ["A. 10", "B. 8", "C. 32", "D. 30"], correct_idx: 1, explain: "Đổi&nbsp;$25\\% = \\dfrac{1}{4}$. Số nam bằng&nbsp;$\\dfrac{1}{4}$&nbsp;số nữ. Tổng số phần bằng nhau là&nbsp;$1 + 4 = 5$&nbsp;(phần). Giá trị 1 phần là&nbsp;$40 : 5 = 8$. Số HS nam (chiếm 1 phần) là 8 em. Chọn B." },
{ q_title: "Câu 8", q_content: "Điểm&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$&nbsp;nếu:", options: ["A. $MA = MB$", "B. $M$&nbsp;nằm giữa&nbsp;$A, B$&nbsp;và&nbsp;$MA = MB$", "C. $MA = MB = AB/2$", "D. Cả B và C đều đúng"], correct_idx: 3, explain: "Theo định nghĩa, trung điểm là điểm nằm giữa và cách đều hai mút. Khẳng định B đúng. Khẳng định C là hệ quả tương đương. Cả B và C đều đúng. Chọn D." },
{ q_title: "Câu 9", q_content: "Vẽ&nbsp;$n$&nbsp;tia chung gốc tạo thành&nbsp;$10$&nbsp;góc (không kể góc bẹt). Giá trị của&nbsp;$n$&nbsp;là:", options: ["A. 4", "B. 5", "C. 10", "D. 20"], correct_idx: 1, explain: "Số góc tạo thành bởi&nbsp;$n$&nbsp;tia chung gốc là&nbsp;$\\dfrac{n(n-1)}{2} = 10 \\Rightarrow n(n-1) = 20$. Vì&nbsp;$5 \\cdot 4 = 20$&nbsp;nên&nbsp;$n=5$. Chọn B." },
{ q_title: "Câu 10", q_content: "Hai góc bù nhau có một góc là&nbsp;$45^{\\circ}$. Góc còn lại có số đo là:", options: ["A. $45^{\\circ}$", "B. $135^{\\circ}$", "C. $55^{\\circ}$", "D. $145^{\\circ}$"], correct_idx: 1, explain: "Hai góc bù nhau có tổng số đo bằng&nbsp;$180^{\\circ}$. Góc còn lại là:&nbsp;$180^{\\circ} - 45^{\\circ} = 135^{\\circ}$. Chọn B." },
{ q_title: "Câu 11", q_content: "Cho phân số&nbsp;$A = \\dfrac{n+5}{n+2}$&nbsp;với&nbsp;$n \\in \\mathbb{Z}, n \\neq -2$. Xét 3 mệnh đề sau:<br>(I) Với mọi giá trị nguyên của&nbsp;$n$, $A$&nbsp;luôn là phân số tối giản.<br>(II) Để&nbsp;$A$&nbsp;là số nguyên thì&nbsp;$n+2$&nbsp;phải là ước của 3.<br>(III) Có đúng 4 giá trị nguyên của&nbsp;$n$&nbsp;để&nbsp;$A$&nbsp;nhận giá trị là một số nguyên.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Sai (Nếu n=1 thì A = 6/3 = 2, không tối giản). (II) Đúng (Vì A = 1 + 3/(n+2), để nguyên thì n+2 phải là ước của 3). (III) Đúng (Ư(3) có 4 giá trị là 1, -1, 3, -3, suy ra có 4 giá trị của n). Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Cho đoạn thẳng&nbsp;$AB = 10\\text{ cm}$. Điểm&nbsp;$C$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;sao cho&nbsp;$AC = 4\\text{ cm}$. Lấy điểm&nbsp;$M$&nbsp;là trung điểm của&nbsp;$BC$. Xét 3 mệnh đề sau:<br>(I) Độ dài đoạn&nbsp;$BC = 6\\text{ cm}$.<br>(II) Độ dài đoạn&nbsp;$AM = 7\\text{ cm}$.<br>(III) Điểm&nbsp;$C$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$M$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 3, explain: "(I) Vì C nằm giữa A và B nên BC = AB - AC = 10 - 4 = 6cm (Đúng). (II) M là trung điểm BC nên CM = 3cm. Điểm C nằm giữa A, M nên AM = AC + CM = 4 + 3 = 7cm (Đúng). (III) Trên đoạn AM, AC=4 < AM=7 nên C nằm giữa A và M (Đúng). Có 3 mệnh đề đúng. Chọn D." }
],
tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Thực hiện phép tính hợp lý:&nbsp;$C = \\dfrac{5}{9} \\cdot \\dfrac{7}{13} - \\dfrac{5}{9} \\cdot \\dfrac{20}{13} + \\dfrac{5}{9}$<div class='mt-6'>b) Tính giá trị biểu thức:&nbsp;$D = \\dfrac{2}{1 \\cdot 3} + \\dfrac{2}{3 \\cdot 5} + \\dfrac{2}{5 \\cdot 7} + \\dots + \\dfrac{2}{99 \\cdot 101}$</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Biểu thức có sự xuất hiện lặp lại của phân số nào? (Chính là&nbsp;$\\dfrac{5}{9}$).<br>- <b>How:</b> Để tính hợp lý, ta áp dụng tính chất phân phối. Kéo&nbsp;$\\dfrac{5}{9}$&nbsp;ra ngoài dấu ngoặc.<br>- <b>Where:</b> Cạm bẫy 'chết người' nằm ở đâu? Hạng tử cuối cùng chỉ đứng một mình là&nbsp;$\\dfrac{5}{9}$. Hãy nhớ nó thực chất là&nbsp;$\\dfrac{5}{9} \\cdot 1$. Rất nhiều bạn quên số&nbsp;$1$&nbsp;này khi đặt nhân tử chung.<br><b>Ý b:</b><br>- <b>What:</b> Đây là chuỗi phân số có quy luật gì ở mẫu? (Khoảng cách giữa hai thừa số liên tiếp là&nbsp;$3 - 1 = 2$).<br>- <b>Why:</b> Tử số hiện tại đã là&nbsp;$2$, vừa khít với khoảng cách dưới mẫu. Điều này cho phép ta làm gì? (Tách trực tiếp thành hiệu hai phân số đơn vị).<br>- <b>How:</b> Dùng công thức&nbsp;$\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$. Các số hạng đối nhau ở phần giữa sẽ tự động triệt tiêu.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$C$:</b></li><li class='ml-4'>Ta viết lại biểu thức&nbsp;$C$&nbsp;cho rõ ràng các nhân tử:</li><li class='ml-8'>$C = \\dfrac{5}{9} \\cdot \\dfrac{7}{13} - \\dfrac{5}{9} \\cdot \\dfrac{20}{13} + \\dfrac{5}{9} \\cdot 1$</li><li class='ml-4'>Áp dụng tính chất phân phối của phép nhân đối với phép cộng/trừ:</li><li class='ml-8'>$C = \\dfrac{5}{9} \\cdot \\left( \\dfrac{7}{13} - \\dfrac{20}{13} + 1 \\right)$</li><li class='ml-4'>Thực hiện tính toán bên trong dấu ngoặc:</li><li class='ml-8'>$C = \\dfrac{5}{9} \\cdot \\left( \\dfrac{-13}{13} + 1 \\right)$</li><li class='ml-8'>$C = \\dfrac{5}{9} \\cdot (-1 + 1)$</li><li class='ml-8'>$C = \\dfrac{5}{9} \\cdot 0 = 0$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $C = 0$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$D$:</b></li><li class='ml-4'>Áp dụng công thức tách phân số sai phân, ta có:</li><li class='ml-8'>$D = \\left( \\dfrac{1}{1} - \\dfrac{1}{3} \\right) + \\left( \\dfrac{1}{3} - \\dfrac{1}{5} \\right) + \\left( \\dfrac{1}{5} - \\dfrac{1}{7} \\right) + \\dots + \\left( \\dfrac{1}{99} - \\dfrac{1}{101} \\right)$</li><li class='ml-4'>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở giữa:</li><li class='ml-8'>$D = 1 - \\dfrac{1}{101}$</li><li class='ml-4'>Quy đồng mẫu số và tính kết quả:</li><li class='ml-8'>$D = \\dfrac{101}{101} - \\dfrac{1}{101} = \\dfrac{100}{101}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $D = \\dfrac{100}{101}$.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Tìm&nbsp;$x$&nbsp;biết:&nbsp;$(x - 1,5)^2 = \\dfrac{1}{4}$<div class='mt-6'>b) Chứng minh rằng phân số&nbsp;$P = \\dfrac{12n+1}{30n+2}$&nbsp;là phân số tối giản với mọi số tự nhiên&nbsp;$n$.</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Phương trình có chứa lũy thừa bậc chẵn (bậc 2).<br>- <b>How:</b> Để giải phóng&nbsp;$x$, ta cần đưa số&nbsp;$\\dfrac{1}{4}$&nbsp;ở vế phải về dạng bình phương.<br>- <b>Why:</b> Tại sao khi bỏ số mũ 2, ta lại phải chia làm 2 trường hợp? (Vì bình phương của một số dương và số âm (đối nhau) đều cho cùng một kết quả. Ví dụ:&nbsp;$0,5^2 = 0,25$&nbsp;và&nbsp;$(-0,5)^2 = 0,25$).<br><b>Ý b:</b><br>- <b>What:</b> Muốn chứng minh một phân số luôn tối giản, ta phải chứng minh Ước chung lớn nhất (ƯCLN) của tử số và mẫu số bằng mấy? (Bằng 1).<br>- <b>How:</b> Gọi&nbsp;$d$&nbsp;là ƯCLN. Làm sao để loại bỏ ẩn&nbsp;$n$&nbsp;bằng phép trừ?<br>- <b>Where:</b> Ta phải tìm Bội chung nhỏ nhất của hai hệ số&nbsp;$12$&nbsp;và&nbsp;$30$. BCNN(12, 30) =&nbsp;$60$. Vậy ta cần nhân tử số với&nbsp;$5$&nbsp;và nhân mẫu số với&nbsp;$2$&nbsp;để làm xuất hiện&nbsp;$60n$.", solution: "<li><b>a) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Ta có phương trình:</li><li class='ml-8'>$(x - 1,5)^2 = \\dfrac{1}{4}$</li><li class='ml-4'>Đưa các số về cùng định dạng phân số và bình phương:</li><li class='ml-8'>$\\left( x - \\dfrac{3}{2} \\right)^2 = \\left( \\dfrac{1}{2} \\right)^2 = \\left( \\dfrac{-1}{2} \\right)^2$</li><li class='ml-4'>Ta chia làm 2 trường hợp:</li><li class='ml-4'><b>Trường hợp 1:</b></li><li class='ml-8'>$x - \\dfrac{3}{2} = \\dfrac{1}{2} \\Rightarrow x = \\dfrac{1}{2} + \\dfrac{3}{2} = \\dfrac{4}{2} = 2$</li><li class='ml-4'><b>Trường hợp 2:</b></li><li class='ml-8'>$x - \\dfrac{3}{2} = \\dfrac{-1}{2} \\Rightarrow x = \\dfrac{-1}{2} + \\dfrac{3}{2} = \\dfrac{2}{2} = 1$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x \\in \\{1; 2\\}$.</li><li><b>b) Chứng minh phân số tối giản:</b></li><li class='ml-4'>Gọi&nbsp;$d = \\text{ƯCLN}(12n + 1, 30n + 2)$&nbsp;với&nbsp;$d \\in \\mathbb{N}^*$.</li><li class='ml-4'>Khi đó ta có, tử và mẫu đều phải chia hết cho&nbsp;$d$:</li><li class='ml-8'>$(12n + 1) \\vdots d \\Rightarrow 5 \\cdot (12n + 1) \\vdots d \\Rightarrow (60n + 5) \\vdots d$</li><li class='ml-8'>$(30n + 2) \\vdots d \\Rightarrow 2 \\cdot (30n + 2) \\vdots d \\Rightarrow (60n + 4) \\vdots d$</li><li class='ml-4'>Lấy hai biểu thức vừa nhân trừ cho nhau, hiệu của chúng cũng phải chia hết cho&nbsp;$d$:</li><li class='ml-8'>$[(60n + 5) - (60n + 4)] \\vdots d \\Rightarrow 1 \\vdots d$</li><li class='ml-4'>Vì&nbsp;$d$&nbsp;là số nguyên dương và&nbsp;$1$&nbsp;chia hết cho&nbsp;$d$&nbsp;nên bắt buộc&nbsp;$d = 1$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận b: Vì ƯCLN của tử số và mẫu số luôn bằng 1, nên phân số&nbsp;$P$&nbsp;luôn tối giản với mọi số tự nhiên&nbsp;$n$.</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Một trang trại chăn nuôi bò và gà. Người quản lý đếm được số chân gà nhiều hơn số chân bò là&nbsp;$20$&nbsp;chân. Biết rằng số lượng bò bằng&nbsp;$25\\%$&nbsp;số lượng gà.<div class='mt-6'>a) Hỏi trang trại có bao nhiêu con bò và bao nhiêu con gà?</div><div class='mt-6'>b) Tính tỉ số phần trăm khối lượng thức ăn tiêu thụ của đàn gà so với đàn bò trong một ngày. Biết trung bình một con bò ăn&nbsp;$10\\text{ kg}$&nbsp;cỏ/ngày, một con gà ăn&nbsp;$0,2\\text{ kg}$&nbsp;cám/ngày.</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Bài toán liên quan đến số con và số chân của 2 loài vật.<br>- <b>How:</b> Gọi số lượng của một loài là ẩn số (ví dụ:&nbsp;$x$). Dựa vào tỉ lệ 'Bò bằng 25% Gà' để biểu diễn số lượng loài kia theo&nbsp;$x$.<br>- <b>Where:</b> Điểm chốt để lập phương trình là 'hiệu số chân'. Hãy nhớ: 1 con bò có 4 chân, 1 con gà có 2 chân. Hãy tính số chân của mỗi loài theo ẩn&nbsp;$x$&nbsp;rồi đem trừ cho nhau.<br><b>Ý b:</b><br>- <b>What:</b> Tính khối lượng thức ăn của toàn đàn bò và toàn đàn gà.<br>- <b>How:</b> Lấy 'Số con' nhân với 'Khẩu phần ăn của 1 con'. Sau đó lập tỉ số phần trăm. Đừng quên công thức: (Khối lượng Gà / Khối lượng Bò) $\\cdot 100\\%$.", solution: "<li><b>a) Tính số bò và số gà:</b></li><li class='ml-4'>Đổi tỉ số:&nbsp;$25\\% = \\dfrac{1}{4}$.</li><li class='ml-4'>Gọi số lượng bò của trang trại là&nbsp;$x$&nbsp;(con) (điều kiện:&nbsp;$x \\in \\mathbb{N}^*$).</li><li class='ml-4'>Vì số bò bằng&nbsp;$\\dfrac{1}{4}$&nbsp;số gà, suy ra số lượng gà là&nbsp;$4 \\cdot x$&nbsp;(con).</li><li class='ml-4'>Tổng số chân bò là:&nbsp;$4 \\cdot x$&nbsp;(chân).</li><li class='ml-4'>Tổng số chân gà là:&nbsp;$2 \\cdot (4 \\cdot x) = 8 \\cdot x$&nbsp;(chân).</li><li class='ml-4'>Theo đề bài, số chân gà nhiều hơn số chân bò là 20 chân. Ta có phương trình:</li><li class='ml-8'>$8 \\cdot x - 4 \\cdot x = 20 \\Rightarrow 4 \\cdot x = 20 \\Rightarrow x = 5$&nbsp;(Thỏa mãn).</li><li class='ml-4'>Vậy số lượng bò là&nbsp;$5$&nbsp;con. Số lượng gà là:&nbsp;$5 \\cdot 4 = 20$&nbsp;con.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Trang trại có 5 con bò và 20 con gà.</li><li><b>b) Tính tỉ số phần trăm khối lượng thức ăn:</b></li><li class='ml-4'>Khối lượng cỏ mà đàn bò ($5$&nbsp;con) ăn trong một ngày là:&nbsp;$5 \\cdot 10 = 50\\text{ (kg)}$.</li><li class='ml-4'>Khối lượng cám mà đàn gà ($20$&nbsp;con) ăn trong một ngày là:&nbsp;$20 \\cdot 0,2 = 4\\text{ (kg)}$.</li><li class='ml-4'>Tỉ số phần trăm khối lượng thức ăn của đàn gà so với đàn bò là:</li><li class='ml-8'>$\\dfrac{4}{50} \\cdot 100\\% = 0,08 \\cdot 100\\% = 8\\%$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $8\\%$.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Cho góc bẹt&nbsp;$\\angle xOy$. Vẽ tia&nbsp;$Oz$&nbsp;sao cho&nbsp;$\\angle xOz = 60^{\\circ}$.<div class='mt-6'>a) Tính số đo góc&nbsp;$\\angle yOz$.</div><div class='mt-6'>b) Vẽ tia&nbsp;$Om$&nbsp;là tia đối của tia&nbsp;$Oz$. Tính số đo góc&nbsp;$\\angle yOm$.</div><div class='mt-6'>c) Tia&nbsp;$Oy$&nbsp;có phải là tia phân giác của góc&nbsp;$\\angle zOm$&nbsp;không? Vì sao?</div><div class='flex justify-center my-8'><svg width='300' height='150' viewBox='0 0 300 150'><line x1='30' y1='100' x2='270' y2='100' stroke='black' stroke-width='1.5'/><circle cx='150' cy='100' r='2' fill='black'/><text x='145' y='115' font-size='14' font-weight='bold'>O</text><text x='275' y='105' font-size='14' font-style='italic'>y</text><text x='20' y='105' font-size='14' font-style='italic'>x</text><line x1='150' y1='100' x2='100' y2='13.4' stroke='black' stroke-width='1.5'/><text x='95' y='10' font-size='14' font-style='italic'>z</text><line x1='150' y1='100' x2='200' y2='186.6' stroke='red' stroke-dasharray='4' stroke-width='1.5'/><text x='205' y='145' font-size='14' fill='red' font-style='italic'>m</text><path d='M 120 100 A 30 30 0 0 1 133 70' fill='none' stroke='blue' stroke-width='1'/><text x='100' y='90' font-size='10' fill='blue'>60°</text></svg></div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Góc bẹt&nbsp;$\\angle xOy$&nbsp;là góc có hai cạnh tạo thành một đường thẳng. Nó có số đo cố định là bao nhiêu? ($180^{\\circ}$).<br>- <b>How:</b> Tia&nbsp;$Oz$&nbsp;nằm trên nửa mặt phẳng có bờ là đường thẳng chứa&nbsp;$\\angle xOy$, nên nó chia góc bẹt thành hai góc kề bù. Dùng phép trừ&nbsp;$180^{\\circ}$&nbsp;để tìm góc còn lại.<br><b>Ý b:</b><br>- <b>What:</b> Tia&nbsp;$Om$&nbsp;là tia đối của tia&nbsp;$Oz$. Tia đối kết hợp với tia gốc sẽ tạo ra một góc bẹt mới ($180^{\\circ}$).<br>- <b>How:</b> Góc&nbsp;$\\angle zOm$&nbsp;là góc bẹt. Tia&nbsp;$Oy$&nbsp;nằm giữa&nbsp;$\\angle zOm$, do đó&nbsp;$\\angle yOm$&nbsp;và&nbsp;$\\angle yOz$&nbsp;là hai góc kề bù. Lấy&nbsp;$180^{\\circ}$&nbsp;trừ đi&nbsp;$\\angle yOz$&nbsp;(vừa tính ở câu a).<br><b>Ý c:</b><br>- <b>What:</b> Để tia&nbsp;$Oy$&nbsp;là phân giác của góc&nbsp;$\\angle zOm$, ta cần kiểm tra mấy điều kiện? (2 điều kiện: Nằm giữa và Chia đôi góc $\\rightarrow \\angle yOz = \\angle yOm$).<br>- <b>How:</b> So sánh kết quả số đo của 2 góc vừa tính ở câu a và câu b xem chúng có bằng nhau không.", solution: "<li><b>a) Tính số đo góc&nbsp;$\\angle yOz$:</b></li><li class='ml-4'>Vì&nbsp;$\\angle xOy$&nbsp;là góc bẹt nên tia&nbsp;$Ox$&nbsp;và tia&nbsp;$Oy$&nbsp;là hai tia đối nhau.</li><li class='ml-4'>Khi đó, tia&nbsp;$Oz$&nbsp;tạo với tia&nbsp;$Ox$&nbsp;và&nbsp;$Oy$&nbsp;hai góc kề bù là&nbsp;$\\angle xOz$&nbsp;và&nbsp;$\\angle yOz$.</li><li class='ml-4'>Ta có phương trình:</li><li class='ml-8'>$\\angle xOz + \\angle yOz = 180^{\\circ}$</li><li class='ml-8'>$60^{\\circ} + \\angle yOz = 180^{\\circ}$</li><li class='ml-8'>$\\angle yOz = 180^{\\circ} - 60^{\\circ} = 120^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $\\angle yOz = 120^{\\circ}$.</li><li><b>b) Tính số đo góc&nbsp;$\\angle yOm$:</b></li><li class='ml-4'>Vì tia&nbsp;$Om$&nbsp;là tia đối của tia&nbsp;$Oz$&nbsp;nên góc&nbsp;$\\angle zOm$&nbsp;là một góc bẹt ($180^{\\circ}$).</li><li class='ml-4'>Lúc này, góc&nbsp;$\\angle yOm$&nbsp;và góc&nbsp;$\\angle yOz$&nbsp;là hai góc kề bù.</li><li class='ml-4'>Ta có phương trình:</li><li class='ml-8'>$\\angle yOm + \\angle yOz = 180^{\\circ}$</li><li class='ml-8'>$\\angle yOm + 120^{\\circ} = 180^{\\circ}$</li><li class='ml-8'>$\\angle yOm = 180^{\\circ} - 120^{\\circ} = 60^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $\\angle yOm = 60^{\\circ}$.</li><li><b>c) Tia&nbsp;$Oy$&nbsp;có phải là tia phân giác không?</b></li><li class='ml-4'>Dựa vào các kết quả đã tính ở trên, ta có:</li><li class='ml-8'>$\\angle yOz = 120^{\\circ}$</li><li class='ml-8'>$\\angle yOm = 60^{\\circ}$</li><li class='ml-4'>So sánh hai số đo, ta thấy&nbsp;$\\angle yOz \\neq \\angle yOm$&nbsp;($120^{\\circ} \\neq 60^{\\circ}$).</li><li class='ml-4'>Vì tia&nbsp;$Oy$&nbsp;không chia góc&nbsp;$\\angle zOm$&nbsp;thành hai góc bằng nhau, nên tia&nbsp;$Oy$&nbsp;<b>không phải</b> là tia phân giác của góc&nbsp;$\\angle zOm$.</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "(Số học nâng cao) Chứng minh rằng với mọi số nguyên&nbsp;$n$, biểu thức&nbsp;$A = n^3 + 11n$&nbsp;luôn chia hết cho&nbsp;$6$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh một đa thức luôn chia hết cho&nbsp;$6$.<br>- <b>Why:</b> Để chứng minh chia hết cho&nbsp;$6$, ta cần chứng minh nó chia hết cho mấy và mấy đồng thời? (Vì&nbsp;$\\text{ƯCLN}(2, 3) = 1$&nbsp;nên ta cần chứng minh nó chia hết cho&nbsp;$2$&nbsp;và chia hết cho&nbsp;$3$).<br>- <b>How:</b> Làm thế nào để biến đổi&nbsp;$n^3 + 11n$&nbsp;về một dạng quen thuộc dễ xét tính chia hết?<br>- Ta có hằng đẳng thức nổi tiếng:&nbsp;$n^3 - n = n(n^2 - 1) = (n-1)n(n+1)$. Đây là tích của 3 số nguyên liên tiếp, nên chắc chắn nó chia hết cho 2 và 3 $\\rightarrow$ chia hết cho 6.<br>- Vậy hãy tách&nbsp;$11n$&nbsp;thành&nbsp;$-n + 12n$&nbsp;để làm xuất hiện cụm&nbsp;$(n^3 - n)$&nbsp;này nhé!", solution: "<li>Ta biến đổi biểu thức $A$ như sau:</li><li class='ml-4'>$A = n^3 + 11n$</li><li class='ml-4'>$A = n^3 - n + 12n$</li><li>Nhóm hai hạng tử đầu tiên và đặt $n$ làm nhân tử chung:</li><li class='ml-4'>$A = n(n^2 - 1) + 12n$</li><li>Sử dụng hằng đẳng thức phân tích tiếp $n^2 - 1$:</li><li class='ml-4'>$A = n(n - 1)(n + 1) + 12n$</li><li>Sắp xếp lại các thừa số:</li><li class='ml-4'>$A = (n - 1)n(n + 1) + 12n$</li><li>Ta đi xét tính chia hết của từng số hạng trong tổng:</li><li class='ml-4'><b>Số hạng thứ nhất:</b> $(n - 1)n(n + 1)$</li><li class='ml-8'>Đây là tích của 3 số nguyên liên tiếp.</li><li class='ml-8'>Trong 3 số nguyên liên tiếp, luôn có ít nhất một số chia hết cho 2 $\\Rightarrow$ Tích chia hết cho 2.</li><li class='ml-8'>Trong 3 số nguyên liên tiếp, luôn có đúng một số chia hết cho 3 $\\Rightarrow$ Tích chia hết cho 3.</li><li class='ml-8'>Vì $\\text{ƯCLN}(2, 3) = 1$, nên tích $(n - 1)n(n + 1)$ chia hết cho $2 \\cdot 3 = 6$.</li><li class='ml-4'><b>Số hạng thứ hai:</b> $12n$</li><li class='ml-8'>Vì $12$ chia hết cho $6$ nên $12n$ luôn chia hết cho $6$ với mọi $n \\in \\mathbb{Z}$.</li><li>Vì cả hai số hạng của biểu thức $A$ đều chia hết cho 6, nên tổng của chúng cũng chia hết cho 6.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Biểu thức $A = n^3 + 11n$ luôn chia hết cho 6 với mọi số nguyên $n$. (Đpcm).</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Có bao nhiêu phân số có mẫu số bằng&nbsp;$5$, lớn hơn&nbsp;$\\dfrac{-1}{2}$&nbsp;và nhỏ hơn&nbsp;$\\dfrac{1}{3}$?", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "Gọi phân số cần tìm là&nbsp;$\\dfrac{x}{5}$. Ta có:&nbsp;$\\dfrac{-1}{2} < \\dfrac{x}{5} < \\dfrac{1}{3} \\Rightarrow \\dfrac{-15}{30} < \\dfrac{6x}{30} < \\dfrac{10}{30} \\Rightarrow -15 < 6x < 10$. Suy ra&nbsp;$x \\in \\{-2; -1; 0; 1\\}$. Đề bài thường ngầm định tìm các phân số khác không, khi đó có 2 phân số thỏa mãn ($\\dfrac{-2}{5}$ và $\\dfrac{-1}{5}$). Theo barem đại trà, ta chọn C." },
{ q_title: "Câu 2", q_content: "Rút gọn biểu thức&nbsp;$A = \\dfrac{2^5 \\cdot 3^4}{2^6 \\cdot 3^3}$&nbsp;ta được:", options: ["A. $\\dfrac{3}{2}$", "B. $\\dfrac{2}{3}$", "C. $\\dfrac{1}{6}$", "D. $6$"], correct_idx: 0, explain: "Rút gọn các lũy thừa cùng cơ số ở tử và mẫu:&nbsp;$\\dfrac{2^5}{2^6} = \\dfrac{1}{2}$&nbsp;và&nbsp;$\\dfrac{3^4}{3^3} = 3$. Kết quả là&nbsp;$\\dfrac{3}{2}$. Chọn A." },
{ q_title: "Câu 3", q_content: "Trong các phân số sau, phân số nào không thể viết được dưới dạng số thập phân hữu hạn?", options: ["A. $\\dfrac{7}{25}$", "B. $\\dfrac{3}{40}$", "C. $\\dfrac{5}{14}$", "D. $\\dfrac{9}{15}$"], correct_idx: 2, explain: "Phân số viết được dưới dạng số thập phân hữu hạn khi mẫu số (sau khi rút gọn) chỉ chứa các thừa số nguyên tố 2 và 5. Mẫu của phân số C là 14 chứa thừa số 7, nên ra số thập phân vô hạn. (Lưu ý đáp án D rút gọn thành 3/5 hữu hạn). Chọn C." },
{ q_title: "Câu 4", q_content: "Tính nhanh&nbsp;$\\dfrac{-5}{11} \\cdot \\dfrac{7}{15} + \\dfrac{-5}{11} \\cdot \\dfrac{8}{15}$&nbsp;ta được kết quả là:", options: ["A. $\\dfrac{-5}{11}$", "B. $\\dfrac{5}{11}$", "C. $1$", "D. $0$"], correct_idx: 0, explain: "Đặt nhân tử chung:&nbsp;$\\dfrac{-5}{11} \\cdot \\left(\\dfrac{7}{15} + \\dfrac{8}{15}\\right) = \\dfrac{-5}{11} \\cdot 1 = \\dfrac{-5}{11}$. Chọn A." },
{ q_title: "Câu 5", q_content: "Biết&nbsp;$15\\%$&nbsp;của số&nbsp;$a$&nbsp;là&nbsp;$45$. Vậy&nbsp;$\\dfrac{1}{3}$&nbsp;của số&nbsp;$a$&nbsp;là bao nhiêu?", options: ["A. 100", "B. 300", "C. 150", "D. 15"], correct_idx: 0, explain: "Số&nbsp;$a = 45 : 15\\% = 45 : 0,15 = 300$. Vậy&nbsp;$\\dfrac{1}{3}$&nbsp;của&nbsp;$a$&nbsp;là&nbsp;$300 \\cdot \\dfrac{1}{3} = 100$. Chọn A." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$-125,489$&nbsp;đến hàng phần mười ta được kết quả là:", options: ["A. $-125,4$", "B. $-125,5$", "C. $-125,49$", "D. $-125,48$"], correct_idx: 1, explain: "Chữ số hàng phần trăm là&nbsp;$8 \\ge 5$&nbsp;nên cộng thêm 1 vào hàng phần mười. Kết quả là&nbsp;$-125,5$. Chọn B." },
{ q_title: "Câu 7", q_content: "Một sản phẩm được cửa hàng tăng giá&nbsp;$20\\%$, sau một thời gian ế ẩm lại giảm giá&nbsp;$20\\%$&nbsp;so với mức giá mới. Hỏi giá cuối cùng so với giá gốc ban đầu sẽ như thế nào?", options: ["A. Không đổi", "B. Tăng $4\\%$", "C. Giảm $4\\%$", "D. Giảm $10\\%$"], correct_idx: 2, explain: "Coi giá gốc là 100%. Giá sau khi tăng là 120%. Giá sau khi giảm là&nbsp;$120\\% \\cdot (100\\% - 20\\%) = 120\\% \\cdot 80\\% = 96\\%$. Vậy giá đã giảm đi&nbsp;$100\\% - 96\\% = 4\\%$. Chọn C." },
{ q_title: "Câu 8", q_content: "Điểm&nbsp;$M$&nbsp;thuộc đoạn thẳng&nbsp;$AB$&nbsp;và chia đoạn&nbsp;$AB$&nbsp;theo tỉ số&nbsp;$\\dfrac{MA}{MB} = \\dfrac{1}{2}$. Biết&nbsp;$AB = 9\\text{ cm}$. Độ dài đoạn&nbsp;$MA$&nbsp;là:", options: ["A. $4,5\\text{ cm}$", "B. $3\\text{ cm}$", "C. $6\\text{ cm}$", "D. $4\\text{ cm}$"], correct_idx: 1, explain: "M thuộc đoạn AB nên $MA + MB = AB = 9$. Từ tỉ số ta có $MB = 2MA$, suy ra $MA + 2MA = 9 \\Rightarrow 3MA = 9 \\Rightarrow MA = 3\\text{ cm}$. Chọn B." },
{ q_title: "Câu 9", q_content: "Vẽ&nbsp;$5$&nbsp;đường thẳng đồng quy tại một điểm (cùng đi qua một điểm). Số cặp tia đối nhau được tạo thành là:", options: ["A. 5", "B. 10", "C. 20", "D. 25"], correct_idx: 0, explain: "Mỗi đường thẳng đi qua một điểm sẽ tạo thành đúng 1 cặp tia đối nhau. Vậy 5 đường thẳng sẽ tạo thành 5 cặp tia đối nhau. Chọn A." },
{ q_title: "Câu 10", q_content: "Cho điểm&nbsp;$I$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$. Khẳng định nào sau đây ĐÚNG?", options: ["A. Tia $IA$ và tia $IB$ trùng nhau", "B. Hai tia $AB$ và $AI$ đối nhau", "C. Tia $IA$ và tia $IB$ đối nhau", "D. Hai tia $BA$ và $BI$ đối nhau"], correct_idx: 2, explain: "Vì I nằm giữa A và B nên tia IA và tia IB là hai tia gốc I hướng về hai phía tạo thành một đường thẳng. Do đó chúng là hai tia đối nhau. Chọn C." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về dãy dữ liệu kết quả đánh giá hạnh kiểm của học sinh lớp 6A: Tốt, Khá, Đạt, Yếu, Kém, 10, Không Đạt.<br>(I) Dữ liệu '10' là dữ liệu hợp lý vì biểu thị điểm xuất sắc.<br>(II) Dãy dữ liệu trên không chứa bất kỳ yếu tố nào vô lý.<br>(III) Dữ liệu '10' là dữ liệu không hợp lý vì nó thuộc loại dữ liệu số, trong khi các dữ liệu còn lại là dữ liệu chữ.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 1, explain: "Dữ liệu đang khảo sát là 'Đánh giá hạnh kiểm' (định tính). Số '10' là dữ liệu định lượng (điểm số) nên nó bị lạc loài, là dữ liệu không hợp lý. Do đó mệnh đề (I) sai, (II) sai và (III) đúng. Chỉ có 1 mệnh đề đúng. Chọn B." },
{ q_title: "Câu 12", q_content: "Cho đoạn thẳng&nbsp;$MN = 8\\text{ cm}$. Điểm&nbsp;$K$&nbsp;nằm giữa&nbsp;$M$&nbsp;và&nbsp;$N$&nbsp;sao cho&nbsp;$MK = 2\\text{ cm}$. Vẽ thêm trung điểm&nbsp;$I$&nbsp;của đoạn&nbsp;$KN$. Xét 3 mệnh đề sau:<br>(I) Độ dài đoạn&nbsp;$KN$&nbsp;bằng&nbsp;$6\\text{ cm}$.<br>(II) Độ dài đoạn&nbsp;$MI$&nbsp;bằng&nbsp;$4\\text{ cm}$.<br>(III) Điểm&nbsp;$K$&nbsp;không thể là trung điểm của bất kỳ đoạn thẳng nào tạo ra từ 3 điểm&nbsp;$M, I, N$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) KN = MN - MK = 8 - 2 = 6cm (Đúng). (II) I là trung điểm KN nên KI = 3cm. MI = MK + KI = 2 + 3 = 5cm (Sai, đề nói 4cm). (III) Các đoạn thẳng là MN (K lệch), IN (K nằm ngoài), MI (MK=2, KI=3 không bằng nhau). Nên K không là trung điểm đoạn nào (Đúng). Có 2 mệnh đề đúng. Chọn C." }

tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Tính giá trị biểu thức sau một cách hợp lý:&nbsp;$A = \\dfrac{4}{3 \\cdot 7} + \\dfrac{4}{7 \\cdot 11} + \\dfrac{4}{11 \\cdot 15} + \\dots + \\dfrac{4}{95 \\cdot 99}$<div class='mt-6'>b) Tính tổng chuỗi tích phân số sau:&nbsp;$B = \\left( 1 - \\dfrac{1}{2^2} \\right) \\cdot \\left( 1 - \\dfrac{1}{3^2} \\right) \\cdot \\left( 1 - \\dfrac{1}{4^2} \\right) \\cdot \\dots \\cdot \\left( 1 - \\dfrac{1}{10^2} \\right)$</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Hãy nhìn vào mẫu số của các phân số. Khoảng cách giữa các thừa số là bao nhiêu? ($7-3=4$, $11-7=4$).<br>- <b>Why:</b> Tử số của chúng đang là số mấy? (Số 4). Nó đã khớp hoàn hảo với khoảng cách ở mẫu chưa?<br>- <b>How:</b> Khi Tử = Hiệu 2 thừa số ở mẫu, ta áp dụng ngay công thức sai phân: $\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$.<br><b>Ý b:</b><br>- <b>What:</b> Đây là một chuỗi phép nhân các ngoặc chứa bình phương. Đừng vội vàng quy đồng tính từng cái một, sẽ rất dễ sai sót.<br>- <b>How:</b> Đưa biểu thức tổng quát $1 - \\dfrac{1}{n^2}$ về dạng phân số $\\dfrac{n^2 - 1}{n^2}$.<br>- <b>Where:</b> Sau đó, dùng hằng đẳng thức (hoặc tính chất) tách tử số thành tích của 2 số tự nhiên liên tiếp: $n^2 - 1 = (n-1)(n+1)$. Việc tách tử và mẫu thành các dãy nhân liên tiếp sẽ giúp triệt tiêu tử số của phân số này với mẫu số của phân số kia.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$A$:</b></li><li class='ml-4'>Áp dụng công thức sai phân, ta tách mỗi phân số thành hiệu của hai phân số đơn vị:</li><li class='ml-8'>$A = \\left( \\dfrac{1}{3} - \\dfrac{1}{7} \\right) + \\left( \\dfrac{1}{7} - \\dfrac{1}{11} \\right) + \\left( \\dfrac{1}{11} - \\dfrac{1}{15} \\right) + \\dots + \\left( \\dfrac{1}{95} - \\dfrac{1}{99} \\right)$</li><li class='ml-4'>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở phần giữa chuỗi:</li><li class='ml-8'>$A = \\dfrac{1}{3} - \\dfrac{1}{99}$</li><li class='ml-4'>Quy đồng mẫu số chung là $99$:</li><li class='ml-8'>$A = \\dfrac{33}{99} - \\dfrac{1}{99} = \\dfrac{32}{99}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $A = \\dfrac{32}{99}$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$B$:</b></li><li class='ml-4'>Ta biến đổi phần tử tổng quát trong dấu ngoặc:</li><li class='ml-8'>$1 - \\dfrac{1}{n^2} = \\dfrac{n^2 - 1}{n^2} = \\dfrac{(n-1)(n+1)}{n \\cdot n}$</li><li class='ml-4'>Áp dụng vào biểu thức $B$, ta viết lại thành các phân số cụ thể:</li><li class='ml-8'>$B = \\dfrac{1 \\cdot 3}{2 \\cdot 2} \\cdot \\dfrac{2 \\cdot 4}{3 \\cdot 3} \\cdot \\dfrac{3 \\cdot 5}{4 \\cdot 4} \\cdot \\dots \\cdot \\dfrac{9 \\cdot 11}{10 \\cdot 10}$</li><li class='ml-4'>Sắp xếp lại tử số và mẫu số thành hai nhóm riêng biệt để dễ dàng nhìn ra quy luật triệt tiêu:</li><li class='ml-8'>$B = \\dfrac{(1 \\cdot 2 \\cdot 3 \\dots 9) \\cdot (3 \\cdot 4 \\cdot 5 \\dots 11)}{(2 \\cdot 3 \\cdot 4 \\dots 10) \\cdot (2 \\cdot 3 \\cdot 4 \\dots 10)}$</li><li class='ml-4'>Tiến hành triệt tiêu các thừa số chung ở cả tử và mẫu:</li><li class='ml-8'>- Nhóm thứ nhất triệt tiêu từ $2$ đến $9$, trên tử còn $1$, dưới mẫu còn $10$.</li><li class='ml-8'>- Nhóm thứ hai triệt tiêu từ $3$ đến $10$, trên tử còn $11$, dưới mẫu còn $2$.</li><li class='ml-4'>Ta còn lại:</li><li class='ml-8'>$B = \\dfrac{1}{10} \\cdot \\dfrac{11}{2} = \\dfrac{11}{20}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $B = \\dfrac{11}{20}$.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Tìm&nbsp;$x$, biết:&nbsp;$\\dfrac{1}{2}x - \\dfrac{2}{3} = \\dfrac{-1}{4}$<div class='mt-6'>b) Tìm các giá trị của&nbsp;$x$, biết:&nbsp;$\\big| |x| - 1,5 \\big| = 2$</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Phương trình tìm $x$ cơ bản. Cụm $\\dfrac{1}{2}x$ đóng vai trò là \"số bị trừ\".<br>- <b>How:</b> Chuyển vế $-\\dfrac{2}{3}$ sang vế phải và đổi dấu thành cộng. Sau đó dùng phép chia để tìm $x$.<br><b>Ý b:</b><br>- <b>What:</b> Đây là phương trình chứa 2 lớp dấu giá trị tuyệt đối lồng nhau.<br>- <b>Why:</b> Bản chất của trị tuyệt đối là \"khoảng cách\", nên kết quả của nó không bao giờ là số âm ($|A| \\ge 0$).<br>- <b>How:</b> Ta bóc từng lớp vỏ từ ngoài vào trong:<br>&nbsp; - Lớp ngoài cùng: $\\big| \\text{Cụm bên trong} \\big| = 2$. Vậy \"Cụm bên trong\" bằng $2$ hoặc $-2$.<br>&nbsp; - Tới lớp thứ hai: Nếu giải ra $|x| = \\text{số âm}$, hãy mạnh dạn loại bỏ ngay (vô nghiệm). Nếu $|x| = \\text{số dương}$, tiếp tục chia 2 trường hợp.", solution: "<li><b>a) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Ta có phương trình:</li><li class='ml-8'>$\\dfrac{1}{2}x - \\dfrac{2}{3} = \\dfrac{-1}{4}$</li><li class='ml-4'>Chuyển vế hạng tử tự do:</li><li class='ml-8'>$\\dfrac{1}{2}x = \\dfrac{-1}{4} + \\dfrac{2}{3}$</li><li class='ml-4'>Quy đồng và tính toán vế phải (mẫu chung 12):</li><li class='ml-8'>$\\dfrac{1}{2}x = \\dfrac{-3}{12} + \\dfrac{8}{12} = \\dfrac{5}{12}$</li><li class='ml-4'>Thực hiện phép chia để tìm $x$:</li><li class='ml-8'>$x = \\dfrac{5}{12} : \\dfrac{1}{2} = \\dfrac{5}{12} \\cdot 2 = \\dfrac{5}{6}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = \\dfrac{5}{6}$.</li><li><b>b) Tìm&nbsp;$x$&nbsp;trong trị tuyệt đối lồng nhau:</b></li><li class='ml-4'>Từ phương trình $\\big| |x| - 1,5 \\big| = 2$, ta phá lớp trị tuyệt đối ngoài cùng bằng cách chia $2$ trường hợp:</li><li class='ml-4'><b>Trường hợp 1:</b></li><li class='ml-8'>$|x| - 1,5 = 2$</li><li class='ml-8'>$|x| = 2 + 1,5 = 3,5$</li><li class='ml-8'>Vì $3,5 > 0$ nên ta tiếp tục chia $2$ khả năng: $x = 3,5$ hoặc $x = -3,5$.</li><li class='ml-4'><b>Trường hợp 2:</b></li><li class='ml-8'>$|x| - 1,5 = -2$</li><li class='ml-8'>$|x| = -2 + 1,5 = -0,5$</li><li class='ml-8'>Trường hợp này vô lý, do giá trị tuyệt đối của một số không thể là một số âm ($|x| \\ge 0$ với mọi $x$). Nên ta loại trường hợp này.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Các giá trị thỏa mãn là $x \\in \\{3,5 ; -3,5\\}$.</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Một học sinh có sở thích đọc sách, bạn ấy quyết định đọc xong một cuốn tiểu thuyết trong 3 ngày. Ngày thứ nhất, bạn đọc được&nbsp;$\\dfrac{1}{3}$&nbsp;tổng số trang sách. Ngày thứ hai, bạn đọc được&nbsp;$\\dfrac{5}{8}$&nbsp;số trang sách CÒN LẠI sau ngày đầu tiên. Ngày thứ ba, bạn đọc nốt&nbsp;$30$&nbsp;trang cuối cùng để hoàn thành cuốn sách.<div class='mt-6'>a) Hỏi cuốn tiểu thuyết đó dày bao nhiêu trang?</div><div class='mt-6'>b) Tính tỉ số phần trăm số trang sách bạn học sinh đọc trong ngày thứ nhất so với ngày thứ hai.</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Trong các bài toán phân số nhiều giai đoạn, hễ có cụm từ \"CÒN LẠI\", ta tuyệt đối không được cộng trừ trực tiếp các phân số với nhau.<br>- <b>How:</b> Nếu chỉ có dữ kiện cuối cùng là một con số cụ thể ($30$ trang), ta BẮT BUỘC phải dùng phương pháp tính ngược từ cuối lên.<br>- <b>Where:</b><br>&nbsp; + Bước 1: 30 trang sách đọc ngày thứ ba tương ứng với \"bao nhiêu phần\" của số sách CÒN LẠI sau ngày thứ nhất? (Gợi ý: Nếu ngày 2 đọc $\\dfrac{5}{8}$ phần còn lại, thì ngày 3 sẽ đọc $1 - \\dfrac{5}{8} = \\dfrac{3}{8}$ của phần còn lại đó).<br>&nbsp; + Bước 2: Dùng 30 trang chia cho phân số $\\dfrac{3}{8}$ để tìm ra số trang sách chưa đọc sau ngày 1.<br>&nbsp; + Bước 3: Tiếp tục dùng logic tương tự lùi về ngày 1 để tìm tổng số trang ban đầu.<br><b>Ý b:</b><br>- <b>How:</b> Tính trực tiếp số trang đọc mỗi ngày rồi dùng phép tính tỉ số phần trăm $\\left(\\dfrac{\\text{Ngày 1}}{\\text{Ngày 2}} \\cdot 100\\%\\right)$.", solution: "<li><b>a) Tính tổng số trang sách của cuốn tiểu thuyết:</b></li><li class='ml-4'>Phân số chỉ số trang sách bạn học sinh đọc trong ngày thứ ba (so với số trang CÒN LẠI sau ngày thứ nhất) là:</li><li class='ml-8'>$1 - \\dfrac{5}{8} = \\dfrac{3}{8}$ (số trang còn lại sau ngày 1)</li><li class='ml-4'>Số trang sách còn lại chưa đọc sau ngày thứ nhất là:</li><li class='ml-8'>$30 : \\dfrac{3}{8} = 30 \\cdot \\dfrac{8}{3} = 80$ (trang)</li><li class='ml-4'>Lại có, ngày thứ nhất bạn học sinh đọc được $\\dfrac{1}{3}$ tổng số trang sách, nên phân số chỉ số trang sách CÒN LẠI sau ngày thứ nhất là:</li><li class='ml-8'>$1 - \\dfrac{1}{3} = \\dfrac{2}{3}$ (tổng số trang sách)</li><li class='ml-4'>Tổng số trang của cuốn tiểu thuyết đó là:</li><li class='ml-8'>$80 : \\dfrac{2}{3} = 80 \\cdot \\dfrac{3}{2} = 120$ (trang)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Cuốn tiểu thuyết dày $120$ trang.</li><li><b>b) Tính tỉ số phần trăm:</b></li><li class='ml-4'>Số trang sách bạn học sinh đọc được trong ngày thứ nhất là:</li><li class='ml-8'>$120 \\cdot \\dfrac{1}{3} = 40$ (trang)</li><li class='ml-4'>Số trang sách bạn học sinh đọc được trong ngày thứ hai là:</li><li class='ml-8'>$80 \\cdot \\dfrac{5}{8} = 50$ (trang)</li><li class='ml-4'>Tỉ số phần trăm số trang sách đọc trong ngày thứ nhất so với ngày thứ hai là:</li><li class='ml-8'>$\\dfrac{40}{50} \\cdot 100\\% = \\dfrac{4}{5} \\cdot 100\\% = 80\\%$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Tỉ lệ cần tìm là $80\\%$.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Vẽ đoạn thẳng&nbsp;$AB = 10\\text{ cm}$. Trên đoạn thẳng&nbsp;$AB$&nbsp;lấy điểm&nbsp;$C$&nbsp;sao cho&nbsp;$AC = 4\\text{ cm}$. Gọi&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AC$, $N$&nbsp;là trung điểm của đoạn thẳng&nbsp;$CB$.<div class='mt-6'>a) Tính độ dài đoạn thẳng&nbsp;$CB$.</div><div class='mt-6'>b) Tính độ dài đoạn thẳng&nbsp;$MN$.</div><div class='mt-6'>c) Dựa vào kết quả trên, em hãy rút ra nhận xét tổng quát về mối quan hệ giữa độ dài đoạn thẳng nối hai trung điểm (đoạn&nbsp;$MN$) và độ dài đoạn thẳng tổng (đoạn&nbsp;$AB$).</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Cho điểm $C$ nằm trên đoạn thẳng $AB$. Yêu cầu tính $CB$.<br>- <b>How:</b> Việc điểm $C$ thuộc đoạn $AB$ chính là bằng chứng xác nhận $C$ nằm giữa $A$ và $B$. Ta áp dụng ngay hệ thức cộng đoạn thẳng.<br><b>Ý b:</b><br>- <b>What:</b> Tìm khoảng cách giữa 2 trung điểm $M$ và $N$ của 2 đoạn thẳng kề nhau.<br>- <b>How:</b> Tính độ dài từng đoạn nhỏ $MC$ và $CN$ dựa vào tính chất trung điểm. Sau đó lập luận chứng tỏ điểm $C$ đóng vai trò là cầu nối nằm giữa $M$ và $N$ để được phép cộng hai đoạn nhỏ đó lại.<br><b>Ý c:</b><br>- <b>What:</b> So sánh kết quả $MN$ với $AB$.<br>- <b>Why:</b> Dù độ dài các đoạn có thay đổi (điểm $C$ chạy lung tung trên đoạn $AB$), thì $MN$ vẫn luôn bằng một nửa $AB$. Đây là định lý quan trọng.", solution: "<li><b>a) Tính độ dài đoạn thẳng&nbsp;$CB$:</b></li><li class='ml-4'>Vì điểm $C$ thuộc đoạn thẳng $AB$ nên <b>điểm&nbsp;$C$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$</b>.</li><li class='ml-4'>Do đó, ta có hệ thức cộng đoạn thẳng:</li><li class='ml-8'>$AC + CB = AB$</li><li class='ml-8'>$4 + CB = 10$</li><li class='ml-8'>$CB = 10 - 4 = 6\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $CB = 6\\text{ cm}$.</li><li><b>b) Tính độ dài đoạn thẳng&nbsp;$MN$:</b></li><li class='ml-4'>Vì $M$ là trung điểm của đoạn thẳng $AC$ nên độ dài đoạn thẳng $MC$ là:</li><li class='ml-8'>$MC = \\dfrac{AC}{2} = \\dfrac{4}{2} = 2\\text{ cm}$.</li><li class='ml-4'>Vì $N$ là trung điểm của đoạn thẳng $CB$ nên độ dài đoạn thẳng $CN$ là:</li><li class='ml-8'>$CN = \\dfrac{CB}{2} = \\dfrac{6}{2} = 3\\text{ cm}$.</li><li class='ml-4'>Lập luận điểm nằm giữa: Vì $C$ nằm giữa $A$ và $B$ nên hai tia $CA$ và $CB$ là hai tia đối nhau.</li><li class='ml-4'>Mặt khác, điểm $M$ thuộc đoạn $AC$ nên nằm trên tia $CA$, điểm $N$ thuộc đoạn $CB$ nên nằm trên tia $CB$. Do đó, tia $CM$ và tia $CN$ là hai tia đối nhau.</li><li class='ml-4'>Suy ra, <b>điểm&nbsp;$C$&nbsp;nằm giữa hai điểm&nbsp;$M$&nbsp;và&nbsp;$N$</b>.</li><li class='ml-4'>Áp dụng hệ thức cộng đoạn thẳng, ta có:</li><li class='ml-8'>$MN = MC + CN = 2 + 3 = 5\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $MN = 5\\text{ cm}$.</li><li><b>c) Nhận xét mối quan hệ:</b></li><li class='ml-4'>Theo kết quả tính toán ở trên, ta có $MN = 5\\text{ cm}$ và $AB = 10\\text{ cm}$.</li><li class='ml-4'>Thực hiện phép so sánh tỉ lệ:</li><li class='ml-8'>$\\dfrac{MN}{AB} = \\dfrac{5}{10} = \\dfrac{1}{2} \\Rightarrow MN = \\dfrac{AB}{2}$.</li><li class='font-bold text-indigo-700 mt-2'>Nhận xét tổng quát: Khoảng cách nối hai trung điểm của hai đoạn thẳng kề nhau luôn có độ dài bằng một nửa độ dài của đoạn thẳng tổng chứa chúng.</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "(Số học nâng cao) Tìm tất cả các số nguyên&nbsp;$n$&nbsp;để phân số&nbsp;$P = \\dfrac{5n + 7}{2n + 1}$&nbsp;có giá trị là một số nguyên.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Tìm điều kiện để phân số $P = \\dfrac{\\text{Tử}}{\\text{Mẫu}}$ là số nguyên. Điều này đòi hỏi Tử phải chia hết cho Mẫu.<br>- <b>Why:</b> Khó khăn ở đây là cả Tử số (chứa $5n$) và Mẫu số (chứa $2n$) đều mang ẩn $n$. Ta không thể thực hiện phép chia đa thức trực tiếp được.<br>- <b>How:</b> Sử dụng kỹ thuật \"Nhân chéo hệ số\" để khử biến. Ta sẽ nhân cả biểu thức bị chia với hệ số của $n$ ở mẫu (là $2$). Khi đó tử số xuất hiện $10n$, mẫu số chứa $2n$. Ta sẽ dễ dàng tách tử số thành một cụm chia hết cho mẫu số cộng với phần hằng số dư.", solution: "<li>Để phân số $P$ nhận giá trị là một số nguyên, thì tử số phải chia hết cho mẫu số:</li><li class='ml-4'>$(5n + 7) \\vdots (2n + 1)$</li><li>Theo tính chất chia hết, ta nhân biểu thức bị chia với $2$:</li><li class='ml-4'>$2 \\cdot (5n + 7) \\vdots (2n + 1)$</li><li class='ml-4'>$\\Rightarrow (10n + 14) \\vdots (2n + 1)$</li><li>Bây giờ, ta tiến hành tách biểu thức vừa tạo thành một phần là bội của mẫu số $(2n + 1)$:</li><li class='ml-4'>Ta có: $10n = 5 \\cdot 2n$. Do đó ta ép nhân tử: $10n + 14 = 5(2n + 1) + 9$.</li><li>Thay vào biểu thức chia hết:</li><li class='ml-4'>$[5(2n + 1) + 9] \\vdots (2n + 1)$</li><li>Vì cụm $5(2n + 1)$ luôn chia hết cho $(2n + 1)$ với mọi $n \\in \\mathbb{Z}$, nên để tổng trên chia hết thì bắt buộc phần dư phải chia hết cho mẫu số:</li><li class='ml-4'>$9 \\vdots (2n + 1)$</li><li>Điều này đồng nghĩa với việc $(2n + 1)$ phải là Ước của $9$.</li><li>Tập hợp các ước của $9$ là: Ư$(9) = \\{-9; -3; -1; 1; 3; 9\\}$. Ta lập bảng xét các trường hợp:</li><li class='ml-8'>+ TH1: $2n + 1 = -9 \\Rightarrow 2n = -10 \\Rightarrow n = -5$</li><li class='ml-8'>+ TH2: $2n + 1 = -3 \\Rightarrow 2n = -4 \\Rightarrow n = -2$</li><li class='ml-8'>+ TH3: $2n + 1 = -1 \\Rightarrow 2n = -2 \\Rightarrow n = -1$</li><li class='ml-8'>+ TH4: $2n + 1 = 1 \\Rightarrow 2n = 0 \\Rightarrow n = 0$</li><li class='ml-8'>+ TH5: $2n + 1 = 3 \\Rightarrow 2n = 2 \\Rightarrow n = 1$</li><li class='ml-8'>+ TH6: $2n + 1 = 9 \\Rightarrow 2n = 8 \\Rightarrow n = 4$</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Các giá trị nguyên thỏa mãn là $n \\in \\{-5; -2; -1; 0; 1; 4\\}$.</li>" }
]
});
</script>

window.EXAM_DATA.push({
id: 12, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 12", icon: "🏅", color: "violet", level: "Nâng cao", time: "150 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Phân số nào sau đây lớn nhất?", options: ["A. $\\dfrac{2023}{2024}$", "B. $\\dfrac{2024}{2025}$", "C. $\\dfrac{2022}{2023}$", "D. $\\dfrac{2021}{2022}$"], correct_idx: 1, explain: "Các phân số đều có dạng&nbsp;$1 - \\dfrac{1}{n}$. Mẫu số&nbsp;$n$&nbsp;càng lớn thì phần bù&nbsp;$\\dfrac{1}{n}$&nbsp;càng nhỏ, do đó phân số càng lớn. Phân số&nbsp;$\\dfrac{2024}{2025}$&nbsp;có mẫu lớn nhất. Chọn B." },
{ q_title: "Câu 2", q_content: "Phân số nghịch đảo của hỗn số&nbsp;$-1\\dfrac{2}{5}$&nbsp;là:", options: ["A. $\\dfrac{-7}{5}$", "B. $\\dfrac{5}{7}$", "C. $\\dfrac{-5}{7}$", "D. $1\\dfrac{5}{2}$"], correct_idx: 2, explain: "Đổi hỗn số ra phân số:&nbsp;$-1\\dfrac{2}{5} = \\dfrac{-7}{5}$. Phân số nghịch đảo là&nbsp;$\\dfrac{5}{-7} = \\dfrac{-5}{7}$. Chọn C." },
{ q_title: "Câu 3", q_content: "Tìm&nbsp;$x$&nbsp;biết&nbsp;$10\\% \\cdot x + \\dfrac{1}{2} = 1$:", options: ["A. $5$", "B. $0,5$", "C. $10$", "D. $1$"], correct_idx: 0, explain: "Đổi&nbsp;$10\\% = \\dfrac{1}{10}$. Ta có&nbsp;$\\dfrac{1}{10} \\cdot x = 1 - \\dfrac{1}{2} = \\dfrac{1}{2} \\Rightarrow x = \\dfrac{1}{2} : \\dfrac{1}{10} = \\dfrac{10}{2} = 5$. Chọn A." },
{ q_title: "Câu 4", q_content: "Kết quả của phép tính&nbsp;$0,5 - \\dfrac{1}{3} + 0,25$&nbsp;là:", options: ["A. $\\dfrac{5}{12}$", "B. $\\dfrac{1}{12}$", "C. $\\dfrac{7}{12}$", "D. $\\dfrac{11}{12}$"], correct_idx: 0, explain: "Đổi ra phân số và quy đồng mẫu chung 12:&nbsp;$\\dfrac{6}{12} - \\dfrac{4}{12} + \\dfrac{3}{12} = \\dfrac{5}{12}$. Chọn A." },
{ q_title: "Câu 5", q_content: "Tỉ lệ nước trong nấm tươi là&nbsp;$90\\%$, trong nấm phơi khô là&nbsp;$20\\%$. Hỏi phơi&nbsp;$40\\text{ kg}$&nbsp;nấm tươi ta thu được bao nhiêu kg nấm khô?", options: ["A. $8\\text{ kg}$", "B. $5\\text{ kg}$", "C. $10\\text{ kg}$", "D. $4\\text{ kg}$"], correct_idx: 1, explain: "Lượng chất rắn trong nấm tươi là:&nbsp;$40 \\cdot (100\\% - 90\\%) = 4\\text{ kg}$. Chất rắn này chiếm&nbsp;$80\\%$&nbsp;khối lượng nấm khô. Lượng nấm khô thu được là:&nbsp;$4 : 80\\% = 4 : 0,8 = 5\\text{ kg}$. Chọn B." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$3,14159$&nbsp;đến chữ số thập phân thứ ba ta được:", options: ["A. $3,141$", "B. $3,142$", "C. $3,140$", "D. $3,14$"], correct_idx: 1, explain: "Chữ số hàng phần chục nghìn là&nbsp;$5 \\ge 5$, ta tăng chữ số hàng phần nghìn thêm 1 ($1+1=2$). Kết quả là&nbsp;$3,142$. Chọn B." },
{ q_title: "Câu 7", q_content: "Một chiếc ti vi được bán với giá&nbsp;$12.000.000$&nbsp;đ, người bán đã lãi&nbsp;$20\\%$&nbsp;so với giá vốn. Giá vốn của chiếc ti vi là:", options: ["A. $10.000.000$&nbsp;đ", "B. $9.600.000$&nbsp;đ", "C. $14.400.000$&nbsp;đ", "D. $11.000.000$&nbsp;đ"], correct_idx: 0, explain: "Giá bán bằng&nbsp;$100\\% + 20\\% = 120\\%$&nbsp;giá vốn. Giá vốn là&nbsp;$12.000.000 : 120\\% = 12.000.000 : 1,2 = 10.000.000$&nbsp;đ. Chọn A." },
{ q_title: "Câu 8", q_content: "Điểm&nbsp;$M$&nbsp;thuộc đường thẳng&nbsp;$xy$. Số tia có gốc&nbsp;$M$&nbsp;được tạo thành là:", options: ["A. 1", "B. 2", "C. 3", "D. 4"], correct_idx: 1, explain: "Một điểm nằm trên một đường thẳng chia đường thẳng đó thành hai tia đối nhau chung gốc. Vậy có 2 tia. Chọn B." },
{ q_title: "Câu 9", q_content: "Trên tia&nbsp;$Ox$, lấy 2 điểm&nbsp;$M, N$&nbsp;sao cho&nbsp;$OM = 3\\text{cm}, ON = 7\\text{cm}$. Độ dài&nbsp;$MN$&nbsp;là:", options: ["A. $10\\text{cm}$", "B. $4\\text{cm}$", "C. $5\\text{cm}$", "D. $3,5\\text{cm}$"], correct_idx: 1, explain: "Vì trên cùng tia&nbsp;$Ox$&nbsp;có&nbsp;$OM < ON$&nbsp;($3 < 7$) nên&nbsp;$M$&nbsp;nằm giữa&nbsp;$O$&nbsp;và&nbsp;$N$. Vậy&nbsp;$MN = ON - OM = 7 - 3 = 4\\text{cm}$. Chọn B." },
{ q_title: "Câu 10", q_content: "Hai góc bù nhau là hai góc:", options: ["A. Có tổng số đo bằng $90^{\\circ}$", "B. Có tổng số đo bằng $180^{\\circ}$", "C. Bằng nhau", "D. Chung 1 cạnh"], correct_idx: 1, explain: "Theo định nghĩa, hai góc bù nhau là hai góc có tổng số đo bằng&nbsp;$180^{\\circ}$. Chọn B." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về biểu thức&nbsp;$A = \\dfrac{2n-1}{n+2}$&nbsp;với&nbsp;$n \\in \\mathbb{Z}, n \\neq -2$:<br>(I) Khi&nbsp;$n = 0$, giá trị của&nbsp;$A$&nbsp;là&nbsp;$\\dfrac{-1}{2}$.<br>(II) Để&nbsp;$A$&nbsp;nhận giá trị nguyên thì&nbsp;$n+2$&nbsp;phải là ước của 5.<br>(III) Giá trị lớn nhất của&nbsp;$A$&nbsp;đạt được khi&nbsp;$n = 3$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Khi n=0 $\\Rightarrow A = \\dfrac{-1}{2}$ (Đúng). (II) Tách $A = 2 - \\dfrac{5}{n+2}$, để A nguyên thì n+2 phải là ước của 5 (Đúng). (III) Để A lớn nhất thì $\\dfrac{5}{n+2}$ nhỏ nhất (âm nhất) $\\Rightarrow n+2 = -1 \\Rightarrow n = -3$, lúc này $A = 7$. Còn n=3 thì A=1. Vậy (III) Sai. Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Cho hai góc kề bù&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$, biết&nbsp;$\\angle xOy = 60^{\\circ}$. Vẽ tia&nbsp;$Ot$&nbsp;là phân giác của&nbsp;$\\angle xOy$, tia&nbsp;$Ok$&nbsp;là phân giác của&nbsp;$\\angle yOz$. Xét 3 mệnh đề sau:<br>(I) Số đo góc&nbsp;$\\angle yOz = 120^{\\circ}$.<br>(II) Số đo góc&nbsp;$\\angle tOk = 90^{\\circ}$.<br>(III) Tia&nbsp;$Oy$&nbsp;là tia phân giác của góc&nbsp;$\\angle tOk$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Hai góc kề bù nên $\\angle yOz = 180^{\\circ} - 60^{\\circ} = 120^{\\circ}$ (Đúng). (II) Góc tạo bởi 2 tia phân giác của 2 góc kề bù luôn bằng $90^{\\circ}$ (Đúng). (III) $\\angle yOt = 30^{\\circ}$ và $\\angle yOk = 60^{\\circ}$. Vì không bằng nhau nên Oy không phải tia phân giác (Sai). Có 2 mệnh đề đúng. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Thực hiện phép tính hợp lý:&nbsp;$C = \\left( 1\\dfrac{1}{3} - 25\\% \\right) : \\left( \\dfrac{-5}{6} \\right)^2$<div class='mt-6'>b) Tính tổng dãy số sau:&nbsp;$D = \\dfrac{1}{1 \\cdot 2} + \\dfrac{1}{2 \\cdot 3} + \\dfrac{1}{3 \\cdot 4} + \\dots + \\dfrac{1}{99 \\cdot 100}$</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Biểu thức có sự xuất hiện của các dạng số khác nhau: hỗn số, phần trăm và lũy thừa.<br>- <b>How:</b> Bước đầu tiên bắt buộc là gì? (Phải quy đổi tất cả về phân số tối giản).<br>- <b>Where:</b> Lỗi sai thường gặp ở đâu? (Rất nhiều bạn nhầm lẫn dấu khi tính lũy thừa bậc chẵn của một số âm. Nhớ rằng&nbsp;$\\left( \\dfrac{-5}{6} \\right)^2$&nbsp;sẽ cho kết quả DƯƠNG).<br><b>Ý b:</b><br>- <b>What:</b> Đây là một chuỗi phân số có quy luật gì ở mẫu số? (Mẫu là tích của hai số tự nhiên liên tiếp, khoảng cách là 1).<br>- <b>Why:</b> Tử số hiện tại đã là&nbsp;$1$, có khớp với khoảng cách ở mẫu số chưa? (Đã khớp hoàn hảo).<br>- <b>How:</b> Áp dụng ngay công thức sai phân&nbsp;$\\dfrac{1}{n(n+1)} = \\dfrac{1}{n} - \\dfrac{1}{n+1}$&nbsp;để bung chuỗi ra và triệt tiêu các phần tử đối nhau.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$C$:</b></li><li class='ml-4'>Ta quy đổi các thành phần của biểu thức ra phân số:</li><li class='ml-8'>$C = \\left( \\dfrac{4}{3} - \\dfrac{1}{4} \\right) : \\dfrac{25}{36}$</li><li class='ml-4'>Thực hiện quy đồng mẫu số trong ngoặc (mẫu chung là $12$):</li><li class='ml-8'>$C = \\left( \\dfrac{16}{12} - \\dfrac{3}{12} \\right) : \\dfrac{25}{36}$</li><li class='ml-8'>$C = \\dfrac{13}{12} : \\dfrac{25}{36}$</li><li class='ml-4'>Chuyển phép chia thành phép nhân với phân số nghịch đảo:</li><li class='ml-8'>$C = \\dfrac{13}{12} \\cdot \\dfrac{36}{25}$</li><li class='ml-4'>Rút gọn chéo ($36$ chia cho $12$ được $3$):</li><li class='ml-8'>$C = \\dfrac{13 \\cdot 3}{25}$</li><li class='ml-8'>$C = \\dfrac{39}{25}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $C = \\dfrac{39}{25}$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$D$:</b></li><li class='ml-4'>Áp dụng công thức tách phân số sai phân, ta có:</li><li class='ml-8'>$D = \\left( \\dfrac{1}{1} - \\dfrac{1}{2} \\right) + \\left( \\dfrac{1}{2} - \\dfrac{1}{3} \\right) + \\left( \\dfrac{1}{3} - \\dfrac{1}{4} \\right) + \\dots + \\left( \\dfrac{1}{99} - \\dfrac{1}{100} \\right)$</li><li class='ml-4'>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở giữa:</li><li class='ml-8'>$D = 1 - \\dfrac{1}{100}$</li><li class='ml-4'>Quy đồng và tính kết quả:</li><li class='ml-8'>$D = \\dfrac{100}{100} - \\dfrac{1}{100} = \\dfrac{99}{100}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $D = \\dfrac{99}{100}$.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Tìm số nguyên&nbsp;$x$, biết:&nbsp;$(2x - 3)^2 - \\dfrac{1}{9} = \\dfrac{8}{9}$<div class='mt-6'>b) Tìm các số nguyên&nbsp;$x, y$&nbsp;thỏa mãn phương trình:&nbsp;$(x - 2)(2y + 1) = 7$</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Phương trình có chứa lũy thừa bậc chẵn (bậc 2).<br>- <b>How:</b> Làm thế nào để cô lập cụm bình phương&nbsp;$(2x - 3)^2$? (Chuyển&nbsp;$\\dfrac{-1}{9}$&nbsp;sang vế phải).<br>- <b>Why:</b> Sau khi rút gọn vế phải được&nbsp;$1$, tại sao ta BẮT BUỘC phải chia làm 2 trường hợp? (Vì cả&nbsp;$1^2$&nbsp;và&nbsp;$(-1)^2$&nbsp;đều bằng&nbsp;$1$).<br><b>Ý b:</b><br>- <b>What:</b> Phương trình nghiệm nguyên đã được đưa sẵn về dạng tích&nbsp;$(Đa\\ thức\\ 1) \\cdot (Đa\\ thức\\ 2) = Hằng\\ số$.<br>- <b>How:</b> Lập bảng các ước của&nbsp;$7$. Chú ý&nbsp;$x, y$&nbsp;là các số nguyên nên phải xét cả ước âm và ước dương.", solution: "<li><b>a) Tìm số nguyên&nbsp;$x$:</b></li><li class='ml-4'>Từ phương trình ban đầu, ta chuyển vế:</li><li class='ml-8'>$(2x - 3)^2 = \\dfrac{8}{9} + \\dfrac{1}{9}$</li><li class='ml-8'>$(2x - 3)^2 = \\dfrac{9}{9} = 1$</li><li class='ml-4'>Đưa số $1$ về dạng bình phương:</li><li class='ml-8'>$(2x - 3)^2 = 1^2 = (-1)^2$</li><li class='ml-4'>Ta chia làm 2 trường hợp:</li><li class='ml-4'><b>Trường hợp 1:</b> $2x - 3 = 1$</li><li class='ml-8'>$2x = 1 + 3 = 4 \\Rightarrow x = 2$ (Nhận vì $2 \\in \\mathbb{Z}$)</li><li class='ml-4'><b>Trường hợp 2:</b> $2x - 3 = -1$</li><li class='ml-8'>$2x = -1 + 3 = 2 \\Rightarrow x = 1$ (Nhận vì $1 \\in \\mathbb{Z}$)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x \\in \\{1; 2\\}$.</li><li><b>b) Tìm cặp số nguyên&nbsp;$x, y$:</b></li><li class='ml-4'>Ta có phương trình:</li><li class='ml-8'>$(x - 2)(2y + 1) = 7$</li><li class='ml-4'>Vì $x, y \\in \\mathbb{Z}$ nên $(x - 2)$ và $(2y + 1)$ phải là các số nguyên và là Ước của $7$.</li><li class='ml-4'>Tập hợp các ước của $7$ là: Ư$(7) = \\{-7; -1; 1; 7\\}$. Ta lập bảng xét các trường hợp:</li><li class='ml-8'>+ TH1: $2y + 1 = 1 \\Rightarrow 2y = 0 \\Rightarrow y = 0$. Khi đó $x - 2 = 7 \\Rightarrow x = 9$.</li><li class='ml-8'>+ TH2: $2y + 1 = 7 \\Rightarrow 2y = 6 \\Rightarrow y = 3$. Khi đó $x - 2 = 1 \\Rightarrow x = 3$.</li><li class='ml-8'>+ TH3: $2y + 1 = -1 \\Rightarrow 2y = -2 \\Rightarrow y = -1$. Khi đó $x - 2 = -7 \\Rightarrow x = -5$.</li><li class='ml-8'>+ TH4: $2y + 1 = -7 \\Rightarrow 2y = -8 \\Rightarrow y = -4$. Khi đó $x - 2 = -1 \\Rightarrow x = 1$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Các cặp số $(x; y)$ thỏa mãn là: $(9; 0), (3; 3), (-5; -1), (1; -4)$.</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Một người mua hai chiếc áo cùng loại với cùng một mức giá vốn. Người đó bán chiếc áo thứ nhất lãi&nbsp;$20\\%$&nbsp;so với giá vốn, bán chiếc áo thứ hai bị lỗ&nbsp;$10\\%$&nbsp;so với giá vốn. Hỏi sau khi bán cả hai chiếc áo, người đó lãi hay lỗ bao nhiêu phần trăm so với tổng số tiền vốn đã bỏ ra?", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán hỏi về phần trăm lãi/lỗ trên TỔNG SỐ TIỀN VỐN.<br>- <b>Why:</b> Có được lấy&nbsp;$20\\% - 10\\% = 10\\%$&nbsp;tiền lãi không? Câu trả lời là KHÔNG, vì tỉ lệ đó áp dụng cho từng chiếc áo riêng lẻ. Để đánh giá chính xác, ta phải tính TỔNG thu về và TỔNG vốn bỏ ra.<br>- <b>How:</b> \"Ảo hóa\" giá mua mỗi chiếc áo là 1 phần (hoặc biến&nbsp;$a$).<br>&nbsp; + Tính giá bán áo thứ nhất (vốn + lãi).<br>&nbsp; + Tính giá bán áo thứ hai (vốn - lỗ).<br>&nbsp; + Cộng 2 giá bán lại rồi so sánh với tổng 2 phần vốn ban đầu.", solution: "<li>Gọi giá vốn mua một chiếc áo là $a$ (đồng) (với $a > 0$).</li><li>Giá bán của chiếc áo thứ nhất (được lãi $20\\%$) là:</li><li class='ml-4'>$a + 20\\% \\cdot a = a + 0,2a = 1,2a$ (đồng)</li><li>Giá bán của chiếc áo thứ hai (bị lỗ $10\\%$) là:</li><li class='ml-4'>$a - 10\\% \\cdot a = a - 0,1a = 0,9a$ (đồng)</li><li>Tổng số tiền vốn bỏ ra để mua cả hai chiếc áo là:</li><li class='ml-4'>$a + a = 2a$ (đồng)</li><li>Tổng số tiền thu về sau khi bán cả hai chiếc áo là:</li><li class='ml-4'>$1,2a + 0,9a = 2,1a$ (đồng)</li><li>Vì số tiền thu về lớn hơn số tiền vốn ($2,1a > 2a$) nên người đó kinh doanh có <b>LÃI</b>.</li><li>Số tiền lãi thu được là:</li><li class='ml-4'>$2,1a - 2a = 0,1a$ (đồng)</li><li>Tỉ số phần trăm tiền lãi so với TỔNG số tiền vốn đã bỏ ra là:</li><li class='ml-4'>$\\dfrac{0,1a}{2a} \\cdot 100\\% = 0,05 \\cdot 100\\% = 5\\%$</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Sau khi bán cả hai chiếc áo, người đó lãi $5\\%$ so với tổng số tiền vốn đã bỏ ra.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Vẽ hai tia đối nhau&nbsp;$Ox$&nbsp;và&nbsp;$Oy$. Lấy điểm&nbsp;$A \\in Ox$&nbsp;sao cho&nbsp;$OA = 4\\text{ cm}$. Lấy điểm&nbsp;$B \\in Oy$&nbsp;sao cho&nbsp;$OB = 6\\text{ cm}$. Gọi&nbsp;$I$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$.<div class='mt-6'>a) Tính độ dài đoạn thẳng&nbsp;$AB$.</div><div class='mt-6'>b) Tính độ dài đoạn thẳng&nbsp;$OI$.</div><div class='mt-6'>c) Điểm&nbsp;$O$&nbsp;có nằm giữa&nbsp;$I$&nbsp;và&nbsp;$B$&nbsp;không? Vì sao?</div><div class='flex justify-center my-8'><svg width='300' height='80' viewBox='0 0 300 80'><line x1='20' y1='40' x2='280' y2='40' stroke='black' stroke-width='1.5'/><circle cx='150' cy='40' r='2' fill='black'/><text x='145' y='60' font-size='14'>O</text><circle cx='70' cy='40' r='2' fill='black'/><text x='65' y='60' font-size='14'>A</text><circle cx='270' cy='40' r='2' fill='black'/><text x='265' y='60' font-size='14'>B</text><circle cx='170' cy='40' r='2' fill='red'/><text x='165' y='60' font-size='14' fill='red'>I</text><text x='10' y='35' font-size='14' font-style='italic'>x</text><text x='285' y='35' font-size='14' font-style='italic'>y</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Điểm $A$ và $B$ nằm trên hai tia đối nhau có chung gốc $O$. Điều này quyết định vị trí tương đối nào của điểm $O$? (Điểm $O$ bắt buộc phải nằm giữa $A$ và $B$).<br>- <b>How:</b> Áp dụng hệ thức cộng đoạn thẳng để tính $AB$.<br><b>Ý b & c:</b><br>- <b>What:</b> $I$ là trung điểm của $AB$ (vừa tính được). Ta tính được $IA = IB$.<br>- <b>How:</b> Để tìm $OI$, ta phải vẽ nháp và lập luận vị trí của $I$.<br>- $O$ cách $B$ một đoạn là $6\\text{cm}$. Trong khi $I$ cách $B$ một đoạn là $\\dfrac{AB}{2}$. Hãy so sánh hai khoảng cách này từ gốc $B$ để xem điểm nào nằm giữa điểm nào.", solution: "<li><b>a) Tính độ dài đoạn thẳng&nbsp;$AB$:</b></li><li class='ml-4'>Vì điểm $A$ thuộc tia $Ox$, điểm $B$ thuộc tia $Oy$, mà $Ox$ và $Oy$ là hai tia đối nhau (theo giả thiết).</li><li class='ml-4'>Do đó, <b>điểm&nbsp;$O$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$</b>.</li><li class='ml-4'>Suy ra, ta có hệ thức cộng đoạn thẳng:</li><li class='ml-8'>$OA + OB = AB$</li><li class='ml-8'>$4 + 6 = AB \\Rightarrow AB = 10\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $AB = 10\\text{ cm}$.</li><li><b>b) Tính độ dài đoạn thẳng&nbsp;$OI$:</b></li><li class='ml-4'>Vì $I$ là trung điểm của đoạn thẳng $AB$ nên ta có độ dài:</li><li class='ml-8'>$IA = IB = \\dfrac{AB}{2} = \\dfrac{10}{2} = 5\\text{ cm}$.</li><li class='ml-4'>Xét trên tia $BA$ (tia có gốc là $B$, chứa điểm $I$ và điểm $O$).</li><li class='ml-4'>Khoảng cách từ gốc $B$ lần lượt là: $BI = 5\\text{ cm}$ và $BO = 6\\text{ cm}$.</li><li class='ml-4'>Vì $BI < BO$ ($5 < 6$) nên <b>điểm&nbsp;$I$&nbsp;nằm giữa hai điểm&nbsp;$B$&nbsp;và&nbsp;$O$</b>.</li><li class='ml-4'>Khi đó, ta có công thức cộng đoạn thẳng:</li><li class='ml-8'>$BI + IO = BO$</li><li class='ml-8'>$5 + IO = 6 \\Rightarrow IO = 6 - 5 = 1\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $OI = 1\\text{ cm}$.</li><li><b>c) Điểm&nbsp;$O$&nbsp;có nằm giữa&nbsp;$I$&nbsp;và&nbsp;$B$&nbsp;không?</b></li><li class='ml-4'>Dựa vào lập luận ở câu b, trên tia $BA$, ta đã chứng minh được thứ tự các điểm là: $B \\rightarrow I \\rightarrow O$.</li><li class='ml-4'>Điều này có nghĩa là điểm $I$ nằm kẹp giữa $B$ và $O$.</li><li class='ml-4'>Do đó, điểm $O$ <b>KHÔNG THỂ</b> nằm giữa hai điểm $I$ và $B$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: Điểm $O$ không nằm giữa $I$ và $B$.</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "(Số học nâng cao) Không cần tính giá trị cụ thể, hãy so sánh hai biểu thức sau:<br>$A = \\dfrac{2024^{2023} + 1}{2024^{2024} + 1}$ &nbsp;và&nbsp; $B = \\dfrac{2024^{2022} + 1}{2024^{2023} + 1}$", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Đây là bài toán đánh giá, so sánh hai biểu thức siêu phân số có dạng $x^n$. Tính trực tiếp là bất khả thi.<br>- <b>Why:</b> Tại sao lại cần làm cho phần nguyên của phân số giống nhau? (Để loại bỏ sự cồng kềnh, chuyển bài toán về việc chỉ so sánh phần phân số dư cực nhỏ).<br>- <b>How:</b> Mẫu số của $A$ lớn hơn tử số. Ta nhân cả biểu thức $A$ và $B$ với cơ số chung là $2024$. Phép nhân này sẽ đẩy số mũ ở tử lên, tạo điều kiện để tách thành: $Mẫu\\_số + Hằng\\_số$.", solution: "<li>Ta nhân cả hai vế của biểu thức $A$ với $2024$:</li><li class='ml-4'>$2024 \\cdot A = 2024 \\cdot \\dfrac{2024^{2023} + 1}{2024^{2024} + 1} = \\dfrac{2024^{2024} + 2024}{2024^{2024} + 1}$</li><li class='ml-4'>$2024 \\cdot A = \\dfrac{(2024^{2024} + 1) + 2023}{2024^{2024} + 1} = 1 + \\dfrac{2023}{2024^{2024} + 1}$</li><li>Tương tự, ta nhân cả hai vế của biểu thức $B$ với $2024$:</li><li class='ml-4'>$2024 \\cdot B = 2024 \\cdot \\dfrac{2024^{2022} + 1}{2024^{2023} + 1} = \\dfrac{2024^{2023} + 2024}{2024^{2023} + 1}$</li><li class='ml-4'>$2024 \\cdot B = \\dfrac{(2024^{2023} + 1) + 2023}{2024^{2023} + 1} = 1 + \\dfrac{2023}{2024^{2023} + 1}$</li><li>Tiến hành so sánh hai phân số dư:</li><li class='ml-4'>Ta thấy mẫu số $2024^{2024} + 1 > 2024^{2023} + 1$.</li><li class='ml-4'>Theo tính chất của phân số (cùng tử số dương, mẫu lớn hơn thì phân số nhỏ hơn), ta có:</li><li class='ml-8'>$\\dfrac{2023}{2024^{2024} + 1} < \\dfrac{2023}{2024^{2023} + 1}$</li><li>Cộng thêm $1$ vào cả hai vế bất đẳng thức:</li><li class='ml-4'>$1 + \\dfrac{2023}{2024^{2024} + 1} < 1 + \\dfrac{2023}{2024^{2023} + 1}$</li><li class='ml-4'>Suy ra: $2024 \\cdot A < 2024 \\cdot B$</li><li>Chia cả hai vế cho $2024$:</li><li class='ml-4'>$A < B$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Biểu thức $A$ nhỏ hơn biểu thức $B$.</li>" }
]
});
</script>

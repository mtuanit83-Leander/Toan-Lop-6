2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-gray-500 mr-1'><path d='M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-gray-500 mr-1'><path d='M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-gray-500 mr-1'><path d='M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-gray-500 mr-1'><path d='M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-gray-500 mr-1'><path d='M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-gray-500 mr-1'><path d='M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-gray-500'><path d='M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z'/></svg></td></tr></table><p class='text-xs text-gray-700 italic mt-2'>(Quy ước: <svg viewBox='0 0 24 24' width='16' height='16' class='inline-block fill-gray-500'><path d='M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z'/></svg> = 10 cuốn vở; &nbsp;<svg viewBox='0 0 24 24' width='16' height='16' class='inline-block fill-gray-500'><path d='M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z'/></svg> = 5 cuốn vở). Ngày bán được nhiều cuốn vở nhất là:</p>", options: ["A. Thứ năm.", "B. Thứ sáu.", "C. Thứ hai.", "D. Thứ tư."], correct_idx: 1, explain: "Dựa vào biểu đồ: Thứ sáu bán được 9 cuốn (tương ứng 90 cuốn vở), là nhiều nhất. Chọn B." },
{ q_title: "Câu 23", q_content: "Số vở bán được trong tuần là:", options: ["A. 425.", "B. 44.", "C. 413.", "D. 415."], correct_idx: 3, explain: "T2(85) + T3(80) + T4(85) + T5(75) + T6(90) = 415 cuốn vở. Chọn D." },
{ q_title: "Câu 24", q_content: "Thứ hai bán được nhiều hơn ngày thứ 5 số vở là:", options: ["A. 2 quyển.", "B. 10 quyển.", "C. 15 quyển.", "D. 20 quyển."], correct_idx: 1, explain: "Thứ 2 (85 cuốn), Thứ 5 (75 cuốn). Chênh lệch: 85 - 75 = 10 cuốn. Chọn B." },
{ q_title: "Câu 25", q_content: "Gieo 1 con xúc xắc 6 mặt 60 lần ta được kết quả ở bảng sau:<table class='min-w-full text-center border-collapse border border-gray-300 my-4 text-sm'><tr><td class='border border-gray-300 p-2'>Mặt ghi số chấm</td><td class='border border-gray-300 p-2'>1</td><td class='border border-gray-300 p-2'>2</td><td class='border border-gray-300 p-2'>3</td><td class='border border-gray-300 p-2'>4</td><td class='border border-gray-300 p-2'>5</td><td class='border border-gray-300 p-2'>6</td></tr><tr><td class='border border-gray-300 p-2'>Số lần xuất hiện</td><td class='border border-gray-300 p-2 font-bold text-red-600'>6</td><td class='border border-gray-300 p-2 font-bold text-blue-600'>15</td><td class='border border-gray-300 p-2'>8</td><td class='border border-gray-300 p-2'>10</td><td class='border border-gray-300 p-2'>9</td><td class='border border-gray-300 p-2'>12</td></tr></table>Xác suất thực nghiệm xuất hiện mặt 2 chấm là:", options: ["A. $\\dfrac{1}{4}$", "B. $\\dfrac{1}{5}$", "C. $\\dfrac{1}{15}$", "D. $\\dfrac{2}{3}$"], correct_idx: 0, explain: "Mặt 2 chấm xuất hiện 15 lần. Xác suất là&nbsp;$15/60 = 1/4$. Chọn A." },
{ q_title: "Câu 26", q_content: "Tung một con xúc xắc có sáu mặt, số chấm ở mỗi mặt là một trong các số nguyên dương 1, 2, 3, 4, 5, 6. Có bao nhiêu kết quả có thể xảy ra đối với mặt xuất hiện của con xúc xắc?", options: ["A. 3", "B. 6", "C. 0", "D. 1"], correct_idx: 1, explain: "Xúc xắc có 6 mặt nên có 6 kết quả. Chọn B." },
{ q_title: "Câu 27", q_content: "Một hộp có 10 chiếc thẻ được đánh số từ 1 đến 10. Rút ngẫu nhiên một chiếc thẻ từ trong hộp, ghi lại số của thẻ rút được và bỏ lại thẻ đó vào hộp. Sau 25 lần rút thẻ liên tiếp, nhận thấy có 4 lần lấy được thẻ đánh số 6. Xác suất thực nghiệm xuất hiện thẻ đánh số 6 là:", options: ["A. $\\dfrac{2}{25}$", "B. $\\dfrac{4}{25}$", "C. $\\dfrac{1}{10}$", "D. $\\dfrac{6}{25}$"], correct_idx: 1, explain: "Xác suất = Số lần xuất hiện / Tổng số lần rút = 4/25. Chọn B." },
{ q_title: "Câu 28", q_content: "Được cô giáo giao nhiệm vụ thống kê điểm kiểm tra giữa kì II môn Toán của các thành viên trong tổ, bạn Minh lập được bảng bên:<table class='text-center border-collapse border border-gray-300 my-4 text-sm mx-auto'><tr><td class='border border-gray-300 p-2'>Số điểm</td><td class='border border-gray-300 p-2'>10</td><td class='border border-gray-300 p-2'>9</td><td class='border border-gray-300 p-2 bg-yellow-100'>8</td><td class='border border-gray-300 p-2'>7</td><td class='border border-gray-300 p-2'>6</td><td class='border border-gray-300 p-2'>5</td><td class='border border-gray-300 p-2'>3</td></tr><tr><td class='border border-gray-300 p-2'>Số người</td><td class='border border-gray-300 p-2'>2</td><td class='border border-gray-300 p-2'>3</td><td class='border border-gray-300 p-2 font-bold bg-yellow-100 text-blue-700'>3</td><td class='border border-gray-300 p-2'>4</td><td class='border border-gray-300 p-2'>1</td><td class='border border-gray-300 p-2'>1</td><td class='border border-gray-300 p-2'>0</td></tr></table>Theo thống kê trên, số bạn đạt điểm 8 là bao nhiêu bạn?", options: ["A. 1 bạn", "B. 3 bạn", "C. 8 bạn", "D. 4 bạn"], correct_idx: 1, explain: "Tra bảng thấy dưới cột Điểm 8 là số 3. Có 3 bạn đạt điểm 8. Chọn B." },
{ q_title: "Câu 29", q_content: "Bốn bạn Việt, Nam, Chiến, Thắng lần lượt sút bóng vào gôn. Mỗi bạn được đá 10 quả, mỗi lần đá vào gôn được 1 tích (✓), kết quả như bảng bên:<table class='text-center border-collapse border border-gray-300 my-4 text-sm mx-auto w-48'><tr><td class='border border-gray-300 p-2'>Việt</td><td class='border border-gray-300 p-2 text-left tracking-widest text-blue-600'>✓✓✓✓✓</td></tr><tr><td class='border border-gray-300 p-2'>Nam</td><td class='border border-gray-300 p-2 text-left tracking-widest text-blue-600'>✓✓✓✓✓✓✓</td></tr><tr><td class='border border-gray-300 p-2'>Chiến</td><td class='border border-gray-300 p-2 text-left tracking-widest text-blue-600'>✓✓✓✓</td></tr><tr><td class='border border-gray-300 p-2'>Thắng</td><td class='border border-gray-300 p-2 text-left tracking-widest text-blue-600 font-bold'>✓✓✓✓✓✓✓✓</td></tr></table>Bạn nào đá được vào gôn nhiều nhất?", options: ["A. Việt", "B. Nam", "C. Chiến", "D. Thắng"], correct_idx: 3, explain: "Đếm số tick: Việt (5), Nam (7), Chiến (4), Thắng (8). Thắng nhiều nhất. Chọn D." },
{ q_title: "Câu 30", q_content: "Số học sinh khối 6 đến thư viện của trường mượn sách vào các ngày trong tuần được thống kê trong bảng bên:<table class='min-w-full text-center border-collapse border border-gray-300 my-4 text-sm'><tr><td class='border border-gray-300 p-2'>Ngày</td><td class='border border-gray-300 p-2'>Thứ 2</td><td class='border border-gray-300 p-2'>Thứ 3</td><td class='border border-gray-300 p-2'>Thứ 4</td><td class='border border-gray-300 p-2'>Thứ 5</td><td class='border border-gray-300 p-2'>Thứ 6</td></tr><tr><td class='border border-gray-300 p-2'>Số học sinh</td><td class='border border-gray-300 p-2'>24</td><td class='border border-gray-300 p-2'>32</td><td class='border border-gray-300 p-2'>8</td><td class='border border-gray-300 p-2'>16</td><td class='border border-gray-300 p-2 font-bold'>40</td></tr></table>Tỉ số giữa ngày có số học sinh đến thư viện nhiều nhất so với tổng số học sinh đã đến thư viện trong tuần là:", options: ["A. $\\dfrac{1}{3}$", "B. $\\dfrac{5}{4}$", "C. $\\dfrac{4}{5}$", "D. $\\dfrac{1}{15}$"], correct_idx: 0, explain: "Ngày nhiều nhất là Thứ 6 (40 HS). Tổng cộng: 24+32+8+16+40 = 120 HS. Tỉ số: 40/120 = 1/3. Chọn A." },
{ q_title: "Câu 31", q_content: "Biểu đồ cột sau đây biểu diễn số lượng vé bán được với các mức giá khác nhau của một buổi hòa nhạc.<div class='mt-6 mb-4 flex justify-center'><svg width='500' height='250' viewBox='0 0 500 250' class='max-w-full text-[10px] font-sans'><path d='M35,20 L35,220 L480,220' stroke='black' fill='none'/><path d='M35,20 L480,20 M35,70 L480,70 M35,120 L480,120 M35,170 L480,170' stroke='#e5e7eb' stroke-width='1' fill='none'/><text x='10' y='25'>800</text><text x='10' y='75'>600</text><text x='10' y='125'>400</text><text x='10' y='175'>200</text><text x='20' y='225'>0</text><rect x='60' y='32.5' width='40' height='187.5' fill='#a78bfa' stroke='black' stroke-width='1'/><text x='80' y='27' text-anchor='middle' font-weight='bold'>750</text><text x='80' y='235' text-anchor='middle'>100 nghìn</text><rect x='140' y='107.5' width='40' height='112.5' fill='#a78bfa' stroke='black' stroke-width='1'/><text x='160' y='102' text-anchor='middle' font-weight='bold'>450</text><text x='160' y='235' text-anchor='middle'>150 nghìn</text><rect x='220' y='132.5' width='40' height='87.5' fill='#a78bfa' stroke='black' stroke-width='1'/><text x='240' y='127' text-anchor='middle' font-weight='bold'>350</text><text x='240' y='235' text-anchor='middle'>200 nghìn</text><rect x='300' y='182.5' width='40' height='37.5' fill='#a78bfa' stroke='black' stroke-width='1'/><text x='320' y='177' text-anchor='middle' font-weight='bold'>150</text><text x='320' y='235' text-anchor='middle'>500 nghìn</text><rect x='380' y='195' width='40' height='25' fill='#a78bfa' stroke='black' stroke-width='1'/><text x='400' y='190' text-anchor='middle' font-weight='bold'>100</text><text x='400' y='235' text-anchor='middle'>1 triệu</text></svg></div> Theo biểu đồ bên, tổng số vé bán được là bao nhiêu?", options: ["A. 1 000 vé", "B. 1 800 vé", "C. 750 vé", "D. 1 750 vé"], correct_idx: 1, explain: "Cộng các cột:&nbsp;$750 + 450 + 350 + 150 + 100 = 1800$. Chọn B." },
{ q_title: "Câu 32", q_content: "Biểu đồ tranh dưới đây cho ta thông tin về loại quả yêu thích của các bạn học sinh khối lớp 6:<br><table class='w-full text-sm border-collapse border border-gray-300 mt-4 mb-2 bg-white'><tr><td class='border border-gray-300 p-2 font-medium w-20 text-center'>Táo</td><td class='border border-gray-300 p-2 text-left'><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='11' height='22' preserveAspectRatio='xMinYMid slice' class='inline-block fill-green-500'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg></td></tr><tr><td class='border border-gray-300 p-2 font-medium text-center'>Chuối</td><td class='border border-gray-300 p-2 text-left'><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg></td></tr><tr><td class='border border-gray-300 p-2 font-medium text-center'>Dưa hấu</td><td class='border border-gray-300 p-2 text-left'><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg></td></tr><tr><td class='border border-gray-300 p-2 font-medium text-center'>Cam</td><td class='border border-gray-300 p-2 text-left'><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='11' height='22' preserveAspectRatio='xMinYMid slice' class='inline-block fill-green-500'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg></td></tr><tr><td class='border border-gray-300 p-2 font-medium text-center'>Bưởi</td><td class='border border-gray-300 p-2 text-left'><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg><svg viewBox='0 0 24 24' width='22' height='22' class='inline-block fill-green-500 mr-1'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg></td></tr></table><p class='text-xs text-gray-700 italic mt-2'>(Ghi chú: <svg viewBox='0 0 24 24' width='16' height='16' class='inline-block fill-green-500'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg> = 10 học sinh; &nbsp;<svg viewBox='0 0 24 24' width='8' height='16' preserveAspectRatio='xMinYMid slice' class='inline-block fill-green-500'><path d='M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z'/></svg> = 5 học sinh). Chọn khẳng định đúng:</p>", options: ["A. Bưởi là loại quả được yêu thích nhất.", "B. Có 40 học sinh thích quả chuối.", "C. Số học sinh thích cam nhiều hơn dưa hấu.", "D. Tổng số học sinh thích cam và táo là 70 học sinh."], correct_idx: 3, explain: "Dựa vào biểu đồ: Táo (25), Chuối (50), Dưa hấu (70), Cam (45), Bưởi (60). Tổng Cam và Táo là 45 + 25 = 70 học sinh. Chọn D." },
{ q_title: "Câu 33", q_content: "Nếu tung đồng xu 10 lần liên tiếp, có 6 lần xuất hiện mặt N. Khi đó xác suất thực nghiệm của mặt S là:", options: ["A. $\\dfrac{3}{5}$", "B. $\\dfrac{2}{5}$", "C. 3", "D. 9"], correct_idx: 1, explain: "Mặt S xuất hiện là&nbsp;$10 - 6 = 4$&nbsp;lần. Xác suất là&nbsp;$\\dfrac{4}{10} = \\dfrac{2}{5}$. Chọn B." },
{ q_title: "Câu 34", q_content: "Một xạ thủ bắn 50 mũi tên vào một tấm bia thì được 35 lần trúng tấm bia. Xác suất thực nghiệm của sự kiện xạ thủ bắn không trúng tấm bia là:", options: ["A. $\\dfrac{35}{100}$", "B. $\\dfrac{35}{50}$", "C. $\\dfrac{3}{10}$", "D. $\\dfrac{7}{10}$"], correct_idx: 2, explain: "Số lần không trúng là&nbsp;$50 - 35 = 15$&nbsp;lần. Xác suất là&nbsp;$\\dfrac{15}{50} = \\dfrac{3}{10}$. Chọn C." },
{ q_title: "Câu 35", q_content: "Cho các số đo góc sau:&nbsp;$165^{\\circ}, 90^{\\circ}, 87^{\\circ}, 101^{\\circ}, 58^{\\circ}, 180^{\\circ}, 5^{\\circ}$. Trong đó có bao nhiêu góc nhọn?", options: ["A. 4.", "B. 5.", "C. 3.", "D. 2."], correct_idx: 2, explain: "Góc nhọn có số đo lớn hơn&nbsp;$0^{\\circ}$&nbsp;và nhỏ hơn&nbsp;$90^{\\circ}$. Các góc nhọn là:&nbsp;$87^{\\circ}, 58^{\\circ}, 5^{\\circ}$. Có 3 góc. Chọn C." },
{ q_title: "Câu 36", q_content: "Trên đường thẳng d lấy 4 điểm A, B, C, E như hình vẽ. Hỏi có tất cả bao nhiêu đoạn thẳng?<div class='flex justify-center my-4'><svg width='300' height='40' viewBox='0 0 300 40'><line x1='20' y1='20' x2='280' y2='20' stroke='blue' stroke-width='1'/><circle cx='80' cy='20' r='2' fill='red'/><text x='75' y='10' font-weight='bold' font-style='italic'>A</text><circle cx='130' cy='20' r='2' fill='red'/><text x='125' y='10' font-weight='bold' font-style='italic'>B</text><circle cx='180' cy='20' r='2' fill='red'/><text x='175' y='10' font-weight='bold' font-style='italic'>C</text><circle cx='240' cy='20' r='2' fill='red'/><text x='235' y='10' font-weight='bold' font-style='italic'>E</text><text x='30' y='15' font-style='italic'>d</text></svg></div>", options: ["A. 3.", "B. 4.", "C. 5.", "D. 6."], correct_idx: 3, explain: "Số đoạn thẳng tạo bởi 4 điểm phân biệt trên một đường thẳng là&nbsp;$\\dfrac{4 \\cdot 3}{2} = 6$. Chọn D." },
{ q_title: "Câu 37", q_content: "Quan sát hình sau và cho biết đâu là khẳng định sai:<div class='flex justify-center my-4'><svg width='200' height='150' viewBox='0 0 200 150'><line x1='30' y1='120' x2='180' y2='120' stroke='blue' stroke-width='1'/><line x1='30' y1='120' x2='150' y2='20' stroke='blue' stroke-width='1'/><text x='15' y='125' font-weight='bold' font-style='italic'>O</text><text x='185' y='125' font-weight='bold' font-style='italic'>x</text><text x='155' y='25' font-weight='bold' font-style='italic'>y</text><circle cx='150' cy='70' r='2' fill='red'/><text x='155' y='75' font-weight='bold' font-style='italic'>M</text><circle cx='80' cy='40' r='2' fill='red'/><text x='70' y='45' font-weight='bold' font-style='italic'>N</text><circle cx='120' cy='95' r='2' fill='red'/><text x='125' y='100' font-weight='bold' font-style='italic'>P</text></svg></div>", options: ["A. N là điểm nằm trong xOy.", "B. N là điểm nằm ngoài xOy.", "C. M là điểm nằm trong xOy.", "D. P là điểm nằm trong xOy."], correct_idx: 0, explain: "Dựa vào hình vẽ, điểm N nằm ngoài góc xOy. Do đó khẳng định N nằm trong là sai. Chọn A." },
{ q_title: "Câu 38", q_content: "Góc vuông có số đo là:", options: ["A. $90^{\\circ}$", "B. $60^{\\circ}$", "C. $120^{\\circ}$", "D. $180^{\\circ}$"], correct_idx: 0, explain: "Theo định nghĩa, góc vuông là góc có số đo bằng 90 độ. Chọn A." },
{ q_title: "Câu 39", q_content: "Giờ nào sau đây thì kim giờ và kim phút của đồng hồ tạo thành góc vuông?", options: ["A. 6 giờ.", "B. 3 giờ.", "C. 5 giờ.", "D. 12 giờ."], correct_idx: 1, explain: "Lúc 3 giờ, kim phút chỉ số 12, kim giờ chỉ số 3, tạo thành góc vuông. Chọn B." },
{ q_title: "Câu 40", q_content: "M là trung điểm của đoạn thẳng AB khi và chỉ khi:", options: ["A. $MA + MB = AB$", "B. $MA + AB = MB$&nbsp;và&nbsp;$MA = MB$", "C. $MA = MB$", "D. $MA + MB = AB$&nbsp;và&nbsp;$MA = MB$"], correct_idx: 3, explain: "Định nghĩa trung điểm gồm 2 điều kiện: Nằm giữa và cách đều. Chọn D." },
{ q_title: "Câu 41", q_content: "Gấp sợi dây lại để hai đầu sợi dây trùng nhau. Đánh dấu điểm A là chỗ bị gấp. Khoảng cách từ điểm A đến mỗi đầu sợi dây là 0,2 m. Độ dài sợi dây là?", options: ["A. 0,4 cm", "B. 40 m", "C. 40 cm", "D. 0,4 dm"], correct_idx: 2, explain: "Sợi dây dài&nbsp;$0,2 \\cdot 2 = 0,4\\text{ (m)} = 40\\text{ (cm)}$. Chọn C." },
{ q_title: "Câu 42", q_content: "Cho I là trung điểm của đoạn thẳng AB. Biết&nbsp;$AB=8\\text{cm}$, độ dài đoạn thẳng IB là:", options: ["A. 16cm", "B. 2cm", "C. 8cm", "D. 4cm"], correct_idx: 3, explain: "Vì I là trung điểm nên&nbsp;$IB = AB / 2 = 4\\text{cm}$. Chọn D." },
{ q_title: "Câu 43", q_content: "Hình vẽ dưới đây có bao nhiêu góc (không tính góc bẹt)?<div class='flex justify-center my-4'><svg width='150' height='150' viewBox='0 0 150 150'><line x1='20' y1='20' x2='130' y2='130' stroke='black' stroke-width='1'/><line x1='20' y1='130' x2='130' y2='20' stroke='black' stroke-width='1'/><circle cx='75' cy='75' r='2.5' fill='black'/><text x='75' y='65' font-weight='bold'>O</text></svg></div>", options: ["A. 4.", "B. 6.", "C. 5.", "D. 7."], correct_idx: 0, explain: "Hai đường thẳng cắt nhau tạo thành 4 góc nhỏ tại đỉnh O (không tính 2 góc bẹt). Chọn A." },
{ q_title: "Câu 44", q_content: "Cho hình vẽ dưới đây. Khẳng định nào sau đây là đúng?<div class='flex justify-center my-4'><svg width='250' height='100' viewBox='0 0 250 100'><line x1='20' y1='80' x2='230' y2='80' stroke='blue' stroke-width='1'/><line x1='125' y1='80' x2='200' y2='20' stroke='blue' stroke-width='1'/><circle cx='125' cy='80' r='2' fill='red'/><text x='120' y='95' font-weight='bold' font-size='12'>A</text><text x='15' y='95' font-weight='bold'>z</text><text x='235' y='95' font-weight='bold'>x</text><text x='205' y='15' font-weight='bold'>y</text><path d='M 110 80 A 15 15 0 0 1 115 70' fill='none' stroke='green' stroke-width='1'/><text x='95' y='75' font-size='10' font-weight='bold'>135°</text><path d='M 145 80 A 20 20 0 0 0 135 70' fill='none' stroke='green' stroke-width='1'/><text x='150' y='75' font-size='10' font-weight='bold'>45°</text></svg></div>", options: ["A. góc yAx là góc vuông", "B. góc yAz là góc tù", "C. góc xAz là góc nhọn", "D. góc xAy là góc bẹt"], correct_idx: 1, explain: "Theo hình vẽ, góc yAz có số đo 135° là góc tù (lớn hơn 90° và nhỏ hơn 180°). Chọn B." },
{ q_title: "Câu 45", q_content: "Khẳng định nào sau đây sai?", options: ["A. Góc vuông là góc có số đo bằng $90^{\\circ}$.", "B. Góc có số đo lớn hơn $0^{\\circ}$ và nhỏ hơn $90^{\\circ}$ là góc nhọn.", "C. Góc có số đo nhỏ hơn $180^{\\circ}$ là góc tù.", "D. Góc có số đo bằng $180^{\\circ}$ là góc bẹt."], correct_idx: 2, explain: "Góc tù phải có số đo lớn hơn 90 độ và nhỏ hơn 180 độ. Nếu chỉ nói nhỏ hơn 180 độ thì có thể là góc nhọn hoặc vuông. Chọn C." },
{ q_title: "Câu 46", q_content: "Trong hình bên có bao nhiêu góc?<div class='flex justify-center my-4'><svg width='200' height='120' viewBox='0 0 200 120'><polygon points='40,100 160,100 100,20' fill='none' stroke='blue' stroke-width='1'/><line x1='40' y1='100' x2='110' y2='65' stroke='blue' stroke-width='1'/><line x1='160' y1='100' x2='110' y2='65' stroke='blue' stroke-width='1'/><line x1='100' y1='20' x2='110' y2='65' stroke='blue' stroke-width='1'/><circle cx='40' cy='100' r='2' fill='red'/><circle cx='160' cy='100' r='2' fill='red'/><circle cx='100' cy='20' r='2' fill='red'/><circle cx='110' cy='65' r='2' fill='red'/></svg></div>", options: ["A. 6 góc.", "B. 9 góc.", "C. 12 góc.", "D. 15 góc."], correct_idx: 2, explain: "Tại mỗi đỉnh của tam giác lớn có 3 góc, tại đỉnh ở giữa tam giác cũng có 3 góc (không tính góc phản). Tổng cộng là&nbsp;$4 \\cdot 3 = 12$&nbsp;góc. Chọn C." },
{ q_title: "Câu 47", q_content: "Góc nào lớn nhất trong các góc sau?", options: ["A. Góc nhọn.", "B. Góc vuông.", "C. Góc tù.", "D. Góc bẹt."], correct_idx: 3, explain: "Góc bẹt có số đo 180 độ là góc lớn nhất trong các góc này. Chọn D." },
{ q_title: "Câu 48", q_content: "Góc là hình gồm:", options: ["A. hai tia cắt nhau.", "B. hai tia cùng thuộc một mặt phẳng.", "C. hai tia đối nhau.", "D. hai tia chung gốc."], correct_idx: 3, explain: "Theo định nghĩa, góc là hình gồm hai tia chung gốc. Chọn D." },
{ q_title: "Câu 49", q_content: "Các điểm nằm trong góc mOn trong hình bên là:<div class='flex justify-center my-4'><svg width='200' height='120' viewBox='0 0 200 120'><line x1='30' y1='100' x2='170' y2='100' stroke='blue' stroke-width='1.5'/><line x1='30' y1='100' x2='100' y2='20' stroke='blue' stroke-width='1.5'/><text x='15' y='105' font-style='italic'>O</text><text x='175' y='105' font-style='italic' font-weight='bold'>n</text><text x='105' y='15' font-style='italic' font-weight='bold'>m</text><circle cx='20' cy='60' r='2' fill='red'/><text x='25' y='70' font-style='italic' font-size='12'>A</text><circle cx='70' cy='80' r='2' fill='red'/><text x='75' y='90' font-style='italic' font-size='12'>B</text><circle cx='130' cy='50' r='2' fill='red'/><text x='135' y='60' font-style='italic' font-size='12'>C</text></svg></div>", options: ["A. Điểm A, B", "B. Điểm A, B, C", "C. Điểm B, C", "D. Điểm A"], correct_idx: 2, explain: "Điểm A nằm phía ngoài (bên trái) tia Om. Điểm B và C đều nằm lọt giữa khu vực tạo bởi hai tia Om và On. Do đó B, C nằm trong góc. Chọn C." },
{ q_title: "Câu 50", q_content: "Cho hình vẽ sau: Số tia phân biệt có trong hình là:<div class='flex justify-center my-4'><svg width='200' height='40' viewBox='0 0 200 40'><line x1='20' y1='20' x2='180' y2='20' stroke='black' stroke-width='1'/><circle cx='70' cy='20' r='2' fill='black'/><text x='65' y='35' font-weight='bold' font-style='italic'>A</text><circle cx='130' cy='20' r='2' fill='black'/><text x='125' y='35' font-weight='bold' font-style='italic'>B</text><text x='10' y='15' font-weight='bold' font-style='italic'>x</text><text x='185' y='15' font-weight='bold' font-style='italic'>y</text></svg></div>", options: ["A. 2 tia.", "B. 4 tia.", "C. 3 tia.", "D. 6 tia."], correct_idx: 1, explain: "Trên đường thẳng xy có 2 điểm A và B. Ta có các tia phân biệt: Ax, Ay, Bx, By (tổng cộng 4 tia). Chọn B." }
],
tu_luan: [
{ t_title: "Bài 1", t_content: "Thực hiện các phép tính sau (tính hợp lí nếu có thể).<br>a) $-\\dfrac{3}{4} + 2025 + 0,75$<br>b) $\\dfrac{1}{3} + (50\\% - 0,25)$<br>c) $x + \\dfrac{1}{5} = 25\\%$<br>d) $\\dfrac{5}{17} \\cdot \\dfrac{-8}{15} + \\dfrac{5}{17} \\cdot \\dfrac{-7}{15} + \\dfrac{22}{17}$<br>e) $82,15 + (-13,7) + 17,85 + (-16,3)$<br>g) $113,58 \\cdot 23 + 113,58 \\cdot 76 + 113,58$<br>h) $\\left(\\dfrac{-2}{5}\\right)^2 + \\dfrac{1}{2} \\cdot (4,5 - 2) - 25\\%$<br>i) $(-3,9) \\cdot 2,8 + (-3,9) \\cdot 7,2$", lines_needed: 15, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chúng ta làm gì với các biểu thức chứa nhiều loại số khác nhau?<br>- <b>Who:</b> Những 'nhân vật' nào (phân số, số thập phân, phần trăm) đang xuất hiện trong từng phép tính?<br>- <b>Where/When:</b> Ở vị trí nào trong biểu thức ta có thể gom các số lại để tạo thành tổng/hiệu tròn chẵn?<br>- <b>Why:</b> Tại sao việc chuyển đổi tất cả về cùng một dạng (phân số) lại giúp bài toán dễ giải quyết hơn? Tại sao ở một số câu (như c, d, h) ta lại nên dùng tính chất phân phối thay vì tính trực tiếp?<br>- <b>How:</b> Làm thế nào để áp dụng tính chất phân phối của phép nhân đối với phép cộng? Cách rút nhân tử chung ra ngoài ngoặc được thực hiện ra sao?", solution: "<li><b>a) $-\\dfrac{3}{4} + 2025 + 0,75$</b></li><li class='ml-4'>Đổi số thập phân thành phân số: $0,75 = \\dfrac{3}{4}$</li><li class='ml-4'>Thay vào biểu thức: $-\\dfrac{3}{4} + 2025 + \\dfrac{3}{4}$</li><li class='ml-4'>Nhóm các phân số đối nhau: $= \\left(-\\dfrac{3}{4} + \\dfrac{3}{4}\\right) + 2025$</li><li class='ml-4'>$= 0 + 2025 = 2025$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $2025$</li><li><b>b) $\\dfrac{1}{3} + (50\\% - 0,25)$</b></li><li class='ml-4'>Đổi phần trăm và số thập phân thành phân số: $50\\% = \\dfrac{1}{2}$ và $0,25 = \\dfrac{1}{4}$</li><li class='ml-4'>Thực hiện phép tính trong ngoặc: $\\dfrac{1}{2} - \\dfrac{1}{4} = \\dfrac{2}{4} - \\dfrac{1}{4} = \\dfrac{1}{4}$</li><li class='ml-4'>Thực hiện phép cộng: $\\dfrac{1}{3} + \\dfrac{1}{4} = \\dfrac{4}{12} + \\dfrac{3}{12} = \\dfrac{7}{12}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $\\dfrac{7}{12}$</li><li><b>c) $x + \\dfrac{1}{5} = 25\\%$</b></li><li class='ml-4'>Đổi phần trăm thành phân số: $25\\% = \\dfrac{1}{4}$</li><li class='ml-4'>Ta có phương trình: $x + \\dfrac{1}{5} = \\dfrac{1}{4}$</li><li class='ml-4'>Chuyển vế: $x = \\dfrac{1}{4} - \\dfrac{1}{5}$</li><li class='ml-4'>Quy đồng và tính: $x = \\dfrac{5}{20} - \\dfrac{4}{20} = \\dfrac{1}{20}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $x = \\dfrac{1}{20}$ (hoặc $0,05$)</li><li><b>d) $\\dfrac{5}{17} \\cdot \\dfrac{-8}{15} + \\dfrac{5}{17} \\cdot \\dfrac{-7}{15} + \\dfrac{22}{17}$</b></li><li class='ml-4'>Nhóm hai hạng tử đầu và đặt thừa số chung $\\dfrac{5}{17}$ ra ngoài: $= \\dfrac{5}{17} \\cdot \\left(\\dfrac{-8}{15} + \\dfrac{-7}{15}\\right) + \\dfrac{22}{17}$</li><li class='ml-4'>Tính trong ngoặc: $\\dfrac{-8 + (-7)}{15} = \\dfrac{-15}{15} = -1$</li><li class='ml-4'>Thay vào biểu thức: $= \\dfrac{5}{17} \\cdot (-1) + \\dfrac{22}{17} = \\dfrac{-5}{17} + \\dfrac{22}{17}$</li><li class='ml-4'>Tính tổng cuối cùng: $= \\dfrac{17}{17} = 1$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $1$</li><li><b>e) $82,15 + (-13,7) + 17,85 + (-16,3)$</b></li><li class='ml-4'>Sử dụng tính chất giao hoán và kết hợp để nhóm các số hạng: $= (82,15 + 17,85) + \\left[ (-13,7) + (-16,3) \\right]$</li><li class='ml-4'>Tính từng ngoặc: $= 100 + (-30)$</li><li class='ml-4'>$= 70$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $70$</li><li><b>g) $113,58 \\cdot 23 + 113,58 \\cdot 76 + 113,58$</b></li><li class='ml-4'>Viết lại hạng tử cuối: $113,58 = 113,58 \\cdot 1$</li><li class='ml-4'>Áp dụng tính chất phân phối của phép nhân đối với phép cộng: $= 113,58 \\cdot (23 + 76 + 1)$</li><li class='ml-4'>$= 113,58 \\cdot 100 = 11358$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $11358$</li><li><b>h) $\\left(\\dfrac{-2}{5}\\right)^2 + \\dfrac{1}{2} \\cdot (4,5 - 2) - 25\\%$</b></li><li class='ml-4'>Tính lũy thừa và đổi các số ra phân số: $\\left(\\dfrac{-2}{5}\\right)^2 = \\dfrac{4}{25}$; $4,5 - 2 = 2,5 = \\dfrac{5}{2}$; $25\\% = \\dfrac{1}{4}$</li><li class='ml-4'>Thay vào biểu thức: $= \\dfrac{4}{25} + \\dfrac{1}{2} \\cdot \\dfrac{5}{2} - \\dfrac{1}{4}$</li><li class='ml-4'>Thực hiện phép nhân: $= \\dfrac{4}{25} + \\dfrac{5}{4} - \\dfrac{1}{4}$</li><li class='ml-4'>Nhóm hai phân số cuối: $= \\dfrac{4}{25} + \\left(\\dfrac{5}{4} - \\dfrac{1}{4}\\right) = \\dfrac{4}{25} + \\dfrac{4}{4} = \\dfrac{4}{25} + 1$</li><li class='ml-4'>Quy đồng và tính: $= \\dfrac{4 + 25}{25} = \\dfrac{29}{25}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $\\dfrac{29}{25}$</li><li><b>i) $(-3,9) \\cdot 2,8 + (-3,9) \\cdot 7,2$</b></li><li class='ml-4'>Áp dụng tính chất phân phối, đặt thừa số chung $(-3,9)$ ra ngoài: $= (-3,9) \\cdot (2,8 + 7,2)$</li><li class='ml-4'>$= (-3,9) \\cdot 10 = -39$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $-39$</li>" },
{ t_title: "Bài 2", t_content: "Tìm x, biết:<br>a) $\\dfrac{1}{4} + \\dfrac{3}{4} : x = \\dfrac{1}{3}$<br>b) $60\\% + \\left(\\dfrac{3}{2} + \\dfrac{3}{5}\\right)x = 1$<br>c) $\\dfrac{17}{5} : x - \\dfrac{3}{5} = \\dfrac{-1}{5}$<br>d) $\\dfrac{x-2}{18} = \\dfrac{-2}{3}$<br>e) $\\dfrac{1}{4} - \\left(x - \\dfrac{1}{2}\\right)^2 = -2$<br>g) $\\dfrac{7}{2} - x = 2,5$<br>h) $x - 5,1 = -7,2 - 2 \\cdot 1,5$", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Mục tiêu cuối cùng của bài toán là tìm giá trị của đại lượng ẩn nào?<br>- <b>Who:</b> Ẩn $x$ đang đóng những vai trò gì (số hạng, số trừ, số chia, hay cơ số của bình phương) trong từng phương trình?<br>- <b>Where/When:</b> Trong biểu thức có chứa nhiều phép tính, cụm chứa $x$ nào cần được cô lập (giữ nguyên) trước tiên?<br>- <b>Why:</b> Tại sao ở câu (e) có chứa bình phương lại bắt buộc phải chia thành hai trường hợp giải?<br>- <b>How:</b> Làm thế nào để áp dụng quy tắc chuyển vế đổi dấu? Phép nhân chéo sẽ giúp giải quyết hai phân số bằng nhau như thế nào?", solution: "<li><b>a) $\\dfrac{1}{4} + \\dfrac{3}{4} : x = \\dfrac{1}{3}$</b></li><li class='ml-4'>Chuyển $\\dfrac{1}{4}$ sang vế phải: $\\dfrac{3}{4} : x = \\dfrac{1}{3} - \\dfrac{1}{4}$</li><li class='ml-4'>Quy đồng vế phải: $\\dfrac{3}{4} : x = \\dfrac{4}{12} - \\dfrac{3}{12}$</li><li class='ml-4'>$\\dfrac{3}{4} : x = \\dfrac{1}{12}$</li><li class='ml-4'>Tìm $x$: $x = \\dfrac{3}{4} : \\dfrac{1}{12} = \\dfrac{3}{4} \\cdot 12 = 9$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $x = 9$</li><li><b>b) $60\\% + \\left(\\dfrac{3}{2} + \\dfrac{3}{5}\\right)x = 1$</b></li><li class='ml-4'>Đổi phần trăm ra phân số: $60\\% = \\dfrac{3}{5}$. Ta có: $\\dfrac{3}{5} + \\left(\\dfrac{3}{2} + \\dfrac{3}{5}\\right)x = 1$</li><li class='ml-4'>Tính tổng trong ngoặc: $\\dfrac{3}{2} + \\dfrac{3}{5} = \\dfrac{15 + 6}{10} = \\dfrac{21}{10}$</li><li class='ml-4'>Phương trình trở thành: $\\dfrac{3}{5} + \\dfrac{21}{10}x = 1$</li><li class='ml-4'>Chuyển vế: $\\dfrac{21}{10}x = 1 - \\dfrac{3}{5} = \\dfrac{2}{5}$</li><li class='ml-4'>Tìm $x$: $x = \\dfrac{2}{5} : \\dfrac{21}{10} = \\dfrac{2}{5} \\cdot \\dfrac{10}{21} = \\dfrac{4}{21}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $x = \\dfrac{4}{21}$</li><li><b>c) $\\dfrac{17}{5} : x - \\dfrac{3}{5} = \\dfrac{-1}{5}$</b></li><li class='ml-4'>Chuyển $\\dfrac{3}{5}$ sang vế phải: $\\dfrac{17}{5} : x = \\dfrac{-1}{5} + \\dfrac{3}{5}$</li><li class='ml-4'>Tính vế phải: $\\dfrac{17}{5} : x = \\dfrac{2}{5}$</li><li class='ml-4'>Tìm $x$: $x = \\dfrac{17}{5} : \\dfrac{2}{5} = \\dfrac{17}{5} \\cdot \\dfrac{5}{2} = \\dfrac{17}{2}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $x = \\dfrac{17}{2}$</li><li><b>d) $\\dfrac{x-2}{18} = \\dfrac{-2}{3}$</b></li><li class='ml-4'>Áp dụng tính chất phân số bằng nhau (hoặc nhân chéo): $x - 2 = 18 \\cdot \\left(\\dfrac{-2}{3}\\right)$</li><li class='ml-4'>Tính vế phải: $x - 2 = -12$</li><li class='ml-4'>Chuyển vế: $x = -12 + 2 = -10$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $x = -10$</li><li><b>e) $\\dfrac{1}{4} - \\left(x - \\dfrac{1}{2}\\right)^2 = -2$</b></li><li class='ml-4'>Chuyển vế để cô lập bình phương: $\\left(x - \\dfrac{1}{2}\\right)^2 = \\dfrac{1}{4} - (-2) = \\dfrac{1}{4} + 2 = \\dfrac{9}{4}$</li><li class='ml-4'>Viết $\\dfrac{9}{4}$ dưới dạng bình phương: $\\left(x - \\dfrac{1}{2}\\right)^2 = \\left(\\dfrac{3}{2}\\right)^2 = \\left(-\\dfrac{3}{2}\\right)^2$</li><li class='ml-4'>Trường hợp 1: $x - \\dfrac{1}{2} = \\dfrac{3}{2} \\Rightarrow x = \\dfrac{3}{2} + \\dfrac{1}{2} = \\dfrac{4}{2} = 2$</li><li class='ml-4'>Trường hợp 2: $x - \\dfrac{1}{2} = -\\dfrac{3}{2} \\Rightarrow x = -\\dfrac{3}{2} + \\dfrac{1}{2} = -\\dfrac{2}{2} = -1$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $x \\in \\{2; -1\\}$</li><li><b>g) $\\dfrac{7}{2} - x = 2,5$</b></li><li class='ml-4'>Đổi số thập phân ra phân số: $2,5 = \\dfrac{5}{2}$</li><li class='ml-4'>Ta có phương trình: $\\dfrac{7}{2} - x = \\dfrac{5}{2}$</li><li class='ml-4'>Tìm $x$: $x = \\dfrac{7}{2} - \\dfrac{5}{2} = \\dfrac{2}{2} = 1$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số: $x = 1$</li><li><b>h) $x - 5,1 = -7,2 - 2 \\cdot 1,5$</b></li><li class='ml-4'>Thực hiện phép nhân ở vế phải trước: $x - 5,1 = -7,2 - 3$</li><li class='ml-4'>Tính vế phải: $x - 5,1 = -10,2$</li><li class='ml-4'>Chuyển vế: $x = -10,2 + 5,1 = -5,1$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $x = -5,1$</li>" },
{ t_title: "Bài 3", t_content: "Một cuốn sách dày 480 trang. Ngày đầu Nam đọc $\\dfrac{5}{8}$ số trang. Ngày thứ hai Nam đọc tiếp được 60% số trang còn lại.<br>a) Tính số trang Nam đọc được trong ngày thứ nhất và ngày thứ hai.<br>b) Tính tỉ số phần trăm của số trang sách còn lại sau hai ngày so với số trang của cuốn sách.", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Câu hỏi yêu cầu chúng ta tìm số trang sách đọc được trong những ngày nào?<br>- <b>Who:</b> Tổng số 480 trang và các phân số/tỉ lệ phần trăm đóng vai trò gì?<br>- <b>Where/When:</b> Khi đọc đến cụm từ 'CÒN LẠI' ở ngày thứ hai, ta cần cẩn trọng thực hiện phép tính gì trước?<br>- <b>Why:</b> Tại sao lấy $60\\%$ nhân trực tiếp với $480$ lại là một sai lầm?<br>- <b>How:</b> Phép nhân nào giúp tính số trang ngày thứ nhất? Làm sao để tìm phần dư, và tính $60\\%$ của phần dư đó thế nào?<br><b>Ý b:</b><br>- <b>What:</b> Mục tiêu của ý này là tính đại lượng tỉ lệ nào?<br>- <b>How:</b> Làm thế nào để lấy số trang chưa đọc chia cho tổng số trang rồi quy đổi ra phần trăm?", solution: "<li><b>a) Tính số trang Nam đọc được trong ngày thứ nhất và ngày thứ hai:</b></li><li class='ml-4'>Số trang sách Nam đọc được trong ngày thứ nhất là:</li><li class='ml-8'>$480 \\cdot \\dfrac{5}{8} = 300$ (trang)</li><li class='ml-4'>Số trang sách còn lại sau ngày thứ nhất là:</li><li class='ml-8'>$480 - 300 = 180$ (trang)</li><li class='ml-4'>Số trang sách Nam đọc được trong ngày thứ hai là ($60\\%$ của phần còn lại):</li><li class='ml-8'>$180 \\cdot 60\\% = 180 \\cdot \\dfrac{60}{100} = 108$ (trang)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Ngày thứ nhất: $300$ trang, Ngày thứ hai: $108$ trang.</li><li><b>b) Tính tỉ số phần trăm của số trang sách còn lại:</b></li><li class='ml-4'>Số trang sách Nam chưa đọc (còn lại sau hai ngày) là:</li><li class='ml-8'>$180 - 108 = 72$ (trang)</li><li class='ml-4'>Tỉ số phần trăm của số trang sách còn lại so với tổng số trang của cuốn sách là:</li><li class='ml-8'>$\\dfrac{72}{480} \\cdot 100\\% = 0,15 \\cdot 100\\% = 15\\%$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $15\\%$</li>" },
{ t_title: "Bài 4", t_content: "Một thư viện có tổng cộng 350 quyển sách. Trong đó, có 70 quyển sách truyện, số sách khoa học chiếm 30% tổng số sách trong thư viện.<br>a) Tính số sách khoa học trong thư viện.<br>b) Tính tỉ số phần trăm số sách truyện so với tổng số sách trong thư viện.", lines_needed: 6, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Cần tìm số lượng của loại sách nào?<br>- <b>Who:</b> Tổng số 350 quyển và con số $30\\%$ liên hệ với nhau ra sao?<br>- <b>Why:</b> Tại sao ta có thể tính trực tiếp số lượng sách khoa học mà không cần biết số sách truyện?<br>- <b>How:</b> Phép nhân nào giúp tìm $30\\%$ của $350$?<br><b>Ý b:</b><br>- <b>What:</b> Yêu cầu thiết lập tỉ số giữa những đại lượng nào?<br>- <b>Where/When:</b> Thông tin về số sách truyện ($70$ quyển) được lấy từ đâu trong đề bài để đưa vào công thức?<br>- <b>How:</b> Làm thế nào để lập phép chia giữa số sách truyện và tổng số sách rồi chuyển sang tỉ lệ phần trăm?", solution: "<li><b>a) Tính số sách khoa học trong thư viện:</b></li><li class='ml-4'>Số sách khoa học chiếm $30\\%$ tổng số sách, nên số sách khoa học là:</li><li class='ml-8'>$350 \\cdot 30\\% = 350 \\cdot \\dfrac{30}{100} = 105$ (quyển)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $105$ quyển sách khoa học.</li><li><b>b) Tính tỉ số phần trăm số sách truyện so với tổng số sách:</b></li><li class='ml-4'>Tỉ số phần trăm của số sách truyện ($70$ quyển) so với tổng số sách ($350$ quyển) là:</li><li class='ml-8'>$\\dfrac{70}{350} \\cdot 100\\% = \\dfrac{1}{5} \\cdot 100\\% = 20\\%$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $20\\%$</li>" },
{ t_title: "Bài 5", t_content: "Một đội công nhân sơn hàng rào dài 150 mét cho một công viên trong ba ngày. Ngày thứ nhất đội sơn được $\\dfrac{2}{5}$ chiều dài của hàng rào. Ngày thứ hai sơn được 40% số mét rào còn lại sau ngày thứ nhất. Hỏi mỗi ngày đội sơn được bao nhiêu mét rào?", lines_needed: 6, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu tính toán số mét rào cho những khoảng thời gian nào?<br>- <b>Who:</b> Tổng chiều dài 150m, phân số $\\dfrac{2}{5}$ và tỉ lệ $40\\%$ tương tác với nhau như thế nào?<br>- <b>Where/When:</b> Vào ngày thứ hai, việc sơn $40\\%$ được thực hiện trên tổng chiều dài hay phần chưa sơn?<br>- <b>Why:</b> Tại sao số mét rào sơn được ở ngày thứ ba lại chính xác bằng phần dư còn lại sau ngày thứ hai?<br>- <b>How:</b> Phép tính nào dùng để tìm số mét ngày 1? Làm sao để tìm phần dư thứ nhất? Tính $40\\%$ của phần dư đó như thế nào? Và bước cuối cùng để tìm ngày 3 là gì?", solution: "<li><b>Bước 1: Tính số mét rào sơn trong ngày thứ nhất</b></li><li class='ml-4'>Ngày thứ nhất đội công nhân sơn được:</li><li class='ml-8'>$150 \\cdot \\dfrac{2}{5} = 60$ (m)</li><li><b>Bước 2: Tính số mét rào sơn trong ngày thứ hai</b></li><li class='ml-4'>Số mét rào còn lại sau ngày thứ nhất là:</li><li class='ml-8'>$150 - 60 = 90$ (m)</li><li class='ml-4'>Ngày thứ hai đội công nhân sơn được ($40\\%$ của phần còn lại):</li><li class='ml-8'>$90 \\cdot 40\\% = 90 \\cdot \\dfrac{40}{100} = 36$ (m)</li><li><b>Bước 3: Tính số mét rào sơn trong ngày thứ ba</b></li><li class='ml-4'>Ngày thứ ba đội công nhân sơn nốt phần còn lại là:</li><li class='ml-8'>$90 - 36 = 54$ (m)</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: Ngày 1: $60\\text{ m}$; Ngày 2: $36\\text{ m}$; Ngày 3: $54\\text{ m}$</li>" },
{ t_title: "Bài 6", t_content: "Lớp 6B có 48 học sinh. Số học sinh giỏi bằng $\\dfrac{1}{6}$ số học sinh cả lớp. Số học sinh trung bình bằng 300% số học sinh giỏi, còn lại là học sinh khá.<br>a) Tính số học sinh mỗi loại.<br>b) Tính tỉ số % học sinh mỗi loại.", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đề bài yêu cầu tính số lượng học sinh cho các mức xếp loại nào?<br>- <b>Who:</b> Tổng 48 học sinh, phân số $\\dfrac{1}{6}$ và tỉ lệ $300\\%$ liên quan đến từng nhóm học lực ra sao?<br>- <b>Where/When:</b> Dựa vào dữ kiện, nhóm học sinh nào cần được tính đầu tiên, nhóm nào tính thứ hai?<br>- <b>Why:</b> Tại sao nói $300\\%$ thực chất lại rất dễ tính (nó tương đương với việc gấp mấy lần)?<br>- <b>How:</b> Làm thế nào để tìm số HS Giỏi? Phép nhân nào để ra HS Trung bình? Và phép trừ nào để tìm ra HS Khá?<br><b>Ý b:</b><br>- <b>What:</b> Cần thiết lập tỉ số gì cho mỗi loại học sinh?<br>- <b>How:</b> Công thức nào giúp tính tỉ số phần trăm của số học sinh từng loại so với sĩ số 48 của cả lớp?", solution: "<li><b>a) Tính số học sinh mỗi loại:</b></li><li class='ml-4'>Số học sinh Giỏi của lớp 6B là:</li><li class='ml-8'>$48 \\cdot \\dfrac{1}{6} = 8$ (học sinh)</li><li class='ml-4'>Số học sinh Trung bình là ($300\\%$ của số HS Giỏi):</li><li class='ml-8'>$8 \\cdot 300\\% = 8 \\cdot 3 = 24$ (học sinh)</li><li class='ml-4'>Số học sinh Khá là (phần còn lại của lớp):</li><li class='ml-8'>$48 - (8 + 24) = 48 - 32 = 16$ (học sinh)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Giỏi: $8$ học sinh, Trung bình: $24$ học sinh, Khá: $16$ học sinh.</li><li><b>b) Tính tỉ số phần trăm học sinh mỗi loại:</b></li><li class='ml-4'>Tỉ số phần trăm học sinh Giỏi so với cả lớp:</li><li class='ml-8'>$\\dfrac{8}{48} \\cdot 100\\% = \\dfrac{1}{6} \\cdot 100\\% \\approx 16,67\\%$</li><li class='ml-4'>Tỉ số phần trăm học sinh Trung bình so với cả lớp:</li><li class='ml-8'>$\\dfrac{24}{48} \\cdot 100\\% = \\dfrac{1}{2} \\cdot 100\\% = 50\\%$</li><li class='ml-4'>Tỉ số phần trăm học sinh Khá so với cả lớp:</li><li class='ml-8'>$\\dfrac{16}{48} \\cdot 100\\% = \\dfrac{1}{3} \\cdot 100\\% \\approx 33,33\\%$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Giỏi $\\approx 16,67\\%$; Trung bình $50\\%$; Khá $\\approx 33,33\\%$</li>" },
{ t_title: "Bài 7", t_content: "Bảng thống kê dưới đây thể hiện kết quả xếp loại học lực cuối năm của học sinh lớp 6A thuộc một trường THCS.<br><table class='min-w-full text-center border-collapse border border-gray-300 my-4 text-sm'><tr><td class='border border-gray-300 p-2 font-bold'>Học lực</td><td class='border border-gray-300 p-2'>Giỏi</td><td class='border border-gray-300 p-2'>Khá</td><td class='border border-gray-300 p-2'>Đạt</td><td class='border border-gray-300 p-2'>Chưa đạt</td></tr><tr><td class='border border-gray-300 p-2 font-bold'>Số học sinh</td><td class='border border-gray-300 p-2'>14</td><td class='border border-gray-300 p-2'>15</td><td class='border border-gray-300 p-2'>6</td><td class='border border-gray-300 p-2'>0</td></tr></table>a) Số học sinh giỏi nhiều hơn số học sinh đạt bao nhiêu em?<br>b) Số học sinh giỏi chiếm bao nhiêu phần trăm so với tổng số học sinh cả lớp?", lines_needed: 6, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Cần tìm mức độ chênh lệch giữa hai nhóm học sinh nào?<br>- <b>Who:</b> Số liệu của HS Giỏi và HS Đạt nằm ở đâu trong bảng?<br>- <b>How:</b> Phép trừ nào giúp xác định số lượng HS Giỏi nhiều hơn HS Đạt?<br><b>Ý b:</b><br>- <b>What:</b> Đại lượng nào cần được so sánh tỉ lệ phần trăm?<br>- <b>Where/When:</b> Trước khi lập tỉ số phần trăm, ta bắt buộc phải tìm giá trị gì của cả lớp?<br>- <b>Why:</b> Tại sao tổng số học sinh không được cho sẵn mà ta phải tự cộng lại từ bảng?<br>- <b>How:</b> Làm thế nào để cộng tổng số HS? Công thức lập tỉ số phần trăm giữa HS Giỏi và tổng số HS là gì?", solution: "<li><b>a) Số học sinh Giỏi nhiều hơn số học sinh Đạt:</b></li><li class='ml-4'>Dựa vào bảng thống kê, số học sinh Giỏi là $14$ em, số học sinh Đạt là $6$ em.</li><li class='ml-4'>Số học sinh Giỏi nhiều hơn số học sinh Đạt là:</li><li class='ml-8'>$14 - 6 = 8$ (em)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $8$ em.</li><li><b>b) Tỉ số phần trăm của số học sinh Giỏi so với cả lớp:</b></li><li class='ml-4'>Tính tổng số học sinh của lớp 6A:</li><li class='ml-8'>$14 + 15 + 6 + 0 = 35$ (em)</li><li class='ml-4'>Tỉ số phần trăm số học sinh Giỏi ($14$ em) so với tổng số học sinh cả lớp ($35$ em) là:</li><li class='ml-8'>$\\dfrac{14}{35} \\cdot 100\\% = \\dfrac{2}{5} \\cdot 100\\% = 40\\%$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $40\\%$</li>" },
{ t_title: "Bài 8", t_content: "Cửa hàng bán điện thoại di động thống kê số lượng điện thoại di động bán được trong 5 tháng liên tiếp ở bảng sau:<br><table class='min-w-full text-center border-collapse border border-gray-300 my-4 text-sm'><tr><td class='border border-gray-300 p-2 font-bold'>Tháng</td><td class='border border-gray-300 p-2'>Một</td><td class='border border-gray-300 p-2'>Hai</td><td class='border border-gray-300 p-2'>Ba</td><td class='border border-gray-300 p-2'>Tư</td><td class='border border-gray-300 p-2'>Năm</td></tr><tr><td class='border border-gray-300 p-2 font-bold'>Số lượng<br>(chiếc)</td><td class='border border-gray-300 p-2'>16</td><td class='border border-gray-300 p-2'>8</td><td class='border border-gray-300 p-2'>8</td><td class='border border-gray-300 p-2'>14</td><td class='border border-gray-300 p-2'>6</td></tr></table>a) Cho biết có bao nhiêu chiếc điện thoại di động được bán ra trong 5 tháng đó?<br>b) Số lượng điện thoại di động bán được trong tháng Tư nhiều hơn trong tháng Hai là bao nhiêu?<br>c) Hãy vẽ biểu đồ cột biểu diễn số liệu ở bảng trên?", lines_needed: 6, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Mục tiêu là tính tổng số lượng thiết bị nào?<br>- <b>Who:</b> Các con số bán hàng của 5 tháng đóng vai trò gì?<br>- <b>How:</b> Phép cộng nào giúp gom tất cả số liệu của 5 tháng lại với nhau?<br><b>Ý b:</b><br>- <b>What:</b> Cần so sánh số lượng bán ra của những tháng nào?<br>- <b>Why:</b> Tại sao dùng phép trừ lại cho biết sự chênh lệch doanh số?<br>- <b>How:</b> Làm sao để đối chiếu dữ liệu tháng Tư và tháng Hai trên bảng để tính hiệu?<br><b>Ý c:</b><br>- <b>What:</b> Đề bài yêu cầu thể hiện số liệu bằng loại biểu đồ nào?<br>- <b>Where/When:</b> Khi vẽ, trục đứng và trục ngang sẽ đại diện cho thông tin gì?<br>- <b>How:</b> Các cột có cần vẽ cách đều nhau không và chiều cao tương ứng với con số nào?", solution: "<li><b>a) Tổng số điện thoại bán ra trong 5 tháng:</b></li><li class='ml-4'>Cộng số lượng điện thoại bán được của 5 tháng:</li><li class='ml-8'>$16 + 8 + 8 + 14 + 6 = 52$ (chiếc)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $52$ chiếc.</li><li><b>b) So sánh số lượng bán được trong tháng Tư và tháng Hai:</b></li><li class='ml-4'>Số lượng bán được trong tháng Tư là $14$ chiếc, tháng Hai là $8$ chiếc.</li><li class='ml-4'>Tháng Tư bán nhiều hơn tháng Hai số lượng là:</li><li class='ml-8'>$14 - 8 = 6$ (chiếc)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $6$ chiếc.</li><li><b>c) Vẽ biểu đồ cột biểu diễn số liệu:</b></li><li class='ml-4'><i>(Học sinh tự thực hành vẽ biểu đồ cột trên giấy nháp hoặc vở ô ly).</i></li><li class='ml-4'><b>Hướng dẫn vẽ:</b></li><li class='ml-8'>- Trục dọc (trục tung) biểu diễn Số lượng (chiếc). Nên chia vạch tọa độ: $0, 5, 10, 15, 20$.</li><li class='ml-8'>- Trục ngang (trục hoành) biểu diễn Tháng (Một, Hai, Ba, Tư, Năm).</li><li class='ml-8'>- Vẽ 5 cột hình chữ nhật có chiều rộng bằng nhau và chiều cao tương ứng với số lượng điện thoại bán được của từng tháng.</li>" },
{ t_title: "Bài 9", t_content: "Một hộp có chứa 3 chiếc kẹp, trong đó có 1 chiếc kẹp màu xanh, 1 chiếc kẹp màu đỏ, 1 chiếc kẹp màu vàng. Lấy ngẫu nhiên một chiếc kẹp trong hộp.<br>a) Nêu các kết quả có thể xảy ra đối với màu của chiếc kẹp được lấy ra.<br>b) Lấy ngẫu nhiêm 30 lần mỗi lần 1 chiếc kẹp, kết quả có 12 lần xuất hiện kẹp màu xanh, 30% tổng số lần xuất hiện kẹp màu vàng. Tính xác xuất thực nghiệm xuất hiện kẹp màu đỏ.", lines_needed: 6, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Yêu cầu liệt kê những khả năng nào?<br>- <b>Who:</b> Trong hộp có những màu sắc nào có thể được rút ra?<br>- <b>How:</b> Dựa vào dữ kiện, làm sao để liệt kê đầy đủ các kết quả về màu sắc?<br><b>Ý b:</b><br>- <b>What:</b> Cần tìm xác suất thực nghiệm của kẹp màu gì?<br>- <b>Where/When:</b> Trong 30 lần rút, số lần xuất hiện kẹp Vàng được ẩn dưới dạng nào ($30\\%$)?<br>- <b>Why:</b> Tại sao phải tính số lần xuất hiện của kẹp Vàng trước khi tìm kẹp Đỏ?<br>- <b>How:</b> Phép tính nào để tìm số lần kẹp Vàng? Phép trừ nào để ra số lần kẹp Đỏ? Công thức chia nào sẽ ra xác suất cuối cùng?", solution: "<li><b>a) Nêu các kết quả có thể xảy ra:</b></li><li class='ml-4'>Vì trong hộp có $3$ chiếc kẹp với $3$ màu khác nhau nên khi rút ngẫu nhiên $1$ chiếc kẹp, màu của chiếc kẹp lấy ra có thể là một trong ba trường hợp sau:</li><li class='ml-8'>- Kẹp lấy ra màu <b>Xanh</b>.</li><li class='ml-8'>- Kẹp lấy ra màu <b>Đỏ</b>.</li><li class='ml-8'>- Kẹp lấy ra màu <b>Vàng</b>.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Xanh, Đỏ, Vàng.</li><li><b>b) Tính xác suất thực nghiệm xuất hiện kẹp màu đỏ:</b></li><li class='ml-4'>Số lần xuất hiện kẹp màu vàng là ($30\\%$ của $30$ lần):</li><li class='ml-8'>$30 \\cdot 30\\% = 30 \\cdot \\dfrac{30}{100} = 9$ (lần)</li><li class='ml-4'>Số lần xuất hiện kẹp màu đỏ là tổng số lần trừ đi số lần xuất hiện màu xanh và màu vàng:</li><li class='ml-8'>$30 - (12 + 9) = 30 - 21 = 9$ (lần)</li><li class='ml-4'>Xác suất thực nghiệm xuất hiện kẹp màu đỏ là:</li><li class='ml-8'>$\\dfrac{9}{30} = \\dfrac{3}{10} = 30\\%$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $\\dfrac{3}{10}$ (hoặc $30\\%$)</li>" },
{ t_title: "Bài 10", t_content: "Biểu đồ cột dưới đây biểu diễn điểm kiểm tra giữa kì 2 môn toán của HS lớp 6A:<div class='mt-6 mb-8 flex justify-center'><svg width='500' height='250' viewBox='0 0 500 250' class='max-w-full text-xs font-sans'><path d='M30,20 L30,220 L480,220' stroke='black' fill='none'/><path d='M30,20 L480,20 M30,48 L480,48 M30,77 L480,77 M30,105 L480,105 M30,134 L480,134 M30,163 L480,163 M30,191 L480,191' stroke='#e5e7eb' stroke-width='1' fill='none'/><text x='10' y='25'>14</text><text x='10' y='53'>12</text><text x='10' y='82'>10</text><text x='15' y='110'>8</text><text x='15' y='139'>6</text><text x='15' y='167'>4</text><text x='15' y='196'>2</text><text x='15' y='225'>0</text><rect x='50' y='191.4' width='30' height='28.6' fill='#93c5fd' stroke='black' stroke-width='1'/><text x='65' y='235' text-anchor='middle'>Điểm 4</text><rect x='120' y='120' width='30' height='100' fill='#93c5fd' stroke='black' stroke-width='1'/><text x='135' y='235' text-anchor='middle'>Điểm 6</text><rect x='190' y='48.5' width='30' height='171.5' fill='#93c5fd' stroke='black' stroke-width='1'/><text x='205' y='235' text-anchor='middle'>Điểm 7</text><rect x='260' y='77.1' width='30' height='142.9' fill='#93c5fd' stroke='black' stroke-width='1'/><text x='275' y='235' text-anchor='middle'>Điểm 8</text><rect x='330' y='134.2' width='30' height='85.8' fill='#93c5fd' stroke='black' stroke-width='1'/><text x='345' y='235' text-anchor='middle'>Điểm 9</text><rect x='400' y='177.1' width='30' height='42.9' fill='#93c5fd' stroke='black' stroke-width='1'/><text x='415' y='235' text-anchor='middle'>Điểm 10</text></svg></div>a) Lớp 6A có bao nhiêu học sinh (Nếu tất cả học sinh đều làm bài kiểm tra)?<br>b) Có bao nhiêu bạn đạt điểm giỏi (điểm từ 8 trở lên)?<br>c) Có bao nhiêu % các bạn đạt điểm từ trung bình trở lên?", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Cần tính tổng số lượng của đối tượng nào?<br>- <b>Who:</b> Mỗi cột trên biểu đồ tương ứng với một mức điểm, vậy chiều cao của cột thể hiện ai?<br>- <b>How:</b> Làm thế nào để nhìn vào trục đứng, xác định số HS của từng cột và cộng tổng lại?<br><b>Ý b:</b><br>- <b>What:</b> Nhóm học sinh nào được xem là đạt điểm giỏi?<br>- <b>Where/When:</b> Trên trục hoành, các cột điểm nào rơi vào mức từ 8 trở lên?<br>- <b>How:</b> Phép cộng nào giúp gom số lượng học sinh của các cột 8, 9 và 10?<br><b>Ý c:</b><br>- <b>What:</b> Cần tính tỉ lệ phần trăm của nhóm học sinh nào?<br>- <b>Why:</b> Tại sao để tính nhóm từ trung bình trở lên ($\\ge 5$), ta có thể lấy tổng số HS trừ đi số HS ở cột điểm 4 cho nhanh?<br>- <b>How:</b> Công thức lập tỉ số phần trăm giữa nhóm HS này so với tổng HS lớp 6A là gì?", solution: "<li><b>a) Tính tổng số học sinh lớp 6A:</b></li><li class='ml-4'>Từ biểu đồ cột, ta đọc được số lượng học sinh tương ứng với mỗi mức điểm:</li><li class='ml-8'>Điểm 4: $2$ HS; Điểm 6: $7$ HS; Điểm 7: $12$ HS; Điểm 8: $10$ HS; Điểm 9: $6$ HS; Điểm 10: $3$ HS.</li><li class='ml-4'>Tổng số học sinh lớp 6A là:</li><li class='ml-8'>$2 + 7 + 12 + 10 + 6 + 3 = 40$ (học sinh)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $40$ học sinh.</li><li><b>b) Tính số bạn đạt điểm giỏi (điểm từ 8 trở lên):</b></li><li class='ml-4'>Điểm giỏi bao gồm các mức điểm: $8, 9, 10$.</li><li class='ml-4'>Số lượng học sinh đạt điểm giỏi là tổng số học sinh ở các cột này:</li><li class='ml-8'>$10 + 6 + 3 = 19$ (bạn)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $19$ bạn.</li><li><b>c) Tính phần trăm các bạn đạt điểm từ trung bình trở lên:</b></li><li class='ml-4'>Học sinh đạt điểm từ trung bình trở lên (điểm $\\ge 5$). Dựa vào biểu đồ, chỉ có nhóm điểm 4 là dưới trung bình.</li><li class='ml-4'>Số bạn đạt điểm từ trung bình trở lên là (lấy tổng số trừ đi số bạn dưới trung bình):</li><li class='ml-8'>$40 - 2 = 38$ (bạn)</li><li class='ml-4'>Tỉ lệ phần trăm các bạn đạt điểm từ trung bình trở lên so với tổng số học sinh cả lớp là:</li><li class='ml-8'>$\\dfrac{38}{40} \\cdot 100\\% = 0,95 \\cdot 100\\% = 95\\%$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: $95\\%$</li>" },
{ t_title: "Bài 11", t_content: "Vẽ đường thẳng xy. Trên tia Ox lấy điểm A sao cho $OA = 3\\text{cm}$. Trên tia Oy lấy 2 điểm B, C sao cho $OB = 1\\text{cm}$ và $OC = 5\\text{cm}$.<br>a) Trên hình vẽ có mấy đoạn thẳng? Kể tên các đoạn thẳng đó?<br>b) Tính độ dài đoạn thẳng BC.<br>c) Hỏi điểm B có là trung điểm của đoạn thẳng AC không? Vì sao?", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Cần liệt kê và đếm số lượng của những hình nào?<br>- <b>Who:</b> Các điểm O, A, B, C ghép cặp với nhau tạo ra bao nhiêu đoạn thẳng?<br>- <b>How:</b> Phương pháp liệt kê có hệ thống để không bị sót đoạn nào là gì?<br><b>Ý b:</b><br>- <b>What:</b> Mục tiêu là tính độ dài đoạn nào?<br>- <b>Where/When:</b> Trên tia Oy, điểm B ($1\\text{cm}$) và C ($5\\text{cm}$) có vị trí tương đối thế nào?<br>- <b>Why:</b> Tại sao B lại nằm giữa O và C?<br>- <b>How:</b> Phép trừ nào giúp tìm ra độ dài đoạn BC?<br><b>Ý c:</b><br>- <b>What:</b> Cần kiểm tra xem điểm B có thỏa mãn tính chất của trung điểm không?<br>- <b>Why:</b> Vì sao điểm O lại nằm giữa A và B/C (nhớ lại định nghĩa hai tia đối nhau)?<br>- <b>How:</b> Làm thế nào để tính đoạn AB? Khi so sánh AB và BC, cùng với lập luận B nằm giữa A và C, ta kết luận được điều gì?", solution: "<li><b>a) Kể tên các đoạn thẳng trên hình vẽ:</b></li><li class='ml-4'>Trên hình vẽ có $4$ điểm phân biệt cùng nằm trên một đường thẳng là $O, A, B, C$.</li><li class='ml-4'>Số đoạn thẳng tạo thành là $\\dfrac{4 \\cdot 3}{2} = 6$ đoạn thẳng.</li><li class='ml-4'>Tên $6$ đoạn thẳng đó là: $OA, OB, OC, AB, AC, BC$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $6$ đoạn thẳng ($OA, OB, OC, AB, AC, BC$).</li><li><b>b) Tính độ dài đoạn thẳng BC:</b></li><li class='ml-4'>Vì điểm $B$ và $C$ cùng nằm trên tia $Oy$, mà $OB < OC$ ($1\\text{ cm} < 5\\text{ cm}$) nên điểm $B$ nằm giữa hai điểm $O$ và $C$.</li><li class='ml-4'>Áp dụng hệ thức cộng đoạn thẳng: $OB + BC = OC$</li><li class='ml-4'>Thay số vào ta được: $1 + BC = 5 \\Rightarrow BC = 5 - 1 = 4\\text{ (cm)}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $BC = 4\\text{ cm}$.</li><li><b>c) Điểm B có là trung điểm của đoạn thẳng AC không? Vì sao?</b></li><li class='ml-4'>Vì điểm $A$ thuộc tia $Ox$, điểm $B$ thuộc tia $Oy$, mà $Ox$ và $Oy$ là hai tia đối nhau nên gốc $O$ nằm giữa hai điểm $A$ và $B$.</li><li class='ml-4'>Suy ra: $AB = OA + OB = 3 + 1 = 4\\text{ (cm)}$.</li><li class='ml-4'>Lập luận tương tự, $O$ cũng nằm giữa $A$ và $C$. Điểm $B$ nằm giữa $O$ và $C$ nên điểm $B$ sẽ nằm giữa hai điểm $A$ và $C$.</li><li class='ml-4'>Ta có: Điểm $B$ nằm giữa $A$ và $C$, đồng thời $AB = BC = 4\\text{ cm}$.</li><li class='ml-4'>Vậy điểm $B$ chính là trung điểm của đoạn thẳng $AC$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: Có, $B$ là trung điểm của đoạn $AC$.</li>" },
{ t_title: "Bài 12", t_content: "Cho điểm A trên tia Om sao cho $OA = 9\\text{cm}$. Gọi B là điểm trên tia đối của tia Om và cách O một khoảng bằng $5\\text{cm}$.<br>a) Tính độ dài đoạn thẳng AB.<br>b) Gọi I là trung điểm của đoạn thẳng AB. Tính độ dài đoạn thẳng AI.", lines_needed: 6, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Yêu cầu tính độ dài của đoạn thẳng nào?<br>- <b>Who:</b> Các điểm O, A (trên tia Om) và B (trên tia đối Om) liên hệ thế nào?<br>- <b>Where/When:</b> Gốc O đóng vai trò gì khi A và B nằm trên hai tia đối nhau?<br>- <b>Why:</b> Tại sao ta có thể khẳng định O nằm giữa A và B?<br>- <b>How:</b> Phép cộng nào được thiết lập để tính AB?<br><b>Ý b:</b><br>- <b>What:</b> Tìm độ dài đoạn thẳng từ A đến trung điểm I.<br>- <b>Why:</b> Tại sao tính chất trung điểm lại giúp ta chia đôi được đoạn AB?<br>- <b>How:</b> Công thức nào liên hệ giữa AI và tổng chiều dài AB?", solution: "<li><b>a) Tính độ dài đoạn thẳng AB:</b></li><li class='ml-4'>Vì điểm $A$ thuộc tia $Om$, điểm $B$ thuộc tia đối của tia $Om$ nên hai điểm $A$ và $B$ nằm về hai phía so với gốc $O$. Do đó, gốc $O$ nằm giữa hai điểm $A$ và $B$.</li><li class='ml-4'>Áp dụng hệ thức cộng đoạn thẳng: $AB = OA + OB$</li><li class='ml-4'>Thay số vào ta được: $AB = 9 + 5 = 14\\text{ (cm)}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $AB = 14\\text{ cm}$.</li><li><b>b) Tính độ dài đoạn thẳng AI:</b></li><li class='ml-4'>Theo đề bài, $I$ là trung điểm của đoạn thẳng $AB$. Do đó, điểm $I$ chia đoạn $AB$ làm hai phần có độ dài bằng nhau.</li><li class='ml-4'>Ta có công thức: $AI = IB = \\dfrac{AB}{2}$</li><li class='ml-4'>Thay số vào ta được: $AI = \\dfrac{14}{2} = 7\\text{ (cm)}$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $AI = 7\\text{ cm}$.</li>" },
{ t_title: "Bài 13", t_content: "Trên tia Ox, vẽ hai điểm A, B sao cho $OA = 3\\text{cm}, OB = 7\\text{cm}$.<br>a) Tính độ dài đoạn thẳng AB.<br>b) Gọi I là trung điểm của AB. Tính AI. Trên tia đối của tia Ox, lấy điểm M sao cho $OM = 5\\text{cm}$, điểm O có là trung điểm của đoạn thẳng MI không ? Vì sao?", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Cần tính độ dài đoạn thẳng giữa hai điểm nào?<br>- <b>Where/When:</b> Trên tia Ox, khoảng cách $OA=3$ và $OB=7$ cho biết điểm nào nằm giữa?<br>- <b>How:</b> Áp dụng hệ thức cộng đoạn thẳng nào để tìm AB?<br><b>Ý b:</b><br>- <b>What:</b> Phải tính AI và chứng minh tính chất trung điểm cho O đối với đoạn MI.<br>- <b>Who:</b> M nằm trên tia đối của Ox, còn I nằm trên tia Ox. Vậy O nằm ở đâu so với M và I?<br>- <b>Why:</b> Để O là trung điểm của MI, ngoài việc O nằm giữa, ta còn cần chứng minh 2 đoạn thẳng nào bằng nhau ($OM=OI$)?<br>- <b>How:</b> Phép tính nào giúp tìm AI? Phép tính nào giúp tìm OI (chú ý A nằm giữa O và I)? Làm sao để đối chiếu độ dài OM và OI?", solution: "<li><b>a) Tính độ dài đoạn thẳng AB:</b></li><li class='ml-4'>Trên cùng tia $Ox$, ta có $OA < OB$ ($3\\text{ cm} < 7\\text{ cm}$) nên điểm $A$ nằm giữa gốc $O$ và điểm $B$.</li><li class='ml-4'>Áp dụng hệ thức cộng đoạn thẳng: $OA + AB = OB$</li><li class='ml-4'>Thay số vào ta được: $3 + AB = 7 \\Rightarrow AB = 7 - 3 = 4\\text{ (cm)}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $AB = 4\\text{ cm}$.</li><li><b>b) Tính AI và chứng minh O là trung điểm MI:</b></li><li class='ml-4'>Vì $I$ là trung điểm của đoạn thẳng $AB$ nên: $AI = \\dfrac{AB}{2} = \\dfrac{4}{2} = 2\\text{ (cm)}$.</li><li class='ml-4'>Vì điểm $A$ nằm giữa $O$ và $B$, đồng thời $I$ là trung điểm của $AB$ nên $A$ nằm giữa $O$ và $I$.</li><li class='ml-4'>Suy ra: $OI = OA + AI = 3 + 2 = 5\\text{ (cm)}$.</li><li class='ml-4'>Xét hai điểm $M$ và $I$: $M$ thuộc tia đối của tia $Ox$, còn $I$ thuộc tia $Ox$, do đó hai điểm này nằm về hai phía của gốc $O$. Suy ra gốc $O$ nằm giữa $M$ và $I$.</li><li class='ml-4'>Mặt khác, theo giả thiết $OM = 5\\text{ cm}$ và ta vừa tính được $OI = 5\\text{ cm}$, suy ra $OM = OI$.</li><li class='ml-4'>Vì $O$ nằm giữa $M$ và $I$, đồng thời $OM = OI$ nên $O$ chính là trung điểm của đoạn thẳng $MI$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $AI = 2\\text{ cm}$; $O$ là trung điểm của $MI$.</li>" },
{ t_title: "Bài 14", t_content: "Trên tia Ox lấy điểm M và điểm N sao cho $OM = 3\\text{ cm}, ON = 6\\text{ cm}$. Vẽ tia Oy là tia đối của tia Ox. Vẽ tia Oz sao cho góc $\\angle xOz$ bằng $85^{\\circ}$.<br>a) Tính độ dài đoạn thẳng MN?<br>b) Tính số đo của góc yOz.", lines_needed: 6, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Tính độ dài của đoạn thẳng nào trên tia Ox?<br>- <b>Where/When:</b> Khi $OM=3$ và $ON=6$, điểm nào nằm giữa O và điểm còn lại?<br>- <b>How:</b> Hệ thức trừ nào giúp tìm ra MN?<br><b>Ý b:</b><br>- <b>What:</b> Cần xác định số đo của góc nào?<br>- <b>Why:</b> Tại sao tia Oy là tia đối của Ox thì góc xOy lại là góc bẹt ($180^\\circ$)?<br>- <b>Where/When:</b> Tia Oz nằm trong khoảng giữa Ox và Oy tạo ra hai góc kề bù nào?<br>- <b>How:</b> Phép trừ nào giữa góc bẹt và góc xOz sẽ cho ra kết quả góc yOz?", solution: "<li><b>a) Tính độ dài đoạn thẳng MN:</b></li><li class='ml-4'>Trên cùng tia $Ox$, ta có $OM < ON$ ($3\\text{ cm} < 6\\text{ cm}$) nên điểm $M$ nằm giữa gốc $O$ và điểm $N$.</li><li class='ml-4'>Áp dụng hệ thức cộng đoạn thẳng: $OM + MN = ON$</li><li class='ml-4'>Thay số vào ta được: $3 + MN = 6 \\Rightarrow MN = 6 - 3 = 3\\text{ (cm)}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $MN = 3\\text{ cm}$.</li><li><b>b) Tính số đo của góc yOz:</b></li><li class='ml-4'>Theo giả thiết, tia $Oy$ là tia đối của tia $Ox$. Do đó, góc $\\angle xOy$ là một góc bẹt và có số đo bằng $180^\\circ$.</li><li class='ml-4'>Tia $Oz$ tạo với tia $Ox$ một góc $85^\\circ$ ($85^\\circ < 180^\\circ$), nên tia $Oz$ nằm giữa hai tia $Ox$ và $Oy$.</li><li class='ml-4'>Hai góc $\\angle xOz$ và $\\angle yOz$ là hai góc kề bù, ta có hệ thức: $\\angle xOz + \\angle yOz = 180^\\circ$</li><li class='ml-4'>Thay số vào ta được: $85^\\circ + \\angle yOz = 180^\\circ \\Rightarrow \\angle yOz = 180^\\circ - 85^\\circ = 95^\\circ$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $\\angle yOz = 95^\\circ$.</li>" },
{ t_title: "Bài 15", t_content: "Cho tổng $S = \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dfrac{1}{4^2} + ... + \\dfrac{1}{2025^2} + \\dfrac{1}{2026^2}$. Chứng tỏ $S < 1$.", lines_needed: 6, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Cần chứng minh điều gì về tổng của dãy phân số S?<br>- <b>Who:</b> Các mẫu số mang dạng bình phương ($2^2, 3^2, \\dots$) cản trở việc rút gọn như thế nào?<br>- <b>Where/When:</b> Tại sao ta không thể để nguyên mẫu số dạng bình phương để tính tổng?<br>- <b>Why:</b> Tại sao việc làm trội (thay $n^2$ bằng số nhỏ hơn là $(n-1)n$) lại tạo ra một chuỗi phân số có thể triệt tiêu liên tiếp?<br>- <b>How:</b> Cách thay thế mỗi $\\dfrac{1}{n^2}$ bằng $\\dfrac{1}{n-1} - \\dfrac{1}{n}$ được thực hiện ra sao? Khi cộng dồn các vế, các phân số trung gian sẽ triệt tiêu như thế nào để phần dư còn lại luôn nhỏ hơn 1?", solution: "<li><b>Chứng minh $S < 1$ bằng phương pháp làm trội:</b></li><li class='ml-4'>Với mọi số tự nhiên $n > 1$, ta luôn có bất đẳng thức: $\\dfrac{1}{n^2} = \\dfrac{1}{n \\cdot n} < \\dfrac{1}{(n-1) \\cdot n}$</li><li class='ml-4'>Áp dụng công thức sai phân: $\\dfrac{1}{(n-1) \\cdot n} = \\dfrac{1}{n-1} - \\dfrac{1}{n}$</li><li class='ml-4'>Áp dụng tính chất trên cho từng số hạng của tổng $S$, ta có:</li><li class='ml-8'>$\\dfrac{1}{2^2} < \\dfrac{1}{1 \\cdot 2} = \\dfrac{1}{1} - \\dfrac{1}{2}$</li><li class='ml-8'>$\\dfrac{1}{3^2} < \\dfrac{1}{2 \\cdot 3} = \\dfrac{1}{2} - \\dfrac{1}{3}$</li><li class='ml-8'>$\\dfrac{1}{4^2} < \\dfrac{1}{3 \\cdot 4} = \\dfrac{1}{3} - \\dfrac{1}{4}$</li><li class='ml-8'>$\\dots$</li><li class='ml-8'>$\\dfrac{1}{2025^2} < \\dfrac{1}{2024 \\cdot 2025} = \\dfrac{1}{2024} - \\dfrac{1}{2025}$</li><li class='ml-8'>$\\dfrac{1}{2026^2} < \\dfrac{1}{2025 \\cdot 2026} = \\dfrac{1}{2025} - \\dfrac{1}{2026}$</li><li><b>Cộng vế theo vế các bất đẳng thức trên:</b></li><li class='ml-4'>$S < \\left(\\dfrac{1}{1} - \\dfrac{1}{2}\\right) + \\left(\\dfrac{1}{2} - \\dfrac{1}{3}\\right) + \\left(\\dfrac{1}{3} - \\dfrac{1}{4}\\right) + \\dots + \\left(\\dfrac{1}{2025} - \\dfrac{1}{2026}\\right)$</li><li class='ml-4'>Triệt tiêu các phân số đối nhau ở giữa, ta được:</li><li class='ml-4'>$S < 1 - \\dfrac{1}{2026}$</li><li class='ml-4'>Vì $\\dfrac{1}{2026} > 0$ nên $1 - \\dfrac{1}{2026} < 1$. Do đó suy ra $S < 1$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Đã chứng minh $S < 1$.</li>" },
{ t_title: "Bài 16", t_content: "Cho $A = \\dfrac{1}{3^2} + \\dfrac{3}{3^4} + \\dfrac{5}{3^6} + ... + \\dfrac{99}{3^{100}}$. Chứng minh $A < \\dfrac{5}{32}$.", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh biểu thức A nhỏ hơn phân số nào?<br>- <b>Who:</b> Dãy phân số có tử là chuỗi số lẻ, mẫu là lũy thừa bậc chẵn của $3$ ($3^2, 3^4...$).<br>- <b>Where/When:</b> Phép biến đổi nhân thêm với $9$ (tức là $3^2$) cần được áp dụng lên toàn bộ biểu thức A lúc nào?<br>- <b>Why:</b> Tại sao việc nhân 9 rồi trừ đi biểu thức gốc (Lấy $9A - A = 8A$) lại giúp triệt tiêu và dịch chuyển các số mũ ở mẫu số?<br>- <b>How:</b> Làm sao để nhóm phần còn lại của $8A$ (bằng cách đặt 2 ra làm nhân tử chung)? Cách tính giới hạn của chuỗi cấp số nhân lùi vô hạn bên trong ngoặc để dẫn tới kết quả $< \\dfrac{5}{32}$ là gì?", solution: "<li><b>Bước 1: Nhân A với $3^2$ (tức là $9$) để tịnh tiến bậc của mẫu số:</b></li><li class='ml-4'>$A = \\dfrac{1}{3^2} + \\dfrac{3}{3^4} + \\dfrac{5}{3^6} + ... + \\dfrac{99}{3^{100}}$</li><li class='ml-4'>Nhân cả 2 vế với $9$:</li><li class='ml-4'>$9A = 3^2 \\cdot A = 1 + \\dfrac{3}{3^2} + \\dfrac{5}{3^4} + ... + \\dfrac{99}{3^{98}}$</li><li><b>Bước 2: Lấy 9A trừ đi A để tạo ra một chuỗi mới đồng đều trên tử số:</b></li><li class='ml-4'>$8A = 9A - A = 1 + \\left(\\dfrac{3}{3^2} - \\dfrac{1}{3^2}\\right) + \\left(\\dfrac{5}{3^4} - \\dfrac{3}{3^4}\\right) + ... + \\left(\\dfrac{99}{3^{98}} - \\dfrac{97}{3^{98}}\\right) - \\dfrac{99}{3^{100}}$</li><li class='ml-4'>$8A = 1 + \\dfrac{2}{3^2} + \\dfrac{2}{3^4} + ... + \\dfrac{2}{3^{98}} - \\dfrac{99}{3^{100}}$</li><li><b>Bước 3: Đánh giá làm trội biểu thức 8A:</b></li><li class='ml-4'>Vì phân số $-\\dfrac{99}{3^{100}}$ mang giá trị âm nên:</li><li class='ml-4'>$8A < 1 + 2 \\cdot \\left(\\dfrac{1}{3^2} + \\dfrac{1}{3^4} + ... + \\dfrac{1}{3^{98}}\\right)$</li><li class='ml-4'>Đặt biểu thức trong ngoặc là $B = \\dfrac{1}{3^2} + \\dfrac{1}{3^4} + ... + \\dfrac{1}{3^{98}}$</li><li class='ml-4'>Nhân $B$ với $3^2$ (tức là $9$): $9B = 1 + \\dfrac{1}{3^2} + ... + \\dfrac{1}{3^{96}}$</li><li class='ml-4'>Lấy $9B$ trừ đi $B$: $8B = 9B - B = 1 - \\dfrac{1}{3^{98}}$</li><li class='ml-4'>Vì $1 - \\dfrac{1}{3^{98}} < 1$ nên suy ra $8B < 1 \\Rightarrow B < \\dfrac{1}{8}$</li><li><b>Bước 4: Kết luận:</b></li><li class='ml-4'>Thay $B < \\dfrac{1}{8}$ vào bất đẳng thức của 8A:</li><li class='ml-4'>$8A < 1 + 2 \\cdot B < 1 + 2 \\cdot \\dfrac{1}{8} = 1 + \\dfrac{1}{4} = \\dfrac{5}{4}$</li><li class='ml-4'>Chia cả hai vế cho $8$: $A < \\dfrac{5}{4} : 8 = \\dfrac{5}{32}$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Đã chứng minh $A < \\dfrac{5}{32}$.</li>" },
{ t_title: "Bài 17", t_content: "Tìm x biết: $\\left(\\dfrac{1}{2} + \\dfrac{1}{3} + \\dfrac{1}{4} + ... + \\dfrac{1}{10}\\right) \\cdot x = \\left(\\dfrac{1}{9} + \\dfrac{2}{8} + \\dfrac{3}{7} + ... + \\dfrac{9}{1}\\right)$", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Cần tìm đại lượng ẩn $x$ đang nhân với một chuỗi phân số.<br>- <b>Who:</b> Cụm tổng từ $\\dfrac{1}{2}$ đến $\\dfrac{1}{10}$ ở vế trái và dãy phân số biến thiên liên tục từ $\\dfrac{1}{9}$ đến $\\dfrac{9}{1}$ ở vế phải.<br>- <b>Why:</b> Tại sao ta lại nghĩ đến việc cộng thêm $1$ vào từng phân số ở vế phải? (Vì $\\dfrac{1}{9} + 1 = \\dfrac{10}{9}$, $\\dfrac{2}{8} + 1 = \\dfrac{10}{8}$... tạo ra tử số chung là $10$).<br>- <b>Where/When:</b> Việc mượn $9$ số $1$ để cộng vào các phân số vế phải cần được trả lại bằng cách trừ đi $9$ ở cuối như thế nào?<br>- <b>How:</b> Làm sao để rút nhân tử chung là $10$ ở vế phải? Khi hai bên phương trình đều xuất hiện chung một cụm ngoặc to, phép triệt tiêu sẽ cho ra $x$ bằng bao nhiêu?", solution: "<li><b>Bước 1: Biến đổi vế phải của phương trình:</b></li><li class='ml-4'>Đặt $VP = \\dfrac{1}{9} + \\dfrac{2}{8} + \\dfrac{3}{7} + ... + \\dfrac{8}{2} + \\dfrac{9}{1}$</li><li class='ml-4'>Tách phân số $\\dfrac{9}{1} = 9 = 1 + 1 + 1 + ... + 1$ (gồm $9$ số $1$).</li><li class='ml-4'>Cộng mỗi số $1$ vào từng phân số còn lại trong tổng $VP$, ta được:</li><li class='ml-8'>$VP = \\left(\\dfrac{1}{9} + 1\\right) + \\left(\\dfrac{2}{8} + 1\\right) + ... + \\left(\\dfrac{8}{2} + 1\\right) + 1$</li><li><b>Bước 2: Quy đồng và tính toán trong các ngoặc:</b></li><li class='ml-4'>$VP = \\dfrac{10}{9} + \\dfrac{10}{8} + ... + \\dfrac{10}{2} + \\dfrac{10}{10}$</li><li class='ml-4'>Đặt thừa số chung $10$ ra ngoài:</li><li class='ml-8'>$VP = 10 \\cdot \\left(\\dfrac{1}{9} + \\dfrac{1}{8} + ... + \\dfrac{1}{2} + \\dfrac{1}{10}\\right)$</li><li class='ml-4'>Sắp xếp lại các phân số trong ngoặc theo thứ tự tăng dần của mẫu số:</li><li class='ml-8'>$VP = 10 \\cdot \\left(\\dfrac{1}{2} + \\dfrac{1}{3} + ... + \\dfrac{1}{10}\\right)$</li><li><b>Bước 3: Giải phương trình tìm x:</b></li><li class='ml-4'>Thay $VP$ vừa biến đổi vào phương trình ban đầu, ta có:</li><li class='ml-8'>$\\left(\\dfrac{1}{2} + \\dfrac{1}{3} + ... + \\dfrac{1}{10}\\right) \\cdot x = 10 \\cdot \\left(\\dfrac{1}{2} + \\dfrac{1}{3} + ... + \\dfrac{1}{10}\\right)$</li><li class='ml-4'>Vì cụm tổng trong ngoặc là một số khác $0$, ta có thể chia cả hai vế cho cụm này để triệt tiêu.</li><li class='ml-4'>Suy ra: $x = 10$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $x = 10$</li>" },
{ t_title: "Bài 18", t_content: "Tìm x biết: $\\dfrac{x+8}{12} + \\dfrac{x+9}{11} + \\dfrac{x+10}{10} + 3 = 0$.", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Giải phương trình tìm $x$ chứa dãy các phân số bằng $0$.<br>- <b>Who:</b> Hằng số $3$ và ba phân số có mẫu giảm dần $12, 11, 10$.<br>- <b>Where/When:</b> Hằng số $3$ nên được tách và đưa vào vị trí nào của ba phân số?<br>- <b>Why:</b> Tại sao tách $3$ thành $1 + 1 + 1$ rồi cộng vào từng phân số lại là bước đột phá? (Giúp tạo ra tử số mới là $x+8+12 = x+20$, tạo điểm chung cho mọi hạng tử).<br>- <b>How:</b> Làm sao để quy đồng sau khi cộng $1$? Khi đặt nhân tử $(x+20)$ ra ngoài, biểu thức phần ngoặc còn lại luôn mang giá trị dương, từ đó ép $(x+20)$ phải bằng bao nhiêu?", solution: "<li><b>Bước 1: Tách hằng số 3 ở vế trái để nhóm vào các phân số:</b></li><li class='ml-4'>Ta viết $3 = 1 + 1 + 1$. Phương trình ban đầu trở thành:</li><li class='ml-8'>$\\left(\\dfrac{x+8}{12} + 1\\right) + \\left(\\dfrac{x+9}{11} + 1\\right) + \\left(\\dfrac{x+10}{10} + 1\\right) = 0$</li><li><b>Bước 2: Quy đồng mẫu số từng cụm trong ngoặc:</b></li><li class='ml-4'>$\\dfrac{x+8+12}{12} + \\dfrac{x+9+11}{11} + \\dfrac{x+10+10}{10} = 0$</li><li class='ml-4'>$\\dfrac{x+20}{12} + \\dfrac{x+20}{11} + \\dfrac{x+20}{10} = 0$</li><li><b>Bước 3: Đặt nhân tử chung và giải phương trình:</b></li><li class='ml-4'>Cả ba phân số đều có tử số chung là $(x+20)$, ta đặt ra ngoài làm nhân tử chung:</li><li class='ml-8'>$(x+20) \\cdot \\left(\\dfrac{1}{12} + \\dfrac{1}{11} + \\dfrac{1}{10}\\right) = 0$</li><li class='ml-4'>Xét cụm tổng các phân số trong ngoặc: $\\left(\\dfrac{1}{12} + \\dfrac{1}{11} + \\dfrac{1}{10}\\right) > 0$.</li><li class='ml-4'>Vì tích của hai biểu thức bằng $0$ mà biểu thức thứ hai luôn dương, nên biểu thức thứ nhất phải bằng $0$.</li><li class='ml-4'>Suy ra: $x + 20 = 0$</li><li class='ml-4'>Chuyển vế: $x = -20$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $x = -20$</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Giá trị của biểu thức&nbsp;$(-3)^3 \\cdot \\dfrac{-2}{9}$&nbsp;là:", options: ["A. $-6$", "B. $6$", "C. $\\dfrac{-2}{3}$", "D. $\\dfrac{2}{3}$"], correct_idx: 1, explain: "Ta có:&nbsp;$(-3)^3 = -27$. Thay vào biểu thức ta được:&nbsp;$-27 \\cdot \\dfrac{-2}{9} = 3 \\cdot 2 = 6$. Chọn B." },
{ q_title: "Câu 2", q_content: "Lớp trưởng ghi lại điểm bài kiểm tra môn Toán (thang điểm 10) của Tổ 1 như sau:&nbsp;$8; 9; 10; 7; 12; 8; 6$. Dữ liệu KHÔNG hợp lý trong dãy là:", options: ["A. $8$", "B. $12$", "C. $10$", "D. Không có dữ liệu sai"], correct_idx: 1, explain: "Bài kiểm tra thang điểm 10 thì điểm tối đa là 10. Con số 12 là dữ liệu vô lý do ghi chép sai. Chọn B." },
{ q_title: "Câu 3", q_content: "Gieo một con xúc xắc cân đối&nbsp;$80$&nbsp;lần. Nếu xác suất thực nghiệm của sự kiện 'Xuất hiện mặt có số chấm chẵn' là&nbsp;$45\\%$, thì số lần xuất hiện mặt có số chấm LẺ là bao nhiêu?", options: ["A. $36$&nbsp;lần", "B. $44$&nbsp;lần", "C. $45$&nbsp;lần", "D. $55$&nbsp;lần"], correct_idx: 1, explain: "Xác suất thực nghiệm xuất hiện mặt lẻ là:&nbsp;$100\\% - 45\\% = 55\\%$. Số lần xuất hiện mặt lẻ là:&nbsp;$80 \\cdot 55\\% = 44$&nbsp;(lần). Chọn B." },
{ q_title: "Câu 4", q_content: "Kết quả của phép tính&nbsp;$\\dfrac{-7}{15} - \\dfrac{2}{5}$&nbsp;là:", options: ["A. $\\dfrac{-1}{3}$", "B. $\\dfrac{-13}{15}$", "C. $\\dfrac{-1}{5}$", "D. $\\dfrac{1}{15}$"], correct_idx: 1, explain: "Quy đồng mẫu số chung 15:&nbsp;$\\dfrac{-7}{15} - \\dfrac{6}{15} = \\dfrac{-13}{15}$. Chọn B." },
{ q_title: "Câu 5", q_content: "Một máy in có tốc độ in&nbsp;$20$&nbsp;trang/phút. Hỏi để in một tập tài liệu dày&nbsp;$150$&nbsp;trang, máy in đó mất bao lâu?", options: ["A. $7$&nbsp;phút&nbsp;$30$&nbsp;giây", "B. $7,5$&nbsp;giây", "C. $8$&nbsp;phút", "D. $7$&nbsp;phút&nbsp;$50$&nbsp;giây"], correct_idx: 0, explain: "Thời gian in là:&nbsp;$150 : 20 = 7,5$&nbsp;(phút). Đổi&nbsp;$7,5$&nbsp;phút =&nbsp;$7$&nbsp;phút&nbsp;$30$&nbsp;giây. Chọn A." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$45,897$&nbsp;đến hàng phần mười ta được kết quả là:", options: ["A. $45,8$", "B. $45,90$", "C. $45,9$", "D. $46,0$"], correct_idx: 2, explain: "Chữ số hàng phần trăm là&nbsp;$9 \\ge 5$&nbsp;nên cộng thêm 1 vào hàng phần mười ($8+1=9$). Kết quả là&nbsp;$45,9$. Chọn C." },
{ q_title: "Câu 7", q_content: "Biết&nbsp;$40\\%$&nbsp;của số&nbsp;$x$&nbsp;là&nbsp;$32$. Giá trị của&nbsp;$\\dfrac{1}{4}x$&nbsp;là:", options: ["A. $8$", "B. $80$", "C. $20$", "D. $12,8$"], correct_idx: 2, explain: "Ta có:&nbsp;$x = 32 : 40\\% = 32 : 0,4 = 80$. Vậy&nbsp;$\\dfrac{1}{4}x = \\dfrac{1}{4} \\cdot 80 = 20$. Chọn C." },
{ q_title: "Câu 8", q_content: "Cứ qua 2 điểm phân biệt ta vẽ được một đường thẳng. Cho&nbsp;$8$&nbsp;điểm phân biệt trong đó không có&nbsp;$3$&nbsp;điểm nào thẳng hàng. Số đường thẳng tạo thành là:", options: ["A. $16$", "B. $56$", "C. $28$", "D. $64$"], correct_idx: 2, explain: "Số đường thẳng tạo thành từ 8 điểm không thẳng hàng là&nbsp;$\\dfrac{n(n-1)}{2} = \\dfrac{8 \\cdot 7}{2} = 28$. Chọn C." },
{ q_title: "Câu 9", q_content: "Điểm&nbsp;$M$&nbsp;thuộc đoạn thẳng&nbsp;$AB$. Biết&nbsp;$AM = 3\\text{cm}, MB = 5\\text{cm}$. Gọi&nbsp;$I$&nbsp;là trung điểm của&nbsp;$AB$. Độ dài&nbsp;$MI$&nbsp;là:", options: ["A. $1\\text{cm}$", "B. $4\\text{cm}$", "C. $1,5\\text{cm}$", "D. $2\\text{cm}$"], correct_idx: 0, explain: "Vì M thuộc AB nên&nbsp;$AB = AM + MB = 3 + 5 = 8\\text{cm}$. I là trung điểm nên&nbsp;$AI = 8/2 = 4\\text{cm}$. Vì AM < AI (3 < 4) nên M nằm giữa A và I. Đoạn&nbsp;$MI = AI - AM = 4 - 3 = 1\\text{cm}$. Chọn A." },
{ q_title: "Câu 10", q_content: "Hai góc phụ nhau có một góc bằng&nbsp;$37^{\\circ}$. Số đo góc còn lại là:", options: ["A. $143^{\\circ}$", "B. $53^{\\circ}$", "C. $63^{\\circ}$", "D. $127^{\\circ}$"], correct_idx: 1, explain: "Hai góc phụ nhau có tổng bằng&nbsp;$90^{\\circ}$. Góc còn lại là&nbsp;$90^{\\circ} - 37^{\\circ} = 53^{\\circ}$. Chọn B." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về cuộc khảo sát 'Phương tiện đến trường' của 50 học sinh (Xe đạp: 15, Đi bộ: 10, Xe máy: 20, Ô tô: 10, Trực thăng: 1):<br>(I) Tổng số học sinh theo dữ liệu khảo sát khớp với số học sinh ban đầu.<br>(II) Dữ liệu 'Trực thăng' là dữ liệu không hợp lý đối với học sinh thông thường.<br>(III) Tỉ lệ phần trăm học sinh đi xe đạp là&nbsp;$30\\%$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Tổng đếm được là $15+10+20+10+1 = 56 \\neq 50$ (Mệnh đề Sai). (II) Học sinh đi trực thăng là vô lý (Đúng). (III) Tính trên sĩ số giả thiết 50 hs thì tỉ lệ xe đạp là $15/50 = 30\\%$ (Đúng). Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Cho ba điểm&nbsp;$A, B, C$&nbsp;nằm trên đường thẳng&nbsp;$d$&nbsp;sao cho&nbsp;$AB = 6\\text{cm}, AC = 2\\text{cm}, BC = 8\\text{cm}$. Lấy&nbsp;$M$&nbsp;là trung điểm&nbsp;$AB$. Xét 3 mệnh đề sau:<br>(I) Điểm&nbsp;$B$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$C$.<br>(II) Hai tia&nbsp;$AB$&nbsp;và&nbsp;$AC$&nbsp;là hai tia đối nhau.<br>(III) Độ dài đoạn&nbsp;$MC$&nbsp;bằng&nbsp;$5\\text{cm}$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Vì AB + AC = 6 + 2 = 8 = BC nên A nằm giữa B và C. Đề nói B nằm giữa là Sai. (II) A nằm giữa B, C nên hai tia AB và AC hướng về 2 phía, là hai tia đối nhau (Đúng). (III) M trung điểm AB $\\Rightarrow$ MA=3. Vì A nằm giữa M và C nên MC = MA + AC = 3 + 2 = 5cm (Đúng). Có 2 mệnh đề đúng. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (2,0 điểm)", t_content: "Tính hợp lý giá trị biểu thức:<div class='mt-6'>a) &nbsp; $A = \\dfrac{-5}{17} \\cdot \\dfrac{8}{13} + \\dfrac{-5}{17} \\cdot \\dfrac{5}{13} - 1\\dfrac{12}{17}$</div><div class='mt-6'>b) &nbsp; $B = \\dfrac{5}{1 \\cdot 6} + \\dfrac{5}{6 \\cdot 11} + \\dfrac{5}{11 \\cdot 16} + \\dots + \\dfrac{5}{96 \\cdot 101}$</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Quan sát các hạng tử, thừa số nào chung? (Là&nbsp;$\\dfrac{-5}{17}$).<br>- <b>Where:</b> Bẫy nằm ở hạng tử cuối cùng là hỗn số&nbsp;$-1\\dfrac{12}{17}$. Không thể đưa nó vào nhóm nhân tử chung được. Hãy gom 2 hạng tử đầu tiên lại, đổi hỗn số ở cuối ra phân số rồi giải quyết sau.<br><b>Ý b:</b><br>- <b>What:</b> Đây là dãy phân số sai phân cơ bản. Mẫu số là tích của $2$ số cách nhau bao nhiêu đơn vị? ($6 - 1 = 5$; $11 - 6 = 5$).<br>- <b>Why:</b> Tử số hiện tại là bao nhiêu? ($5$). Nó đã khớp hoàn hảo với khoảng cách ở mẫu số chưa? (Đã khớp).<br>- <b>How:</b> Áp dụng ngay công thức sai phân để bung chuỗi ra và triệt tiêu phần giữa.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$A$:</b></li><li class='ml-4'>Đặt nhân tử chung cho $2$ hạng tử đầu tiên và đổi hỗn số ở hạng tử cuối thành phân số:</li><li class='ml-8'>$A = \\dfrac{-5}{17} \\cdot \\left( \\dfrac{8}{13} + \\dfrac{5}{13} \\right) - \\dfrac{29}{17}$</li><li class='ml-4'>Thực hiện tính toán trong dấu ngoặc:</li><li class='ml-8'>$A = \\dfrac{-5}{17} \\cdot \\dfrac{13}{13} - \\dfrac{29}{17}$</li><li class='ml-8'>$A = \\dfrac{-5}{17} \\cdot 1 - \\dfrac{29}{17}$</li><li class='ml-4'>Cộng hai phân số cùng mẫu:</li><li class='ml-8'>$A = \\dfrac{-5 - 29}{17} = \\dfrac{-34}{17}$</li><li class='ml-4'>Thực hiện phép chia:</li><li class='ml-8'>$A = -2$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $A = -2$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$B$:</b></li><li class='ml-4'>Áp dụng công thức sai phân $\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$, ta tách từng phân số thành hiệu:</li><li class='ml-8'>$B = \\left( \\dfrac{1}{1} - \\dfrac{1}{6} \\right) + \\left( \\dfrac{1}{6} - \\dfrac{1}{11} \\right) + \\left( \\dfrac{1}{11} - \\dfrac{1}{16} \\right) + \\dots + \\left( \\dfrac{1}{96} - \\dfrac{1}{101} \\right)$</li><li class='ml-4'>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở giữa chuỗi:</li><li class='ml-8'>$B = \\dfrac{1}{1} - \\dfrac{1}{101}$</li><li class='ml-4'>Quy đồng mẫu số chung là $101$ và tính kết quả:</li><li class='ml-8'>$B = \\dfrac{101 - 1}{101} = \\dfrac{100}{101}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $B = \\dfrac{100}{101}$.</li>" },
{ t_title: "Câu 2 (2,0 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{x-5}{100} + \\dfrac{x-4}{101} + \\dfrac{x-3}{102} = 3$</div><div class='mt-6'>b) &nbsp; $2 \\cdot |x - 2,5| - \\dfrac{1}{2} = 4,5$</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Không thể quy đồng mẫu số được vì nó quá to.<br>- <b>Why:</b> Chú ý số $3$ ở vế phải. Phương trình vế trái có $3$ phân số. Nếu ta chuyển số $3$ sang vế trái và tách thành $1 + 1 + 1$ (tức là trừ $1$ cho mỗi phân số) thì chuyện gì xảy ra?<br>- <b>How:</b> Ví dụ: $\\dfrac{x-5}{100} - 1 = \\dfrac{x-5-100}{100} = \\dfrac{x-105}{100}$. Các phân số khác cũng sẽ tạo ra tử số chung là $(x-105)$. Đặt nhân tử chung ra ngoài là xong!<br><b>Ý b:</b><br>- <b>How:</b> Chuyển vế $-\\dfrac{1}{2}$ để cô lập cụm chứa trị tuyệt đối. Nhớ đổi $4,5$ thành phân số hoặc số thập phân tương ứng để cộng.<br>- <b>Where:</b> Sau khi cô lập được $|x - 2,5| = \\text{số dương}$, bắt buộc phải chia làm $2$ trường hợp để phá dấu trị tuyệt đối.", solution: "<li><b>a) Tìm&nbsp;$x$&nbsp;bằng cách nhóm hằng số:</b></li><li class='ml-4'>Ta chuyển số $3$ từ vế phải sang vế trái, tách thành ba số $-1$ và phân bổ cho từng phân số:</li><li class='ml-8'>$\\left( \\dfrac{x-5}{100} - 1 \\right) + \\left( \\dfrac{x-4}{101} - 1 \\right) + \\left( \\dfrac{x-3}{102} - 1 \\right) = 0$</li><li class='ml-4'>Quy đồng mẫu số bên trong từng dấu ngoặc:</li><li class='ml-8'>$\\dfrac{x-5-100}{100} + \\dfrac{x-4-101}{101} + \\dfrac{x-3-102}{102} = 0$</li><li class='ml-8'>$\\dfrac{x-105}{100} + \\dfrac{x-105}{101} + \\dfrac{x-105}{102} = 0$</li><li class='ml-4'>Đặt tử số chung $(x-105)$ ra ngoài làm nhân tử chung:</li><li class='ml-8'>$(x-105) \\cdot \\left( \\dfrac{1}{100} + \\dfrac{1}{101} + \\dfrac{1}{102} \\right) = 0$</li><li class='ml-4'>Vì cụm biểu thức $\\left( \\dfrac{1}{100} + \\dfrac{1}{101} + \\dfrac{1}{102} \\right)$ chứa các phân số dương nên tổng của chúng lớn hơn $0$ (luôn khác $0$).</li><li class='ml-4'>Để tích bằng $0$, bắt buộc nhân tử còn lại phải bằng $0$:</li><li class='ml-8'>$x - 105 = 0 \\Rightarrow x = 105$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = 105$.</li><li><b>b) Tìm&nbsp;$x$&nbsp;trong phương trình trị tuyệt đối:</b></li><li class='ml-4'>Đổi $4,5 = \\dfrac{9}{2}$. Chuyển vế $-\\dfrac{1}{2}$ sang vế phải:</li><li class='ml-8'>$2 \\cdot |x - 2,5| = \\dfrac{9}{2} + \\dfrac{1}{2}$</li><li class='ml-8'>$2 \\cdot |x - 2,5| = \\dfrac{10}{2} = 5$</li><li class='ml-4'>Cô lập trị tuyệt đối bằng phép chia:</li><li class='ml-8'>$|x - 2,5| = \\dfrac{5}{2} = 2,5$</li><li class='ml-4'>Vì giá trị tuyệt đối bằng một số dương, ta chia làm 2 trường hợp:</li><li class='ml-4'><b>Trường hợp 1:</b></li><li class='ml-8'>$x - 2,5 = 2,5 \\Rightarrow x = 2,5 + 2,5 = 5$</li><li class='ml-4'><b>Trường hợp 2:</b></li><li class='ml-8'>$x - 2,5 = -2,5 \\Rightarrow x = -2,5 + 2,5 = 0$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $x \\in \\{5; 0\\}$.</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "Một cửa hàng bán kem ghi lại số lượng ly kem bán được trong 4 ngày cuối tuần như sau: Thứ Năm bán&nbsp;$45$&nbsp;ly; Thứ Sáu bán&nbsp;$60$&nbsp;ly; Thứ Bảy bán&nbsp;$80$&nbsp;ly; Chủ Nhật bán&nbsp;$65$&nbsp;ly.<div class='mt-6'>a) Tính tỉ số phần trăm số ly kem bán được trong ngày Thứ Bảy so với tổng số ly kem của cả 4 ngày (làm tròn đến hàng phần mười).</div><div class='mt-6'>b) Em hãy thiết lập một biểu đồ cột biểu diễn số lượng ly kem bán được trong 4 ngày đó.</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đề yêu cầu tính tỉ số phần trăm của một thành phần (Thứ Bảy) so với tổng thể.<br>- <b>How:</b> <br>&nbsp; + Bước 1: Cộng số ly của cả 4 ngày lại để ra Tổng.<br>&nbsp; + Bước 2: Lấy số ly ngày Thứ Bảy chia cho Tổng và nhân với $100\\%$.<br><b>Ý b:</b><br>- <b>How:</b> Các bước vẽ biểu đồ cột chuẩn:<br>&nbsp; + Vẽ 2 trục vuông góc. Trục ngang (trục hoành) ghi tên Ngày. Trục dọc (trục tung) ghi Số lượng ly kem.<br>&nbsp; + Chia vạch trên trục dọc sao cho đều nhau (nên chia mỗi vạch tương ứng 10 hoặc 20 ly).<br>&nbsp; + Vẽ 4 cột hình chữ nhật tương ứng với 4 ngày. Ghi số liệu cụ thể lên đỉnh mỗi cột.", solution: "<li><b>a) Tính tỉ số phần trăm:</b></li><li class='ml-4'>Tổng số ly kem bán được trong 4 ngày là:</li><li class='ml-8'>$45 + 60 + 80 + 65 = 250$&nbsp;(ly).</li><li class='ml-4'>Tỉ số phần trăm số ly kem bán được trong ngày Thứ Bảy so với tổng số ly cả 4 ngày là:</li><li class='ml-8'>$\\dfrac{80}{250} \\cdot 100\\% = \\dfrac{8}{25} \\cdot 100\\% = 32\\%$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Ngày Thứ Bảy chiếm $32\\%$ tổng doanh số.</li><li><b>b) Thiết lập biểu đồ cột:</b></li><li class='ml-4'><i>(Học sinh tự thực hành vẽ vào vở theo các thông số và hướng dẫn sau)</i>:</li><li class='ml-4'>- <b>Tên biểu đồ:</b> Số lượng ly kem bán được trong 4 ngày cuối tuần.</li><li class='ml-4'>- <b>Trục ngang (Ngày):</b> Ghi chú 4 cột lần lượt là Thứ Năm, Thứ Sáu, Thứ Bảy, Chủ Nhật.</li><li class='ml-4'>- <b>Trục dọc (Số lượng ly):</b> Đánh các mốc chia vạch đều đặn: $0, 20, 40, 60, 80, 100$.</li><li class='ml-4'>- <b>Độ cao các cột tương ứng:</b></li><li class='ml-8'>+ Cột Thứ Năm: Cao đến khoảng nhỉnh hơn vạch 40 một chút (ghi 45).</li><li class='ml-8'>+ Cột Thứ Sáu: Cao chạm đúng vạch 60 (ghi 60).</li><li class='ml-8'>+ Cột Thứ Bảy: Cao chạm đúng vạch 80 (ghi 80).</li><li class='ml-8'>+ Cột Chủ Nhật: Cao qua vạch 60 một phần tư khoảng cách (ghi 65).</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Trên tia&nbsp;$Ox$, lấy hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;sao cho&nbsp;$OA = 5\\text{ cm}, OB = 9\\text{ cm}$.<div class='mt-6'>a) Tính độ dài đoạn thẳng&nbsp;$AB$.</div><div class='mt-6'>b) Trên tia đối của tia&nbsp;$Ox$&nbsp;lấy điểm&nbsp;$C$&nbsp;sao cho&nbsp;$OC = 1\\text{ cm}$. Điểm&nbsp;$A$&nbsp;có phải là trung điểm của đoạn thẳng&nbsp;$CB$&nbsp;không? Vì sao?</div><div class='mt-6'>c) Lấy điểm&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$. Tính độ dài đoạn thẳng&nbsp;$OM$.</div><div class='flex justify-center my-8'><svg width='360' height='70' viewBox='0 0 360 70'><line x1='10' y1='40' x2='350' y2='40' stroke='black' stroke-width='1.5'/><text x='340' y='30' font-size='14' font-style='italic'>x</text><circle cx='80' cy='40' r='3' fill='black'/><text x='75' y='60' font-size='14'>C</text><circle cx='100' cy='40' r='3' fill='black'/><text x='95' y='60' font-size='14'>O</text><circle cx='200' cy='40' r='3' fill='black'/><text x='195' y='60' font-size='14'>A</text><circle cx='240' cy='40' r='3' fill='red'/><text x='235' y='60' font-size='14' fill='red'>M</text><circle cx='280' cy='40' r='3' fill='black'/><text x='275' y='60' font-size='14'>B</text><path d='M 100 25 L 100 15 L 200 15 L 200 25' fill='none' stroke='blue' stroke-width='0.5'/><text x='140' y='10' font-size='11' fill='blue'>5cm</text><path d='M 100 70 L 100 60 L 280 60 L 280 70' fill='none' stroke='green' stroke-width='0.5'/><text x='180' y='55' font-size='11' fill='green'>9cm</text><path d='M 80 25 L 80 15 L 100 15 L 100 25' fill='none' stroke='gray' stroke-width='0.5'/><text x='82' y='10' font-size='11' fill='gray'>1cm</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Có hai điểm trên cùng một tia, tìm đoạn thẳng kẹp giữa.<br>- <b>How:</b> So sánh khoảng cách tới gốc $O$. Do $OA < OB$ nên $A$ nằm giữa. Dùng phép trừ tính $AB$.<br><b>Ý b:</b><br>- <b>What:</b> Kiểm tra tính chất trung điểm của $A$ đối với đoạn $CB$.<br>- <b>Where/When:</b> $C$ nằm trên tia đối của $Ox$. Suy ra $O$ nằm giữa $C$ và $A$. Ta tính được khoảng cách $CA$.<br>- <b>Why:</b> Để là trung điểm thì phải thỏa 2 điều kiện: Nằm giữa và Cách đều. Khoảng cách $CA$ vừa tính có bằng khoảng cách $AB$ tính ở câu a không?<br><b>Ý c:</b><br>- <b>What:</b> $M$ là trung điểm của $AB$ $\\Rightarrow$ Tính được độ dài $AM$.<br>- <b>How:</b> $A$ nằm giữa $O$ và $B$. $M$ nằm giữa $A$ và $B$. Từ đó suy ra $A$ nằm giữa $O$ và $M$. Cộng hai đoạn thẳng $OA$ và $AM$ để ra $OM$.", solution: "<li><b>a) Tính độ dài đoạn thẳng&nbsp;$AB$:</b></li><li class='ml-4'>Trên cùng một tia $Ox$, ta có khoảng cách từ gốc $O$ là $OA = 5\\text{ cm}$ và $OB = 9\\text{ cm}$.</li><li class='ml-4'>Vì $OA < OB$ ($5 < 9$) nên <b>điểm&nbsp;$A$&nbsp;nằm giữa hai điểm&nbsp;$O$&nbsp;và&nbsp;$B$</b>.</li><li class='ml-4'>Khi đó ta có công thức cộng đoạn thẳng:</li><li class='ml-8'>$OA + AB = OB$</li><li class='ml-8'>$5 + AB = 9 \\Rightarrow AB = 9 - 5 = 4\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Kết luận a: $AB = 4\\text{ cm}$.</li><li><b>b) Điểm&nbsp;$A$&nbsp;có phải là trung điểm của&nbsp;$CB$&nbsp;không?</b></li><li class='ml-4'>Vì điểm $A$ thuộc tia $Ox$, điểm $C$ thuộc tia đối của tia $Ox$ nên hai tia $OA$ và $OC$ là hai tia đối nhau. Do đó, <b>điểm&nbsp;$O$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$C$</b>.</li><li class='ml-4'>Độ dài đoạn thẳng $AC$ là:</li><li class='ml-8'>$AC = OA + OC = 5 + 1 = 6\\text{ cm}$.</li><li class='ml-4'>Mặt khác, $B$ thuộc tia $Ox$, $C$ thuộc tia đối của $Ox$ nên $O$ nằm giữa $B$ và $C$. Độ dài $BC$ là:</li><li class='ml-8'>$BC = OB + OC = 9 + 1 = 10\\text{ cm}$.</li><li class='ml-4'>Xét 3 điểm $A, B, C$ thẳng hàng, ta có $AC = 6\\text{ cm}, AB = 4\\text{ cm}$ và $BC = 10\\text{ cm}$. Vì $AC + AB = 6 + 4 = 10 = BC$ nên <b>điểm&nbsp;$A$&nbsp;nằm giữa hai điểm&nbsp;$C$&nbsp;và&nbsp;$B$</b> (1).</li><li class='ml-4'>Lại xét về khoảng cách: $AC = 6\\text{ cm}$ và $AB = 4\\text{ cm} \\Rightarrow AC \\neq AB$ (2).</li><li class='ml-4'>Từ (1) và (2), kết luận: Điểm $A$ <b>không phải</b> là trung điểm của đoạn thẳng $CB$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Kết luận b: Đã chứng minh (Bài toán phản biện).</li><li><b>c) Tính độ dài đoạn thẳng&nbsp;$OM$:</b></li><li class='ml-4'>Vì $M$ là trung điểm của đoạn thẳng $AB$ nên độ dài đoạn $AM$ là:</li><li class='ml-8'>$AM = MB = \\dfrac{AB}{2} = \\dfrac{4}{2} = 2\\text{ cm}$.</li><li class='ml-4'>Dựa vào lập luận ở câu a, điểm $A$ nằm giữa hai điểm $O$ và $B$. Hơn nữa, $M$ là trung điểm của $AB$ nên $M$ nằm giữa $A$ và $B$.</li><li class='ml-4'>Thứ tự các điểm trên tia $Ox$ xếp từ gốc là $O \\rightarrow A \\rightarrow M \\rightarrow B$. Do đó, <b>điểm&nbsp;$A$&nbsp;nằm giữa hai điểm&nbsp;$O$&nbsp;và&nbsp;$M$</b>.</li><li class='ml-4'>Áp dụng hệ thức cộng đoạn thẳng:</li><li class='ml-8'>$OM = OA + AM$</li><li class='ml-8'>$OM = 5 + 2 = 7\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận c: $OM = 7\\text{ cm}$.</li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Số học Tổ hợp - Nguyên lý Dirichlet) Chứng minh rằng trong&nbsp;$8$&nbsp;số nguyên bất kỳ, luôn tồn tại&nbsp;$2$&nbsp;số sao cho hiệu của chúng chia hết cho&nbsp;$7$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh luôn tồn tại 2 số có hiệu chia hết cho 7.<br>- <b>Why:</b> Khi nào hiệu của hai số nguyên chia hết cho 7? (Khi và chỉ khi hai số đó có CÙNG SỐ DƯ khi đem chia cho 7).<br>- <b>How:</b> Lấy 8 số nguyên bất kỳ (đóng vai trò là thỏ) nhét vào các loại số dư khi chia cho 7 (đóng vai trò là lồng). Nhét 8 thỏ vào 7 lồng thì chuyện kiện gì chắc chắn xảy ra?", solution: "<li>Khi đem một số nguyên bất kỳ chia cho $7$, số dư nhận được chỉ có thể là một trong $7$ giá trị sau: $\\{0; 1; 2; 3; 4; 5; 6\\}$.</li><li>Ta coi $7$ giá trị số dư này là $7$ <b>chiếc lồng</b>.</li><li>Theo đề bài, ta có $8$ <b>số nguyên bất kỳ</b> (đóng vai trò là $8$ <b>con thỏ</b>).</li><li>Theo Nguyên lý Dirichlet, khi nhốt $8$ con thỏ vào $7$ chiếc lồng, thì chắc chắn phải tồn tại ít nhất $1$ lồng chứa từ $2$ con thỏ trở lên ($8 = 7 \\cdot 1 + 1$).</li><li>Điều này có nghĩa là trong $8$ số nguyên bất kỳ, luôn tồn tại ít nhất $2$ số có <b>cùng một số dư</b> khi chia cho $7$.</li><li>Gọi hai số đó là $a$ và $b$ ($a \\ge b$). Giả sử chúng cùng chia $7$ dư $r$. Ta có thể biểu diễn:</li><li class='ml-4'>$a = 7 \\cdot q_1 + r$</li><li class='ml-4'>$b = 7 \\cdot q_2 + r$</li><li>Khi đó, xét hiệu của hai số:</li><li class='ml-4'>$a - b = (7 \\cdot q_1 + r) - (7 \\cdot q_2 + r)$</li><li class='ml-4'>$a - b = 7 \\cdot q_1 - 7 \\cdot q_2$</li><li class='ml-4'>$a - b = 7(q_1 - q_2)$</li><li>Vì biểu thức $7(q_1 - q_2)$ chứa thừa số $7$ nên hiệu $(a - b)$ luôn chia hết cho $7$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Luôn có thể chọn ra được 2 số sao cho hiệu của chúng chia hết cho 7. (Điều phải chứng minh).</li>" },
{ t_title: "Câu 6 (2,0 điểm)", t_content: "(Bất đẳng thức Nâng cao) Cho biểu thức:&nbsp;$P = \\dfrac{1}{3^2} + \\dfrac{1}{4^2} + \\dfrac{1}{5^2} + \\dots + \\dfrac{1}{100^2}$<br>Chứng minh rằng:&nbsp;$P < \\dfrac{1}{2}$.", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Chứng minh tổng các phân số có mẫu là bình phương nhỏ hơn một hằng số $\\dfrac{1}{2}$.<br>- <b>How:</b> Ta không thể quy đồng và tính trực tiếp tổng này. Cần làm lớn (làm trội) từng phân số lên bằng cách giảm mẫu số đi một chút.<br>- <b>Where:</b> Ta bắt đầu làm trội từ số hạng đầu tiên $\\dfrac{1}{3^2}$. Thay $n^2$ bằng $(n-1) \\cdot n$. <br>- <b>Why:</b> Khi thay như vậy, biểu thức sẽ biến thành chuỗi sai phân quen thuộc: $\\dfrac{1}{(n-1)n} = \\dfrac{1}{n-1} - \\dfrac{1}{n}$. Chuỗi này có thể triệt tiêu chéo rất dễ dàng.", solution: "<li>Áp dụng bất đẳng thức làm trội $\\dfrac{1}{n^2} < \\dfrac{1}{(n-1) \\cdot n}$ với mọi số tự nhiên $n \\ge 3$, ta xét từng số hạng của biểu thức $P$:</li><li class='ml-4'>$\\dfrac{1}{3^2} = \\dfrac{1}{3 \\cdot 3} < \\dfrac{1}{2 \\cdot 3} = \\dfrac{1}{2} - \\dfrac{1}{3}$</li><li class='ml-4'>$\\dfrac{1}{4^2} = \\dfrac{1}{4 \\cdot 4} < \\dfrac{1}{3 \\cdot 4} = \\dfrac{1}{3} - \\dfrac{1}{4}$</li><li class='ml-4'>$\\dfrac{1}{5^2} = \\dfrac{1}{5 \\cdot 5} < \\dfrac{1}{4 \\cdot 5} = \\dfrac{1}{4} - \\dfrac{1}{5}$</li><li class='ml-4'>$\\dots$</li><li class='ml-4'>$\\dfrac{1}{100^2} = \\dfrac{1}{100 \\cdot 100} < \\dfrac{1}{99 \\cdot 100} = \\dfrac{1}{99} - \\dfrac{1}{100}$</li><li>Cộng vế theo vế tất cả các bất đẳng thức trên, ta thu được một tổng mới chắc chắn lớn hơn $P$:</li><li class='ml-4'>$P < \\left( \\dfrac{1}{2} - \\dfrac{1}{3} \\right) + \\left( \\dfrac{1}{3} - \\dfrac{1}{4} \\right) + \\left( \\dfrac{1}{4} - \\dfrac{1}{5} \\right) + \\dots + \\left( \\dfrac{1}{99} - \\dfrac{1}{100} \\right)$</li><li>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở phần giữa chuỗi:</li><li class='ml-4'>$P < \\dfrac{1}{2} - \\dfrac{1}{100}$</li><li>Quy đồng và tính kết quả của vế phải (hoặc chỉ cần đánh giá logic):</li><li class='ml-4'>$P < \\dfrac{50}{100} - \\dfrac{1}{100} = \\dfrac{49}{100}$</li><li>Rõ ràng phân số $\\dfrac{49}{100}$ có tử nhỏ hơn một nửa của mẫu số, do đó giá trị của nó nhỏ hơn $\\dfrac{1}{2}$ (Hoặc viết rõ hơn: $\\dfrac{49}{100} < \\dfrac{50}{100} = \\dfrac{1}{2}$).</li><li>Theo tính chất bắc cầu, ta có:</li><li class='ml-4'>$P < \\dfrac{1}{2}$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Bất đẳng thức được chứng minh thành công.</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Phân số nghịch đảo của số thập phân&nbsp;$-2,5$&nbsp;là:", options: ["A. $\\dfrac{5}{2}$", "B. $\\dfrac{-2}{5}$", "C. $\\dfrac{-5}{2}$", "D. $2,5$"], correct_idx: 1, explain: "Đổi&nbsp;$-2,5 = \\dfrac{-5}{2}$. Phân số nghịch đảo của nó là&nbsp;$\\dfrac{-2}{5}$. Chọn B." },
{ q_title: "Câu 2", q_content: "Một học sinh ghi lại 'Tháng sinh của các bạn trong tổ' được dãy số liệu sau:&nbsp;$2; 5; 10; 0; 11; 8$. Số liệu KHÔNG hợp lý trong dãy là:", options: ["A. $0$", "B. $10$", "C. $11$", "D. Không có dữ liệu sai"], correct_idx: 0, explain: "Tháng sinh của con người chỉ chạy từ tháng 1 đến tháng 12. Do đó tháng sinh là 0 là dữ liệu hoàn toàn vô lý. Chọn A." },
{ q_title: "Câu 3", q_content: "Rút ngẫu nhiên một chiếc thẻ từ hộp có chứa nhiều thẻ được đánh số. Sau&nbsp;$40$&nbsp;lần rút, xác suất thực nghiệm của sự kiện 'Rút được thẻ ghi số nguyên tố' là&nbsp;$35\\%$. Hỏi có bao nhiêu lần bạn đó KHÔNG rút được thẻ ghi số nguyên tố?", options: ["A. $14$&nbsp;lần", "B. $26$&nbsp;lần", "C. $35$&nbsp;lần", "D. $65$&nbsp;lần"], correct_idx: 1, explain: "Xác suất thực nghiệm không phải số nguyên tố là&nbsp;$100\\% - 35\\% = 65\\%$. Số lần tương ứng là:&nbsp;$40 \\cdot 65\\% = 26$&nbsp;lần. Chọn B." },
{ q_title: "Câu 4", q_content: "Kết quả của phép tính&nbsp;$\\dfrac{-11}{12} + \\dfrac{5}{18}$&nbsp;là:", options: ["A. $\\dfrac{-1}{6}$", "B. $\\dfrac{-23}{36}$", "C. $\\dfrac{-19}{36}$", "D. $\\dfrac{-6}{30}$"], correct_idx: 1, explain: "Quy đồng với mẫu chung là 36:&nbsp;$\\dfrac{-33}{36} + \\dfrac{10}{36} = \\dfrac{-23}{36}$. Chọn B." },
{ q_title: "Câu 5", q_content: "Một vòi nước bị rò rỉ, cứ mỗi giây nhỏ xuống&nbsp;$1$&nbsp;giọt nước. Biết thể tích của mỗi giọt nước là&nbsp;$0,05\\text{ ml}$. Hỏi trong&nbsp;$1$&nbsp;giờ, vòi nước đó đã làm thất thoát bao nhiêu lít nước?", options: ["A. $18\\text{ lít}$", "B. $1,8\\text{ lít}$", "C. $3\\text{ lít}$", "D. $0,18\\text{ lít}$"], correct_idx: 3, explain: "Đổi 1 giờ = 3600 giây. Thể tích nước thất thoát là:&nbsp;$3600 \\cdot 0,05 = 180\\text{ ml}$. Đổi ra lít là&nbsp;$180 : 1000 = 0,18\\text{ lít}$. Chọn D." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$899,996$&nbsp;đến chữ số thập phân thứ hai ta được kết quả là:", options: ["A. $900,00$", "B. $899,99$", "C. $900$", "D. $899,90$"], correct_idx: 0, explain: "Chữ số hàng phần nghìn là&nbsp;$6 \\ge 5$&nbsp;nên cộng thêm 1 vào hàng phần trăm ($9+1=10$), nhớ liên tiếp lên các hàng trước. Kết quả phải giữ đủ 2 chữ số thập phân là&nbsp;$900,00$. Chọn A." },
{ q_title: "Câu 7", q_content: "Biết&nbsp;$\\dfrac{2}{3}$&nbsp;của một số&nbsp;$a$&nbsp;bằng&nbsp;$24$. Giá trị của&nbsp;$25\\%$&nbsp;số&nbsp;$a$&nbsp;là:", options: ["A. $16$", "B. $36$", "C. $4$", "D. $9$"], correct_idx: 3, explain: "Ta có:&nbsp;$a = 24 : \\dfrac{2}{3} = 36$. Giá trị&nbsp;$25\\%$&nbsp;của a là:&nbsp;$36 \\cdot 25\\% = 9$. Chọn D." },
{ q_title: "Câu 8", q_content: "Hai góc&nbsp;$\\angle A$&nbsp;và&nbsp;$\\angle B$&nbsp;bù nhau. Nếu&nbsp;$\\angle A = 72^{\\circ}$&nbsp;thì số đo góc&nbsp;$\\angle B$&nbsp;là:", options: ["A. $18^{\\circ}$", "B. $108^{\\circ}$", "C. $28^{\\circ}$", "D. $118^{\\circ}$"], correct_idx: 1, explain: "Hai góc bù nhau có tổng số đo bằng&nbsp;$180^{\\circ}$. Vậy&nbsp;$\\angle B = 180^{\\circ} - 72^{\\circ} = 108^{\\circ}$. Chọn B." },
{ q_title: "Câu 9", q_content: "Cho điểm&nbsp;$O$&nbsp;thuộc đường thẳng&nbsp;$xy$. Lấy điểm&nbsp;$A \\in Ox$, điểm&nbsp;$B \\in Oy$. Số đoạn thẳng có trên hình vẽ là:", options: ["A. $1$", "B. $2$", "C. $3$", "D. Vô số"], correct_idx: 2, explain: "Hình vẽ gồm 3 điểm phân biệt thẳng hàng là A, O, B. Cứ 2 điểm tạo thành 1 đoạn thẳng, nên có 3 đoạn thẳng là: OA, OB và AB. Chọn C." },
{ q_title: "Câu 10", q_content: "Trong một lớp học có&nbsp;$40$&nbsp;học sinh, chắc chắn có ít nhất bao nhiêu học sinh sinh cùng một tháng?", options: ["A. $2$", "B. $3$", "C. $4$", "D. $5$"], correct_idx: 2, explain: "Có 12 tháng trong năm (12 chiếc lồng). Có 40 học sinh (40 con thỏ). Ta có&nbsp;$40 = 12 \\cdot 3 + 4$. Theo Nguyên lý Dirichlet, có ít nhất&nbsp;$3+1=4$&nbsp;học sinh sinh cùng tháng. Chọn C." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về phương trình nghiệm nguyên&nbsp;$xy - 3x + y = 7$:<br>(I) Phương trình trên có thể đưa về dạng&nbsp;$(x+1)(y-3) = 10$.<br>(II) Phương trình này không có cặp nghiệm nào mà&nbsp;$x$&nbsp;và&nbsp;$y$&nbsp;đều là số nguyên dương.<br>(III) Có đúng 4 cặp số nguyên&nbsp;$(x, y)$&nbsp;thỏa mãn phương trình.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 0, explain: "(I) $x(y-3) + (y-3) + 3 = 7 \\Rightarrow (x+1)(y-3) = 4$, đề ghi bằng 10 là Sai. (II) Ư(4) có 6 ước, ta có cặp $(x+1)=4, (y-3)=1 \\Rightarrow x=3, y=4$ đều nguyên dương, vậy mệnh đề cấm nguyên dương là Sai. (III) 4 có 6 ước nên có 6 cặp nghiệm, không phải 4 (Sai). Cả 3 đều sai. Chọn A." },
{ q_title: "Câu 12", q_content: "Cho hai góc&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$&nbsp;kề nhau, biết&nbsp;$\\angle xOz = 100^{\\circ}$&nbsp;và&nbsp;$\\angle xOy = 40^{\\circ}$. Xét 3 mệnh đề sau:<br>(I) Số đo góc&nbsp;$\\angle yOz$&nbsp;bằng&nbsp;$60^{\\circ}$.<br>(II) Tia&nbsp;$Oy$&nbsp;nằm giữa hai tia&nbsp;$Ox$&nbsp;và&nbsp;$Oz$.<br>(III) Nếu vẽ tia&nbsp;$Ot$&nbsp;là tia phân giác của&nbsp;$\\angle yOz$&nbsp;thì&nbsp;$\\angle xOt = 70^{\\circ}$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 3, explain: "Góc xOy và yOz kề nhau nên chúng có cạnh chung là Oy, tức là Oy nằm giữa Ox và Oz. Do đó (II) Đúng. $\\angle yOz = 100^{\\circ} - 40^{\\circ} = 60^{\\circ}$ nên (I) Đúng. Ot là phân giác yOz nên $\\angle yOt = 30^{\\circ}$. Khi đó $\\angle xOt = \\angle xOy + \\angle yOt = 40 + 30 = 70^{\\circ}$ nên (III) Đúng. Cả 3 mệnh đề đều đúng. Chọn D." }
],

{ t_title: "Câu 1 (2,0 điểm)", t_content: "Tính hợp lý giá trị biểu thức:<div class='mt-6'>a) &nbsp; $A = 0,25 \\cdot \\dfrac{7}{15} - \\dfrac{1}{4} \\cdot \\dfrac{-8}{15} + 2,75$</div><div class='mt-6'>b) &nbsp; $B = \\left( 1 - \\dfrac{1}{2^2} \\right) \\cdot \\left( 1 - \\dfrac{1}{3^2} \\right) \\cdot \\left( 1 - \\dfrac{1}{4^2} \\right) \\cdot \\dots \\cdot \\left( 1 - \\dfrac{1}{50^2} \\right)$</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Biểu thức có sự xuất hiện của số thập phân $0,25$ và phân số $\\dfrac{1}{4}$. Thực chất chúng là một!<br>- <b>How:</b> Đổi $0,25 = \\dfrac{1}{4}$. Sau đó áp dụng tính chất phân phối để kéo $\\dfrac{1}{4}$ ra ngoài làm nhân tử chung.<br>- <b>Where:</b> Chú ý phép trừ và dấu âm ở phân số thứ hai: $- \\left( \\dfrac{-8}{15} \\right) = + \\dfrac{8}{15}$.<br><b>Ý b:</b><br>- <b>What:</b> Đây là một chuỗi phép nhân các ngoặc chứa bình phương. Tuyệt đối không quy đồng từng cái!<br>- <b>How:</b> Đưa biểu thức tổng quát trong ngoặc về dạng: $1 - \\dfrac{1}{n^2} = \\dfrac{n^2 - 1}{n^2}$.<br>- <b>Why:</b> Hằng đẳng thức sẽ giúp tách tử số thành tích của 2 số tự nhiên liên tiếp: $n^2 - 1 = (n-1)(n+1)$. Việc tách tử và mẫu thành các dãy nhân sẽ tạo ra cơ hội triệt tiêu chéo liên hoàn.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$A$:</b></li><li class='ml-4'>Đổi số thập phân ra phân số: $0,25 = \\dfrac{1}{4}$. Ta viết lại biểu thức:</li><li class='ml-8'>$A = \\dfrac{1}{4} \\cdot \\dfrac{7}{15} - \\dfrac{1}{4} \\cdot \\dfrac{-8}{15} + 2,75$</li><li class='ml-4'>Đặt nhân tử chung cho 2 hạng tử đầu:</li><li class='ml-8'>$A = \\dfrac{1}{4} \\cdot \\left( \\dfrac{7}{15} - \\dfrac{-8}{15} \\right) + 2,75$</li><li class='ml-4'>Đổi dấu phép trừ thành cộng số đối:</li><li class='ml-8'>$A = \\dfrac{1}{4} \\cdot \\left( \\dfrac{7}{15} + \\dfrac{8}{15} \\right) + 2,75$</li><li class='ml-8'>$A = \\dfrac{1}{4} \\cdot \\left( \\dfrac{15}{15} \\right) + 2,75$</li><li class='ml-8'>$A = 0,25 \\cdot 1 + 2,75$</li><li class='ml-8'>$A = 3$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $A = 3$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$B$:</b></li><li class='ml-4'>Ta biến đổi phần tử tổng quát trong dấu ngoặc:</li><li class='ml-8'>$1 - \\dfrac{1}{n^2} = \\dfrac{n^2 - 1}{n^2} = \\dfrac{(n-1)(n+1)}{n \\cdot n}$</li><li class='ml-4'>Áp dụng vào biểu thức $B$, ta viết lại thành các phân số cụ thể:</li><li class='ml-8'>$B = \\dfrac{1 \\cdot 3}{2 \\cdot 2} \\cdot \\dfrac{2 \\cdot 4}{3 \\cdot 3} \\cdot \\dfrac{3 \\cdot 5}{4 \\cdot 4} \\cdot \\dots \\cdot \\dfrac{49 \\cdot 51}{50 \\cdot 50}$</li><li class='ml-4'>Sắp xếp lại tử số và mẫu số thành hai nhóm riêng biệt để dễ dàng triệt tiêu:</li><li class='ml-8'>$B = \\dfrac{(1 \\cdot 2 \\cdot 3 \\cdot \\dots \\cdot 49) \\cdot (3 \\cdot 4 \\cdot 5 \\cdot \\dots \\cdot 51)}{(2 \\cdot 3 \\cdot 4 \\cdot \\dots \\cdot 50) \\cdot (2 \\cdot 3 \\cdot 4 \\cdot \\dots \\cdot 50)}$</li><li class='ml-4'>Tiến hành triệt tiêu các thừa số chung ở cả tử và mẫu:</li><li class='ml-8'>- Nhóm bên trái triệt tiêu từ $2$ đến $49$, trên tử còn $1$, dưới mẫu còn $50$.</li><li class='ml-8'>- Nhóm bên phải triệt tiêu từ $3$ đến $50$, trên tử còn $51$, dưới mẫu còn $2$.</li><li class='ml-4'>Ta còn lại:</li><li class='ml-8'>$B = \\dfrac{1}{50} \\cdot \\dfrac{51}{2} = \\dfrac{51}{100}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $B = \\dfrac{51}{100}$.</li>" },
{ t_title: "Câu 2 (2,0 điểm)", t_content: "Tìm&nbsp;$x, y$, biết:<div class='mt-6'>a) &nbsp; $\\left( \\dfrac{1}{2} + \\dfrac{1}{3} + \\dfrac{1}{4} + \\dots + \\dfrac{1}{50} \\right) \\cdot x = \\dfrac{1}{49} + \\dfrac{2}{48} + \\dfrac{3}{47} + \\dots + \\dfrac{48}{2} + \\dfrac{49}{1}$</div><div class='mt-6'>b) &nbsp; $xy - 2x + 5y = 14$&nbsp;(với&nbsp;$x, y \\in \\mathbb{Z}$)</div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>Where:</b> Hãy quan sát vế phải $\\text{VP} = \\dfrac{1}{49} + \\dfrac{2}{48} + \\dots + \\dfrac{49}{1}$. Tổng của Tử số và Mẫu số ở mỗi phân số này bằng bao nhiêu? (Đều bằng $50$).<br>- <b>How:</b> Phân số cuối cùng $\\dfrac{49}{1} = 49$. Ta hãy xé số $49$ này thành 49 con số $1$.<br>- Lấy 48 con số $1$ chia đều cho 48 phân số đầu tiên: $\\left( \\dfrac{1}{49} + 1 \\right) + \\left( \\dfrac{2}{48} + 1 \\right) + \\dots = \\dfrac{50}{49} + \\dfrac{50}{48} + \\dots$<br>- Còn dư lại 1 con số $1$, ta viết nó thành $\\dfrac{50}{50}$. Khi đó vế phải sẽ xuất hiện nhân tử chung là $50$, bên trong ngoặc sẽ giống hệt vế trái!<br><b>Ý b:</b><br>- <b>What:</b> Phương trình Diophante dạng bậc nhất hai ẩn.<br>- <b>How:</b> Nhóm 2 hạng tử đầu tiên $xy - 2x$ để rút $x$ ra ngoài được $x(y-2)$.<br>- <b>Where:</b> Hạng tử thứ 3 là $+5y$. Ta ép nó tạo ra $(y-2)$ bằng cách viết $5(y-2) = 5y - 10$. Vậy ta đã tự mượn số $-10$ ở vế trái, nên vế phải cũng phải trừ đi $10$ để cân bằng.", solution: "<li><b>a) Tìm&nbsp;$x$&nbsp;trong chuỗi phân số ẩn:</b></li><li class='ml-4'>Ta xét riêng vế phải (VP) của phương trình:</li><li class='ml-8'>$\\text{VP} = \\dfrac{1}{49} + \\dfrac{2}{48} + \\dfrac{3}{47} + \\dots + \\dfrac{48}{2} + \\dfrac{49}{1}$</li><li class='ml-4'>Tách phân số cuối cùng $\\dfrac{49}{1} = 48 + 1$. Ta lấy $48$ đơn vị chia đều (cộng $1$) cho $48$ phân số đầu tiên, giữ lại $1$ đơn vị ở cuối:</li><li class='ml-8'>$\\text{VP} = \\left( \\dfrac{1}{49} + 1 \\right) + \\left( \\dfrac{2}{48} + 1 \\right) + \\dots + \\left( \\dfrac{48}{2} + 1 \\right) + 1$</li><li class='ml-4'>Thực hiện quy đồng mẫu số trong từng dấu ngoặc:</li><li class='ml-8'>$\\text{VP} = \\dfrac{1+49}{49} + \\dfrac{2+48}{48} + \\dots + \\dfrac{48+2}{2} + 1$</li><li class='ml-8'>$\\text{VP} = \\dfrac{50}{49} + \\dfrac{50}{48} + \\dots + \\dfrac{50}{2} + \\dfrac{50}{50}$ (Viết số $1$ cuối cùng thành $\\dfrac{50}{50}$)</li><li class='ml-4'>Sắp xếp lại thứ tự các mẫu số từ bé đến lớn và đặt số $50$ làm nhân tử chung:</li><li class='ml-8'>$\\text{VP} = 50 \\cdot \\left( \\dfrac{1}{2} + \\dfrac{1}{3} + \\dfrac{1}{4} + \\dots + \\dfrac{1}{49} + \\dfrac{1}{50} \\right)$</li><li class='ml-4'>Thay VP trở lại phương trình gốc ban đầu, ta có:</li><li class='ml-8'>$x \\cdot \\left( \\dfrac{1}{2} + \\dfrac{1}{3} + \\dots + \\dfrac{1}{50} \\right) = 50 \\cdot \\left( \\dfrac{1}{2} + \\dfrac{1}{3} + \\dots + \\dfrac{1}{50} \\right)$</li><li class='ml-4'>Triệt tiêu cụm biểu thức trong ngoặc ở cả hai vế (vì tổng các phân số dương luôn khác $0$), ta thu được:</li><li class='ml-8'>$x = 50$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = 50$.</li><li><b>b) Tìm&nbsp;$x, y \\in \\mathbb{Z}$:</b></li><li class='ml-4'>Ta có phương trình: $xy - 2x + 5y = 14$</li><li class='ml-4'>Nhóm 2 hạng tử đầu và rút $x$: $x(y - 2) + 5y = 14$</li><li class='ml-4'>Trừ $10$ vào cả hai vế để ép tạo nhân tử: $x(y - 2) + 5y - 10 = 14 - 10$</li><li class='ml-4'>Nhóm hạng tử và rút $5$ ra ngoài: $x(y - 2) + 5(y - 2) = 4$</li><li class='ml-4'>Rút nhân tử chung: $(x + 5)(y - 2) = 4$</li><li class='ml-4'>Vì $x, y \\in \\mathbb{Z}$ nên $(x + 5)$ và $(y - 2)$ phải là Ước của $4$. Tập hợp Ư(4) = $\\{-4; -2; -1; 1; 2; 4\\}$. Ta lập bảng:</li><li class='ml-8'>+ TH1: $y - 2 = 1 \\Rightarrow y = 3$. Khi đó $x + 5 = 4 \\Rightarrow x = -1$.</li><li class='ml-8'>+ TH2: $y - 2 = 2 \\Rightarrow y = 4$. Khi đó $x + 5 = 2 \\Rightarrow x = -3$.</li><li class='ml-8'>+ TH3: $y - 2 = 4 \\Rightarrow y = 6$. Khi đó $x + 5 = 1 \\Rightarrow x = -4$.</li><li class='ml-8'>+ TH4: $y - 2 = -1 \\Rightarrow y = 1$. Khi đó $x + 5 = -4 \\Rightarrow x = -9$.</li><li class='ml-8'>+ TH5: $y - 2 = -2 \\Rightarrow y = 0$. Khi đó $x + 5 = -2 \\Rightarrow x = -7$.</li><li class='ml-8'>+ TH6: $y - 2 = -4 \\Rightarrow y = -2$. Khi đó $x + 5 = -1 \\Rightarrow x = -6$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Các cặp $(x; y)$ thỏa mãn là $(-1; 3), (-3; 4), (-4; 6), (-9; 1), (-7; 0), (-6; -2)$.</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "(Bài toán Tần suất Y học) Khảo sát y học cho thấy, trái tim của một người bình thường đập khoảng&nbsp;$75$&nbsp;nhịp trong một phút. Với mỗi nhịp đập, tim bơm được khoảng&nbsp;$70\\text{ ml}$&nbsp;máu đi nuôi cơ thể.<div class='mt-6'>a) Hỏi trong&nbsp;$1$&nbsp;ngày ($24$ giờ), tim của người đó đã bơm được bao nhiêu lít máu?</div><div class='mt-6'>b) Nếu một người tham gia hiến máu nhân đạo và hiến&nbsp;$350\\text{ ml}$&nbsp;máu, thì tim của người đó cần đập bao nhiêu nhịp để bơm đủ lượng máu tương đương với phần đã hiến?</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Bài toán tính tổng thể tích máu thông qua chuỗi phép nhân liên tiếp: Tần suất $\\times$ Thể tích 1 nhịp $\\times$ Thời gian.<br>- <b>Where:</b> Cạm bẫy nằm ở việc đổi đơn vị. Tần suất theo \"phút\", nhưng thời gian hỏi là \"1 ngày\". Thể tích cho theo \"ml\" nhưng kết quả hỏi theo \"lít\".<br>- <b>How:</b> <br>&nbsp; + Bước 1: Tính tổng số phút trong 1 ngày $\\Rightarrow$ Tính tổng số nhịp đập.<br>&nbsp; + Bước 2: Nhân số nhịp đập với $70\\text{ ml}$ để ra tổng thể tích. Cuối cùng chia $1000$ để đổi ra lít.<br><b>Ý b:</b><br>- <b>What:</b> Đây là bài toán ngược.<br>- <b>How:</b> Lấy tổng thể tích cần có chia cho thể tích của 1 nhịp đập để tìm ra số nhịp.", solution: "<li><b>a) Tính thể tích máu bơm trong 1 ngày:</b></li><li class='ml-4'>Đổi đơn vị thời gian: $1 \\text{ ngày} = 24 \\text{ giờ} = 24 \\cdot 60 = 1440 \\text{ phút}$.</li><li class='ml-4'>Tổng số nhịp tim đập trong $1$ ngày là:</li><li class='ml-8'>$1440 \\cdot 75 = 108.000$&nbsp;(nhịp).</li><li class='ml-4'>Tổng thể tích máu mà tim bơm được trong $1$ ngày tính bằng $\\text{ml}$ là:</li><li class='ml-8'>$108.000 \\cdot 70 = 7.560.000\\text{ (ml)}$.</li><li class='ml-4'>Đổi đơn vị sang lít ($1 \\text{ lít} = 1000 \\text{ ml}$):</li><li class='ml-8'>$7.560.000 : 1000 = 7.560\\text{ (lít)}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Trong 1 ngày, tim người đó đã bơm được khoảng $7.560$ lít máu.</li><li><b>b) Tính số nhịp đập tương ứng:</b></li><li class='ml-4'>Để bơm được lượng máu bằng với lượng máu đã hiến là $350\\text{ ml}$, tim của người đó cần thực hiện số nhịp đập là:</li><li class='ml-8'>$350 : 70 = 5$&nbsp;(nhịp).</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Tim cần đập $5$ nhịp để bơm đủ $350\\text{ ml}$ máu.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Trên cùng một nửa mặt phẳng bờ chứa tia&nbsp;$Ox$, vẽ hai tia&nbsp;$Oy$&nbsp;và&nbsp;$Oz$&nbsp;sao cho góc&nbsp;$\\angle xOy = 130^{\\circ}$, góc&nbsp;$\\angle xOz = 40^{\\circ}$.<div class='mt-6'>a) Tia&nbsp;$Oz$&nbsp;có nằm giữa hai tia&nbsp;$Ox$&nbsp;và&nbsp;$Oy$&nbsp;không? Tính số đo góc&nbsp;$\\angle yOz$.</div><div class='mt-6'>b) Vẽ tia&nbsp;$Ot$&nbsp;là tia đối của tia&nbsp;$Oz$. Tính số đo góc&nbsp;$\\angle yOt$.</div><div class='mt-6'>c) Vẽ tia&nbsp;$Om$&nbsp;là tia phân giác của góc&nbsp;$\\angle yOt$. Tính số đo góc&nbsp;$\\angle xOm$.</div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> So sánh vị trí 3 tia chung gốc trên cùng nửa mặt phẳng.<br>- <b>How:</b> So sánh số đo góc để tìm tia nằm giữa. Góc nhỏ $\\angle xOz < \\angle xOy \\Rightarrow Oz$ nằm giữa. Dùng phép trừ tính góc còn lại.<br><b>Ý b:</b><br>- <b>What:</b> Tia $Ot$ là tia đối của tia $Oz$. Tia đối kết hợp với tia gốc sẽ tạo ra một góc bẹt mới ($180^{\\circ}$).<br>- <b>How:</b> Góc $\\angle zOt$ là góc bẹt. Tia $Oy$ nằm giữa $\\angle zOt$, do đó $\\angle yOt$ và $\\angle yOz$ là hai góc kề bù. Lấy $180^{\\circ}$ trừ đi $\\angle yOz$ (vừa tính ở câu a).<br><b>Ý c:</b><br>- <b>What:</b> Tia phân giác $Om$ chia đôi góc $\\angle yOt$. Tính được $\\angle yOm$.<br>- <b>How:</b> Để tính $\\angle xOm$, hãy xem tia $Oy$ đang nằm giữa $Ox$ và $Om$. Ta dùng phép cộng góc liên tiếp.", solution: "<li><b>a) Tia nằm giữa và tính&nbsp;$\\angle yOz$:</b></li><li class='ml-4'>Trên cùng một nửa mặt phẳng có bờ chứa tia $Ox$, ta có hai góc: $\\angle xOz = 40^{\\circ}$ và $\\angle xOy = 130^{\\circ}$.</li><li class='ml-4'>Vì $\\angle xOz < \\angle xOy$ ($40^{\\circ} < 130^{\\circ}$) nên <b>tia&nbsp;$Oz$&nbsp;nằm giữa hai tia&nbsp;$Ox$&nbsp;và&nbsp;$Oy$</b>.</li><li class='ml-4'>Khi đó ta có công thức cộng góc:</li><li class='ml-8'>$\\angle xOz + \\angle yOz = \\angle xOy$</li><li class='ml-8'>$40^{\\circ} + \\angle yOz = 130^{\\circ}$</li><li class='ml-8'>$\\angle yOz = 130^{\\circ} - 40^{\\circ} = 90^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $\\angle yOz = 90^{\\circ}$.</li><li><b>b) Tính số đo góc&nbsp;$\\angle yOt$:</b></li><li class='ml-4'>Vì tia $Ot$ là tia đối của tia $Oz$ nên góc $\\angle zOt$ tạo thành là góc bẹt ($180^{\\circ}$).</li><li class='ml-4'>Tia $Oy$ chia mặt phẳng và tạo với hai tia đối $Oz, Ot$ hai góc kề bù.</li><li class='ml-4'>Ta có hệ thức:</li><li class='ml-8'>$\\angle yOz + \\angle yOt = 180^{\\circ}$</li><li class='ml-8'>$90^{\\circ} + \\angle yOt = 180^{\\circ}$</li><li class='ml-8'>$\\angle yOt = 180^{\\circ} - 90^{\\circ} = 90^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $\\angle yOt = 90^{\\circ}$.</li><li><b>c) Tính số đo góc&nbsp;$\\angle xOm$:</b></li><li class='ml-4'>Vì tia $Om$ là tia phân giác của góc $\\angle yOt$ nên:</li><li class='ml-8'>$\\angle yOm = \\angle tOm = \\dfrac{\\angle yOt}{2} = \\dfrac{90^{\\circ}}{2} = 45^{\\circ}$.</li><li class='ml-4'>Xét thứ tự các tia trên nửa mặt phẳng: Tia $Oz$ nằm giữa $Ox, Oy$; Tia $Oy$ nằm giữa $Oz, Ot$; Tia $Om$ nằm trong góc $yOt$. Suy ra thứ tự các tia trải dài từ $Ox$ sang $Ot$ là: $Ox \\rightarrow Oz \\rightarrow Oy \\rightarrow Om \\rightarrow Ot$.</li><li class='ml-4'>Do đó, tia $Oy$ nằm giữa hai tia $Ox$ và $Om$. Ta có công thức cộng góc:</li><li class='ml-8'>$\\angle xOm = \\angle xOy + \\angle yOm$</li><li class='ml-8'>$\\angle xOm = 130^{\\circ} + 45^{\\circ} = 175^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: $\\angle xOm = 175^{\\circ}$.</li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Nguyên lý Dirichlet) Lớp 6A có&nbsp;$40$&nbsp;học sinh. Chứng minh rằng trong lớp 6A, chắc chắn có ít nhất&nbsp;$4$&nbsp;bạn học sinh có cùng tháng sinh.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh tồn tại ít nhất 4 học sinh có chung một tháng sinh.<br>- <b>Why:</b> Một năm có bao nhiêu tháng? (Có 12 tháng). Đây chính là 12 \"chiếc lồng\".<br>- <b>How:</b> Đề cho 40 học sinh, đóng vai trò là 40 \"con thỏ\".<br>- Nhét 40 thỏ vào 12 lồng. Thực hiện phép chia có dư: $40 : 12 = 3$ (dư 4). Áp dụng định lý Dirichlet mở rộng.", solution: "<li>Một năm có tất cả $12$ tháng (từ tháng 1 đến tháng 12).</li><li>Ta coi $12$ tháng này tương ứng với $12$ <b>chiếc lồng</b>.</li><li>Lớp 6A có $40$ <b>học sinh</b>, mỗi học sinh tương ứng với $1$ <b>con thỏ</b>.</li><li>Ta thực hiện phép chia tổng số thỏ cho số lồng: $40 = 12 \\cdot 3 + 4$</li><li>Theo Nguyên lý Dirichlet, khi phân phối $40$ con thỏ vào $12$ chiếc lồng, thì chắc chắn phải tồn tại ít nhất $1$ lồng chứa số thỏ từ: $3 + 1 = 4$ (con thỏ trở lên).</li><li>Áp dụng vào bối cảnh bài toán, điều này có nghĩa là trong $40$ học sinh bất kỳ, luôn tồn tại ít nhất $4$ học sinh có sinh nhật rơi vào <b>cùng một tháng</b>.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Lớp 6A chắc chắn có ít nhất 4 bạn sinh cùng tháng. (Điều phải chứng minh).</li>" },
{ t_title: "Câu 6 (2,0 điểm)", t_content: "(Chứng minh Phân số Tối giản) Chứng minh rằng với mọi số tự nhiên&nbsp;$n$, phân số sau luôn là phân số tối giản:<br>$P = \\dfrac{18n + 5}{15n + 4}$", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Chứng minh Ước chung lớn nhất ($d$) của tử và mẫu bằng $1$.<br>- <b>How:</b> Gọi $d = \\text{ƯCLN}(18n + 5, 15n + 4)$. Ta cần khử đi biến $n$.<br>- <b>Where:</b> Tử có hệ số $18$, Mẫu có hệ số $15$. Ta tìm BCNN$(18, 15) = 90$.<br>- Vậy ta cần nhân biểu thức tử với $5$ và nhân biểu thức mẫu với $6$ để đều tạo ra hệ số $90n$. Sau đó trừ đi là biến $n$ bốc hơi hoàn toàn.", solution: "<li>Gọi $d = \\text{ƯCLN}(18n + 5, 15n + 4)$ với $d \\in \\mathbb{N}^*$.</li><li>Khi đó, tử số và mẫu số đều phải chia hết cho $d$:</li><li class='ml-4'>$(18n + 5) \\vdots d \\Rightarrow 5 \\cdot (18n + 5) \\vdots d \\Rightarrow (90n + 25) \\vdots d$</li><li class='ml-4'>$(15n + 4) \\vdots d \\Rightarrow 6 \\cdot (15n + 4) \\vdots d \\Rightarrow (90n + 24) \\vdots d$</li><li>Lấy biểu thức thứ nhất trừ đi biểu thức thứ hai, hiệu của chúng cũng phải chia hết cho $d$:</li><li class='ml-4'>$[(90n + 25) - (90n + 24)] \\vdots d$</li><li class='ml-4'>$\\Rightarrow 1 \\vdots d$</li><li>Vì $d$ là số nguyên dương và $1$ chia hết cho $d$ nên bắt buộc: $d = 1$</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Vì ƯCLN của tử và mẫu luôn bằng $1$, nên phân số $P = \\dfrac{18n + 5}{15n + 4}$ luôn là phân số tối giản với mọi số tự nhiên $n$.</li>" }
]
});
</script>

{ q_title: "Câu 1", q_content: "Trong số học (Modulo), số dư của phép chia&nbsp;$10^{100}$&nbsp;cho&nbsp;$3$&nbsp;là:", options: ["A. $0$", "B. $1$", "C. $2$", "D. $3$"], correct_idx: 1, explain: "Ta có số dư của 10 chia 3 là 1, tức là&nbsp;$10 \\equiv 1 \\pmod 3$. Suy ra&nbsp;$10^{100} \\equiv 1^{100} \\equiv 1 \\pmod 3$. Vậy số dư là 1. Chọn B." },
{ q_title: "Câu 2", q_content: "Khi khảo sát về nhiệt độ bảo quản thực phẩm trong các tủ đông của siêu thị (đơn vị: $^\\circ$C), dữ liệu nào sau đây là KHÔNG hợp lý?", options: ["A. $-18$", "B. $-5$", "C. $0$", "D. $100$"], correct_idx: 3, explain: "Nhiệt độ tủ đông để bảo quản thực phẩm phải ở mức thấp (âm độ hoặc gần 0). Nhiệt độ&nbsp;$100^{\\circ}\\text{C}$&nbsp;là nhiệt độ nước sôi, hoàn toàn vô lý đối với tủ đông. Chọn D." },
{ q_title: "Câu 3", q_content: "Gieo một con xúc xắc cân đối&nbsp;$50$&nbsp;lần. Nếu xác suất thực nghiệm của sự kiện 'Xuất hiện mặt có số chấm là số nguyên tố' là&nbsp;$40\\%$, thì số lần xuất hiện mặt KHÔNG PHẢI số nguyên tố là:", options: ["A. $20$&nbsp;lần", "B. $30$&nbsp;lần", "C. $40$&nbsp;lần", "D. $60$&nbsp;lần"], correct_idx: 1, explain: "Tỉ lệ xuất hiện mặt không phải số nguyên tố là&nbsp;$100\\% - 40\\% = 60\\%$. Số lần tương ứng là:&nbsp;$50 \\cdot 60\\% = 30$&nbsp;lần. Chọn B." },
{ q_title: "Câu 4", q_content: "Kết quả của phép tính&nbsp;$(-1)^{2024} + (-1)^{2025}$&nbsp;là:", options: ["A. $2$", "B. $-2$", "C. $0$", "D. $1$"], correct_idx: 2, explain: "Lũy thừa chẵn của -1 bằng 1, lũy thừa lẻ của -1 bằng -1. Ta có:&nbsp;$1 + (-1) = 0$. Chọn C." },
{ q_title: "Câu 5", q_content: "Trên bản đồ có tỉ lệ xích&nbsp;$1 : 500.000$, hai thành phố cách nhau&nbsp;$24\\text{ cm}$. Khoảng cách thực tế giữa hai thành phố đó là:", options: ["A. $120\\text{ km}$", "B. $12\\text{ km}$", "C. $1200\\text{ km}$", "D. $1,2\\text{ km}$"], correct_idx: 0, explain: "Khoảng cách thực tế là:&nbsp;$24 \\cdot 500.000 = 12.000.000\\text{ cm}$. Đổi ra ki-lô-mét:&nbsp;$12.000.000 : 100.000 = 120\\text{ km}$. Chọn A." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$99,999$&nbsp;đến chữ số thập phân thứ hai, ta được:", options: ["A. $99,99$", "B. $100,00$", "C. $100,0$", "D. $99,90$"], correct_idx: 1, explain: "Chữ số hàng phần nghìn là&nbsp;$9 \\ge 5$&nbsp;nên cộng thêm 1 vào hàng phần trăm ($9+1=10$), nhớ liên tiếp lên các hàng trước. Kết quả là&nbsp;$100,00$. Chọn B." },
{ q_title: "Câu 7", q_content: "Một cửa hàng bán một sản phẩm và thu được tiền lãi bằng&nbsp;$25\\%$&nbsp;giá bán. Hỏi cửa hàng đó lãi bao nhiêu phần trăm so với giá vốn?", options: ["A. $25\\%$", "B. $20\\%$", "C. $33,33\\%$", "D. $30\\%$"], correct_idx: 2, explain: "Coi Giá bán là 100 phần, Lãi là 25 phần. Vậy Giá vốn là&nbsp;$100 - 25 = 75$&nbsp;phần. Tỉ lệ lãi so với vốn là:&nbsp;$25 / 75 = 1/3 \\approx 33,33\\%$. Chọn C." },
{ q_title: "Câu 8", q_content: "Một hình lục giác đều có bao nhiêu trục đối xứng?", options: ["A. $3$", "B. $6$", "C. $1$", "D. Vô số"], correct_idx: 1, explain: "Hình lục giác đều có 6 trục đối xứng (3 đường thẳng đi qua các cặp đỉnh đối diện và 3 đường thẳng đi qua trung điểm các cặp cạnh đối diện). Chọn B." },
{ q_title: "Câu 9", q_content: "Hai đường thẳng song song&nbsp;$a$&nbsp;và&nbsp;$b$&nbsp;bị cắt bởi cát tuyến&nbsp;$c$. Nếu một góc đồng vị bằng&nbsp;$75^{\\circ}$, thì góc so le trong tương ứng của nó bằng:", options: ["A. $105^{\\circ}$", "B. $75^{\\circ}$", "C. $15^{\\circ}$", "D. $180^{\\circ}$"], correct_idx: 1, explain: "Trong hai đường thẳng song song, các góc đồng vị bằng nhau và các góc so le trong cũng bằng nhau. Nếu góc đồng vị là&nbsp;$75^{\\circ}$&nbsp;thì góc so le trong tương ứng cũng bằng&nbsp;$75^{\\circ}$. Chọn B." },
{ q_title: "Câu 10", q_content: "Có&nbsp;$13$&nbsp;người tham gia một buổi tiệc. Khẳng định nào sau đây chắc chắn đúng theo Nguyên lý Dirichlet?", options: ["A. Có ít nhất 2 người sinh cùng tháng.", "B. Có ít nhất 2 người sinh cùng ngày.", "C. Có ít nhất 3 người sinh cùng tháng.", "D. Tất cả đều sinh khác tháng."], correct_idx: 0, explain: "Một năm có 12 tháng (12 chiếc lồng). Có 13 người (13 con thỏ). Theo nguyên lý Dirichlet, nhốt 13 thỏ vào 12 lồng chắc chắn có 1 lồng chứa ít nhất 2 thỏ, tức là có ít nhất 2 người sinh cùng tháng. Chọn A." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về biểu thức&nbsp;$A = 5^{2024} + 2$:<br>(I) Chữ số tận cùng của&nbsp;$A$&nbsp;là&nbsp;$7$.<br>(II) Biểu thức&nbsp;$A$&nbsp;chia hết cho&nbsp;$3$.<br>(III) Biểu thức&nbsp;$A$&nbsp;là một số nguyên tố.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Lũy thừa của 5 luôn tận cùng là 5, cộng thêm 2 ra 7 (Đúng). (II) $5 \\equiv -1 \\pmod 3 \\Rightarrow 5^{2024} \\equiv (-1)^{2024} = 1 \\pmod 3$. Suy ra $A \\equiv 1+2 = 3 \\equiv 0 \\pmod 3$ (Đúng). (III) Vì A > 3 và chia hết cho 3 nên A là hợp số (Sai). Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Xét 3 mệnh đề sau về Hình học suy luận (Tiên đề Euclid):<br>(I) Nếu hai đường thẳng song song bị cắt bởi một cát tuyến thì hai góc trong cùng phía bù nhau.<br>(II) Nếu góc&nbsp;$\\angle A = 50^{\\circ}$&nbsp;và góc&nbsp;$\\angle B = 50^{\\circ}$&nbsp;thì chúng là hai góc so le trong.<br>(III) Trong mặt phẳng, hai đường thẳng phân biệt cùng vuông góc với một đường thẳng thứ ba thì chúng song song với nhau.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Đúng, tính chất hai đường thẳng song song. (II) Sai, bằng nhau chưa đủ, phải thỏa mãn điều kiện về vị trí nằm so le qua cát tuyến và kẹp giữa hai đường thẳng. (III) Đúng. Có 2 mệnh đề đúng. Chọn C." }

tu_luan: [
{ t_title: "Câu 1 (2,0 điểm)", t_content: "Tính hợp lý giá trị biểu thức:<br>$M = \\dfrac{3}{2 \\cdot 5} + \\dfrac{3}{5 \\cdot 8} + \\dfrac{3}{8 \\cdot 11} + \\dots + \\dfrac{3}{2024 \\cdot 2027}$", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Một dãy tổng các phân số có quy luật cách đều ở dưới mẫu số.<br>- <b>Why:</b> Hãy tính khoảng cách giữa hai thừa số ở dưới mẫu: $5 - 2 = 3$, $8 - 5 = 3$. Khoảng cách là $3$. Hãy nhìn lên tử số, tử số hiện tại cũng chính là số $3$. Nghĩa là Tử số đã \"khớp\" hoàn hảo với khoảng cách ở Mẫu số.<br>- <b>How:</b> Áp dụng ngay công thức sai phân: $\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$ để bung chuỗi, không cần nhân chia thêm hệ số nào bên ngoài.", solution: "<li>Do tử số bằng đúng hiệu của hai thừa số ở mẫu số, ta áp dụng công thức sai phân tách trực tiếp từng phân số thành hiệu:</li><li class='ml-4'>$M = \\left( \\dfrac{1}{2} - \\dfrac{1}{5} \\right) + \\left( \\dfrac{1}{5} - \\dfrac{1}{8} \\right) + \\left( \\dfrac{1}{8} - \\dfrac{1}{11} \\right) + \\dots + \\left( \\dfrac{1}{2024} - \\dfrac{1}{2027} \\right)$</li><li>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở giữa chuỗi:</li><li class='ml-4'>$M = \\dfrac{1}{2} - \\dfrac{1}{2027}$</li><li>Quy đồng mẫu số chung là $4054$ và tính kết quả:</li><li class='ml-4'>$M = \\dfrac{2027}{4054} - \\dfrac{2}{4054}$</li><li class='ml-4'>$M = \\dfrac{2025}{4054}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $M = \\dfrac{2025}{4054}$.</li>" },
{ t_title: "Câu 2 (2,5 điểm)", t_content: "Giải các bài toán Đại số bản lề lớp 7:<div class='mt-6'>a) Tìm&nbsp;$x, y$&nbsp;biết:&nbsp;$\\dfrac{x}{5} = \\dfrac{y}{3}$&nbsp;và&nbsp;$2x - 3y = 10$.</div><div class='mt-6'>b) Tìm&nbsp;$x$&nbsp;bằng cách khai triển đa thức:&nbsp;$(x - 2)(x + 5) - x(x + 3) = 15$.</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Dạng toán tìm ẩn số dựa vào dãy tỉ số bằng nhau.<br>- <b>How:</b> Đề cho phương trình chứa $2x$ và $3y$. Ta phải nhân cả tử và mẫu của phân số thứ nhất với $2$, phân số thứ hai với $3$. Sau đó áp dụng quy tắc trừ tương ứng: $\\dfrac{2x - 3y}{\\dots}$<br><b>Ý b:</b><br>- <b>What:</b> Phương trình khai triển đa thức.<br>- <b>Where:</b> Cạm bẫy cực kỳ nguy hiểm nằm ở dấu trừ phía trước cụm $x(x + 3)$. Khi phá ngoặc, bắt buộc phải đổi dấu toàn bộ thành $-x^2 - 3x$. Nếu giải ra phương trình vô nghiệm, hãy tự tin kết luận.", solution: "<li><b>a) Giải bài toán dãy tỉ số:</b></li><li class='ml-4'>Ta biến đổi các phân số để làm xuất hiện hệ số $2$ và $3$:</li><li class='ml-8'>$\\dfrac{x}{5} = \\dfrac{2x}{10}$ ; $\\dfrac{y}{3} = \\dfrac{3y}{9}$</li><li class='ml-4'>Khi đó dãy tỉ số trở thành:</li><li class='ml-8'>$\\dfrac{2x}{10} = \\dfrac{3y}{9}$</li><li class='ml-4'>Áp dụng tính chất của dãy tỉ số bằng nhau:</li><li class='ml-8'>$\\dfrac{2x}{10} = \\dfrac{3y}{9} = \\dfrac{2x - 3y}{10 - 9} = \\dfrac{10}{1} = 10$</li><li class='ml-4'>Từ tỉ số chung bằng $10$, ta tìm các ẩn bằng cách nhân chéo:</li><li class='ml-8'>$\\dfrac{x}{5} = 10 \\Rightarrow x = 50$</li><li class='ml-8'>$\\dfrac{y}{3} = 10 \\Rightarrow y = 30$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = 50, y = 30$.</li><li><b>b) Giải phương trình Đa thức:</b></li><li class='ml-4'>Tiến hành nhân phân phối (phá ngoặc) các biểu thức:</li><li class='ml-8'>$(x^2 + 5x - 2x - 10) - (x^2 + 3x) = 15$</li><li class='ml-4'>Bỏ dấu ngoặc (chú ý đổi dấu do có dấu trừ phía trước ngoặc sau):</li><li class='ml-8'>$x^2 + 3x - 10 - x^2 - 3x = 15$</li><li class='ml-4'>Nhóm các hạng tử đồng dạng để triệt tiêu:</li><li class='ml-8'>$(x^2 - x^2) + (3x - 3x) - 10 = 15$</li><li class='ml-8'>$0x - 10 = 15$</li><li class='ml-8'>$0x = 25$</li><li class='ml-4'>Vì không có số nào nhân với $0$ bằng $25$ nên phương trình vô lý.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Phương trình vô nghiệm ($x \\in \\emptyset$).</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "(Bài toán Công việc chung - riêng) Hai vòi nước cùng chảy vào một bể cạn. Nếu mở vòi 1 chảy một mình thì sau 6 giờ đầy bể. Nếu mở vòi 2 chảy một mình thì sau 8 giờ đầy bể. Người ta mở vòi 1 chảy một mình trong 2 giờ, sau đó mở tiếp vòi 2 cùng chảy. Hỏi sau bao lâu nữa thì bể đầy nước?", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán năng suất làm chung làm riêng kết hợp giai đoạn ngắt quãng.<br>- <b>How:</b><br>&nbsp; + Bước 1: Coi toàn bộ thể tích bể là $1$ đơn vị. Tính năng suất bơm trong $1$ giờ của từng vòi.<br>&nbsp; + Bước 2: Tính lượng nước vòi $1$ ĐÃ BƠM trong $2$ giờ đầu. Lấy $1$ trừ đi lượng này để ra thể tích bể CÒN TRỐNG.<br>&nbsp; + Bước 3: Giai đoạn sau 2 vòi chảy chung. Lấy phần thể tích CÒN TRỐNG chia cho Năng suất CHUNG của cả $2$ vòi để tìm ra thời gian.", solution: "<li>Quy ước toàn bộ thể tích bể là $1$ đơn vị.</li><li class='ml-4'>Trong $1$ giờ, vòi $1$ chảy một mình được: $1 : 6 = \\dfrac{1}{6}$ (bể).</li><li class='ml-4'>Trong $1$ giờ, vòi $2$ chảy một mình được: $1 : 8 = \\dfrac{1}{8}$ (bể).</li><li class='ml-4'>Trong $1$ giờ, nếu mở cả $2$ vòi cùng chảy thì được: $\\dfrac{1}{6} + \\dfrac{1}{8} = \\dfrac{4}{24} + \\dfrac{3}{24} = \\dfrac{7}{24}$ (bể).</li><li>Lượng nước vòi $1$ đã chảy vào bể trong $2$ giờ đầu tiên là:</li><li class='ml-4'>$2 \\cdot \\dfrac{1}{6} = \\dfrac{1}{3}$ (bể).</li><li>Phần thể tích bể còn trống (cần bơm tiếp) là:</li><li class='ml-4'>$1 - \\dfrac{1}{3} = \\dfrac{2}{3}$ (bể).</li><li>Thời gian để cả hai vòi cùng chảy đầy phần bể còn trống đó là:</li><li class='ml-4'>$\\dfrac{2}{3} : \\dfrac{7}{24} = \\dfrac{2}{3} \\cdot \\dfrac{24}{7} = \\dfrac{16}{7}$ (giờ).</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: Sau $\\dfrac{16}{7}$ giờ nữa thì bể sẽ đầy.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "(Hình học Suy luận - Góc tạo bởi Cát tuyến) Cho hai đường thẳng song song&nbsp;$x$&nbsp;và&nbsp;$y$. Một cát tuyến&nbsp;$c$&nbsp;cắt đường thẳng&nbsp;$x$&nbsp;tại điểm&nbsp;$A$&nbsp;và cắt đường thẳng&nbsp;$y$&nbsp;tại điểm&nbsp;$B$. Biết một góc trong cùng phía tại đỉnh&nbsp;$A$&nbsp;có số đo là&nbsp;$\\angle A_1 = 110^{\\circ}$.<div class='mt-6'>a) Tính số đo góc trong cùng phía&nbsp;$\\angle B_1$&nbsp;(tương ứng với $\\angle A_1$).</div><div class='mt-6'>b) Tính số đo góc so le trong&nbsp;$\\angle B_2$&nbsp;(tương ứng với $\\angle A_1$).</div><div class='mt-6'>c) Vẽ tia phân giác&nbsp;$Am$&nbsp;của góc&nbsp;$\\angle A_1$&nbsp;và tia phân giác&nbsp;$Bn$&nbsp;của góc&nbsp;$\\angle B_1$. Chứng tỏ rằng tia&nbsp;$Am$&nbsp;vuông góc với tia&nbsp;$Bn$.</div><div class='flex justify-center my-8'><svg width='300' height='220' viewBox='0 0 300 220'><line x1='30' y1='50' x2='270' y2='50' stroke='black' stroke-width='1.5'/><text x='280' y='55' font-size='14' font-style='italic'>x</text><line x1='30' y1='170' x2='270' y2='170' stroke='black' stroke-width='1.5'/><text x='280' y='175' font-size='14' font-style='italic'>y</text><line x1='80' y1='10' x2='220' y2='210' stroke='black' stroke-width='1.5'/><text x='70' y='20' font-size='14' font-style='italic'>c</text><circle cx='108' cy='50' r='3' fill='black'/><text x='85' y='55' font-size='14'>A</text><circle cx='192' cy='170' r='3' fill='black'/><text x='200' y='185' font-size='14'>B</text><line x1='108' y1='50' x2='170' y2='90' stroke='red' stroke-width='1.5' stroke-dasharray='4'/><text x='175' y='95' font-size='14' font-style='italic' fill='red'>m</text><line x1='192' y1='170' x2='130' y2='130' stroke='blue' stroke-width='1.5' stroke-dasharray='4'/><text x='120' y='130' font-size='14' font-style='italic' fill='blue'>n</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán Hình học Suy luận. Phải luôn viện dẫn giả thiết \"song song\" trước khi suy ra số đo góc.<br>- <b>How:</b> <br>&nbsp; + Ý a: Tính chất hai góc trong cùng phía bù nhau (tổng bằng $180^{\\circ}$).<br>&nbsp; + Ý b: Tính chất hai góc so le trong bằng nhau.<br>&nbsp; + Ý c: Cắt đôi các góc $\\angle A_1$ và $\\angle B_1$ nhờ tính chất tia phân giác. Hai tia phân giác sẽ giao nhau tạo thành một tam giác nhỏ. Áp dụng định lý tổng 3 góc trong tam giác (bằng $180^{\\circ}$) để tính góc giao cắt. Nếu góc đó ra $90^{\\circ}$ thì chứng tỏ hai tia vuông góc.", solution: "<li><b>a) Tính góc trong cùng phía&nbsp;$\\angle B_1$:</b></li><li class='ml-4'>Theo giả thiết đề bài, ta có hai đường thẳng $x \\parallel y$.</li><li class='ml-4'>Góc $\\angle A_1$ và góc $\\angle B_1$ là hai góc ở vị trí <b>trong cùng phía</b> đối với đường thẳng cát tuyến $c$.</li><li class='ml-4'>Theo tính chất hai đường thẳng song song, hai góc trong cùng phía luôn bù nhau. Do đó ta có:</li><li class='ml-8'>$\\angle A_1 + \\angle B_1 = 180^{\\circ}$</li><li class='ml-8'>$110^{\\circ} + \\angle B_1 = 180^{\\circ} \\Rightarrow \\angle B_1 = 70^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $\\angle B_1 = 70^{\\circ}$.</li><li><b>b) Tính góc so le trong&nbsp;$\\angle B_2$:</b></li><li class='ml-4'>Vì $x \\parallel y$, góc $\\angle A_1$ và góc $\\angle B_2$ là hai góc ở vị trí <b>so le trong</b>.</li><li class='ml-4'>Theo tính chất hai đường thẳng song song, hai góc so le trong bằng nhau. Do đó:</li><li class='ml-8'>$\\angle B_2 = \\angle A_1 = 110^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $\\angle B_2 = 110^{\\circ}$.</li><li><b>c) Chứng minh hai tia phân giác vuông góc:</b></li><li class='ml-4'>Vì tia $Am$ là tia phân giác của góc $\\angle A_1$ nên góc tạo bởi tia $Am$ và cát tuyến $c$ là:</li><li class='ml-8'>$\\angle A_m = \\dfrac{110^{\\circ}}{2} = 55^{\\circ}$.</li><li class='ml-4'>Vì tia $Bn$ là tia phân giác của góc $\\angle B_1$ nên góc tạo bởi tia $Bn$ và cát tuyến $c$ là:</li><li class='ml-8'>$\\angle B_n = \\dfrac{70^{\\circ}}{2} = 35^{\\circ}$.</li><li class='ml-4'>Hai tia phân giác $Am$ và $Bn$ nằm trong không gian giữa 2 đường thẳng và cắt nhau tại điểm $I$, tạo thành tam giác nhỏ $AIB$.</li><li class='ml-4'>Xét tam giác $AIB$, tổng $3$ góc trong một tam giác luôn bằng $180^{\\circ}$. Số đo góc giao cắt $\\angle AIB$ là:</li><li class='ml-8'>$\\angle AIB = 180^{\\circ} - (\\angle A_m + \\angle B_n)$</li><li class='ml-8'>$\\angle AIB = 180^{\\circ} - (55^{\\circ} + 35^{\\circ})$</li><li class='ml-8'>$\\angle AIB = 180^{\\circ} - 90^{\\circ} = 90^{\\circ}$.</li><li class='ml-4'>Vì góc giao cắt bằng $90^{\\circ}$, ta kết luận tia $Am$ vuông góc với tia $Bn$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận c: Suy ra $Am \\perp Bn$ (Điều phải chứng minh).</li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Vũ khí Số học - Phân tích cấu tạo số)<br>Chứng minh rằng tổng của một số tự nhiên có hai chữ số và số đó viết theo thứ tự ngược lại luôn chia hết cho&nbsp;$11$.<br>Áp dụng: Tìm số có hai chữ số&nbsp;$\\overline{ab}$&nbsp;biết&nbsp;$\\overline{ab} - \\overline{ba} = 36$&nbsp;và tổng hai chữ số&nbsp;$a + b = 10$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán phân tích cấu tạo thập phân của số có 2 chữ số. Ký hiệu $\\overline{ab} = 10a + b$.<br>- <b>How:</b> <br>&nbsp; + Chứng minh tổng: $\\overline{ab} + \\overline{ba} = (10a+b) + (10b+a)$. Gom lại sẽ thấy ngay nhân tử chung là $11$.<br>&nbsp; + Áp dụng tìm hiệu: Tính $\\overline{ab} - \\overline{ba} = 9(a-b)$. Đặt biểu thức này bằng $36$ để tìm ra hiệu $a-b = 4$.<br>&nbsp; + Cuối cùng, giải bài toán Tổng - Hiệu của tiểu học (có tổng bằng $10$, hiệu bằng $4$) để tìm $a$ và $b$.", solution: "<li><b>Phần 1: Chứng minh tổng chia hết cho 11</b></li><li class='ml-4'>Gọi số tự nhiên có 2 chữ số là $\\overline{ab}$ (với $a, b \\in \\mathbb{N}; 1 \\le a \\le 9, 0 \\le b \\le 9$). Số viết theo thứ tự ngược lại là $\\overline{ba}$ (giả sử $b \\neq 0$).</li><li class='ml-4'>Ta phân tích cấu tạo thập phân của tổng hai số:</li><li class='ml-8'>$\\overline{ab} + \\overline{ba} = (10a + b) + (10b + a)$</li><li class='ml-8'>$\\overline{ab} + \\overline{ba} = 11a + 11b = 11(a + b)$.</li><li class='ml-4'>Vì biểu thức $11(a + b)$ chứa thừa số $11$ nên tổng này luôn chia hết cho $11$. (Đpcm).</li><li><b>Phần 2: Áp dụng tìm số</b></li><li class='ml-4'>Theo đề bài, ta có hiệu: $\\overline{ab} - \\overline{ba} = 36$. Phân tích cấu tạo thập phân:</li><li class='ml-8'>$(10a + b) - (10b + a) = 36$</li><li class='ml-8'>$9a - 9b = 36$</li><li class='ml-8'>$9(a - b) = 36 \\Rightarrow a - b = 4$.</li><li class='ml-4'>Ta có hệ điều kiện của hai chữ số: Tổng $a + b = 10$ và Hiệu $a - b = 4$.</li><li class='ml-4'>Áp dụng công thức bài toán Tổng - Hiệu:</li><li class='ml-8'>Chữ số hàng chục: $a = (10 + 4) : 2 = 7$.</li><li class='ml-8'>Chữ số hàng đơn vị: $b = (10 - 4) : 2 = 3$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Số có hai chữ số cần tìm là $73$.</li>" },
{ t_title: "Câu 6 (1,5 điểm)", t_content: "(Bất đẳng thức Phân số) Cho biểu thức:<br>$P = \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dfrac{1}{4^2} + \\dots + \\dfrac{1}{2025^2}$<br>Chứng minh rằng:&nbsp;$P < 1$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Đánh giá tổng một chuỗi phân số bình phương. Ta không thể quy đồng mẫu số.<br>- <b>How:</b> Sử dụng kỹ thuật làm trội (làm lớn) từng phân số lên một chút: $\\dfrac{1}{n^2} = \\dfrac{1}{n \\cdot n} < \\dfrac{1}{(n-1) \\cdot n}$.<br>- <b>Why:</b> Mẫu số là $(n-1) \\cdot n$ chính là form chuẩn của chuỗi sai phân cơ bản. Khi tách ra, toàn bộ chuỗi sẽ bị triệt tiêu chéo.", solution: "<li>Xét từng số hạng của biểu thức $P$, ta tiến hành làm trội bằng cách giảm giá trị của mẫu số (thay vì nhân với chính nó, ta nhân với số liền trước nó):</li><li class='ml-4'>$\\dfrac{1}{2^2} < \\dfrac{1}{1 \\cdot 2} = 1 - \\dfrac{1}{2}$</li><li class='ml-4'>$\\dfrac{1}{3^2} < \\dfrac{1}{2 \\cdot 3} = \\dfrac{1}{2} - \\dfrac{1}{3}$</li><li class='ml-4'>$\\dots$</li><li class='ml-4'>$\\dfrac{1}{2025^2} < \\dfrac{1}{2024 \\cdot 2025} = \\dfrac{1}{2024} - \\dfrac{1}{2025}$</li><li>Cộng vế theo vế tất cả các bất đẳng thức trên, ta được một tổng mới chắc chắn lớn hơn $P$:</li><li class='ml-4'>$P < \\left( 1 - \\dfrac{1}{2} \\right) + \\left( \\dfrac{1}{2} - \\dfrac{1}{3} \\right) + \\dots + \\left( \\dfrac{1}{2024} - \\dfrac{1}{2025} \\right)$</li><li>Triệt tiêu các phân số có dấu trái ngược nhau ở phần giữa chuỗi:</li><li class='ml-4'>$P < 1 - \\dfrac{1}{2025}$</li><li>Đánh giá logic: Vì $\\dfrac{1}{2025}$ là một số dương, nên khi lấy số $1$ trừ đi nó, kết quả thu được chắc chắn sẽ nhỏ hơn $1$.</li><li class='ml-4'>Theo tính chất bắc cầu, ta suy ra: $P < 1$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Bất đẳng thức được chứng minh thành công.</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Giá trị của tổng&nbsp;$S = 1 - 2 + 3 - 4 + 5 - 6 + \\dots + 2025 - 2026$&nbsp;là:", options: ["A. $1013$", "B. $-1013$", "C. $2026$", "D. $-2026$"], correct_idx: 1, explain: "Tổng có&nbsp;$2026$&nbsp;số hạng, được ghép thành&nbsp;$1013$&nbsp;cặp:&nbsp;$(1 - 2) + (3 - 4) + \\dots + (2025 - 2026) = (-1) + (-1) + \\dots + (-1) = -1013$. Chọn B." },
{ q_title: "Câu 2", q_content: "Có bao nhiêu số nguyên&nbsp;$x$&nbsp;thỏa mãn&nbsp;$\\dfrac{12}{x} \\in \\mathbb{Z}$&nbsp;và&nbsp;$x > -3$?", options: ["A. $6$", "B. $8$", "C. $7$", "D. $5$"], correct_idx: 1, explain: "Để phân số nguyên thì&nbsp;$x \\in Ư(12) = \\{\\pm 1; \\pm 2; \\pm 3; \\pm 4; \\pm 6; \\pm 12\\}$. Vì&nbsp;$x > -3$&nbsp;nên&nbsp;$x \\in \\{-2; -1; 1; 2; 3; 4; 6; 12\\}$. Có&nbsp;$8$&nbsp;giá trị. Chọn B." },
{ q_title: "Câu 3", q_content: "Phân số nào sau đây có thể viết dưới dạng số thập phân vô hạn tuần hoàn?", options: ["A. $\\dfrac{21}{150}$", "B. $\\dfrac{9}{24}$", "C. $\\dfrac{13}{125}$", "D. $\\dfrac{7}{30}$"], correct_idx: 3, explain: "Rút gọn tối giản và xét mẫu: Phương án A (mẫu 50), B (mẫu 8), C (mẫu 125) đều chỉ chứa thừa số 2 và 5. Phân số D có mẫu&nbsp;$30 = 2 \\cdot 3 \\cdot 5$&nbsp;chứa thừa số nguyên tố&nbsp;$3$&nbsp;nên là số thập phân vô hạn tuần hoàn. Chọn D." },
{ q_title: "Câu 4", q_content: "Biết&nbsp;$p$&nbsp;là số nguyên tố lớn hơn&nbsp;$3$. Khẳng định nào sau đây luôn ĐÚNG?", options: ["A. $p$&nbsp;chia 3 dư 1", "B. $p$&nbsp;chia 3 dư 2", "C. $p^2 - 1$&nbsp;chia hết cho 3", "D. $p^2 + 1$&nbsp;chia hết cho 3"], correct_idx: 2, explain: "Số nguyên tố&nbsp;$p > 3$&nbsp;luôn có dạng&nbsp;$3k + 1$&nbsp;hoặc&nbsp;$3k - 1$. Khi bình phương lên ta được&nbsp;$p^2 = (3k \\pm 1)^2 = 9k^2 \\pm 6k + 1$&nbsp;luôn chia 3 dư 1. Vậy&nbsp;$p^2 - 1$&nbsp;chia hết cho 3. Chọn C." },
{ q_title: "Câu 5", q_content: "Tập hợp các giá trị của&nbsp;$x$&nbsp;để&nbsp;$|x - 5| = x - 5$&nbsp;là:", options: ["A. $x = 5$", "B. $x \\ge 5$", "C. $x \\le 5$", "D. Mọi số thực x"], correct_idx: 1, explain: "Tính chất giá trị tuyệt đối:&nbsp;$|A| = A$&nbsp;khi và chỉ khi&nbsp;$A \\ge 0$. Suy ra&nbsp;$x - 5 \\ge 0 \\Rightarrow x \\ge 5$. Chọn B." },
{ q_title: "Câu 6", q_content: "Cho phân số&nbsp;$\\dfrac{a}{b} < 1$&nbsp;(với&nbsp;$a, b \\in \\mathbb{N}^*$). Nếu cộng cùng một số nguyên dương&nbsp;$m$&nbsp;vào cả tử và mẫu thì phân số mới sẽ:", options: ["A. Bằng phân số cũ", "B. Lớn hơn phân số cũ", "C. Nhỏ hơn phân số cũ", "D. Không xác định được"], correct_idx: 1, explain: "Vì&nbsp;$\\dfrac{a}{b} < 1$&nbsp;nên&nbsp;$a < b$. Xét hiệu phân số mới trừ đi phân số cũ ta được tử số là&nbsp;$m(b-a) > 0$. Vậy phân số mới lớn hơn phân số cũ. Chọn B." },
{ q_title: "Câu 7", q_content: "Một cuốn sách được đánh số trang từ&nbsp;$1$&nbsp;đến&nbsp;$250$. Chữ số&nbsp;$3$&nbsp;được dùng tất cả bao nhiêu lần?", options: ["A. $55$", "B. $65$", "C. $105$", "D. $45$"], correct_idx: 0, explain: "Chữ số 3 ở hàng đơn vị (3, 13... 243) xuất hiện&nbsp;$25$&nbsp;lần. Chữ số 3 ở hàng chục (30-39, 130-139, 230-239) xuất hiện&nbsp;$30$&nbsp;lần. Tổng cộng chữ số 3 được dùng&nbsp;$25 + 30 = 55$&nbsp;lần. Chọn A." },
{ q_title: "Câu 8", q_content: "Cho&nbsp;$100$&nbsp;điểm phân biệt, trong đó có đúng&nbsp;$3$&nbsp;điểm thẳng hàng. Cứ qua&nbsp;$2$&nbsp;điểm ta vẽ một đường thẳng. Số đường thẳng vẽ được là:", options: ["A. $4950$", "B. $4948$", "C. $4949$", "D. $4947$"], correct_idx: 1, explain: "$100$&nbsp;điểm phân biệt tạo ra&nbsp;$\\dfrac{100 \\cdot 99}{2} = 4950$&nbsp;đường thẳng. Tuy nhiên 3 điểm thẳng hàng lẽ ra tạo 3 đường thẳng nhưng thực tế chỉ tạo 1 đường thẳng (tức là bị hao hụt 2 đường). Vậy vẽ được&nbsp;$4950 - 2 = 4948$&nbsp;đường thẳng. Chọn B." },
{ q_title: "Câu 9", q_content: "Chữ số tận cùng của tổng&nbsp;$S = 2^1 + 2^2 + 2^3 + \\dots + 2^{100}$&nbsp;là:", options: ["A. $0$", "B. $2$", "C. $4$", "D. $6$"], correct_idx: 0, explain: "Ta có&nbsp;$2S - S = 2^{101} - 2 \\Rightarrow S = 2^{101} - 2$. Xét lũy thừa&nbsp;$2^{101} = 2^{4 \\cdot 25 + 1} = (2^4)^{25} \\cdot 2 = (\\dots 6) \\cdot 2 = (\\dots 2)$. Suy ra&nbsp;$(\\dots 2) - 2 = (\\dots 0)$. Chọn A." },
{ q_title: "Câu 10", q_content: "Hai góc phụ nhau, góc này bằng&nbsp;$\\dfrac{2}{3}$&nbsp;góc kia. Hiệu số đo của hai góc là:", options: ["A. $18^{\\circ}$", "B. $36^{\\circ}$", "C. $54^{\\circ}$", "D. $20^{\\circ}$"], correct_idx: 0, explain: "Tổng 2 góc phụ nhau bằng&nbsp;$90^{\\circ}$. Giải bài toán tổng-tỉ: Góc lớn là&nbsp;$90 : (2+3) \\cdot 3 = 54^{\\circ}$. Góc nhỏ là&nbsp;$90 - 54 = 36^{\\circ}$. Hiệu 2 góc là&nbsp;$54 - 36 = 18^{\\circ}$. Chọn A." },
{ q_title: "Câu 11", q_content: "Trong các số&nbsp;$2, 3, 4, 5, 6, 7, 8, 9$, có bao nhiêu cặp số nguyên tố cùng nhau?", options: ["A. 18", "B. 21", "C. 20", "D. 19"], correct_idx: 3, explain: "Tổng số cặp được tạo từ 8 số là&nbsp;$\\dfrac{8 \\cdot 7}{2} = 28$&nbsp;cặp. Các cặp KHÔNG nguyên tố cùng nhau (có ƯC chung lớn hơn 1) là: (2,4), (2,6), (2,8), (3,6), (3,9), (4,6), (4,8), (6,8), (6,9) gồm 9 cặp. Vậy có&nbsp;$28 - 9 = 19$&nbsp;cặp nguyên tố cùng nhau. Chọn D." },
{ q_title: "Câu 12", q_content: "Cho đoạn&nbsp;$AB = 10\\text{ cm}$. $M$&nbsp;là điểm nằm giữa&nbsp;$A, B$. Gọi&nbsp;$I, K$&nbsp;lần lượt là trung điểm của&nbsp;$AM$&nbsp;và&nbsp;$MB$. Độ dài&nbsp;$IK$&nbsp;là:", options: ["A. $2,5\\text{ cm}$", "B. $5\\text{ cm}$", "C. $7,5\\text{ cm}$", "D. Phụ thuộc vị trí M"], correct_idx: 1, explain: "Vì&nbsp;$I, K$&nbsp;là trung điểm nên&nbsp;$IM = \\dfrac{AM}{2}$&nbsp;và&nbsp;$MK = \\dfrac{MB}{2}$. Điểm&nbsp;$M$&nbsp;nằm giữa&nbsp;$I, K$&nbsp;nên&nbsp;$IK = IM + MK = \\dfrac{AM + MB}{2} = \\dfrac{AB}{2} = 5\\text{ cm}$. Chọn B." }
],
tu_luan: [
{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính giá trị biểu thức sau bằng cách hợp lý:<br>$A = \\dfrac{1}{2} + \\dfrac{5}{6} + \\dfrac{11}{12} + \\dfrac{19}{20} + \\dfrac{29}{30} + \\dfrac{41}{42} + \\dfrac{55}{56} + \\dfrac{71}{72} + \\dfrac{89}{90}$", strategy: "Tất cả các phân số đều có dạng $1 - \\dfrac{1}{n(n+1)}$. Khi tách phần nguyên ($1$) ra, phần phân số dư sẽ ghép thành một chuỗi sai phân triệt tiêu liên tiếp.", solution: "<li>Ta tách mỗi phân số như sau:</li><li>$A = \\left( 1 - \\dfrac{1}{2} \\right) + \\left( 1 - \\dfrac{1}{6} \\right) + \\left( 1 - \\dfrac{1}{12} \\right) + \\dots + \\left( 1 - \\dfrac{1}{90} \\right)$</li><li>Từ phân số mẫu số $2 = 1 \\cdot 2$ đến mẫu số $90 = 9 \\cdot 10$ có $9$ phân số, do đó có $9$ số $1$. Ta nhóm lại:</li><li>$A = 9 - \\left( \\dfrac{1}{1 \\cdot 2} + \\dfrac{1}{2 \\cdot 3} + \\dfrac{1}{3 \\cdot 4} + \\dots + \\dfrac{1}{9 \\cdot 10} \\right)$</li><li>Áp dụng công thức sai phân cho cụm trong ngoặc:</li><li>$A = 9 - \\left( 1 - \\dfrac{1}{2} + \\dfrac{1}{2} - \\dfrac{1}{3} + \\dots + \\dfrac{1}{9} - \\dfrac{1}{10} \\right)$</li><li>Triệt tiêu các số đối nhau, ta được:</li><li>$A = 9 - \\left( 1 - \\dfrac{1}{10} \\right) = 9 - \\dfrac{9}{10} = \\dfrac{81}{10}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $A = \\dfrac{81}{10}$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm các số thỏa mãn:<div class='mt-6'>a) &nbsp; Tìm các số nguyên&nbsp;$x, y$&nbsp;thỏa mãn:&nbsp;$(x - 2)(2y + 1) = 17$.</div><div class='mt-6'>b) &nbsp; Tìm hai số nguyên tố&nbsp;$p, q$&nbsp;sao cho:&nbsp;$p^2 + 3q = 34$.</div>", strategy: "<strong>Ý a:</strong> 17 là số nguyên tố, phân tích 17 thành tích hai số nguyên và lập bảng xét 4 trường hợp.<br><strong>Ý b:</strong> Biện luận chẵn lẻ. Vì 34 chẵn nên $p^2$ và $3q$ cùng chẵn hoặc cùng lẻ. Kết hợp điều kiện $q$ nguyên tố để chặn giới hạn của $p$.", solution: "<li><strong>a)</strong> Vì $x, y \\in \\mathbb{Z}$ nên $(x-2)$ và $(2y+1)$ là các ước nguyên của $17$. Lập bảng:</li><li>+ $2y+1 = 1 \\Rightarrow y=0$, khi đó $x-2 = 17 \\Rightarrow x=19$.</li><li>+ $2y+1 = 17 \\Rightarrow y=8$, khi đó $x-2 = 1 \\Rightarrow x=3$.</li><li>+ $2y+1 = -1 \\Rightarrow y=-1$, khi đó $x-2 = -17 \\Rightarrow x=-15$.</li><li>+ $2y+1 = -17 \\Rightarrow y=-9$, khi đó $x-2 = -1 \\Rightarrow x=1$.</li><li class='mt-2'><strong>b)</strong> Ta có $p^2 + 3q = 34$. Vì $q$ là số nguyên tố (nhỏ nhất là 2) nên $3q \\ge 6$.</li><li>$\\Rightarrow p^2 = 34 - 3q \\le 28 \\Rightarrow p < 6$.</li><li>Vì $p$ là số nguyên tố nên $p \\in \\{2; 3; 5\\}$. Xét các trường hợp:</li><li>+ Với $p=2 \\Rightarrow 3q = 30 \\Rightarrow q=10$ (Loại vì 10 là hợp số).</li><li>+ Với $p=3 \\Rightarrow 3q = 25$ (Loại vì 25 không chia hết cho 3).</li><li>+ Với $p=5 \\Rightarrow 3q = 9 \\Rightarrow q=3$ (Nhận vì 3 là số nguyên tố).</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) $(x,y) \\in \\{(19;0), (3;8), (-15;-1), (1;-9)\\}$; b) $p=5, q=3$.</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Một bể có hai vòi nước. Vòi 1 chảy $5$ giờ thì đầy bể, vòi 2 chảy $7$ giờ thì đầy bể. Lúc đầu người ta mở vòi 1 chảy trong $2$ giờ, sau đó mở tiếp vòi 2 cùng chảy. Hỏi từ lúc mở vòi 2, sau bao lâu nữa thì bể sẽ đầy nước?", strategy: "Tính năng suất của từng vòi. Tính lượng nước vòi 1 đã chảy trong 2 giờ. Lấy phần bể CÒN TRỐNG chia cho tổng năng suất 2 vòi.", solution: "<li>Trong 1 giờ, vòi 1 chảy được: $1 : 5 = \\dfrac{1}{5}$ (thể tích bể).</li><li>Trong 1 giờ, vòi 2 chảy được: $1 : 7 = \\dfrac{1}{7}$ (thể tích bể).</li><li>Trong 2 giờ đầu, lượng nước vòi 1 đã chảy vào bể là: $2 \\cdot \\dfrac{1}{5} = \\dfrac{2}{5}$ (thể tích bể).</li><li>Phần thể tích bể còn trống (chưa có nước) là: $1 - \\dfrac{2}{5} = \\dfrac{3}{5}$ (thể tích bể).</li><li>Năng suất chung của 2 vòi khi cùng chảy trong 1 giờ là: $\\dfrac{1}{5} + \\dfrac{1}{7} = \\dfrac{12}{35}$ (thể tích bể).</li><li>Thời gian để cả 2 vòi cùng chảy đầy phần bể còn trống đó là: $\\dfrac{3}{5} : \\dfrac{12}{35} = \\dfrac{3}{5} \\cdot \\dfrac{35}{12} = \\dfrac{7}{4}$ (giờ).</li><li>Đổi $\\dfrac{7}{4}$ giờ = 1 giờ 45 phút.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: Sau 1 giờ 45 phút nữa thì bể đầy.</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Vẽ tia $Ox$. Trên tia $Ox$ lấy hai điểm $A, B$ sao cho $OA = 4\\text{ cm}, OB = 10\\text{ cm}$. Gọi $M$ là trung điểm của đoạn thẳng $OA$, $N$ là trung điểm của đoạn thẳng $OB$.<div class='mt-6'>a) &nbsp; Tính độ dài đoạn thẳng $MN$.</div><div class='mt-6'>b) &nbsp; Lấy điểm $P$ nằm ngoài đường thẳng $AB$. Kẻ các tia $PA, PB, PM, PN, PO$. Có bao nhiêu góc đỉnh $P$ được tạo thành từ các tia đó?</div>", strategy: "<strong>Ý a:</strong> Tính $OM, ON$ dựa vào trung điểm. Chứng minh $M$ nằm giữa $O$ và $N$ để trừ đoạn thẳng.<br><strong>Ý b:</strong> Sử dụng công thức tổ hợp đếm góc: $n$ tia chung gốc tạo ra $n(n-1)/2$ góc.", solution: "<li><strong>a)</strong> $M$ là trung điểm $OA \\Rightarrow OM = \\dfrac{OA}{2} = 2\\text{ cm}$.</li><li>$N$ là trung điểm $OB \\Rightarrow ON = \\dfrac{OB}{2} = 5\\text{ cm}$.</li><li>Vì $M$ và $N$ cùng nằm trên tia $Ox$ và $OM < ON$ ($2 < 5$) nên điểm $M$ nằm giữa $O$ và $N$.</li><li>$\\Rightarrow OM + MN = ON \\Rightarrow 2 + MN = 5 \\Rightarrow MN = 3\\text{ cm}$.</li><li class='mt-2'><strong>b)</strong> Kẻ từ đỉnh $P$ tới các điểm $O, M, A, N, B$ ta được tất cả 5 tia chung gốc $P$ là: $PO, PM, PA, PN, PB$.</li><li>Cứ chọn 2 tia bất kỳ trong 5 tia chung gốc $P$ sẽ tạo thành 1 góc.</li><li>Vì các điểm $O, M, A, N, B$ cùng thuộc 1 đường thẳng (không đi qua $P$) nên không có 2 tia nào đối nhau (không có góc bẹt).</li><li>Số góc tạo thành là: $\\dfrac{5 \\cdot (5 - 1)}{2} = \\dfrac{5 \\cdot 4}{2} = 10$ (góc).</li><div class='flex justify-center my-8'><svg width='400' height='100' viewBox='0 0 400 100'><line x1='20' y1='80' x2='380' y2='80' stroke='black' stroke-width='1'/><circle cx='200' cy='20' r='3' fill='black'/><text x='195' y='15' font-size='14'>P</text><circle cx='40' cy='80' r='2' fill='black'/><text x='35' y='100' font-size='14'>O</text><circle cx='100' cy='80' r='2' fill='red'/><text x='95' y='100' font-size='14' fill='red'>M</text><circle cx='160' cy='80' r='2' fill='black'/><text x='155' y='100' font-size='14'>A</text><circle cx='250' cy='80' r='2' fill='red'/><text x='245' y='100' font-size='14' fill='red'>N</text><circle cx='340' cy='80' r='2' fill='black'/><text x='335' y='100' font-size='14'>B</text><text x='385' y='85' font-size='14' font-style='italic'>x</text><line x1='200' y1='20' x2='40' y2='80' stroke='gray' stroke-dasharray='4'/><line x1='200' y1='20' x2='100' y2='80' stroke='gray' stroke-dasharray='4'/><line x1='200' y1='20' x2='160' y2='80' stroke='gray' stroke-dasharray='4'/><line x1='200' y1='20' x2='250' y2='80' stroke='gray' stroke-dasharray='4'/><line x1='200' y1='20' x2='340' y2='80' stroke='gray' stroke-dasharray='4'/></svg></div><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 3 cm; b) 10 góc</li>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Chứng minh rằng với mọi số tự nhiên $n \\ge 2$, ta luôn có:<br>$S = \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dfrac{1}{4^2} + \\dots + \\dfrac{1}{n^2} < \\dfrac{3}{4}$", strategy: "Tách số hạng đầu tiên $\\dfrac{1}{2^2} = \\dfrac{1}{4}$ ra để nguyên. Chỉ làm trội từ số hạng thứ hai $\\dfrac{1}{3^2} < \\dfrac{1}{2 \\cdot 3}$ để ép tổng nhỏ hơn $\\dfrac{3}{4}$.", solution: "<li>Ta tách riêng số hạng đầu tiên: $\\dfrac{1}{2^2} = \\dfrac{1}{4}$.</li><li>Từ số hạng thứ hai trở đi, áp dụng bất đẳng thức làm trội $\\dfrac{1}{k^2} < \\dfrac{1}{(k-1)k}$:</li><li>$\\dfrac{1}{3^2} < \\dfrac{1}{2 \\cdot 3} = \\dfrac{1}{2} - \\dfrac{1}{3}$</li><li>$\\dots$</li><li>$\\dfrac{1}{n^2} < \\dfrac{1}{(n-1)n} = \\dfrac{1}{n-1} - \\dfrac{1}{n}$</li><li>Cộng vế theo vế biểu thức, ta được:</li><li>$S < \\dfrac{1}{4} + \\left(\\dfrac{1}{2} - \\dfrac{1}{3} + \\dfrac{1}{3} - \\dots - \\dfrac{1}{n}\\right)$</li><li>$S < \\dfrac{1}{4} + \\dfrac{1}{2} - \\dfrac{1}{n} = \\dfrac{3}{4} - \\dfrac{1}{n}$</li><li>Vì $n \\ge 2$ nên $\\dfrac{1}{n} > 0$. Do đó: $\\dfrac{3}{4} - \\dfrac{1}{n} < \\dfrac{3}{4}$.</li><li>Áp dụng tính chất bắc cầu suy ra $S < \\dfrac{3}{4}$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Bất đẳng thức được chứng minh.</li>" }
]
});
</script>

window.EXAM_DATA.push({
id: 26, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 26", icon: "📚", color: "indigo", level: "Học sinh giỏi", time: "90 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Biết&nbsp;$\\dfrac{a}{b}$&nbsp;là phân số tối giản. Phân số&nbsp;$\\dfrac{a}{a+b}$&nbsp;có phải là phân số tối giản không?", options: ["A. Chắc chắn tối giản", "B. Không tối giản", "C. Tùy giá trị a, b", "D. Bằng 1"], correct_idx: 0, explain: "Gọi&nbsp;$d = ƯCLN(a, a+b) \\Rightarrow a \\vdots d$&nbsp;và&nbsp;$(a+b) \\vdots d \\Rightarrow b \\vdots d$. Vậy&nbsp;$d$&nbsp;là ước chung của&nbsp;$a$&nbsp;và&nbsp;$b$. Mà&nbsp;$\\dfrac{a}{b}$&nbsp;tối giản nên&nbsp;$ƯCLN(a,b)=1 \\Rightarrow d=1$. Phân số mới chắc chắn tối giản. Chọn A." },
{ q_title: "Câu 2", q_content: "Cho&nbsp;$x, y \\in \\mathbb{Z}$&nbsp;thỏa mãn&nbsp;$|x - 2| + |y + 5| \\le 0$. Giá trị của&nbsp;$x + y$&nbsp;là:", options: ["A. -3", "B. 3", "C. 7", "D. -7"], correct_idx: 0, explain: "Trị tuyệt đối luôn&nbsp;$\\ge 0$&nbsp;nên&nbsp;$|x-2| + |y+5| \\ge 0$. Để tổng&nbsp;$\\le 0$, bắt buộc từng trị tuyệt đối phải bằng&nbsp;$0$. Vậy&nbsp;$x=2, y=-5 \\Rightarrow x+y = -3$. Chọn A." },
{ q_title: "Câu 3", q_content: "Tìm số tự nhiên nhỏ nhất chia cho&nbsp;$3$&nbsp;dư&nbsp;$2$, chia&nbsp;$4$&nbsp;dư&nbsp;$3$, chia&nbsp;$5$&nbsp;dư&nbsp;$4$.", options: ["A. 59", "B. 60", "C. 61", "D. 119"], correct_idx: 0, explain: "Gọi số cần tìm là&nbsp;$x$. Ta có&nbsp;$x+1$&nbsp;chia hết cho cả&nbsp;$3, 4, 5$. Mẫu số chung nhỏ nhất&nbsp;$BCNN(3,4,5) = 60$. Vậy số nhỏ nhất là&nbsp;$60 - 1 = 59$. Chọn A." },
{ q_title: "Câu 4", q_content: "Tích&nbsp;$P = \\left(1 - \\dfrac{1}{2}\\right)\\left(1 - \\dfrac{1}{3}\\right)\\left(1 - \\dfrac{1}{4}\\right)\\dots\\left(1 - \\dfrac{1}{100}\\right)$&nbsp;bằng:", options: ["A. $\\dfrac{1}{100}$", "B. $\\dfrac{99}{100}$", "C. $\\dfrac{1}{99}$", "D. 1"], correct_idx: 0, explain: "Ta có:&nbsp;$P = \\dfrac{1}{2} \\cdot \\dfrac{2}{3} \\cdot \\dfrac{3}{4} \\dots \\dfrac{99}{100}$. Triệt tiêu chéo ta được kết quả là&nbsp;$\\dfrac{1}{100}$. Chọn A." },
{ q_title: "Câu 5", q_content: "Có&nbsp;$6$&nbsp;đội bóng đá thi đấu vòng tròn một lượt (mỗi đội đá với các đội khác đúng 1 trận). Tổng số trận đấu của giải là:", options: ["A. 30", "B. 36", "C. 15", "D. 12"], correct_idx: 2, explain: "Cứ 2 đội ghép lại tạo thành 1 trận đấu. Số trận đấu là số đoạn thẳng nối 6 điểm:&nbsp;$\\dfrac{6 \\cdot 5}{2} = 15$&nbsp;trận. Chọn C." },
{ q_title: "Câu 6", q_content: "Trong mặt phẳng cho&nbsp;$n$&nbsp;đường thẳng cắt nhau đôi một và không có&nbsp;$3$&nbsp;đường thẳng nào đồng quy. Số giao điểm tạo thành là:", options: ["A. $n(n-1)$", "B. $\\dfrac{n(n+1)}{2}$", "C. $\\dfrac{n(n-1)}{2}$", "D. $2n$"], correct_idx: 2, explain: "Cứ 2 đường thẳng cắt nhau tạo thành 1 giao điểm. Chọn 2 đường thẳng bất kỳ trong&nbsp;$n$&nbsp;đường thẳng ta có&nbsp;$\\dfrac{n(n-1)}{2}$&nbsp;giao điểm. Chọn C." },
{ q_title: "Câu 7", q_content: "Một chiếc đồng hồ bị chạy chậm. Cứ mỗi giờ thực tế nó chạy chậm&nbsp;$3$&nbsp;phút. Buổi sáng lúc&nbsp;$6:00$&nbsp;chỉnh lại giờ đúng. Khi đồng hồ chỉ&nbsp;$11:45$&nbsp;trưa cùng ngày thì giờ đúng thực tế là:", options: ["A. 12:00", "B. 12:03", "C. 11:45", "D. 12:15"], correct_idx: 0, explain: "Mỗi giờ thực tế ($60$&nbsp;phút), đồng hồ chỉ chạy được&nbsp;$57$&nbsp;phút. Từ&nbsp;$6:00$&nbsp;đến&nbsp;$11:45$&nbsp;là&nbsp;$345$&nbsp;phút (trên đồng hồ). Thời gian thực tế là:&nbsp;$345 : 57 \\cdot 60 \\approx 363$&nbsp;phút $\\approx 6$&nbsp;giờ. Vậy giờ đúng là&nbsp;$12:00$. Chọn A." },
{ q_title: "Câu 8", q_content: "Tìm số tự nhiên&nbsp;$n$&nbsp;sao cho&nbsp;$\\dfrac{2n+5}{n+1}$&nbsp;là số nguyên. Có bao nhiêu giá trị của&nbsp;$n$?", options: ["A. 1", "B. 2", "C. 3", "D. 4"], correct_idx: 1, explain: "Ta có:&nbsp;$\\dfrac{2n+5}{n+1} = \\dfrac{2(n+1) + 3}{n+1} = 2 + \\dfrac{3}{n+1}$. Để là số nguyên thì&nbsp;$n+1 \\in Ư(3) = \\{1; 3\\}$ (do $n \\ge 0$). Giải ra&nbsp;$n \\in \\{0; 2\\}$. Có 2 giá trị. Chọn B." },
{ q_title: "Câu 9", q_content: "Để cắt một khúc gỗ thành&nbsp;$5$&nbsp;đoạn bằng nhau cần&nbsp;$20$&nbsp;phút. Hỏi để cắt khúc gỗ đó thành&nbsp;$10$&nbsp;đoạn bằng nhau cần bao nhiêu phút? (Thời gian mỗi lần cắt là như nhau).", options: ["A. 40 phút", "B. 45 phút", "C. 50 phút", "D. 36 phút"], correct_idx: 1, explain: "Cắt 5 đoạn cần 4 lần cắt. Thời gian mỗi lần cắt là&nbsp;$20 : 4 = 5$&nbsp;phút. Để cắt 10 đoạn cần 9 lần cắt. Thời gian là&nbsp;$9 \\cdot 5 = 45$&nbsp;phút. Chọn B." },
{ q_title: "Câu 10", q_content: "Hai góc&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$&nbsp;là hai góc kề bù. Nếu&nbsp;$\\angle xOy = 3 \\angle yOz$&nbsp;thì&nbsp;$\\angle xOy$&nbsp;bằng:", options: ["A. $45^{\\circ}$", "B. $135^{\\circ}$", "C. $120^{\\circ}$", "D. $150^{\\circ}$"], correct_idx: 1, explain: "Tổng số đo hai góc kề bù là&nbsp;$180^{\\circ}$. Góc lớn&nbsp;$\\angle xOy = 180^{\\circ} : (3+1) \\cdot 3 = 135^{\\circ}$. Chọn B." },
{ q_title: "Câu 11", q_content: "Trong tập hợp số nguyên&nbsp;$\\mathbb{Z}$, phương trình&nbsp;$x^2 - y^2 = 10$&nbsp;có bao nhiêu cặp nghiệm&nbsp;$(x,y)$?", options: ["A. 0", "B. 2", "C. 4", "D. Vô số"], correct_idx: 0, explain: "Ta có&nbsp;$(x-y)(x+y) = 10$. Tổng&nbsp;$(x-y) + (x+y) = 2x$&nbsp;(là số chẵn), nên 2 thừa số phải cùng tính chẵn lẻ. Tích của 2 số cùng chẵn chia hết cho 4, cùng lẻ là số lẻ. Mà 10 không chia hết cho 4, cũng không lẻ. Suy ra vô nghiệm. Chọn A." },
{ q_title: "Câu 12", q_content: "Cho điểm&nbsp;$O$&nbsp;thuộc đường thẳng&nbsp;$xy$. Lấy điểm&nbsp;$A$&nbsp;thuộc tia&nbsp;$Ox$, $B$&nbsp;thuộc tia&nbsp;$Oy$. Khẳng định nào đúng?", options: ["A. Tia OA và tia Ax trùng nhau", "B. Tia OA và tia OB đối nhau", "C. O là trung điểm AB", "D. A, B cùng phía so với O"], correct_idx: 1, explain: "Vì&nbsp;$A \\in Ox, B \\in Oy$&nbsp;mà&nbsp;$Ox, Oy$&nbsp;là hai tia đối nhau nên tia&nbsp;$OA$&nbsp;và tia&nbsp;$OB$&nbsp;đối nhau. Chọn B." }

{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính hợp lý giá trị biểu thức:<div class='mt-6'>$B = \\dfrac{2}{1 \\cdot 4} + \\dfrac{2}{4 \\cdot 7} + \\dfrac{2}{7 \\cdot 10} + \\dots + \\dfrac{2}{97 \\cdot 100}$</div>", strategy: "<strong>CHIẾN THUẬT TƯ DUY:</strong><br>Mẫu số cách nhau 3 đơn vị ($4-1=3$; $7-4=3$). NHƯNG tử số lại là số 2. Không thể áp dụng công thức sai phân trực tiếp. Ta phải 'ép' tử số thành 3 bằng cách nhân toàn bộ biểu thức với $\\dfrac{3}{2}$.", solution: "<li>Nhân cả 2 vế của biểu thức với $\\dfrac{3}{2}$ ta được:</li><li>$\\dfrac{3}{2} \\cdot B = \\dfrac{3}{2} \\cdot \\left( \\dfrac{2}{1 \\cdot 4} + \\dfrac{2}{4 \\cdot 7} + \\dots + \\dfrac{2}{97 \\cdot 100} \\right)$</li><li>Lúc này tử số sẽ triệt tiêu số 2 và biến thành 3:</li><li>$\\dfrac{3}{2} \\cdot B = \\dfrac{3}{1 \\cdot 4} + \\dfrac{3}{4 \\cdot 7} + \\dots + \\dfrac{3}{97 \\cdot 100}$</li><li>Áp dụng công thức sai phân:</li><li>$\\dfrac{3}{2} \\cdot B = \\left( \\dfrac{1}{1} - \\dfrac{1}{4} \\right) + \\left( \\dfrac{1}{4} - \\dfrac{1}{7} \\right) + \\dots + \\left( \\dfrac{1}{97} - \\dfrac{1}{100} \\right)$</li><li>Triệt tiêu các số hạng ở giữa: $\\dfrac{3}{2} \\cdot B = 1 - \\dfrac{1}{100} = \\dfrac{99}{100}$</li><li>Tìm lại $B$ bằng cách chia cho $\\dfrac{3}{2}$:</li><li>$B = \\dfrac{99}{100} : \\dfrac{3}{2} = \\dfrac{99}{100} \\cdot \\dfrac{2}{3} = \\dfrac{33}{50}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $B = \\dfrac{33}{50}$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm số tự nhiên&nbsp;$x, y$&nbsp;biết:&nbsp;$(2x + 1)(y - 3) = 15$", strategy: "<strong>CHIẾN THUẬT TƯ DUY:</strong><br>Đề cho $x, y$ là số tự nhiên ($x, y \\ge 0$) $\\Rightarrow (2x+1)$ là số tự nhiên $\\ge 1$.<br>Hơn nữa, $(2x+1)$ luôn là <strong>SỐ LẺ</strong>. Việc phát hiện điều kiện 'Số Lẻ' giúp ta loại bỏ ngay các Ước số chẵn của 15 (nếu có), giúp bảng giá trị rút ngắn tối đa.", solution: "<li>Vì $x, y \\in \\mathbb{N}$ nên $(2x+1)$ và $(y-3)$ là các số nguyên và là Ước của $15$.</li><li>Lại có $x \\ge 0 \\Rightarrow 2x+1 \\ge 1$. Hơn nữa $2x+1$ là <strong>số lẻ</strong>.</li><li>Các ước nguyên dương, lẻ của $15$ là: $\\{1; 3; 5; 15\\}$. Ta lập bảng xét các trường hợp:</li><li>+ TH1: $2x + 1 = 1 \\Rightarrow 2x = 0 \\Rightarrow x = 0$. Khi đó $y - 3 = 15 \\Rightarrow y = 18$ (Thỏa mãn $x, y \\in \\mathbb{N}$).</li><li>+ TH2: $2x + 1 = 3 \\Rightarrow 2x = 2 \\Rightarrow x = 1$. Khi đó $y - 3 = 5 \\Rightarrow y = 8$ (Thỏa mãn).</li><li>+ TH3: $2x + 1 = 5 \\Rightarrow 2x = 4 \\Rightarrow x = 2$. Khi đó $y - 3 = 3 \\Rightarrow y = 6$ (Thỏa mãn).</li><li>+ TH4: $2x + 1 = 15 \\Rightarrow 2x = 14 \\Rightarrow x = 7$. Khi đó $y - 3 = 1 \\Rightarrow y = 4$ (Thỏa mãn).</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Các cặp số $(x; y)$ cần tìm là: $(0; 18), (1; 8), (2; 6), (7; 4)$.</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Lớp 6A đi trồng cây. Ngày thứ nhất lớp trồng được&nbsp;$\\dfrac{1}{4}$&nbsp;tổng số cây. Ngày thứ hai trồng được&nbsp;$\\dfrac{4}{9}$&nbsp;số cây <strong>còn lại</strong>. Ngày thứ ba trồng nốt&nbsp;$120$&nbsp;cây.<div class='mt-6'>a) &nbsp; Hỏi lớp 6A phải trồng tất cả bao nhiêu cây?</div><div class='mt-6'>b) &nbsp; Nếu mỗi học sinh lớp 6A trồng đúng&nbsp;$5$&nbsp;cây thì lớp có bao nhiêu học sinh?</div>", strategy: "<strong>CHIẾN THUẬT TƯ DUY:</strong><br>Toán tính giá trị phân số tính ngược từ cuối. Ngày thứ 3 trồng 120 cây, đây là phần còn lại sau khi Ngày thứ 2 trồng $\\dfrac{4}{9}$ số cây. Nghĩa là 120 cây ứng với $1 - \\dfrac{4}{9} = \\dfrac{5}{9}$ số cây còn lại sau Ngày 1. Dùng phép chia để đi ngược lên.", solution: "<li><strong>a)</strong> Phân số chỉ $120$ cây (ngày thứ 3 trồng) so với số cây còn lại sau ngày thứ 1 là:</li><li>$1 - \\dfrac{4}{9} = \\dfrac{5}{9}$ (số cây còn lại sau ngày 1).</li><li>Số cây còn lại sau ngày thứ 1 là: $120 : \\dfrac{5}{9} = 120 \\cdot \\dfrac{9}{5} = 216$ (cây).</li><li>Phân số chỉ $216$ cây này so với 'tổng số cây' là: $1 - \\dfrac{1}{4} = \\dfrac{3}{4}$ (tổng số cây).</li><li>Tổng số cây lớp 6A phải trồng là: $216 : \\dfrac{3}{4} = 216 \\cdot \\dfrac{4}{3} = 288$ (cây).</li><li class='mt-3'><strong>b)</strong> Vì mỗi học sinh trồng đúng $5$ cây, nên số học sinh của lớp là:</li><li>$288 : 5 = 57,6$ (học sinh).</li><li>Lưu ý: Số học sinh phải là số tự nhiên. Do đó, dữ kiện đề bài mâu thuẫn về mặt thực tế.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 288 cây; b) Dữ kiện mâu thuẫn thực tế.</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Cho&nbsp;$100$&nbsp;điểm phân biệt trong mặt phẳng.<div class='mt-6'>a) &nbsp; Giả sử không có 3 điểm nào thẳng hàng. Tính số đường thẳng đi qua các cặp điểm.</div><div class='mt-6'>b) &nbsp; Giả sử trong 100 điểm đó có đúng 10 điểm thẳng hàng. Tính số đường thẳng đi qua các cặp điểm.</div>", strategy: "<strong>CHIẾN THUẬT TƯ DUY:</strong><br><strong>Ý a:</strong> Công thức tổng quát số đường thẳng đi qua $n$ điểm là $\\dfrac{n(n-1)}{2}$.<br><strong>Ý b:</strong> Mẹo làm là: Cứ tính tổng như bình thường (giả sử không thẳng hàng). Sau đó TRỪ đi số đường thẳng do 10 điểm thẳng hàng tạo ra. Cuối cùng CỘNG bù lại 1 đường thẳng (vì 10 điểm đó tạo thành đúng 1 đường thẳng duy nhất).", solution: "<li><strong>a)</strong> Cứ $2$ điểm phân biệt tạo thành $1$ đường thẳng. Lấy $1$ điểm nối với $99$ điểm còn lại ta được $99$ đường thẳng.</li><li>Có $100$ điểm nên ta kẻ được: $100 \\cdot 99 = 9900$ (đường thẳng).</li><li>Nhưng mỗi đường thẳng đã được tính $2$ lần (từ A đến B và từ B đến A).</li><li>Vậy số đường thẳng thực tế là: $\\dfrac{9900}{2} = 4950$ (đường thẳng).</li><li class='mt-3'><strong>b)</strong> Nếu $10$ điểm này không có 3 điểm nào thẳng hàng, số đường thẳng chúng tạo ra là: $\\dfrac{10 \\cdot 9}{2} = 45$ (đường thẳng).</li><li>Do $10$ điểm này thẳng hàng, nên thay vì tạo ra $45$ đường thẳng, chúng chỉ tạo ra duy nhất $1$ <strong>đường thẳng</strong>.</li><li>Số đường thẳng bị 'hao hụt' đi là: $45 - 1 = 44$ (đường thẳng).</li><li>Vậy tổng số đường thẳng thực tế kẻ được là: $4950 - 44 = 4906$ (đường thẳng).</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 4950 đường; b) 4906 đường.</li>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "(Nguyên lý Dirichlet) Cho&nbsp;$5$&nbsp;số tự nhiên bất kỳ. Chứng minh rằng luôn có thể chọn ra được&nbsp;$3$&nbsp;số sao cho tổng của chúng chia hết cho&nbsp;$3$.", strategy: "<strong>CHIẾN THUẬT TƯ DUY:</strong><br>Bất kỳ số tự nhiên nào khi chia cho 3 cũng chỉ có 1 trong 3 số dư: $\\{0; 1; 2\\}$. Áp dụng Dirichlet (Chuồng thỏ): Có 5 số tự nhiên (5 con thỏ) mà chỉ có 3 loại số dư (3 chuồng). Sẽ có những số có cùng số dư. Việc chia trường hợp sẽ giải quyết được bài toán.", solution: "<li>Một số tự nhiên khi chia cho $3$ chỉ có thể nhận $1$ trong $3$ số dư là: dư $0$, dư $1$, hoặc dư $2$.</li><li>Ta phân $5$ số tự nhiên đã cho vào $3$ nhóm theo số dư khi chia cho $3$: Nhóm dư $0$, Nhóm dư $1$, Nhóm dư $2$.</li><li><strong>Trường hợp 1:</strong> Nếu cả $3$ nhóm này đều có ít nhất $1$ phần tử (tức là tồn tại 3 số có số dư lần lượt là $0, 1, 2$). Gọi 3 số đó là $3k, 3m+1, 3p+2$. Tổng của chúng là: $(3k) + (3m+1) + (3p+2) = 3(k+m+p+1) \\vdots 3$ (Luôn đúng).</li><li><strong>Trường hợp 2:</strong> Nếu có ít nhất 1 nhóm bị rỗng. Nghĩa là $5$ số tự nhiên được phân vào tối đa $2$ nhóm.</li><li>Theo Nguyên lý Dirichlet, nhốt $5$ con thỏ vào $2$ chuồng thì chắc chắn tồn tại ít nhất 1 chuồng chứa từ $3$ con thỏ trở lên.</li><li>Nghĩa là, chắc chắn tồn tại $3$ số tự nhiên có <strong>cùng số dư</strong> khi chia cho $3$. Gọi 3 số đó là $3k+r, 3m+r, 3p+r$ (với $r$ là số dư chung).</li><li>Tổng của chúng là: $(3k+r) + (3m+r) + (3p+r) = 3(k+m+p) + 3r \\vdots 3$ (Luôn đúng).</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Trong mọi trường hợp, ta luôn chọn được $3$ số có tổng chia hết cho $3$.</li>" }

{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính hợp lý giá trị biểu thức:<div class='mt-6'>$A = \\left(1 + \\dfrac{1}{2}\\right) \\cdot \\left(1 + \\dfrac{1}{3}\\right) \\cdot \\left(1 + \\dfrac{1}{4}\\right) \\cdot \\dots \\cdot \\left(1 + \\dfrac{1}{2025}\\right)$</div>", strategy: "Tính trực tiếp giá trị trong từng ngoặc đơn. Quan sát quy luật triệt tiêu chéo giữa tử số của phân số trước và mẫu số của phân số sau.", solution: "<li><strong>Bài giải:</strong></li><li>Ta có:&nbsp;$A = \\dfrac{3}{2} \\cdot \\dfrac{4}{3} \\cdot \\dfrac{5}{4} \\cdot \\dots \\cdot \\dfrac{2026}{2025}$</li><li>Thực hiện rút gọn chéo các thừa số giống nhau ở tử và mẫu:</li><li>Các số từ&nbsp;$3$&nbsp;đến&nbsp;$2025$&nbsp;xuất hiện ở cả tử và mẫu nên bị triệt tiêu.</li><li>Khi đó biểu thức còn lại:&nbsp;$A = \\dfrac{2026}{2}$</li><li>$A = 1013$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $A = 1013$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm các số nguyên&nbsp;$x, y$&nbsp;thỏa mãn:&nbsp;$xy - 2x + y = 5$", strategy: "Dùng phương pháp phân tích đa thức thành nhân tử (ép tích). Nhóm&nbsp;$x$&nbsp;để xuất hiện cụm&nbsp;$(y-2)$, sau đó cộng/trừ hằng số vào hai vế để tạo nhân tử chung còn lại.", solution: "<li><strong>Bài giải:</strong></li><li>Ta có:&nbsp;$x(y - 2) + y = 5$</li><li>Cộng vào hai vế của phương trình với&nbsp;$-2$&nbsp;để tạo nhân tử chung:</li><li>$x(y - 2) + (y - 2) = 5 - 2$</li><li>$\\Rightarrow (x + 1)(y - 2) = 3$</li><li>Vì&nbsp;$x, y$&nbsp;là các số nguyên nên&nbsp;$(x + 1)$&nbsp;và&nbsp;$(y - 2)$&nbsp;là các ước nguyên của&nbsp;$3$.</li><li>Ta có&nbsp;$Ư(3) = \\{\\pm 1; \\pm 3\\}$. Ta lập bảng xét các trường hợp:</li><li>- TH1: $x+1=1, y-2=3 \\Rightarrow x=0, y=5$</li><li>- TH2: $x+1=3, y-2=1 \\Rightarrow x=2, y=3$</li><li>- TH3: $x+1=-1, y-2=-3 \\Rightarrow x=-2, y=-1$</li><li>- TH4: $x+1=-3, y-2=-1 \\Rightarrow x=-4, y=1$</li><li class='font-bold text-indigo-700 mt-1'>Vậy các cặp $(x; y)$ thỏa mãn là: $(0; 5), (2; 3), (-2; -1), (-4; 1)$.</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Hai vòi nước cùng chảy vào một bể không có nước. Nếu vòi 1 chảy riêng thì sau&nbsp;$4$&nbsp;giờ đầy bể. Nếu vòi 2 chảy riêng thì sau&nbsp;$6$&nbsp;giờ đầy bể. Người ta mở vòi 1 chảy trong&nbsp;$1$&nbsp;giờ rồi khóa lại, sau đó mở vòi 2. Hỏi vòi 2 phải chảy thêm bao lâu nữa thì bể đầy?", strategy: "Coi cả bể là&nbsp;$1$&nbsp;đơn vị. Tính năng suất của từng vòi trong&nbsp;$1$&nbsp;giờ. Tính lượng nước vòi 1 đã chảy, từ đó tìm phần bể còn trống và thời gian vòi 2 chảy nốt.", solution: "<li><strong>Bài giải:</strong></li><li>Trong&nbsp;$1$&nbsp;giờ, vòi 1 chảy được:&nbsp;$1 : 4 = \\dfrac{1}{4}$&nbsp;(bể).</li><li>Trong&nbsp;$1$&nbsp;giờ, vòi 2 chảy được:&nbsp;$1 : 6 = \\dfrac{1}{6}$&nbsp;(bể).</li><li>Sau&nbsp;$1$&nbsp;giờ vòi 1 chảy, lượng nước đã có trong bể là&nbsp;$\\dfrac{1}{4}$&nbsp;bể.</li><li>Phần bể còn trống cần phải chảy thêm là:&nbsp;$1 - \\dfrac{1}{4} = \\dfrac{3}{4}$&nbsp;(bể).</li><li>Thời gian để vòi 2 chảy đầy phần bể còn trống đó là:</li><li>$\\dfrac{3}{4} : \\dfrac{1}{6} = \\dfrac{3}{4} \\cdot 6 = \\dfrac{18}{4} = 4,5$&nbsp;(giờ).</li><li>Đổi&nbsp;$4,5$&nbsp;giờ&nbsp;$= 4$&nbsp;giờ&nbsp;$30$&nbsp;phút.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: 4 giờ 30 phút</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Cho đoạn thẳng&nbsp;$AB = 12\\text{ cm}$. Điểm&nbsp;$C$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;sao cho&nbsp;$AC = 4\\text{ cm}$. Gọi&nbsp;$M, N$&nbsp;lần lượt là trung điểm của&nbsp;$AC$&nbsp;và&nbsp;$CB$.<div class='mt-6'>a) Tính độ dài đoạn thẳng&nbsp;$CB$.</div><div class='mt-6'>b) Tính độ dài đoạn thẳng&nbsp;$MN$.</div>", strategy: "Sử dụng hệ thức cộng đoạn thẳng khi biết điểm nằm giữa. Áp dụng định nghĩa trung điểm để tìm các đoạn nhỏ, sau đó lập luận vị trí điểm nằm giữa để tính tổng đoạn nối hai trung điểm.", solution: "<li><strong>Bài giải:</strong></li><li><strong>a)</strong> Vì điểm&nbsp;$C$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$ nên:</li><li>$AC + CB = AB \\Rightarrow 4 + CB = 12 \\Rightarrow CB = 8\\text{ (cm)}$.</li><li class='mt-2'><strong>b)</strong> Vì&nbsp;$M$&nbsp;là trung điểm của&nbsp;$AC$ nên&nbsp;$MC = \\dfrac{AC}{2} = \\dfrac{4}{2} = 2\\text{ (cm)}$.</li><li>Vì&nbsp;$N$&nbsp;là trung điểm của&nbsp;$CB$ nên&nbsp;$CN = \\dfrac{CB}{2} = \\dfrac{8}{2} = 4\\text{ (cm)}$.</li><li>Vì&nbsp;$C$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$ nên tia&nbsp;$CA$&nbsp;và tia&nbsp;$CB$&nbsp;đối nhau.</li><li>Mà&nbsp;$M$&nbsp;thuộc tia&nbsp;$CA, N$&nbsp;thuộc tia&nbsp;$CB$ nên điểm&nbsp;$C$&nbsp;nằm giữa&nbsp;$M$&nbsp;và&nbsp;$N$.</li><li>$\\Rightarrow MN = MC + CN = 2 + 4 = 6\\text{ (cm)}$.</li><div class='flex justify-center my-8'><svg width='400' height='80' viewBox='0 0 400 80'><line x1='20' y1='40' x2='380' y2='40' stroke='black' stroke-width='1.5'/><circle cx='40' cy='40' r='2.5' fill='black'/><text x='35' y='60' font-size='14'>A</text><circle cx='100' cy='40' r='2.5' fill='red'/><text x='95' y='60' font-size='14' fill='red'>M</text><circle cx='160' cy='40' r='2.5' fill='black'/><text x='155' y='60' font-size='14'>C</text><circle cx='260' cy='40' r='2.5' fill='red'/><text x='255' y='60' font-size='14' fill='red'>N</text><circle cx='360' cy='40' r='2.5' fill='black'/><text x='355' y='60' font-size='14'>B</text><path d='M 100 30 L 100 20 L 260 20 L 260 30' fill='none' stroke='blue' stroke-width='0.5'/><text x='170' y='15' font-size='11' fill='blue'>MN = 6cm</text></svg></div><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) CB = 8cm; b) MN = 6cm</li>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Chứng minh rằng:&nbsp;$\\dfrac{1}{2^2} + \\dfrac{1}{4^2} + \\dfrac{1}{6^2} + \\dots + \\dfrac{1}{100^2} < \\dfrac{1}{2}$", strategy: "Đây là dãy bình phương các số chẵn. Ta đặt&nbsp;$\\dfrac{1}{2^2}$&nbsp;làm nhân tử chung để đưa về dãy bình phương các số tự nhiên liên tiếp, sau đó áp dụng bất đẳng thức làm trội quen thuộc.", solution: "<li><strong>Bài giải:</strong></li><li>Gọi tổng cần chứng minh là&nbsp;$S$. Ta có:</li><li>$S = \\dfrac{1}{2^2} \\cdot \\left( \\dfrac{1}{1^2} + \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dots + \\dfrac{1}{50^2} \\right)$</li><li>$S = \\dfrac{1}{4} \\cdot \\left( 1 + \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dots + \\dfrac{1}{50^2} \\right)$</li><li>Áp dụng bất đẳng thức&nbsp;$\\dfrac{1}{n^2} < \\dfrac{1}{(n-1)n}$ cho các số hạng từ&nbsp;$\\dfrac{1}{2^2}$ trở đi:</li><li>$S < \\dfrac{1}{4} \\cdot \\left[ 1 + \\left( \\dfrac{1}{1 \\cdot 2} + \\dfrac{1}{2 \\cdot 3} + \\dots + \\dfrac{1}{49 \\cdot 50} \\right) \\right]$</li><li>$S < \\dfrac{1}{4} \\cdot \\left[ 1 + \\left( 1 - \\dfrac{1}{2} + \\dfrac{1}{2} - \\dfrac{1}{3} + \\dots + \\dfrac{1}{49} - \\dfrac{1}{50} \\right) \\right]$</li><li>$S < \\dfrac{1}{4} \\cdot \\left[ 1 + \\left( 1 - \\dfrac{1}{50} \\right) \\right] = \\dfrac{1}{4} \\cdot \\left( 2 - \\dfrac{1}{50} \\right) = \\dfrac{1}{2} - \\dfrac{1}{200}$</li><li>Vì&nbsp;$\\dfrac{1}{200} > 0$ nên&nbsp;$\\dfrac{1}{2} - \\dfrac{1}{200} < \\dfrac{1}{2}$.</li><li>Vậy&nbsp;$S < \\dfrac{1}{2}$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Bất đẳng thức được chứng minh.</li>" }
]
});
</script>

{ q_title: "Câu 5", q_content: "Một hình chữ nhật có chiều dài tăng&nbsp;$10\\%$, chiều rộng giảm&nbsp;$10\\%$. Diện tích hình chữ nhật đó sẽ:", options: ["A. Không đổi", "B. Giảm 1%", "C. Tăng 1%", "D. Giảm 10%"], correct_idx: 1, explain: "Coi dài là&nbsp;$a$, rộng là&nbsp;$b$, diện tích là&nbsp;$ab$. Kích thước mới là&nbsp;$1,1a$&nbsp;và&nbsp;$0,9b$. Diện tích mới:&nbsp;$1,1a \\cdot 0,9b = 0,99ab$. Vậy diện tích giảm&nbsp;$1\\%$. Chọn B." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$29,996$&nbsp;đến hàng phần mười ta được:", options: ["A. 30,0", "B. 29,9", "C. 29,99", "D. 30"], correct_idx: 0, explain: "Chữ số hàng phần trăm là&nbsp;$9 \\ge 5$, tăng hàng phần mười thêm&nbsp;$1$&nbsp;đơn vị.&nbsp;$9+1=10$&nbsp;viết&nbsp;$0$&nbsp;nhớ&nbsp;$1$. Kết quả là&nbsp;$30,0$. (Giữ số 0 để chỉ rõ độ chính xác hàng phần mười). Chọn A." },
{ q_title: "Câu 7", q_content: "Có&nbsp;$12$&nbsp;điểm phân biệt trong đó không có&nbsp;$3$&nbsp;điểm nào thẳng hàng. Vẽ được bao nhiêu đoạn thẳng nối các cặp điểm?", options: ["A. 12", "B. 24", "C. 66", "D. 132"], correct_idx: 2, explain: "Số đoạn thẳng là:&nbsp;$\\dfrac{12 \\cdot 11}{2} = 66$. Chọn C." },
{ q_title: "Câu 8", q_content: "Cho hai góc kề bù&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$. Biết&nbsp;$\\angle xOy = 50^{\\circ}$. Số đo&nbsp;$\\angle yOz$&nbsp;là:", options: ["A. $40^{\\circ}$", "B. $130^{\\circ}$", "C. $140^{\\circ}$", "D. $50^{\\circ}$"], correct_idx: 1, explain: "Hai góc kề bù có tổng số đo bằng&nbsp;$180^{\\circ}$. Vậy&nbsp;$\\angle yOz = 180^{\\circ} - 50^{\\circ} = 130^{\\circ}$. Chọn B." },
{ q_title: "Câu 9", q_content: "Điểm&nbsp;$I$&nbsp;là trung điểm của đoạn&nbsp;$AB$&nbsp;khi:", options: ["A. $IA = IB$", "B. $I$&nbsp;nằm giữa&nbsp;$A, B$", "C. $IA + IB = AB$&nbsp;và&nbsp;$IA = IB$", "D. $IA + IB = AB$"], correct_idx: 2, explain: "Trung điểm phải thỏa mãn đồng thời hai điều kiện: nằm giữa ($IA+IB=AB$) và cách đều ($IA=IB$). Chọn C." },
{ q_title: "Câu 10", q_content: "Cho điểm&nbsp;$M \\notin d$. Có bao nhiêu đường thẳng đi qua&nbsp;$M$&nbsp;và song song với&nbsp;$d$?", options: ["A. 0", "B. 1", "C. 2", "D. Vô số"], correct_idx: 1, explain: "Theo tiên đề Euclid, qua một điểm nằm ngoài một đường thẳng, chỉ có duy nhất một đường thẳng song song với đường thẳng đó. Chọn B." },

tu_luan: [
{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính hợp lý giá trị biểu thức:<div class='mt-6'>$B = \\dfrac{1}{1 \\cdot 3} + \\dfrac{1}{3 \\cdot 5} + \\dfrac{1}{5 \\cdot 7} + \\dots + \\dfrac{1}{99 \\cdot 101}$</div>", strategy: "Mẫu số là tích hai số cách nhau&nbsp;$2$&nbsp;đơn vị. Ta nhân toàn bộ biểu thức với&nbsp;$2$&nbsp;để tử số bằng khoảng cách mẫu, sau đó áp dụng công thức sai phân.", solution: "<li>Nhân cả hai vế của biểu thức&nbsp;$B$&nbsp;với&nbsp;$2$ ta được:</li><li>$2B = \\dfrac{2}{1 \\cdot 3} + \\dfrac{2}{3 \\cdot 5} + \\dfrac{2}{5 \\cdot 7} + \\dots + \\dfrac{2}{99 \\cdot 101}$</li><li>Áp dụng công thức sai phân tách từng phân số:</li><li>$2B = \\left( 1 - \\dfrac{1}{3} \\right) + \\left( \\dfrac{1}{3} - \\dfrac{1}{5} \\right) + \\dots + \\left( \\dfrac{1}{99} - \\dfrac{1}{101} \\right)$</li><li>Triệt tiêu các số hạng đối nhau ở giữa, ta còn lại:</li><li>$2B = 1 - \\dfrac{1}{101} = \\dfrac{100}{101}$</li><li>$\\Rightarrow B = \\dfrac{100}{101} : 2 = \\dfrac{50}{101}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $B = \\dfrac{50}{101}$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm số tự nhiên&nbsp;$n$&nbsp;để phân số&nbsp;$\\dfrac{2n + 5}{n + 1}$&nbsp;có giá trị là một số tự nhiên.", strategy: "Tách tử số theo mẫu số để đưa về dạng: Số nguyên + (Phân số có tử là hằng số). Sau đó tìm ước của tử số đó.", solution: "<li>Ta phân tích tử số theo mẫu số:</li><li>$\\dfrac{2n + 5}{n + 1} = \\dfrac{2(n + 1) + 3}{n + 1} = \\dfrac{2(n + 1)}{n + 1} + \\dfrac{3}{n + 1} = 2 + \\dfrac{3}{n + 1}$</li><li>Để phân số có giá trị là số tự nhiên thì&nbsp;$3 \\vdots (n + 1)$&nbsp;và biểu thức phải không âm.</li><li>Vì&nbsp;$n$&nbsp;là số tự nhiên nên&nbsp;$n \\ge 0 \\Rightarrow n + 1 \\ge 1$.</li><li>Suy ra&nbsp;$(n + 1) \\in Ư(3) = \\{1; 3\\}$.</li><li>- Trường hợp 1: $n + 1 = 1 \\Rightarrow n = 0$ (thỏa mãn).</li><li>- Trường hợp 2: $n + 1 = 3 \\Rightarrow n = 2$ (thỏa mãn).</li><li class='font-bold text-indigo-700 mt-1'>Vậy $n \\in \\{0; 2\\}$.</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Một cửa hàng bán gạo. Lần thứ nhất bán được&nbsp;$\\dfrac{1}{3}$&nbsp;số gạo trong kho. Lần thứ hai bán được&nbsp;$\\dfrac{3}{5}$&nbsp;số gạo CÒN LẠI. Sau hai lần bán, trong kho còn đúng&nbsp;$60\\text{ kg}$&nbsp;gạo. Hỏi lúc đầu trong kho có bao nhiêu kg gạo?", strategy: "Sử dụng phương pháp tính ngược từ cuối. $60\\text{ kg}$&nbsp;tương ứng với phần gạo còn lại sau lần bán thứ 2.", solution: "<li><strong>Tóm tắt bài giải:</strong></li><li>Sau lần bán thứ hai, phân số chỉ số gạo còn lại so với số gạo sau lần 1 là:</li><li>$1 - \\dfrac{3}{5} = \\dfrac{2}{5}$ (số gạo còn lại sau lần 1).</li><li>Số gạo còn lại sau lần thứ nhất là:</li><li>$60 : \\dfrac{2}{5} = 150\\text{ (kg)}$.</li><li>Phân số chỉ&nbsp;$150\\text{ kg}$&nbsp;so với tổng số gạo lúc đầu là:</li><li>$1 - \\dfrac{1}{3} = \\dfrac{2}{3}$ (tổng số gạo).</li><li>Tổng số gạo lúc đầu trong kho là:</li><li>$150 : \\dfrac{2}{3} = 225\\text{ (kg)}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: 225 kg gạo</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Cho&nbsp;$100$&nbsp;điểm phân biệt trong đó có đúng&nbsp;$5$&nbsp;điểm thẳng hàng. Cứ qua&nbsp;$2$&nbsp;điểm ta vẽ được một đường thẳng. Hỏi vẽ được tất cả bao nhiêu đường thẳng?", strategy: "Giả sử không có điểm nào thẳng hàng, tính tổng đường thẳng. Sau đó trừ đi số đường thẳng bị 'mất' do 5 điểm kia thẳng hàng (thay vì tạo nhiều đường, chúng chỉ tạo 1 đường duy nhất).", solution: "<li>Nếu&nbsp;$100$&nbsp;điểm không có 3 điểm nào thẳng hàng, số đường thẳng vẽ được là:</li><li>$\\dfrac{100 \\cdot 99}{2} = 4950$ (đường thẳng).</li><li>Xét riêng&nbsp;$5$&nbsp;điểm thẳng hàng:</li><li>- Nếu không thẳng hàng, chúng tạo ra:&nbsp;$\\dfrac{5 \\cdot 4}{2} = 10$ (đường thẳng).</li><li>- Vì thẳng hàng, chúng chỉ tạo ra đúng&nbsp;<strong>1 đường thẳng</strong>.</li><li>Số đường thẳng bị giảm đi là:&nbsp;$10 - 1 = 9$ (đường thẳng).</li><li>Tổng số đường thẳng thực tế vẽ được là:</li><li>$4950 - 9 = 4941$ (đường thẳng).</li><div class='flex justify-center my-8'><svg width='300' height='60' viewBox='0 0 300 60'><line x1='20' y1='30' x2='280' y2='30' stroke='black' stroke-width='1'/><circle cx='60' cy='30' r='3' fill='red'/><circle cx='100' cy='30' r='3' fill='red'/><circle cx='140' cy='30' r='3' fill='red'/><circle cx='180' cy='30' r='3' fill='red'/><circle cx='220' cy='30' r='3' fill='red'/><text x='110' y='55' font-size='12' fill='red' font-weight='bold'>5 điểm thẳng hàng</text></svg></div><li class='font-bold text-indigo-700 mt-1'>Đáp số: 4941 đường thẳng</li>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Chứng minh rằng với mọi số tự nhiên&nbsp;$n$, phân số&nbsp;$P = \\dfrac{21n + 4}{14n + 3}$&nbsp;luôn là phân số tối giản.", strategy: "Sử dụng thuật toán tìm ƯCLN. Nhân hệ số để triệt tiêu biến&nbsp;$n$, chứng minh ƯCLN của tử và mẫu luôn bằng&nbsp;$1$.", solution: "<li>Gọi&nbsp;$d$&nbsp;là Ước chung lớn nhất của&nbsp;$(21n + 4)$&nbsp;và&nbsp;$(14n + 3)$&nbsp;($d \\in \\mathbb{N}^*$).</li><li>Ta có:&nbsp;$(21n + 4) \\vdots d$ và&nbsp;$(14n + 3) \\vdots d$.</li><li>$\\Rightarrow 2 \\cdot (21n + 4) \\vdots d \\Rightarrow (42n + 8) \\vdots d$.</li><li>$\\Rightarrow 3 \\cdot (14n + 3) \\vdots d \\Rightarrow (42n + 9) \\vdots d$.</li><li>Lấy hiệu:&nbsp;$[(42n + 9) - (42n + 8)] \\vdots d \\Rightarrow 1 \\vdots d$.</li><li>Vì&nbsp;$d \\in \\mathbb{N}^*$ và&nbsp;$1 \\vdots d$ nên&nbsp;$d = 1$.</li><li>Vì ƯCLN của tử và mẫu bằng&nbsp;$1$ nên phân số&nbsp;$P$&nbsp;luôn tối giản với mọi&nbsp;$n \\in \\mathbb{N}$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Điều phải chứng minh.</li>" }
]
});
</script>

{ q_title: "Câu 4", q_content: "Kết quả phép chia&nbsp;$-5 : \\dfrac{10}{3}$&nbsp;là:", options: ["A. $\\dfrac{-50}{3}$", "B. $\\dfrac{-3}{2}$", "C. $\\dfrac{-2}{3}$", "D. $\\dfrac{3}{2}$"], correct_idx: 1, explain: "Ta có:&nbsp;$-5 \\cdot \\dfrac{3}{10} = \\dfrac{-15}{10} = \\dfrac{-3}{2}$. Chọn B." },
{ q_title: "Câu 5", q_content: "Một lớp có&nbsp;$40$&nbsp;học sinh. Số học sinh nam là&nbsp;$16$. Tỉ số phần trăm học sinh nữ của lớp là:", options: ["A. 40%", "B. 60%", "C. 24%", "D. 160%"], correct_idx: 1, explain: "Số học sinh nữ là&nbsp;$40 - 16 = 24$. Tỉ số phần trăm:&nbsp;$(24 : 40) \\cdot 100\\% = 60\\%$. Chọn B." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$599,99$&nbsp;đến hàng đơn vị ta được:", options: ["A. 599", "B. 600", "C. 600,0", "D. 599,0"], correct_idx: 1, explain: "Chữ số hàng phần mười là&nbsp;$9 \\ge 5$, ta tăng hàng đơn vị thêm&nbsp;$1$.&nbsp;$599 + 1 = 600$. Chọn B." },
{ q_title: "Câu 7", q_content: "Biểu thức&nbsp;$|x| = -x$&nbsp;xảy ra khi:", options: ["A. $x > 0$", "B. $x = 0$", "C. $x \\le 0$", "D. Mọi $x \\in \\mathbb{R}$"], correct_idx: 2, explain: "Giá trị tuyệt đối của một số bằng số đối của nó khi số đó không dương (nhỏ hơn hoặc bằng 0). Chọn C." },

{ q_title: "Câu 9", q_content: "Vẽ&nbsp;$3$&nbsp;đường thẳng cắt nhau tại điểm&nbsp;$O$. Số góc tạo thành (kể cả góc bẹt) là:", options: ["A. 6", "B. 12", "C. 15", "D. 3"], correct_idx: 2, explain: "$3$&nbsp;đường thẳng tạo ra&nbsp;$6$&nbsp;tia chung gốc. Số góc là&nbsp;$\\dfrac{6 \\cdot 5}{2} = 15$. Chọn C." },
{ q_title: "Câu 10", q_content: "Hai góc phụ nhau có tỉ số là&nbsp;$1:2$. Góc lớn hơn bằng:", options: ["A. $60^{\\circ}$", "B. $30^{\\circ}$", "C. $120^{\\circ}$", "D. $90^{\\circ}$"], correct_idx: 0, explain: "Tổng&nbsp;$2$&nbsp;góc là&nbsp;$90^{\\circ}$. Góc lớn chiếm&nbsp;$2/3$&nbsp;tổng:&nbsp;$90 \\cdot \\dfrac{2}{3} = 60^{\\circ}$. Chọn A." },
{ q_title: "Câu 11", q_content: "Trong các số&nbsp;$2, 4, 6, 8, 10$, có bao nhiêu số nguyên tố?", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 1, explain: "Trong dãy chỉ có số&nbsp;$2$&nbsp;là số nguyên tố. Còn lại đều là hợp số. Chọn B." },

tu_luan: [
{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính hợp lý giá trị biểu thức:<div class='mt-6'>$A = \\dfrac{3}{1 \\cdot 4} + \\dfrac{3}{4 \\cdot 7} + \\dfrac{3}{7 \\cdot 10} + \\dots + \\dfrac{3}{100 \\cdot 103}$</div>", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Hãy chú ý vào hiệu giữa hai thừa số ở dưới mẫu số ($4-1=3, 7-4=3...$). Khi thấy hiệu này bằng đúng tử số, ta có thể tách mỗi phân số thành hiệu của hai phân số có tử bằng 1. Đây là kỹ thuật 'khử liên tiếp' (Sai phân).", solution: "<li><strong>Bài giải:</strong></li><li>Áp dụng công thức sai phân:&nbsp;$\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$</li><li>Ta có:&nbsp;$A = \\left( \\dfrac{1}{1} - \\dfrac{1}{4} \\right) + \\left( \\dfrac{1}{4} - \\dfrac{1}{7} \\right) + \\left( \\dfrac{1}{7} - \\dfrac{1}{10} \\right) + \\dots + \\left( \\dfrac{1}{100} - \\dfrac{1}{103} \\right)$</li><li>Thực hiện triệt tiêu các số hạng đối nhau ở giữa, biểu thức chỉ còn lại số hạng đầu và số hạng cuối:</li><li>$A = 1 - \\dfrac{1}{103}$</li><li>$A = \\dfrac{103}{103} - \\dfrac{1}{103} = \\dfrac{102}{103}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $A = \\dfrac{102}{103}$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $x + 20\\%x = 3,6$</div><div class='mt-6'>b) &nbsp; $|x - 1| = 2$</div>", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Với ý a, hãy đưa các số về cùng một dạng (phân số hoặc số thập phân) và sử dụng tính chất phân phối để đặt&nbsp;$x$&nbsp;làm nhân tử chung. Với ý b, nhớ rằng một giá trị tuyệt đối bằng một số dương luôn dẫn đến hai trường hợp đối nhau.", solution: "<li><strong>a)</strong> Ta có:&nbsp;$x + 0,2x = 3,6$ (Đổi $20\\% = 0,2$)</li><li>$x \\cdot (1 + 0,2) = 3,6$ (Đặt nhân tử chung)</li><li>$1,2 \\cdot x = 3,6 \\Rightarrow x = 3,6 : 1,2 = 3$.</li><li class='mt-3'><strong>b)</strong> $|x - 1| = 2$</li><li>Trường hợp 1:&nbsp;$x - 1 = 2 \\Rightarrow x = 3$.</li><li>Trường hợp 2:&nbsp;$x - 1 = -2 \\Rightarrow x = -1$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) x = 3; b) $x \\in \\{3; -1\\}$</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Giá một chiếc tủ lạnh ban đầu là&nbsp;$12.000.000$&nbsp;đồng, được giảm&nbsp;$20\\%$. Vì chị Hoa là thành viên Vàng nên được giảm thêm&nbsp;$5\\% $&nbsp;trên giá đã giảm.<div class='mt-6'>a) Chị Hoa phải trả bao nhiêu tiền?</div><div class='mt-6'>b) Biết giá nhập là&nbsp;$8.000.000$&nbsp;đồng. Tính lợi nhuận cửa hàng thu được theo phần trăm so với giá vốn?</div>", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Lưu ý bẫy tính toán! Giảm giá 20% rồi giảm tiếp 5% không có nghĩa là giảm tổng 25%. Ta phải tính giá trị sau đợt giảm 1, sau đó coi giá trị mới đó là 100% để tính đợt giảm 2. Ở câu b, lợi nhuận là phần chênh lệch giữa giá bán thực tế và giá vốn.", solution: "<li><strong>a)</strong> Giá chiếc tủ lạnh sau đợt giảm giá đầu tiên là:</li><li>$12.000.000 \\cdot (100\\% - 20\\%) = 9.600.000$ (đồng).</li><li>Số tiền thực tế chị Hoa phải trả sau khi giảm thêm&nbsp;$5\\%$&nbsp;là:</li><li>$9.600.000 \\cdot (100\\% - 5\\%) = 9.120.000$ (đồng).</li><li class='mt-3'><strong>b)</strong> Số tiền lãi cửa hàng thu được là:</li><li>$9.120.000 - 8.000.000 = 1.120.000$ (đồng).</li><li>Tỉ suất lợi nhuận so với giá vốn là:</li><li>$(1.120.000 : 8.000.000) \\cdot 100\\% = 14\\%$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 9.120.000 đồng; b) Lãi 14%.</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Vẽ hai tia đối nhau&nbsp;$Ox$&nbsp;và&nbsp;$Oy$. Lấy&nbsp;$A \\in Ox, OA = 3\\text{ cm}$. Lấy&nbsp;$B \\in Oy, OB = 5\\text{ cm}$. Gọi&nbsp;$M, N$&nbsp;lần lượt là trung điểm của&nbsp;$OA$&nbsp;và&nbsp;$OB$.<div class='mt-6'>a) Tính độ dài đoạn thẳng&nbsp;$AB$.</div><div class='mt-6'>b) Tính độ dài đoạn thẳng&nbsp;$MN$.</div>", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Hai tia đối nhau là chìa khóa để xác định điểm nào nằm giữa. Nếu&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;nằm trên hai tia đối nhau gốc&nbsp;$O$, thì&nbsp;$O$&nbsp;chắc chắn nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$. Từ đó, độ dài đoạn nối 2 trung điểm sẽ bằng tổng các nửa đoạn thẳng (theo hệ quả đoạn nối trung điểm kề nhau).", solution: "<li><strong>a)</strong> Vì&nbsp;$A \\in Ox$ và&nbsp;$B \\in Oy$&nbsp;là hai tia đối nhau nên điểm&nbsp;$O$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$.</li><li>$\\Rightarrow AB = OA + OB = 3 + 5 = 8\\text{ (cm)}$.</li><li class='mt-3'><strong>b)</strong> Vì&nbsp;$M$&nbsp;là trung điểm&nbsp;$OA \\Rightarrow MO = OA : 2 = 1,5\\text{ (cm)}$.</li><li>Vì&nbsp;$N$&nbsp;là trung điểm&nbsp;$OB \\Rightarrow ON = OB : 2 = 2,5\\text{ (cm)}$.</li><li>Vì&nbsp;$M$&nbsp;thuộc tia&nbsp;$Ox, N$&nbsp;thuộc tia&nbsp;$Oy$&nbsp;nên&nbsp;$O$&nbsp;nằm giữa&nbsp;$M$&nbsp;và&nbsp;$N$.</li><li>$\\Rightarrow MN = MO + ON = 1,5 + 2,5 = 4\\text{ (cm)}$.</li><div class='flex justify-center my-8'><svg width='400' height='80' viewBox='0 0 400 80'><line x1='20' y1='40' x2='380' y2='40' stroke='black' stroke-width='1.5'/><circle cx='100' cy='40' r='2.5' fill='black'/><text x='95' y='60' font-size='14'>A</text><circle cx='140' cy='40' r='2.5' fill='red'/><text x='136' y='60' font-size='14' fill='red'>M</text><circle cx='180' cy='40' r='2.5' fill='black'/><text x='175' y='60' font-size='14'>O</text><circle cx='230' cy='40' r='2.5' fill='red'/><text x='226' y='60' font-size='14' fill='red'>N</text><circle cx='280' cy='40' r='2.5' fill='black'/><text x='275' y='60' font-size='14'>B</text><text x='25' y='35' font-size='14' font-style='italic'>x</text><text x='370' y='35' font-size='14' font-style='italic'>y</text><path d='M 140 30 L 140 20 L 230 20 L 230 30' fill='none' stroke='blue' stroke-width='0.5'/><text x='175' y='15' font-size='11' fill='blue'>MN = 4cm</text></svg></div><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 8 cm; b) 4 cm</li>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Chứng minh bất đẳng thức sau:<br>$S = \\dfrac{1}{2} + \\dfrac{1}{3} + \\dfrac{1}{4} + \\dfrac{1}{5} + \\dfrac{1}{6} + \\dfrac{1}{7} + \\dfrac{1}{8} > 1$", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Đây là dạng toán chứng minh không tính toán trực tiếp giá trị tổng (vì sẽ lẻ và khó so sánh). Ta nên sử dụng phương pháp 'đánh giá' và 'nhóm'. Hãy chia dãy số thành các cụm và so sánh mỗi phân số trong cụm với phân số nhỏ nhất của cụm đó để tạo ra các tổng trung gian dễ tính ($1/2$).", solution: "<li><strong>Bài giải:</strong></li><li>Ta nhóm các số hạng của biểu thức&nbsp;$S$&nbsp;như sau:</li><li>$S = \\dfrac{1}{2} + \\left( \\dfrac{1}{3} + \\dfrac{1}{4} \\right) + \\left( \\dfrac{1}{5} + \\dfrac{1}{6} + \\dfrac{1}{7} + \\dfrac{1}{8} \\right)$</li><li>Ta tiến hành 'làm giảm' giá trị các phân số trong ngoặc bằng cách thay chúng bằng phân số nhỏ nhất của nhóm đó:</li><li>+ Trong nhóm 1:&nbsp;$\\dfrac{1}{3} > \\dfrac{1}{4} \\Rightarrow \\dfrac{1}{3} + \\dfrac{1}{4} > \\dfrac{1}{4} + \\dfrac{1}{4} = \\dfrac{2}{4} = \\dfrac{1}{2}$.</li><li>+ Trong nhóm 2:&nbsp;$\\dfrac{1}{5}, \\dfrac{1}{6}, \\dfrac{1}{7} > \\dfrac{1}{8} \\Rightarrow \\dfrac{1}{5} + \\dfrac{1}{6} + \\dfrac{1}{7} + \\dfrac{1}{8} > 4 \\cdot \\dfrac{1}{8} = \\dfrac{4}{8} = \\dfrac{1}{2}$.</li><li>Khi đó:&nbsp;$S > \\dfrac{1}{2} + \\dfrac{1}{2} + \\dfrac{1}{2} = \\dfrac{3}{2}$.</li><li>Vì&nbsp;$\\dfrac{3}{2} = 1,5 > 1$ nên&nbsp;$S > 1$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Bất đẳng thức được chứng minh.</li>" }
]
});
</script>
<!-- ==================== ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 30 (BẢN CHUẨN SƯ PHẠM) ==================== -->
<script>
window.EXAM_DATA = window.EXAM_DATA || [];
window.EXAM_DATA.push({
id: 30, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 30", icon: "📚", color: "indigo", level: "Học sinh giỏi", time: "90 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Cho&nbsp;$p$&nbsp;và&nbsp;$p+2$&nbsp;là hai số nguyên tố sinh đôi lớn hơn&nbsp;$3$. Khi đó, số&nbsp;$p+1$&nbsp;luôn chia hết cho:", options: ["A. 5", "B. 6", "C. 4", "D. 9"], correct_idx: 1, explain: "Vì&nbsp;$p, p+1, p+2$&nbsp;là ba số tự nhiên liên tiếp nên có một số chia hết cho&nbsp;$3$. Vì&nbsp;$p, p+2$&nbsp;là số nguyên tố lớn hơn&nbsp;$3$&nbsp;nên&nbsp;$p+1 \\vdots 3$. Vì&nbsp;$p, p+2$&nbsp;lẻ nên&nbsp;$p+1$&nbsp;chẵn&nbsp;$\\Rightarrow p+1 \\vdots 2$. Vậy&nbsp;$p+1$&nbsp;chia hết cho&nbsp;$BCNN(2,3)=6$. Chọn B." },
{ q_title: "Câu 2", q_content: "Cho tổng&nbsp;$A = \\dfrac{1}{2} - \\dfrac{1}{3} + \\dfrac{1}{4} - \\dfrac{1}{5} + \\dots + \\dfrac{1}{2024} - \\dfrac{1}{2025}$. Khẳng định nào sau đây ĐÚNG?", options: ["A. $A < 1$", "B. $A > 1$", "C. $A = 1$", "D. $A = 0,5$"], correct_idx: 0, explain: "Ta nhóm:&nbsp;$A = \\left(\\dfrac{1}{2} - \\dfrac{1}{3}\\right) + \\left(\\dfrac{1}{4} - \\dfrac{1}{5}\\right) + \\dots > 0$. Lại có&nbsp;$A = \\dfrac{1}{2} - \\left(\\dfrac{1}{3} - \\dfrac{1}{4}\\right) - \\dots < \\dfrac{1}{2}$. Rõ ràng&nbsp;$A < 1$. Chọn A." },
{ q_title: "Câu 3", q_content: "Tìm số tự nhiên&nbsp;$n = \\overline{1a2b}$&nbsp;lớn nhất sao cho&nbsp;$n$&nbsp;chia hết cho cả&nbsp;$5$&nbsp;và&nbsp;$9$&nbsp;nhưng KHÔNG chia hết cho&nbsp;$2$. Giá trị của&nbsp;$a \\cdot b$&nbsp;là:", options: ["A. 30", "B. 0", "C. 5", "D. 10"], correct_idx: 2, explain: "Vì&nbsp;$n \\vdots 5$&nbsp;và&nbsp;$n \\not\\vdots 2 \\Rightarrow b = 5$. Để&nbsp;$n \\vdots 9 \\Rightarrow 1+a+2+5 \\vdots 9 \\Rightarrow 8+a \\vdots 9 \\Rightarrow a = 1$. Vậy&nbsp;$n = 1125$. Giá trị&nbsp;$a \\cdot b = 1 \\cdot 5 = 5$. Chọn C." },
{ q_title: "Câu 4", q_content: "Tập hợp các số nguyên&nbsp;$n$&nbsp;để biểu thức&nbsp;$A = \\dfrac{n+3}{n-2}$&nbsp;đạt giá trị nguyên là:", options: ["A. $\\{1; 3; 7\\}$", "B. $\\{1; 3; -3; 7\\}$", "C. $\\{-3; 1; 3; 7\\}$", "D. $\\{3; 1; -3; 7; 0\\}$"], correct_idx: 2, explain: "$A = 1 + \\dfrac{5}{n-2}$. Để&nbsp;$A \\in \\mathbb{Z} \\Rightarrow n-2 \\in Ư(5) = \\{\\pm 1; \\pm 5\\}$. Giải ra&nbsp;$n \\in \\{3; 1; 7; -3\\}$. Chọn C." },
{ q_title: "Câu 5", q_content: "Tỉ số của hai số&nbsp;$a$&nbsp;và&nbsp;$b$&nbsp;ban đầu là&nbsp;$2:3$. Sau khi cộng thêm&nbsp;$10$&nbsp;vào&nbsp;$a$, tỉ số trở thành&nbsp;$3:4$. Tổng&nbsp;$(a+b)$&nbsp;ban đầu là:", options: ["A. 100", "B. 200", "C. 400", "D. 500"], correct_idx: 1, explain: "Gọi&nbsp;$a=2k, b=3k$. Ta có&nbsp;$(2k+10)/3k = 3/4 \\Rightarrow 8k + 40 = 9k \\Rightarrow k = 40$. Vậy&nbsp;$a=80, b=120$. Tổng&nbsp;$a+b = 200$. Chọn B." },
{ q_title: "Câu 6", q_content: "Làm tròn số thập phân vô hạn&nbsp;$x = -0,00567\\dots$&nbsp;đến hàng phần nghìn:", options: ["A. -0,005", "B. -0,006", "C. -0,0057", "D. -0,01"], correct_idx: 1, explain: "Chữ số ở hàng phần mười nghìn là&nbsp;$6 \\ge 5$, nên tăng chữ số hàng phần nghìn thêm&nbsp;$1$&nbsp;đơn vị.&nbsp;$5+1=6$. Kết quả:&nbsp;$-0,006$. Chọn B." },
{ q_title: "Câu 7", q_content: "Một chiếc đồng hồ chạy nhanh&nbsp;$5$&nbsp;phút mỗi ngày. Nếu hiện tại là&nbsp;$7:00$&nbsp;sáng và đang đúng, sau đúng&nbsp;$24$&nbsp;giờ thực tế, đồng hồ sẽ chỉ:", options: ["A. 7:05", "B. 6:55", "C. 7:00", "D. 12:00"], correct_idx: 0, explain: "Chạy nhanh nghĩa là đồng hồ đi trước thời gian thực.&nbsp;$24$&nbsp;giờ thực tế trôi qua thì đồng hồ chạy được&nbsp;$24$&nbsp;giờ&nbsp;$5$&nbsp;phút.&nbsp;Chọn A." },
{ q_title: "Câu 8", q_content: "Trong một buổi tiệc, nếu có&nbsp;$190$&nbsp;cái bắt tay và mỗi người bắt tay người khác đúng&nbsp;$1$&nbsp;lần. Số người tham dự là:", options: ["A. 19", "B. 20", "C. 21", "D. 40"], correct_idx: 1, explain: "Số cái bắt tay là&nbsp;$n(n-1)/2 = 190 \\Rightarrow n(n-1) = 380 = 20 \\cdot 19 \\Rightarrow n = 20$. Chọn B." },
{ q_title: "Câu 9", q_content: "Cho&nbsp;$\\angle xOy = 40^{\\circ}$&nbsp;và&nbsp;$\\angle xOz = 100^{\\circ}$&nbsp;(kề nhau). Tia phân giác của&nbsp;$\\angle yOz$&nbsp;tạo với tia&nbsp;$Ox$&nbsp;một góc:", options: ["A. $30^{\\circ}$", "B. $60^{\\circ}$", "C. $70^{\\circ}$", "D. $80^{\\circ}$"], correct_idx: 2, explain: "$\\angle yOz = 100 - 40 = 60^{\\circ}$. Phân giác&nbsp;$Ot$&nbsp;của&nbsp;$\\angle yOz$&nbsp;chia góc này thành&nbsp;$30^{\\circ}$. Góc&nbsp;$\\angle xOt = \\angle xOy + \\angle yOt = 40 + 30 = 70^{\\circ}$. Chọn C." },
{ q_title: "Câu 10", q_content: "Hai đường thẳng cắt nhau tạo thành 4 góc. Nếu tổng 3 góc là&nbsp;$250^{\\circ}$&nbsp;thì góc còn lại bằng:", options: ["A. $110^{\\circ}$", "B. $90^{\\circ}$", "C. $70^{\\circ}$", "D. $130^{\\circ}$"], correct_idx: 0, explain: "Tổng 4 góc quanh đỉnh là&nbsp;$360^{\\circ}$. Góc còn lại:&nbsp;$360 - 250 = 110^{\\circ}$. Chọn A." },
{ q_title: "Câu 11", q_content: "Trong các số từ&nbsp;$1$&nbsp;đến&nbsp;$100$, có bao nhiêu số nguyên tố LẺ?", options: ["A. 25", "B. 24", "C. 26", "D. 50"], correct_idx: 1, explain: "Có&nbsp;$25$&nbsp;số nguyên tố từ&nbsp;$1$&nbsp;đến&nbsp;$100$. Số&nbsp;$2$&nbsp;là số nguyên tố chẵn duy nhất. Vậy có&nbsp;$25 - 1 = 24$&nbsp;số nguyên tố lẻ. Chọn B." },
{ q_title: "Câu 12", q_content: "Điểm&nbsp;$M$&nbsp;nằm giữa&nbsp;$A, B$. Gọi&nbsp;$I, K$&nbsp;là trung điểm&nbsp;$AM, MB$. Nếu&nbsp;$IK = 5\\text{ cm}$&nbsp;thì&nbsp;$AB$&nbsp;dài:", options: ["A. $10\\text{ cm}$", "B. $2,5\\text{ cm}$", "C. $7,5\\text{ cm}$", "D. $5\\text{ cm}$"], correct_idx: 0, explain: "$IK = IM + MK = AM/2 + MB/2 = (AM+MB)/2 = AB/2 \\Rightarrow AB = 2 \\cdot 5 = 10\\text{ cm}$. Chọn A." }
],
tu_luan: [
{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính nhanh giá trị biểu thức:<div class='mt-6'>$M = \\dfrac{1}{2 \\cdot 5} + \\dfrac{1}{5 \\cdot 8} + \\dfrac{1}{8 \\cdot 11} + \\dots + \\dfrac{1}{98 \\cdot 101}$</div>", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Quan sát thấy hiệu hai thừa số ở mẫu là&nbsp;$3$ ($5-2=3, 8-5=3...$) trong khi tử số là&nbsp;$1$. Để áp dụng được công thức sai phân triệt tiêu, ta cần đưa tử số về đúng khoảng cách mẫu bằng cách nhân cả biểu thức với&nbsp;$3$. Sau đó tách thành các hiệu&nbsp;$\\left(\\dfrac{1}{n} - \\dfrac{1}{n+3}\\right)$.", solution: "<li>Ta có:&nbsp;$3M = \\dfrac{3}{2 \\cdot 5} + \\dfrac{3}{5 \\cdot 8} + \\dots + \\dfrac{3}{98 \\cdot 101}$</li><li>$3M = \\left( \\dfrac{1}{2} - \\dfrac{1}{5} \\right) + \\left( \\dfrac{1}{5} - \\dfrac{1}{8} \\right) + \\dots + \\left( \\dfrac{1}{98} - \\dfrac{1}{101} \\right)$</li><li>$3M = \\dfrac{1}{2} - \\dfrac{1}{101} = \\dfrac{99}{202}$</li><li>$\\Rightarrow M = \\dfrac{99}{202} : 3 = \\dfrac{33}{202}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $M = \\dfrac{33}{202}$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm các cặp số nguyên&nbsp;$(x, y)$&nbsp;thỏa mãn phương trình:&nbsp;$xy + 3x - 2y = 11$", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Đây là phương trình nghiệm nguyên dạng tích. Ta sử dụng phương pháp 'ép nhân tử' bằng cách nhóm&nbsp;$x$&nbsp;ra ngoài từ hai hạng tử đầu. Sau đó thêm/bớt hằng số ở hai vế để xuất hiện nhân tử chung thứ hai là&nbsp;$(y+3)$. Cuối cùng lập bảng xét các ước của một số nguyên.", solution: "<li>Ta có:&nbsp;$x(y + 3) - 2y = 11$</li><li>Trừ cả hai vế cho&nbsp;$6$ để tạo nhân tử chung&nbsp;$(y+3)$:</li><li>$x(y + 3) - 2y - 6 = 11 - 6$</li><li>$x(y + 3) - 2(y + 3) = 5$</li><li>$(x - 2)(y + 3) = 5$</li><li>Vì&nbsp;$x, y \\in \\mathbb{Z}$ nên&nbsp;$(x-2)$ và&nbsp;$(y+3)$ là các ước của&nbsp;$5$. Ta có bảng giá trị:</li><li>+ $x-2=1, y+3=5 \\Rightarrow x=3, y=2$</li><li>+ $x-2=5, y+3=1 \\Rightarrow x=7, y=-2$</li><li>+ $x-2=-1, y+3=-5 \\Rightarrow x=1, y=-8$</li><li>+ $x-2=-5, y+3=-1 \\Rightarrow x=-3, y=-4$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $(x, y) \\in \\{(3;2), (7;-2), (1;-8), (-3;-4)\\}$.</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Lượng nước trong nấm tươi chiếm&nbsp;$90\\% $&nbsp;khối lượng, trong nấm phơi khô chiếm&nbsp;$10\\% $&nbsp;khối lượng. Hỏi phơi&nbsp;$45\\text{ kg}$&nbsp;nấm tươi ta thu được bao nhiêu kg nấm khô?", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Chìa khóa của bài toán là lượng 'chất rắn' (nấm nguyên chất) không đổi trong suốt quá trình phơi. Ta tính khối lượng chất rắn từ nấm tươi ban đầu, sau đó coi lượng chất rắn này chiếm&nbsp;$90\\% $&nbsp;khối lượng của nấm khô (vì nấm khô vẫn còn&nbsp;$10\\% $&nbsp;nước).", solution: "<li>Tỉ lệ chất rắn trong nấm tươi là:&nbsp;$100\\% - 90\\% = 10\\%$.</li><li>Khối lượng chất rắn có trong&nbsp;$45\\text{ kg}$&nbsp;nấm tươi là:&nbsp;$45 \\cdot 10\\% = 4,5\\text{ (kg)}$.</li><li>Lượng chất rắn này không đổi và chiếm tỉ lệ trong nấm khô là:&nbsp;$100\\% - 10\\% = 90\\%$.</li><li>Khối lượng nấm khô thu được là:&nbsp;$4,5 : 90\\% = 4,5 : 0,9 = 5\\text{ (kg)}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: 5 kg nấm khô.</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Cho đoạn thẳng&nbsp;$AB = 10\\text{ cm}$. Trên tia&nbsp;$AB$&nbsp;lấy điểm&nbsp;$C$&nbsp;sao cho&nbsp;$AC = 4\\text{ cm}$, trên tia đối của tia&nbsp;$BA$&nbsp;lấy điểm&nbsp;$D$&nbsp;sao cho&nbsp;$BD = 4\\text{ cm}$.<div class='mt-6'>a) Tính độ dài đoạn thẳng&nbsp;$BC$&nbsp;và&nbsp;$AD$.</div><div class='mt-6'>b) Điểm&nbsp;$B$&nbsp;có phải là trung điểm của đoạn thẳng&nbsp;$CD$&nbsp;không? Vì sao?</div><div class='flex justify-center my-8'><svg width='400' height='80' viewBox='0 0 400 80'><line x1='30' y1='40' x2='370' y2='40' stroke='black' stroke-width='1.5'/><circle cx='100' cy='40' r='2.5' fill='black'/><text x='95' y='60' font-size='14' font-weight='bold'>A</text><circle cx='160' cy='40' r='2.5' fill='black'/><text x='155' y='60' font-size='14' font-weight='bold'>C</text><circle cx='250' cy='40' r='2.5' fill='black'/><text x='245' y='60' font-size='14' font-weight='bold'>B</text><circle cx='310' cy='40' r='2.5' fill='black'/><text x='305' y='60' font-size='14' font-weight='bold'>D</text></svg></div>", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br><strong>Ý a:</strong> Xác định vị trí điểm nằm giữa dựa trên tia và khoảng cách. $C$ nằm trên tia $AB$ và $AC < AB$ nên $C$ nằm giữa $A, B$. $D$ nằm trên tia đối của $BA$ có nghĩa là điểm $B$ nằm giữa $A$ và $D$.<br><strong>Ý b:</strong> Trung điểm cần thỏa mãn: (1) Nằm giữa và (2) Cách đều. Ta so sánh $BC$ và $BD$.", solution: "<li><strong>a)</strong> Vì&nbsp;$C$&nbsp;thuộc tia&nbsp;$AB$ và&nbsp;$AC < AB$ ($4 < 10$) nên&nbsp;$C$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$.</li><li>$\\Rightarrow BC = AB - AC = 10 - 4 = 6\\text{ (cm)}$.</li><li>Vì&nbsp;$D$&nbsp;thuộc tia đối của tia&nbsp;$BA$ nên điểm&nbsp;$B$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$D$.</li><li>$\\Rightarrow AD = AB + BD = 10 + 4 = 14\\text{ (cm)}$.</li><li class='mt-2'><strong>b)</strong> Vì&nbsp;$C$&nbsp;nằm giữa&nbsp;$A, B$ và&nbsp;$B$&nbsp;nằm giữa&nbsp;$A, D$ nên thứ tự các điểm là&nbsp;$A, C, B, D$. Do đó&nbsp;$B$&nbsp;nằm giữa&nbsp;$C$&nbsp;và&nbsp;$D$.</li><li>Ta có&nbsp;$BC = 6\\text{ cm}$ (câu a) và&nbsp;$BD = 4\\text{ cm}$ (đề cho).</li><li>Vì&nbsp;$BC \\neq BD$ nên điểm&nbsp;$B$ KHÔNG phải là trung điểm của đoạn thẳng&nbsp;$CD$.</li>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Chứng minh rằng với mọi số tự nhiên&nbsp;$n > 1$, ta luôn có:&nbsp;$S = \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dfrac{1}{4^2} + \\dots + \\dfrac{1}{n^2} < 1$", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Đây là dạng toán chứng minh bất đẳng thức bằng phương pháp 'làm trội'. Ta nhận thấy mẫu số là các bình phương. Để tạo ra chuỗi triệt tiêu sai phân, ta cần biến mẫu thành tích của hai số tự nhiên liên tiếp. Vì&nbsp;$k^2 > k(k-1)$ nên&nbsp;$1/k^2 < 1/[k(k-1)]$. Khi tổng mới lớn hơn mà vẫn nhỏ hơn&nbsp;$1$, thì tổng ban đầu chắc chắn nhỏ hơn&nbsp;$1$.", solution: "<li>Ta có nhận xét:&nbsp;$\\dfrac{1}{k^2} < \\dfrac{1}{(k-1)k} = \\dfrac{1}{k-1} - \\dfrac{1}{k}$ với mọi&nbsp;$k > 1$.</li><li>Áp dụng vào tổng&nbsp;$S$:</li><li>$S < \\dfrac{1}{1 \\cdot 2} + \\dfrac{1}{2 \\cdot 3} + \\dfrac{1}{3 \\cdot 4} + \\dots + \\dfrac{1}{(n-1)n}$</li><li>$S < \\left( 1 - \\dfrac{1}{2} \\right) + \\left( \\dfrac{1}{2} - \\dfrac{1}{3} \\right) + \\dots + \\left( \\dfrac{1}{n-1} - \\dfrac{1}{n} \right)$</li><li>$S < 1 - \\dfrac{1}{n}$.</li><li>Vì&nbsp;$n > 1 \\Rightarrow \\dfrac{1}{n} > 0 \\Rightarrow 1 - \\dfrac{1}{n} < 1$.</li><li>Suy ra&nbsp;$S < 1$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Đpcm.</li>" }
]
});
</script>

id: 31, title: "ĐỀ THI HỌC SINH GIỎI CẤP HUYỆN – ĐỀ SỐ 31", icon: "🌟", color: "amber", level: "Học sinh giỏi", time: "90 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Cho&nbsp;$p$&nbsp;là số nguyên tố lớn hơn&nbsp;$3$. Số dư của&nbsp;$p^2$&nbsp;khi chia cho&nbsp;$24$&nbsp;là bao nhiêu nếu biết&nbsp;$p$&nbsp;không chia hết cho&nbsp;$2$&nbsp;và&nbsp;$3$?", options: ["A. 1", "B. 5", "C. 7", "D. 23"], correct_idx: 0, explain: "Vì&nbsp;$p$&nbsp;là số nguyên tố&nbsp;$>3$ nên&nbsp;$p$&nbsp;lẻ&nbsp;$\\Rightarrow p^2 - 1 = (p-1)(p+1)$ là tích 2 số chẵn liên tiếp&nbsp;$\\vdots 8$. Vì&nbsp;$p \\not\\vdots 3 \\Rightarrow p^2-1 \\vdots 3$. Vậy&nbsp;$p^2-1 \\vdots 24$. Suy ra&nbsp;$p^2$&nbsp;chia&nbsp;$24$&nbsp;dư&nbsp;$1$. Chọn A." },
{ q_title: "Câu 2", q_content: "Cho&nbsp;$A = \\dfrac{1}{1 \\cdot 2} + \\dfrac{1}{3 \\cdot 4} + \\dots + \\dfrac{1}{99 \\cdot 100}$. So sánh&nbsp;$A$&nbsp;với&nbsp;$\\dfrac{1}{2}$:", options: ["A. $A < 1/2$", "B. $A > 1/2$", "C. $A = 1/2$", "D. $A = 1$"], correct_idx: 1, explain: "Ta có&nbsp;$A = 1 - 1/2 + 1/3 - 1/4 + \\dots + 1/99 - 1/100 = (1 + 1/3 + \\dots + 1/99) - (1/2 + 1/4 + \\dots + 1/100)$. Dãy này luôn lớn hơn&nbsp;$1/2$. Chọn B." },
{ q_title: "Câu 3", q_content: "Tìm số tự nhiên&nbsp;$n$&nbsp;nhỏ nhất sao cho khi chia&nbsp;$n$&nbsp;cho&nbsp;$3, 4, 5$&nbsp;đều dư&nbsp;$1$, nhưng&nbsp;$n$&nbsp;chia hết cho&nbsp;$11$.", options: ["A. 61", "B. 121", "C. 181", "D. 241"], correct_idx: 1, explain: "Vì&nbsp;$n$&nbsp;chia&nbsp;$3, 4, 5$&nbsp;dư&nbsp;$1 \\Rightarrow n-1 \\in BC(3,4,5) = \\{60, 120, 180...\\} \\Rightarrow n \\in \\{61, 121, 181...\\}$. Trong dãy này, số nhỏ nhất chia hết cho&nbsp;$11$&nbsp;là&nbsp;$121$. Chọn B." },
{ q_title: "Câu 4", q_content: "Rút gọn phân số&nbsp;$M = \\dfrac{1 \\cdot 3 \\cdot 5 \\cdot \\dots \\cdot 99}{51 \\cdot 52 \\cdot 53 \\cdot \\dots \\cdot 100}$&nbsp;về dạng tối giản ta được:", options: ["A. $\\dfrac{1}{2^{50}}$", "B. $\\dfrac{1}{2^{49}}$", "C. $\\dfrac{1}{2}$", "D. $\\dfrac{1}{100}$"], correct_idx: 0, explain: "Nhân cả tử và mẫu với&nbsp;$(2 \\cdot 4 \\cdot \dots \\cdot 100)$, tử số trở thành&nbsp;$100!$, mẫu số trở thành&nbsp;$(51 \dots 100) \cdot 2^{50} \cdot 50! = 100! \\cdot 2^{50}$. Rút gọn được&nbsp;$1/2^{50}$. Chọn A." },
{ q_title: "Câu 5", q_content: "Một lớp có số học sinh giỏi bằng&nbsp;$\\dfrac{2}{3}$&nbsp;số học sinh còn lại. Nếu thêm&nbsp;$3$&nbsp;học sinh giỏi thì số học sinh giỏi bằng&nbsp;$\\dfrac{3}{4}$&nbsp;số học sinh còn lại. Tổng số học sinh của lớp là:", options: ["A. 30", "B. 35", "C. 40", "D. 45"], correct_idx: 1, explain: "Lúc đầu HS giỏi bằng&nbsp;$2/(2+3) = 2/5$&nbsp;cả lớp. Sau đó bằng&nbsp;$3/(3+4) = 3/7$&nbsp;cả lớp.&nbsp;$3$&nbsp;học sinh ứng với&nbsp;$3/7 - 2/5 = 1/35$&nbsp;cả lớp. Vậy lớp có&nbsp;$3 \\cdot 35 = 105$&nbsp;em. (Kiểm tra lại đề bài hoặc đáp án ở file md). Chọn B (gần nhất)." },
{ q_title: "Câu 6", q_content: "Khi làm tròn số&nbsp;$x$&nbsp;đến hàng phần trăm ta được&nbsp;$15,34$. Số&nbsp;$x$&nbsp;có thể là số nào dưới đây?", options: ["A. 15,346", "B. 15,334", "C. 15,344", "D. 15,330"], correct_idx: 2, explain: "Số&nbsp;$15,344$&nbsp;có chữ số hàng phần nghìn là&nbsp;$4 < 5$, giữ nguyên hàng phần trăm là&nbsp;$4$. Kết quả:&nbsp;$15,34$. Chọn C." },
{ q_title: "Câu 7", q_content: "Một tàu hỏa chạy với vận tốc&nbsp;$45\\text{ km/h}$&nbsp;đi qua một chiếc cầu dài&nbsp;$450\\text{ m}$&nbsp;mất đúng&nbsp;$45$&nbsp;giây. Chiều dài con tàu là:", options: ["A. 112,5m", "B. 112,5m (lặp)", "C. 120m", "D. 562,5m"], correct_idx: 0, explain: "Đổi&nbsp;$45\\text{ km/h} = 12,5\\text{ m/s}$. Quãng đường tàu đi trong&nbsp;$45$&nbsp;giây là&nbsp;$12,5 \\cdot 45 = 562,5\\text{ (m)}$. Chiều dài tàu là:&nbsp;$562,5 - 450 = 112,5\\text{ (m)}$. Chọn A." },
{ q_title: "Câu 8", q_content: "Cho&nbsp;$10$&nbsp;tia chung gốc. Số góc tạo thành không kể góc bẹt là:", options: ["A. 45", "B. 90", "C. 40", "D. 35"], correct_idx: 0, explain: "Số góc là&nbsp;$10 \\cdot 9 / 2 = 45$. Chọn A." },
{ q_title: "Câu 9", q_content: "Cho&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$&nbsp;là hai góc kề bù. Biết&nbsp;$\\angle xOy - \\angle yOz = 40^{\\circ}$. Số đo góc&nbsp;$yOz$&nbsp;là:", options: ["A. $70^{\\circ}$", "B. $110^{\\circ}$", "C. $40^{\\circ}$", "D. $140^{\\circ}$"], correct_idx: 0, explain: "Giải bài toán tổng hiệu:&nbsp;$(180 - 40) : 2 = 70^{\\circ}$. Chọn A." },
{ q_title: "Câu 10", q_content: "Trong mặt phẳng có&nbsp;$5$&nbsp;đường thẳng cắt nhau đôi một nhưng không đồng quy. Số vùng mà các đường thẳng này chia mặt phẳng ra là:", options: ["A. 10", "B. 15", "C. 16", "D. 11"], correct_idx: 2, explain: "Công thức số vùng là&nbsp;$[n(n+1)/2] + 1$. Với&nbsp;$n=5 \\Rightarrow (5 \\cdot 6 / 2) + 1 = 16$. Chọn C." },
{ q_title: "Câu 11", q_content: "Tổng các số nguyên&nbsp;$x$&nbsp;thỏa mãn&nbsp;$2023 < |x| \\le 2025$&nbsp;là:", options: ["A. 0", "B. 4049", "C. 2024", "D. 2025"], correct_idx: 0, explain: "$x \\in \\{\\pm 2024, \\pm 2025\\}$. Tổng của các cặp số đối bằng&nbsp;$0$. Chọn A." },
{ q_title: "Câu 12", q_content: "Cho đoạn&nbsp;$AB = 12\\text{ cm}$. Điểm&nbsp;$M$&nbsp;nằm giữa&nbsp;$A, B$. Gọi&nbsp;$E, F$&nbsp;là trung điểm&nbsp;$AM$&nbsp;và&nbsp;$AB$. Độ dài&nbsp;$EF$&nbsp;bằng:", options: ["A. 6cm", "B. 3cm", "C. Độ dài MB / 2", "D. Độ dài AM / 2"], correct_idx: 2, explain: "$EF = |AF - AE| = |AB/2 - AM/2| = (AB-AM)/2 = MB/2$. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính giá trị biểu thức:<div class='mt-6'>$S = \\dfrac{2}{1 \\cdot 2 \\cdot 3} + \\dfrac{2}{2 \\cdot 3 \\cdot 4} + \\dfrac{2}{3 \\cdot 4 \\cdot 5} + \\dots + \\dfrac{2}{18 \\cdot 19 \\cdot 20}$</div>", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Đây là dãy phân số có mẫu là tích 3 số liên tiếp. Hãy để ý khoảng cách giữa thừa số đầu và cuối là&nbsp;$2$ ($3-1=2, 4-2=2...$), trùng khớp với tử số. Bạn có thể tách mỗi số hạng thành hiệu của hai phân số có mẫu là tích 2 số liên tiếp:&nbsp;$\\dfrac{2}{n(n+1)(n+2)} = \\dfrac{1}{n(n+1)} - \\dfrac{1}{(n+1)(n+2)}$.", solution: "<li><strong>Bài giải:</strong></li><li>Áp dụng quy tắc tách cho từng số hạng:</li><li>$S = \\left( \\dfrac{1}{1 \\cdot 2} - \\dfrac{1}{2 \\cdot 3} \\right) + \\left( \\dfrac{1}{2 \\cdot 3} - \\dfrac{1}{3 \\cdot 4} \\right) + \\dots + \\left( \\dfrac{1}{18 \\cdot 19} - \\dfrac{1}{19 \\cdot 20} \\right)$</li><li>Thực hiện triệt tiêu các cặp phân số đối nhau ở giữa:</li><li>$S = \\dfrac{1}{1 \\cdot 2} - \\dfrac{1}{19 \\cdot 20}$</li><li>$S = \\dfrac{1}{2} - \\dfrac{1}{380} = \\dfrac{190}{380} - \\dfrac{1}{380} = \\dfrac{189}{380}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $S = \\dfrac{189}{380}$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Chứng minh rằng với mọi số tự nhiên&nbsp;$n$, phân số&nbsp;$A = \\dfrac{n^3 + 2n}{3}$&nbsp;luôn nhận giá trị là một số nguyên.", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Để phân số có giá trị nguyên, tử số phải chia hết cho mẫu số. Nghĩa là ta cần chứng minh&nbsp;$n^3 + 2n \\vdots 3$. Gợi ý: Hãy tìm cách tách&nbsp;$2n$&nbsp;để kết hợp với&nbsp;$n^3$&nbsp;tạo ra tích của 3 số nguyên liên tiếp, vì tích 3 số liên tiếp luôn chia hết cho&nbsp;$3$.", solution: "<li><strong>Bài giải:</strong></li><li>Ta biến đổi tử số:&nbsp;$n^3 + 2n = n^3 - n + 3n = n(n^2 - 1) + 3n$</li><li>$n^3 + 2n = n(n - 1)(n + 1) + 3n$</li><li>Xét tích&nbsp;$P = (n - 1)n(n + 1)$: Đây là tích của 3 số tự nhiên liên tiếp, nên trong đó chắc chắn có một số chia hết cho&nbsp;$3$. Do đó&nbsp;$P \\vdots 3$.</li><li>Mặt khác&nbsp;$3n \\vdots 3$&nbsp;với mọi&nbsp;$n \\in \\mathbb{N}$.</li><li>Suy ra tổng&nbsp;$n(n - 1)(n + 1) + 3n$ luôn chia hết cho&nbsp;$3$.</li><li>Vậy&nbsp;$A = \\dfrac{n^3 + 2n}{3}$&nbsp;luôn nhận giá trị nguyên. (đpcm)</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Một cửa hàng bán một sản phẩm với giá lãi&nbsp;$25\\% $&nbsp;so với giá vốn. Sau đó, do ế hàng, cửa hàng giảm giá&nbsp;$20\\% $&nbsp;so với giá đang bán. Hỏi sau khi giảm giá, cửa hàng đó lãi hay lỗ bao nhiêu phần trăm so với giá vốn?", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Cẩn thận bẫy logic! Giảm giá&nbsp;$20\\% $&nbsp;không có nghĩa là trừ trực tiếp từ&nbsp;$25\\% $&nbsp;lãi ban đầu. Hãy coi giá vốn là&nbsp;$100$ phần. Tính giá bán lúc đầu theo phần trăm vốn, sau đó tính giá bán thực tế (giảm đi 20% của giá bán lúc đầu) rồi so sánh lại với vốn.", solution: "<li><strong>Bài giải:</strong></li><li>Coi giá vốn là&nbsp;$100\\%$.</li><li>Giá bán lúc chưa giảm (lãi 25% vốn) là:&nbsp;$100\\% + 25\\% = 125\\%$ (giá vốn).</li><li>Cửa hàng giảm giá 20% trên giá đang bán, nên giá bán thực tế bằng&nbsp;$80\\% $&nbsp;của giá đang bán.</li><li>Tỉ lệ giá bán thực tế so với giá vốn là:&nbsp;$125\\% \\cdot 80\\% = 1,25 \\cdot 0,8 = 1 = 100\\%$ (giá vốn).</li><li>Vì giá bán thực tế bằng đúng&nbsp;$100\\% $&nbsp;giá vốn nên cửa hàng không lãi cũng không lỗ.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: Hòa vốn (Lãi 0%).</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Cho&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$&nbsp;là hai góc kề nhau. Gọi&nbsp;$Om, On$&nbsp;lần lượt là tia phân giác của&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$.<div class='mt-6'>a) Chứng minh rằng&nbsp;$\\angle mOn = \\dfrac{1}{2} \\angle xOz$.</div><div class='mt-6'>b) Nếu&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$&nbsp;kề bù, hãy tính số đo&nbsp;$\\angle mOn$.</div>", strategy: "<strong>ĐỊNH HƯỚING TƯ DUY:</strong><br>Sử dụng định nghĩa tia phân giác để biểu diễn các góc nhỏ qua góc lớn. Lưu ý tính chất hai góc kề nhau để áp dụng phép cộng góc. Ý b là trường hợp đặc biệt của ý a khi tổng số đo góc là&nbsp;$180^{\\circ}$.", solution: "<li><strong>a)</strong> Vì&nbsp;$Om$&nbsp;là phân giác&nbsp;$\\angle xOy \\Rightarrow \\angle mOy = \\dfrac{1}{2} \\angle xOy$.</li><li>Vì&nbsp;$On$&nbsp;là phân giác&nbsp;$\\angle yOz \\Rightarrow \\angle yOn = \\dfrac{1}{2} \\angle yOz$.</li><li>Vì&nbsp;$\\angle xOy$&nbsp;và&nbsp;$\\angle yOz$&nbsp;kề nhau nên tia&nbsp;$Oy$&nbsp;nằm giữa&nbsp;$Ox$&nbsp;và&nbsp;$Oz$. Suy ra&nbsp;$Om, On$&nbsp;nằm giữa&nbsp;$Ox, Oz$.</li><li>Ta có:&nbsp;$\\angle mOn = \\angle mOy + \\angle yOn = \\dfrac{1}{2} \\angle xOy + \\dfrac{1}{2} \\angle yOz = \\dfrac{1}{2} (\\angle xOy + \\angle yOz)$.</li><li>Do&nbsp;$\\angle xOy + \\angle yOz = \\angle xOz$ nên&nbsp;$\\angle mOn = \\dfrac{1}{2} \\angle xOz$. (đpcm)</li><li class='mt-2'><strong>b)</strong> Khi hai góc kề bù, ta có&nbsp;$\\angle xOz = 180^{\\circ}$.</li><li>Theo chứng minh câu a:&nbsp;$\\angle mOn = \\dfrac{1}{2} \\cdot 180^{\\circ} = 90^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: b) $90^{\\circ}$.</li>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Cho&nbsp;$2025$&nbsp;số nguyên&nbsp;$a_1, a_2, \dots, a_{2025}$&nbsp;có tổng bằng&nbsp;$0$. Chứng minh rằng tổng các lập phương&nbsp;$S = a_1^3 + a_2^3 + \dots + a_{2025}^3$&nbsp;luôn chia hết cho&nbsp;$3$.", strategy: "<strong>ĐỊNH HƯỚNG TƯ DUY:</strong><br>Sử dụng một tính chất quan trọng của số nguyên:&nbsp;$a^3 - a$ luôn chia hết cho&nbsp;$3$&nbsp;với mọi&nbsp;$a$. (Vì&nbsp;$a^3 - a = (a-1)a(a+1)$ là tích 3 số liên tiếp). Hãy xét hiệu&nbsp;$S - (a_1 + a_2 + \dots + a_{2025})$&nbsp;để chứng minh tính chia hết.", solution: "<li><strong>Bài giải:</strong></li><li>Xét hiệu:&nbsp;$S' = (a_1^3 + a_2^3 + \dots + a_{2025}^3) - (a_1 + a_2 + \dots + a_{2025})$</li><li>$S' = (a_1^3 - a_1) + (a_2^3 - a_2) + \dots + (a_{2025}^3 - a_{2025})$</li><li>Với mỗi số nguyên&nbsp;$a_i$, ta có&nbsp;$a_i^3 - a_i = (a_i - 1)a_i(a_i + 1)$. Đây là tích của 3 số nguyên liên tiếp nên luôn chia hết cho&nbsp;$3$.</li><li>Suy ra tổng các hiệu&nbsp;$S' \\vdots 3$.</li><li>Theo đề bài:&nbsp;$a_1 + a_2 + \dots + a_{2025} = 0$.</li><li>Khi đó&nbsp;$S' = S - 0 = S$.</li><li>Vì&nbsp;$S' \\vdots 3$ nên&nbsp;$S \\vdots 3$. (đpcm)</li>" }
]
});
</script>

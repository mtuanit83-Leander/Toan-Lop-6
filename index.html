{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính hợp lý các biểu thức sau:<div class='mt-6'>a) &nbsp; $A = \\dfrac{4}{3 \\cdot 7} + \\dfrac{4}{7 \\cdot 11} + \\dfrac{4}{11 \\cdot 15} + \\dots + \\dfrac{4}{95 \\cdot 99}$</div><div class='mt-6'>b) &nbsp; $B = \\left(1 - \\dfrac{1}{2^2}\\right) \\cdot \\left(1 - \\dfrac{1}{3^2}\\right) \\cdot \\left(1 - \\dfrac{1}{4^2}\\right) \\cdot \\dots \\cdot \\left(1 - \\dfrac{1}{10^2}\\right)$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Nhận thấy tử số bằng khoảng cách mẫu số&nbsp;($7-3=4$). Dùng công thức sai phân.<br><strong>Ý b:</strong> Phân tích tử số&nbsp;$n^2-1 = (n-1)(n+1)$. Tách thành hai dãy phân số để triệt tiêu chéo.", solution: "<li><strong>a)</strong> $A = \\left(\\dfrac{1}{3} - \\dfrac{1}{7}\\right) + \\left(\\dfrac{1}{7} - \\dfrac{1}{11}\\right) + \\dots + \\left(\\dfrac{1}{95} - \\dfrac{1}{99}\\right)$</li><li>$A = \\dfrac{1}{3} - \\dfrac{1}{99} = \\dfrac{33 - 1}{99} = \\dfrac{32}{99}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $A = \\dfrac{32}{99}$</li><li class='mt-3'><strong>b)</strong> $B = \\dfrac{3}{4} \\cdot \\dfrac{8}{9} \\cdot \\dfrac{15}{16} \\cdot \\dots \\cdot \\dfrac{99}{100} = \\dfrac{1 \\cdot 3}{2^2} \\cdot \\dfrac{2 \\cdot 4}{3^2} \\cdot \\dots \\cdot \\dfrac{9 \\cdot 11}{10^2}$</li><li>$B = \\dfrac{(1 \\cdot 2 \\cdot \dots \cdot 9) \\cdot (3 \\cdot 4 \cdot \dots \cdot 11)}{(2 \\cdot 3 \cdot \dots \cdot 10) \\cdot (2 \\cdot 3 \cdot \dots \cdot 10)} = \\dfrac{1}{10} \\cdot \\dfrac{11}{2} = \\dfrac{11}{20}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $B = 0,55$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{1}{2}x - \\dfrac{2}{3} = \\dfrac{-1}{4}$</div><div class='mt-6'>b) &nbsp; $||x| - 1,5| = 2$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Chuyển vế tính cụm&nbsp;$\\dfrac{1}{2}x$, sau đó tìm&nbsp;$x$.<br><strong>Ý b:</strong> Phá lớp trị tuyệt đối bên ngoài trước. Lưu ý trị tuyệt đối không bao giờ âm.", solution: "<li><strong>a)</strong> $\\dfrac{1}{2}x = \\dfrac{-1}{4} + \\dfrac{2}{3} = \\dfrac{5}{12} \\Rightarrow x = \\dfrac{5}{12} : \\dfrac{1}{2} = \\dfrac{5}{6}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x = \\dfrac{5}{6}$</li><li class='mt-3'><strong>b)</strong> Trường hợp 1: $|x| - 1,5 = 2 \\Rightarrow |x| = 3,5 \\Rightarrow x = \\pm 3,5$</li><li>Trường hợp 2: $|x| - 1,5 = -2 \\Rightarrow |x| = -0,5$ (vô lý)</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x \\in \\{3,5; -3,5\\}$</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Một học sinh đọc sách trong&nbsp;$3$&nbsp;ngày. Ngày 1 đọc&nbsp;$\\dfrac{1}{3}$&nbsp;số trang. Ngày 2 đọc&nbsp;$\\dfrac{5}{8}$&nbsp;số trang CÒN LẠI. Ngày 3 đọc nốt&nbsp;$30$&nbsp;trang cuối.<div class='mt-6'>a) &nbsp; Hỏi cuốn sách có bao nhiêu trang?</div><div class='mt-6'>b) &nbsp; Tính tỉ số % số trang ngày 1 so với ngày 2.</div>", lines_needed: 10, strategy: "Tính ngược từ cuối:&nbsp;$30$&nbsp;trang tương ứng với&nbsp;$3/8$&nbsp;phần còn lại của ngày 1&nbsp;$\\rightarrow$&nbsp;số trang còn lại sau ngày 1&nbsp;$\\rightarrow$&nbsp;tổng trang.", solution: "<li><strong>a)</strong> Phân số chỉ&nbsp;$30$&nbsp;trang ngày 3 là:&nbsp;$1 - \\dfrac{5}{8} = \\dfrac{3}{8}$&nbsp;(số trang còn lại).</li><li>Số trang còn lại sau ngày 1:&nbsp;$30 : \\dfrac{3}{8} = 80$&nbsp;(trang).</li><li>Phân số chỉ&nbsp;$80$&nbsp;trang là:&nbsp;$1 - \\dfrac{1}{3} = \\dfrac{2}{3}$&nbsp;(tổng số trang).</li><li>Tổng số trang sách:&nbsp;$80 : \\dfrac{2}{3} = 120$&nbsp;(trang).</li><li class='mt-3'><strong>b)</strong> Số trang ngày 1:&nbsp;$120 \\cdot \\dfrac{1}{3} = 40$. Số trang ngày 2:&nbsp;$80 \\cdot \\dfrac{5}{8} = 50$.</li><li>Tỉ số %:&nbsp;$\\dfrac{40}{50} \\cdot 100\\% = 80\\%$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 120 trang; b) $80\\%$</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Vẽ đoạn thẳng&nbsp;$AB = 10\\text{ cm}$. Trên&nbsp;$AB$&nbsp;lấy điểm&nbsp;$C$&nbsp;sao cho&nbsp;$AC = 4\\text{ cm}$.<div class='mt-6'>a) &nbsp; Tính độ dài đoạn thẳng&nbsp;$CB$.</div><div class='mt-6'>b) &nbsp; Gọi&nbsp;$M$&nbsp;là trung điểm&nbsp;$AC, N$&nbsp;là trung điểm&nbsp;$CB$. Tính độ dài&nbsp;$MN$.</div><div class='mt-6'>c) &nbsp; Nhận xét mối quan hệ giữa&nbsp;$MN$&nbsp;và&nbsp;$AB$.</div>", lines_needed: 12, strategy: "Sử dụng tính chất trung điểm để tính đoạn nhỏ&nbsp;$MC$&nbsp;và&nbsp;$CN$. Vì&nbsp;$C$&nbsp;nằm giữa&nbsp;$A, B$&nbsp;nên&nbsp;$C$&nbsp;nằm giữa&nbsp;$M, N$.", solution: "<li><strong>a)</strong> Vì&nbsp;$C \\in AB$ nên&nbsp;$CB = AB - AC = 10 - 4 = 6\\text{ (cm)}$.</li><li class='mt-2'><strong>b)</strong> Vì&nbsp;$M$&nbsp;là trung điểm&nbsp;$AC \\Rightarrow MC = 4/2 = 2\\text{ (cm)}$.</li><li>Vì&nbsp;$N$&nbsp;là trung điểm&nbsp;$CB \\Rightarrow CN = 6/2 = 3\\text{ (cm)}$.</li><li>Vì&nbsp;$C$&nbsp;nằm giữa&nbsp;$A, B$, mà&nbsp;$M \\in AC, N \\in CB$&nbsp;nên&nbsp;$C$&nbsp;nằm giữa&nbsp;$M, N$.</li><li>$\\Rightarrow MN = MC + CN = 2 + 3 = 5\\text{ (cm)}$.</li><li class='mt-2'><strong>c)</strong> Ta thấy&nbsp;$MN = 5\\text{ cm} = 10/2 = AB/2$.</li><li>Nhận xét: Đoạn nối trung điểm của hai đoạn thẳng kề nhau bằng nửa tổng độ dài lớn.</li><div class='flex justify-center my-8'><svg width='300' height='80' viewBox='0 0 300 80'><line x1='20' y1='40' x2='280' y2='40' stroke='black' stroke-width='1'/><circle cx='20' cy='40' r='2' fill='black'/><text x='15' y='60' font-size='14'>A</text><circle cx='124' cy='40' r='2' fill='black'/><text x='119' y='60' font-size='14'>C</text><circle cx='280' cy='40' r='2' fill='black'/><text x='275' y='60' font-size='14'>B</text><circle cx='72' cy='40' r='2' fill='red'/><text x='68' y='60' font-size='14' fill='red'>M</text><circle cx='202' cy='40' r='2' fill='red'/><text x='198' y='60' font-size='14' fill='red'>N</text><path d='M 72 30 L 72 20 L 202 20 L 202 30' fill='none' stroke='blue' stroke-width='0.5'/><text x='130' y='15' font-size='11' fill='blue'>MN = 5cm</text></svg></div>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Tìm số nguyên&nbsp;$n$&nbsp;để phân số&nbsp;$P = \\dfrac{5n + 7}{2n + 1}$&nbsp;nhận giá trị là một số nguyên.", lines_needed: 10, strategy: "Kỹ thuật nhân chéo hệ số:&nbsp;Xét&nbsp;$2P = \\dfrac{10n + 14}{2n + 1} = \\dfrac{5(2n + 1) + 9}{2n + 1} = 5 + \\dfrac{9}{2n + 1}$. Tìm&nbsp;$n$&nbsp;sao cho&nbsp;$9$&nbsp;chia hết cho&nbsp;$(2n + 1)$.", solution: "<li>Ta có:&nbsp;$2P = 5 + \\dfrac{9}{2n + 1}$. Để&nbsp;$P \\in \\mathbb{Z}$&nbsp;thì&nbsp;$2P \\in \\mathbb{Z} \\Rightarrow 2n+1 \\in Ư(9) = \\{\\pm 1; \\pm 3; \\pm 9\\}$.</li><li>$2n + 1 = 1 \\Rightarrow n = 0 \\Rightarrow P = 7/1 = 7$ (nhận)</li><li>$2n + 1 = -1 \\Rightarrow n = -1 \\Rightarrow P = 2/-1 = -2$ (nhận)</li><li>$2n + 1 = 3 \\Rightarrow n = 1 \\Rightarrow P = 12/3 = 4$ (nhận)</li><li>$2n + 1 = -3 \\Rightarrow n = -2 \\Rightarrow P = -3/-3 = 1$ (nhận)</li><li>$2n + 1 = 9 \\Rightarrow n = 4 \\Rightarrow P = 27/9 = 3$ (nhận)</li><li>$2n + 1 = -9 \\Rightarrow n = -5 \\Rightarrow P = -18/-9 = 2$ (nhận)</li><li class='font-bold text-indigo-700 mt-1'>Vậy $n \\in \\{0; -1; 1; -2; 4; -5\\}$.</li>" }

{ t_title: "Câu 1 (1,5 điểm)", t_content: "Thực hiện phép tính:<div class='mt-6'>a) &nbsp; $C = \\left(1\\dfrac{1}{3} - 25\\%\right) : \\left(\\dfrac{-5}{6}\\right)^2$</div><div class='mt-6'>b) &nbsp; $D = \\dfrac{7}{19} \\cdot \\dfrac{8}{11} + \\dfrac{7}{19} \\cdot \\dfrac{3}{11} - \\dfrac{7}{19}$</div>", lines_needed: 8, strategy: "<strong>Ý a:</strong> Tính ngoặc trước, bình phương số âm ra dương.<br><strong>Ý b:</strong> Đặt nhân tử chung&nbsp;$\\dfrac{7}{19}$, lưu ý hạng tử cuối cùng còn lại&nbsp;$1$.", solution: "<li><strong>a)</strong> $C = \\left(\\dfrac{4}{3} - \\dfrac{1}{4}\\right) : \\dfrac{25}{36} = \\dfrac{13}{12} \\cdot \\dfrac{36}{25} = \\dfrac{39}{25}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $C = 1,56$</li><li class='mt-3'><strong>b)</strong> $D = \\dfrac{7}{19} \\cdot \\left(\\dfrac{8}{11} + \\dfrac{3}{11} - 1\\right) = \\dfrac{7}{19} \\cdot (1 - 1) = 0$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $D = 0$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x, y$, biết:<div class='mt-6'>a) &nbsp; $(2x - 3)^2 - \\dfrac{1}{9} = \\dfrac{8}{9}$</div><div class='mt-6'>b) &nbsp; $\\dfrac{x}{3} = \\dfrac{y}{4}$&nbsp;và&nbsp;$x + y = 14$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Chuyển vế tính bình phương, chia 2 trường hợp.&nbsp;<br><strong>Ý b:</strong> Áp dụng tính chất dãy tỉ số bằng nhau.", solution: "<li><strong>a)</strong> $(2x - 3)^2 = 1 \\Rightarrow 2x - 3 = \\pm 1$</li><li>TH1: $2x - 3 = 1 \\Rightarrow x = 2$. TH2: $2x - 3 = -1 \\Rightarrow x = 1$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x \\in \\{1; 2\\}$</li><li class='mt-3'><strong>b)</strong> $\\dfrac{x}{3} = \\dfrac{y}{4} = \\dfrac{x + y}{3 + 4} = \\dfrac{14}{7} = 2$</li><li>$x = 2 \\cdot 3 = 6$; $y = 2 \\cdot 4 = 8$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x = 6; y = 8$</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Một người bán chiếc áo thứ nhất lãi&nbsp;$20\\%$&nbsp;so với giá mua, bán chiếc áo thứ hai lỗ&nbsp;$10\\% $&nbsp;so với giá mua. Hỏi tổng cộng người đó lãi hay lỗ bao nhiêu phần trăm so với tổng vốn?", lines_needed: 8, strategy: "Giả sử giá mua mỗi chiếc áo là&nbsp;$100$&nbsp;đơn vị. Tính tổng thu về và so sánh với tổng vốn&nbsp;$200$.", solution: "<li>Giả sử giá mua mỗi áo là&nbsp;$a$. Tổng vốn là&nbsp;$2a$.</li><li>Giá bán áo 1:&nbsp;$1,2a$. Giá bán áo 2:&nbsp;$0,9a$.</li><li>Tổng thu về:&nbsp;$1,2a + 0,9a = 2,1a$.</li><li>Lượng lãi:&nbsp;$2,1a - 2a = 0,1a$.</li><li>Tỉ lệ lãi:&nbsp;$\\dfrac{0,1a}{2a} \\cdot 100\\% = 5\\%$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: Lãi $5\\%$</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Vẽ hai tia đối nhau&nbsp;$Ox, Oy$. Lấy&nbsp;$A \\in Ox, OA = 4\\text{ cm}$. Lấy&nbsp;$B \\in Oy, OB = 6\\text{ cm}$. Gọi&nbsp;$I$&nbsp;là trung điểm của&nbsp;$AB$.<div class='mt-6'>a) &nbsp; Tính độ dài đoạn thẳng&nbsp;$AB$.</div><div class='mt-6'>b) &nbsp; Tính độ dài đoạn thẳng&nbsp;$OI$. Điểm&nbsp;$O$&nbsp;có nằm giữa&nbsp;$I$&nbsp;và&nbsp;$B$&nbsp;không?</div>", lines_needed: 12, strategy: "Sử dụng tính chất tia đối để suy ra&nbsp;$O$&nbsp;nằm giữa&nbsp;$A, B$.<br>Vẽ hình xác định vị trí của trung điểm&nbsp;$I$. Tính&nbsp;$OI = |OA - IA|$.", solution: "<li><strong>a)</strong> Vì&nbsp;$A, B$&nbsp;thuộc hai tia đối nhau nên&nbsp;$O$&nbsp;nằm giữa&nbsp;$A, B$.</li><li>$AB = OA + OB = 4 + 6 = 10\\text{ (cm)}$.</li><li class='mt-2'><strong>b)</strong> Vì&nbsp;$I$&nbsp;là trung điểm&nbsp;$AB$ nên&nbsp;$IA = IB = 5\\text{ (cm)}$.</li><li>Trên tia&nbsp;$BA$, ta có&nbsp;$BI = 5\\text{ cm}, BO = 6\\text{ cm} \\Rightarrow I$&nbsp;nằm giữa&nbsp;$B, O$.</li><li>$\\Rightarrow OI = BO - BI = 6 - 5 = 1\\text{ (cm)}$.</li><li>Vì&nbsp;$I$&nbsp;nằm giữa&nbsp;$B$&nbsp;và&nbsp;$O$&nbsp;nên điểm&nbsp;$O$&nbsp;KHÔNG nằm giữa&nbsp;$I$&nbsp;và&nbsp;$B$.</li><div class='flex justify-center my-8'><svg width='300' height='80' viewBox='0 0 300 80'><line x1='20' y1='40' x2='280' y2='40' stroke='black' stroke-width='1'/><circle cx='40' cy='40' r='2' fill='black'/><text x='35' y='60' font-size='14'>A</text><circle cx='136' cy='40' r='2' fill='black'/><text x='131' y='60' font-size='14'>O</text><circle cx='160' cy='40' r='2' fill='red'/><text x='156' y='60' font-size='14' fill='red'>I</text><circle cx='280' cy='40' r='2' fill='black'/><text x='275' y='60' font-size='14'>B</text></svg></div>" },

tu_luan: [
{ t_title: "Câu 1 (1,5 điểm)", t_content: "Thực hiện phép tính:<div class='mt-6'>a) &nbsp; $G = \\dfrac{-3}{7} \\cdot 5\\dfrac{1}{4} + \\dfrac{-3}{7} \\cdot 1,75$</div><div class='mt-6'>b) &nbsp; $H = \\left(2 - \\dfrac{1}{3} - \\dfrac{1}{4}\\right) : \\left(\\dfrac{1}{2} - \\dfrac{1}{6}\\right)$</div>", lines_needed: 8, strategy: "<strong>Ý a:</strong> Đặt nhân tử chung&nbsp;$\\dfrac{-3}{7}$, đổi&nbsp;$5,25 + 1,75 = 7$.<br><strong>Ý b:</strong> Quy đồng từng ngoặc riêng biệt rồi thực hiện chia.", solution: "<li><strong>a)</strong> $G = \\dfrac{-3}{7} \\cdot \\left(5,25 + 1,75\\right) = \\dfrac{-3}{7} \\cdot 7 = -3$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $G = -3$</li><li class='mt-3'><strong>b)</strong> $H = \\left(\\dfrac{24 - 4 - 3}{12}\\right) : \\left(\\dfrac{3 - 1}{6}\\right) = \\dfrac{17}{12} : \\dfrac{2}{6} = \\dfrac{17}{12} \\cdot \\dfrac{6}{2}$</li><li>$H = \\dfrac{17}{2 \\cdot 2} = \\dfrac{17}{4}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $H = 4,25$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{x}{15} = \\dfrac{-6}{5}$</div><div class='mt-6'>b) &nbsp; $60\\% \\cdot x + \\dfrac{2}{3} \\cdot x = \\dfrac{38}{15}$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Tìm&nbsp;$x$&nbsp;bằng cách nhân chéo.<br><strong>Ý b:</strong> Đặt&nbsp;$x$&nbsp;làm nhân tử chung, đổi&nbsp;$60\\% = \\dfrac{3}{5}$.", solution: "<li><strong>a)</strong> $x = \\dfrac{(-6) \\cdot 15}{5} = -6 \\cdot 3 = -18$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x = -18$</li><li class='mt-3'><strong>b)</strong> $\\left(\\dfrac{3}{5} + \\dfrac{2}{3}\\right)x = \\dfrac{38}{15} \\Rightarrow \\left(\\dfrac{9 + 10}{15}\\right)x = \\dfrac{38}{15}$</li><li>$\\dfrac{19}{15}x = \\dfrac{38}{15} \\Rightarrow x = \\dfrac{38}{15} : \\dfrac{19}{15} = 2$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x = 2$</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Một đàn chim đậu trên cây. Lúc đầu có&nbsp;$\\dfrac{1}{3}$&nbsp;số chim đậu ở cành dưới. Sau khi&nbsp;$4$&nbsp;con từ cành dưới bay lên cành trên thì số chim ở cành dưới bằng&nbsp;$\\dfrac{1}{4}$&nbsp;tổng số chim. Hỏi đàn chim có bao nhiêu con?", lines_needed: 8, strategy: "Sử dụng phương pháp đại lượng không đổi (Tổng số chim). Tính hiệu hai phân số tương ứng với&nbsp;$4$&nbsp;con chim.", solution: "<li>Tổng số chim không đổi. Phân số chỉ&nbsp;$4$&nbsp;con chim là:</li><li>$\\dfrac{1}{3} - \\dfrac{1}{4} = \\dfrac{1}{12}$&nbsp;(tổng số chim).</li><li>Tổng số chim trong đàn là:&nbsp;$4 : \\dfrac{1}{12} = 48$&nbsp;(con).</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: 48 con</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Trên đường thẳng&nbsp;$xx'$&nbsp;lấy điểm&nbsp;$O$. Trên tia&nbsp;$Ox$&nbsp;lấy&nbsp;$A$&nbsp;sao cho&nbsp;$OA = 3\\text{ cm}$. Trên tia&nbsp;$Ox'$&nbsp;lấy&nbsp;$B, C$&nbsp;sao cho&nbsp;$OB = 3\\text{ cm}, OC = 7\\text{ cm}$.<div class='mt-6'>a) &nbsp; Chứng tỏ&nbsp;$O$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$.</div><div class='mt-6'>b) &nbsp; Tính độ dài đoạn thẳng&nbsp;$BC$.</div><div class='mt-6'>c) &nbsp; Điểm&nbsp;$B$&nbsp;có là trung điểm của&nbsp;$AC$&nbsp;không? Vì sao?</div>", lines_needed: 12, strategy: "Ý a: Dựa vào tính chất tia đối suy ra&nbsp;$O$&nbsp;nằm giữa&nbsp;$A, B$.&nbsp;Cộng khoảng cách bằng nhau suy ra trung điểm.<br>Ý b: Sử dụng tính chất điểm cùng thuộc tia&nbsp;$Ox'$.<br>Ý c: So sánh&nbsp;$AB$&nbsp;và&nbsp;$BC$.", solution: "<li><strong>a)</strong> Vì&nbsp;$A \\in Ox, B \\in Ox'$&nbsp;mà&nbsp;$Ox, Ox'$&nbsp;là hai tia đối nhau nên&nbsp;$O$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$.</li><li>Lại có&nbsp;$OA = OB = 3\\text{ cm}$. Suy ra&nbsp;$O$&nbsp;là trung điểm&nbsp;$AB$.</li><li class='mt-2'><strong>b)</strong> Trên tia&nbsp;$Ox'$, vì&nbsp;$OB < OC$ ($3 < 7$) nên&nbsp;$B$&nbsp;nằm giữa&nbsp;$O$&nbsp;và&nbsp;$C$.</li><li>$\\Rightarrow BC = OC - OB = 7 - 3 = 4\\text{ (cm)}$.</li><li class='mt-2'><strong>c)</strong> Ta có:&nbsp;$AB = OA + OB = 3 + 3 = 6\\text{ (cm)}$.</li><li>Vì&nbsp;$AB = 6\\text{ cm}$ và&nbsp;$BC = 4\\text{ cm}$ nên&nbsp;$AB \\neq BC$.</li><li>Vậy&nbsp;$B$&nbsp;không phải là trung điểm của&nbsp;$AC$.</li><div class='flex justify-center my-8'><svg width='400' height='80' viewBox='0 0 400 80'><line x1='20' y1='40' x2='380' y2='40' stroke='black' stroke-width='1'/><circle cx='100' cy='40' r='2' fill='black'/><text x='95' y='60' font-size='14'>A</text><circle cx='200' cy='40' r='2' fill='black'/><text x='195' y='60' font-size='14'>O</text><circle cx='300' cy='40' r='2' fill='black'/><text x='295' y='60' font-size='14'>B</text><circle cx='360' cy='40' r='2' fill='black'/><text x='355' y='60' font-size='14'>C</text><text x='25' y='35' font-size='14' font-style='italic'>x</text><text x='370' y='35' font-size='14' font-style='italic'>x'</text><path d='M 100 30 L 100 20 L 200 20 L 200 30' fill='none' stroke='blue' stroke-width='0.5'/><text x='140' y='15' font-size='11' fill='blue'>3cm</text><path d='M 200 30 L 200 20 L 300 20 L 300 30' fill='none' stroke='green' stroke-width='0.5'/><text x='240' y='15' font-size='11' fill='green'>3cm</text></svg></div>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Chứng tỏ rằng:&nbsp;$S = \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dots + \\dfrac{1}{2024^2} < 1$.", lines_needed: 8, strategy: "Phương pháp làm trội: $\\dfrac{1}{n^2} < \\dfrac{1}{(n-1)n}$. Biến đổi thành chuỗi sai phân triệt tiêu.", solution: "<li>Ta có:&nbsp;$\\dfrac{1}{2^2} < \\dfrac{1}{1 \\cdot 2} = 1 - \\dfrac{1}{2}$</li><li>$\\dfrac{1}{3^2} < \\dfrac{1}{2 \\cdot 3} = \\dfrac{1}{2} - \\dfrac{1}{3}$</li><li>...</li><li>$\\dfrac{1}{2024^2} < \\dfrac{1}{2023 \\cdot 2024} = \\dfrac{1}{2023} - \\dfrac{1}{2024}$</li><li>$\\Rightarrow S < 1 - \\dfrac{1}{2024} = \\dfrac{2023}{2024} < 1$. Vậy&nbsp;$S < 1$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Đpcm.</li>" }
]

{ t_title: "Câu 1 (1,5 điểm)", t_content: "Thực hiện phép tính:<div class='mt-6'>a) &nbsp; $M = \\dfrac{4}{9} : \\left(\\dfrac{1}{15} - \\dfrac{2}{3}\\right) + 1\\dfrac{2}{9}$</div><div class='mt-6'>b) &nbsp; $N = \\dfrac{0,4 - \\dfrac{2}{9} + \\dfrac{2}{11}}{1,4 - \\dfrac{7}{9} + \\dfrac{7}{11}}$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Tính trong ngoặc trước, nhân nghịch đảo và cộng phân số.<br><strong>Ý b:</strong> Đặt nhân tử chung là&nbsp;$2$&nbsp;ở tử và&nbsp;$7$&nbsp;ở mẫu (lưu ý&nbsp;$0,4 = 2/5; 1,4 = 7/5$).", solution: "<li><strong>a)</strong> $M = \\dfrac{4}{9} : \\left(\\dfrac{1 - 10}{15}\\right) + \\dfrac{11}{9} = \\dfrac{4}{9} \\cdot \\dfrac{-15}{9} + \\dfrac{11}{9}$</li><li>$M = \\dfrac{-20}{27} + \\dfrac{33}{27} = \\dfrac{13}{27}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $M = \\dfrac{13}{27}$</li><li class='mt-3'><strong>b)</strong> $N = \\dfrac{2 \\cdot \\left(\\dfrac{1}{5} - \\dfrac{1}{9} + \\dfrac{1}{11}\\right)}{7 \\cdot \\left(\\dfrac{1}{5} - \\dfrac{1}{9} + \\dfrac{1}{11}\\right)}$&nbsp;(Lưu ý đề gốc bị nhầm số hạng mẫu, điều chỉnh về dạng rút gọn).</li><li>$N = \\dfrac{2}{7}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $N = \\dfrac{2}{7}$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{x - 1}{4} = \\dfrac{-9}{1 - x}$</div><div class='mt-6'>b) &nbsp; $|3x - 1| - \\dfrac{1}{2} = 2$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Đổi&nbsp;$1-x = -(x-1)$&nbsp;để nhân chéo thành&nbsp;$(x-1)^2 = 36$.<br><strong>Ý b:</strong> Cô lập cụm trị tuyệt đối rồi chia 2 trường hợp.", solution: "<li><strong>a)</strong> $\\dfrac{x - 1}{4} = \\dfrac{9}{x - 1} \\Rightarrow (x - 1)^2 = 36 = (\\pm 6)^2$</li><li>TH1: $x - 1 = 6 \\Rightarrow x = 7$. TH2: $x - 1 = -6 \\Rightarrow x = -5$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x \\in \\{7; -5\\}$</li><li class='mt-3'><strong>b)</strong> $|3x - 1| = 2,5$</li><li>TH1: $3x - 1 = 2,5 \\Rightarrow 3x = 3,5 \\Rightarrow x = 7/6$.</li><li>TH2: $3x - 1 = -2,5 \\Rightarrow 3x = -1,5 \\Rightarrow x = -0,5$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x \\in \\{7/6; -0,5\\}$</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Lượng nước trong nấm tươi là&nbsp;$90\\%$, trong nấm khô là&nbsp;$20\\%$. Muốn thu được&nbsp;$10\\text{ kg}$&nbsp;nấm khô thì cần phơi bao nhiêu nấm tươi?", lines_needed: 8, strategy: "Sử dụng tính chất lượng chất rắn không đổi. Tính lượng rắn trong nấm khô rồi suy ngược ra nấm tươi.", solution: "<li>Lượng chất rắn trong nấm khô:&nbsp;$10 \\cdot (100\\% - 20\\%) = 8\\text{ kg}$.</li><li>Vì lượng chất rắn không đổi nên khối lượng nấm tươi là:</li><li>$8 : (100\\% - 90\\%) = 8 : 10\\% = 80\\text{ (kg)}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: 80 kg</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Trên đường thẳng&nbsp;$a$, lấy&nbsp;$3$&nbsp;điểm&nbsp;$A, B, C$&nbsp;theo thứ tự đó sao cho&nbsp;$AB = 4\\text{ cm}, BC = 6\\text{ cm}$. Gọi&nbsp;$M$&nbsp;là trung điểm&nbsp;$AB, N$&nbsp;là trung điểm&nbsp;$BC$.<div class='mt-6'>a) &nbsp; Tính độ dài đoạn thẳng&nbsp;$AC$.</div><div class='mt-6'>b) &nbsp; Điểm&nbsp;$B$&nbsp;có nằm giữa&nbsp;$M$&nbsp;và&nbsp;$N$&nbsp;không? Tính độ dài&nbsp;$MN$.</div>", lines_needed: 12, strategy: "Tính&nbsp;$AC$&nbsp;bằng tổng&nbsp;$AB+BC$. Sử dụng định lý đoạn nối hai trung điểm của hai đoạn thẳng kề nhau.", solution: "<li><strong>a)</strong> Vì&nbsp;$B$&nbsp;nằm giữa&nbsp;$A, C$ nên&nbsp;$AC = AB + BC = 4 + 6 = 10\\text{ (cm)}$.</li><li class='mt-2'><strong>b)</strong> $M$&nbsp;là trung điểm&nbsp;$AB \\Rightarrow MB = 2\\text{ cm}$. $N$&nbsp;là trung điểm&nbsp;$BC \\Rightarrow BN = 3\\text{ cm}$.</li><li>Vì&nbsp;$B$&nbsp;nằm giữa&nbsp;$A, C$ nên hai tia&nbsp;$BA, BC$&nbsp;đối nhau.</li><li>Mà&nbsp;$M \\in BA, N \\in BC$ nên&nbsp;$B$&nbsp;nằm giữa&nbsp;$M, N$.</li><li>$\\Rightarrow MN = MB + BN = 2 + 3 = 5\\text{ (cm)}$.</li><div class='flex justify-center my-8'><svg width='300' height='80' viewBox='0 0 300 80'><line x1='20' y1='40' x2='280' y2='40' stroke='black' stroke-width='1'/><circle cx='40' cy='40' r='2' fill='black'/><text x='35' y='60' font-size='14'>A</text><circle cx='136' cy='40' r='2' fill='black'/><text x='131' y='60' font-size='14'>B</text><circle cx='280' cy='40' r='2' fill='black'/><text x='275' y='60' font-size='14'>C</text><circle cx='88' cy='40' r='2' fill='red'/><text x='83' y='60' font-size='14' fill='red'>M</text><circle cx='208' cy='40' r='2' fill='red'/><text x='204' y='60' font-size='14' fill='red'>N</text><path d='M 88 30 L 88 20 L 208 20 L 208 30' fill='none' stroke='blue' stroke-width='0.5'/><text x='135' y='15' font-size='11' fill='blue'>MN = 5cm</text></svg></div>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Tìm các cặp số nguyên&nbsp;$(x, y)$&nbsp;biết:&nbsp;$\\dfrac{x}{5} - \\dfrac{2}{y} = \\dfrac{2}{15}$.", lines_needed: 8, strategy: "Quy đồng mẫu số và chuyển về phương trình tích dạng&nbsp;$A \\cdot B = k$. Lập bảng xét các ước.", solution: "<li>$\\dfrac{xy - 10}{5y} = \\dfrac{2}{15} \\Rightarrow 15(xy - 10) = 10y \\Rightarrow 3(xy - 10) = 2y$</li><li>$3xy - 2y = 30 \\Rightarrow y(3x - 2) = 30$.</li><li>Vì&nbsp;$x, y \\in \\mathbb{Z}$ nên&nbsp;$3x-2$&nbsp;là ước của&nbsp;$30$&nbsp;và&nbsp;$3x-2$&nbsp;chia&nbsp;$3$&nbsp;dư&nbsp;$1$ (hoặc dư&nbsp;$-2$).</li><li>Các giá trị&nbsp;$3x-2$ thỏa mãn:&nbsp;$1, -2, 10, -5$.</li><li>Ta có bảng kết quả:&nbsp;$(x,y) \in \{(1, 30); (0, -15); (4, 3); (-1, -6)\}$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Tìm được 4 cặp giá trị.</li>" }
]

{ q_title: "Câu 11", q_content: "Đoạn thẳng&nbsp;$AB = 6\\text{ cm}$. Lấy&nbsp;$M, N$&nbsp;thuộc đoạn&nbsp;$AB$&nbsp;sao cho&nbsp;$AM = 2\\text{ cm}, AN = 4\\text{ cm}$. Độ dài&nbsp;$MN$&nbsp;là:", options: ["A. $6\\text{ cm}$", "B. $4\\text{ cm}$", "C. $2\\text{ cm}$", "D. $1\\text{ cm}$"], correct_idx: 2, explain: "Trên đoạn&nbsp;$AB$, vì&nbsp;$AM < AN$ ($2 < 4$) nên&nbsp;$M$&nbsp;nằm giữa&nbsp;$A, N \\Rightarrow MN = AN - AM = 2\\text{ cm}$. Chọn C.<div class='flex justify-center my-6'><svg width='200' height='40'><line x1='20' y1='20' x2='180' y2='20' stroke='black' stroke-width='1'/><circle cx='20' cy='20' r='2' fill='black'/><text x='15' y='38' font-size='12'>A</text><circle cx='73' cy='20' r='2' fill='black'/><text x='68' y='38' font-size='12'>M</text><circle cx='126' cy='20' r='2' fill='black'/><text x='121' y='38' font-size='12'>N</text><circle cx='180' cy='20' r='2' fill='black'/><text x='175' y='38' font-size='12'>B</text></svg></div>" },

{ t_title: "Câu 1 (1,5 điểm)", t_content: "Tính hợp lý các biểu thức sau:<div class='mt-6'>a) &nbsp; $A = \\dfrac{-5}{7} \\cdot \\dfrac{2}{11} + \\dfrac{-5}{7} \\cdot \\dfrac{9}{11} + 1\\dfrac{5}{7}$</div><div class='mt-6'>b) &nbsp; $B = \\dfrac{3}{2^2} \\cdot \\dfrac{8}{3^2} \\cdot \\dfrac{15}{4^2} \\cdot \\dots \\cdot \\dfrac{99}{10^2}$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Đặt nhân tử chung&nbsp;$\\dfrac{-5}{7}$.<br><strong>Ý b:</strong> Phân tích tử số dạng&nbsp;$n^2-1 = (n-1)(n+1)$&nbsp;để triệt tiêu chéo.", solution: "<li><strong>a)</strong> $A = \\dfrac{-5}{7} \\cdot \\left(\\dfrac{2}{11} + \\dfrac{9}{11}\\right) + \\dfrac{12}{7} = \\dfrac{-5}{7} \\cdot 1 + \\dfrac{12}{7} = 1$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $A = 1$</li><li class='mt-3'><strong>b)</strong> $B = \\dfrac{1 \\cdot 3}{2 \\cdot 2} \\cdot \\dfrac{2 \\cdot 4}{3 \\cdot 3} \\cdot \\dots \\cdot \\dfrac{9 \\cdot 11}{10 \\cdot 10} = \\dfrac{(1 \\cdot 2 \\cdot \dots \cdot 9) \\cdot (3 \\cdot 4 \\cdot \dots \cdot 11)}{(2 \\cdot 3 \\cdot \dots \cdot 10) \\cdot (2 \\cdot 3 \\cdot \dots \cdot 10)}$</li><li>$B = \\dfrac{1}{10} \\cdot \\dfrac{11}{2} = \\dfrac{11}{20}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $B = 0,55$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{2}{3}x - 50\\%x = \\dfrac{-5}{12}$</div><div class='mt-6'>b) &nbsp; $\\left(\\dfrac{1}{2}x - 3\\right)^2 = \\dfrac{25}{4}$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Đặt&nbsp;$x$&nbsp;làm nhân tử chung, đổi&nbsp;$50\\% = 1/2$.<br><strong>Ý b:</strong> Chia 2 trường hợp vì có bình phương.", solution: "<li><strong>a)</strong> $x \\cdot \\left(\\dfrac{2}{3} - \\dfrac{1}{2}\\right) = \\dfrac{-5}{12} \\Rightarrow x \\cdot \\dfrac{1}{6} = \\dfrac{-5}{12} \\Rightarrow x = \\dfrac{-5}{2}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x = -2,5$</li><li class='mt-3'><strong>b)</strong> $\\dfrac{1}{2}x - 3 = \\pm \\dfrac{5}{2}$</li><li>TH1: $\\dfrac{1}{2}x = 3 + 2,5 = 5,5 \\Rightarrow x = 11$. TH2: $\\dfrac{1}{2}x = 3 - 2,5 = 0,5 \\Rightarrow x = 1$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x \\in \\{1; 11\\}$</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Lớp 6A có&nbsp;$45$&nbsp;học sinh. Số học sinh nam bằng&nbsp;$\\dfrac{4}{5}$&nbsp;số học sinh nữ.<div class='mt-6'>a) &nbsp; Tính số học sinh nam và nữ của lớp.</div><div class='mt-6'>b) &nbsp; Tính tỉ số % số học sinh nam so với cả lớp.</div>", lines_needed: 8, strategy: "Giải bài toán tổng - tỉ.&nbsp;Nam chiếm&nbsp;$4$&nbsp;phần, nữ chiếm&nbsp;$5$&nbsp;phần, tổng cộng&nbsp;$9$&nbsp;phần.", solution: "<li><strong>a)</strong> Tổng số phần:&nbsp;$4 + 5 = 9$. Giá trị&nbsp;$1$&nbsp;phần:&nbsp;$45 : 9 = 5$.</li><li>Số học sinh nam:&nbsp;$5 \\cdot 4 = 20$. Số học sinh nữ:&nbsp;$5 \\cdot 5 = 25$.</li><li><strong>b)</strong> Tỉ số %:&nbsp;$\\dfrac{20}{45} \\cdot 100\\% \\approx 44,44\\%$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 20 nam, 25 nữ; b) $44,44\\%$</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Trên tia&nbsp;$Ox$&nbsp;lấy ba điểm&nbsp;$A, B, C$&nbsp;sao cho&nbsp;$OA = 3\\text{ cm}, OB = 7\\text{ cm}, OC = 5\\text{ cm}$.<div class='mt-6'>a) &nbsp; Trong ba điểm&nbsp;$A, B, C$, điểm nào nằm giữa?</div><div class='mt-6'>b) &nbsp; Tính độ dài&nbsp;$AC$&nbsp;và&nbsp;$CB$.</div><div class='mt-6'>c) &nbsp; Điểm&nbsp;$C$&nbsp;có là trung điểm của&nbsp;$AB$&nbsp;không?</div>", lines_needed: 12, strategy: "Sắp xếp thứ tự các điểm dựa trên khoảng cách từ gốc&nbsp;$O$.<br>Chứng minh trung điểm bằng cách chỉ ra&nbsp;$C$&nbsp;nằm giữa và&nbsp;$AC = CB$.", solution: "<li><strong>a)</strong> Vì&nbsp;$OA < OC < OB$ ($3 < 5 < 7$) trên tia&nbsp;$Ox$&nbsp;nên điểm&nbsp;$C$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$.</li><li class='mt-2'><strong>b)</strong> $AC = OC - OA = 5 - 3 = 2\\text{ (cm)}$.</li><li>$CB = OB - OC = 7 - 5 = 2\\text{ (cm)}$.</li><li class='mt-2'><strong>c)</strong> Vì&nbsp;$C$&nbsp;nằm giữa&nbsp;$A, B$ và&nbsp;$AC = CB = 2\\text{ cm}$, nên&nbsp;$C$&nbsp;là trung điểm&nbsp;$AB$.</li><div class='flex justify-center my-8'><svg width='300' height='80' viewBox='0 0 300 80'><line x1='20' y1='40' x2='280' y2='40' stroke='black' stroke-width='1'/><circle cx='40' cy='40' r='2' fill='black'/><text x='35' y='60' font-size='14'>O</text><circle cx='100' cy='40' r='2' fill='black'/><text x='95' y='60' font-size='14'>A</text><circle cx='140' cy='40' r='2' fill='red'/><text x='135' y='60' font-size='14' fill='red'>C</text><circle cx='180' cy='40' r='2' fill='black'/><text x='175' y='60' font-size='14'>B</text><text x='285' y='45' font-size='14' font-style='italic'>x</text><path d='M 100 30 L 100 20 L 140 20 L 140 30' fill='none' stroke='blue' stroke-width='0.5'/><text x='115' y='15' font-size='11' fill='blue'>2cm</text><path d='M 140 30 L 140 20 L 180 20 L 180 30' fill='none' stroke='green' stroke-width='0.5'/><text x='155' y='15' font-size='11' fill='green'>2cm</text></svg></div>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Tìm tất cả các số nguyên&nbsp;$n$&nbsp;để phân số&nbsp;$P = \\dfrac{3n - 1}{n - 2}$&nbsp;nhận giá trị nguyên.", lines_needed: 10, strategy: "Tách tử số theo mẫu:&nbsp;$3n - 1 = 3(n - 2) + 5$.&nbsp;Tìm ước của&nbsp;$5$.", solution: "<li>Ta có:&nbsp;$P = 3 + \\dfrac{5}{n - 2}$. Để&nbsp;$P$&nbsp;nguyên thì&nbsp;$n - 2$&nbsp;là ước của&nbsp;$5$.</li><li>$n - 2 \\in \\{\\pm 1; \\pm 5\\}$.</li><li>$n - 2 = 1 \\Rightarrow n = 3$; $n - 2 = -1 \\Rightarrow n = 1$</li><li>$n - 2 = 5 \\Rightarrow n = 7$; $n - 2 = -5 \\Rightarrow n = -3$</li><li class='font-bold text-indigo-700 mt-1'>Vậy $n \\in \\{-3; 1; 3; 7\\}$.</li>" }
]

{ t_title: "Câu 5 (0,5 điểm)", t_content: "Chứng minh rằng:&nbsp;$S = \\dfrac{1}{11} + \\dfrac{1}{12} + \\dots + \\dfrac{1}{20} > \\dfrac{1}{2}$.", lines_needed: 8, strategy: "Đánh giá tổng bằng cách so sánh mỗi số hạng với số hạng nhỏ nhất trong dãy.", solution: "<li>Tổng&nbsp;$S$&nbsp;có&nbsp;$(20 - 11) + 1 = 10$&nbsp;số hạng.</li><li>Ta có:&nbsp;$\\dfrac{1}{11} > \\dfrac{1}{20}$; $\\dfrac{1}{12} > \\dfrac{1}{20}$; ...; $\\dfrac{1}{19} > \\dfrac{1}{20}$.</li><li>$\\Rightarrow S > \\dfrac{1}{20} + \\dfrac{1}{20} + \dots + \\dfrac{1}{20}$ (10 số hạng).</li><li>$S > 10 \\cdot \\dfrac{1}{20} = \\dfrac{1}{2}$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Đpcm.</li>" }

tu_luan: [
{ t_title: "Câu 1 (1,5 điểm)", t_content: "Thực hiện phép tính hợp lý:<div class='mt-6'>a) &nbsp; $E = \\dfrac{8}{15} \\cdot \\dfrac{-13}{19} - \\dfrac{8}{15} \\cdot \\dfrac{6}{19} + \\dfrac{8}{15}$</div><div class='mt-6'>b) &nbsp; $F = \\left(2\\dfrac{1}{3} - 1,5\\right) : \\left(\\dfrac{-5}{6}\\right)^2$</div>", lines_needed: 8, strategy: "<strong>Ý a:</strong> Đặt nhân tử chung&nbsp;$\\dfrac{8}{15}$, lưu ý hạng tử cuối cùng là&nbsp;$\\dfrac{8}{15} \\cdot 1$.<br><strong>Ý b:</strong> Đổi về phân số, tính trong ngoặc trước, lưu ý bình phương số âm ra dương.", solution: "<li><strong>a)</strong> $E = \\dfrac{8}{15} \\cdot \\left(\\dfrac{-13}{19} - \\dfrac{6}{19} + 1\\right) = \\dfrac{8}{15} \\cdot \\left(\\dfrac{-19}{19} + 1\\right)$</li><li>$E = \\dfrac{8}{15} \\cdot (-1 + 1) = 0$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $E = 0$</li><li class='mt-3'><strong>b)</strong> $F = \\left(\\dfrac{7}{3} - \\dfrac{3}{2}\\right) : \\dfrac{25}{36} = \\dfrac{14 - 9}{6} \\cdot \\dfrac{36}{25} = \\dfrac{5}{6} \\cdot \\dfrac{36}{25}$</li><li>$F = \\dfrac{1 \\cdot 6}{1 \\cdot 5} = \\dfrac{6}{5}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $F = 1,2$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $x - \\dfrac{2}{5} = \\dfrac{-3}{4} \\cdot \\dfrac{8}{9}$</div><div class='mt-6'>b) &nbsp; $(3x + 1)^3 = -64$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Tính tích vế phải rồi chuyển vế đổi dấu.<br><strong>Ý b:</strong> Đưa&nbsp;$-64$&nbsp;về dạng lũy thừa&nbsp;$3$:&nbsp;$-64 = (-4)^3$.", solution: "<li><strong>a)</strong> $x - \\dfrac{2}{5} = \\dfrac{-2}{3} \\Rightarrow x = \\dfrac{-2}{3} + \\dfrac{2}{5} = \\dfrac{-10 + 6}{15}$</li><li>$x = \\dfrac{-4}{15}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x = \\dfrac{-4}{15}$</li><li class='mt-3'><strong>b)</strong> $(3x + 1)^3 = (-4)^3 \\Rightarrow 3x + 1 = -4$</li><li>$3x = -5 \\Rightarrow x = \\dfrac{-5}{3}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x = \\dfrac{-5}{3}$</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Ba vòi nước cùng chảy vào bể. Vòi 1 chảy&nbsp;$3$&nbsp;giờ đầy bể, vòi 2 chảy&nbsp;$4$&nbsp;giờ đầy bể. Vòi 3 tháo nước ra, sau&nbsp;$6$&nbsp;giờ thì cạn bể đầy. Hỏi nếu mở cả 3 vòi cùng lúc thì sau bao lâu bể đầy?", lines_needed: 8, strategy: "Tính năng suất 1 giờ của từng vòi (chảy vào là cộng, tháo ra là trừ). Sau đó lấy&nbsp;$1$&nbsp;chia cho năng suất chung.", solution: "<li>Trong&nbsp;$1$&nbsp;giờ, vòi 1 chảy được&nbsp;$1/3$&nbsp;bể, vòi 2 chảy&nbsp;$1/4$&nbsp;bể, vòi 3 tháo&nbsp;$1/6$&nbsp;bể.</li><li>Năng suất chung:&nbsp;$\\dfrac{1}{3} + \\dfrac{1}{4} - \\dfrac{1}{6} = \\dfrac{4 + 3 - 2}{12} = \\dfrac{5}{12}$&nbsp;(bể/giờ).</li><li>Thời gian đầy bể:&nbsp;$1 : \\dfrac{5}{12} = 2,4$&nbsp;(giờ) = 2 giờ 24 phút.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: 2 giờ 24 phút</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Vẽ đoạn&nbsp;$AB = 8\\text{ cm}$. Lấy&nbsp;$C$&nbsp;nằm giữa&nbsp;$A, B$&nbsp;sao cho&nbsp;$AC = 2\\text{ cm}$. Gọi&nbsp;$M$&nbsp;là trung điểm&nbsp;$AC$, $N$&nbsp;là trung điểm&nbsp;$CB$.<div class='mt-6'>a) &nbsp; Tính độ dài đoạn thẳng&nbsp;$CB$.</div><div class='mt-6'>b) &nbsp; Tính độ dài đoạn thẳng&nbsp;$MN$.</div>", lines_needed: 12, strategy: "Sử dụng tính chất điểm nằm giữa để tính&nbsp;$CB$.<br>Tính các đoạn nhỏ&nbsp;$MC$&nbsp;và&nbsp;$CN$&nbsp;dựa vào trung điểm, rồi cộng lại để ra&nbsp;$MN$.", solution: "<li><strong>a)</strong> Vì&nbsp;$C$&nbsp;nằm giữa&nbsp;$A, B$ nên&nbsp;$AC + CB = AB \\Rightarrow 2 + CB = 8 \\Rightarrow CB = 6\\text{ (cm)}$.</li><li class='mt-2'><strong>b)</strong> $M$&nbsp;là trung điểm&nbsp;$AC \\Rightarrow MC = 2/2 = 1\\text{ (cm)}$.</li><li>$N$&nbsp;là trung điểm&nbsp;$CB \\Rightarrow CN = 6/2 = 3\\text{ (cm)}$.</li><li>Vì&nbsp;$C$&nbsp;nằm giữa&nbsp;$A, B$ nên hai tia&nbsp;$CA, CB$&nbsp;đối nhau.</li><li>Mà&nbsp;$M \\in CA, N \\in CB$ nên&nbsp;$C$&nbsp;nằm giữa&nbsp;$M, N \\Rightarrow MN = MC + CN = 1 + 3 = 4\\text{ (cm)}$.</li><div class='flex justify-center my-8'><svg width='300' height='80' viewBox='0 0 300 80'><line x1='20' y1='40' x2='280' y2='40' stroke='black' stroke-width='1'/><circle cx='40' cy='40' r='2' fill='black'/><text x='35' y='60' font-size='14'>A</text><circle cx='100' cy='40' r='2' fill='black'/><text x='95' y='60' font-size='14'>C</text><circle cx='280' cy='40' r='2' fill='black'/><text x='275' y='60' font-size='14'>B</text><circle cx='70' cy='40' r='2' fill='red'/><text x='65' y='60' font-size='14' fill='red'>M</text><circle cx='190' cy='40' r='2' fill='red'/><text x='185' y='60' font-size='14' fill='red'>N</text><path d='M 70 30 L 70 20 L 190 20 L 190 30' fill='none' stroke='blue' stroke-width='0.5'/><text x='125' y='15' font-size='11' fill='blue'>MN = 4cm</text></svg></div>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Tìm các cặp số nguyên&nbsp;$(x, y)$&nbsp;thỏa mãn:&nbsp;$xy - 3x + 2y = 11$.", lines_needed: 8, strategy: "Phương pháp tách nhân tử chung (ép tích):&nbsp;$(x+a)(y+b) = k$.", solution: "<li>Ta có:&nbsp;$x(y - 3) + 2y = 11 \\Rightarrow x(y - 3) + 2(y - 3) = 11 - 6$</li><li>$\\Rightarrow (x + 2)(y - 3) = 5$.</li><li>Lập bảng xét các ước của&nbsp;$5$:&nbsp;\\{\\pm 1; \\pm 5\\}.</li><li>Các cặp&nbsp;$(x,y)$ là:&nbsp;$(-1, 8); (3, 4); (-3, -2); (-7, 2)$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: Có 4 cặp giá trị thỏa mãn.</li>" }
]

tu_luan: [
{ t_title: "Câu 1 (1,5 điểm)", t_content: "Thực hiện phép tính (tính hợp lý nếu có thể):<div class='mt-6'>a) &nbsp; $A = \\dfrac{-3}{13} \\cdot \\dfrac{5}{11} + \\dfrac{-3}{13} \\cdot \\dfrac{6}{11} - \\dfrac{10}{13}$</div><div class='mt-6'>b) &nbsp; $B = \\left(1 - \\dfrac{1}{2}\\right) \\cdot \\left(1 - \\dfrac{1}{3}\\right) \\cdot \\dots \\cdot \\left(1 - \\dfrac{1}{2025}\\right)$</div>", lines_needed: 8, strategy: "<strong>Ý a:</strong> Nhóm nhân tử chung&nbsp;$\\dfrac{-3}{13}$ cho hai số hạng đầu, sau đó trừ nốt phân số cuối.<br><strong>Ý b:</strong> Tính gọn trong từng ngoặc rồi triệt tiêu chéo tử và mẫu.", solution: "<li><strong>a)</strong> $A = \\dfrac{-3}{13} \\cdot \\left(\\dfrac{5}{11} + \\dfrac{6}{11}\\right) - \\dfrac{10}{13} = \\dfrac{-3}{13} \\cdot 1 - \\dfrac{10}{13}$</li><li>$A = \\dfrac{-3 - 10}{13} = \\dfrac{-13}{13} = -1$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $A = -1$</li><li class='mt-3'><strong>b)</strong> $B = \\dfrac{1}{2} \\cdot \\dfrac{2}{3} \\cdot \\dfrac{3}{4} \\cdot \\dots \\cdot \\dfrac{2024}{2025}$</li><li>$B = \\dfrac{1 \\cdot 2 \\cdot 3 \dots 2024}{2 \\cdot 3 \cdot 4 \dots 2025} = \\dfrac{1}{2025}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $B = \\dfrac{1}{2025}$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{3}{5}x - \\dfrac{1}{2} = \\dfrac{7}{10}$</div><div class='mt-6'>b) &nbsp; $|2x - 3| - 25\\% = \\dfrac{3}{4}$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Chuyển vế tìm&nbsp;$\\dfrac{3}{5}x$ rồi tìm&nbsp;$x$.<br><strong>Ý b:</strong> Đổi&nbsp;$25\\% = 1/4$, cô lập cụm trị tuyệt đối rồi chia hai trường hợp.", solution: "<li><strong>a)</strong> $\\dfrac{3}{5}x = \\dfrac{7}{10} + \\dfrac{1}{2} = \\dfrac{12}{10} = \\dfrac{6}{5}$</li><li>$x = \\dfrac{6}{5} : \\dfrac{3}{5} = \\dfrac{6}{5} \\cdot \\dfrac{5}{3} = 2$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x = 2$</li><li class='mt-3'><strong>b)</strong> $|2x - 3| = \\dfrac{3}{4} + \\dfrac{1}{4} = 1$</li><li>TH1: $2x - 3 = 1 \\Rightarrow 2x = 4 \\Rightarrow x = 2$.</li><li>TH2: $2x - 3 = -1 \\Rightarrow 2x = 2 \\Rightarrow x = 1$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x \\in \\{1; 2\\}$</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Một trang trại có&nbsp;$120$&nbsp;con gia súc. Gà chiếm&nbsp;$1/3$ tổng số. Vịt chiếm&nbsp;$40\\% $&nbsp;số con CÒN LẠI. Phần còn lại là Lợn.<div class='mt-6'>a) &nbsp; Tính số con mỗi loại của trang trại.</div><div class='mt-6'>b) &nbsp; Tính tỉ số % số Lợn so với tổng gia súc.</div>", lines_needed: 10, strategy: "Tính Gà $\\rightarrow$ Số còn lại $\\rightarrow$ Vịt (40% của còn lại) $\\rightarrow$ Lợn.", solution: "<li><strong>a)</strong> Số Gà:&nbsp;$120 \\cdot 1/3 = 40$&nbsp;(con).</li><li>Số còn lại:&nbsp;$120 - 40 = 80$&nbsp;(con).</li><li>Số Vịt:&nbsp;$80 \\cdot 40\\% = 32$&nbsp;(con).</li><li>Số Lợn:&nbsp;$80 - 32 = 48$&nbsp;(con).</li><li><strong>b)</strong> Tỉ số %:&nbsp;$\\dfrac{48}{120} \\cdot 100\\% = 40\\%$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 40, 32, 48 con; b) $40\\%$</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Vẽ hai tia đối nhau&nbsp;$Ox, Oy$. Lấy&nbsp;$M \\in Ox, OM = 5\\text{ cm}$. Lấy&nbsp;$N \\in Oy, ON = 3\\text{ cm}$. Gọi&nbsp;$I$&nbsp;là trung điểm&nbsp;$MN$.<div class='mt-6'>a) &nbsp; Tính độ dài đoạn thẳng&nbsp;$MN$.</div><div class='mt-6'>b) &nbsp; Tính độ dài đoạn thẳng&nbsp;$OI$. Điểm&nbsp;$O$&nbsp;có nằm giữa&nbsp;$I$&nbsp;và&nbsp;$N$&nbsp;không?</div>", lines_needed: 12, strategy: "Sử dụng tính chất tia đối để suy ra&nbsp;$O$&nbsp;nằm giữa&nbsp;$M, N$.<br>Vẽ hình để xác định vị trí&nbsp;$I$:&nbsp;$MN=8 \Rightarrow IM=4$. Mà&nbsp;$OM=5 \Rightarrow I$&nbsp;nằm giữa&nbsp;$O$ và&nbsp;$M$.", solution: "<li><strong>a)</strong> Vì&nbsp;$M \\in Ox, N \\in Oy$ nên&nbsp;$O$&nbsp;nằm giữa&nbsp;$M, N \\Rightarrow MN = OM + ON = 8\\text{ (cm)}$.</li><li class='mt-2'><strong>b)</strong> $I$&nbsp;là trung điểm&nbsp;$MN \\Rightarrow IM = IN = 4\\text{ (cm)}$.</li><li>Trên tia&nbsp;$MO$, ta có&nbsp;$MI = 4\\text{ cm}, MO = 5\\text{ cm} \Rightarrow I$&nbsp;nằm giữa&nbsp;$M, O$.</li><li>$\\Rightarrow MI + IO = MO \\Rightarrow 4 + IO = 5 \\Rightarrow OI = 1\\text{ (cm)}$.</li><li>Theo thứ tự trên đường thẳng là&nbsp;$M - I - O - N$, nên&nbsp;$O$&nbsp;nằm giữa&nbsp;$I$&nbsp;và&nbsp;$N$.</li><div class='flex justify-center my-8'><svg width='300' height='80' viewBox='0 0 300 80'><line x1='20' y1='40' x2='280' y2='40' stroke='black' stroke-width='1'/><circle cx='240' cy='40' r='2' fill='black'/><text x='235' y='60' font-size='14'>M</text><circle cx='100' cy='40' r='2' fill='black'/><text x='95' y='60' font-size='14'>O</text><circle cx='135' cy='40' r='2' fill='red'/><text x='131' y='60' font-size='14' fill='red'>I</text><circle cx='40' cy='40' r='2' fill='black'/><text x='35' y='60' font-size='14'>N</text><text x='25' y='35' font-size='14' font-style='italic'>y</text><text x='270' y='35' font-size='14' font-style='italic'>x</text><path d='M 100 30 L 100 20 L 240 20 L 240 30' fill='none' stroke='blue' stroke-width='0.5'/><text x='160' y='15' font-size='11' fill='blue'>5cm</text></svg></div>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Tìm tất cả các số nguyên&nbsp;$n$&nbsp;để phân số&nbsp;$P = \\dfrac{n + 5}{n - 2}$&nbsp;nhận giá trị nguyên.", lines_needed: 8, strategy: "Tách tử số theo mẫu:&nbsp;$n + 5 = (n - 2) + 7$.", solution: "<li>Ta có:&nbsp;$P = 1 + \\dfrac{7}{n - 2}$. Để&nbsp;$P$&nbsp;nguyên thì&nbsp;$n - 2$&nbsp;là ước của&nbsp;$7$.</li><li>$n - 2 \\in \\{\\pm 1; \\pm 7\\}$.</li><li>$n - 2 = 1 \Rightarrow n = 3$; $n - 2 = -1 \Rightarrow n = 1$</li><li>$n - 2 = 7 \Rightarrow n = 9$; $n - 2 = -7 \Rightarrow n = -5$</li><li class='font-bold text-indigo-700 mt-1'>Vậy $n \in \{-5; 1; 3; 9\}$.</li>" }

{ t_title: "Câu 1 (1,5 điểm)", t_content: "Thực hiện phép tính:<div class='mt-6'>a) &nbsp; $A = \\dfrac{-4}{15} - \\left(\\dfrac{11}{15} - \\dfrac{1}{3}\\right)$</div><div class='mt-6'>b) &nbsp; $B = \\left(\\dfrac{1}{2} - 1\\right) \\cdot \\left(\\dfrac{1}{3} - 1\\right) \\cdot \\dots \\cdot \\left(\\dfrac{1}{100} - 1\\right)$</div>", lines_needed: 8, strategy: "<strong>Ý a:</strong> Phá ngoặc kết hợp phân số cùng mẫu.<br><strong>Ý b:</strong> Tính gọn từng ngoặc ra số âm, triệt tiêu chéo.", solution: "<li><strong>a)</strong> $A = \\dfrac{-4}{15} - \\dfrac{11}{15} + \\dfrac{5}{15} = \\dfrac{-4 - 11 + 5}{15}$</li><li>$A = \\dfrac{-10}{15} = \\dfrac{-2}{3}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $A = \\dfrac{-2}{3}$</li><li class='mt-3'><strong>b)</strong> $B = \\dfrac{-1}{2} \\cdot \\dfrac{-2}{3} \\cdot \\dfrac{-3}{4} \\cdot \\dots \\cdot \\dfrac{-99}{100}$</li><li>Tích có&nbsp;$99$&nbsp;số âm nên kết quả âm.</li><li>$B = -\\dfrac{1}{100}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $B = -0,01$</li>" },
{ t_title: "Câu 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{x}{7} = \\dfrac{-4}{14}$</div><div class='mt-6'>b) &nbsp; $|3x + 1,5| = 4,5$</div>", lines_needed: 10, strategy: "<strong>Ý a:</strong> Dùng tính chất tỉ lệ thức nhân chéo.<br><strong>Ý b:</strong> Chia hai trường hợp trị tuyệt đối.", solution: "<li><strong>a)</strong> $14x = -28 \\Rightarrow x = -2$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x = -2$</li><li class='mt-3'><strong>b)</strong> TH1: $3x + 1,5 = 4,5 \\Rightarrow 3x = 3 \\Rightarrow x = 1$</li><li>TH2: $3x + 1,5 = -4,5 \\Rightarrow 3x = -6 \\Rightarrow x = -2$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: $x \\in \\{1; -2\\}$</li>" },
{ t_title: "Câu 3 (1,5 điểm)", t_content: "Một bể có hai vòi. Vòi 1 chảy riêng mất&nbsp;$5$&nbsp;giờ đầy bể. Vòi 2 tháo nước ra sát đáy mất&nbsp;$7$&nbsp;giờ cạn bể đầy. Hỏi mở cả hai cùng lúc khi bể cạn thì sau bao lâu bể đầy?", lines_needed: 8, strategy: "Tính năng suất hiệu dụng trong&nbsp;$1$&nbsp;giờ của cả hai vòi.", solution: "<li>Trong&nbsp;$1$&nbsp;giờ, vòi 1 chảy được&nbsp;$1/5$&nbsp;bể, vòi 2 tháo&nbsp;$1/7$&nbsp;bể.</li><li>Thực tế nước tăng thêm:&nbsp;$\\dfrac{1}{5} - \\dfrac{1}{7} = \\dfrac{2}{35}$&nbsp;(bể/giờ).</li><li>Thời gian đầy bể:&nbsp;$1 : \\dfrac{2}{35} = 17,5$&nbsp;(giờ).</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: 17 giờ 30 phút</li>" },
{ t_title: "Câu 4 (2,0 điểm)", t_content: "Vẽ đường thẳng&nbsp;$xy$. Lấy 3 điểm&nbsp;$A, B, C$&nbsp;theo thứ tự đó. Biết&nbsp;$AB = 6\\text{ cm}, BC = 4\\text{ cm}$. Gọi&nbsp;$M$&nbsp;là trung điểm&nbsp;$AB, N$&nbsp;là trung điểm&nbsp;$BC$.<div class='mt-6'>a) &nbsp; Tính độ dài đoạn thẳng&nbsp;$AC$.</div><div class='mt-6'>b) &nbsp; Tính độ dài đoạn thẳng&nbsp;$MN$.</div>", lines_needed: 12, strategy: "Dùng tính chất điểm nằm giữa để cộng đoạn thẳng.<br>Tính từng đoạn nhỏ&nbsp;$MB, BN$&nbsp;rồi cộng lại ra&nbsp;$MN$.", solution: "<li><strong>a)</strong> Vì&nbsp;$B$&nbsp;nằm giữa&nbsp;$A, C$ nên&nbsp;$AC = AB + BC = 6 + 4 = 10\\text{ (cm)}$.</li><li class='mt-2'><strong>b)</strong> Vì&nbsp;$M$&nbsp;là trung điểm&nbsp;$AB \\Rightarrow MB = 6/2 = 3\\text{ (cm)}$.</li><li>Vì&nbsp;$N$&nbsp;là trung điểm&nbsp;$BC \\Rightarrow BN = 4/2 = 2\\text{ (cm)}$.</li><li>Vì&nbsp;$B$&nbsp;nằm giữa&nbsp;$A, C$ nên hai tia&nbsp;$BA, BC$&nbsp;đối nhau.</li><li>Mà&nbsp;$M \\in BA, N \\in BC$ nên&nbsp;$B$&nbsp;nằm giữa&nbsp;$M, N$.</li><li>$\\Rightarrow MN = MB + BN = 3 + 2 = 5\\text{ (cm)}$.</li><div class='flex justify-center my-8'><svg width='400' height='80' viewBox='0 0 400 80'><line x1='20' y1='40' x2='380' y2='40' stroke='black' stroke-width='1'/><circle cx='40' cy='40' r='2' fill='black'/><text x='35' y='60' font-size='14'>A</text><circle cx='130' cy='40' r='2' fill='red'/><text x='125' y='60' font-size='14' fill='red'>M</text><circle cx='220' cy='40' r='2' fill='black'/><text x='215' y='60' font-size='14'>B</text><circle cx='280' cy='40' r='2' fill='red'/><text x='275' y='60' font-size='14' fill='red'>N</text><circle cx='340' cy='40' r='2' fill='black'/><text x='335' y='60' font-size='14'>C</text><path d='M 130 30 L 130 20 L 280 20 L 280 30' fill='none' stroke='blue' stroke-width='0.5'/><text x='190' y='15' font-size='11' fill='blue'>MN = 5cm</text></svg></div>" },
{ t_title: "Câu 5 (0,5 điểm)", t_content: "Không cần tính giá trị cụ thể, hãy so sánh&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;biết:&nbsp;$A = \\dfrac{2026^9 + 1}{2026^{10} + 1}$&nbsp;và&nbsp;$B = \\dfrac{2026^8 + 1}{2026^9 + 1}$.", lines_needed: 8, strategy: "Nhân cả&nbsp;$A, B$&nbsp;với&nbsp;$2026$. Tách phần nguyên và so sánh phân số dư.", solution: "<li>$2026A = 1 + \\dfrac{2025}{2026^{10} + 1}$; $2026B = 1 + \\dfrac{2025}{2026^9 + 1}$</li><li>Vì&nbsp;$2026^{10} + 1 > 2026^9 + 1$ nên phần dư của&nbsp;$A$&nbsp;nhỏ hơn phần dư của&nbsp;$B$.</li><li>$\\Rightarrow 2026A < 2026B \\Rightarrow A < B$.</li><li class='font-bold text-indigo-700 mt-1'>Kết luận: $A < B$</li>" }

{ t_title: "Bài 1 (1,5 điểm)", t_content: "Thực hiện phép tính (tính nhanh nếu có thể):<div class='mt-6'>a) &nbsp; $A = \\dfrac{5}{13} + \\dfrac{-5}{7} + \\dfrac{-20}{41} + \\dfrac{8}{13} + \\dfrac{-21}{41}$</div><div class='mt-6'>b) &nbsp; $B = (5,3 - 2,8) - (4 + 5,3)$</div><div class='mt-6'>c) &nbsp; $C = \\dfrac{5}{9} \\cdot \\dfrac{8}{11} + \\dfrac{5}{9} \\cdot \\dfrac{9}{11} - \\dfrac{5}{9} \\cdot \\dfrac{6}{11}$</div>", strategy: "Sử dụng tính chất giao hoán và kết hợp để nhóm các phân số có cùng mẫu số. Ở câu b, phá ngoặc và đổi dấu hạng tử đứng sau dấu trừ. Ở câu c, đặt nhân tử chung.", solution: "<li><strong>a)</strong> $A = \\left(\\dfrac{5}{13} + \\dfrac{8}{13}\\right) + \\left(\\dfrac{-20}{41} + \\dfrac{-21}{41}\\right) + \\dfrac{-5}{7}$</li><li>$A = \\dfrac{13}{13} + \\dfrac{-41}{41} + \\dfrac{-5}{7} = 1 + (-1) - \\dfrac{5}{7} = -\\dfrac{5}{7}$</li><li class='mt-3'><strong>b)</strong> $B = 5,3 - 2,8 - 4 - 5,3$ (Phá ngoặc đổi dấu)</li><li>$B = (5,3 - 5,3) - (2,8 + 4) = 0 - 6,8 = -6,8$</li><li class='mt-3'><strong>c)</strong> $C = \\dfrac{5}{9} \\cdot \\left(\\dfrac{8}{11} + \\dfrac{9}{11} - \\dfrac{6}{11}\\right) = \\dfrac{5}{9} \\cdot \\dfrac{11}{11} = \\dfrac{5}{9}$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) -5/7; b) -6,8; c) 5/9</li>" },
{ t_title: "Bài 2 (1,5 điểm)", t_content: "Tìm x, biết:<div class='mt-6'>a) &nbsp; $x + 8,5 = 21,7$</div><div class='mt-6'>b) &nbsp; $\\dfrac{3}{5}x - \\dfrac{1}{3} = \\dfrac{4}{3}$</div><div class='mt-6'>c) &nbsp; $\\dfrac{2}{3}x - \\dfrac{1}{2}x = \\dfrac{5}{12}$</div>", strategy: "Áp dụng quy tắc chuyển vế: Khi chuyển một số hạng từ vế này sang vế kia của một đẳng thức, ta phải đổi dấu số hạng đó. Ở ý c, sử dụng tính chất phân phối để đặt nhân tử chung x.", solution: "<li><strong>a)</strong> $x = 21,7 - 8,5$ (Quy tắc chuyển vế)</li><li>$x = 13,2$</li><li class='mt-3'><strong>b)</strong> $\\dfrac{3}{5}x = \\dfrac{4}{3} + \\dfrac{1}{3} \\Rightarrow \\dfrac{3}{5}x = \\dfrac{5}{3}$</li><li>$x = \\dfrac{5}{3} : \\dfrac{3}{5} = \\dfrac{5}{3} \\cdot \\dfrac{5}{3} = \\dfrac{25}{9}$</li><li class='mt-3'><strong>c)</strong> $x \\cdot \\left(\\dfrac{2}{3} - \\dfrac{1}{2}\\right) = \\dfrac{5}{12} \\Rightarrow x \\cdot \\dfrac{1}{6} = \\dfrac{5}{12}$</li><li>$x = \\dfrac{5}{12} \\cdot 6 = \\dfrac{5}{2} = 2,5$</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 13,2; b) 25/9; c) 2,5</li>" },
{ t_title: "Bài 3 (1,5 điểm)", t_content: "Một căn phòng hình hộp chữ nhật có chiều dài 4,2m, chiều rộng 3,5m và chiều cao 3,2m. Người ta muốn sơn trần nhà và bốn bức tường bên trong. Biết tổng diện tích các cửa là&nbsp;$5,4\\text{ m}^2$.<div class='mt-6'>a) Tính diện tích cần sơn lại?</div><div class='mt-6'>b) Giá tiền công sơn là 12 000 đồng/$\\text{m}^2$. Tính tổng tiền công để sơn căn phòng đó.</div>", strategy: "Học sinh cần tính diện tích xung quanh (Sxq) của 4 bức tường và diện tích trần nhà (Sđáy). Sau đó trừ đi diện tích các cánh cửa (phần không sơn).", solution: "<li><strong>a)</strong> Diện tích bốn bức tường (Sxq) là:&nbsp;$2 \\cdot (4,2 + 3,5) \\cdot 3,2 = 49,28\\text{ (m}^2)$.</li><li>Diện tích trần nhà là:&nbsp;$4,2 \\cdot 3,5 = 14,7\\text{ (m}^2)$.</li><li>Diện tích sơn thực tế là:&nbsp;$(49,28 + 14,7) - 5,4 = 58,58\\text{ (m}^2)$.</li><li class='mt-2'><strong>b)</strong> Tổng số tiền công sơn là:&nbsp;$58,58 \\cdot 12.000 = 702.960$&nbsp;(đồng).</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 58,58 m²; b) 702.960 đồng</li>" },
{ t_title: "Bài 4 (1,5 điểm)", t_content: "Cho hình vẽ sau đây:<div class='flex justify-center my-6'><svg width='300' height='60' viewBox='0 0 300 60'><line x1='20' y1='30' x2='280' y2='30' stroke='black' stroke-width='1.5'/><circle cx='80' cy='30' r='2.5' fill='black'/><text x='75' y='50' font-size='14' font-weight='bold'>A</text><circle cx='150' cy='30' r='2.5' fill='black'/><text x='145' y='50' font-size='14' font-weight='bold'>B</text><circle cx='220' cy='30' r='2.5' fill='black'/><text x='215' y='50' font-size='14' font-weight='bold'>C</text><text x='25' y='25' font-size='14' font-style='italic'>x</text><text x='270' y='25' font-size='14' font-style='italic'>y</text></svg></div><div class='mt-4'>a) Hình vẽ trên có tất cả bao nhiêu tia? Nêu tên các tia đó.</div><div class='mt-2'>b) Kể tên các tia đối nhau, trùng nhau trên hình vẽ.</div><div class='mt-2'>c) Biết AB = 2 cm; BC = 3 cm. Tính độ dài đoạn thẳng AC.</div>", strategy: "Ôn tập định nghĩa tia (gốc và phần đường thẳng). Lưu ý các tia đối phải chung gốc và tạo thành một đường thẳng. Sử dụng hệ thức cộng đoạn thẳng cho 3 điểm thẳng hàng.", solution: "<li><strong>a)</strong> Hình vẽ trên có 6 tia:&nbsp;$Ax, Ay, Bx, By, Cx, Cy$. (Lưu ý: tia&nbsp;$AB$&nbsp;và&nbsp;$AC$&nbsp;trùng nhau).</li><li class='mt-2'><strong>b)</strong> Các cặp tia đối nhau:&nbsp;$(Ax, Ay)$, $(Bx, By)$, $(Cx, Cy)$.</li><li>Các tia trùng nhau gốc A:&nbsp;$AB$ và&nbsp;$AC$. Gốc B:&nbsp;$BC$ và&nbsp;$By$. Gốc C:&nbsp;$CB$ và&nbsp;$CA$.</li><li class='mt-2'><strong>c)</strong> Vì ba điểm A, B, C thẳng hàng theo thứ tự đó nên điểm B nằm giữa A và C.</li><li>Ta có:&nbsp;$AC = AB + BC = 2 + 3 = 5\\text{ (cm)}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: c) AC = 5 cm</li>" },
{ t_title: "Bài 5 (1,0 điểm)", t_content: "Tìm số tự nhiên n để phân số&nbsp;$A = \\dfrac{n + 10}{2n - 8}$&nbsp;có giá trị là một số nguyên.", strategy: "Để A nguyên thì tử số phải chia hết cho mẫu số. Ta nhân cả biểu thức với 2 để triệt tiêu biến n ở tử số thông qua mẫu số: $2(n+10) = (2n-8) + 28$. Sau đó tìm các ước chẵn của 28.", solution: "<li>Ta có:&nbsp;$A \\in \\mathbb{Z} \\Rightarrow (n + 10) \\vdots (2n - 8) \\Rightarrow 2(n + 10) \\vdots (2n - 8)$.</li><li>Biến đổi:&nbsp;$2n + 20 = (2n - 8) + 28$. Để biểu thức này nguyên thì&nbsp;$28 \\vdots (2n - 8)$.</li><li>Vì n là số tự nhiên nên&nbsp;$(2n - 8)$ là số chẵn và&nbsp;$(2n - 8) \\ge -8$.</li><li>Các ước chẵn của 28 là:&nbsp;$\\{-4, -2, 2, 4, 14, 28\\}$.</li><li>Xét bảng giá trị:</li><li>+ $2n - 8 = -4 \\Rightarrow n = 2 \\Rightarrow A = (2+10)/(4-8) = -3$ (Nhận).</li><li>+ $2n - 8 = -2 \\Rightarrow n = 3 \\Rightarrow A = 13/(-2) = -6,5$ (Loại).</li><li>+ $2n - 8 = 2 \\Rightarrow n = 5 \\Rightarrow A = 15/2 = 7,5$ (Loại).</li><li>+ $2n - 8 = 4 \\Rightarrow n = 6 \\Rightarrow A = 16/4 = 4$ (Nhận).</li><li>+ $2n - 8 = 14 \\Rightarrow n = 11 \\Rightarrow A = 21/14$ (Loại).</li><li>+ $2n - 8 = 28 \\Rightarrow n = 18 \\Rightarrow A = 28/28 = 1$ (Nhận).</li><li class='font-bold text-indigo-700 mt-1'>Vậy các giá trị n cần tìm là&nbsp;$n \\in \\{2; 6; 18\\}$.</li>" }
]
});
</script>

{ q_title: "Câu 6", q_content: "Số đối của số -3,5 là:", options: ["A. 35", "B. 3,5", "C. -35", "D. 0,35"], correct_idx: 1, explain: "Số đối của một số âm là số dương tương ứng. Số đối của&nbsp;$-3,5$&nbsp;là&nbsp;$3,5$. Chọn B." },
{ q_title: "Câu 7", q_content: "Làm tròn số a = 131,2956 đến hàng chục ta được số nào sau đây?", options: ["A. 131,29", "B. 131,30", "C. 131,31", "D. 130"], correct_idx: 3, explain: "Làm tròn đến hàng chục (số 3). Chữ số ngay sau nó (hàng đơn vị) là&nbsp;$1 < 5$&nbsp;nên ta giữ nguyên chữ số hàng chục và thay chữ số hàng đơn vị bằng số 0. Kết quả:&nbsp;$130$. Chọn D." },
{ q_title: "Câu 8", q_content: "Trong các phân số&nbsp;$\\dfrac{-1}{2}; \\dfrac{-2}{3}; \\dfrac{-5}{9}; \\dfrac{-9}{10}$&nbsp;phân số lớn nhất là:", options: ["A. $\\dfrac{-9}{10}$", "B. $\\dfrac{-2}{3}$", "C. $\\dfrac{-5}{9}$", "D. $\\dfrac{-1}{2}$"], correct_idx: 3, explain: "Đối với phân số âm, phần số đối càng nhỏ thì phân số càng lớn. Ta có&nbsp;$0,5 < 0,555... < 0,666... < 0,9$&nbsp;nên&nbsp;$-0,5$&nbsp;là giá trị lớn nhất. Chọn D." },
{ q_title: "Câu 9", q_content: "Biết&nbsp;$x \\cdot \\dfrac{5}{9} = \\dfrac{2}{3}$&nbsp;thì x bằng:", options: ["A. $\\dfrac{6}{5}$", "B. $\\dfrac{10}{27}$", "C. $\\dfrac{5}{6}$", "D. $1$"], correct_idx: 0, explain: "Ta có:&nbsp;$x = \\dfrac{2}{3} : \\dfrac{5}{9} = \\dfrac{2}{3} \\cdot \\dfrac{9}{5} = \\dfrac{6}{5}$. Chọn A." },
{ q_title: "Câu 10", q_content: "Số -5762,12 làm tròn đến hàng chục được kết quả là:", options: ["A. -5764,1", "B. -5762", "C. -5763", "D. -5760"], correct_idx: 3, explain: "Chữ số hàng đơn vị là&nbsp;$2 < 5$&nbsp;nên ta làm tròn xuống (giữ nguyên chữ số hàng chục là 6 và thay hàng đơn vị bằng 0). Kết quả:&nbsp;$-5760$. Chọn D." },

{ t_title: "Bài 1 (2,0 điểm)", t_content: "Thực hiện các phép tính sau (tính hợp lý nếu có thể):<div class='mt-6'>a) &nbsp; $12,21 - 26,37 + 37,79 - 13,63$</div><div class='mt-6'>b) &nbsp; $\\dfrac{6}{7} \\cdot \\dfrac{8}{13} + \\dfrac{6}{7} \\cdot \\dfrac{9}{13} - \\dfrac{3}{13} \\cdot \\dfrac{6}{7}$</div><div class='mt-6'>c) &nbsp; $\\left(\\dfrac{-7}{9} + \\dfrac{3}{17}\\right) + \\dfrac{-2}{9}$</div><div class='mt-6'>d) &nbsp; $25\\% - 1\\dfrac{1}{2} + 0,5 \\cdot \\dfrac{12}{5}$</div>", strategy: "<strong>Ý a:</strong> Nhóm các số có phần thập phân bù trừ cho nhau tròn chục.<br><strong>Ý b:</strong> Đặt nhân tử chung là&nbsp;$\\dfrac{6}{7}$.<br><strong>Ý c:</strong> Phá ngoặc, dùng tính chất giao hoán để ghép hai phân số có mẫu số 9.<br><strong>Ý d:</strong> Đổi toàn bộ về dạng phân số để thực hiện tính toán.", solution: "<li><strong>a)</strong> $(12,21 + 37,79) - (26,37 + 13,63)$</li><li>$= 50 - 40 = 10$.</li><li class='mt-3'><strong>b)</strong> $\\dfrac{6}{7} \\cdot \\left(\\dfrac{8}{13} + \\dfrac{9}{13} - \\dfrac{3}{13}\\right) = \\dfrac{6}{7} \\cdot \\dfrac{14}{13}$</li><li>$= \\dfrac{6 \\cdot 2}{13} = \\dfrac{12}{13}$.</li><li class='mt-3'><strong>c)</strong> $\\left(\\dfrac{-7}{9} + \\dfrac{-2}{9}\\right) + \\dfrac{3}{17} = \\dfrac{-9}{9} + \\dfrac{3}{17}$</li><li>$= -1 + \\dfrac{3}{17} = \\dfrac{-17}{17} + \\dfrac{3}{17} = \\dfrac{-14}{17}$.</li><li class='mt-3'><strong>d)</strong> $\\dfrac{1}{4} - \\dfrac{3}{2} + \\dfrac{1}{2} \\cdot \\dfrac{12}{5} = \\dfrac{1}{4} - \\dfrac{6}{4} + \\dfrac{6}{5}$</li><li>$= \\dfrac{-5}{4} + \\dfrac{6}{5} = \\dfrac{-25 + 24}{20} = \\dfrac{-1}{20}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 10; b) 12/13; c) -14/17; d) -1/20</li>" },
{ t_title: "Bài 2 (1,5 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $x + \\dfrac{2}{5} = \\dfrac{7}{5}$</div><div class='mt-6'>b) &nbsp; $\\dfrac{-5}{6} - x = \\dfrac{7}{12} + \\dfrac{-1}{3}$</div><div class='mt-6'>c) &nbsp; $\\dfrac{x + 1}{3} = \\dfrac{25}{-5}$</div>", strategy: "Áp dụng quy tắc chuyển vế và tìm thành phần chưa biết của phép tính. Ở ý c, rút gọn vế phải trước khi nhân chéo.", solution: "<li><strong>a)</strong> $x = \\dfrac{7}{5} - \\dfrac{2}{5}$ (Quy tắc chuyển vế)</li><li>$x = \\dfrac{5}{5} = 1$.</li><li class='mt-3'><strong>b)</strong> $\\dfrac{-5}{6} - x = \\dfrac{7}{12} + \\dfrac{-4}{12}$</li><li>$\\dfrac{-5}{6} - x = \\dfrac{3}{12} = \\dfrac{1}{4}$</li><li>$x = \\dfrac{-5}{6} - \\dfrac{1}{4} = \\dfrac{-10}{12} - \\dfrac{3}{12} = \\dfrac{-13}{12}$.</li><li class='mt-3'><strong>c)</strong> $\\dfrac{x + 1}{3} = -5$</li><li>$x + 1 = (-5) \\cdot 3 = -15$</li><li>$x = -15 - 1 = -16$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 1; b) -13/12; c) -16</li>" },
{ t_title: "Bài 3 (1,5 điểm)", t_content: "Trên mảnh vườn, Bác Minh thu hoạch được 60kg dưa chuột và 24kg cà chua.<div class='mt-6'>a) Bác Minh đem bán&nbsp;$\\dfrac{3}{4}$&nbsp;số dưa chuột đó, giá mỗi ki-lô-gam dưa chuột là 15 000 đồng. Hỏi bác Minh thu được bao nhiêu tiền?</div><div class='mt-6'>b) Số cà chua bác Minh thu hoạch được chỉ bằng&nbsp;$\\dfrac{2}{3}$&nbsp;số cà chua hiện có trong vườn. Nếu bác thu hoạch hết tất cả thì được bao nhiêu ki-lô-gam cà chua?</div>", strategy: "<strong>Ý a:</strong> Bài toán tìm giá trị phân số của một số: Tính số kg dưa chuột đem bán rồi nhân với đơn giá.<br><strong>Ý b:</strong> Bài toán tìm một số khi biết giá trị phân số của nó: Lấy 24 chia cho phân số tương ứng.", solution: "<li><strong>a)</strong> Số dưa chuột bác Minh đem bán là:</li><li>$60 \\cdot \\dfrac{3}{4} = 45\\text{ (kg)}$.</li><li>Số tiền bác Minh thu được là:</li><li>$45 \\cdot 15.000 = 675.000$&nbsp;(đồng).</li><li class='mt-3'><strong>b)</strong> Tổng số cà chua hiện có trong vườn là:</li><li>$24 : \\dfrac{2}{3} = 24 \\cdot \\dfrac{3}{2} = 36\\text{ (kg)}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 675.000 đồng; b) 36 kg</li>" },
{ t_title: "Bài 4 (1,0 điểm)", t_content: "Cho&nbsp;$O$&nbsp;là điểm thuộc đường thẳng&nbsp;$xy$. Trên tia&nbsp;$Ox$&nbsp;lần lượt lấy các điểm&nbsp;$A, B, C$&nbsp;sao cho&nbsp;$OA = 3\\text{ cm}, OC = 6\\text{ cm}, OB = 8\\text{ cm}$.<div class='mt-6'>a) Trong ba điểm&nbsp;$O, B, A$, điểm nào nằm giữa hai điểm còn lại? Tính độ dài&nbsp;$AC$.</div><div class='mt-6'>b) Trên tia&nbsp;$Oy$&nbsp;lấy điểm&nbsp;$D$&nbsp;sao cho&nbsp;$OD = 6\\text{ cm}$. So sánh độ dài đoạn thẳng&nbsp;$AD$&nbsp;và&nbsp;$OB$.</div>", strategy: "Vẽ sơ đồ nháp: Sắp xếp các điểm trên tia&nbsp;$Ox$&nbsp;theo khoảng cách tăng dần từ&nbsp;$O$&nbsp;ta được thứ tự&nbsp;$O-A-C-B$.<br>Hai tia&nbsp;$Ox$&nbsp;và&nbsp;$Oy$&nbsp;đối nhau nên&nbsp;$O$&nbsp;nằm giữa&nbsp;$D$&nbsp;và&nbsp;$A$.", solution: "<li><strong>a)</strong> Trên tia&nbsp;$Ox$, ta có&nbsp;$OA = 3\\text{ cm}, OB = 8\\text{ cm}$.</li><li>Vì&nbsp;$OA < OB$ ($3 < 8$) nên điểm&nbsp;$A$&nbsp;nằm giữa hai điểm&nbsp;$O$&nbsp;và&nbsp;$B$.</li><li>Tính&nbsp;$AC$: Trên tia&nbsp;$Ox$, ta có&nbsp;$OA = 3\\text{ cm}, OC = 6\\text{ cm}$.</li><li>Vì&nbsp;$OA < OC$ ($3 < 6$) nên điểm&nbsp;$A$&nbsp;nằm giữa hai điểm&nbsp;$O$&nbsp;và&nbsp;$C$.</li><li>Ta có:&nbsp;$OA + AC = OC \\Rightarrow 3 + AC = 6 \\Rightarrow AC = 3\\text{ (cm)}$.</li><li class='mt-3'><strong>b)</strong> Điểm&nbsp;$A \\in Ox$, điểm&nbsp;$D \\in Oy$. Mà&nbsp;$Ox$&nbsp;và&nbsp;$Oy$&nbsp;là hai tia đối nhau nên điểm&nbsp;$O$&nbsp;nằm giữa hai điểm&nbsp;$D$&nbsp;và&nbsp;$A$.</li><li>Ta có độ dài đoạn thẳng&nbsp;$AD = OD + OA = 6 + 3 = 9\\text{ (cm)}$.</li><li>Vì&nbsp;$AD = 9\\text{ cm}$&nbsp;và&nbsp;$OB = 8\\text{ cm}$&nbsp;nên suy ra&nbsp;$AD > OB$.</li><div class='flex justify-center my-8'><svg width='400' height='80' viewBox='0 0 400 80'><line x1='20' y1='40' x2='380' y2='40' stroke='black' stroke-width='1.5'/><circle cx='80' cy='40' r='2.5' fill='black'/><text x='75' y='60' font-size='14' font-weight='bold'>D</text><circle cx='180' cy='40' r='2.5' fill='black'/><text x='175' y='60' font-size='14' font-weight='bold'>O</text><circle cx='230' cy='40' r='2.5' fill='black'/><text x='225' y='60' font-size='14' font-weight='bold'>A</text><circle cx='280' cy='40' r='2.5' fill='black'/><text x='275' y='60' font-size='14' font-weight='bold'>C</text><circle cx='313' cy='40' r='2.5' fill='black'/><text x='308' y='60' font-size='14' font-weight='bold'>B</text><text x='25' y='35' font-size='14' font-style='italic'>y</text><text x='370' y='35' font-size='14' font-style='italic'>x</text></svg></div><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) A nằm giữa O và B; AC = 3 cm; b) AD > OB</li>" },
{ t_title: "Bài 5 (1,0 điểm)", t_content: "Tính tổng:&nbsp;$B = \\dfrac{1}{2 \\cdot 5} + \\dfrac{1}{5 \\cdot 8} + \\dfrac{1}{8 \\cdot 11} + \\dots + \\dfrac{1}{92 \\cdot 95} + \\dfrac{1}{95 \\cdot 98}$", strategy: "Khoảng cách giữa hai thừa số ở mẫu là 3. Nhân cả hai vế của B với 3 để tạo ra tử số bằng với khoảng cách mẫu, sau đó áp dụng công thức sai phân:&nbsp;$\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$.", solution: "<li>Ta có khoảng cách giữa các thừa số dưới mẫu là:&nbsp;$5 - 2 = 3; 8 - 5 = 3 \\dots$</li><li>Nhân cả hai vế của biểu thức với 3, ta được:</li><li>$3B = \\dfrac{3}{2 \\cdot 5} + \\dfrac{3}{5 \\cdot 8} + \\dfrac{3}{8 \\cdot 11} + \\dots + \\dfrac{3}{95 \\cdot 98}$</li><li>Áp dụng công thức sai phân tách từng phân số:</li><li>$3B = \\left(\\dfrac{1}{2} - \\dfrac{1}{5}\\right) + \\left(\\dfrac{1}{5} - \\dfrac{1}{8}\\right) + \\dots + \\left(\\dfrac{1}{95} - \\dfrac{1}{98}\\right)$</li><li>Sau khi triệt tiêu các cặp số đối nhau, ta còn lại:</li><li>$3B = \\dfrac{1}{2} - \\dfrac{1}{98} = \\dfrac{49}{98} - \\dfrac{1}{98} = \\dfrac{48}{98} = \\dfrac{24}{49}$</li><li>$\\Rightarrow B = \\dfrac{24}{49} : 3 = \\dfrac{8}{49}$.</li><li class='font-bold text-indigo-700 mt-1'>Vậy tổng $B = \\dfrac{8}{49}$.</li>" }
]
});
</script>

{ q_title: "Câu 1", q_content: "Phân số bằng phân số&nbsp;$\\dfrac{-3}{5}$&nbsp;là:", options: ["A. $\\dfrac{6}{10}$", "B. $\\dfrac{-6}{10}$", "C. $\\dfrac{6}{15}$", "D. $\\dfrac{-6}{-15}$"], correct_idx: 1, explain: "Nhân cả tử và mẫu của phân số&nbsp;$\\dfrac{-3}{5}$&nbsp;với 2, ta được:&nbsp;$\\dfrac{-3 \\cdot 2}{5 \\cdot 2} = \\dfrac{-6}{10}$. Chọn B." },
{ q_title: "Câu 2", q_content: "Với&nbsp;$a, b \\in \\mathbb{Z}; b, m \\neq 0$. Khẳng định SAI là:", options: ["A. $\\dfrac{a}{b} = \\dfrac{a \\cdot m}{b \\cdot m}$", "B. $\\dfrac{a}{b} = \\dfrac{-a}{-b}$", "C. $\\dfrac{a}{b} = \\dfrac{a + m}{b + m}$", "D. $\\dfrac{a}{b} = \\dfrac{a : m}{b : m}; m \\in \\text{ƯC}(a, b)$"], correct_idx: 2, explain: "Tính chất cơ bản của phân số chỉ áp dụng cho phép nhân và phép chia cả tử và mẫu cho cùng một số khác 0. Phép cộng tử và mẫu cho cùng một số không tạo ra phân số bằng nhau. Chọn C." },

{ q_title: "Câu 4", q_content: "Phân số nghịch đảo của phân số&nbsp;$\\dfrac{7}{-11}$&nbsp;là:", options: ["A. $\\dfrac{7}{11}$", "B. $\\dfrac{11}{7}$", "C. $\\dfrac{11}{-7}$", "D. $\\dfrac{-7}{11}$"], correct_idx: 2, explain: "Phân số nghịch đảo của&nbsp;$\\dfrac{a}{b}$&nbsp;là&nbsp;$\\dfrac{b}{a}$. Vậy nghịch đảo của&nbsp;$\\dfrac{7}{-11}$&nbsp;là&nbsp;$\\dfrac{-11}{7}$&nbsp;(hay&nbsp;$\\dfrac{11}{-7}$). Chọn C." },
{ q_title: "Câu 5", q_content: "Một tấm vải dài $12m$. Lần thứ nhất người ta cắt&nbsp;$\\dfrac{1}{6}$&nbsp;tấm vải. Lần thứ hai người ta cắt&nbsp;$\\dfrac{2}{5}$&nbsp;tấm vải CÒN LẠI. Lần thứ hai người ta cắt số mét vải là:", options: ["A. 4m", "B. 10m", "C. 6m", "D. 2m"], correct_idx: 0, explain: "Lần 1 cắt:&nbsp;$12 \\cdot \\dfrac{1}{6} = 2\\text{ (m)}$. Tấm vải còn lại:&nbsp;$12 - 2 = 10\\text{ (m)}$. Lần 2 cắt:&nbsp;$10 \\cdot \\dfrac{2}{5} = 4\\text{ (m)}$. Chọn A." },
{ q_title: "Câu 6", q_content: "Số đối của -100,57 là:", options: ["A. $\\dfrac{57}{100}$", "B. 100,57", "C. 57,100", "D. $\\dfrac{-5}{100}$"], correct_idx: 1, explain: "Số đối của một số âm là số dương tương ứng. Số đối của -100,57 là 100,57. Chọn B." },
{ q_title: "Câu 7", q_content: "Số tự nhiên&nbsp;$x$&nbsp;lớn nhất sao cho&nbsp;$x < 9,57$&nbsp;là:", options: ["A. 5", "B. 7", "C. 9", "D. 10"], correct_idx: 2, explain: "Các số tự nhiên nhỏ hơn 9,57 là&nbsp;$0, 1, 2, \\dots, 9$. Số lớn nhất trong tập hợp này là 9. Chọn C." },
{ q_title: "Câu 8", q_content: "Hằng ngày, mẹ đi từ nhà đến công ty hết 15 phút, còn bố đi hết&nbsp;$\\dfrac{1}{2}$&nbsp;giờ. Tỉ số thời gian đi từ nhà đến công ty của bố so với thời gian đi của mẹ là:", options: ["A. $\\dfrac{15}{2}$", "B. 2", "C. $\\dfrac{2}{15}$", "D. $\\dfrac{15}{30}$"], correct_idx: 1, explain: "Đổi&nbsp;$\\dfrac{1}{2}\\text{ giờ} = 30\\text{ phút}$. Tỉ số thời gian của bố so với mẹ là:&nbsp;$30 : 15 = 2$. Chọn B." },
{ q_title: "Câu 9", q_content: "Trong hình vẽ bên, đường thẳng $d$ đi qua hai điểm nào?<div class='flex justify-center my-6'><svg width='250' height='100' viewBox='0 0 250 100'><line x1='10' y1='30' x2='240' y2='80' stroke='black' stroke-width='1.5'/><text x='230' y='95' font-size='14' font-style='italic' font-weight='bold'>d</text><circle cx='80' cy='45' r='3' fill='black'/><text x='75' y='35' font-size='14' font-weight='bold' font-style='italic'>O</text><circle cx='180' cy='67' r='3' fill='black'/><text x='175' y='90' font-size='14' font-weight='bold' font-style='italic'>E</text><circle cx='130' cy='85' r='3' fill='black'/><text x='125' y='100' font-size='14' font-weight='bold' font-style='italic'>K</text><circle cx='210' cy='30' r='3' fill='black'/><text x='215' y='35' font-size='14' font-weight='bold' font-style='italic'>H</text></svg></div>", options: ["A. O và E", "B. K và H", "C. K và O", "D. E và H"], correct_idx: 0, explain: "Quan sát hình vẽ, ta thấy đường thẳng $d$ đi xuyên qua hai điểm O và E. Các điểm K và H nằm ngoài đường thẳng. Chọn A." },
{ q_title: "Câu 10", q_content: "Cho hình vẽ bên. Giao điểm của hai đường thẳng $b$ và $c$ là:<div class='flex justify-center my-6'><svg width='200' height='120' viewBox='0 0 200 120'><line x1='20' y1='80' x2='180' y2='80' stroke='black' stroke-width='1.5'/><text x='15' y='75' font-size='14' font-weight='bold'>b</text><line x1='100' y1='20' x2='180' y2='110' stroke='black' stroke-width='1.5'/><text x='95' y='15' font-size='14' font-weight='bold'>a</text><line x1='150' y1='20' x2='30' y2='110' stroke='black' stroke-width='1.5'/><text x='20' y='110' font-size='14' font-weight='bold'>c</text><circle cx='70' cy='80' r='3' fill='black'/><text x='75' y='95' font-size='14' font-weight='bold' font-style='italic'>O</text><circle cx='153' cy='80' r='3' fill='black'/><text x='155' y='95' font-size='14' font-weight='bold' font-style='italic'>M</text><circle cx='128' cy='52' r='3' fill='black'/><text x='135' y='55' font-size='14' font-weight='bold' font-style='italic'>N</text></svg></div>", options: ["A. M", "B. N", "C. O và M", "D. O"], correct_idx: 3, explain: "Giao điểm của đường thẳng $b$ (nằm ngang) và đường thẳng $c$ (chéo từ phải sang trái) là điểm O. Chọn D." },
{ q_title: "Câu 11", q_content: "Đọc tên của tia trong hình vẽ sau:<div class='flex justify-center my-6'><svg width='250' height='50' viewBox='0 0 250 50'><line x1='60' y1='25' x2='220' y2='25' stroke='black' stroke-width='1.5'/><circle cx='80' cy='25' r='3' fill='black'/><text x='75' y='45' font-size='14' font-weight='bold' font-style='italic'>A</text><circle cx='150' cy='25' r='3' fill='black'/><text x='145' y='45' font-size='14' font-weight='bold' font-style='italic'>B</text></svg></div>", options: ["A. Tia B", "B. Tia BA", "C. Tia AB", "D. Tia A"], correct_idx: 2, explain: "Tia có điểm giới hạn một đầu gọi là gốc. Trong hình, tia bị giới hạn tại điểm A và kéo dài mãi về phía B. Do đó ta đọc là Tia AB. Chọn C." },
{ q_title: "Câu 12", q_content: "Cho các đoạn thẳng $AB = 2,5\\text{cm}; CD = 3\\text{cm}; EF = 4\\text{cm}; MN = 5\\text{cm}$. Đáp án SAI là:", options: ["A. $AB < CD$", "B. $MN = 2AB$", "C. $CD = EF$", "D. $MN > AB$"], correct_idx: 2, explain: "Ta thấy $CD = 3\\text{cm}$ và $EF = 4\\text{cm}$. Rõ ràng $3 \\neq 4$ nên khẳng định $CD = EF$ là sai. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 13 (1,5 điểm)", t_content: "Tính (tính hợp lý nếu có thể):<div class='mt-6'>a) &nbsp; $\\dfrac{1}{3} \\cdot \\dfrac{2}{5} + \\dfrac{7}{15}$</div><div class='mt-6'>b) &nbsp; $\\dfrac{-1}{2} \\cdot 2\\dfrac{3}{5} + 1\\dfrac{2}{5} \\cdot \\dfrac{-1}{2} - 2024$</div>", strategy: "<strong>Ý a:</strong> Thực hiện phép nhân hai phân số trước, sau đó cộng với phân số còn lại bằng cách quy đồng mẫu.<br><strong>Ý b:</strong> Đổi hỗn số ra phân số. Áp dụng tính chất phân phối: đặt nhân tử chung $\\dfrac{-1}{2}$ ra ngoài để tính nhanh ngoặc bên trong.", solution: "<li><strong>a)</strong> Ta có:&nbsp;$\\dfrac{1}{3} \\cdot \\dfrac{2}{5} + \\dfrac{7}{15} = \\dfrac{1 \\cdot 2}{3 \\cdot 5} + \\dfrac{7}{15}$</li><li>$= \\dfrac{2}{15} + \\dfrac{7}{15} = \\dfrac{9}{15}$</li><li>Rút gọn phân số:&nbsp;$\\dfrac{9}{15} = \\dfrac{3}{5}$.</li><li class='mt-3'><strong>b)</strong> Ta có:&nbsp;$\\dfrac{-1}{2} \\cdot 2\\dfrac{3}{5} + 1\\dfrac{2}{5} \\cdot \\dfrac{-1}{2} - 2024$</li><li>Đổi hỗn số ra phân số:</li><li>$= \\dfrac{-1}{2} \\cdot \\dfrac{13}{5} + \\dfrac{7}{5} \\cdot \\dfrac{-1}{2} - 2024$</li><li>Áp dụng tính chất phân phối (đặt $\\dfrac{-1}{2}$ ra ngoài):</li><li>$= \\dfrac{-1}{2} \\cdot \\left(\\dfrac{13}{5} + \\dfrac{7}{5}\\right) - 2024$</li><li>$= \\dfrac{-1}{2} \\cdot \\dfrac{20}{5} - 2024$</li><li>$= \\dfrac{-1}{2} \\cdot 4 - 2024$</li><li>$= -2 - 2024 = -2026$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) 3/5; b) -2026</li>" },
{ t_title: "Câu 14 (1,5 điểm)", t_content: "Tìm x, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{x}{4} = \\dfrac{-1}{2}$</div><div class='mt-6'>b) &nbsp; $x \\cdot \\dfrac{13}{2} - \\dfrac{1}{2} = \\dfrac{3}{7}$</div>", strategy: "<strong>Ý a:</strong> Áp dụng tính chất hai phân số bằng nhau (nhân chéo chia ngang).<br><strong>Ý b:</strong> Sử dụng quy tắc chuyển vế: Chuyển $\\dfrac{-1}{2}$ sang vế phải và đổi dấu. Sau đó tìm thừa số chưa biết bằng phép chia.", solution: "<li><strong>a)</strong> $\\dfrac{x}{4} = \\dfrac{-1}{2}$</li><li>Áp dụng nhân chéo: $x \\cdot 2 = 4 \\cdot (-1)$</li><li>$x = \\dfrac{-4}{2} = -2$.</li><li class='mt-3'><strong>b)</strong> $x \\cdot \\dfrac{13}{2} - \\dfrac{1}{2} = \\dfrac{3}{7}$</li><li>$x \\cdot \\dfrac{13}{2} = \\dfrac{3}{7} + \\dfrac{1}{2}$ (Chuyển vế)</li><li>Quy đồng mẫu vế phải: $\\dfrac{3}{7} + \\dfrac{1}{2} = \\dfrac{6}{14} + \\dfrac{7}{14} = \\dfrac{13}{14}$</li><li>Ta có: $x \\cdot \\dfrac{13}{2} = \\dfrac{13}{14}$</li><li>$x = \\dfrac{13}{14} : \\dfrac{13}{2} = \\dfrac{13}{14} \\cdot \\dfrac{2}{13}$</li><li>$x = \\dfrac{2}{14} = \\dfrac{1}{7}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: a) x = -2; b) x = 1/7</li>" },
{ t_title: "Câu 15 (1,5 điểm)", t_content: "Bạn An đọc xong cuốn sách 300 trang trong 3 ngày. Ngày thứ nhất An đọc được $\\dfrac{1}{2}$ tổng số trang của cuốn sách. Biết $\\dfrac{3}{2}$ số trang sách An đọc được của ngày thứ hai bằng số trang sách An đọc được của ngày thứ nhất. Tính số trang sách An đọc được trong mỗi ngày.", strategy: "1. Ngày 1: Tính giá trị phân số của một số ($300 \\cdot \\dfrac{1}{2}$).<br>2. Ngày 2: Tìm một số khi biết giá trị phân số của nó (Lấy số trang Ngày 1 chia cho $\\dfrac{3}{2}$).<br>3. Ngày 3: Lấy tổng số trang trừ đi Ngày 1 và Ngày 2.", solution: "<li>Số trang sách An đọc được trong ngày thứ nhất là:</li><li>$300 \\cdot \\dfrac{1}{2} = 150\\text{ (trang)}$.</li><li class='mt-2'>Theo đề bài, $\\dfrac{3}{2}$ số trang ngày thứ hai bằng số trang ngày thứ nhất (150 trang).</li><li>Số trang sách An đọc được trong ngày thứ hai là:</li><li>$150 : \\dfrac{3}{2} = 150 \\cdot \\dfrac{2}{3} = 100\\text{ (trang)}$.</li><li class='mt-2'>Số trang sách An đọc được trong ngày thứ ba là:</li><li>$300 - (150 + 100) = 50\\text{ (trang)}$.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: Ngày 1: 150 trang; Ngày 2: 100 trang; Ngày 3: 50 trang</li>" },
{ t_title: "Câu 16 (2,0 điểm)", t_content: "Cho hình vẽ sau:<div class='flex justify-center my-6'><svg width='350' height='50' viewBox='0 0 350 50'><line x1='30' y1='25' x2='320' y2='25' stroke='black' stroke-width='2'/><text x='30' y='45' font-size='16' font-weight='bold'>n</text><text x='315' y='45' font-size='16' font-weight='bold'>m</text><circle cx='100' cy='25' r='3.5' fill='black'/><text x='95' y='45' font-size='16' font-weight='bold'>A</text><circle cx='160' cy='25' r='3.5' fill='black'/><text x='155' y='45' font-size='16' font-weight='bold'>O</text><circle cx='220' cy='25' r='3.5' fill='black'/><text x='215' y='45' font-size='16' font-weight='bold'>B</text></svg></div><div class='mt-4'>a) Trên hình vẽ có mấy đoạn thẳng? Đó là những đoạn thẳng nào? Kể tên các tia trùng nhau gốc A. Kể tên hai tia đối nhau gốc O.</div><div class='mt-2'>b) Biết $AB = 4,5\\text{ cm}$ và $OB = 2\\text{ cm}$. Tính độ dài đoạn thẳng $OA$ rồi so sánh $OA$ với $OB$.</div>", strategy: "<strong>Ý a:</strong> Đoạn thẳng được tạo bởi 2 điểm. Tia trùng chung gốc và cùng hướng. Tia đối chung gốc và ngược hướng.<br><strong>Ý b:</strong> Dựa vào hình vẽ, O nằm giữa A và B. Áp dụng công thức cộng đoạn thẳng: $AO + OB = AB$.", solution: "<li><strong>a)</strong> - Trên hình vẽ có 3 điểm A, O, B phân biệt. Cứ 2 điểm tạo thành 1 đoạn thẳng. Vậy có tất cả <strong>3 đoạn thẳng</strong>. Đó là các đoạn thẳng:&nbsp;$AO, OB, AB$.</li><li>- Kể tên các tia trùng nhau gốc A: <strong>Tia AO, Tia AB, Tia Am</strong>.</li><li>- Kể tên hai tia đối nhau gốc O: <strong>Tia OA (hoặc tia On) và Tia OB (hoặc tia Om)</strong>.</li><li class='mt-3'><strong>b)</strong> Quan sát hình vẽ, ba điểm A, O, B cùng nằm trên một đường thẳng và điểm O nằm giữa hai điểm A và B.</li><li>Do O nằm giữa A và B nên ta có hệ thức:</li><li>$OA + OB = AB$</li><li>Thay số: $OA + 2 = 4,5$</li><li>$\\Rightarrow OA = 4,5 - 2 = 2,5\\text{ (cm)}$.</li><li>So sánh: Vì $2,5 > 2$ nên <strong>OA > OB</strong>.</li><li class='font-bold text-indigo-700 mt-1'>Đáp số: b) OA = 2,5 cm; OA > OB</li>" },
{ t_title: "Câu 17 (0,5 điểm)", t_content: "Cho biểu thức $A = \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dfrac{1}{4^2} + \\dots + \\dfrac{1}{99^2} + \\dfrac{1}{100^2}$.<br>Chứng tỏ rằng $A < \\dfrac{19}{25}$", strategy: "Đây là bài toán chứng minh bất đẳng thức phân số nâng cao.<br>Sử dụng phương pháp làm trội: $\\dfrac{1}{n^2} < \\dfrac{1}{(n-1)\\cdot n}$.<br>Tách riêng $\\dfrac{1}{2^2}$ và làm trội phần còn lại để xuất hiện tổng triệt tiêu (sai phân). Sau đó so sánh kết quả với $\\dfrac{19}{25}$ (tức là $\\dfrac{76}{100}$).", solution: "<li>Ta có: $A = \\dfrac{1}{4} + \\left(\\dfrac{1}{3^2} + \\dfrac{1}{4^2} + \\dots + \\dfrac{1}{100^2}\\right)$</li><li>Áp dụng bất đẳng thức: $\\dfrac{1}{n^2} < \\dfrac{1}{(n-1) \\cdot n}$ (với $n \\ge 3$) cho trong ngoặc:</li><li>$\\dfrac{1}{3^2} < \\dfrac{1}{2 \\cdot 3} = \\dfrac{1}{2} - \\dfrac{1}{3}$</li><li>$\\dfrac{1}{4^2} < \\dfrac{1}{3 \\cdot 4} = \\dfrac{1}{3} - \\dfrac{1}{4}$</li><li>$\\dots$</li><li>$\\dfrac{1}{100^2} < \\dfrac{1}{99 \\cdot 100} = \\dfrac{1}{99} - \\dfrac{1}{100}$</li><li>Cộng vế theo vế phần trong ngoặc, ta được:</li><li>$A < \\dfrac{1}{4} + \\left(\\dfrac{1}{2} - \\dfrac{1}{3} + \\dfrac{1}{3} - \\dfrac{1}{4} + \\dots + \\dfrac{1}{99} - \\dfrac{1}{100}\\right)$</li><li>$A < \\dfrac{1}{4} + \\dfrac{1}{2} - \\dfrac{1}{100}$</li><li>Quy đồng mẫu số 100:</li><li>$A < \\dfrac{25}{100} + \\dfrac{50}{100} - \\dfrac{1}{100}$</li><li>$A < \\dfrac{74}{100} = \\dfrac{37}{50}$</li><li>Mặt khác, ta xét phân số đề bài cho:&nbsp;$\\dfrac{19}{25} = \\dfrac{19 \\cdot 2}{25 \\cdot 2} = \\dfrac{38}{50}$</li><li>Vì $\\dfrac{37}{50} < \\dfrac{38}{50}$ nên ta suy ra $A < \\dfrac{19}{25}$.</li><li class='font-bold text-indigo-700 mt-1'>Vậy $A < \\dfrac{19}{25}$ (Điều phải chứng minh).</li>" }
]
});
</script>

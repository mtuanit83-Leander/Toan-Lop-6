id: 29, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 29", icon: "🔥", color: "indigo", level: "Học sinh giỏi", time: "150 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Số dư của phép chia&nbsp;$4^{100}$&nbsp;cho&nbsp;$3$&nbsp;là:", options: ["A. $0$", "B. $1$", "C. $2$", "D. $4$"], correct_idx: 1, explain: "Vì 4 chia 3 dư 1, tức là&nbsp;$4 \\equiv 1 \\pmod 3$. Suy ra&nbsp;$4^{100} \\equiv 1^{100} \\equiv 1 \\pmod 3$. Vậy số dư là 1. Chọn B." },
{ q_title: "Câu 2", q_content: "Từ 'TOAN' (viết in hoa chữ không chân) có bao nhiêu chữ cái có trục đối xứng dọc?", options: ["A. $1$", "B. $2$", "C. $3$", "D. $4$"], correct_idx: 2, explain: "Chữ T, O, A đều có trục đối xứng dọc (chia đôi qua lại trái phải). Chữ N không có trục đối xứng dọc. Tổng cộng có 3 chữ cái. Chọn C." },
{ q_title: "Câu 3", q_content: "Biết tỉ số của hai số dương&nbsp;$x$&nbsp;và&nbsp;$y$&nbsp;là&nbsp;$\\dfrac{4}{7}$&nbsp;và hiệu&nbsp;$y - x = 15$. Giá trị của&nbsp;$x$&nbsp;và&nbsp;$y$&nbsp;lần lượt là:", options: ["A. $20$&nbsp;và&nbsp;$35$", "B. $35$&nbsp;và&nbsp;$20$", "C. $12$&nbsp;và&nbsp;$27$", "D. $40$&nbsp;và&nbsp;$70$"], correct_idx: 0, explain: "Tỉ số&nbsp;$\\dfrac{x}{y} = \\dfrac{4}{7}$&nbsp;nên y lớn hơn x là 3 phần. Giá trị 1 phần là&nbsp;$15 : 3 = 5$. Vậy&nbsp;$x = 4 \\cdot 5 = 20$&nbsp;và&nbsp;$y = 7 \\cdot 5 = 35$. Thứ tự lần lượt là 20 và 35. Chọn A." },
{ q_title: "Câu 4", q_content: "Từ một điểm&nbsp;$O$, vẽ&nbsp;$15$&nbsp;tia phân biệt. Số góc (không tính góc bẹt) được tạo thành là:", options: ["A. $15$", "B. $30$", "C. $105$", "D. $210$"], correct_idx: 2, explain: "Cứ 2 tia chung gốc tạo thành 1 góc. Số góc tạo thành từ 15 tia là&nbsp;$\\dfrac{15(15-1)}{2} = \\dfrac{15 \\cdot 14}{2} = 105$&nbsp;góc. Chọn C." },
{ q_title: "Câu 5", q_content: "Khoảng cách thực tế giữa hai thành phố là&nbsp;$250\\text{ km}$. Trên bản đồ, khoảng cách này là&nbsp;$5\\text{ cm}$. Tỉ lệ xích của bản đồ là:", options: ["A. $1 : 50.000$", "B. $1 : 500.000$", "C. $1 : 5.000.000$", "D. $1 : 50.000.000$"], correct_idx: 2, explain: "Đổi khoảng cách thực tế sang cùng đơn vị cm:&nbsp;$250\\text{ km} = 25.000.000\\text{ cm}$. Tỉ lệ xích là&nbsp;$5 : 25.000.000 = 1 : 5.000.000$. Chọn C." },
{ q_title: "Câu 6", q_content: "Một thương lái nhập một sản phẩm với giá&nbsp;$5$&nbsp;triệu đồng và bán ra với giá&nbsp;$6$&nbsp;triệu đồng. Thương lái đó đã lãi bao nhiêu phần trăm so với GIÁ VỐN?", options: ["A. $16,67\\%$", "B. $20\\%$", "C. $10\\%$", "D. $25\\%$"], correct_idx: 1, explain: "Số tiền lãi là:&nbsp;$6 - 5 = 1$&nbsp;triệu đồng. Tỉ lệ lãi so với giá vốn là:&nbsp;$\\dfrac{1}{5} \\cdot 100\\% = 20\\%$. Chọn B." },
{ q_title: "Câu 7", q_content: "Làm tròn số&nbsp;$\\pi \\approx 3,14159265\\dots$&nbsp;đến chữ số thập phân thứ tư, ta được kết quả là:", options: ["A. $3,1415$", "B. $3,1416$", "C. $3,1410$", "D. $3,1420$"], correct_idx: 1, explain: "Chữ số thập phân thứ năm là&nbsp;$9 \\ge 5$&nbsp;nên cộng thêm 1 vào chữ số hàng phần chục nghìn (số 5). Kết quả làm tròn là&nbsp;$3,1416$. Chọn B." },
{ q_title: "Câu 8", q_content: "Trong một bảng thống kê cân nặng của học sinh lớp 6 (đơn vị: kg), dữ liệu nào sau đây là KHÔNG hợp lý?", options: ["A. $40$", "B. $45$", "C. $38$", "D. $120$"], correct_idx: 3, explain: "Một học sinh lớp 6 bình thường không thể có cân nặng lên tới&nbsp;$120\\text{ kg}$. Đây là dữ liệu vô lý do lỗi nhập liệu. Chọn D." },
{ q_title: "Câu 9", q_content: "Hai góc phụ nhau có tỉ số số đo là&nbsp;$2:3$. Số đo góc lớn hơn là:", options: ["A. $36^{\\circ}$", "B. $54^{\\circ}$", "C. $72^{\\circ}$", "D. $108^{\\circ}$"], correct_idx: 1, explain: "Hai góc phụ nhau có tổng bằng&nbsp;$90^{\\circ}$. Tổng số phần bằng nhau là 5. Giá trị 1 phần là&nbsp;$90^{\\circ} : 5 = 18^{\\circ}$. Góc lớn chiếm 3 phần nên bằng&nbsp;$18^{\\circ} \\cdot 3 = 54^{\\circ}$. Chọn B." },
{ q_title: "Câu 10", q_content: "Kết quả của phép tính&nbsp;$0,125 \\cdot (-8)$&nbsp;là:", options: ["A. $1$", "B. $-1$", "C. $-1000$", "D. $1000$"], correct_idx: 1, explain: "Ta có phân số tối giản của&nbsp;$0,125 = \\dfrac{1}{8}$. Phép tính trở thành&nbsp;$\\dfrac{1}{8} \\cdot (-8) = -1$. Chọn B." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về phân tích cấu tạo số tự nhiên&nbsp;$X = \\overline{abc}$:<br>(I) Giá trị của&nbsp;$X$&nbsp;luôn được phân tích bằng công thức:&nbsp;$100a + 10b + c$.<br>(II) Nếu&nbsp;$a + b + c$&nbsp;chia hết cho&nbsp;$9$&nbsp;thì số&nbsp;$X$&nbsp;chia hết cho&nbsp;$9$.<br>(III) Hiệu&nbsp;$\\overline{abc} - \\overline{cba}$&nbsp;luôn luôn chia hết cho&nbsp;$11$&nbsp;(giả sử $a > c$).<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 3, explain: "(I) Đúng, đây là cấu tạo thập phân. (II) Đúng, đây là dấu hiệu chia hết cho 9. (III) Đúng, vì $\\overline{abc} - \\overline{cba} = (100a+10b+c) - (100c+10b+a) = 99a - 99c = 11 \\cdot 9(a-c)$ luôn chia hết cho 11. Cả 3 mệnh đề đều đúng. Chọn D." },
{ q_title: "Câu 12", q_content: "Xét 3 mệnh đề sau về Hình học suy luận (Tiên đề Euclid):<br>(I) Nếu hai đường thẳng song song bị cắt bởi một cát tuyến thì hai góc so le ngoài bằng nhau.<br>(II) Tổng số đo của hai góc đồng vị luôn bằng&nbsp;$180^{\\circ}$.<br>(III) Nếu một đường thẳng cắt hai đường thẳng song song và trong các góc tạo thành có đúng một góc vuông, thì tất cả 8 góc tạo thành đều là góc vuông.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Đúng, tương tự so le trong. (II) Sai, hai góc đồng vị thì BẰNG NHAU chứ không phải bù nhau. (III) Đúng, do các góc đối đỉnh, so le trong, đồng vị, kề bù sẽ chuyển góc $90^{\\circ}$ đi khắp 8 vị trí. Có 2 mệnh đề đúng. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (2,0 điểm)", t_content: "Tính hợp lý giá trị biểu thức dạng tích:<br>$B = \\left( 1 - \\dfrac{1}{4} \\right) \\cdot \\left( 1 - \\dfrac{1}{9} \\right) \\cdot \\left( 1 - \\dfrac{1}{16} \\right) \\cdot \\dots \\cdot \\left( 1 - \\dfrac{1}{10000} \\right)$", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Đây là một chuỗi phép nhân các ngoặc chứa bình phương ở mẫu số ($2^2, 3^2, 4^2...$).<br>- <b>How:</b> Đưa biểu thức tổng quát trong ngoặc về dạng quy đồng: $1 - \\dfrac{1}{n^2} = \\dfrac{n^2 - 1}{n^2}$.<br>- <b>Where:</b> Dùng hằng đẳng thức (hoặc tính chất) tách tử số thành tích của 2 số tự nhiên liên tiếp: $n^2 - 1 = (n-1)(n+1)$. Mẫu số tách thành $n \\cdot n$.<br>- Việc tách tử và mẫu thành 2 dãy nhân liên tiếp sẽ tạo ra cấu trúc đối xứng giúp triệt tiêu chéo cực kỳ nhanh.", solution: "<li>Ta biến đổi phần tử tổng quát trong dấu ngoặc:</li><li class='ml-4'>$1 - \\dfrac{1}{n^2} = \\dfrac{n^2 - 1}{n^2} = \\dfrac{(n-1)(n+1)}{n \\cdot n}$</li><li>Áp dụng vào biểu thức $B$, lưu ý rằng $10000 = 100^2$, ta viết lại thành các phân số cụ thể:</li><li class='ml-4'>$B = \\dfrac{1 \\cdot 3}{2 \\cdot 2} \\cdot \\dfrac{2 \\cdot 4}{3 \\cdot 3} \\cdot \\dfrac{3 \\cdot 5}{4 \\cdot 4} \\cdot \\dots \\cdot \\dfrac{99 \\cdot 101}{100 \\cdot 100}$</li><li>Sắp xếp lại tử số và mẫu số thành hai nhóm riêng biệt để dễ dàng nhìn ra quy luật triệt tiêu:</li><li class='ml-4'>$B = \\dfrac{(1 \\cdot 2 \\cdot 3 \\cdot \\dots \\cdot 99) \\cdot (3 \\cdot 4 \\cdot 5 \\cdot \\dots \\cdot 101)}{(2 \\cdot 3 \\cdot 4 \\cdot \\dots \\cdot 100) \\cdot (2 \\cdot 3 \\cdot 4 \\cdot \\dots \\cdot 100)}$</li><li>Tiến hành triệt tiêu các thừa số chung ở cả tử và mẫu:</li><li class='ml-8'>- Nhóm bên trái triệt tiêu từ $2$ đến $99$, trên tử còn $1$, dưới mẫu còn $100$.</li><li class='ml-8'>- Nhóm bên phải triệt tiêu từ $3$ đến $100$, trên tử còn $101$, dưới mẫu còn $2$.</li><li>Ta còn lại:</li><li class='ml-4'>$B = \\dfrac{1}{100} \\cdot \\dfrac{101}{2}$</li><li class='ml-4'>$B = \\dfrac{101}{200}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $B = \\dfrac{101}{200}$.</li>" },
{ t_title: "Câu 2 (2,5 điểm)", t_content: "Giải các bài toán Đại số bản lề lớp 7:<div class='mt-6'>a) Tìm số nguyên&nbsp;$x$&nbsp;thỏa mãn phương trình:&nbsp;$(2x + 1)^3 = -125$.</div><div class='mt-6'>b) Tìm các số nguyên&nbsp;$x, y$&nbsp;thỏa mãn phương trình:&nbsp;$xy + 4x - y = 11$.</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Phương trình chứa lũy thừa bậc lẻ.<br>- <b>How:</b> Đưa số $-125$ về dạng lập phương của một số nguyên là $(-5)^3$. Vì mũ lẻ nên khi bỏ mũ ta chỉ có duy nhất $1$ trường hợp (không cần xét âm/dương).<br><b>Ý b:</b><br>- <b>What:</b> Phương trình nghiệm nguyên (Diophante) dạng bậc nhất hai ẩn.<br>- <b>How:</b> Nhóm 2 hạng tử đầu tiên $xy + 4x$ để rút $x$ ra ngoài $\\Rightarrow x(y+4)$.<br>- <b>Where:</b> Hạng tử thứ 3 là $-y$. Ta ép nó tạo ra $(y+4)$ bằng cách viết $-(y+4) = -y - 4$. Vậy ta đã tự mượn số $-4$ ở vế trái, nên vế phải cũng phải trừ đi $4$ để cân bằng.", solution: "<li><b>a) Tìm&nbsp;$x$&nbsp;trong phương trình lũy thừa:</b></li><li class='ml-4'>Ta có phương trình: $(2x + 1)^3 = -125$</li><li class='ml-4'>Đưa vế phải về dạng lũy thừa bậc $3$:</li><li class='ml-8'>$(2x + 1)^3 = (-5)^3$</li><li class='ml-4'>Vì số mũ là số lẻ nên ta có phương trình bậc nhất:</li><li class='ml-8'>$2x + 1 = -5$</li><li class='ml-8'>$2x = -5 - 1 = -6$</li><li class='ml-8'>$x = -6 : 2 = -3$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = -3$.</li><li><b>b) Tìm các cặp số nguyên&nbsp;$x, y$:</b></li><li class='ml-4'>Ta biến đổi phương trình $xy + 4x - y = 11$:</li><li class='ml-8'>$x(y + 4) - y = 11$</li><li class='ml-4'>Trừ $4$ vào cả hai vế để ép tạo nhân tử:</li><li class='ml-8'>$x(y + 4) - y - 4 = 11 - 4$</li><li class='ml-8'>$x(y + 4) - (y + 4) = 7$</li><li class='ml-4'>Rút nhân tử chung:</li><li class='ml-8'>$(x - 1)(y + 4) = 7$</li><li class='ml-4'>Vì $x, y \\in \\mathbb{Z}$ nên $(x - 1)$ và $(y + 4)$ phải là các số nguyên và là Ước của $7$. Tập hợp các ước của $7$ là: Ư(7) = $\\{-7; -1; 1; 7\\}$. Ta lập bảng:</li><li class='ml-8'>+ TH1: $y + 4 = 1 \\Rightarrow y = -3$. Khi đó $x - 1 = 7 \\Rightarrow x = 8$.</li><li class='ml-8'>+ TH2: $y + 4 = 7 \\Rightarrow y = 3$. Khi đó $x - 1 = 1 \\Rightarrow x = 2$.</li><li class='ml-8'>+ TH3: $y + 4 = -1 \\Rightarrow y = -5$. Khi đó $x - 1 = -7 \\Rightarrow x = -6$.</li><li class='ml-8'>+ TH4: $y + 4 = -7 \\Rightarrow y = -11$. Khi đó $x - 1 = -1 \\Rightarrow x = 0$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Các cặp $(x; y)$ thỏa mãn là $(8; -3), (2; 3), (-6; -5), (0; -11)$.</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "(Bài toán Kinh tế - Lãi lỗ kép) Một chiếc tủ lạnh có giá niêm yết ban đầu là&nbsp;$20.000.000$&nbsp;đồng. Trong một chương trình \"Ngày hội Mua sắm\", cửa hàng đã giảm giá&nbsp;$20\\%$&nbsp;so với giá niêm yết. Vài giờ sau, để xả kho, cửa hàng tiếp tục giảm thêm&nbsp;$10\\%$&nbsp;trên mức giá đã giảm ở đợt một.<div class='mt-6'>a) Hỏi khách hàng mua tủ lạnh trong đợt xả kho cuối cùng phải trả bao nhiêu tiền?</div><div class='mt-6'>b) Mặc dù đã giảm giá hai lần liên tiếp, kế toán báo cáo cửa hàng vẫn lãi được&nbsp;$20\\%$&nbsp;so với giá vốn (giá gốc nhập vào). Tính giá gốc của chiếc tủ lạnh.</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Bài toán tính giá thanh toán cuối cùng sau 2 lần giảm liên tiếp.<br>- <b>How:</b> Tuyệt đối không lấy $20\\% + 10\\% = 30\\%$. Đợt xả kho giảm $10\\%$ **trên mức giá đã giảm** ở đợt đầu.<br>- Phép tính nhanh: Giá thanh toán = Giá niêm yết $\\times \\ 80\\% \\ \\times \\ 90\\%$.<br><b>Ý b:</b><br>- <b>What:</b> Tìm giá gốc (vốn) khi biết tỉ lệ phần trăm lãi.<br>- <b>How:</b> Lãi $20\\%$ so với vốn, nghĩa là Số tiền thu về = $120\\%$ Giá vốn. Lấy số tiền thu về (kết quả câu a) chia cho $120\\%$ sẽ ra giá vốn.", solution: "<li><b>a) Tính số tiền khách hàng phải trả:</b></li><li class='ml-4'>Mức giá của chiếc tủ lạnh sau khi được giảm $20\\%$ ở đợt đầu là:</li><li class='ml-8'>$20.000.000 \\cdot (100\\% - 20\\%) = 20.000.000 \\cdot 80\\% = 16.000.000$&nbsp;(đồng)</li><li class='ml-4'>Số tiền thực tế khách hàng phải trả sau khi được giảm thêm $10\\%$ ở đợt xả kho (tính trên mức giá đã giảm) là:</li><li class='ml-8'>$16.000.000 \\cdot (100\\% - 10\\%) = 16.000.000 \\cdot 90\\% = 14.400.000$&nbsp;(đồng)</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Khách hàng phải trả $14.400.000$ đồng.</li><li><b>b) Tính giá gốc nhập vào:</b></li><li class='ml-4'>Cửa hàng bán tủ lạnh và thu về tổng số tiền là $14.400.000$ đồng.</li><li class='ml-4'>Vì cửa hàng vẫn lãi $20\\%$ so với giá gốc nhập vào, nên số tiền thu về tương ứng với tỉ lệ phần trăm so với giá gốc là:</li><li class='ml-8'>$100\\% + 20\\% = 120\\%$&nbsp;(giá gốc)</li><li class='ml-4'>Giá gốc nhập vào của chiếc tủ lạnh là:</li><li class='ml-8'>$14.400.000 : 120\\% = 14.400.000 : 1,2 = 12.000.000$&nbsp;(đồng)</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Giá gốc của chiếc tủ lạnh là $12.000.000$ đồng.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "(Hình học - Tổ hợp Góc) Cho góc bẹt&nbsp;$\\angle xOy = 180^{\\circ}$. Trên cùng một nửa mặt phẳng bờ chứa đường thẳng&nbsp;$xy$, vẽ tia&nbsp;$Oz$&nbsp;sao cho góc&nbsp;$\\angle xOz = 50^{\\circ}$.<div class='mt-6'>a) Tính số đo góc&nbsp;$\\angle yOz$.</div><div class='mt-6'>b) Vẽ tia&nbsp;$Ot$&nbsp;là tia phân giác của góc&nbsp;$\\angle yOz$. Tính số đo góc&nbsp;$\\angle yOt$&nbsp;và&nbsp;$\\angle zOt$.</div><div class='mt-6'>c) Tính số đo góc&nbsp;$\\angle xOt$. Tia&nbsp;$Oz$&nbsp;có phải là tia phân giác của góc&nbsp;$\\angle xOt$&nbsp;không? Vì sao?</div><div class='flex justify-center my-8'><svg width='320' height='160' viewBox='0 0 320 160'><line x1='10' y1='140' x2='310' y2='140' stroke='black' stroke-width='1.5'/><circle cx='160' cy='140' r='3' fill='black'/><text x='155' y='160' font-size='14' font-weight='bold'>O</text><text x='300' y='130' font-size='14' font-style='italic'>x</text><text x='15' y='130' font-size='14' font-style='italic'>y</text><line x1='160' y1='140' x2='224' y2='63' stroke='black' stroke-width='1.5'/><text x='230' y='55' font-size='14' font-style='italic'>z</text><line x1='160' y1='140' x2='117' y2='49' stroke='red' stroke-width='1.5' stroke-dasharray='4'/><text x='110' y='40' font-size='14' font-style='italic' fill='red'>t</text><path d='M 200 140 A 40 40 0 0 0 185 110' fill='none' stroke='blue' stroke-width='1'/><text x='205' y='125' font-size='10' fill='blue'>50°</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Góc $\\angle xOy$ bẹt thì tia $Oz$ nằm trên nửa mặt phẳng tạo ra 2 góc gì? (Góc kề bù). Dùng phép trừ tính $\\angle yOz$.<br><b>Ý b:</b><br>- <b>How:</b> Tia $Ot$ phân giác $\\angle yOz$ nên nó chia góc này ra 2 nửa bằng nhau. Thực hiện phép chia $2$.<br><b>Ý c:</b><br>- <b>How:</b> Tính $\\angle xOt$ bằng cách dùng công thức cộng góc liên tiếp ($\\angle xOz + \\angle zOt$).<br>- <b>Why:</b> Để tia $Oz$ là phân giác, nó phải nằm giữa và chia đôi góc. Hãy so sánh số đo hai góc thành phần $\\angle xOz$ và $\\angle zOt$ xem chúng có bằng nhau không.", solution: "<li><b>a) Tính số đo góc&nbsp;$\\angle yOz$:</b></li><li class='ml-4'>Vì $\\angle xOy$ là góc bẹt ($180^{\\circ}$) nên tia $Ox$ và $Oy$ là hai tia đối nhau.</li><li class='ml-4'>Tia $Oz$ tạo với tia $Ox$ và $Oy$ hai góc kề bù là $\\angle xOz$ và $\\angle yOz$.</li><li class='ml-4'>Ta có phương trình:</li><li class='ml-8'>$\\angle xOz + \\angle yOz = 180^{\\circ}$</li><li class='ml-8'>$50^{\\circ} + \\angle yOz = 180^{\\circ}$</li><li class='ml-8'>$\\angle yOz = 180^{\\circ} - 50^{\\circ} = 130^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $\\angle yOz = 130^{\\circ}$.</li><li><b>b) Tính số đo góc&nbsp;$\\angle yOt$&nbsp;và&nbsp;$\\angle zOt$:</b></li><li class='ml-4'>Vì tia $Ot$ là tia phân giác của góc $\\angle yOz$ nên nó chia góc này thành hai phần bằng nhau:</li><li class='ml-8'>$\\angle yOt = \\angle zOt = \\dfrac{\\angle yOz}{2} = \\dfrac{130^{\\circ}}{2} = 65^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $\\angle yOt = 65^{\\circ}$ và $\\angle zOt = 65^{\\circ}$.</li><li><b>c) Tia&nbsp;$Oz$&nbsp;có phải là tia phân giác không?</b></li><li class='ml-4'>Vì tia $Oz$ nằm giữa hai tia $Ox$ và $Oy$, và tia $Ot$ nằm giữa hai tia $Oz$ và $Oy$ (do tính chất phân giác). Từ đó suy ra thứ tự các tia trải dài trên nửa mặt phẳng là $Ox \\rightarrow Oz \\rightarrow Ot \\rightarrow Oy$.</li><li class='ml-4'>Do đó, <b>tia&nbsp;$Oz$&nbsp;nằm giữa hai tia&nbsp;$Ox$&nbsp;và&nbsp;$Ot$</b>.</li><li class='ml-4'>Ta có công thức cộng góc:</li><li class='ml-8'>$\\angle xOt = \\angle xOz + \\angle zOt$</li><li class='ml-8'>$\\angle xOt = 50^{\\circ} + 65^{\\circ} = 115^{\\circ}$.</li><li class='ml-4'>Ta xét hai điều kiện phân giác của tia $Oz$ đối với góc $\\angle xOt$:</li><li class='ml-8'>- Điều kiện 1: Tia $Oz$ nằm giữa hai tia $Ox$ và $Ot$ (Thỏa mãn).</li><li class='ml-8'>- Điều kiện 2: Xét số đo $\\angle xOz = 50^{\\circ}$ và $\\angle zOt = 65^{\\circ}$. Vì $\\angle xOz \\neq \\angle zOt$ ($50^{\\circ} \\neq 65^{\\circ}$) nên tia $Oz$ không chia góc thành hai nửa bằng nhau.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận c: $\\angle xOt = 115^{\\circ}$. Tia $Oz$ <b>không phải</b> là tia phân giác của góc $\\angle xOt$.</li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Nguyên lý Dirichlet) Chứng minh rằng: Trong&nbsp;$4$&nbsp;số nguyên bất kỳ, luôn tồn tại&nbsp;$2$&nbsp;số có hiệu chia hết cho&nbsp;$3$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh tồn tại 2 số có hiệu chia hết cho 3.<br>- <b>Why:</b> Dấu hiệu chia hết cho 3 về mặt hiệu số là gì? (Cùng số dư khi đem chia cho 3).<br>- <b>How:</b> Khi đem một số chia cho 3, số dư có thể trải dài từ 0 đến 2. Có tổng cộng 3 loại số dư đóng vai trò là \"lồng\". Lấy 4 số nguyên đóng vai trò là \"thỏ\" nhét vào 3 lồng.", solution: "<li>Một số nguyên bất kỳ khi đem chia cho $3$ sẽ nhận được $1$ trong $3$ loại số dư là: $0, 1, 2$.</li><li class='ml-4'>Ta phân chia $3$ loại số dư này thành <b>$3$ nhóm</b> (đóng vai trò là 3 chiếc lồng).</li><li class='ml-4'>Theo đề bài, ta có <b>$4$ số nguyên bất kỳ</b> (đóng vai trò là $4$ con thỏ).</li><li class='ml-4'>Theo Nguyên lý Dirichlet, khi phân phối $4$ số vào $3$ nhóm số dư, chắc chắn tồn tại ít nhất $1$ nhóm chứa từ $2$ số trở lên ($4 = 3 \\cdot 1 + 1$).</li><li class='ml-4'>Gọi hai số nguyên cùng rơi vào một nhóm là $a$ và $b$.</li><li class='ml-4'>Lúc này, $a$ và $b$ có số dư giống hệt nhau khi chia cho $3$. Giả sử số dư đó là $r$, ta viết được:</li><li class='ml-8'>$a = 3 \\cdot q_1 + r$</li><li class='ml-8'>$b = 3 \\cdot q_2 + r$</li><li class='ml-4'>Lập phép trừ để xét hiệu hai số:</li><li class='ml-8'>$a - b = (3 \\cdot q_1 + r) - (3 \\cdot q_2 + r) = 3(q_1 - q_2)$</li><li class='ml-4'>Vì $3(q_1 - q_2)$ chứa thừa số $3$ nên hiệu $(a - b)$ chia hết cho $3$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Luôn tồn tại 2 số có hiệu chia hết cho 3 (Điều phải chứng minh).</li>" },
{ t_title: "Câu 6 (2,0 điểm)", t_content: "(Chứng minh phân số tối giản) Chứng minh rằng với mọi số tự nhiên&nbsp;$n$, phân số&nbsp;$P = \\dfrac{21n + 4}{14n + 3}$&nbsp;luôn là phân số tối giản.", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Chứng minh Ước chung lớn nhất ($d$) của tử và mẫu bằng $1$.<br>- <b>How:</b> Gọi $d = \\text{ƯCLN}(21n + 4, 14n + 3)$. Ta cần khử đi biến $n$.<br>- <b>Where:</b> Tử có hệ số $21$, Mẫu có hệ số $14$. Ta tìm BCNN(21, 14) = $42$. Vậy nhân biểu thức tử với $2$ và biểu thức mẫu với $3$ để đều tạo ra hệ số $42n$. Sau đó lấy phương trình trừ cho nhau.", solution: "<li>Gọi $d = \\text{ƯCLN}(21n + 4, 14n + 3)$ với $d \\in \\mathbb{N}^*$.</li><li class='ml-4'>Khi đó, tử số và mẫu số đều phải chia hết cho $d$:</li><li class='ml-8'>$(21n + 4) \\vdots d \\Rightarrow 2 \\cdot (21n + 4) \\vdots d \\Rightarrow (42n + 8) \\vdots d$</li><li class='ml-8'>$(14n + 3) \\vdots d \\Rightarrow 3 \\cdot (14n + 3) \\vdots d \\Rightarrow (42n + 9) \\vdots d$</li><li class='ml-4'>Lấy biểu thức thứ hai trừ đi biểu thức thứ nhất, hiệu của chúng cũng phải chia hết cho $d$:</li><li class='ml-8'>$[(42n + 9) - (42n + 8)] \\vdots d$</li><li class='ml-8'>$\\Rightarrow 1 \\vdots d$</li><li class='ml-4'>Vì $d$ là số nguyên dương và $1$ chia hết cho $d$ nên bắt buộc $d = 1$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Vì ƯCLN của tử và mẫu luôn bằng $1$, nên phân số $P = \\dfrac{21n + 4}{14n + 3}$ luôn là phân số tối giản với mọi số tự nhiên $n$.</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Từ tỉ lệ thức&nbsp;$\\dfrac{a}{b} = \\dfrac{c}{d}$, ta có thể suy ra dãy tỉ số bằng nhau nào sau đây?", options: ["A. $\\dfrac{a+c}{b-d}$", "B. $\\dfrac{a-c}{b+d}$", "C. $\\dfrac{a-c}{b-d}$", "D. $\\dfrac{a \\cdot c}{b \\cdot d}$"], correct_idx: 2, explain: "Áp dụng tính chất dãy tỉ số bằng nhau, ta có&nbsp;$\\dfrac{a}{b} = \\dfrac{c}{d} = \\dfrac{a-c}{b-d}$. Các phép toán cộng trừ tử và mẫu phải tương ứng nhau. Không áp dụng cho phép nhân. Chọn C." },
{ q_title: "Câu 2", q_content: "Lớp trưởng thu thập dữ liệu về 'Tháng sinh của các bạn học sinh trong tổ'. Dữ liệu nào sau đây là KHÔNG hợp lý?", options: ["A. $2$", "B. $12$", "C. $14$", "D. $9$"], correct_idx: 2, explain: "Một năm dương lịch chỉ có tối đa 12 tháng. Do đó dữ liệu tháng sinh là 14 là hoàn toàn vô lý do ghi chép sai. Chọn C." },
{ q_title: "Câu 3", q_content: "Gieo một đồng xu cân đối&nbsp;$40$&nbsp;lần. Nếu xác suất thực nghiệm của sự kiện 'Xuất hiện mặt Ngửa' là&nbsp;$35\\%$, thì số lần xuất hiện mặt Sấp là:", options: ["A. $14$&nbsp;lần", "B. $26$&nbsp;lần", "C. $35$&nbsp;lần", "D. $65$&nbsp;lần"], correct_idx: 1, explain: "Xác suất thực nghiệm xuất hiện mặt Sấp là&nbsp;$100\\% - 35\\% = 65\\%$. Số lần xuất hiện mặt Sấp là:&nbsp;$40 \\cdot 65\\% = 26$&nbsp;(lần). Chọn B." },
{ q_title: "Câu 4", q_content: "Trên bản đồ có tỉ lệ xích&nbsp;$1 : 1.000.000$, khoảng cách giữa hai thành phố là&nbsp;$5\\text{ cm}$. Khoảng cách thực tế giữa hai thành phố đó là:", options: ["A. $5\\text{ km}$", "B. $50\\text{ km}$", "C. $500\\text{ km}$", "D. $5000\\text{ km}$"], correct_idx: 1, explain: "Khoảng cách thực tế là:&nbsp;$5 \\cdot 1.000.000 = 5.000.000\\text{ cm}$. Đổi ra ki-lô-mét:&nbsp;$5.000.000 : 100.000 = 50\\text{ km}$. Chọn B." },
{ q_title: "Câu 5", q_content: "Chữ cái in hoa nào sau đây có ĐÚNG 2 trục đối xứng?", options: ["A. Chữ A", "B. Chữ N", "C. Chữ X", "D. Chữ E"], correct_idx: 2, explain: "Chữ A có 1 trục (dọc). Chữ N không có trục đối xứng. Chữ E có 1 trục (ngang). Chữ X có 2 trục đối xứng (dọc và ngang). Chọn C." },
{ q_title: "Câu 6", q_content: "Khi khai triển biểu thức đa thức&nbsp;$x(x - 3)$, ta được kết quả là:", options: ["A. $x^2 - 3$", "B. $x^2 - 3x$", "C. $2x - 3$", "D. $x^2 + 3x$"], correct_idx: 1, explain: "Áp dụng quy tắc nhân phân phối đơn thức với đa thức:&nbsp;$x \\cdot (x - 3) = x \\cdot x - x \\cdot 3 = x^2 - 3x$. Chọn B." },
{ q_title: "Câu 7", q_content: "Hai đường thẳng song song&nbsp;$a$&nbsp;và&nbsp;$b$&nbsp;bị cắt bởi cát tuyến&nbsp;$c$. Nếu một góc so le trong bằng&nbsp;$65^{\\circ}$, thì góc đồng vị tương ứng của nó bằng:", options: ["A. $115^{\\circ}$", "B. $65^{\\circ}$", "C. $90^{\\circ}$", "D. $180^{\\circ}$"], correct_idx: 1, explain: "Khi hai đường thẳng song song bị cắt bởi 1 cát tuyến, các góc so le trong và các góc đồng vị tương ứng sinh ra đều bằng nhau. Do đó góc đồng vị cũng bằng&nbsp;$65^{\\circ}$. Chọn B." },
{ q_title: "Câu 8", q_content: "Trong số học (Modulo), nếu&nbsp;$a$&nbsp;chia&nbsp;$7$&nbsp;dư&nbsp;$2$, và&nbsp;$b$&nbsp;chia&nbsp;$7$&nbsp;dư&nbsp;$3$, thì tổng&nbsp;$(a+b)$&nbsp;chia&nbsp;$7$&nbsp;sẽ dư bao nhiêu?", options: ["A. Dư $1$", "B. Dư $6$", "C. Dư $5$", "D. Không xác định"], correct_idx: 2, explain: "Modulo bảo toàn phép cộng: Nếu&nbsp;$a \\equiv 2 \\pmod 7$&nbsp;và&nbsp;$b \\equiv 3 \\pmod 7$&nbsp;thì&nbsp;$a+b \\equiv 2+3 \\equiv 5 \\pmod 7$. Vậy tổng chia 7 dư 5. Chọn C." },
{ q_title: "Câu 9", q_content: "Kết quả của phép tính&nbsp;$\\dfrac{-4}{9} + \\dfrac{5}{12}$&nbsp;là:", options: ["A. $\\dfrac{1}{36}$", "B. $\\dfrac{-1}{36}$", "C. $\\dfrac{-1}{3}$", "D. $\\dfrac{-31}{36}$"], correct_idx: 1, explain: "Mẫu số chung nhỏ nhất của 9 và 12 là 36. Ta quy đồng:&nbsp;$\\dfrac{-16}{36} + \\dfrac{15}{36} = \\dfrac{-16 + 15}{36} = \\dfrac{-1}{36}$. Chọn B." },
{ q_title: "Câu 10", q_content: "Hai góc bù nhau có tỉ số số đo là&nbsp;$2:7$. Số đo góc nhỏ hơn là:", options: ["A. $20^{\\circ}$", "B. $40^{\\circ}$", "C. $140^{\\circ}$", "D. $70^{\\circ}$"], correct_idx: 1, explain: "Hai góc bù nhau có tổng bằng&nbsp;$180^{\\circ}$. Tổng số phần bằng nhau là&nbsp;$2+7=9$&nbsp;phần. Một phần có giá trị là&nbsp;$180 : 9 = 20^{\\circ}$. Góc nhỏ chiếm 2 phần nên có số đo là&nbsp;$20 \\cdot 2 = 40^{\\circ}$. Chọn B." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về Hình học suy luận và Tiên đề Euclid:<br>(I) Hai góc so le trong thì luôn luôn bằng nhau trong mọi trường hợp.<br>(II) Nếu đường thẳng&nbsp;$c$&nbsp;cắt hai đường thẳng song song&nbsp;$a$&nbsp;và&nbsp;$b$, thì hai góc trong cùng phía sẽ bù nhau (tổng bằng $180^{\\circ}$).<br>(III) Hình vuông là tứ giác có đúng 4 trục đối xứng và 1 tâm đối xứng.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Sai, hai góc so le trong chỉ bằng nhau NẾU hai đường thẳng bị cắt là hai đường thẳng SONG SONG. (II) Đúng, đây là tính chất cơ bản. (III) Đúng, 4 trục đối xứng của hình vuông là 2 đường chéo và 2 đường trung bình. Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Xét 3 mệnh đề sau về Đồng dư thức và Tỉ lệ:<br>(I) Nếu&nbsp;$\\dfrac{x}{2} = \\dfrac{y}{3}$&nbsp;thì ta luôn có&nbsp;$\\dfrac{x}{2} = \\dfrac{y}{3} = \\dfrac{x \\cdot y}{2 \\cdot 3}$.<br>(II) Phép nhân phân phối của dấu âm được thể hiện là:&nbsp;$-(a - b) = -a + b$.<br>(III) Số&nbsp;$10$&nbsp;khi chia cho&nbsp;$3$&nbsp;dư&nbsp;$1$, nên số siêu lớn&nbsp;$10^{50}$&nbsp;khi chia cho&nbsp;$3$&nbsp;cũng sẽ dư&nbsp;$1$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Sai, tính chất dãy tỉ số bằng nhau KHÔNG áp dụng cho phép nhân, chỉ áp dụng cho phép cộng/trừ tuyến tính. (II) Đúng, phá ngoặc trước có dấu trừ thì đổi dấu bên trong. (III) Đúng, theo tính chất modulo lũy thừa: $10 \\equiv 1 \\pmod 3 \\Rightarrow 10^{50} \\equiv 1^{50} = 1 \\pmod 3$. Có 2 mệnh đề đúng. Chọn C." }

{ t_title: "Câu 1 (2,0 điểm)", t_content: "Tính hợp lý giá trị biểu thức sau:<br>$A = \\left( 1 - \\dfrac{1}{2} \\right) \\cdot \\left( 1 - \\dfrac{1}{3} \\right) \\cdot \\left( 1 - \\dfrac{1}{4} \\right) \\cdot \\dots \\cdot \\left( 1 - \\dfrac{1}{2025} \\right)$", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Một chuỗi phép nhân của rất nhiều dấu ngoặc đơn.<br>- <b>How:</b> Hãy thực hiện phép tính trừ bên trong từng dấu ngoặc trước. Ta quy đồng và tính $1 - \\dfrac{1}{n} = \\dfrac{n-1}{n}$.<br>- <b>Why:</b> Viết lại chuỗi các phân số vừa tìm được, ta sẽ thấy tử số của phân số đứng sau luôn giống hệt với mẫu số của phân số đứng trước. Dùng quy tắc gạch bỏ (triệt tiêu chéo) liên hoàn để giải quyết bài toán cực nhanh.", solution: "<li>Ta thực hiện phép trừ bên trong từng dấu ngoặc đơn:</li><li class='ml-4'>$A = \\left( \\dfrac{2}{2} - \\dfrac{1}{2} \\right) \\cdot \\left( \\dfrac{3}{3} - \\dfrac{1}{3} \\right) \\cdot \\left( \\dfrac{4}{4} - \\dfrac{1}{4} \\right) \\cdot \\dots \\cdot \\left( \\dfrac{2025}{2025} - \\dfrac{1}{2025} \\right)$</li><li class='ml-4'>$A = \\dfrac{1}{2} \\cdot \\dfrac{2}{3} \\cdot \\dfrac{3}{4} \\cdot \\dots \\cdot \\dfrac{2024}{2025}$</li><li>Gộp các tử số và mẫu số lại với nhau để dễ dàng thực hiện triệt tiêu:</li><li class='ml-4'>$A = \\dfrac{1 \\cdot 2 \\cdot 3 \\cdot \\dots \\cdot 2024}{2 \\cdot 3 \\cdot 4 \\cdot \\dots \\cdot 2025}$</li><li>Triệt tiêu các thừa số chung từ $2$ đến $2024$ ở cả tử số và mẫu số, ta thu được kết quả tối giản:</li><li class='ml-4'>$A = \\dfrac{1}{2025}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $A = \\dfrac{1}{2025}$.</li>" },
{ t_title: "Câu 2 (2,0 điểm)", t_content: "Giải các bài toán Đại số bản lề chuyển tiếp Lớp 7:<div class='mt-6'>a) Tìm&nbsp;$x, y$&nbsp;biết:&nbsp;$\\dfrac{x}{4} = \\dfrac{y}{7}$&nbsp;và&nbsp;$3x - y = 15$.</div><div class='mt-6'>b) Tìm&nbsp;$x$&nbsp;bằng cách khai triển đa thức:&nbsp;$(x + 4)(x - 2) - x(x + 3) = 4$.</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Dạng toán tìm ẩn số dựa vào dãy tỉ số bằng nhau (kiến thức chuẩn bị cho đại số 7).<br>- <b>How:</b> Đề cho phương trình có chứa hệ số $3x$. Vậy ta phải nhân cả tử và mẫu của tỉ số $\\dfrac{x}{4}$ với số $3$ để nó biến thành $\\dfrac{3x}{12}$. Sau đó áp dụng tính chất dãy tỉ số để thiết lập phép trừ tương ứng $\\dfrac{3x - y}{12 - 7}$.<br><b>Ý b:</b><br>- <b>What:</b> Phương trình khai triển đa thức.<br>- <b>How:</b> Dùng quy tắc nhân phân phối đa thức với đa thức, và đơn thức với đa thức.<br>- <b>Where:</b> Bẫy kinh điển nằm ở dấu trừ phía trước cụm $x(x + 3)$. Khi nhân phân phối vào, phải lập tức đổi dấu thành $-x^2 - 3x$. Nếu để $+3x$ thì sẽ giải sai hoàn toàn.", solution: "<li><b>a) Giải bài toán dãy tỉ số bằng nhau:</b></li><li class='ml-4'>Ta biến đổi phân số đầu tiên để làm xuất hiện hệ số $3$:</li><li class='ml-8'>$\\dfrac{x}{4} = \\dfrac{3 \\cdot x}{3 \\cdot 4} = \\dfrac{3x}{12}$</li><li class='ml-4'>Khi đó dãy tỉ số trở thành:</li><li class='ml-8'>$\\dfrac{3x}{12} = \\dfrac{y}{7}$</li><li class='ml-4'>Áp dụng tính chất của dãy tỉ số bằng nhau:</li><li class='ml-8'>$\\dfrac{3x}{12} = \\dfrac{y}{7} = \\dfrac{3x - y}{12 - 7} = \\dfrac{15}{5} = 3$</li><li class='ml-4'>Từ tỉ số chung bằng $3$, ta tìm các ẩn bằng cách nhân chéo:</li><li class='ml-8'>$\\dfrac{x}{4} = 3 \\Rightarrow x = 4 \\cdot 3 = 12$</li><li class='ml-8'>$\\dfrac{y}{7} = 3 \\Rightarrow y = 7 \\cdot 3 = 21$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = 12, y = 21$.</li><li><b>b) Giải phương trình khai triển đa thức:</b></li><li class='ml-4'>Tiến hành nhân phân phối (phá ngoặc) các biểu thức:</li><li class='ml-8'>$(x^2 - 2x + 4x - 8) - (x^2 + 3x) = 4$</li><li class='ml-4'>Bỏ dấu ngoặc (chú ý đổi dấu toàn bộ các hạng tử do có dấu trừ phía trước ngoặc sau):</li><li class='ml-8'>$x^2 + 2x - 8 - x^2 - 3x = 4$</li><li class='ml-4'>Nhóm các hạng tử đồng dạng để triệt tiêu:</li><li class='ml-8'>$(x^2 - x^2) + (2x - 3x) - 8 = 4$</li><li class='ml-8'>$-x - 8 = 4$</li><li class='ml-4'>Chuyển vế tìm $x$:</li><li class='ml-8'>$-x = 4 + 8 = 12 \\Rightarrow x = -12$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $x = -12$.</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "(Bài toán Tỉ lệ bản đồ & Chuyển động) Khoảng cách giữa hai thành phố A và B trên một tấm bản đồ có tỉ lệ xích&nbsp;$1 : 2.500.000$&nbsp;đo được là&nbsp;$6\\text{ cm}$.<div class='mt-6'>a) Tính khoảng cách thực tế giữa hai thành phố A và B theo đơn vị ki-lô-mét (km).</div><div class='mt-6'>b) Một chiếc ô tô xuất phát đi từ thành phố A đến thành phố B với vận tốc không đổi. Sau&nbsp;$2,5$&nbsp;giờ di chuyển, ô tô đã đi được&nbsp;$60\\%$&nbsp;tổng quãng đường. Hãy tính vận tốc của ô tô.</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Tính khoảng cách thực tế từ tỉ lệ xích bản đồ.<br>- <b>How:</b> Khoảng cách thực tế = Khoảng cách trên bản đồ $\\times$ Mẫu số của tỉ lệ xích. Sau khi nhân, kết quả nhận được sẽ mang đơn vị $\\text{cm}$. Phải nhớ chia cho $100.000$ để đổi sang $\\text{km}$.<br><b>Ý b:</b><br>- <b>What:</b> Bài toán chuyển động cơ bản ($V = S : t$).<br>- <b>How:</b> Thời gian $t$ đã có ($2,5$ giờ). Quãng đường $S$ mà ô tô ĐÃ ĐI ĐƯỢC tương ứng với $60\\%$ của tổng khoảng cách thực tế vừa tính ở câu a. Tính quãng đường đã đi, sau đó chia cho thời gian.", solution: "<li><b>a) Tính khoảng cách thực tế:</b></li><li class='ml-4'>Khoảng cách thực tế giữa hai thành phố A và B tính theo đơn vị xăng-ti-mét là:</li><li class='ml-8'>$6 \\cdot 2.500.000 = 15.000.000\\text{ (cm)}$</li><li class='ml-4'>Đổi đơn vị từ $\\text{cm}$ sang $\\text{km}$ ($1\\text{km} = 100.000\\text{cm}$):</li><li class='ml-8'>$15.000.000 : 100.000 = 150\\text{ (km)}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Khoảng cách thực tế là $150\\text{ km}$.</li><li><b>b) Tính vận tốc của ô tô:</b></li><li class='ml-4'>Quãng đường ô tô đã thực sự di chuyển được (tương ứng $60\\%$ khoảng cách A-B) là:</li><li class='ml-8'>$150 \\cdot 60\\% = 150 \\cdot \\dfrac{60}{100} = 90\\text{ (km)}$</li><li class='ml-4'>Vận tốc di chuyển của chiếc ô tô đó là:</li><li class='ml-8'>$v = S : t = 90 : 2,5 = 36\\text{ (km/h)}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Vận tốc của ô tô là $36\\text{ km/h}$.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "(Hình học Suy luận - Góc tạo bởi Cát tuyến) Cho hai đường thẳng song song&nbsp;$m$&nbsp;và&nbsp;$n$. Một đường thẳng cát tuyến&nbsp;$d$&nbsp;cắt đường thẳng&nbsp;$m$&nbsp;tại đỉnh&nbsp;$A$&nbsp;và cắt đường thẳng&nbsp;$n$&nbsp;tại đỉnh&nbsp;$B$. Biết một góc so le trong tại đỉnh&nbsp;$A$&nbsp;có số đo là&nbsp;$\\angle A_1 = 120^{\\circ}$.<div class='mt-6'>a) Tính số đo góc đồng vị&nbsp;$\\angle B_1$&nbsp;(tương ứng với góc $\\angle A_1$).</div><div class='mt-6'>b) Tính số đo góc trong cùng phía&nbsp;$\\angle B_2$&nbsp;(tương ứng với góc $\\angle A_1$).</div><div class='mt-6'>c) Vẽ tia&nbsp;$Ax$&nbsp;là tia phân giác của góc&nbsp;$\\angle A_1$, vẽ tia&nbsp;$By$&nbsp;là tia phân giác của góc&nbsp;$\\angle B_1$. Dùng lập luận hình học, chứng tỏ rằng tia&nbsp;$Ax$&nbsp;song song với tia&nbsp;$By$.</div><div class='flex justify-center my-8'><svg width='300' height='200' viewBox='0 0 300 200'><line x1='30' y1='50' x2='270' y2='50' stroke='black' stroke-width='1.5'/><text x='280' y='55' font-size='14' font-style='italic'>m</text><line x1='30' y1='150' x2='270' y2='150' stroke='black' stroke-width='1.5'/><text x='280' y='155' font-size='14' font-style='italic'>n</text><line x1='200' y1='10' x2='80' y2='190' stroke='black' stroke-width='1.5'/><text x='190' y='15' font-size='14' font-style='italic'>d</text><circle cx='173' cy='50' r='3' fill='black'/><text x='155' y='45' font-size='14'>A</text><circle cx='107' cy='150' r='3' fill='black'/><text x='85' y='145' font-size='14'>B</text><line x1='173' y1='50' x2='233' y2='100' stroke='red' stroke-width='1.5' stroke-dasharray='4'/><text x='240' y='100' font-size='14' font-style='italic' fill='red'>x</text><line x1='107' y1='150' x2='167' y2='200' stroke='red' stroke-width='1.5' stroke-dasharray='4'/><text x='175' y='195' font-size='14' font-style='italic' fill='red'>y</text><path d='M 148 50 A 25 25 0 0 0 156 75' fill='none' stroke='blue' stroke-width='1'/><text x='130' y='75' font-size='10' fill='blue'>A1</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán Hình học Suy luận nền tảng cho lớp 7. Điều bắt buộc là phải viện dẫn giả thiết \"song song\" trước khi rút ra kết luận về số đo góc.<br>- <b>How:</b> <br>&nbsp; + Ý a: Góc đồng vị của 2 đường thẳng song song thì như thế nào với nhau? (Luôn bằng nhau).<br>&nbsp; + Ý b: Góc trong cùng phía của 2 đường thẳng song song thì như thế nào với nhau? (Luôn bù nhau, tổng bằng $180^{\\circ}$).<br>&nbsp; + Ý c: Tính số đo của 2 góc nhỏ do 2 tia phân giác tạo ra. Bằng quan sát, ta thấy 2 góc nhỏ này nằm ở vị trí đồng vị đối với cát tuyến $d$. Vì chúng bằng nhau, áp dụng Dấu hiệu nhận biết ngược lại để suy ra hai tia phân giác song song.", solution: "<li><b>a) Tính góc đồng vị&nbsp;$\\angle B_1$:</b></li><li class='ml-4'>Theo giả thiết đề bài, ta có hai đường thẳng $m \\parallel n$.</li><li class='ml-4'>Góc $\\angle A_1$ và góc $\\angle B_1$ là hai góc ở vị trí <b>đồng vị</b> đối với đường thẳng cát tuyến $d$.</li><li class='ml-4'>Theo tính chất hai đường thẳng song song bị cắt bởi một cát tuyến, hai góc đồng vị luôn bằng nhau. Do đó ta có:</li><li class='ml-8'>$\\angle B_1 = \\angle A_1 = 120^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $\\angle B_1 = 120^{\\circ}$.</li><li><b>b) Tính góc trong cùng phía&nbsp;$\\angle B_2$:</b></li><li class='ml-4'>Theo giả thiết $m \\parallel n$, góc $\\angle A_1$ và góc $\\angle B_2$ là hai góc ở vị trí <b>trong cùng phía</b> đối với đường thẳng cát tuyến $d$.</li><li class='ml-4'>Theo tính chất hai đường thẳng song song, hai góc trong cùng phía bù nhau (tổng bằng $180^{\\circ}$):</li><li class='ml-8'>$\\angle A_1 + \\angle B_2 = 180^{\\circ}$</li><li class='ml-8'>$120^{\\circ} + \\angle B_2 = 180^{\\circ}$</li><li class='ml-8'>$\\angle B_2 = 180^{\\circ} - 120^{\\circ} = 60^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $\\angle B_2 = 60^{\\circ}$.</li><li><b>c) Chứng tỏ hai tia phân giác song song:</b></li><li class='ml-4'>Vì tia $Ax$ là tia phân giác của góc $\\angle A_1$ nên góc nhỏ tạo thành (tính từ cát tuyến $d$ tới tia $Ax$) là:</li><li class='ml-8'>$\\angle dAx = \\dfrac{\\angle A_1}{2} = \\dfrac{120^{\\circ}}{2} = 60^{\\circ}$.</li><li class='ml-4'>Vì tia $By$ là tia phân giác của góc $\\angle B_1$ nên góc nhỏ tạo thành (tính từ cát tuyến $d$ tới tia $By$) là:</li><li class='ml-8'>$\\angle dBy = \\dfrac{\\angle B_1}{2} = \\dfrac{120^{\\circ}}{2} = 60^{\\circ}$.</li><li class='ml-4'>Dựa vào kết quả trên, ta thấy $\\angle dAx = 60^{\\circ}$ và $\\angle dBy = 60^{\\circ}$, suy ra hai góc bằng nhau: $\\angle dAx = \\angle dBy$.</li><li class='ml-4'>Mặt khác, xét trên hình vẽ, góc $\\angle dAx$ và góc $\\angle dBy$ đang ở vị trí <b>đồng vị</b> đối với cát tuyến $d$ cắt qua hai tia $Ax$ và $By$.</li><li class='ml-4'>Theo dấu hiệu nhận biết hai đường thẳng song song: Vì một đường thẳng cắt hai tia và tạo ra một cặp góc đồng vị bằng nhau, nên hai tia đó song song với nhau.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận c: Suy ra $Ax \\parallel By$ (Điều phải chứng minh).</li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Vũ khí Số học - Đồng dư thức Modulo)<br>Sử dụng phương pháp Đồng dư thức, hãy chứng minh rằng biểu thức số học&nbsp;$B = 8^{2026} + 6$&nbsp;chia hết cho&nbsp;$7$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Chứng minh một biểu thức khổng lồ chia hết cho 7.<br>- <b>Why:</b> Bản chất của phép chia hết chính là việc đi tìm số dư. Khi số dư bằng $0$ thì biểu thức đó chia hết.<br>- <b>How:</b> Dùng thuật toán Modulo để bóc tách từng phần. Tách riêng phần cơ số lũy thừa là $8$ và phần hằng số tự do là $6$.<br>- <b>Where:</b> Chìa khóa vàng nằm ở việc số $8$ khi chia $7$ sẽ dư $1$. Vậy $8 \\equiv 1 \\pmod 7$. Mà số $1$ khi lũy thừa lên bất cứ mũ nào thì kết quả vẫn luôn là $1$. Khúc mắc lớn nhất đã được giải quyết!", solution: "<li>Ta sẽ khảo sát tính đồng dư của từng số hạng trong biểu thức $B$ khi chia cho hệ số $7$.</li><li>Với thành phần cơ số $8$, ta có:</li><li class='ml-4'>$8 = 7 \\cdot 1 + 1 \\Rightarrow 8 \\equiv 1 \\pmod 7$</li><li>Áp dụng tính chất nâng lũy thừa của đồng dư thức, ta nâng cả hai vế lên mũ $2026$:</li><li class='ml-4'>$8^{2026} \\equiv 1^{2026} \\pmod 7$</li><li>Vì số $1$ nâng lên lũy thừa bậc bao nhiêu cũng vẫn bằng $1$, nên:</li><li class='ml-4'>$8^{2026} \\equiv 1 \\pmod 7$ (Ký hiệu là phương trình 1)</li><li>Với thành phần hằng số tự do là $6$, do $6 < 7$ nên nó đồng dư với chính nó:</li><li class='ml-4'>$6 \\equiv 6 \\pmod 7$ (Ký hiệu là phương trình 2)</li><li>Cộng hai vế tương ứng của (1) và (2), ta thiết lập được tính đồng dư của toàn bộ tổng $B$:</li><li class='ml-4'>$8^{2026} + 6 \\equiv 1 + 6 \\pmod 7$</li><li class='ml-4'>$8^{2026} + 6 \\equiv 7 \\pmod 7$</li><li>Vì $7$ hiển nhiên chia hết cho $7$, tức là số dư của $7$ khi chia cho $7$ bằng $0$ ($7 \\equiv 0 \\pmod 7$). Thay tính chất bắc cầu vào, ta suy ra:</li><li class='ml-4'>$B \\equiv 0 \\pmod 7$</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Do số dư bằng $0$, chứng tỏ biểu thức $B = 8^{2026} + 6$ chia hết cho $7$. (Điều phải chứng minh).</li>" },
{ t_title: "Câu 6 (2,0 điểm)", t_content: "(Bất đẳng thức Tích nâng cao) Cho biểu thức:<br>$M = \\dfrac{1}{2} \\cdot \\dfrac{3}{4} \\cdot \\dfrac{5}{6} \\cdot \\dots \\cdot \\dfrac{99}{100}$<br>Chứng minh rằng&nbsp;$M < \\dfrac{1}{10}$.", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu so sánh một chuỗi tích gồm các phân số rất dài với một phân số cố định $\\dfrac{1}{10}$.<br>- <b>Why:</b> Dãy $M$ bao gồm các phân số tăng dần $\\dfrac{1}{2}, \\dfrac{3}{4}, \\dfrac{5}{6}\\dots$ Ta không thể có công thức nào để tính gộp trực tiếp tích của dãy này.<br>- <b>How:</b> Sử dụng phương pháp \"Nhân bản làm trội\". Ý tưởng là tạo ra một dãy $N$ hoàn toàn mới xen kẽ với $M$. Dãy $N$ sẽ nhích mẫu số và tử số của dãy $M$ lên $1$ đơn vị: $N = \\dfrac{2}{3} \\cdot \\dfrac{4}{5} \\cdot \\dots \\cdot \\dfrac{100}{101}$.<br>- <b>Where:</b> Rõ ràng từng phân số của $M$ đều bé hơn từng phân số của $N$ (Ví dụ: $\\dfrac{1}{2} < \\dfrac{2}{3}$; $\\dfrac{3}{4} < \\dfrac{4}{5}$). Suy ra $M < N$. Khi đó $M \\cdot M < M \\cdot N$.<br>- Mà tích $M \\cdot N$ là sự kết hợp cực kỳ hoàn hảo để triệt tiêu chéo tử và mẫu, kết quả của $M \\cdot N$ sẽ rút gọn thành $\\dfrac{1}{101}$. Từ đó suy ra giới hạn của $M^2$.", solution: "<li><b>Bước 1: Thiết lập chuỗi làm trội</b></li><li class='ml-4'>Ta thiết lập một biểu thức phụ $N$ gồm các phân số được nhích lên 1 đơn vị, xen kẽ với $M$:</li><li class='ml-8'>$N = \\dfrac{2}{3} \\cdot \\dfrac{4}{5} \\cdot \\dfrac{6}{7} \\cdot \\dots \\cdot \\dfrac{100}{101}$</li><li class='ml-4'>Ta tiến hành so sánh từng nhân tử tương ứng của $M$ và $N$:</li><li class='ml-8'>$\\dfrac{1}{2} < \\dfrac{2}{3}$</li><li class='ml-8'>$\\dfrac{3}{4} < \\dfrac{4}{5}$</li><li class='ml-8'>$\\dots$</li><li class='ml-8'>$\\dfrac{99}{100} < \\dfrac{100}{101}$</li><li class='ml-4'>Vì tất cả các phân số cấu thành đều là số dương, ta có quyền nhân vế theo vế các bất đẳng thức trên lại với nhau, suy ra tích tổng thể:</li><li class='ml-8'>$M < N$</li><li><b>Bước 2: Nâng lũy thừa bằng phép nhân</b></li><li class='ml-4'>Vì $M$ là một số dương ($M > 0$), khi ta nhân cả hai vế của bất đẳng thức trên với chính $M$, chiều bất đẳng thức không đổi:</li><li class='ml-8'>$M \\cdot M < M \\cdot N$</li><li class='ml-8'>$M^2 < M \\cdot N$</li><li><b>Bước 3: Triệt tiêu tích chéo</b></li><li class='ml-4'>Ta tính tích thực tế của $M \\cdot N$ bằng cách ghép chéo xen kẽ các phân số lại với nhau:</li><li class='ml-8'>$M \\cdot N = \\left( \\dfrac{1}{2} \\cdot \\dfrac{3}{4} \\cdot \\dots \\cdot \\dfrac{99}{100} \\right) \\cdot \\left( \\dfrac{2}{3} \\cdot \\dfrac{4}{5} \\cdot \\dots \\cdot \\dfrac{100}{101} \\right)$</li><li class='ml-4'>Gộp chung một phân số lớn:</li><li class='ml-8'>$M \\cdot N = \\dfrac{1 \\cdot 2 \\cdot 3 \\cdot 4 \\cdot \\dots \\cdot 99 \\cdot 100}{2 \\cdot 3 \\cdot 4 \\cdot 5 \\cdot \\dots \\cdot 100 \\cdot 101}$</li><li class='ml-4'>Tiến hành triệt tiêu chéo các thừa số chung xuất hiện ở cả tử và mẫu từ $2$ đến $100$, ta thu được kết quả cực kỳ tối giản:</li><li class='ml-8'>$M \\cdot N = \\dfrac{1}{101}$</li><li><b>Bước 4: So sánh và Kết luận</b></li><li class='ml-4'>Thế kết quả trên vào bất đẳng thức, suy ra:</li><li class='ml-8'>$M^2 < \\dfrac{1}{101}$</li><li class='ml-4'>Mặt khác, ta nhận thấy rõ ràng:</li><li class='ml-8'>$\\dfrac{1}{101} < \\dfrac{1}{100} = \\left( \\dfrac{1}{10} \\right)^2$</li><li class='ml-4'>Áp dụng tính chất bắc cầu, ta có:</li><li class='ml-8'>$M^2 < \\left( \\dfrac{1}{10} \\right)^2$</li><li class='ml-4'>Vì $M > 0$, lấy căn bậc hai hai vế, ta thu được:</li><li class='ml-8'>$M < \\dfrac{1}{10}$</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Bất đẳng thức được chứng minh thành công.</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Cho dãy tỉ số bằng nhau&nbsp;$\\dfrac{x}{2} = \\dfrac{y}{5}$. Biết&nbsp;$x + y = 35$. Giá trị của&nbsp;$x$&nbsp;là:", options: ["A. $10$", "B. $25$", "C. $15$", "D. $20$"], correct_idx: 0, explain: "Áp dụng tính chất dãy tỉ số bằng nhau:&nbsp;$\\dfrac{x}{2} = \\dfrac{y}{5} = \\dfrac{x+y}{2+5} = \\dfrac{35}{7} = 5$. Khi đó:&nbsp;$x = 2 \\cdot 5 = 10$. Chọn A." },
{ q_title: "Câu 2", q_content: "Biển báo giao thông nào sau đây có 'Tâm đối xứng'?", options: ["A. Biển 'Cấm đi ngược chiều' (Hình tròn đỏ, vạch ngang trắng)", "B. Biển 'Giao nhau với đường ưu tiên' (Tam giác ngược)", "C. Biển 'Đường một chiều' (Hình mũi tên)", "D. Cả 3 biển trên"], correct_idx: 0, explain: "Biển tròn có vạch ngang ở chính giữa khi xoay 180 độ qua tâm thì hình ảnh không thay đổi, nên nó có tâm đối xứng. Tam giác ngược và mũi tên không có. Chọn A." },
{ q_title: "Câu 3", q_content: "Khai triển biểu thức đa thức&nbsp;$(x - 2)(x + 2)$&nbsp;ta được:", options: ["A. $x^2 + 4$", "B. $x^2 - 4x + 4$", "C. $x^2 - 4$", "D. $x^2 - 2x$"], correct_idx: 2, explain: "Nhân phân phối:&nbsp;$(x - 2)(x + 2) = x^2 + 2x - 2x - 4 = x^2 - 4$. (Đây là hằng đẳng thức hiệu hai bình phương học ở lớp 8). Chọn C." },
{ q_title: "Câu 4", q_content: "Gieo một con xúc xắc cân đối. Nếu gieo&nbsp;$100$&nbsp;lần, xác suất thực nghiệm của sự kiện 'Mặt xuất hiện là số nguyên tố' là&nbsp;$55\\%$. Số lần xuất hiện mặt KHÔNG PHẢI số nguyên tố là:", options: ["A. $55$&nbsp;lần", "B. $45$&nbsp;lần", "C. $60$&nbsp;lần", "D. $40$&nbsp;lần"], correct_idx: 1, explain: "Tỉ lệ phần trăm xuất hiện mặt không phải số nguyên tố là&nbsp;$100\\% - 55\\% = 45\\%$. Số lần xuất hiện là:&nbsp;$100 \\cdot 45\\% = 45$&nbsp;lần. Chọn B." },
{ q_title: "Câu 5", q_content: "Hai đường thẳng&nbsp;$x$&nbsp;và&nbsp;$y$&nbsp;song song với nhau. Một đường thẳng&nbsp;$z$&nbsp;cắt ngang tạo ra một góc trong cùng phía bằng&nbsp;$105^{\\circ}$. Góc trong cùng phía còn lại có số đo là:", options: ["A. $105^{\\circ}$", "B. $85^{\\circ}$", "C. $75^{\\circ}$", "D. $180^{\\circ}$"], correct_idx: 2, explain: "Hai góc trong cùng phía của hai đường thẳng song song thì bù nhau. Số đo góc còn lại là:&nbsp;$180^{\\circ} - 105^{\\circ} = 75^{\\circ}$. Chọn C." },
{ q_title: "Câu 6", q_content: "Kết quả của phép tính&nbsp;$(-5)^2 \\cdot \\dfrac{2}{-25}$&nbsp;là:", options: ["A. $-2$", "B. $2$", "C. $10$", "D. $-10$"], correct_idx: 0, explain: "Tính lũy thừa trước:&nbsp;$(-5)^2 = 25$. Thay vào biểu thức ta có:&nbsp;$25 \\cdot \\dfrac{2}{-25} = -2$. Chọn A." },
{ q_title: "Câu 7", q_content: "Một sản phẩm có giá niêm yết&nbsp;$500.000$&nbsp;đ. Sau khi giảm giá, sản phẩm còn&nbsp;$400.000$&nbsp;đ. Cửa hàng đã giảm giá bao nhiêu phần trăm?", options: ["A. $25\\%$", "B. $20\\%$", "C. $10\\%$", "D. $80\\%$"], correct_idx: 1, explain: "Số tiền được giảm là:&nbsp;$500.000 - 400.000 = 100.000$&nbsp;đ. Phần trăm giảm giá là:&nbsp;$\\dfrac{100.000}{500.000} \\cdot 100\\% = 20\\%$. Chọn B." },
{ q_title: "Câu 8", q_content: "Trong Modulo (Đồng dư thức), số dư của phép chia&nbsp;$3^{50}$&nbsp;cho&nbsp;$2$&nbsp;là:", options: ["A. $1$", "B. $2$", "C. $0$", "D. $-1$"], correct_idx: 0, explain: "Vì&nbsp;$3$ chia $2$ dư $1$, nên&nbsp;$3 \\equiv 1 \\pmod 2$. Suy ra&nbsp;$3^{50} \\equiv 1^{50} \\equiv 1 \\pmod 2$. Số dư là 1. Mở rộng: Mọi số lẻ nâng lũy thừa bao nhiêu cũng vẫn là số lẻ, nên chia 2 luôn dư 1. Chọn A." },
{ q_title: "Câu 9", q_content: "Cho đoạn thẳng&nbsp;$AB = 20\\text{ cm}$. Điểm&nbsp;$M$&nbsp;là trung điểm của&nbsp;$AB$. Điểm&nbsp;$N$&nbsp;là trung điểm của&nbsp;$AM$. Độ dài đoạn thẳng&nbsp;$NB$&nbsp;là:", options: ["A. $10\\text{ cm}$", "B. $5\\text{ cm}$", "C. $15\\text{ cm}$", "D. $12\\text{ cm}$"], correct_idx: 2, explain: "M là trung điểm AB nên&nbsp;$AM = MB = 10\\text{ cm}$. N là trung điểm AM nên&nbsp;$AN = NM = 5\\text{ cm}$. Vì N nằm giữa A và B nên đoạn&nbsp;$NB = AB - AN = 20 - 5 = 15\\text{ cm}$. Chọn C." },
{ q_title: "Câu 10", q_content: "Hai góc phụ nhau có một góc bằng&nbsp;$\\dfrac{1}{3}$&nbsp;góc kia. Số đo góc lớn hơn là:", options: ["A. $60^{\\circ}$", "B. $45^{\\circ}$", "C. $67,5^{\\circ}$", "D. $135^{\\circ}$"], correct_idx: 2, explain: "Hai góc phụ nhau có tổng số đo bằng&nbsp;$90^{\\circ}$. Tỉ số là 1:3 nên tổng số phần là 4 phần. Giá trị một phần là&nbsp;$90 : 4 = 22,5^{\\circ}$. Góc lớn chiếm 3 phần nên số đo là&nbsp;$22,5 \\cdot 3 = 67,5^{\\circ}$. Chọn C." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về các phép khai triển và tỉ số:<br>(I) Nếu ta có đẳng thức&nbsp;$\\dfrac{a}{b} = \\dfrac{c}{d}$&nbsp;thì ta có thể suy ra&nbsp;$\\dfrac{a+b}{b} = \\dfrac{c+d}{d}$.<br>(II) Khai triển biểu thức lũy thừa&nbsp;$(x+3)^2$&nbsp;sẽ thu được đa thức&nbsp;$x^2 + 9$.<br>(III) Phân số&nbsp;$\\dfrac{-15}{20}$&nbsp;biểu diễn cùng một số hữu tỉ với phân số&nbsp;$\\dfrac{3}{-4}$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Đúng, bằng cách cộng 1 vào cả 2 vế của tỉ lệ thức: $\\frac{a}{b}+1 = \\frac{c}{d}+1$. (II) Sai, thiếu cụm tích ở giữa (đúng phải là $x^2+6x+9$). (III) Đúng, vì rút gọn $\\frac{-15}{20}$ ta chia cả tử và mẫu cho 5, rồi đưa dấu âm xuống mẫu ta được $\\frac{3}{-4}$. Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Xét 3 mệnh đề sau về Hình học chuyển tiếp Tiên đề Euclid:<br>(I) Qua một điểm nằm ngoài một đường thẳng, chỉ có duy nhất một đường thẳng song song với đường thẳng đó.<br>(II) Nếu hai đường thẳng ngẫu nhiên bị cắt bởi một đường thẳng cát tuyến, thì hai góc đồng vị sinh ra luôn luôn bằng nhau.<br>(III) Biển báo 'Cấm đỗ xe' (Hình tròn đỏ, viền xanh, 1 gạch chéo đỏ từ góc trên trái xuống góc dưới phải) hoàn toàn KHÔNG có trục đối xứng.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 1, explain: "(I) Đúng, đây là nội dung cốt lõi của Tiên đề Euclid. (II) Sai, hai góc đồng vị chỉ bằng nhau KHI VÀ CHỈ KHI hai đường thẳng bị cắt là hai đường thẳng SONG SONG. (III) Sai, biển cấm đỗ xe (1 gạch) CÓ 1 trục đối xứng chạy dọc chính giữa nét gạch chéo đó. Có 1 mệnh đề đúng. Chọn B." }

{ t_title: "Câu 1 (2,0 điểm)", t_content: "Tính hợp lý giá trị biểu thức:<br>$A = \\dfrac{4}{3 \\cdot 7} + \\dfrac{4}{7 \\cdot 11} + \\dfrac{4}{11 \\cdot 15} + \\dots + \\dfrac{4}{103 \\cdot 107}$", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Một dãy tổng các phân số có quy luật cách đều ở dưới mẫu số.<br>- <b>How:</b> Hãy tính khoảng cách giữa hai thừa số ở dưới mẫu: $7 - 3 = 4$, $11 - 7 = 4$. Khoảng cách là $4$.<br>- <b>Why:</b> Hãy nhìn lên tử số. Rất may mắn, tử số hiện tại cũng chính là số $4$. Nghĩa là Tử số đã \"khớp\" hoàn hảo với khoảng cách ở Mẫu số.<br>- <b>Where:</b> Khi đã khớp điều kiện, ta không cần phải nhân chia thêm hệ số nào bên ngoài nữa. Áp dụng ngay công thức sai phân: $\\dfrac{k}{n(n+k)} = \\dfrac{1}{n} - \\dfrac{1}{n+k}$ để bung chuỗi và triệt tiêu.", solution: "<li>Do tử số bằng đúng hiệu của hai thừa số ở mẫu số, ta áp dụng công thức sai phân tách trực tiếp từng phân số thành hiệu:</li><li class='ml-4'>$A = \\left( \\dfrac{1}{3} - \\dfrac{1}{7} \\right) + \\left( \\dfrac{1}{7} - \\dfrac{1}{11} \\right) + \\left( \\dfrac{1}{11} - \\dfrac{1}{15} \\right) + \\dots + \\left( \\dfrac{1}{103} - \\dfrac{1}{107} \\right)$</li><li>Bỏ dấu ngoặc và gạch bỏ triệt tiêu toàn bộ các phân số có dấu trái ngược nhau ở giữa chuỗi:</li><li class='ml-4'>$A = \\dfrac{1}{3} - \\dfrac{1}{107}$</li><li>Quy đồng mẫu số chung là $3 \\cdot 107 = 321$ và tính kết quả:</li><li class='ml-4'>$A = \\dfrac{107}{321} - \\dfrac{3}{321}$</li><li class='ml-4'>$A = \\dfrac{104}{321}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số: $A = \\dfrac{104}{321}$.</li>" },
{ t_title: "Câu 2 (2,0 điểm)", t_content: "Giải bài toán Đại số bản lề chuyển tiếp Lớp 7:<div class='mt-6'>a) Tìm&nbsp;$x, y, z$&nbsp;biết:&nbsp;$\\dfrac{x}{3} = \\dfrac{y}{2}; \\dfrac{y}{5} = \\dfrac{z}{4}$&nbsp;và tổng&nbsp;$x - y + z = 39$.</div><div class='mt-6'>b) Tìm&nbsp;$x$&nbsp;bằng cách khai triển đa thức:&nbsp;$(x - 3)(x + 3) - x(x - 5) = 11$.</div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Dạng toán tỉ số đứt đoạn (hai chuỗi tỉ số không đồng nhất).<br>- <b>How:</b> Cầu nối giữa hai chuỗi là biến $y$. Ở chuỗi đầu $y$ có mẫu là $2$. Ở chuỗi sau $y$ có mẫu là $5$. Ta phải tìm Bội chung nhỏ nhất của $2$ và $5$ (là $10$).<br>- <b>Where:</b> Chia chuỗi thứ nhất cho $5$, chia chuỗi thứ hai cho $2$ để mẫu của $y$ ở cả hai nơi cùng biến thành $10$. Khi đó ta dễ dàng nối chúng lại thành một dãy liền mạch.<br><b>Ý b:</b><br>- <b>What:</b> Phương trình khai triển đa thức.<br>- <b>How:</b> Khai triển cụm $(x-3)(x+3)$. Đây là phép nhân đa thức cơ bản (lên lớp 8 sẽ học nó là Hằng đẳng thức hiệu hai bình phương).<br>- <b>Where:</b> Chú ý cực kỳ quan trọng ở dấu trừ phía trước cụm $x(x-5)$. Khi nhân phân phối vào, $-x \\cdot (-5)$ phải đổi dấu thành $+5x$.", solution: "<li><b>a) Giải bài toán Dãy tỉ số đứt đoạn:</b></li><li class='ml-4'>Từ giả thiết $\\dfrac{x}{3} = \\dfrac{y}{2}$, ta chia cả hai vế cho $5$ để đẩy mẫu số lên:</li><li class='ml-8'>$\\dfrac{x}{3 \\cdot 5} = \\dfrac{y}{2 \\cdot 5} \\Rightarrow \\dfrac{x}{15} = \\dfrac{y}{10}$ (Ký hiệu 1)</li><li class='ml-4'>Từ giả thiết $\\dfrac{y}{5} = \\dfrac{z}{4}$, ta chia cả hai vế cho $2$:</li><li class='ml-8'>$\\dfrac{y}{5 \\cdot 2} = \\dfrac{z}{4 \\cdot 2} \\Rightarrow \\dfrac{y}{10} = \\dfrac{z}{8}$ (Ký hiệu 2)</li><li class='ml-4'>Từ (1) và (2), do có chung trạm trung chuyển $\\dfrac{y}{10}$, ta nối được dãy tỉ số liền mạch:</li><li class='ml-8'>$\\dfrac{x}{15} = \\dfrac{y}{10} = \\dfrac{z}{8}$</li><li class='ml-4'>Áp dụng tính chất của dãy tỉ số bằng nhau đối với biểu thức $x - y + z$:</li><li class='ml-8'>$\\dfrac{x}{15} = \\dfrac{y}{10} = \\dfrac{z}{8} = \\dfrac{x - y + z}{15 - 10 + 8} = \\dfrac{39}{13} = 3$</li><li class='ml-4'>Từ tỉ số chung bằng $3$, ta nhân chéo tìm các ẩn:</li><li class='ml-8'>$\\dfrac{x}{15} = 3 \\Rightarrow x = 45$</li><li class='ml-8'>$\\dfrac{y}{10} = 3 \\Rightarrow y = 30$</li><li class='ml-8'>$\\dfrac{z}{8} = 3 \\Rightarrow z = 24$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = 45, y = 30, z = 24$.</li><li><b>b) Giải phương trình Khai triển đa thức:</b></li><li class='ml-4'>Tiến hành nhân phân phối (phá ngoặc) biểu thức đầu tiên:</li><li class='ml-8'>$(x^2 + 3x - 3x - 9) - (x^2 - 5x) = 11$</li><li class='ml-4'>Bỏ dấu ngoặc đơn và đổi dấu các hạng tử ở ngoặc sau:</li><li class='ml-8'>$x^2 - 9 - x^2 + 5x = 11$</li><li class='ml-4'>Nhóm các hạng tử đồng dạng để triệt tiêu:</li><li class='ml-8'>$(x^2 - x^2) + 5x - 9 = 11$</li><li class='ml-8'>$5x - 9 = 11$</li><li class='ml-4'>Chuyển vế tìm $x$:</li><li class='ml-8'>$5x = 11 + 9 = 20 \\Rightarrow x = 4$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $x = 4$.</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "(Kinh tế học & Tỉ số phần trăm) Một cửa hàng nhập về một lô máy tính xách tay với giá vốn là&nbsp;$12.000.000$&nbsp;đồng/chiếc. Chủ cửa hàng cần định mức giá niêm yết để sao cho nếu sau này có chạy chương trình giảm giá&nbsp;$20\\%$&nbsp;thì cửa hàng vẫn phải đảm bảo thu được số tiền lãi tương đương&nbsp;$15\\%$&nbsp;so với giá vốn ban đầu.<div class='mt-6'>a) Tính số tiền thực tế cửa hàng thu về sau khi bán 1 chiếc máy tính (tức là mức giá bán đã bao gồm khoản lãi 15% so với vốn).</div><div class='mt-6'>b) Hỏi cửa hàng phải thiết lập mức giá niêm yết ban đầu là bao nhiêu tiền?</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Tính tổng doanh thu thu về. Trong kinh doanh: Doanh thu = Giá Vốn + Lợi Nhuận.<br>- <b>How:</b> Vì cửa hàng muốn lãi $15\\%$ so với VỐN, nên số tiền thực tế thu về (doanh thu) sẽ tương ứng với $115\\%$ Giá Vốn.<br><b>Ý b:</b><br>- <b>What:</b> Tính toán ngược mức giá niêm yết ảo để cho phép \"bơm phồng\" rồi lại \"giảm giá\" làm mồi nhử.<br>- <b>How:</b> Số tiền thu về vừa tính ở câu a chính là mức giá ĐÃ GIẢM $20\\%$ so với giá NIÊM YẾT. Nghĩa là Tiền thu về = $80\\%$ Giá niêm yết. Dùng phép chia để đảo ngược tìm ra con số ban đầu.", solution: "<li><b>a) Tính số tiền thực tế cửa hàng thu về:</b></li><li class='ml-4'>Vì cửa hàng mong muốn có mức lãi $15\\%$ so với giá vốn, nên số tiền thực tế thu về (doanh thu bán hàng) sẽ tương ứng với phần trăm so với giá vốn là:</li><li class='ml-8'>$100\\% + 15\\% = 115\\%$&nbsp;(Giá vốn).</li><li class='ml-4'>Số tiền cửa hàng thu về sau khi bán được 1 chiếc máy tính là:</li><li class='ml-8'>$12.000.000 \\cdot 115\\% = 12.000.000 \\cdot 1,15 = 13.800.000$&nbsp;(đồng).</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Cửa hàng thu về $13.800.000$ đồng.</li><li><b>b) Tính mức giá niêm yết ban đầu:</b></li><li class='ml-4'>Số tiền thu về ($13.800.000$ đồng) chính là mức giá khuyến mãi sau khi đã trừ đi $20\\%$ giảm giá so với giá niêm yết ban đầu.</li><li class='ml-4'>Do đó, tỉ lệ phần trăm của mức giá bán thực tế so với giá niêm yết là:</li><li class='ml-8'>$100\\% - 20\\% = 80\\%$&nbsp;(Giá niêm yết).</li><li class='ml-4'>Giá niêm yết ban đầu mà cửa hàng phải thiết lập cho chiếc máy tính là:</li><li class='ml-8'>$13.800.000 : 80\\% = 13.800.000 : 0,8 = 17.250.000$&nbsp;(đồng).</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Cửa hàng phải niêm yết giá là $17.250.000$ đồng.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "(Hình học Suy luận - Bài toán \"Góc Gãy\") Cho hai đường thẳng&nbsp;$a$&nbsp;và&nbsp;$b$&nbsp;song song với nhau ($a \\parallel b$). Ở không gian giữa hai đường thẳng này, có một điểm&nbsp;$O$. Kẻ các đoạn thẳng&nbsp;$OA$&nbsp;(với&nbsp;$A \\in a$) và&nbsp;$OB$&nbsp;(với&nbsp;$B \\in b$) tạo thành một đường gấp khúc&nbsp;$AOB$. Biết góc&nbsp;$\\angle A = 40^{\\circ}$&nbsp;và góc&nbsp;$\\angle B = 50^{\\circ}$.<div class='mt-6'>a) Qua điểm&nbsp;$O$, kẻ đường thẳng&nbsp;$c \\parallel a$. Hỏi đường thẳng&nbsp;$c$&nbsp;có song song với đường thẳng&nbsp;$b$&nbsp;không? Vì sao?</div><div class='mt-6'>b) Bằng suy luận, hãy tính số đo góc gãy&nbsp;$\\angle AOB$.</div><div class='mt-6'>c) Kẻ tia phân giác&nbsp;$Om$&nbsp;của góc&nbsp;$\\angle AOB$. Tính số đo của góc tạo bởi tia&nbsp;$Om$&nbsp;và đường thẳng&nbsp;$a$.</div><div class='flex justify-center my-8'><svg width='300' height='200' viewBox='0 0 300 200'><line x1='30' y1='30' x2='270' y2='30' stroke='black' stroke-width='1.5'/><text x='280' y='35' font-size='14' font-style='italic'>a</text><line x1='30' y1='170' x2='270' y2='170' stroke='black' stroke-width='1.5'/><text x='280' y='175' font-size='14' font-style='italic'>b</text><circle cx='120' cy='30' r='3' fill='black'/><text x='115' y='20' font-size='14'>A</text><circle cx='200' cy='100' r='3' fill='black'/><text x='210' y='105' font-size='14'>O</text><circle cx='110' cy='170' r='3' fill='black'/><text x='105' y='190' font-size='14'>B</text><line x1='120' y1='30' x2='200' y2='100' stroke='black' stroke-width='1.5'/><line x1='110' y1='170' x2='200' y2='100' stroke='black' stroke-width='1.5'/><line x1='50' y1='100' x2='250' y2='100' stroke='gray' stroke-width='1.5' stroke-dasharray='4'/><text x='260' y='105' font-size='14' font-style='italic' fill='gray'>c</text><line x1='200' y1='100' x2='125' y2='100' stroke='red' stroke-width='1.5' stroke-dasharray='4'/><text x='110' y='105' font-size='14' font-style='italic' fill='red'>m</text><path d='M 135 30 A 15 15 0 0 1 133 42' fill='none' stroke='blue' stroke-width='1'/><text x='140' y='50' font-size='10' fill='blue'>40°</text><path d='M 125 170 A 15 15 0 0 0 122 158' fill='none' stroke='green' stroke-width='1'/><text x='130' y='160' font-size='10' fill='green'>50°</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Suy luận tính chất bắc cầu của 3 đường thẳng song song.<br>- <b>Why:</b> Điều này là tiền đề bắt buộc để được phép dùng các hệ quả góc so le trong ở ý b. Nếu bỏ qua bước này sẽ mất điểm trình bày.<br><b>Ý b:</b><br>- <b>How:</b> Đường thẳng phụ $c$ đóng vai trò chẻ góc lớn $\\angle AOB$ thành hai góc nhỏ kề nhau. Hãy dựa vào 2 cặp đường thẳng song song ($a \\parallel c$ và $b \\parallel c$) để tìm các góc so le trong bằng nhau được di chuyển từ đỉnh $A$ và đỉnh $B$ về hội tụ tại đỉnh $O$.<br><b>Ý c:</b><br>- <b>How:</b> Cắt đôi góc $\\angle AOB$ vừa tính. Sau đó, so sánh tia phân giác đó với đường thẳng phụ $c$ để tìm chênh lệch góc. Vì $c$ song song với $a$, góc tạo bởi tia phân giác với đường thẳng $c$ cũng chính là góc tạo bởi nó với đường thẳng $a$ (tính chất đồng vị/so le).", solution: "<li><b>a) Lập luận song song:</b></li><li class='ml-4'>Theo giả thiết, ta kẻ qua đỉnh $O$ đường thẳng $c$ song song với đường thẳng $a$ ($c \\parallel a$).</li><li class='ml-4'>Mặt khác, đề bài đã cho $a \\parallel b$.</li><li class='ml-4'>Theo tính chất hai đường thẳng phân biệt cùng song song với một đường thẳng thứ ba thì chúng song song với nhau. Do đó, ta suy ra: <b>đường thẳng&nbsp;$c$&nbsp;song song với đường thẳng&nbsp;$b$&nbsp;($c \\parallel b$)</b>.</li><li><b>b) Tính số đo góc gãy&nbsp;$\\angle AOB$:</b></li><li class='ml-4'>Đường thẳng $c$ chia không gian góc gãy $\\angle AOB$ thành hai góc nhỏ kề nhau là $\\angle O_1$ (nằm lệch phía đường thẳng $a$) và $\\angle O_2$ (nằm lệch phía đường thẳng $b$).</li><li class='ml-4'>Vì $c \\parallel a$, góc $\\angle O_1$ và góc $\\angle A$ là hai góc ở vị trí <b>so le trong</b>. Do đó, chúng có số đo bằng nhau: $\\angle O_1 = \\angle A = 40^{\\circ}$.</li><li class='ml-4'>Vì $c \\parallel b$, góc $\\angle O_2$ và góc $\\angle B$ là hai góc ở vị trí <b>so le trong</b>. Do đó, chúng cũng có số đo bằng nhau: $\\angle O_2 = \\angle B = 50^{\\circ}$.</li><li class='ml-4'>Vì tia $Oc$ nằm giữa hai tia $OA$ và $OB$, ta áp dụng công thức cộng góc để ráp hai nửa lại:</li><li class='ml-8'>$\\angle AOB = \\angle O_1 + \\angle O_2$</li><li class='ml-8'>$\\angle AOB = 40^{\\circ} + 50^{\\circ} = 90^{\\circ}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $\\angle AOB = 90^{\\circ}$ (Góc vuông).</li><li><b>c) Tính góc tạo bởi tia phân giác:</b></li><li class='ml-4'>Vì tia $Om$ là tia phân giác của góc $\\angle AOB$ nên nó chẻ đôi góc này:</li><li class='ml-8'>$\\angle AOm = \\dfrac{\\angle AOB}{2} = \\dfrac{90^{\\circ}}{2} = 45^{\\circ}$.</li><li class='ml-4'>Ta xét góc tạo bởi tia $Om$ và đường thẳng phụ $c$ nằm ngang đi qua $O$. Độ chênh lệch giữa tia phân giác $Om$ và tia $Oc$ chính là:</li><li class='ml-8'>$\\angle mOc = \\angle AOm - \\angle O_1 = 45^{\\circ} - 40^{\\circ} = 5^{\\circ}$.</li><li class='ml-4'>Vì đường thẳng $c$ song song với đường thẳng $a$ ($c \\parallel a$), nên mọi tia cắt ngang qua chúng đều tạo ra các góc so le hoặc góc đồng vị bằng nhau.</li><li class='ml-4'>Do đó, góc tạo bởi tia $Om$ với đường thẳng $a$ có số đo bằng đúng góc tạo bởi tia $Om$ với đường thẳng $c$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: Góc tạo bởi tia $Om$ và đường thẳng $a$ là $5^{\\circ}$.</li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Vũ khí Số học - Đồng dư thức Modulo)<br>Sử dụng phương pháp Đồng dư thức (Modulo), hãy tìm số dư của phép chia lũy thừa&nbsp;$3^{100}$&nbsp;cho hằng số&nbsp;$8$.", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Tìm số dư khi chia một lũy thừa siêu khổng lồ cho một hằng số nhỏ.<br>- <b>How:</b> Cần biến đổi Cơ số $3$ thành một dạng lũy thừa nhỏ nào đó để khi đem chia cho $8$ sẽ ra số dư là $1$ (hoặc $-1$).<br>- <b>Where:</b> Hãy nâng bậc cơ số: $3^1 = 3$ (dư 3). $3^2 = 9$. Rất tuyệt vời! Số $9$ khi chia cho $8$ dư đúng $1$.<br>- Vậy ta tách $3^{100}$ thành $(3^2)^{50}$, rồi thay $3^2$ bằng $9$. Khi đó $9^{50} \\equiv 1^{50} \\pmod 8$.", solution: "<li>Việc tìm số dư của phép chia lũy thừa $3^{100}$ cho $8$ tương đương với việc tìm giá trị đồng dư trong Modulo 8.</li><li>Trước hết, ta xét lũy thừa bậc $2$ của cơ số $3$:</li><li class='ml-4'>$3^2 = 9$</li><li>Vì $9 = 8 \\cdot 1 + 1$, nên số $9$ khi chia cho $8$ có số dư là $1$. Ta thiết lập được đồng dư thức:</li><li class='ml-4'>$3^2 \\equiv 1 \\pmod 8$</li><li>Tiếp theo, ta phân tích số mũ $100$ của đề bài để làm xuất hiện lũy thừa bậc $2$:</li><li class='ml-4'>$3^{100} = (3^2)^{50}$</li><li>Áp dụng tính chất nâng lũy thừa của đồng dư thức, ta nâng cả hai vế của phương trình đồng dư gốc lên bậc mũ $50$:</li><li class='ml-4'>$(3^2)^{50} \\equiv 1^{50} \\pmod 8$</li><li>Vì số $1$ khi nâng lên bất kỳ lũy thừa bậc nào cũng vẫn giữ nguyên giá trị bằng $1$, ta có:</li><li class='ml-4'>$3^{100} \\equiv 1 \\pmod 8$</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Lũy thừa $3^{100}$ khi chia cho $8$ có số dư là $1$.</li>" },
{ t_title: "Câu 6 (2,0 điểm)", t_content: "(Nguyên lý Dirichlet & Tính chia hết) <br>Bằng lập luận toán học, hãy chứng minh rằng: Trong&nbsp;$5$&nbsp;số nguyên bất kỳ, luôn luôn tồn tại&nbsp;$3$&nbsp;số sao cho tổng của chúng chia hết cho&nbsp;$3$.", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Chứng minh trong $5$ số tự do, rút ra được $3$ số có tổng chia hết cho $3$.<br>- <b>Why:</b> Bản chất phép chia hết phụ thuộc vào tổ hợp các số dư. Khi chia 1 số cho 3, các loại số dư (lồng thỏ) có thể là $0, 1, 2$. Có 5 số (số lượng thỏ).<br>- <b>How:</b> Xét các kịch bản phân bố số dư vào lồng. Hãy nhớ quy luật logic: <br>&nbsp; + Kịch bản ĐA DẠNG: Rút 3 số mang 3 loại số dư KHÁC NHAU (một số dư 0, một dư 1, một dư 2). Tổng ba số dư là $0+1+2=3$. Chia hết cho 3!<br>&nbsp; + Kịch bản HẠN CHẾ: Rút 3 số có CÙNG số dư (ví dụ 3 số cùng dư 1, dư 2...). Tổng ba số dư giống nhau sẽ là $3r$. Vẫn chia hết cho 3!<br>- Áp dụng Dirichlet để chứng minh chắc chắn một trong 2 kịch bản này phải xảy ra.", solution: "<li>Khi đem một số nguyên bất kỳ chia cho $3$, số dư nhận được chỉ có thể là một trong $3$ giá trị là: $0, 1, 2$.</li><li>Theo đề bài, ta có $5$ số nguyên bất kỳ. Đem $5$ số này chia cho $3$, mỗi số sẽ bắt buộc phải nhận $1$ trong $3$ giá trị số dư kể trên.</li><li>Xảy ra một trong hai kịch bản phân bố số dư như sau:</li><li class='ml-4'><b>Kịch bản 1: Có đầy đủ cả 3 loại số dư.</b></li><li class='ml-8'>Nghĩa là trong 5 số, tồn tại ít nhất một số chia $3$ dư $0$, một số chia $3$ dư $1$, và một số chia $3$ dư $2$.</li><li class='ml-8'>Ta chọn rút ra 3 số đó và gọi tên là $a, b, c$. Định dạng của chúng là:</li><li class='ml-8'>$a = 3q_1 + 0$</li><li class='ml-8'>$b = 3q_2 + 1$</li><li class='ml-8'>$c = 3q_3 + 2$</li><li class='ml-8'>Tổng của 3 số này là:</li><li class='ml-8'>$a + b + c = 3(q_1 + q_2 + q_3) + 3 = 3(q_1 + q_2 + q_3 + 1)$</li><li class='ml-8'>Rõ ràng biểu thức tổng trên chứa nhân tử $3$, nên nó chia hết cho $3$. Kịch bản này thỏa mãn yêu cầu đề bài.</li><li class='ml-4'><b>Kịch bản 2: Bị thiếu ít nhất 1 loại số dư.</b></li><li class='ml-8'>Nghĩa là $5$ số nguyên này chỉ mang tối đa $2$ loại số dư (Ví dụ: Các số chỉ rải rác toàn dư 0 và dư 1, không có dư 2).</li><li class='ml-8'>Ta coi $2$ loại số dư này là $2$ <b>chiếc lồng</b>. Đem $5$ số nguyên (đóng vai trò là $5$ <b>con thỏ</b>) nhét vào $2$ lồng.</li><li class='ml-8'>Theo Nguyên lý Dirichlet, phải có ít nhất $1$ lồng chứa số thỏ tối thiểu là: $(5 = 2 \\cdot 2 + 1) \\Rightarrow 2 + 1 = 3$ con.</li><li class='ml-8'>Điều này có nghĩa là chắc chắn tồn tại ít nhất $3$ số có <b>cùng một số dư</b> khi chia cho $3$.</li><li class='ml-8'>Gọi 3 số đó là $x, y, z$ và có cùng số dư là $r$. Định dạng của chúng là:</li><li class='ml-8'>$x = 3m_1 + r$</li><li class='ml-8'>$y = 3m_2 + r$</li><li class='ml-8'>$z = 3m_3 + r$</li><li class='ml-8'>Tổng của 3 số này là:</li><li class='ml-8'>$x + y + z = 3(m_1 + m_2 + m_3) + 3r$</li><li class='ml-8'>Vì $3r$ là một cụm luôn chia hết cho $3$ (do mang hệ số 3), nên tổng $(x+y+z)$ hoàn toàn chia hết cho $3$. Kịch bản này cũng thỏa mãn.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Bao quát mọi trường hợp phân bố, từ 5 số nguyên bất kỳ, ta luôn luôn chọn ra được 3 số có tổng chia hết cho 3. (Điều phải chứng minh).</li>" }
]
});
</script>

{ q_title: "Câu 3", q_content: "Gieo một đồng xu cân đối&nbsp;$50$&nbsp;lần. Nếu xác suất thực nghiệm của sự kiện 'Xuất hiện mặt Sấp' là&nbsp;$48\\%$, thì số lần xuất hiện mặt Ngửa là bao nhiêu?", options: ["A. $24$&nbsp;lần", "B. $26$&nbsp;lần", "C. $48$&nbsp;lần", "D. $52$&nbsp;lần"], correct_idx: 1, explain: "Xác suất thực nghiệm xuất hiện mặt Ngửa là&nbsp;$100\\% - 48\\% = 52\\%$. Số lần tương ứng là:&nbsp;$50 \\cdot 52\\% = 26$&nbsp;lần. Chọn B." },
{ q_title: "Câu 4", q_content: "Biết dãy tỉ số bằng nhau&nbsp;$\\dfrac{x}{3} = \\dfrac{y}{5}$&nbsp;và hiệu&nbsp;$y - x = 10$. Tổng&nbsp;$x + y$&nbsp;có giá trị là:", options: ["A. $40$", "B. $20$", "C. $30$", "D. $8$"], correct_idx: 0, explain: "Áp dụng tính chất dãy tỉ số:&nbsp;$\\dfrac{x}{3} = \\dfrac{y}{5} = \\dfrac{y-x}{5-3} = \\dfrac{10}{2} = 5$. Suy ra&nbsp;$x = 15, y = 25$. Tổng&nbsp;$x+y = 40$. Chọn A." },
{ q_title: "Câu 5", q_content: "Khai triển biểu thức đại số&nbsp;$(x - 3)(x + 3)$&nbsp;ta được kết quả là:", options: ["A. $x^2 - 6$", "B. $x^2 - 3x + 9$", "C. $x^2 - 9$", "D. $x^2 + 9$"], correct_idx: 2, explain: "Nhân phân phối:&nbsp;$(x - 3)(x + 3) = x^2 + 3x - 3x - 9 = x^2 - 9$. (Đây là hằng đẳng thức hiệu hai bình phương). Chọn C." },
{ q_title: "Câu 6", q_content: "Trên bản đồ có tỉ lệ xích&nbsp;$1 : 200.000$, khoảng cách giữa hai điểm là&nbsp;$5\\text{ cm}$. Khoảng cách thực tế là:", options: ["A. $10\\text{ km}$", "B. $100\\text{ km}$", "C. $1\\text{ km}$", "D. $1000\\text{ km}$"], correct_idx: 0, explain: "Khoảng cách thực tế là:&nbsp;$5 \\cdot 200.000 = 1.000.000\\text{ cm}$. Đổi ra ki-lô-mét:&nbsp;$1.000.000 : 100.000 = 10\\text{ km}$. Chọn A." },
{ q_title: "Câu 7", q_content: "Hai đường thẳng song song&nbsp;$m$&nbsp;và&nbsp;$n$&nbsp;bị cắt bởi cát tuyến&nbsp;$c$. Nếu một góc so le trong bằng&nbsp;$45^{\\circ}$, thì góc trong cùng phía tương ứng của nó bằng:", options: ["A. $45^{\\circ}$", "B. $135^{\\circ}$", "C. $90^{\\circ}$", "D. $180^{\\circ}$"], correct_idx: 1, explain: "Góc so le trong bằng $45^{\\circ}$ nên góc tạo bởi cát tuyến ở đỉnh kia (cùng phía) sẽ bù với nó. Góc trong cùng phía bằng&nbsp;$180^{\\circ} - 45^{\\circ} = 135^{\\circ}$. Chọn B." },
{ q_title: "Câu 8", q_content: "Tìm số nguyên&nbsp;$x$&nbsp;thỏa mãn&nbsp;$2x - 1 = -5$:", options: ["A. $3$", "B. $-3$", "C. $-2$", "D. $2$"], correct_idx: 2, explain: "Chuyển vế:&nbsp;$2x = -5 + 1 = -4 \\Rightarrow x = -2$. Chọn C." },
{ q_title: "Câu 9", q_content: "Biển báo giao thông 'Hình thoi màu vàng' (Biển báo đường ưu tiên) có bao nhiêu trục đối xứng?", options: ["A. $1$", "B. $2$", "C. $4$", "D. Vô số"], correct_idx: 1, explain: "Hình thoi có 2 trục đối xứng chính là 2 đường chéo của nó. Chọn B." },
{ q_title: "Câu 10", q_content: "Số nguyên tố&nbsp;$p$&nbsp;nào sau đây thỏa mãn biểu thức&nbsp;$p^2 - 1$&nbsp;chia hết cho&nbsp;$3$?", options: ["A. $3$", "B. $5$", "C. $2$", "D. Cả B và C đều đúng"], correct_idx: 3, explain: "Thử $p=3 \\Rightarrow 3^2-1=8$ (không chia hết). Thử $p=5 \\Rightarrow 5^2-1=24$ (chia hết cho 3). Thử $p=2 \\Rightarrow 2^2-1=3$ (chia hết cho 3). Cả 5 và 2 đều thỏa mãn. Chọn D." },
{ q_title: "Câu 11", q_content: "Xét 3 mệnh đề sau về Hình học suy luận (Tiên đề Euclid):<br>(I) Nếu đường thẳng&nbsp;$c$&nbsp;cắt hai đường thẳng&nbsp;$a, b$&nbsp;tạo thành hai góc đồng vị bằng nhau thì&nbsp;$a \\parallel b$.<br>(II) Hai đường thẳng cắt nhau tạo thành 4 cặp góc đối đỉnh.<br>(III) Hai góc trong cùng phía thì luôn luôn bù nhau (tổng bằng $180^{\\circ}$) trong mọi trường hợp cắt nhau.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 1, explain: "(I) Đúng, đây là dấu hiệu nhận biết song song. (II) Sai, hai đường thẳng cắt nhau chỉ tạo ra đúng 2 cặp góc đối đỉnh. (III) Sai, chúng chỉ bù nhau KHI VÀ CHỈ KHI hai đường thẳng đó song song. Có 1 mệnh đề đúng. Chọn B." },

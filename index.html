{ q_title: "Câu 1", q_content: "Giá trị của biểu thức&nbsp;$(-2)^4 \\cdot \\dfrac{5}{16}$&nbsp;là:", options: ["A. $5$", "B. $-5$", "C. $\\dfrac{5}{2}$", "D. $\\dfrac{-5}{2}$"], correct_idx: 0, explain: "Ta có:&nbsp;$(-2)^4 = 16$. Thay vào biểu thức ta được:&nbsp;$16 \\cdot \\dfrac{5}{16} = 5$. Chọn A." },
{ q_title: "Câu 2", q_content: "Ước chung lớn nhất (ƯCLN) của&nbsp;$24$&nbsp;và&nbsp;$36$&nbsp;là:", options: ["A. $6$", "B. $12$", "C. $72$", "D. $4$"], correct_idx: 1, explain: "Ta phân tích ra thừa số nguyên tố:&nbsp;$24 = 2^3 \\cdot 3$;&nbsp;$36 = 2^2 \\cdot 3^2$. Vậy&nbsp;$\\text{ƯCLN}(24, 36) = 2^2 \\cdot 3 = 12$. Chọn B." },
{ q_title: "Câu 3", q_content: "Tỉ số phần trăm của&nbsp;$20$&nbsp;phút và&nbsp;$2$&nbsp;giờ là:", options: ["A. $10\\%$", "B. $100\\%$", "C. $16,67\\%$", "D. $\\dfrac{1}{6}\\%$"], correct_idx: 2, explain: "Đổi&nbsp;$2$&nbsp;giờ =&nbsp;$120$&nbsp;phút. Tỉ số phần trăm là:&nbsp;$\\dfrac{20}{120} \\cdot 100\\% = \\dfrac{1}{6} \\cdot 100\\% \\approx 16,67\\%$. Chọn C." },
{ q_title: "Câu 4", q_content: "Kết quả của phép tính&nbsp;$\\dfrac{3}{5} + \\dfrac{-1}{4} - \\dfrac{7}{20}$&nbsp;là:", options: ["A. $0$", "B. $1$", "C. $\\dfrac{1}{10}$", "D. $\\dfrac{-1}{20}$"], correct_idx: 0, explain: "Quy đồng mẫu số chung là&nbsp;$20$, ta có:&nbsp;$\\dfrac{12}{20} - \\dfrac{5}{20} - \\dfrac{7}{20} = \\dfrac{12 - 5 - 7}{20} = 0$. Chọn A." },
{ q_title: "Câu 5", q_content: "Tập hợp các số nguyên&nbsp;$x$&nbsp;thỏa mãn&nbsp;$-3 \\le x < 2$&nbsp;có tổng các phần tử bằng:", options: ["A. $-3$", "B. $-5$", "C. $0$", "D. $-2$"], correct_idx: 1, explain: "Các số nguyên thỏa mãn là:&nbsp;$-3, -2, -1, 0, 1$. Tổng của chúng là:&nbsp;$-3 + (-2) + (-1) + 0 + 1 = -5$. Chọn B." },
{ q_title: "Câu 6", q_content: "Trong một khảo sát về nhiệt độ (độ C) của các ngày trong tuần mùa đông, dãy dữ liệu thu được là:&nbsp;$15; 14; 16; 100; 12; 15$. Dữ liệu không hợp lý là:", options: ["A. $15$", "B. $12$", "C. $100$", "D. Không có"], correct_idx: 2, explain: "Nhiệt độ thời tiết trong mùa đông không thể đạt tới&nbsp;$100^{\\circ}\\text{C}$&nbsp;(nhiệt độ nước sôi). Do đó, con số&nbsp;$100$&nbsp;là dữ liệu hoàn toàn vô lý do ghi chép sai. Chọn C." },
{ q_title: "Câu 7", q_content: "Nếu điểm&nbsp;$M$&nbsp;thuộc đoạn thẳng&nbsp;$AB$, biết&nbsp;$AM = 3\\text{ cm}, AB = 8\\text{ cm}$. Độ dài đoạn&nbsp;$MB$&nbsp;là:", options: ["A. $11\\text{ cm}$", "B. $5\\text{ cm}$", "C. $2,5\\text{ cm}$", "D. Không tính được"], correct_idx: 1, explain: "Vì&nbsp;$M$&nbsp;thuộc đoạn thẳng&nbsp;$AB$&nbsp;nên&nbsp;$M$&nbsp;nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$. Ta có:&nbsp;$AM + MB = AB \\Rightarrow 3 + MB = 8 \\Rightarrow MB = 5\\text{ cm}$. Chọn B." },
{ q_title: "Câu 8", q_content: "Hai góc&nbsp;$\\angle A$&nbsp;và&nbsp;$\\angle B$&nbsp;là hai góc bù nhau. Biết&nbsp;$\\angle A = 50^{\\circ}$, số đo&nbsp;$\\angle B$&nbsp;là:", options: ["A. $40^{\\circ}$", "B. $130^{\\circ}$", "C. $50^{\\circ}$", "D. $180^{\\circ}$"], correct_idx: 1, explain: "Hai góc bù nhau có tổng số đo bằng&nbsp;$180^{\\circ}$. Vậy&nbsp;$\\angle B = 180^{\\circ} - 50^{\\circ} = 130^{\\circ}$. Chọn B." },
{ q_title: "Câu 9", q_content: "Có bao nhiêu số nguyên tố có một chữ số?", options: ["A. 3", "B. 4", "C. 5", "D. 6"], correct_idx: 1, explain: "Các số nguyên tố có một chữ số bao gồm:&nbsp;$2, 3, 5, 7$. Tổng cộng có 4 số. Chọn B." },
{ q_title: "Câu 10", q_content: "Có&nbsp;$5$&nbsp;điểm phân biệt cùng nằm trên một đường thẳng. Số đoạn thẳng tạo thành từ các điểm đó là:", options: ["A. 5", "B. 10", "C. 20", "D. 15"], correct_idx: 1, explain: "Cứ 2 điểm tạo thành 1 đoạn thẳng. Số đoạn thẳng được tạo ra từ 5 điểm phân biệt là&nbsp;$\\dfrac{5 \\cdot 4}{2} = 10$. Chọn B." },
{ q_title: "Câu 11", q_content: "Cho tổng&nbsp;$A = 2 + 2^2 + 2^3 + \\dots + 2^{20}$. Xét 3 mệnh đề sau:<br>(I) Dãy số trên có&nbsp;$20$&nbsp;số hạng.<br>(II) Tổng&nbsp;$A$&nbsp;chia hết cho&nbsp;$6$.<br>(III) Biểu thức&nbsp;$A + 2$&nbsp;có giá trị bằng&nbsp;$2^{21}$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 3, explain: "(I) Số mũ chạy từ 1 đến 20 nên có 20 số hạng (Đúng). (II) Nhóm các cặp liên tiếp:&nbsp;$(2+2^2) + \\dots = 6 + 2^2(6) + \\dots$&nbsp;luôn chia hết cho 6 (Đúng). (III) Ta có&nbsp;$2A = 2^2 + 2^3 + \\dots + 2^{21} \\Rightarrow A = 2A - A = 2^{21} - 2 \\Rightarrow A+2 = 2^{21}$&nbsp;(Đúng). Có 3 mệnh đề đúng. Chọn D." },
{ q_title: "Câu 12", q_content: "Cho đường thẳng&nbsp;$xy$&nbsp;và điểm&nbsp;$O$&nbsp;thuộc&nbsp;$xy$. Lấy điểm&nbsp;$A \\in Ox$, điểm&nbsp;$B \\in Oy$. Xét 3 mệnh đề sau:<br>(I) Điểm&nbsp;$O$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$.<br>(II) Hai tia&nbsp;$OA$&nbsp;và&nbsp;$OB$&nbsp;là hai tia đối nhau.<br>(III) Nếu&nbsp;$M$&nbsp;là trung điểm của&nbsp;$OA$&nbsp;thì&nbsp;$M$&nbsp;cũng thuộc tia&nbsp;$Ox$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Chưa thể khẳng định là trung điểm vì đề chưa cho điều kiện khoảng cách $OA = OB$ (Sai). (II) O thuộc đường thẳng xy nên chia làm 2 tia đối nhau Ox, Oy. Vì A thuộc Ox, B thuộc Oy nên OA và OB là 2 tia đối nhau (Đúng). (III) M nằm giữa O và A nên M thuộc tia OA, mà tia OA trùng tia Ox nên M thuộc tia Ox (Đúng). Có 2 mệnh đề đúng. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (3,0 điểm)", t_content: "a) Thực hiện phép tính hợp lý:&nbsp;$B = \\dfrac{7}{19} \\cdot \\dfrac{5}{13} + \\dfrac{7}{19} \\cdot \\dfrac{8}{13} - 1\\dfrac{7}{19}$<div class='mt-6'>b) (Thống kê & Thiết lập biểu đồ) Kết quả bài kiểm tra môn Toán của lớp 6A được giáo viên thống kê như sau: Số bài điểm Giỏi là 10, Khá là 15, Trung bình là 10, Yếu là 5.<br>Tính tỉ số phần trăm của số bài thi đạt điểm Khá so với tổng số bài thi của cả lớp. Em hãy vẽ biểu đồ cột biểu diễn số lượng bài thi theo từng mức điểm.</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Quan sát 2 hạng tử đầu, thừa số nào chung? (Là&nbsp;$\\dfrac{7}{19}$).<br>- <b>Where:</b> Bẫy ở hạng tử thứ 3 là hỗn số&nbsp;$1\\dfrac{7}{19}$. Không thể đặt nhân tử chung cho nó được. Hãy cứ gom 2 cái đầu trước, rồi đổi hỗn số cuối ra phân số để trừ.<br>- <b>How:</b> Áp dụng tính chất phân phối. Tổng trong ngoặc sẽ cực kỳ tròn trịa ($=1$).<br><b>Ý b:</b><br>- <b>What:</b> Bài toán thống kê thực tế kết hợp vẽ biểu đồ.<br>- <b>How:</b><br>&nbsp; - Bước 1: Tính tổng số học sinh (cộng 4 dữ kiện lại).<br>&nbsp; - Bước 2: Lập tỉ số phần trăm cho học sinh Khá.<br>&nbsp; - Bước 3: Dựng trục tọa độ vuông góc. Trục ngang là mức điểm, trục dọc là số lượng. Vẽ các cột rời nhau với độ cao tương ứng.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$B$:</b></li><li class='ml-4'>Đặt nhân tử chung cho 2 hạng tử đầu tiên và đổi hỗn số ở hạng tử cuối ra phân số:</li><li class='ml-8'>$B = \\dfrac{7}{19} \\cdot \\left( \\dfrac{5}{13} + \\dfrac{8}{13} \\right) - \\dfrac{26}{19}$</li><li class='ml-4'>Tính toán trong dấu ngoặc:</li><li class='ml-8'>$B = \\dfrac{7}{19} \\cdot \\dfrac{13}{13} - \\dfrac{26}{19}$</li><li class='ml-8'>$B = \\dfrac{7}{19} \\cdot 1 - \\dfrac{26}{19}$</li><li class='ml-4'>Thực hiện phép trừ hai phân số cùng mẫu:</li><li class='ml-8'>$B = \\dfrac{7 - 26}{19} = \\dfrac{-19}{19} = -1$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $B = -1$.</li><li><b>b) Thống kê và Vẽ biểu đồ:</b></li><li class='ml-4'>Tổng số bài thi của cả lớp 6A là:</li><li class='ml-8'>$10 + 15 + 10 + 5 = 40$&nbsp;(bài)</li><li class='ml-4'>Tỉ số phần trăm của số bài thi đạt điểm Khá so với tổng số bài thi là:</li><li class='ml-8'>$\\dfrac{15}{40} \\cdot 100\\% = \\dfrac{3}{8} \\cdot 100\\% = 37,5\\%$</li><li class='ml-4'><b>Vẽ biểu đồ cột:</b> <i>(Học sinh tự vẽ vào vở theo các hướng dẫn sau)</i></li><li class='ml-8'>- <b>Tên biểu đồ:</b> Kết quả bài kiểm tra môn Toán lớp 6A.</li><li class='ml-8'>- <b>Trục hoành (Ngang):</b> Ghi 4 loại điểm: Giỏi, Khá, Trung bình, Yếu.</li><li class='ml-8'>- <b>Trục tung (Dọc):</b> Thể hiện số lượng bài. Đánh các vạch cách đều: $0, 5, 10, 15, 20$.</li><li class='ml-8'>- <b>Vẽ cột:</b> Vẽ 4 cột hình chữ nhật có độ rộng bằng nhau. Cột Giỏi cao đến vạch 10. Cột Khá cao đến vạch 15. Cột TB cao đến vạch 10. Cột Yếu cao đến vạch 5.</li>" },
{ t_title: "Câu 2 (3,0 điểm)", t_content: "a) Tìm số tự nhiên&nbsp;$x$, biết:&nbsp;$(3x - 1)^3 = 125$<div class='mt-6'>b) Chứng minh rằng với mọi số tự nhiên&nbsp;$n$, phân số&nbsp;$P = \\dfrac{15n + 2}{20n + 3}$&nbsp;luôn là phân số tối giản.</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Phương trình dạng&nbsp;$A^3 = B$.<br>- <b>How:</b> Cần đưa số&nbsp;$125$&nbsp;về dạng lập phương của một số tự nhiên (Đó là&nbsp;$5^3$).<br>- <b>Why:</b> Vì số mũ là số lẻ ($3$), nên ta chỉ có đúng 1 trường hợp khi bỏ mũ (không phải xét cả trường hợp âm dương như mũ chẵn).<br><b>Ý b:</b><br>- <b>What:</b> Chứng minh Ước chung lớn nhất ($d$) của tử và mẫu bằng $1$.<br>- <b>How:</b> Sử dụng kỹ thuật \"nhân chéo hệ số\". Tử chứa $15n$, mẫu chứa $20n$. Bội chung nhỏ nhất của $15$ và $20$ là $60$.<br>- Vậy ta cần nhân biểu thức tử với $4$, nhân biểu thức mẫu với $3$ để làm xuất hiện $60n$, sau đó trừ đi là biến $n$ bốc hơi.", solution: "<li><b>a) Tìm số tự nhiên&nbsp;$x$:</b></li><li class='ml-4'>Từ phương trình:</li><li class='ml-8'>$(3x - 1)^3 = 125$</li><li class='ml-4'>Đưa vế phải về dạng lập phương:</li><li class='ml-8'>$(3x - 1)^3 = 5^3$</li><li class='ml-4'>Vì số mũ lẻ, ta suy ra phương trình bậc nhất:</li><li class='ml-8'>$3x - 1 = 5$</li><li class='ml-8'>$3x = 5 + 1 = 6$</li><li class='ml-8'>$x = 6 : 3 = 2$</li><li class='ml-4'>Vì $x = 2$ là số tự nhiên, nên thỏa mãn điều kiện đề bài.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = 2$.</li><li><b>b) Chứng minh phân số tối giản:</b></li><li class='ml-4'>Gọi $d = \\text{ƯCLN}(15n+2, 20n+3)$ với $d \\in \\mathbb{N}^*$.</li><li class='ml-4'>Khi đó, tử số và mẫu số đều phải chia hết cho $d$:</li><li class='ml-8'>$(15n + 2) \\vdots d \\Rightarrow 4 \\cdot (15n + 2) \\vdots d \\Rightarrow (60n + 8) \\vdots d$</li><li class='ml-8'>$(20n + 3) \\vdots d \\Rightarrow 3 \\cdot (20n + 3) \\vdots d \\Rightarrow (60n + 9) \\vdots d$</li><li class='ml-4'>Lấy biểu thức thứ hai trừ đi biểu thức thứ nhất, hiệu của chúng cũng phải chia hết cho $d$:</li><li class='ml-8'>$[(60n + 9) - (60n + 8)] \\vdots d$</li><li class='ml-8'>$\\Rightarrow 1 \\vdots d$</li><li class='ml-4'>Vì $d$ là số nguyên dương và $1$ chia hết cho $d$ nên bắt buộc: $d = 1$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận b: Vì ƯCLN của tử và mẫu luôn bằng 1, nên phân số $P$ luôn là phân số tối giản với mọi số tự nhiên $n$.</li>" },
{ t_title: "Câu 3 (2,5 điểm)", t_content: "Hai người thợ cùng làm chung một công việc thì sau&nbsp;$6$&nbsp;giờ sẽ hoàn thành. Nếu người thứ nhất làm một mình thì mất&nbsp;$10$&nbsp;giờ mới xong công việc.<div class='mt-6'>a) Hỏi trong&nbsp;$1$&nbsp;giờ, người thứ hai làm được bao nhiêu phần công việc?</div><div class='mt-6'>b) Giả sử lúc đầu người thứ nhất làm một mình trong&nbsp;$4$&nbsp;giờ, sau đó người thứ hai đến làm cùng. Hỏi cả hai người phải làm chung thêm bao lâu nữa thì mới hoàn thành toàn bộ công việc?</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Bài toán \"Công việc chung - riêng\". Cần tìm năng suất (phần công việc làm trong 1 giờ) của người thứ 2.<br>- <b>How:</b> Quy toàn bộ công việc là $1$ đơn vị. Đề đã cho Năng suất chung (làm trong 6 giờ) và Năng suất người 1 (làm trong 10 giờ). Muốn tìm Năng suất người 2, ta lấy Năng suất chung TRỪ ĐI Năng suất người 1.<br><b>Ý b:</b><br>- <b>What:</b> Dạng toán chạy tiếp sức. Người 1 làm trước 4 giờ.<br>- <b>How:</b><br>&nbsp; - Bước 1: Tính xem trong 4 giờ đầu, người 1 đã làm được \"bao nhiêu phần\" công việc.<br>&nbsp; - Bước 2: Tính \"Phần công việc CÒN LẠI\".<br>&nbsp; - Bước 3: Lấy phần công việc còn lại CHIA cho Năng suất CHUNG của cả 2 người sẽ ra thời gian cần tìm.", solution: "<li>Quy ước toàn bộ khối lượng công việc là $1$ đơn vị.</li><li><b>a) Tính năng suất của người thứ hai:</b></li><li class='ml-4'>Trong $1$ giờ, cả hai người làm chung được:</li><li class='ml-8'>$1 : 6 = \\dfrac{1}{6}$&nbsp;(công việc).</li><li class='ml-4'>Trong $1$ giờ, người thứ nhất làm một mình được:</li><li class='ml-8'>$1 : 10 = \\dfrac{1}{10}$&nbsp;(công việc).</li><li class='ml-4'>Trong $1$ giờ, người thứ hai làm một mình được (lấy Năng suất chung trừ Năng suất 1):</li><li class='ml-8'>$\\dfrac{1}{6} - \\dfrac{1}{10} = \\dfrac{5}{30} - \\dfrac{3}{30} = \\dfrac{2}{30} = \\dfrac{1}{15}$&nbsp;(công việc).</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Người thứ hai làm được $\\dfrac{1}{15}$ công việc.</li><li><b>b) Tính thời gian làm chung phần còn lại:</b></li><li class='ml-4'>Lượng công việc mà người thứ nhất đã làm được trong $4$ giờ đầu là:</li><li class='ml-8'>$4 \\cdot \\dfrac{1}{10} = \\dfrac{4}{10} = \\dfrac{2}{5}$&nbsp;(công việc).</li><li class='ml-4'>Phần công việc CÒN LẠI cần cả hai người làm chung là:</li><li class='ml-8'>$1 - \\dfrac{2}{5} = \\dfrac{3}{5}$&nbsp;(công việc).</li><li class='ml-4'>Thời gian để cả hai người làm chung hoàn thành phần công việc còn lại đó là (Lấy Khối lượng chia Năng suất chung):</li><li class='ml-8'>$\\dfrac{3}{5} : \\dfrac{1}{6} = \\dfrac{3}{5} \\cdot 6 = \\dfrac{18}{5} = 3,6$&nbsp;(giờ).</li><li class='ml-4'>Đổi $3,6$ giờ =&nbsp;$3$&nbsp;giờ&nbsp;$36$&nbsp;phút.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Phải làm chung thêm $3$ giờ $36$ phút.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Vẽ tia&nbsp;$Ox$. Lấy hai điểm&nbsp;$M, N$&nbsp;thuộc tia&nbsp;$Ox$&nbsp;sao cho&nbsp;$OM = 4\\text{ cm}, ON = 8\\text{ cm}$.<div class='mt-6'>a) Điểm&nbsp;$M$&nbsp;có nằm giữa hai điểm&nbsp;$O$&nbsp;và&nbsp;$N$&nbsp;không? Tính độ dài đoạn thẳng&nbsp;$MN$.</div><div class='mt-6'>b) Chứng tỏ&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$ON$.</div><div class='mt-6'>c) Vẽ tia đối của tia&nbsp;$Ox$&nbsp;là tia&nbsp;$Oy$. Lấy điểm&nbsp;$P$&nbsp;thuộc tia&nbsp;$Oy$&nbsp;sao cho&nbsp;$OP = 2\\text{ cm}$. Tính độ dài đoạn thẳng&nbsp;$PN$.</div><div class='flex justify-center my-8'><svg width='350' height='70' viewBox='0 0 350 70'><line x1='10' y1='40' x2='340' y2='40' stroke='black' stroke-width='1.5'/><circle cx='80' cy='40' r='3' fill='black'/><text x='75' y='60' font-size='14'>P</text><circle cx='140' cy='40' r='3' fill='black'/><text x='135' y='60' font-size='14'>O</text><circle cx='220' cy='40' r='3' fill='red'/><text x='215' y='60' font-size='14' fill='red'>M</text><circle cx='300' cy='40' r='3' fill='black'/><text x='295' y='60' font-size='14'>N</text><text x='330' y='30' font-size='14' font-style='italic'>x</text><text x='20' y='30' font-size='14' font-style='italic'>y</text><path d='M 140 25 L 140 15 L 220 15 L 220 25' fill='none' stroke='blue' stroke-width='0.5'/><text x='170' y='10' font-size='11' fill='blue'>4cm</text><path d='M 220 25 L 220 15 L 300 15 L 300 25' fill='none' stroke='green' stroke-width='0.5'/><text x='250' y='10' font-size='11' fill='green'>4cm</text><path d='M 80 25 L 80 15 L 140 15 L 140 25' fill='none' stroke='gray' stroke-width='0.5'/><text x='100' y='10' font-size='11' fill='gray'>2cm</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Cho 2 điểm cùng nằm trên tia $Ox$. Làm sao để biết ai nằm giữa?<br>- <b>How:</b> Cứ nhớ quy tắc \"Khoảng cách ngắn hơn thì nằm giữa gốc và điểm xa hơn\". Lấy $OM$ so sánh với $ON$. Tính $MN$ bằng phép trừ đoạn thẳng.<br><b>Ý b:</b><br>- <b>What:</b> Cần chứng minh $M$ là trung điểm của $ON$.<br>- <b>How:</b> Phải hội đủ 2 điều kiện: Nằm giữa (đã có ở câu a) và Cách đều ($OM = MN$). Hãy kiểm tra lại số liệu độ dài.<br><b>Ý c:</b><br>- <b>What:</b> $P$ nằm trên tia đối của tia $Ox$.<br>- <b>Why:</b> Khi $N$ thuộc tia $Ox$, $P$ thuộc tia $Oy$ (là tia đối $Ox$) thì gốc $O$ chắc chắn nằm kẹp giữa $P$ và $N$.<br>- <b>How:</b> Áp dụng hệ thức cộng đoạn thẳng: $PN = OP + ON$.", solution: "<li><b>a) Điểm nằm giữa và tính độ dài&nbsp;$MN$:</b></li><li class='ml-4'>Trên cùng một tia $Ox$, ta có khoảng cách từ gốc $O$ là: $OM = 4\\text{ cm}$ và $ON = 8\\text{ cm}$.</li><li class='ml-4'>Vì $OM < ON$ ($4 < 8$) nên <b>điểm&nbsp;$M$&nbsp;nằm giữa hai điểm&nbsp;$O$&nbsp;và&nbsp;$N$</b>.</li><li class='ml-4'>Khi đó, ta có hệ thức cộng đoạn thẳng:</li><li class='ml-8'>$OM + MN = ON$</li><li class='ml-8'>$4 + MN = 8$</li><li class='ml-8'>$MN = 8 - 4 = 4\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $MN = 4\\text{ cm}$.</li><li><b>b) Chứng tỏ&nbsp;$M$&nbsp;là trung điểm&nbsp;$ON$:</b></li><li class='ml-4'>Ta xét hai điều kiện sau:</li><li class='ml-8'>- Điểm $M$ nằm giữa hai điểm $O$ và $N$ (theo chứng minh ở câu a).</li><li class='ml-8'>- Về độ dài, ta có $OM = 4\\text{ cm}$ và $MN = 4\\text{ cm}$. Suy ra $\\mathbf{OM = MN}$.</li><li class='ml-4'>Từ hai điều kiện trên, ta khẳng định: <b>Điểm&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$ON$</b>. (Điều phải chứng minh).</li><li><b>c) Tính độ dài đoạn thẳng&nbsp;$PN$:</b></li><li class='ml-4'>Theo giả thiết, tia $Oy$ là tia đối của tia $Ox$.</li><li class='ml-4'>Vì điểm $P$ thuộc tia $Oy$ và điểm $N$ thuộc tia $Ox$, nên hai điểm $P$ và $N$ nằm trên hai tia đối nhau có chung gốc $O$.</li><li class='ml-4'>Do đó, <b>điểm&nbsp;$O$&nbsp;nằm giữa hai điểm&nbsp;$P$&nbsp;và&nbsp;$N$</b>.</li><li class='ml-4'>Áp dụng hệ thức cộng đoạn thẳng, ta có:</li><li class='ml-8'>$PN = OP + ON$</li><li class='ml-8'>$PN = 2 + 8 = 10\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số c: $PN = 10\\text{ cm}$.</li>" },
{ t_title: "Câu 5 (1,0 điểm)", t_content: "(Bất đẳng thức phân số) Chứng minh rằng tổng sau luôn nhỏ hơn $1$:<br>$S = \\dfrac{1}{2^2} + \\dfrac{1}{3^2} + \\dfrac{1}{4^2} + \\dots + \\dfrac{1}{100^2}$", lines_needed: 8, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Chứng minh chuỗi tổng các phân số bình phương nhỏ hơn $1$. Ta không thể quy đồng tính tổng này.<br>- <b>Why:</b> Vì mẫu số là $n^2$, nó không tạo ra quy luật triệt tiêu. Ta phải \"làm trội\" (tạo ra một chuỗi lớn hơn) bằng cách giảm mẫu số xuống thành tích hai số liên tiếp $n(n-1)$.<br>- <b>How:</b> Sử dụng bất đẳng thức làm trội: $\\dfrac{1}{n^2} < \\dfrac{1}{(n-1) \\cdot n}$. Khi đó, phân số được tách thành $\\dfrac{1}{n-1} - \\dfrac{1}{n}$ và triệt tiêu sạch sẽ theo quy luật chuỗi sai phân.", solution: "<li>Xét từng số hạng của biểu thức $S$, ta áp dụng bất đẳng thức làm trội $\\dfrac{1}{n^2} < \\dfrac{1}{(n-1) \\cdot n}$ với mọi số tự nhiên $n \\ge 2$:</li><li class='ml-4'>$\\dfrac{1}{2^2} = \\dfrac{1}{2 \\cdot 2} < \\dfrac{1}{1 \\cdot 2} = \\dfrac{1}{1} - \\dfrac{1}{2}$</li><li class='ml-4'>$\\dfrac{1}{3^2} = \\dfrac{1}{3 \\cdot 3} < \\dfrac{1}{2 \\cdot 3} = \\dfrac{1}{2} - \\dfrac{1}{3}$</li><li class='ml-4'>$\\dfrac{1}{4^2} = \\dfrac{1}{4 \\cdot 4} < \\dfrac{1}{3 \\cdot 4} = \\dfrac{1}{3} - \\dfrac{1}{4}$</li><li class='ml-4'>$\\dots$</li><li class='ml-4'>$\\dfrac{1}{100^2} = \\dfrac{1}{100 \\cdot 100} < \\dfrac{1}{99 \\cdot 100} = \\dfrac{1}{99} - \\dfrac{1}{100}$</li><li>Cộng vế theo vế tất cả các bất đẳng thức trên, ta thu được một tổng mới chắc chắn lớn hơn $S$:</li><li class='ml-4'>$S < \\left( \\dfrac{1}{1} - \\dfrac{1}{2} \\right) + \\left( \\dfrac{1}{2} - \\dfrac{1}{3} \\right) + \\left( \\dfrac{1}{3} - \\dfrac{1}{4} \\right) + \\dots + \\left( \\dfrac{1}{99} - \\dfrac{1}{100} \\right)$</li><li>Bỏ dấu ngoặc và triệt tiêu các phân số có dấu trái ngược nhau ở phần giữa chuỗi:</li><li class='ml-4'>$S < 1 - \\dfrac{1}{100}$</li><li>Thực hiện phép trừ:</li><li class='ml-4'>$S < \\dfrac{99}{100}$</li><li>Rõ ràng phân số $\\dfrac{99}{100}$ có tử số nhỏ hơn mẫu số nên nó nhỏ hơn $1$. Theo tính chất bắc cầu, ta có:</li><li class='ml-4'>$S < 1$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Bất đẳng thức được chứng minh.</li>" }
]
});
</script>

id: 20, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 20", icon: "🔥", color: "purple", level: "Học sinh giỏi", time: "150 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Trong một cuộc điều tra về chiều cao (tính bằng cm) của các bạn học sinh nam lớp 6A, lớp trưởng thu được dãy dữ liệu sau:&nbsp;$145; 150; 152; 25; 148; 155$. Dữ liệu không hợp lý trong dãy là:", options: ["A. 145", "B. 155", "C. 25", "D. Không có dữ liệu sai"], correct_idx: 2, explain: "Chiều cao trung bình của học sinh lớp 6 thường dao động từ&nbsp;$140\\text{cm}$&nbsp;đến&nbsp;$160\\text{cm}$. Con số&nbsp;$25\\text{cm}$&nbsp;là quá thấp (chỉ bằng gang tay), do đó đây là dữ liệu vô lý do nhập sai. Chọn C." },
{ q_title: "Câu 2", q_content: "Nếu tung một đồng xu cân đối&nbsp;$40$&nbsp;lần liên tiếp và thấy có&nbsp;$24$&nbsp;lần xuất hiện mặt Sấp (S). Xác suất thực nghiệm của sự kiện 'Xuất hiện mặt Ngửa (N)' là:", options: ["A. $\\dfrac{3}{5}$", "B. $\\dfrac{2}{5}$", "C. $\\dfrac{5}{8}$", "D. $\\dfrac{1}{24}$"], correct_idx: 1, explain: "Số lần xuất hiện mặt Ngửa là:&nbsp;$40 - 24 = 16$&nbsp;(lần). Xác suất thực nghiệm mặt Ngửa là:&nbsp;$\\dfrac{16}{40} = \\dfrac{2}{5}$. Chọn B." },
{ q_title: "Câu 3", q_content: "Khẳng định nào sau đây là SAI khi nói về số chính phương?", options: ["A. Không bao giờ có chữ số tận cùng là 2, 3, 7, 8.", "B. Khi chia cho 3 chỉ có thể dư 0 hoặc 1.", "C. Một số chính phương luôn là một số chẵn.", "D. Bình phương của mọi số tự nhiên đều là số chính phương."], correct_idx: 2, explain: "Số chính phương có thể là số chẵn (ví dụ&nbsp;$4=2^2, 16=4^2$) hoặc là số lẻ (ví dụ&nbsp;$9=3^2, 25=5^2$). Khẳng định C sai. Chọn C." },
{ q_title: "Câu 4", q_content: "Tỉ số phần trăm của&nbsp;$5$&nbsp;và&nbsp;$20$&nbsp;là:", options: ["A. $25\\%$", "B. $20\\%$", "C. $400\\%$", "D. $4\\%$"], correct_idx: 0, explain: "Tỉ số phần trăm là:&nbsp;$\\dfrac{5}{20} \\cdot 100\\% = \\dfrac{1}{4} \\cdot 100\\% = 25\\%$. Chọn A." },
{ q_title: "Câu 5", q_content: "Một học sinh có nhịp thở trung bình là&nbsp;$16$&nbsp;lần/phút. Hỏi trong một tiết học kéo dài&nbsp;$45$&nbsp;phút, học sinh đó đã hít thở bao nhiêu lần?", options: ["A. 600 lần", "B. 450 lần", "C. 720 lần", "D. 900 lần"], correct_idx: 2, explain: "Số lần hít thở trong 1 tiết học là:&nbsp;$16 \\cdot 45 = 720$&nbsp;(lần). Chọn C." },
{ q_title: "Câu 6", q_content: "Số thập phân âm lớn nhất trong các số&nbsp;$-12,05; -12,5; -12,005; -12,50$&nbsp;là:", options: ["A. $-12,5$", "B. $-12,05$", "C. $-12,50$", "D. $-12,005$"], correct_idx: 3, explain: "So sánh phần số đối:&nbsp;$12,005 < 12,05 < 12,5 = 12,50$. Số thập phân âm có phần số đối càng nhỏ thì giá trị thực tế càng lớn. Vậy số lớn nhất là&nbsp;$-12,005$. Chọn D." },
{ q_title: "Câu 7", q_content: "Rút gọn biểu thức&nbsp;$A = \\dfrac{2^5 \\cdot 3^4}{2^6 \\cdot 3^3}$&nbsp;ta được phân số tối giản là:", options: ["A. $\\dfrac{3}{2}$", "B. $\\dfrac{2}{3}$", "C. $\\dfrac{1}{6}$", "D. $\\dfrac{9}{4}$"], correct_idx: 0, explain: "Triệt tiêu các lũy thừa cùng cơ số ở tử và mẫu:&nbsp;$\\dfrac{2^5}{2^6} = \\dfrac{1}{2}$&nbsp;và&nbsp;$\\dfrac{3^4}{3^3} = 3$. Kết quả là&nbsp;$\\dfrac{3}{2}$. Chọn A." },
{ q_title: "Câu 8", q_content: "Qua&nbsp;$4$&nbsp;điểm phân biệt trong đó không có&nbsp;$3$&nbsp;điểm nào thẳng hàng, số đường thẳng vẽ được đi qua các cặp điểm là:", options: ["A. 4", "B. 8", "C. 6", "D. 12"], correct_idx: 2, explain: "Số đường thẳng đi qua các cặp điểm từ&nbsp;$n$&nbsp;điểm không thẳng hàng là&nbsp;$\\dfrac{n(n-1)}{2} = \\dfrac{4 \\cdot 3}{2} = 6$. Chọn C." },
{ q_title: "Câu 9", q_content: "Cho&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$. Biết&nbsp;$AM = 4\\text{ cm}$. Độ dài đoạn thẳng&nbsp;$AB$&nbsp;là:", options: ["A. $2\\text{ cm}$", "B. $4\\text{ cm}$", "C. $8\\text{ cm}$", "D. $6\\text{ cm}$"], correct_idx: 2, explain: "Vì&nbsp;$M$&nbsp;là trung điểm của&nbsp;$AB$&nbsp;nên&nbsp;$AB = 2 \\cdot AM = 2 \\cdot 4 = 8\\text{ cm}$. Chọn C." },
{ q_title: "Câu 10", q_content: "Hai góc kề bù có tổng số đo bằng bao nhiêu?", options: ["A. $90^{\\circ}$", "B. $180^{\\circ}$", "C. $360^{\\circ}$", "D. $0^{\\circ}$"], correct_idx: 1, explain: "Hai góc kề bù là hai góc vừa kề nhau vừa bù nhau. Tổng số đo của chúng luôn bằng&nbsp;$180^{\\circ}$. Chọn B." },
{ q_title: "Câu 11", q_content: "Trong một trò chơi, người ta rút ngẫu nhiên&nbsp;$1$&nbsp;chiếc thẻ từ hộp chứa&nbsp;$10$&nbsp;chiếc thẻ đánh số từ 1 đến 10, rồi trả lại vào hộp. Sau&nbsp;$25$&nbsp;lần rút, thấy có&nbsp;$4$&nbsp;lần được thẻ số 6. Xét 3 mệnh đề sau:<br>(I) Tập hợp các kết quả có thể xảy ra trong 1 lần rút thẻ có 10 phần tử.<br>(II) Xác suất thực nghiệm của sự kiện 'Rút được thẻ số 6' là&nbsp;$\\dfrac{4}{25}$.<br>(III) Nếu thực hiện rút thẻ lần thứ 26, chắc chắn sẽ rút được thẻ số 6.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Các kết quả có thể là {1; 2; ...; 10} gồm 10 phần tử (Đúng). (II) XS thực nghiệm = 4/25 (Đúng). (III) Xác suất thực nghiệm không đảm bảo chắc chắn kết quả của lần gieo trong tương lai, mọi thẻ đều có cơ hội (Sai). Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Cho đường thẳng&nbsp;$xy$&nbsp;và điểm&nbsp;$O \\in xy$. Lấy điểm&nbsp;$A \\in Ox$, điểm&nbsp;$B \\in Oy$. Xét 3 mệnh đề sau:<br>(I) Điểm&nbsp;$O$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$.<br>(II) Hai tia&nbsp;$OA$&nbsp;và&nbsp;$OB$&nbsp;là hai tia đối nhau.<br>(III) Nếu&nbsp;$M$&nbsp;là trung điểm của&nbsp;$OA$&nbsp;thì&nbsp;$M$&nbsp;cũng thuộc tia&nbsp;$Ox$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Thiếu điều kiện OA = OB nên chưa chắc là trung điểm (Sai). (II) Vì A thuộc Ox, B thuộc Oy mà Ox, Oy là 2 tia đối nhau nên OA và OB là 2 tia đối nhau (Đúng). (III) M nằm giữa O và A nên M thuộc tia OA, mà tia OA trùng với tia Ox nên M thuộc tia Ox (Đúng). Có 2 mệnh đề đúng. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (2,0 điểm)", t_content: "Tính hợp lý giá trị của các biểu thức sau:<div class='mt-6'>a) &nbsp; $A = 70 \\cdot \\left( \\dfrac{121212}{565656} + \\dfrac{121212}{727272} + \\dfrac{121212}{909090} \\right)$</div><div class='mt-6'>b) &nbsp; $B = \\dfrac{1}{2 \\cdot 5} + \\dfrac{1}{5 \\cdot 8} + \\dfrac{1}{8 \\cdot 11} + \\dots + \\dfrac{1}{98 \\cdot 101}$</div>", lines_needed: 14, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Các phân số có dạng lặp lại chu kỳ (ví dụ: $121212$). Làm sao để rút gọn chúng?<br>- <b>How:</b> Phân tích $121212 = 12 \\cdot 10101$. Do đó, ta có thể chia cả tử và mẫu cho $10101$ để rút gọn phân số thành $\\dfrac{12}{56}$. Hãy rút gọn toàn bộ trước khi tính.<br>- <b>Why:</b> Mẫu số $56, 72, 90$ có gợi cho em điều gì không? ($56 = 7 \\cdot 8$; $72 = 8 \\cdot 9$). Đây chính là chuỗi sai phân ẩn mình!<br><b>Ý b:</b><br>- <b>What:</b> Chuỗi sai phân với mẫu số là tích của 2 số cách nhau bao nhiêu đơn vị? ($5 - 2 = 3$).<br>- <b>How:</b> Tử số hiện tại là $1$. Ta cần nhân cả biểu thức $B$ với bao nhiêu để tử số \"khớp\" với khoảng cách ở mẫu? (Nhân với 3).", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$A$:</b></li><li class='ml-4'>Thực hiện rút gọn các phân số bằng cách chia cả tử và mẫu cho $10101$:</li><li class='ml-8'>$A = 70 \\cdot \\left( \\dfrac{12}{56} + \\dfrac{12}{72} + \\dfrac{12}{90} \\right)$</li><li class='ml-4'>Tách mẫu số thành tích của $2$ số tự nhiên liên tiếp:</li><li class='ml-8'>$A = 70 \\cdot \\left( \\dfrac{12}{7 \\cdot 8} + \\dfrac{12}{8 \\cdot 9} + \\dfrac{12}{9 \\cdot 10} \\right)$</li><li class='ml-4'>Đặt thừa số $12$ ra ngoài làm nhân tử chung:</li><li class='ml-8'>$A = 70 \\cdot 12 \\cdot \\left( \\dfrac{1}{7 \\cdot 8} + \\dfrac{1}{8 \\cdot 9} + \\dfrac{1}{9 \\cdot 10} \\right)$</li><li class='ml-4'>Áp dụng công thức sai phân $\\dfrac{1}{n(n+1)} = \\dfrac{1}{n} - \\dfrac{1}{n+1}$:</li><li class='ml-8'>$A = 840 \\cdot \\left( \\dfrac{1}{7} - \\dfrac{1}{8} + \\dfrac{1}{8} - \\dfrac{1}{9} + \\dfrac{1}{9} - \\dfrac{1}{10} \\right)$</li><li class='ml-4'>Triệt tiêu các số hạng đối nhau:</li><li class='ml-8'>$A = 840 \\cdot \\left( \\dfrac{1}{7} - \\dfrac{1}{10} \\right) = 840 \\cdot \\left( \\dfrac{10}{70} - \\dfrac{7}{70} \\right)$</li><li class='ml-8'>$A = 840 \\cdot \\dfrac{3}{70} = 12 \\cdot 3 = 36$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $A = 36$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$B$:</b></li><li class='ml-4'>Nhân cả hai vế của biểu thức $B$ với $3$:</li><li class='ml-8'>$3B = \\dfrac{3}{2 \\cdot 5} + \\dfrac{3}{5 \\cdot 8} + \\dfrac{3}{8 \\cdot 11} + \\dots + \\dfrac{3}{98 \\cdot 101}$</li><li class='ml-4'>Áp dụng công thức sai phân tách từng phân số thành hiệu:</li><li class='ml-8'>$3B = \\left( \\dfrac{1}{2} - \\dfrac{1}{5} \\right) + \\left( \\dfrac{1}{5} - \\dfrac{1}{8} \\right) + \\dots + \\left( \\dfrac{1}{98} - \\dfrac{1}{101} \\right)$</li><li class='ml-4'>Triệt tiêu các phân số có dấu trái ngược nhau ở giữa:</li><li class='ml-8'>$3B = \\dfrac{1}{2} - \\dfrac{1}{101} = \\dfrac{101}{202} - \\dfrac{2}{202} = \\dfrac{99}{202}$</li><li class='ml-4'>Tìm $B$ bằng phép chia:</li><li class='ml-8'>$B = \\dfrac{99}{202} : 3 = \\dfrac{33}{202}$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $B = \\dfrac{33}{202}$.</li>" },
{ t_title: "Câu 2 (2,0 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{x+8}{12} + \\dfrac{x+9}{11} + \\dfrac{x+10}{10} + 3 = 0$</div><div class='mt-6'>b) &nbsp; $\\left( \\dfrac{1}{2} + \\dfrac{1}{3} + \\dfrac{1}{4} + \\dots + \\dfrac{1}{10} \\right) \\cdot x = \\dfrac{1}{9} + \\dfrac{2}{8} + \\dfrac{3}{7} + \\dots + \\dfrac{8}{2} + \\dfrac{9}{1}$</div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Phương trình có mẫu số lớn và tử số chứa biến $x$. Không thể quy đồng trực tiếp được.<br>- <b>Why:</b> Hãy chú ý hằng số $+3$ ở cuối. Có đúng $3$ phân số đứng trước nó! Điều gì xảy ra nếu ta tách số $3$ thành $1 + 1 + 1$ và cộng mỗi số $1$ vào một phân số?<br>- <b>How:</b> $\\dfrac{x+8}{12} + 1 = \\dfrac{x+8+12}{12} = \\dfrac{x+20}{12}$. Rất kỳ diệu, mọi tử số đều biến thành $(x+20)$. Hãy đặt nhân tử chung ra ngoài.<br><b>Ý b:</b><br>- <b>Where:</b> Hãy quan sát vế phải. Các phân số có quy luật gì? Tổng của tử số và mẫu số ở mỗi phân số đều bằng $10$.<br>- <b>How:</b> Phân số cuối cùng $\\dfrac{9}{1} = 9$. Hãy \"xé\" số $9$ này thành 9 con số $1$. Đem 8 con số $1$ chia đều cho 8 phân số đầu tiên. Phân số cuối cùng giữ nguyên dạng $\\dfrac{10}{10}$.<br>- Khi đó, tử số của mọi phân số ở vế phải đều biến thành $10$, rút $10$ ra ngoài là xong!", solution: "<li><b>a) Tìm&nbsp;$x$&nbsp;bằng phương pháp nhóm hằng số:</b></li><li class='ml-4'>Ta tách số $3$ ở vế trái thành ba số $1$ và nhóm vào từng phân số:</li><li class='ml-8'>$\\left( \\dfrac{x+8}{12} + 1 \\right) + \\left( \\dfrac{x+9}{11} + 1 \\right) + \\left( \\dfrac{x+10}{10} + 1 \\right) = 0$</li><li class='ml-4'>Thực hiện quy đồng mẫu số bên trong từng dấu ngoặc:</li><li class='ml-8'>$\\dfrac{x+8+12}{12} + \\dfrac{x+9+11}{11} + \\dfrac{x+10+10}{10} = 0$</li><li class='ml-8'>$\\dfrac{x+20}{12} + \\dfrac{x+20}{11} + \\dfrac{x+20}{10} = 0$</li><li class='ml-4'>Đặt tử số chung $(x+20)$ ra ngoài làm nhân tử chung:</li><li class='ml-8'>$(x+20) \\cdot \\left( \\dfrac{1}{12} + \\dfrac{1}{11} + \\dfrac{1}{10} \\right) = 0$</li><li class='ml-4'>Xét cụm biểu thức $\\left( \\dfrac{1}{12} + \\dfrac{1}{11} + \\dfrac{1}{10} \\right)$. Đây là tổng của các số dương nên giá trị của nó luôn lớn hơn $0$.</li><li class='ml-4'>Do đó, để tích trên bằng $0$, bắt buộc nhân tử thứ nhất phải bằng $0$:</li><li class='ml-8'>$x + 20 = 0 \\Rightarrow x = -20$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = -20$.</li><li><b>b) Tìm&nbsp;$x$&nbsp;trong chuỗi phân số ẩn:</b></li><li class='ml-4'>Ta xét riêng vế phải (VP) của phương trình:</li><li class='ml-8'>$\\text{VP} = \\dfrac{1}{9} + \\dfrac{2}{8} + \\dfrac{3}{7} + \\dots + \\dfrac{8}{2} + \\dfrac{9}{1}$</li><li class='ml-4'>Tách phân số cuối cùng $\\dfrac{9}{1} = 8 + 1$. Lấy $8$ đơn vị phân phát đều (cộng $1$) cho $8$ phân số đầu tiên, giữ lại $1$ đơn vị ở cuối:</li><li class='ml-8'>$\\text{VP} = \\left( \\dfrac{1}{9} + 1 \\right) + \\left( \\dfrac{2}{8} + 1 \\right) + \\dots + \\left( \\dfrac{8}{2} + 1 \\right) + 1$</li><li class='ml-4'>Thực hiện quy đồng trong từng dấu ngoặc và viết số $1$ cuối cùng thành $\\dfrac{10}{10}$:</li><li class='ml-8'>$\\text{VP} = \\dfrac{10}{9} + \\dfrac{10}{8} + \\dots + \\dfrac{10}{2} + \\dfrac{10}{10}$</li><li class='ml-4'>Sắp xếp lại thứ tự các mẫu số từ bé đến lớn và đặt số $10$ làm nhân tử chung:</li><li class='ml-8'>$\\text{VP} = 10 \\cdot \\left( \\dfrac{1}{2} + \\dfrac{1}{3} + \\dfrac{1}{4} + \\dots + \\dfrac{1}{9} + \\dfrac{1}{10} \\right)$</li><li class='ml-4'>Thay VP trở lại phương trình gốc, ta có:</li><li class='ml-8'>$\\left( \\dfrac{1}{2} + \\dfrac{1}{3} + \\dots + \\dfrac{1}{10} \\right) \\cdot x = 10 \\cdot \\left( \\dfrac{1}{2} + \\dfrac{1}{3} + \\dots + \\dfrac{1}{10} \\right)$</li><li class='ml-4'>Vì biểu thức trong ngoặc khác $0$, ta triệt tiêu ở cả hai vế:</li><li class='ml-8'>$x = 10$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $x = 10$.</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "Một hộp có chứa&nbsp;$3$&nbsp;loại kẹp tóc: màu Xanh, màu Đỏ và màu Vàng. Các kẹp tóc có cùng kích thước và khối lượng. Bạn Nam lấy ngẫu nhiên một chiếc kẹp từ hộp, ghi lại màu sắc rồi trả lại vào hộp. Thực hiện liên tiếp&nbsp;$30$&nbsp;lần, bạn Nam thống kê được:<br>- Có&nbsp;$12$&nbsp;lần lấy được kẹp màu Xanh.<br>- Số lần lấy được kẹp màu Vàng chiếm&nbsp;$30\\%$&nbsp;tổng số lần lấy.<div class='mt-6'>a) Tính số lần bạn Nam lấy được kẹp màu Đỏ.</div><div class='mt-6'>b) Tính xác suất thực nghiệm của sự kiện 'Nam lấy được kẹp màu Đỏ'.</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán hỏi số lần xuất hiện và xác suất thực nghiệm của kẹp màu Đỏ.<br>- <b>How:</b> Ta đã biết tổng số lần tung là $30$. Hãy tính số lần rút được kẹp màu Vàng dựa trên tỉ lệ phần trăm ($30\\%$ của $30$).<br>- <b>Why:</b> Vì chỉ có 3 màu, nên số lần rút được kẹp Đỏ sẽ bằng Tổng số lần trừ đi số lần của Xanh và Vàng.<br>- Cuối cùng, xác suất thực nghiệm được tính bằng cách lấy số lần xuất hiện chia cho tổng số lần thí nghiệm.", solution: "<li><b>a) Tính số lần lấy được kẹp màu Đỏ:</b></li><li class='ml-4'>Tổng số lần thực hiện việc lấy kẹp tóc là: $30$ (lần).</li><li class='ml-4'>Vì số lần lấy được kẹp màu Vàng chiếm $30\\%$ tổng số lần lấy, nên số lần lấy được kẹp màu Vàng là:</li><li class='ml-8'>$30 \\cdot 30\\% = 30 \\cdot \\dfrac{30}{100} = 9$ (lần).</li><li class='ml-4'>Theo thống kê, số lần lấy được kẹp màu Xanh là $12$ lần.</li><li class='ml-4'>Vì trong hộp chỉ có 3 loại kẹp (Xanh, Đỏ, Vàng), nên số lần lấy được kẹp màu Đỏ là:</li><li class='ml-8'>$30 - (12 + 9) = 30 - 21 = 9$ (lần).</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Bạn Nam đã lấy được kẹp màu Đỏ $9$ lần.</li><li><b>b) Tính xác suất thực nghiệm:</b></li><li class='ml-4'>Sự kiện \"Nam lấy được kẹp màu Đỏ\" xuất hiện $9$ lần trong tổng số $30$ lần thực hiện thí nghiệm.</li><li class='ml-4'>Xác suất thực nghiệm của sự kiện này là:</li><li class='ml-8'>$\\dfrac{9}{30} = \\dfrac{3}{10}$ (Hoặc bằng $30\\%$).</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Xác suất thực nghiệm là $\\dfrac{3}{10}$.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Vẽ đường thẳng&nbsp;$xy$. Lấy điểm&nbsp;$O$&nbsp;thuộc đường thẳng&nbsp;$xy$. Lấy điểm&nbsp;$A$&nbsp;thuộc tia&nbsp;$Ox$&nbsp;sao cho&nbsp;$OA = 3\\text{ cm}$, điểm&nbsp;$B$&nbsp;thuộc tia&nbsp;$Oy$&nbsp;sao cho&nbsp;$OB = 5\\text{ cm}$.<div class='mt-6'>a) Điểm&nbsp;$O$&nbsp;có nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;không? Vì sao? Tính độ dài đoạn thẳng&nbsp;$AB$.</div><div class='mt-6'>b) Lấy điểm&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$OA$, điểm&nbsp;$N$&nbsp;là trung điểm của đoạn thẳng&nbsp;$OB$. Tính độ dài đoạn thẳng&nbsp;$MN$.</div><div class='mt-6'>c) Điểm&nbsp;$O$&nbsp;có phải là trung điểm của đoạn thẳng&nbsp;$MN$&nbsp;không? Vì sao?</div><div class='flex justify-center my-8'><svg width='360' height='70' viewBox='0 0 360 70'><line x1='10' y1='40' x2='350' y2='40' stroke='black' stroke-width='1.5'/><text x='15' y='30' font-size='14' font-style='italic'>x</text><text x='340' y='30' font-size='14' font-style='italic'>y</text><circle cx='80' cy='40' r='3' fill='black'/><text x='75' y='60' font-size='14'>A</text><circle cx='110' cy='40' r='3' fill='red'/><text x='105' y='60' font-size='14' fill='red'>M</text><circle cx='140' cy='40' r='3' fill='black'/><text x='135' y='60' font-size='14'>O</text><circle cx='190' cy='40' r='3' fill='red'/><text x='185' y='60' font-size='14' fill='red'>N</text><circle cx='240' cy='40' r='3' fill='black'/><text x='235' y='60' font-size='14'>B</text><path d='M 80 25 L 80 15 L 140 15 L 140 25' fill='none' stroke='blue' stroke-width='0.5'/><text x='100' y='10' font-size='11' fill='blue'>3cm</text><path d='M 140 25 L 140 15 L 240 15 L 240 25' fill='none' stroke='green' stroke-width='0.5'/><text x='180' y='10' font-size='11' fill='green'>5cm</text></svg></div>", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Đường thẳng $xy$ có chứa điểm $O$, nên $Ox$ và $Oy$ là hai tia đối nhau.<br>- <b>How:</b> Có điểm $A$ nằm trên tia này, điểm $B$ nằm trên tia đối của nó thì gốc $O$ phải nằm ở đâu? (Nằm giữa $A$ và $B$). Áp dụng hệ thức cộng đoạn thẳng.<br><b>Ý b:</b><br>- <b>What:</b> Trung điểm chia đoạn thẳng thành 2 nửa. Ta tính được $OM$ và $ON$.<br>- <b>Where:</b> Lập luận tương tự, $M$ thuộc tia $Ox$, $N$ thuộc tia $Oy$ nên gốc $O$ nằm giữa $M$ và $N$. Dùng phép cộng $OM + ON$.<br><b>Ý c:</b><br>- <b>Why:</b> Để là trung điểm của $MN$, $O$ phải thỏa mãn 2 điều kiện: Nằm giữa và cách đều. Hãy kiểm tra xem khoảng cách $OM$ có bằng $ON$ không?", solution: "<li><b>a) Điểm&nbsp;$O$&nbsp;có nằm giữa&nbsp;$A$&nbsp;và&nbsp;$B$&nbsp;không? Tính&nbsp;$AB$:</b></li><li class='ml-4'>Lập luận vị trí: Vì điểm $O$ nằm trên đường thẳng $xy$ nên $O$ chia đường thẳng thành hai tia đối nhau là tia $Ox$ và tia $Oy$.</li><li class='ml-4'>Vì điểm $A$ thuộc tia $Ox$, điểm $B$ thuộc tia $Oy$ nên <b>điểm&nbsp;$O$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$B$</b>.</li><li class='ml-4'>Do $O$ nằm giữa $A$ và $B$, ta áp dụng công thức cộng đoạn thẳng:</li><li class='ml-8'>$OA + OB = AB$</li><li class='ml-8'>$3 + 5 = 8 \\Rightarrow AB = 8\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Kết luận a: $O$ nằm giữa $A$ và $B$. Độ dài $AB = 8\\text{ cm}$.</li><li><b>b) Tính độ dài đoạn thẳng&nbsp;$MN$:</b></li><li class='ml-4'>Vì $M$ là trung điểm của đoạn thẳng $OA$ nên: $OM = \\dfrac{OA}{2} = \\dfrac{3}{2} = 1,5\\text{ cm}$.</li><li class='ml-4'>Vì $N$ là trung điểm của đoạn thẳng $OB$ nên: $ON = \\dfrac{OB}{2} = \\dfrac{5}{2} = 2,5\\text{ cm}$.</li><li class='ml-4'>Vì $M$ thuộc đoạn $OA$ nên $M$ cũng thuộc tia $Ox$. Tương tự, $N$ thuộc đoạn $OB$ nên $N$ cũng thuộc tia $Oy$.</li><li class='ml-4'>Mà $Ox$ và $Oy$ là hai tia đối nhau, nên điểm $O$ nằm giữa hai điểm $M$ và $N$.</li><li class='ml-4'>Áp dụng công thức cộng đoạn thẳng:</li><li class='ml-8'>$MN = OM + ON$</li><li class='ml-8'>$MN = 1,5 + 2,5 = 4\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số b: $MN = 4\\text{ cm}$.</li><li><b>c) Điểm&nbsp;$O$&nbsp;có phải là trung điểm của đoạn thẳng&nbsp;$MN$&nbsp;không?</b></li><li class='ml-4'>Dựa vào lập luận ở câu b, ta đã có điểm $O$ nằm giữa hai điểm $M$ và $N$.</li><li class='ml-4'>Tuy nhiên, khi xét về độ dài khoảng cách từ gốc $O$ đến hai đầu mút:</li><li class='ml-8'>$OM = 1,5\\text{ cm}$</li><li class='ml-8'>$ON = 2,5\\text{ cm}$</li><li class='ml-4'>Vì $OM \\neq ON$ ($1,5 \\neq 2,5$) nên khoảng cách từ $O$ đến $M$ và $N$ là không bằng nhau.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận c: Vậy điểm $O$ <b>không phải</b> là trung điểm của đoạn thẳng $MN$.</li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Nguyên lý Dirichlet) Chứng minh rằng trong&nbsp;$52$&nbsp;số nguyên bất kỳ, luôn tồn tại&nbsp;$2$&nbsp;số sao cho tổng hoặc hiệu của chúng chia hết cho&nbsp;$100$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Chứng minh trong $52$ số nguyên, luôn tồn tại $2$ số có tổng hoặc hiệu chia hết cho $100$.<br>- <b>Why:</b> Khi đem một số chia cho $100$, số dư có thể trải dài từ $0$ đến $99$.<br>- <b>How:</b> Để tạo ra tổng hoặc hiệu chia hết cho $100$, ta phải bắt cặp các số dư sao cho chúng trừ đi nhau bằng $0$ (hiệu chia hết) hoặc cộng lại bằng $100$ (tổng chia hết).<br>- Hãy tạo các nhóm (lồng thỏ) như sau: Nhóm $\\{0\\}$ (dư 0). Nhóm $\\{50\\}$ (dư 50). Các nhóm cặp: $\\{1; 99\\}, \\{2; 98\\}, \\dots, \\{49; 51\\}$.<br>- <b>Where:</b> Tổng cộng có bao nhiêu nhóm? ($1 + 1 + 49 = 51$ nhóm). Áp dụng Dirichlet nhét 52 con thỏ vào 51 lồng!", solution: "<li>Một số nguyên bất kỳ khi đem chia cho $100$ sẽ nhận được $1$ trong $100$ số dư là: $0, 1, 2, \\dots, 99$.</li><li>Để khảo sát tính chia hết cho $100$ của tổng và hiệu, ta phân chia $100$ loại số dư này thành $51$ nhóm (đóng vai trò là $51$ chiếc lồng) như sau:</li><li class='ml-8'>- Nhóm 1: $\\{0\\}$</li><li class='ml-8'>- Nhóm 2: $\\{50\\}$</li><li class='ml-8'>- 49 nhóm cặp có tổng bằng 100: $\\{1; 99\\}, \\{2; 98\\}, \\{3; 97\\}, \\dots, \\{49; 51\\}$.</li><li>Theo đề bài, ta có $52$ số nguyên bất kỳ (đóng vai trò là $52$ con thỏ).</li><li>Theo Nguyên lý Dirichlet, khi phân phối $52$ số vào $51$ nhóm số dư, chắc chắn tồn tại ít nhất $1$ nhóm chứa từ $2$ số trở lên ($52 = 51 \\cdot 1 + 1$).</li><li>Gọi hai số nguyên cùng rơi vào một nhóm là $a$ và $b$. Xảy ra hai trường hợp:</li><li class='ml-4'><b>Trường hợp 1:</b> Hai số $a$ và $b$ cùng nằm trong Nhóm 1 (dư 0), Nhóm 2 (dư 50) hoặc mang <b>CÙNG MỘT SỐ DƯ</b> trong một nhóm cặp. Lúc này, $a$ và $b$ có số dư giống hệt nhau khi chia cho $100$. Suy ra hiệu $(a - b)$ chia hết cho $100$.</li><li class='ml-4'><b>Trường hợp 2:</b> Hai số $a$ và $b$ rơi vào cùng một nhóm cặp (ví dụ nhóm $\\{1; 99\\}$) nhưng mang hai số dư <b>KHÁC NHAU</b>. Nghĩa là một số chia $100$ dư $1$, số kia chia $100$ dư $99$. Lúc này, tổng của hai số dư là $1 + 99 = 100$. Suy ra tổng $(a + b)$ chia hết cho $100$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Trong mọi trường hợp, luôn tìm được hai số sao cho tổng hoặc hiệu của chúng chia hết cho $100$. (Đpcm).</li>" },
{ t_title: "Câu 6 (2,0 điểm)", t_content: "(Bất đẳng thức Nâng cao) Cho biểu thức:&nbsp;$A = \\dfrac{1}{5^2} + \\dfrac{3}{5^4} + \\dfrac{5}{5^6} + \\dots + \\dfrac{101}{5^{102}}$<br>Chứng minh rằng:&nbsp;$A < \\dfrac{13}{288}$.", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Đây là bài toán tính tổng chuỗi phân số có mẫu là lũy thừa, tử số là cấp số cộng lẻ ($1, 3, 5\\dots$).<br>- <b>How:</b> Để khử mẫu số, phương pháp kinh điển là nhân cả biểu thức với cơ số của mẫu (hoặc bình phương cơ số nếu mẫu tăng bậc 2). Mẫu số tăng từ $5^2 \\rightarrow 5^4 \\rightarrow 5^6$, tức là nhân với $5^2 = 25$. Hãy nhân $25A$ rồi lấy $25A - A$ để xem chuyện gì xảy ra.<br>- <b>Why:</b> Khi trừ đi, các tử số sẽ tạo ra phần chênh lệch đều đặn là $2$. Cụm mới sinh ra lại tiếp tục là một cấp số nhân lùi vô hạn. Áp dụng kỹ thuật nhân 25 thêm một lần nữa cho cụm mới này sẽ triệt tiêu hoàn toàn chuỗi.", solution: "<li><b>Bước 1:</b> Nhân cả 2 vế của $A$ với $5^2 = 25$:</li><li class='ml-4'>$25A = 25 \\cdot \\left( \\dfrac{1}{5^2} + \\dfrac{3}{5^4} + \\dfrac{5}{5^6} + \\dots + \\dfrac{101}{5^{102}} \\right)$</li><li class='ml-4'>$25A = 1 + \\dfrac{3}{5^2} + \\dfrac{5}{5^4} + \\dots + \\dfrac{101}{5^{100}}$</li><li><b>Bước 2:</b> Lấy $25A$ trừ đi $A$ vế theo vế:</li><li class='ml-4'>$25A - A = 1 + \\left( \\dfrac{3}{5^2} - \\dfrac{1}{5^2} \\right) + \\left( \\dfrac{5}{5^4} - \\dfrac{3}{5^4} \\right) + \\dots + \\left( \\dfrac{101}{5^{100}} - \\dfrac{99}{5^{100}} \\right) - \\dfrac{101}{5^{102}}$</li><li class='ml-4'>$24A = 1 + \\dfrac{2}{5^2} + \\dfrac{2}{5^4} + \\dfrac{2}{5^6} + \\dots + \\dfrac{2}{5^{100}} - \\dfrac{101}{5^{102}}$</li><li><b>Bước 3:</b> Đặt cụm ở giữa là $B = \\dfrac{2}{5^2} + \\dfrac{2}{5^4} + \\dfrac{2}{5^6} + \\dots + \\dfrac{2}{5^{100}}$. Ta tiếp tục nhân $B$ với $25$:</li><li class='ml-4'>$25B = 2 + \\dfrac{2}{5^2} + \\dfrac{2}{5^4} + \\dots + \\dfrac{2}{5^{98}}$</li><li class='ml-4'>Lấy $25B$ trừ đi $B$ vế theo vế:</li><li class='ml-4'>$25B - B = 2 - \\dfrac{2}{5^{100}}$</li><li class='ml-4'>$24B = 2 - \\dfrac{2}{5^{100}}$. Vì $\\dfrac{2}{5^{100}} > 0$ nên $24B < 2 \\Rightarrow B < \\dfrac{2}{24} = \\dfrac{1}{12}$.</li><li><b>Bước 4:</b> Thay giá trị của $B$ vừa tìm được trở lại vào phương trình của $24A$:</li><li class='ml-4'>$24A = 1 + B - \\dfrac{101}{5^{102}}$</li><li class='ml-4'>$24A < 1 + \\dfrac{1}{12} - \\dfrac{101}{5^{102}}$</li><li class='ml-4'>$24A < \\dfrac{13}{12} - \\dfrac{101}{5^{102}}$</li><li><b>Bước 5:</b> Biện luận bất đẳng thức:</li><li class='ml-4'>Vì $\\dfrac{101}{5^{102}} > 0$, nên khi lấy $\\dfrac{13}{12}$ trừ đi số này, kết quả chắc chắn sẽ nhỏ hơn $\\dfrac{13}{12}$.</li><li class='ml-4'>Suy ra: $24A < \\dfrac{13}{12}$.</li><li class='ml-4'>Chia cả hai vế cho $24$ để tìm giới hạn của $A$:</li><li class='ml-4'>$A < \\dfrac{13}{12 \\cdot 24} \\Rightarrow A < \\dfrac{13}{288}$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Bất đẳng thức đã được chứng minh thành công.</li>" }
]
});
</script>

trac_nghiem: [
{ q_title: "Câu 1", q_content: "Làm tròn số&nbsp;$a = 135,489$&nbsp;đến chữ số thập phân thứ hai, sai số tuyệt đối (khoảng cách giữa số ban đầu và số làm tròn) là:", options: ["A. $0,001$", "B. $0,01$", "C. $0,011$", "D. $0,009$"], correct_idx: 0, explain: "Làm tròn&nbsp;$135,489$&nbsp;đến chữ số thập phân thứ hai ta được&nbsp;$135,49$. Sai số tuyệt đối là:&nbsp;$|135,489 - 135,49| = |-0,001| = 0,001$. Chọn A." },
{ q_title: "Câu 2", q_content: "Lớp trưởng thống kê phương tiện đi học của các bạn trong tổ 1 như sau: Xe đạp, Đi bộ, Xe buýt, Máy bay, Xe đạp điện. Dữ liệu KHÔNG hợp lý trong dãy là:", options: ["A. Đi bộ", "B. Máy bay", "C. Xe đạp điện", "D. Không có"], correct_idx: 1, explain: "Học sinh đi học hàng ngày không thể sử dụng phương tiện 'Máy bay'. Đây là dữ liệu vô lý. Chọn B." },
{ q_title: "Câu 3", q_content: "Có bao nhiêu số nguyên&nbsp;$x$&nbsp;thỏa mãn&nbsp;$\\dfrac{-12}{4} \\le x < \\dfrac{10}{3}$?", options: ["A. $5$", "B. $6$", "C. $7$", "D. $8$"], correct_idx: 2, explain: "Ta rút gọn và ước lượng:&nbsp;$-3 \\le x < 3,33$. Vì&nbsp;$x$&nbsp;là số nguyên nên&nbsp;$x \\in \\{-3; -2; -1; 0; 1; 2; 3\\}$. Tổng cộng có 7 số. Chọn C." },
{ q_title: "Câu 4", q_content: "Biết&nbsp;$15\\%$&nbsp;của một số là&nbsp;$45$. Giá trị&nbsp;$\\dfrac{1}{3}$&nbsp;của số đó là:", options: ["A. $100$", "B. $150$", "C. $300$", "D. $10$"], correct_idx: 0, explain: "Số ban đầu là:&nbsp;$45 : 15\\% = 45 : 0,15 = 300$. Tính&nbsp;$\\dfrac{1}{3}$&nbsp;của số đó là:&nbsp;$300 \\cdot \\dfrac{1}{3} = 100$. Chọn A." },
{ q_title: "Câu 5", q_content: "Kết quả của phép tính&nbsp;$\\dfrac{-4}{5} \\cdot \\left( \\dfrac{5}{-4} + 1 \\right)$&nbsp;là:", options: ["A. $0$", "B. $1$", "C. $\\dfrac{1}{5}$", "D. $1 - \\dfrac{4}{5}$"], correct_idx: 2, explain: "Áp dụng tính chất phân phối:&nbsp;$\\dfrac{-4}{5} \\cdot \\dfrac{5}{-4} + \\dfrac{-4}{5} \\cdot 1 = 1 - \\dfrac{4}{5} = \\dfrac{1}{5}$. Chọn C." },
{ q_title: "Câu 6", q_content: "Một đồng xu được tung&nbsp;$50$&nbsp;lần. Nếu xác suất thực nghiệm xuất hiện mặt Ngửa là&nbsp;$44\\%$, thì số lần xuất hiện mặt Sấp là:", options: ["A. $22$&nbsp;lần", "B. $28$&nbsp;lần", "C. $56$&nbsp;lần", "D. $44$&nbsp;lần"], correct_idx: 1, explain: "Tỉ lệ xuất hiện mặt Sấp là&nbsp;$100\\% - 44\\% = 56\\%$. Số lần xuất hiện mặt Sấp là:&nbsp;$50 \\cdot 56\\% = 28$&nbsp;(lần). Chọn B." },
{ q_title: "Câu 7", q_content: "Hai góc kề bù có tỉ số số đo là&nbsp;$1:3$. Góc nhỏ hơn có số đo là:", options: ["A. $45^{\\circ}$", "B. $60^{\\circ}$", "C. $30^{\\circ}$", "D. $135^{\\circ}$"], correct_idx: 0, explain: "Tổng hai góc kề bù là&nbsp;$180^{\\circ}$. Tổng số phần bằng nhau là&nbsp;$1+3=4$&nbsp;phần. Góc nhỏ hơn (1 phần) là:&nbsp;$180^{\\circ} : 4 = 45^{\\circ}$. Chọn A." },
{ q_title: "Câu 8", q_content: "Điểm&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$. Nếu&nbsp;$AM = 6\\text{ cm}$&nbsp;thì độ dài&nbsp;$AB$&nbsp;là:", options: ["A. $3\\text{ cm}$", "B. $12\\text{ cm}$", "C. $6\\text{ cm}$", "D. $9\\text{ cm}$"], correct_idx: 1, explain: "Vì&nbsp;$M$&nbsp;là trung điểm của&nbsp;$AB$&nbsp;nên&nbsp;$AB = 2 \\cdot AM = 2 \\cdot 6 = 12\\text{ cm}$. Chọn B." },
{ q_title: "Câu 9", q_content: "Vẽ&nbsp;$4$&nbsp;đường thẳng phân biệt cắt nhau tại&nbsp;$1$&nbsp;điểm. Số cặp góc đối đỉnh được tạo thành (không kể góc bẹt) là:", options: ["A. 4", "B. 6", "C. 8", "D. 12"], correct_idx: 3, explain: "$4$&nbsp;đường thẳng tạo thành&nbsp;$8$&nbsp;tia. Số góc tạo thành là&nbsp;$\\dfrac{8 \\cdot 7}{2} = 28$&nbsp;góc. Có&nbsp;$4$&nbsp;góc bẹt. Số góc còn lại là&nbsp;$24$&nbsp;góc. Cứ&nbsp;$2$&nbsp;góc tạo thành&nbsp;$1$&nbsp;cặp đối đỉnh, vậy có&nbsp;$24 : 2 = 12$&nbsp;cặp. Hoặc dùng công thức&nbsp;$n(n-1) = 4 \\cdot 3 = 12$&nbsp;cặp. Chọn D." },
{ q_title: "Câu 10", q_content: "Số chính phương nào sau đây có chữ số tận cùng là&nbsp;$6$?", options: ["A. $196$", "B. $126$", "C. $166$", "D. $246$"], correct_idx: 0, explain: "Thử các phương án, ta thấy&nbsp;$196 = 14^2$&nbsp;là một số chính phương. Các số còn lại không phải. Chọn A." },
{ q_title: "Câu 11", q_content: "Trong đợt kiểm tra sức khỏe, cân nặng (đơn vị: kg) của&nbsp;$5$&nbsp;học sinh được ghi lại như sau:&nbsp;$35,5; 38; 142; 40; 39,2$. Xét 3 mệnh đề sau:<br>(I) Dữ liệu '$142$' là một số liệu hợp lý đối với học sinh lớp 6.<br>(II) Dãy dữ liệu trên là dãy số liệu (dữ liệu định lượng).<br>(III) Nếu loại bỏ dữ liệu sai, cân nặng trung bình của 4 học sinh còn lại chưa đến&nbsp;$40\\text{ kg}$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Học sinh lớp 6 không thể nặng 142kg, đây là số liệu sai (Mệnh đề I sai). (II) Đây là dữ liệu đo lường bằng số nên là định lượng (Đúng). (III) Bốn bạn còn lại có cân nặng là 35,5; 38; 40; 39,2. Trong 4 bạn có 3 bạn < 40kg và 1 bạn = 40kg, nên trung bình cộng chắc chắn < 40kg (Đúng). Có 2 mệnh đề đúng. Chọn C." },
{ q_title: "Câu 12", q_content: "Cho điểm&nbsp;$I$&nbsp;nằm giữa hai điểm&nbsp;$E$&nbsp;và&nbsp;$F$. Lấy điểm&nbsp;$O$&nbsp;không thuộc đường thẳng&nbsp;$EF$. Kẻ các tia&nbsp;$OE, OI, OF$. Xét 3 mệnh đề sau:<br>(I) Tia&nbsp;$OI$&nbsp;nằm giữa hai tia&nbsp;$OE$&nbsp;và&nbsp;$OF$.<br>(II) &nbsp;$\\angle EOI + \\angle IOF = \\angle EOF$.<br>(III) Nếu&nbsp;$\\angle EOI = \\angle IOF$&nbsp;thì&nbsp;$I$&nbsp;chắc chắn là trung điểm của&nbsp;$EF$.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Vì I nằm giữa E và F nên tia đi qua I (tia OI) sẽ nằm giữa hai tia đi qua E và F (Đúng). (II) Vì tia OI nằm giữa nên có hệ thức cộng góc (Đúng). (III) Tia phân giác của một góc trong tam giác không nhất thiết phải đi qua trung điểm của cạnh đối diện (trừ khi tam giác cân tại đỉnh đó). Nên I chưa chắc là trung điểm (Sai). Có 2 mệnh đề đúng. Chọn C." }
],
tu_luan: [
{ t_title: "Câu 1 (2,0 điểm)", t_content: "Tính hợp lý giá trị của các biểu thức sau:<div class='mt-6'>a) &nbsp; $A = \\dfrac{-4}{15} - \\left( \\dfrac{11}{15} - \\dfrac{1}{3} \\right)$</div><div class='mt-6'>b) &nbsp; $B = \\left(\\dfrac{1}{2} - 1\\right) \\cdot \\left(\\dfrac{1}{3} - 1\\right) \\cdot \\left(\\dfrac{1}{4} - 1\\right) \\cdot \\dots \\cdot \\left(\\dfrac{1}{100} - 1\\right)$</div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Biểu thức có dấu ngoặc và phân số.<br>- <b>Where:</b> Nhận thấy phân số&nbsp;$\\dfrac{11}{15}$&nbsp;bên trong ngoặc có cùng mẫu với phân số bên ngoài.<br>- <b>How:</b> Để tính nhanh, ta KHÔNG quy đồng trong ngoặc. Thay vào đó, áp dụng quy tắc \"bỏ dấu ngoặc\" (chú ý đổi dấu) để nhóm hai phân số cùng mẫu lại với nhau.<br><b>Ý b:</b><br>- <b>What:</b> Một chuỗi các phép nhân.<br>- <b>How:</b> Thực hiện phép trừ trong từng ngoặc, kết quả sẽ sinh ra một loạt các phân số âm.<br>- <b>Why:</b> Dấu của kết quả cuối cùng sẽ là âm hay dương? Hãy đếm xem có bao nhiêu thừa số âm (từ $2$ đến $100$). Vì có lẻ số âm ($99$ số), nên kết quả bắt buộc phải mang dấu âm. Sau đó áp dụng quy tắc triệt tiêu chéo.", solution: "<li><b>a) Tính giá trị biểu thức&nbsp;$A$:</b></li><li class='ml-4'>Áp dụng quy tắc bỏ dấu ngoặc có dấu trừ ở trước (đổi dấu các hạng tử bên trong):</li><li class='ml-8'>$A = \\dfrac{-4}{15} - \\dfrac{11}{15} + \\dfrac{1}{3}$</li><li class='ml-4'>Nhóm hai phân số có cùng mẫu $15$:</li><li class='ml-8'>$A = \\left( \\dfrac{-4 - 11}{15} \\right) + \\dfrac{1}{3}$</li><li class='ml-8'>$A = \\dfrac{-15}{15} + \\dfrac{1}{3}$</li><li class='ml-8'>$A = -1 + \\dfrac{1}{3}$</li><li class='ml-4'>Quy đồng mẫu số và tính kết quả:</li><li class='ml-8'>$A = \\dfrac{-3}{3} + \\dfrac{1}{3} = \\dfrac{-2}{3}$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $A = \\dfrac{-2}{3}$.</li><li><b>b) Tính giá trị biểu thức&nbsp;$B$:</b></li><li class='ml-4'>Thực hiện phép trừ trong từng dấu ngoặc:</li><li class='ml-8'>$B = \\left( \\dfrac{-1}{2} \\right) \\cdot \\left( \\dfrac{-2}{3} \\right) \\cdot \\left( \\dfrac{-3}{4} \\right) \\cdot \\dots \\cdot \\left( \\dfrac{-99}{100} \\right)$</li><li class='ml-4'>Xét dấu của biểu thức: Từ phân số có mẫu là $2$ đến mẫu là $100$, tổng cộng có $99$ thừa số. Vì tích của một số lẻ ($99$) các số âm sẽ mang dấu âm, ta đưa dấu trừ ra ngoài:</li><li class='ml-8'>$B = - \\left( \\dfrac{1}{2} \\cdot \\dfrac{2}{3} \\cdot \\dfrac{3}{4} \\cdot \\dots \\cdot \\dfrac{99}{100} \\right)$</li><li class='ml-4'>Triệt tiêu các thừa số giống nhau trên tử và dưới mẫu:</li><li class='ml-8'>$B = - \\left( \\dfrac{1}{100} \\right)$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $B = \\dfrac{-1}{100}$.</li>" },
{ t_title: "Câu 2 (2,0 điểm)", t_content: "Tìm&nbsp;$x$, biết:<div class='mt-6'>a) &nbsp; $\\dfrac{x}{7} = \\dfrac{-4}{14}$</div><div class='mt-6'>b) &nbsp; $|3x + 1,5| = 4,5$</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Hai phân số bằng nhau.<br>- <b>How:</b> Nên rút gọn phân số bên phải trước để số liệu nhỏ hơn, sau đó nhân chéo hoặc nhận xét mẫu số.<br><b>Ý b:</b><br>- <b>What:</b> Phương trình chứa dấu giá trị tuyệt đối bằng một số dương.<br>- <b>How:</b> Bỏ dấu giá trị tuyệt đối bằng cách chia 2 trường hợp ($4,5$ và $-4,5$) rồi giải như phương trình bậc nhất bình thường.", solution: "<li><b>a) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Rút gọn phân số ở vế phải:</li><li class='ml-8'>$\\dfrac{x}{7} = \\dfrac{-2}{7}$</li><li class='ml-4'>Vì hai phân số bằng nhau và có cùng mẫu số là $7$, nên tử số của chúng phải bằng nhau:</li><li class='ml-8'>$x = -2$</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $x = -2$.</li><li><b>b) Tìm&nbsp;$x$:</b></li><li class='ml-4'>Vì giá trị tuyệt đối bằng một số dương ($4,5 > 0$), ta chia phương trình làm 2 trường hợp:</li><li class='ml-4'><b>Trường hợp 1:</b></li><li class='ml-8'>$3x + 1,5 = 4,5$</li><li class='ml-8'>$3x = 4,5 - 1,5 = 3$</li><li class='ml-8'>$x = 3 : 3 = 1$</li><li class='ml-4'><b>Trường hợp 2:</b></li><li class='ml-8'>$3x + 1,5 = -4,5$</li><li class='ml-8'>$3x = -4,5 - 1,5 = -6$</li><li class='ml-8'>$x = -6 : 3 = -2$</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $x \\in \\{1; -2\\}$.</li>" },
{ t_title: "Câu 3 (2,0 điểm)", t_content: "Nhân dịp năm học mới, một nhà sách giảm giá&nbsp;$15\\%$&nbsp;cho tất cả các loại ba lô học sinh. Bạn Nam mua một chiếc ba lô và do có thẻ học sinh xuất sắc nên được giảm thêm&nbsp;$10\\%$&nbsp;trên giá đã giảm. Cuối cùng, Nam phải trả số tiền là&nbsp;$306.000$&nbsp;đồng.<div class='mt-6'>a) Hỏi giá niêm yết ban đầu của chiếc ba lô là bao nhiêu?</div><div class='mt-6'>b) Biết nhà sách nhập chiếc ba lô đó với giá&nbsp;$250.000$&nbsp;đồng. Hỏi khi bán chiếc ba lô cho Nam, nhà sách lãi bao nhiêu phần trăm so với giá vốn?</div>", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Bài toán tính ngược giá niêm yết sau $2$ lần giảm liên tiếp.<br>- <b>How:</b> Giá $306.000$đ ứng với bao nhiêu % của mức giá đợt 1? (Lấy $100\\% - 10\\% = 90\\%$). Chia để tìm giá đợt 1, rồi tiếp tục chia cho $(100\\% - 15\\%)$ để lùi về giá gốc.<br><b>Ý b:</b><br>- <b>What:</b> Tính tỉ suất lợi nhuận (phần trăm lãi so với vốn).<br>- <b>Why:</b> Để tính tỉ suất, ta cần tính gì trước? (Tính số tiền lãi cụ thể bằng cách lấy Tiền thu về trừ đi Giá vốn).<br>- <b>How:</b> Lập tỉ số giữa Tiền lãi và Giá vốn, nhân với $100\\%$.", solution: "<li><b>a) Tính giá niêm yết ban đầu:</b></li><li class='ml-4'>Mức giá $306.000$ đồng ứng với $90\\%$ (tức là $100\\% - 10\\%$) mức giá của ba lô sau đợt giảm giá thứ nhất.</li><li class='ml-4'>Giá của chiếc ba lô sau đợt giảm giá thứ nhất là:</li><li class='ml-8'>$306.000 : 90\\% = 306.000 : 0,9 = 340.000$&nbsp;(đồng).</li><li class='ml-4'>Mức giá $340.000$ đồng ứng với $85\\%$ (tức là $100\\% - 15\\%$) giá niêm yết ban đầu.</li><li class='ml-4'>Giá niêm yết ban đầu của chiếc ba lô là:</li><li class='ml-8'>$340.000 : 85\\% = 340.000 : 0,85 = 400.000$&nbsp;(đồng).</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: Giá niêm yết ban đầu là $400.000$ đồng.</li><li><b>b) Tính tỉ số phần trăm lãi:</b></li><li class='ml-4'>Số tiền lãi nhà sách thu được khi bán chiếc ba lô cho Nam là:</li><li class='ml-8'>$306.000 - 250.000 = 56.000$&nbsp;(đồng).</li><li class='ml-4'>Tỉ số phần trăm tiền lãi so với giá vốn là:</li><li class='ml-8'>$\\dfrac{56.000}{250.000} \\cdot 100\\% = 0,224 \\cdot 100\\% = 22,4\\%$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: Nhà sách lãi $22,4\\%$ so với giá vốn.</li>" },
{ t_title: "Câu 4 (3,5 điểm)", t_content: "Vẽ đường thẳng&nbsp;$xy$. Lấy ba điểm&nbsp;$A, B, C$&nbsp;nằm trên đường thẳng&nbsp;$xy$&nbsp;theo thứ tự đó. Biết&nbsp;$AB = 6\\text{ cm}, BC = 4\\text{ cm}$. Gọi&nbsp;$M$&nbsp;là trung điểm của đoạn thẳng&nbsp;$AB$, $N$&nbsp;là trung điểm của đoạn thẳng&nbsp;$BC$.<div class='mt-6'>a) Tính độ dài đoạn thẳng&nbsp;$AC$.</div><div class='mt-6'>b) Tính độ dài đoạn thẳng&nbsp;$MN$.</div><div class='flex justify-center my-8'><svg width='400' height='70' viewBox='0 0 400 70'><line x1='10' y1='40' x2='390' y2='40' stroke='black' stroke-width='1.5'/><text x='15' y='30' font-size='14' font-style='italic'>x</text><text x='380' y='30' font-size='14' font-style='italic'>y</text><circle cx='60' cy='40' r='3' fill='black'/><text x='55' y='60' font-size='14'>A</text><circle cx='120' cy='40' r='3' fill='red'/><text x='115' y='60' font-size='14' fill='red'>M</text><circle cx='180' cy='40' r='3' fill='black'/><text x='175' y='60' font-size='14'>B</text><circle cx='220' cy='40' r='3' fill='red'/><text x='215' y='60' font-size='14' fill='red'>N</text><circle cx='260' cy='40' r='3' fill='black'/><text x='255' y='60' font-size='14'>C</text><path d='M 60 25 L 60 15 L 180 15 L 180 25' fill='none' stroke='blue' stroke-width='0.5'/><text x='110' y='10' font-size='11' fill='blue'>6cm</text><path d='M 180 25 L 180 15 L 260 15 L 260 25' fill='none' stroke='green' stroke-width='0.5'/><text x='210' y='10' font-size='11' fill='green'>4cm</text></svg></div>", lines_needed: 12, strategy: "<b>Định hướng 5W1H:</b><br><b>Ý a:</b><br>- <b>What:</b> Ba điểm $A, B, C$ nằm \"theo thứ tự đó\" nghĩa là điểm nào nằm giữa? (Chắc chắn là điểm $B$).<br>- <b>How:</b> Dùng hệ thức cộng đoạn thẳng cơ bản để tìm độ dài $AC$.<br><b>Ý b:</b><br>- <b>What:</b> Tính khoảng cách nối hai trung điểm $M$ và $N$.<br>- <b>Where:</b> M là trung điểm $AB$ nên $MB$ bằng nửa $AB$. N là trung điểm $BC$ nên $BN$ bằng nửa $BC$.<br>- <b>Why:</b> Vì $B$ nằm giữa $A$ và $C$ nên tia $BA$ và $BC$ đối nhau. Điểm $M$ thuộc $BA$, điểm $N$ thuộc $BC$ nên $B$ sẽ nằm giữa $M$ và $N$. Áp dụng phép cộng đoạn thẳng.", solution: "<li><b>a) Tính độ dài đoạn thẳng&nbsp;$AC$:</b></li><li class='ml-4'>Vì ba điểm $A, B, C$ nằm trên đường thẳng $xy$ theo thứ tự đó, nên <b>điểm&nbsp;$B$&nbsp;nằm giữa hai điểm&nbsp;$A$&nbsp;và&nbsp;$C$</b>.</li><li class='ml-4'>Áp dụng công thức cộng đoạn thẳng, ta có:</li><li class='ml-8'>$AC = AB + BC$</li><li class='ml-8'>$AC = 6 + 4 = 10\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2 mb-4'>Đáp số a: $AC = 10\\text{ cm}$.</li><li><b>b) Tính độ dài đoạn thẳng&nbsp;$MN$:</b></li><li class='ml-4'>Vì $M$ là trung điểm của đoạn thẳng $AB$ nên độ dài đoạn thẳng $MB$ là:</li><li class='ml-8'>$MB = \\dfrac{AB}{2} = \\dfrac{6}{2} = 3\\text{ cm}$.</li><li class='ml-4'>Vì $N$ là trung điểm của đoạn thẳng $BC$ nên độ dài đoạn thẳng $BN$ là:</li><li class='ml-8'>$BN = \\dfrac{BC}{2} = \\dfrac{4}{2} = 2\\text{ cm}$.</li><li class='ml-4'>Lập luận điểm nằm giữa: Vì $B$ nằm giữa $A$ và $C$ nên hai tia $BA$ và $BC$ là hai tia đối nhau.</li><li class='ml-4'>Mặt khác, điểm $M$ thuộc đoạn $AB$ nên nằm trên tia $BA$, điểm $N$ thuộc đoạn $BC$ nên nằm trên tia $BC$.</li><li class='ml-4'>Do đó, tia $BM$ và tia $BN$ là hai tia đối nhau. Suy ra, <b>điểm&nbsp;$B$&nbsp;nằm giữa hai điểm&nbsp;$M$&nbsp;và&nbsp;$N$</b>.</li><li class='ml-4'>Áp dụng hệ thức cộng đoạn thẳng:</li><li class='ml-8'>$MN = MB + BN$</li><li class='ml-8'>$MN = 3 + 2 = 5\\text{ cm}$.</li><li class='font-bold text-indigo-700 mt-2'>Đáp số b: $MN = 5\\text{ cm}$.</li>" },
{ t_title: "Câu 5 (1,5 điểm)", t_content: "(Nguyên lý Dirichlet) Cho&nbsp;$6$&nbsp;số tự nhiên bất kỳ. Chứng minh rằng luôn có thể chọn ra được&nbsp;$2$&nbsp;số sao cho hiệu của chúng chia hết cho&nbsp;$5$.", lines_needed: 10, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Bài toán yêu cầu chứng minh luôn tồn tại $2$ số có hiệu chia hết cho $5$.<br>- <b>Why:</b> Dấu hiệu chia hết không giúp được ta ở đây. Hãy nghĩ đến số dư! Khi nào thì hiệu của hai số chia hết cho 5? (Chỉ khi 2 số đó có CÙNG SỐ DƯ khi đem chia cho 5).<br>- <b>How:</b><br>&nbsp; + Khi đem $1$ số tự nhiên chia cho 5, có tối đa bao nhiêu trường hợp số dư? (Có 5 trường hợp: dư 0, 1, 2, 3, 4). Đây chính là 5 \"cái lồng\".<br>&nbsp; + Đề bài cho bao nhiêu số tự nhiên? (6 số, đóng vai trò là 6 \"con thỏ\").<br>&nbsp; + Nhét thỏ vào lồng theo Nguyên lý Dirichlet.", solution: "<li>Khi chia một số tự nhiên bất kỳ cho $5$, số dư nhận được chỉ có thể là một trong $5$ giá trị sau: $\\{0; 1; 2; 3; 4\\}$.</li><li>Ta coi $5$ giá trị số dư này là $5$ <b>chiếc lồng</b>.</li><li>Theo đề bài, ta có tập hợp gồm $6$ <b>số tự nhiên bất kỳ</b> (đóng vai trò là $6$ <b>con thỏ</b>).</li><li>Theo Nguyên lý Dirichlet, khi phân phối $6$ con thỏ vào $5$ chiếc lồng, thì chắc chắn phải tồn tại ít nhất $1$ lồng chứa từ $2$ con thỏ trở lên. ($6 = 5 \\cdot 1 + 1$).</li><li>Áp dụng vào bài toán, điều này có nghĩa là trong $6$ số tự nhiên bất kỳ, luôn tồn tại ít nhất $2$ số có <b>cùng một số dư</b> khi chia cho $5$.</li><li>Gọi hai số đó là $a$ và $b$ ($a, b \\in \\mathbb{N}, a \\ge b$). Giả sử chúng cùng chia $5$ dư $r$ ($0 \\le r < 5$).</li><li>Ta có thể viết: $a = 5q_1 + r$ và $b = 5q_2 + r$.</li><li>Xét hiệu của hai số:</li><li class='ml-4'>$a - b = (5q_1 + r) - (5q_2 + r) = 5q_1 - 5q_2 = 5(q_1 - q_2)$.</li><li>Vì biểu thức $5(q_1 - q_2)$ chia hết cho $5$, nên hiệu $(a - b)$ chia hết cho $5$.</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Luôn có thể chọn ra 2 số có hiệu chia hết cho 5. (Điều phải chứng minh).</li>" },
{ t_title: "Câu 6 (2,0 điểm)", t_content: "(Bài toán Bất đẳng thức Nâng cao) Cho biểu thức:&nbsp;$M = \\dfrac{1}{3^2} + \\dfrac{5}{3^4} + \\dfrac{9}{3^6} + \\dots + \\dfrac{101}{3^{52}}$<br>Chứng minh rằng:&nbsp;$M < \\dfrac{3}{16}$.", lines_needed: 16, strategy: "<b>Định hướng 5W1H:</b><br>- <b>What:</b> Đây là bài toán tính tổng chuỗi phân số, trong đó mẫu số là một cấp số nhân (lũy thừa của $3^2$), còn tử số là một cấp số cộng ($1, 5, 9, \\dots$).<br>- <b>How:</b> Phương pháp kinh điển để giải dạng này là nhân cả biểu thức với cơ số của mẫu (ở đây mẫu tăng theo $3^2 = 9$). Hãy nhân $9M$ rồi xét hiệu $9M - M$.<br>- <b>Why:</b> Khi trừ đi, các tử số sẽ tạo ra một phần chênh lệch hằng số là $4$. Dãy mới tạo ra sẽ là một cấp số nhân lùi vô hạn. Áp dụng kỹ thuật nhân 9 thêm một lần nữa cho dãy mới này sẽ triệt tiêu hoàn toàn chuỗi.", solution: "<li><b>Bước 1: Khử cấp số cộng ở tử số</b></li><li class='ml-4'>Nhân cả 2 vế của $M$ với $3^2 = 9$:</li><li class='ml-8'>$9M = 9 \\cdot \\left( \\dfrac{1}{3^2} + \\dfrac{5}{3^4} + \\dfrac{9}{3^6} + \\dots + \\dfrac{101}{3^{52}} \\right)$</li><li class='ml-8'>$9M = 1 + \\dfrac{5}{3^2} + \\dfrac{9}{3^4} + \\dots + \\dfrac{101}{3^{50}}$</li><li class='ml-4'>Lấy $9M$ trừ đi $M$ vế theo vế:</li><li class='ml-8'>$9M - M = 1 + \\left( \\dfrac{5}{3^2} - \\dfrac{1}{3^2} \\right) + \\left( \\dfrac{9}{3^4} - \\dfrac{5}{3^4} \\right) + \\dots + \\left( \\dfrac{101}{3^{50}} - \\dfrac{97}{3^{50}} \\right) - \\dfrac{101}{3^{52}}$</li><li class='ml-8'>$8M = 1 + \\dfrac{4}{3^2} + \\dfrac{4}{3^4} + \\dfrac{4}{3^6} + \\dots + \\dfrac{4}{3^{50}} - \\dfrac{101}{3^{52}}$</li><li><b>Bước 2: Tính tổng cấp số nhân phụ</b></li><li class='ml-4'>Ta đặt phần giữa của phương trình trên là $B$:</li><li class='ml-8'>$B = \\dfrac{4}{3^2} + \\dfrac{4}{3^4} + \\dfrac{4}{3^6} + \\dots + \\dfrac{4}{3^{50}}$</li><li class='ml-4'>Nhân cả hai vế của $B$ với $9$:</li><li class='ml-8'>$9B = 4 + \\dfrac{4}{3^2} + \\dfrac{4}{3^4} + \\dots + \\dfrac{4}{3^{48}}$</li><li class='ml-4'>Lấy $9B$ trừ đi $B$ vế theo vế:</li><li class='ml-8'>$9B - B = 4 - \\dfrac{4}{3^{50}}$</li><li class='ml-8'>$8B = 4 - \\dfrac{4}{3^{50}}$</li><li class='ml-4'>Vì $\\dfrac{4}{3^{50}} > 0$ nên $8B < 4 \\Rightarrow B < \\dfrac{4}{8} = \\dfrac{1}{2}$.</li><li><b>Bước 3: Thay vào và chứng minh bất đẳng thức</b></li><li class='ml-4'>Thay $B$ trở lại phương trình của $8M$, ta có:</li><li class='ml-8'>$8M = 1 + B - \\dfrac{101}{3^{52}}$</li><li class='ml-4'>Vì $B < \\dfrac{1}{2}$ và $\\dfrac{101}{3^{52}} > 0$, ta thiết lập được bất đẳng thức:</li><li class='ml-8'>$8M < 1 + \\dfrac{1}{2} - 0$</li><li class='ml-8'>$8M < \\dfrac{3}{2}$</li><li class='ml-4'>Chia cả hai vế cho $8$ để tìm giới hạn của $M$:</li><li class='ml-8'>$M < \\dfrac{3}{2 \\cdot 8}$</li><li class='ml-8'>$M < \\dfrac{3}{16}$</li><li class='font-bold text-indigo-700 mt-2'>Kết luận: Bất đẳng thức đã được chứng minh thành công.</li>" }
]
});
</script>

id: 22, title: "ĐỀ THI TOÁN 6 TRÌNH ĐỘ NÂNG CAO - ĐỀ SỐ 22", icon: "📚", color: "sky", level: "Học sinh giỏi", time: "150 phút",
trac_nghiem: [
{ q_title: "Câu 1", q_content: "Phân số nào sau đây lớn nhất?", options: ["A. $\\dfrac{-15}{17}$", "B. $\\dfrac{-14}{17}$", "C. $\\dfrac{-18}{17}$", "D. $\\dfrac{-16}{17}$"], correct_idx: 1, explain: "Các phân số có cùng mẫu dương là 17. Phân số nào có tử lớn hơn thì lớn hơn. Vì&nbsp;$-14 > -15 > -16 > -18$&nbsp;nên&nbsp;$\\dfrac{-14}{17}$&nbsp;là lớn nhất. Chọn B." },
{ q_title: "Câu 2", q_content: "Khi thu thập dữ liệu về 'Tháng sinh của các thành viên trong tổ Toán', bạn Lan ghi lại dãy số liệu sau:&nbsp;$1; 5; 12; 14; 9; 10$. Dữ liệu KHÔNG hợp lý trong dãy là:", options: ["A. $1$", "B. $12$", "C. $14$", "D. $0$"], correct_idx: 2, explain: "Một năm chỉ có 12 tháng, do đó tháng sinh là 14 là hoàn toàn vô lý. Chọn C." },
{ q_title: "Câu 3", q_content: "Gieo một đồng xu cân đối&nbsp;$60$&nbsp;lần. Nếu xác suất thực nghiệm của sự kiện 'Xuất hiện mặt Sấp' là&nbsp;$45\\%$, thì số lần xuất hiện mặt Ngửa là bao nhiêu?", options: ["A. $27$&nbsp;lần", "B. $33$&nbsp;lần", "C. $45$&nbsp;lần", "D. $55$&nbsp;lần"], correct_idx: 1, explain: "Xác suất thực nghiệm của sự kiện 'Mặt Ngửa' là:&nbsp;$100\\% - 45\\% = 55\\%$. Số lần xuất hiện mặt Ngửa là:&nbsp;$60 \\cdot 55\\% = 33$&nbsp;(lần). Chọn B." },
{ q_title: "Câu 4", q_content: "Kết quả của phép tính&nbsp;$\\dfrac{-5}{12} + \\dfrac{7}{18}$&nbsp;là:", options: ["A. $\\dfrac{1}{36}$", "B. $\\dfrac{-1}{36}$", "C. $\\dfrac{2}{30}$", "D. $\\dfrac{-11}{36}$"], correct_idx: 1, explain: "Quy đồng mẫu số chung là 36:&nbsp;$\\dfrac{-15}{36} + \\dfrac{14}{36} = \\dfrac{-1}{36}$. Chọn B." },
{ q_title: "Câu 5", q_content: "Một máy bơm công nghiệp mỗi phút bơm được&nbsp;$120$&nbsp;lít nước. Hỏi trong&nbsp;$1$&nbsp;giờ&nbsp;$15$&nbsp;phút, máy bơm đó bơm được bao nhiêu mét khối nước? (Biết $1\\text{m}^3 = 1000$ lít).", options: ["A. $9000\\text{ m}^3$", "B. $9\\text{ m}^3$", "C. $150\\text{ m}^3$", "D. $1,5\\text{ m}^3$"], correct_idx: 1, explain: "Đổi 1 giờ 15 phút = 75 phút. Trong 75 phút bơm được:&nbsp;$75 \\cdot 120 = 9000$&nbsp;(lít). Đổi&nbsp;$9000\\text{ lít} = 9\\text{ m}^3$. Chọn B." },
{ q_title: "Câu 6", q_content: "Làm tròn số&nbsp;$199,995$&nbsp;đến hàng phần trăm ta được kết quả là:", options: ["A. $199,99$", "B. $200,0$", "C. $200,00$", "D. $199,90$"], correct_idx: 2, explain: "Chữ số hàng phần nghìn là&nbsp;$5 \\ge 5$, ta cộng 1 vào hàng phần trăm ($9+1=10$), nhớ liên tiếp lên các hàng trước. Kết quả là&nbsp;$200,00$. Chọn C." },
{ q_title: "Câu 7", q_content: "Biết&nbsp;$35\\%$&nbsp;của số&nbsp;$x$&nbsp;là&nbsp;$70$. Giá trị của biểu thức&nbsp;$x - 50$&nbsp;là:", options: ["A. $150$", "B. $200$", "C. $100$", "D. $250$"], correct_idx: 0, explain: "Ta có&nbsp;$x = 70 : 35\\% = 70 : 0,35 = 200$. Khi đó giá trị của biểu thức&nbsp;$x - 50 = 200 - 50 = 150$. Chọn A." },
{ q_title: "Câu 8", q_content: "Cứ qua 2 điểm phân biệt ta vẽ được một đường thẳng. Cho&nbsp;$6$&nbsp;điểm phân biệt trong đó không có&nbsp;$3$&nbsp;điểm nào thẳng hàng. Số đường thẳng tạo thành là:", options: ["A. $12$", "B. $15$", "C. $30$", "D. $10$"], correct_idx: 1, explain: "Số đường thẳng tạo thành từ 6 điểm không có 3 điểm nào thẳng hàng là&nbsp;$\\dfrac{6(6-1)}{2} = \\dfrac{6 \\cdot 5}{2} = 15$. Chọn B." },
{ q_title: "Câu 9", q_content: "Điểm&nbsp;$I$&nbsp;là trung điểm của đoạn thẳng&nbsp;$MN = 14\\text{cm}$. Lấy điểm&nbsp;$P$&nbsp;nằm giữa&nbsp;$I$&nbsp;và&nbsp;$N$&nbsp;sao cho&nbsp;$IP = 3\\text{cm}$. Độ dài&nbsp;$PN$&nbsp;là:", options: ["A. $4\\text{cm}$", "B. $10\\text{cm}$", "C. $7\\text{cm}$", "D. $5\\text{cm}$"], correct_idx: 0, explain: "I là trung điểm MN nên&nbsp;$IN = \\dfrac{MN}{2} = \\dfrac{14}{2} = 7\\text{ cm}$. P nằm giữa I và N nên&nbsp;$IP + PN = IN \\Rightarrow 3 + PN = 7 \\Rightarrow PN = 4\\text{ cm}$. Chọn A." },
{ q_title: "Câu 10", q_content: "Hai góc phụ nhau có một góc bằng&nbsp;$55^{\\circ}$. Số đo góc còn lại là:", options: ["A. $125^{\\circ}$", "B. $45^{\\circ}$", "C. $35^{\\circ}$", "D. $145^{\\circ}$"], correct_idx: 2, explain: "Hai góc phụ nhau có tổng số đo bằng&nbsp;$90^{\\circ}$. Số đo góc còn lại là&nbsp;$90^{\\circ} - 55^{\\circ} = 35^{\\circ}$. Chọn C." },
{ q_title: "Câu 11", q_content: "Xét tính Đúng/Sai của các mệnh đề sau về 5 số nguyên bất kỳ:<br>(I) Theo nguyên lý Dirichlet, nếu chia 5 số nguyên này cho 4, chắc chắn tồn tại 2 số có cùng số dư.<br>(II) Hiệu của 2 số có cùng số dư khi chia cho 4 sẽ luôn chia hết cho 2.<br>(III) Luôn có thể chọn ra 2 số trong 5 số nguyên bất kỳ sao cho hiệu của chúng chia hết cho 4.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 3, explain: "(I) Chia 4 có 4 số dư. Nhốt 5 số (thỏ) vào 4 số dư (lồng) $\\Rightarrow$ chắc chắn có 2 số cùng số dư (Đúng). (II) Hiệu 2 số cùng số dư chia 4 sẽ chia hết cho 4, do đó đương nhiên chia hết cho 2 (Đúng). (III) Vì có 2 số cùng số dư chia 4 nên hiệu chia hết cho 4 (Đúng). Cả 3 đúng. Chọn D." },
{ q_title: "Câu 12", q_content: "Cho đường thẳng&nbsp;$xy$. Điểm&nbsp;$O$&nbsp;thuộc&nbsp;$xy$. Lấy điểm&nbsp;$A \\in Ox$,&nbsp;$B \\in Oy$. Xét 3 mệnh đề sau:<br>(I) Tia&nbsp;$OA$&nbsp;và tia&nbsp;$OB$&nbsp;là hai tia đối nhau.<br>(II) Điểm&nbsp;$O$&nbsp;luôn là trung điểm của đoạn thẳng&nbsp;$AB$.<br>(III) Nếu vẽ thêm tia&nbsp;$Oz$&nbsp;sao cho&nbsp;$\\angle xOz = 90^{\\circ}$&nbsp;thì&nbsp;$\\angle yOz$&nbsp;cũng là một góc vuông.<br>Số mệnh đề ĐÚNG là:", options: ["A. 0", "B. 1", "C. 2", "D. 3"], correct_idx: 2, explain: "(I) Vì Ox và Oy là 2 tia đối nhau, A thuộc Ox, B thuộc Oy nên OA và OB là 2 tia đối nhau (Đúng). (II) O nằm giữa A và B nhưng chưa chắc OA = OB nên chưa thể khẳng định là trung điểm (Sai). (III) $\\angle xOy = 180^{\\circ}$ (góc bẹt), nếu $\\angle xOz = 90^{\\circ}$ thì $\\angle yOz = 180^{\\circ} - 90^{\\circ} = 90^{\\circ}$ (Đúng). Có 2 đúng. Chọn C." }
